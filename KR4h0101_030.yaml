body:
  text: 中州名賢文表巻三十明劉昌編富珠哩文靖公碑銘皇元故武略將軍濟南冠州萬戸府千夫長監黙勒齊公神道碑銘聖朝統有天下制官以國人冠其上如古置監者然重國體也兵名所部曰翼其監以北庭有武功者爲之濟南冠州新軍萬戸府千夫長劉洧翼監將武略將軍末赤以至大三年秋八月十有九日終南陽郟邑私第之正寢享年七十有八於是公告老去軍蓋十有五年矣既葬之明年其子孟格台暨其孫鼐瑪台狀公平生走汴階其婣家子劉生汝止乞銘且言公之子孫再世能讓蓋以公武足致位德足化家故也於是叙而銘之公世出朔漠其族世曰鼐瑪氏考曰希卜禅當天兵南墟金社卒行間公寄跡在軍都帥府即署公扎拉圖鎮撫屬副彈壓大兵伐宋從大將展札戰百丈山從萬夫長伊蘇徹爾破黄先洞至元十有一年從都帥鄭國忠宣公破沙洋攻新城明年冬從大軍擣江淛破闗隘帥府以先後功狀彰聞分兵二百署職總把自是宋平十四年春正月勘定閩中有功行中書省版以舊職仍移書樞宻奏授忠顯校尉職爲真其年從忠宣公定嶺海薦陞職樞宻奏加昭信校尉職仍舊帥府署公鎮撫仍將其兵十八年十九年帥府及行中書薦以檄遣公領大將别部幹略戰效益有聞二十有一年詔諸戰將定功以聞用是樞密奏遷武略將軍佩金符監長千夫時二十四年夏六月也其年從行省討交趾署副都鎮撫號召指蹤勇赴銳戰抵蠻都襲逋王嚴柵護集矢石兵無違律省臣材之二十有五年歸駐鄂省以其功聞由是遷監濟南冠州翼鎮戍湖南之桂陽元貞二年公以老疾告其子華善以承信校尉佩符繼職公姿雄㧞性勁直事萃於下情捍於上以理申白無少阿徇佚老鄉邑優游以終嗚呼北庭將校之良也夫人呼都克岱莾賚徹爾大悲努皆前卒今夫人蘇氏子男五曰齊拉曰宻桑夫人呼都克岱出也曰華善母夫人莾賚徹爾義男曰孟格台曰綽羅女三曰博囉歡適百夫長圖喇曰旺扎勒適額森布哈曰巴延章適百夫長實喇男孫十曰鼐瑪台曰明安達曰托音曰都爾伯特曰衮諾爾曰旺扎勒圖曰博囉曰阿雅齊曰寳童曰碩通女孫十有一先是公請老子齊拉當繼與其弟宻桑讓其季華善華善卒子幼齊拉子鼐瑪台當襲又讓其弟明安達時公生存子孫交讓於當年鄉人義之銘曰元氣磅礴八荒同樞孰裂據之朔南一拘神人膺圖龍見漠北聖聖迭作何判不一當至元初有事南方衆智羣力雷砰電翔噓風噏雲霧廊煙闢運臂伸指無功不集相時行間繄武略公雖職禆校克壯其戎歸老於家誨子教孫以禮以讓雍雍其敦稽公之生自始奮跡既昌其家又永其福悠悠汝波紫雲東峩碑墓其阿百世不磨河南淮北䝉古軍都萬戸府増修公廨碑銘昔光祿大夫江西行省平章政事贈金紫光禄大夫大司徒上柱國鄭國忠宣公推忠開武協運佐治功臣鄂囉齊統䝉古軍四萬戸佐帝平宋開閫洛陽縣龍門山之南伊水之東以治軍政至其子嗣都萬戸托干布哈始搆治宇以肅官寮今其孫嗣都萬戸察罕特穆爾偕其副都萬戸實吉博吉謀曰舊治陿隘弊腐宜撤新之始其地廣袤十畞因増倍於先治事之㕔退息之室賔佐之幈幪傔使之庥庇簿書之庋閤財物之庫庾庖㕑門闥譙樓𨽻舍至四十楹壯麗崇深名其堂前曰仁武後曰忠益樓曰嚴更遣千户約爾珠暨呼圖克特穆爾馳狀徴記扎拉爾氏自行省特穆爾台摩哩忠宣公郭羅齊銀青榮禄大夫上柱國湖廣等處行中書省左丞相托干布哈贈守忠翊正濟美寅德功臣資德大夫河南江北等處行中書省右丞同知行樞宻院事布特勒濟贈保忠經武致德宣忠功臣上護軍夷山郡公五世六襲及今都萬户自懷逺大將軍加昭勇年三十有二珠申氏自博囉歡諾延行省兵馬都元帥塔齊爾䝉古軍四萬户布朗吉爾台横州屯田萬户府達魯花赤輕車都尉平陽郡侯穆爾齊都元帥兼江東西大都督遜都台鎮國上將軍江西道都元帥阿爾輝輔國上將軍江西道都元帥副都萬户平陽郡襄懋公伯勒格布哈六世八襲及今副都萬户自懷逺大將軍歴定逺加昭毅年三十有九昭勇昭毅皆䝉古貴族世胄其祖與宗自太祖聖武皇帝來繼忠勇靖朔漠開西域伐金伐宋一海㝢著勞績今兩都萬户協心力輯軍衆居則恪官守動則整戎行善於紀律斯可見矣乃序其事銘其堂所之碑曰皇元受命震起天北風雲龍虎感會奮激羽翼爪牙交濟其功分守方嶽帥總元戎河淮都侯峙閫嵩洛兩帥鉅宗光世其爵統四大府兵政霜嚴節制涖止宜竦其瞻斧斤山林梁棟柱礎以埏以植隆闢帥宇仁里斯美宅必處仁志在仁武熊羆化馴優游清暇退集燕室延訪賔友志廣忠益煌煌聖朝武緯文經崇堂邃奥式永攸寧翰林侍讀學士中奉大夫知制誥同修國史富珠哩翀撰普濟宫重建麻衣子神宇銘距穰西百里而逺有山曰靈堂古麻衣子棲真之跡在焉學道者狀其事云子出沒晉宋間今餘千年其間或有因其跡而繕宫室宏道法者皆軼不紀今太易道人毛守朴齦荆棘侈土木一新之慨然曰仙聖之跡失今不錄將遂顛絶千載之下不有能筆孰開厥靈奉狀摯翀委筆焉徵狀麻衣子姓李氏名和字順甫後際神人更志康字惠和自號麻衣子貞觀間封惠慈廣德普濟真人真人世居秦父思温西寧令㠯穆帝昇平元年春二月十有五日生真人而紺髮美姿膂力絶等然性明慧好經史契悟𤣥要而綽有才譽孝武太元九年時年二十有八喟然太息曰吾年如此猶湛穢腥腐愚亦至矣以學道之志告親請去西寧君責留之不爲止君曰吾爲汝築别室聽汝所欲爲何如不答陰入祈口坐一巖間彌月人不知君偕親黨求之遂罙入結廬居之西寧君迹見曰吾老矣職則汝襲無苦爾爲也不荅令親黨逼之不起嘗獨行終南逢一道者藜杖芒屩狀貎厖古倚阜危坐謂真人曰吾久汝候矣揖與語皆道祕也由是神悟劃然道者授以祕訣戒曰終南非汝宅也南陽之間湍水之陽直乾之方有山靈堂石峒其㫄神開汝鄉汝則往之當有異人率衆拜汝汝慎拊之可以翕神功於蒼茫問姓名道者曰吾左元太極也言訖不見真人神其言往求靈堂於湍陽者久之莫曉所在道遇樵者相與問答所自來及所欲往樵者欣然導至峒門問樵何居曰此山俄頃化去乃益喜自是坐峒十有九年時安帝義熙十年夏大旱居民張奭約衆計曰麻衣子有道者也盍往叩之衆諾相率詣峒焚香置水於前禱之真人初坐瞑目頃之顧曰何爲者衆以旱請讓却之衆日旦暮請不輟真人苦拒者亦累日將夕有少年十許輩前請曰人日紛紛何也真人語以其故少年請但許之真人託以昧妄不敢諸少年復堅請真人怪諾之翌日如諾雨果大至霽行山間見十有二人睡山陰熟睇之皆負龍狀心異之還峒而十二人至皆稽顙曰吾屬龍也所居之溪曰巫峽曰五雲曰岷山曰清逺曰桐柏曰嶓􅜗曰崑崙曰武陵曰苧羅曰滌溪曰浣沙曰澠池上帝以師道業有成敕令輔師行化耳真人稽首帝居而推峒居龍别占一穴龍自峒入雲霧晦㝠雷電交作抉裂山背各潰一穴而去真人後游鄖鄉歴宋孝武大明元年真人行年一百有一矣秋八月八日白鶴翔集祥飇霱雲蔚燁扶濩真人儼坐而逝鄖人即其地築觀名以白鶴仙墳存焉唐貞觀十三年天子制表山曰石門靈堂峰曰顯聖峒曰勝泉龍皆封公曰廣潤洪潤咸潤慈潤靈潤施潤崇潤豐潤應潤愍潤顯潤保潤封真人曰惠慈廣德普濟真人旌宫曰普濟果爾則太宗以邁往之君首剙大業賜神號於宇内而於麻衣子之所宫褒奉殊特則靈堂道區古勝地也自後泯不可稽豈山川之運自有盛衰道自有汙隆人之爲事者或成或否道學者或斷或續操著述之任者或工或拙或足以傳或不足傳而至然邪皆無由知之今守朴挺然自奮於千載湮圯之餘追麻衣子之道於蒼莾寥落之際而振襮之平居則有水泉之利亢極則有膏澤之請一方之民將神明其所爲十二溪之神物將集靈異於𤣥漠惟吾所令茍幽明順指人神効績則推而達之清朝貞觀之褒有不必取榮異代者翀嘗聞希夷子受道於麻衣道者豈度世不死百世以下遨遊人間邪不然將兩麻衣邪或度世不死滅沒六合徊翔故丘拊守朴之跡而歎其精心苦力能紹其業也如此則守朴之籍丹臺上玉室也將有日矣於是敘其事而銘之石銘曰謷虖真人挺跡有家咀道之腴土苴世華神人指迷大華培塿靈堂崔嵬上列牛斗惟龍騤騤滅没有無乃奉帝旨爲吾卒徒窟宅八荒呼吸自我滂澤四施孰往不可悠悠山雲鶴逝千載民之神之功猶不宰曰惟守朴跡逺心同華觀峰出轉替㠯隆泉流泓泓以溉以灌鬱亢㠯請曽不我捍有黔其首衆奔走之神眇莫覿守朴其師蒼琰穹窿而刻斯語山英桓桓斥護終古知許州劉侯民愛碑至大元年秋奉直大夫許守劉侯既終更矣郡縉紳先生田浦城劉興國偕舊家望族郡人之父兄長者謀劖侯字民之政於石屬筆小子翀懇讓不獲敢蹟侯行事譔次之大德龍集乙巳夏六月侯下車家政斬然閴無雜謁其在猷爲茍有利民無或不舉許北趾於汴南揖淮楚素號多事侯材識精敏百務叢劇聲容舒徐刃嬰而節解吏無稽牘獄無柅訟不尚苛猛而凜不可犯自公而優入則杜門端晏游泳典籍出則賓禮先覺隆奬學校三時既隙則帥郡屬叩校官請益經史親爲之倡繇是郡政翕然侯澤物仁而有方耕鑿樹畜求厎實效及終三年諸軍藪牧外丘陵原隰墾闢殆盡初郊農貿穀市儈連郡豪徼糴外闗擅輕重以售嬛弱胥困乃立斗斛市距州治重脅糴翔價之法趨者如歸糴雖升合以上無敢摧衂民農兩利之侯以事出法漸弛復襲舊至杖大駔數人法復立民頌歌之歳丙午河南諸郡飢流瘠日至春穀價勃湧首發私庾大縮價聽民糴募富民粟數萬鱗出糶市慮糶有不均也於諸社責其長日閱數賦與之夏雨戕麥得請出郡廪積年䑕耗鑿米薄價紓民春夏徂秋無凋瘵者明年薦饑羸殍狼戾請省出公緡賑之民爲蘇中統抵大德凡所立有司法程討閱簿書彚帙庋寘而據守不跲故勇於拯民而善禦其害省大核屯田臨穎鄧艾口民稻田三百頃人有說省曰此古屯也可復築之下侯按實之侯按至元中司農研水利拓民業隆平生息之道也業此率三四十年暴取之民措何地省不韙以兵民恫疾之狀迭陳不可卒止宣徽歳遣使征羊馬法三十取一至則肆虐取人莫誰何度其至令縣民大書其法於堊壁患遂止程約五縣繇賦齊均凡出錢於縣官市物民間曰和買民產所有猶未易供無之則估百倍賦官郡縣苦督責無敢拒貪肆者亦陰幸漁獵雖瘡痏其民不恤侯深患之土有則均賦之茍無之抗簡覆陳不允不止鄢陵扶溝產紅藍猝不時買萬鉅時其地年歉而藍霧民大驚蹙省以侯敏幹略趣買之相其故力請罷之是不獨仁於許又有以仁其鄰也省檄論囚荆南時荆楚大水民饑歸請撤禁山澤以活危墊省移中書如請民濟於阨是其澤不獨囿於近又有以及其逺也其聽訟明察而果哀矜惻怛未始不行其間襄城南距湛河與葉交壤葉民之鹽取解池齊鹽止襄舊樹石河之南堧鐫以畫鹽之法葉令妄徙而北侵襄民近百家嗾漕屬以其法酷穽之兩縣飛狀鬭辯葉引陜漕合攻襄中以危法時侯偕省使者會決之卒以理摧葉復石舊疆民厎寧河南先民疎土曠田價至弱雖有質鬻而契劵闊略鹵莾逮今民日生集叢蓁灌莽盡化膏沃價倍十百鬭䦧滋熾豢吏蠧法孔穴棼出至有緜曠歳時而莫之決者侯既清白復詳聽覽而洞情僞佑是懲非至未半歳決以百數訟爲衰民葛英女嫁而奔人英蹟之獲他婦憚嚴其舅姑而私竄外者寘家令妻教壻族事如其女返魂他屍者歸婿不納一男子果爭之訟不決侯行縣詰之情立出民有以計誣罣其同行者訟縣醉亡楮緡千獄逮人數十訊不白屢愬州至據地以慟覘色詐立屈之決囚南陽主婦告奴酖其夫三日死榜楚極􅉃毒獄久不立侯讞曰實有毒立死無少緩者簡孚獄供有寃立貰之其聽決多此類也舊水旱禱祠桑門羽流雜巫覡囂唄無益一不取齊祓精壹以走羣望靈貺昭荅嘗春旱禱八龍井明日雨大作民有擁香拜舞治所者人既德侯侯善使人而知所務長社尉廨僻逺爲創築近郡治使與庫傳狴犴相連峙徼循捍衞弭患無形三皇肇立民極今天下通祠而舊郡祠陋丕搆新之崇葺廟學植檜柏六十四本築室藏書購塑工體先賢貌影自濂溪及紫陽朱子像而祠於學故實凡相交承則帥寀屬厚贐禮去者於侯又最豐終讓郤之始終銖髪無取及是人益信在政曄曄嶽牧風紀屢倚用之軋强鋤暴在人所不敢爲侯不憚也將退政之日其下讋伏如甫至談者偉異之名聲籍籍上游諸公多譽籍之交剡騰薦不一二數士論稱奉法恤民有古良二千石之風知言者是之侯名天孚字裕民家大名以國書生從事中書出判東平移漕司擢知冠州遂遷許風岸嶄立器度凝逺春秋方強攄用未既加忠孝豈弟出天稟能以學濟之淵乎莫測也浦城名九疇興國名庭瑞皆仕焉而巳者聲實素著郡人望所推先郡既不忍弭忘侯德兩公倡帥之人彌咨歎其公云翀既敘其詳乃最而詩之庸翼郡人寥邈之思辭曰郡侯繩繩三歳逆旅孰莫我矜侯吾父母我饑我寒燠我餔我鳴柚於家田墾在野繄我窘躓均恫其身膏以雨澤煦我陽春惟古立學定民之命治有本末禮樂刑政誰蔑棄之謂能其官我侯至止德馨如蘭士䝉顒顒侯教載之縉紳煌煌侯勞來之孰匪人哉而玩侯法將薙芟之我用是恝善達而施天下之兼寧獨吾私一郡是淹車聲轔轔民莫侯攬有堅其珉鑴配琬琰鼎鼎其來疇允侯蹟跂予望之其永無極安氏尊經堂銘明明尊經安氏堂之用有儆惕予其銘之於在古昔挺起神聖越紹上帝昭我明命暨蒼姬氏四術廼崇詩書禮樂順古範鎔文武道衰四敎崩弛孰其救之天縱夫子龍馬獻圖用著蓍䇿吉凶悔吝開我人則二禪三繼曰帝曰王典謨訓誥明我天常志欲有言形於詠歌雅頌得所神人以和王綱失維列侯遞霸其敢僭踰筆討無赦是謂四府其用不窮大禮大樂升降汙隆宇宙有經終古莫忒民無能名功載人極鼎鼎儒者相與守之孰吾堯桀相與掊之曽子思孟荀董王韓周程張朱以達聖元不息不泯皇衷民彛其有能奮立百世師安氏東垣世以儒名味道之醇服義之精百氏謏聞寧不有當處宜下陳經無二上至小無内至大無外晦不加蹙顯不加泰風雨震凌帡幪是屋六籍鳳峙疇匪雌伏安父之嗣伯仲叔季穉子齠孫繩繩繼繼豈徒藏之斯務明之豈徒尊之斯務勤之其徒之賢蘇伯修甫將以所聞往相告語多岐亡羊克敬克念無或怠墮請以銘鑑鎮平縣尹劉侯遺愛之銘今至元三年歳次丁丑冬鎮平縣尹劉侯代去校官朱秉誠耆舊楊仲賢梁國英士李昌祖等來曰侯以元統二年冬涖縣審荒蕪課耕墾稅丁户均差徭察事情靖囂閧奬士類隆風化集流散遂生養嚴法令弭偷剽始至決訟百餘皆當愬日稀簿甲不紊里社耕學日修捕邏日謹穴剽日戢三皇宣聖廟廡敝圯俎豆諸生廢弛者日修舉遂暇無事他所赴愬憲部府廷者用侯推決剖析無滯農書刻布民社曉耕植繭穀果蓏歳日増常平義倉之儲歳日裕墾田歳日廣貫户歳日衆憲暨府皆剡薦廉約清畏自始及代無私謁衆日信將刻石永思以示不忘敢請予曰吾故人也知其才惠政如此其可辭侯名益謙字恭甫潁州太和人以蘄黄府史入憲自淮荆三道掌書除萬億寶源提控案牘擢河南行省理問所知事秩將仕郎選充本省掾史尹縣棗陽秩承事郎尹是縣剛毅明果奉公忘私其天性然也因摭所聞系以詩其辭曰綿亘宛境跨帶穰邑大山盤互源泉悍急鎮曰陽館民牧且耕金季置縣始號鎮平聖朝開濟分布諸侯之此遥署襄府樊州中統至元遷易守令稽考事宜始復縣政令長相因六七十年豈無惠愛畱此郊鄽誰如劉侯慎終如始清已仁民懷古君子今其去矣日月有恒既挽莫及而借莫能斯琢貞珉刻頌嘉績庶幾見聞追慕無極記序大元通制序至治二年冬十有一月皇帝以故丞相東平忠憲王之孫中書左丞相位右丞相總百官新庶務徵用老成開明治道皇元聖聖相繼百有餘年宸斷之所予奪廟謨之所可否禁頑戢暴仁恤黎元綽有成憲然簡書所載歳益月増散在有司既積既繁莫知所統挾情之吏用譎行私民恫政蠧臺憲屢言之鼎軸大臣恒患之仁廟皇帝御極之初中書奏允擇耆舊之賢明練之士時則若中書右丞巴罕平章政事商議中書劉正等由開創以來政制法程可著爲令者類集折𠂻以示所司其宏綱有三曰制詔曰條格曰斷例經緯乎格例之間非外逺職守所急亦彚輯之名曰别類延祐三年夏五月書成勅樞宻御史翰林國史集賢之臣相與正是凡經八年事未克果今年春正月辛酉上御椶殿丞相援據本末奏宜如仁廟制制可於是樞宻副使完顔納丹侍御史曹伯啓判宗正府布延集賢學士奇徹翰林直學士曹元用以二月朔奉㫖會集中書平章政事張珪暨議政元老率其屬衆共審定時上幸栁林之辛巳丞相以其事奏仍以延祐二年及今所未類者請如故事制若曰此善令也其行之繇是堂議題其書曰大元通制命翀序之翀惟聖人之治天下其爲道也動與天凖其爲法也粲如列星使民畏罪遷善而吏不敢舞智御人鞭笞斧鉞禮樂敎化相爲表裏及其至也民恊於中刑措不用二帝三王之盛盡於此矣雖刑罸世輕世重而士制百姓於刑之中以敎祗德古之制也聖朝因事制宜因時立制時有推遷事有變易謀國之臣斟酌損益以就中典生民之福也仁廟開本於先繼志於今萬世慮也雖然明罰敕法朝廷之道揆在焉惟良折獄哀敬折獄有司之法守親焉源則濬矣流斯承之可不慎歟張文忠公歸田類藳序聖朝牧菴姚文公以古文雄天下天下英才振奮而宗之卓然有成如雲莊張公其魁傑也公自弱齡以才行名縉紳間仕於朝盡讜言行直道自禮部尚書參議中書請謁親濟南俄以吏部尚書召親疾終喪省臺奏召至再至三至五六不起文皇即位闗陜以西兵侵旱厲民莩政荒拜行臺中丞廼起西馳及秦民四流亡耄穉孑遺若鼎魚筏蟻天毒方熾湯沸泉溢吏士猖蹶目瞠神駭莫克拯㧞公懇悃率倡務用仁術官帑不繼傾巳囊槖日不勝給每每大慟民僅蘇復公疾薨天子聞之惻然閔悼贈攄誠宣惠功臣陜西等處行中書省平章政事柱國追封濵國公諡文忠中外嗟惜無何翀使憲陜西士民談道琅琅耿耿未始不悽愴以聽之秦人悲思樹石刋頌不忘公質厚剛毅正大明白仁於家忠於上確信不渝已善不伐人之善推奬若不及其文淵奥昭朗豪宕妥帖其動盪也雲霧晦㝠霆砰電激其静止也風熙日舒川嶽融峙綽有姿容闢翕頓挫辭必已出讀之令人想像其平生千載而下凜有生氣不可磨滅斯足尚矣公素知翀其子引偕其婦翁呉肅彥清持公所輯歸田類藳三十八巻徵序因書其概如此公諱養浩字希孟雲莊其自號也行業履歴家乗國史有載兹不容贅元統三年龍集乙亥二月甲寅朔中奉大夫江淛等處行中書省參知政事富珠哩翀序詩頌范墳詩有序宋蜀郡開國公范鎮景仁諡忠文其一世盛德偉烈光著史籍人固知之其葬在襄城汝安鄉推賢里載東坡集中甚詳襄城故𨽻汝州翀來訪問故老其墳儼然故在己爲野夫豪農耕爲禾黍之區矣范氏當金季猶有居墳左者自經兵燼不知所存拊事歎閔故爲作詩以記其概幸在官君子知其爲先賢遺壠庶有以處之忠文峨嵋英始也跡甚微堂堂薛簡肅旟隼西南飛其人古廉守肯持蒟醬肥所得一偉人天下大布衣引以賔王家光映春宫闈昭陵宋仁主前星久無輝犯諱言所難雷電每霽威雄哉鍊石手妙補天巍巍丞相江南來雲掩扶桑暉舊德陳苦辭往往阨謗譏諸賢抗章疏弱卒攻堅圍公力幹禹鼎正氣砰黄扉荆舒憤至骨斥語筆自揮贈之以蕙蘭何往無芳菲時公與司馬聲偕玉琴徽解冠挂神武甘老西山薇九㝢日瞀瞀赤子將疇依兩公幸無恙起拯或庶幾嗣君元祐初痛洗前人非民望屬司馬欲遯天爲鞿帝命起公臥門久車停騑君實了吾事此外何所希清風溢寰海不啻嚴陵磯公既晚家許道德人所㫵襄城卜封竁汝潁皆京圻我來訪遺壠名姓存依稀來仍散兵燼雨雪無留霏公名在天下豈逐薤露晞誰能禁耕牧盛事乗新機吾力不足振感歎徒歔欷駐驆頌有序繼天體道敬文仁武大昭孝皇帝即位修明世祖皇帝隆平故事以故東平忠憲王之孫司徒忠簡王之子拜珠丞相中書至治元年詔若曰忠憲弼我世皇功在社禝德在生民其敕詞臣即王所有范陽采地朔南康莊碑之昭示悠久冬刻銘既完十有二月丞相承詔蕆事凡犒工勞衆郡邑無所擾饋賀無所受天子遣使牲牢之饗秬鬯之禋數異禮隆不一而止父老聚觀或至感泣明年春正月帝幸涿州至碑所重瞳凝竚顧瞻有懷秋九月幸易州還丙午帳殿碑垣之南駐輦御殿上顧丞相若曰汝祖考之績之盛世載帝室維朕不忘亦惟汝之賢有以相朕益懋世德故也丞相頓首謝翌日既旦太官饌已上步入帳殿御金椅座碑右丞相稱觴獻萬歳壽從臣以次進觴天顔和怡甚久廼去丞相諭翀曰皇上眷我祖考至此不刻以志則未有以稱汝其銘之翀祗栗奉命用敢敘曰太祖皇帝開創大闕王孔温闕哇太師魯國忠闕華闕定疆宇繼世國王皆著大功忠憲王闕有八嶷然以鉅德大人相世廟統闕度底雍熙仁覆天下以垂大猷以廸來哲皇上念垂統之艱難守成之不易懷往烈闕聖度闕非一介臣能窺萬一敢即所聞見而獻頌曰闕赫赫聖明嗣大寶仙闕紹我皇制慨想先正闕佐我家奄奠八紘帝闕我太祖疆理萬國忠宣忠武功高輔翼雲雨方闕掃華夏之民國王蔭葆巍巍世皇幅􅊷既同闕成治隆忠憲之功奕奕忠憲虎變莫測年未及冠闕著明烈端冕正笏不動聲色儶傑在職儒碩在廷何殊不昭何墜不舉何絶不紹何逺不緒三十年間再秉鈞軸天極地闕孰匪亭毒至元始終中外人心大耋齠童締慕至今天日清明終古莫晦柱石廟廊宗社永賴相國今誰忠憲𦙍嗣民之望之忠憲是繼克繼克庸滋益光大一以至公熙我天載帝謂侍臣丞相之賢家世所因其敕詞垣于忠憲勲大侈以文配永河山以竦見聞涿鹿范陽王有采食山川蒼蒼北拱帝極蛟螭盤拏大鼇負之德音不劘神訶䕶之六龍翺翔馭日霄漢再狩郊坰日此銘篆淵鑑昭囘駐驆永懷廊清煙霾以霽九垓從臣焜煌千乗萬騎能不激昻以勵忠義世世䕫契生此德門君臣道合豈徒示恩忠憲來雲源源裔裔臣頌兹刋丕告無既附録昌按元史文靖公爲學一本於性命道德而記問宏博文章簡奥典雅深合古法用是天下學者仰爲表儀居國學最久自許文正公後以師道自任惟耶律有尚及公而巳有文集六十巻今多不傳子逺死於忠逺婦死於節一門之美有足尚焉昌至鄧州閱士籍得其後之習業於官者猶自稱魯參政家云昌在菊潭識中州名賢文表巻三十
