body:
  text: 中州名賢文表卷十一明劉昌編姚文公神道碑湖廣行省左丞相神道碑初公以中書右丞下江陵驛聞大帝為大燕三日曉近臣曰巴延東兵阿爾哈雅孤軍戍鄂朕嘗深憂或荆蜀連兵順流而東人心未牢必翻城為應根本斯蹶孰謂小北庭人能覆全荆江浙聞是肝膽落矣而吾東兵可無後虞朕喜以此御筆為北庭書昔羅羅格西地所生阿爾哈雅為大將有功信實聰明而安詳其加卿為阿古爾阿古齊德濟伊勒噶齊迪津平章求今億萬維臣之中降是宸翰昭乎雲漢之章藹如天語之溫崇功襮德匪夸一時可華及子孫百世者才公一家視古丹書鐵劵出臣子手者何足道也即江陵民封之千家始公微時侍燕惟席地坐後特置榻班諸侯王愛實拉下賜之金罍曰俟至而省必合樂鼓某曲飲是他雜以青白縹色龍鳯御服御帽金玉珠帶白貂裘西錦珠衣海東白鶻凡所以侈服貴近用娛其心者靡不及公嗚呼盛哉公北庭人妣夫人都濟爾呼爾都華胞生剖而出公考額森呼爾察弗善也將棄之夫人未忍益謹鞠視幼聰頴而辨長躬農耕喟然曰大丈夫當樹勳國家何至與細民勤本畎畞釋耒求去讀北庭書一月而盡其師學甚為舅氏錫喇岱達爾罕所異歎曰而家門户其由子大及從事大將布拉吉達俾其子故中書右丞相和爾布哈從受北庭書又薦其忠謹得宿衛大帝潛藩己未從濟江帝射虎未殪公舍馬而徒挺矛舂殺之攻鄂先衆而登禽一人還流矢貫喉出項帝勇之賜銀為兩半百先是聞吐蕃有貯甘露寶函石室藏山穴者凡再使求之皆為大蛇竒獸所懼莫至最後遣至其所無所見竟與俱歸勸進之初諸侯王議未一惟一王塔齊爾嘗有書帝忘其誰在也顧左右問公曰臣所有之書出而决兩事皆甚合㫖中統三年制以為中書省郎中褒曰久侍禁庭已著勞蹟至元改元加朝請大夫參議中書省事發言惟以當可事宜為心不憚伯相而阿其所志人有小疵必白帝前衆畏其口明年進嘉議大夫僉南京河南大名順德洺磁彰德懷孟等路行中書省事始罷世侯而易置其地又明年轉亷訪使虎符領鷹坊凡鳥獸皮角筋羽悉征輸官尋領諸路鷹師獵户再兼中都路䦨遺又明年進中議大夫僉制國用使司使又明年故中書左丞劉武敏公拯為䇿襄陽吾故物由棄弗戍使宋得竊築為彊藩復此浮漢入江則宋可平帝大然之徵天下兵領以元帥府觀武襄陽城白河别開行中書省以我少師文獻公僉省公為同僉凡襄鄧唐申裕在太宗世所殘漢上諸州之民避荒汴洛間與下户賦寡者悉徙而南屯田給餉尋罷帥府又明年詔故平章合丹開府儀同三司平章軍國重事贈太尉史忠武公天澤來蒞師宋遣人餽鹽茗襄陽乃築長圍起萬山包百丈楚山盡鹿門以絶之又城峴首開省其上兵興事劇星火公專入奏能日馳八百里敗宋殿帥今平章范文虎於灌灘又明年分中書省為尚書拜中奉大夫參知河南等路行尚書省事又明年兼漢軍都元帥分將新軍四千六十及廢尚書復以為河南等路行中書省事宋遣都統張貴張順將舟師從上遊送袍甲犒師自萬山接戰二十里斬順殺溺過所當貴獨以餘衆入後水暴漲慮貴乘出下令軍中舟置燈篝岸積薪槱貴果結戰艦為陳宵遁盡然燈薪戰四十餘里斬之匱門關又明年遂請以西域炮攻樊城拔而屠之無噍類遺襄陽甚慘移攻具臨之且曉守臣吕文煥君以孤軍禦我數年今鳥飛路絶帝實嘉能忠而主信降必尊官重賜以勸方來終不仇汝置死所也文煥感而出降十年二月也詔公偕以入覲真拜參知政事明年授資德大夫中書右丞同忠武公行荆湖等路樞密院公䇿能籍民為兵十萬合舊軍或丞相安圖巴延一人將之南伐宋社必墟制皆從之故太傅巴延與忠武時皆以左丞相贈開府儀同三司太保并國武宣公阿珠以平章與公及故平章文煥以參政行省將大軍發襄陽將至郢忠武疾還敵宿兵數萬築新郢夾江為城橫鐵絙鎖戰艦江中巢炮彍弩遏我舟師郢北黃灣岸西去江三里所港通藤湖逹漢敵壁其上攻拔之拖舟入港丞相惟以公數十騎覘新郢趙范兩都統鼓伏兵發葭林諸將倉卒有未甲者人人奮先殄其一軍兩將之首皆致公割趙腦膚撓酒飲之行克沙洋新城以臨復守臣翟貴逆降大軍去而復叛及漢陽故平章夏貴以制置舟師陳漢口水軍千户馬成為導由己未濟江沙武口塗入江拔陽邏青山白湖諸壁走貴軍鄂守臣張晏然王該王勝以城下遂徇州民衣冠關㑹仍其服行鄉郭帖然無有奪菜秉者民爭德吾元仁政義聲恨服化晚檄下漢陽壽昌信陽德安大兵既東分四萬人戍鄂咨公留後尋進官榮祿大夫自陽邏置驛以便行商至蔡方請移師江陵而荆閫安撫髙世傑將艨艟千六百艘卒二萬規襲鄂公分兵禦之大敗之荆江口降諸洞庭桃花灘下嶽承制以守臣孟之紹為安撫使即西師至公安誓曰自今功者健兒升長百夫百夫長千夫千夫長萬夫萬夫取進止因南風大沙市戰城上又戰城中屠之江陵精鋭於是焉盡制置使朱䙫孫辭疾髙節度逹出降下令安集如鄂嶽傳檄歸峽澧常德辰沅靖荆門隨郢復皆下之官其守臣如嶽除宋苛法衣食􅑏嫠詔故平章亷希憲以右丞行省江陵以世傑窮而來歸棄江陵市䙫孫徴至京師死猶沒入其妻子還公於鄂移兵長沙行拔湘隂潭守臣植滉柱江中自喬口至城凡十五所皆斷之又拔城西柵射書招其守帥李芾速下以活州民不然拔城屠矣不答乃令諸將畫地分圍決隍水以樹梯衝炮鐵壩石心臺百日公中流矢創甚責戰益急申命諸將凡所由久頓兵者卒伍前驅諸將安行其後也自今萬夫千夫百夫之長皆居前列有退衄者定以軍興法從事三日而拔謀諸將曰國家為制城拔必屠是州生齒繁夥口數百萬悉魚肉之非大帝諭巴延以曹彬不殺旨也其屈法生之發倉以賑餓人傳檄郴全道桂陽永衡武岡寶慶江西袁連皆下之幼主面縛公入覲賀始庭拜平章政事還移兵靖江破嚴關敗馬都統臨川陳張兩總管小溶江諭經略馬暨不下凡攻三十餘日而拔公以靖江逺中土非長沙匹民性驁囂易叛難服不重典刑之廣西它州不可言以綏徠其坑之市斬暨傳檄下柳鬱林橫雍廉象潯藤梧貴昭融賔宜賀化髙容欽雷為州二十廣東肇慶德慶封為州三特磨農土貴南丹牧莫大秀皆請內屬乃閘全之湘水三十六所以通遞舟承制以萬户史格行宣慰司靖江還潭宋餘孽益衛兩王改元海中啖人以爵規復其舊全永諸州與潭屬縣之民文才喻周隆張虎羅飛之倫大或集衆數萬小亦千數在在為羣與江之北黃蘄相煽以動皆削平之僞將張世傑傳欲襲肇慶雷詔公討之且略地海外無為賊巢過栁州嶺時暑軍士病渴所乘馬蹄地出泉人資沃飲至今名馬蹄泉而僞安撫趙與珞己戌海南白沙港公航海五百里不崇朝而至擊與珞并獲僞使冉安國黃之紀皆磔之諭降瓊南寧萬安吉陽聞僞王陷南恩公還襲走之降方經略㑹衛王死崖山乃還復諭降八番以其酋龍文貌入覲置宣慰司從鎮南王伐交趾其君蹈海去得文毅昭國兩王以歸後二年入覲上都庭拜光祿大夫湖廣等處行中書省左丞相再月而疾敕尚醫四人診視求見登馬而劇歸即與夫人訣當草有三年丙戌五月草五日薨上都享年六十葬都城西髙梁河公元配特哩帝既才公敕陳亳潁元帥郝謙女為亞妃前卒敕復以其妹為繼自陳三召傳至京師順聖皇后為加幗服白金為兩二千五百男六人特里生故資善大夫湖廣行中書省左丞和碩哈雅長郝生正奉大夫湖廣行中書省參知政事虎符監兩淮軍貫哲格繼郝生輔國上將軍湖南道宣慰使虎符監潭州軍賜玉帶一品服華善如夫人者蕭生巴圖爾哈雅阿爾實斯哈雅媵生圖嚕默色哈雅女五人一適故嘉議大夫同知廣西道宣慰司事齊哩克薩巴一適承務郎大司農少卿僧嘉努一適中書省斷事官埓爾錦一適昭勇大將軍監平陽太原軍巴延一適傳詔必雅男孫三人碩裕實哈雅呼圖克哈雅和塔拉哈雅女孫六人一適郝某一適平章克埓濟蘇子博雅一適監平陽太原軍子德希餘幼後公薨十四年今正奉輔國以神道未碑出公凡受制書與御筆及公平生行實請燧曰徵是為銘嗚呼兄弟爭與昭揚先德於其子職責已塞矣嘗讀望諸君書善作者不必善成善始者不必善終未嘗不興慨歎於武敏開用兵視南國為竒貨思圖形丹青垂譽竹帛於今日後者如取諸懷及襄陽下方戍淮西功已不出乎已大師南伐復分兵淮東渡江捷聞一失聲而死豈先福始禍者誠如道家所忌邪而公鼓其孤軍留戍所餘不能倍萬名城通都身至力取利盡海表圖地籍民半宋疆理其時將相雖瞪後塵猶不可望公少見最所下州荆之南十四淮西四湖南九江之西二廣西二十有一廣東海南各四凡五十八自餘洞夷山獠荷氊被毳大主小酋棊錯輻裂連數千里受縻聽令者猶不與存其依日月之末光張雷霆之餘威以㑹其成功者亦一世之雄哉今列其由省幕戎麾與所受降登宰相者丞相二蒙古帶阿里罕平章十二鄂囉齊呼圖克特穆爾阿爾實克吕文煥特穆爾布哈李庭李順張𢎞範劉國傑程鵬飛史弼右丞四索多完顔諾海塔齊鈕嚕伊努左丞四塔齊哈唐古岱劉深趙修已參政十三賈文備鄭也可何瑋張鼎樊楫朱國寶張榮實囊嘉特烏瑪喇博囉喀達爾髙逹馬應龍雲從龍都元帥宣慰使總管萬夫千夫之長又什伯是觀出其門衆多又足徵公善推勞人也初北上田租畞取三升户調嵗惟四兩及定湖廣稅法畞取三升盡除宋他名徵後征海南度不足於用始權宜抽户調三之一佐軍時以為虐今較江浙諸省槩增倍蓰獨西南賴以輕平其境館傳修潔亦甲他省生祠所在嶽潭栁雷公安興安皆一而嚴關與全獨二銘曰疇曰江漢南北之限天裂幅􅊷可恃為捍天混皇輿其險則那古以求之同軌不多秦漢茲降吳平於晉陳兼於隋矧趙遺𦙍曜靈生東有炎朱光爝火之微宜爾滅藏於皇大帝神武不世行所睿思效若龜筮由夫潛藩自將六師鵃䑠浮江亦既越之歸正丹扆羣策明試加兵襄陽五稔克止公曰乘勝籍民授兵將以大臣南國用平帝曰俞哉惟爾協朕假爾以鉞誅彼干禁大師克鄂鼓行而東四萬其徒留後畀公公乃按圖吾與吾守待敵伺先孰與進取自鄂而嶽自嶽而荆長沙桂林皆劗以兵餘州數十雖定傳檄勢讋言綏心亦孔棘又鋤武庚於海之南左右皇子交州是戡疇知公勞大帝簡在衣裘禽隼靡有遺賚不事故常墮其奎章捷捷翩翩龍騰鳳翔又錫金罍合樂而飲臣鄰之家寵未有甚猶若未然丞相是崇與太傅公同元元功甲子二終𤣥閭是宅壽止名垂晰晰竹帛北方諸流所王維河九里漸濡尚其餘波宜公有子匪相伊使不專美虞賞克延世其北居庸盧溝在西有碑斯豐流峙與齊平章政事䝉古公神道碑燧持憲節使江之東三年當大德癸卯光祿大夫上柱國江浙行省平章政事公之三子山東宣慰使琨都與江東建康道肅政廉訪副使巴圗及行河南省參知政事額森特穆爾譜其系狀其事以請曰先公三宿墳莽矣其忠以事國孝以繩家光大而雄偉者不及今焉鑱之金石將日逺日忘奚以視遺胄於無窮敢屬筆子燧以與憲副聫事此道義不可辭乃序之曰公䝉古氏諱博爾歡威達爾公之曾孫特穆爾公之孫索隆噶圖公之子始輝和爾與兄威俱事太祖時達春盛彊威謀往歸之輝和爾苦止曰帝何負汝而為是竟去追之不復雪泣而歸請獨宣力帝二之曰汝兄與衆皆往獨留何為無以自明乃折矢誓曰所不終事帝者有如此矢帝感其誠易名希禪約為諳達蓋明炳幾先與友同死生之稱帝後與王罕陳於哈喇章彼衆我寡敕烏嚕一軍先發其將珠且岱玩鞭馬鬛不應希禪請曰戰猶鑿也匪斧不入我先為鑿諸軍斧繼顧帝訣曰臣萬一不還三黃頭兒將軫聖慮者辰入疾戰大敗其軍晡猶逐北敕使止之乃旋師免胄為殿腦中流矢帝傷之曰朕戒卿早休兵竟創而歸親為傅藥寢與同帳踰月而卒帝曰曩哲勒錦為敵將實禦希禪其以哲勒錦民百户屬希禪子世世歲賜勿絶其族散亡者收完之即封北方萬家太宗以其子䝉克為郡王又俾貴臣歡托和大料漢民分城邑以封功臣割泰安州民萬家封郡王歸奏帝問䝉古之民何如是少對曰臣今差次惟視太祖之舊舊多亦多舊少亦少帝曰不然舊民少而戰績則多其增為二萬户與十功臣同為諸侯者民異其編王罕爭之䝉古舊兵不及臣半今封顧多於臣帝曰汝忘而先玩鞭馬鬛事耶後諸侯王與十功臣既有土地人民凡事干其城者各遣斷事官自司聽直於朝公年十六為斷事官世祖正宸極以從攻叛王額哷布格功賜其軍騬馬四百匹金銀幣帛稱是尋詔入宿衛曉近臣曰是勳閥諸孫從其出入禁闥無輒誰何李璮反詔將䝉古一軍圍濟南鈔益都萊州賊平决獄燕南人稱明允賜衣一襲雲南王虎哥赤為其省臣寶合丁輩毒殺事聞敕中書擇可治其獄者凡四奏人皆不當㫖丞相先真舉公且言敗事臣請從坐帝曰之人則可公辭臣不愛死第年少目不知書帝曰朕方恃卿求皇子尚書拜特穆爾知書誰可使之簿責其事是否一委自卿明日愼無歸咎輔行也且聞卿不善飲彼地多瘴宜少飲敵之未至四五驛所布呼丹遣人負金六籝來迓公曰雲南去朝廷遼邈省臣握兵不安其心將懼而變乃好為語遣之既至盡以金歸省而竟其獄得置毒情殺之而還奏可顧色珍曰卿舉得人賜兼金為兩五十武備寺奏令入筋角惟䝉古以時夥於常歲帝曰其報賜之自今凡䝉古事無大細如扎拉喇事統安圖者悉統於博爾歡八年授昭勇大將軍右衛親軍都指揮使虎符大都則專右衛上都則三衛兼總十一年授金吾衛上將軍中書右丞大師南伐分軍為兩制曰其右受巴延阿珠節度左悉委卿指一犯法臣曰如伯竒楞默色朕不責也俄受兼淮東都元帥軍於下邳公䇿諸將曰清河居宋北鄙城小而固與泗州昭信淮安實相掎角當水陸衝未易卒拔可頓大兵為疑海州東海石秋違此數百里其守必懈吾將輕兵倍程而東其守臣可襲虜也師至海州丁安撫果下石秋東海隨下清河史安撫聞之亦下不一月而下四城宋主既降而淮東諸州猶城守故太傅巴延入覲還密詔公進兵拔淮安南堡戰白馬湖又戰寶應棄髙郵不攻由西小河逹漕河據灣頭堡斷通泰援竟拔揚州斬其制帥李庭芝淮東諸州悉下賜西域藥及蒲萄酒介胄弓矢鞍勒㑹分江南之州隸諸侯王及十功臣又益封公桂陽州十四年遣平叛王珠爾噶岱於應昌賜玉鞶帶幣帛與博羅斯同署樞密院事未久授北京右丞既至召還㑹南土多反者詔募民能從大軍進討者俾自為軍其百夫千夫惟聽其萬夫長節度不役他軍制命符節一與正同已行矣公疾不能自陳令董司徒文忠入言今者日所出入勝兵何啻百萬何假此曹無賴僥幸之徒以壯軍威臣恐一踐南土肆為貪虐斬伐平民妾其婦女橐其貨財民畏且仇反將滋衆非便召輿疾入帝視其色瘁然賜坐與語重陳董奏可之適常德入訴唐古岱一軍殘暴其境如公所策敕斬以徇諸是軍皆罷之十六年哈喇斯博囉斯鄂囉罕錫哷根皆彊宗也勢不相一求遣大臣來蒞詔令公往凡居是二年十八年以右丞行省甘肅時大軍駐西北仰哺省者十數萬人自陜西隴右河湟皆不可舟惟車輦而畜負之塗費之餘十石不能致一米石至百緡公經畫得方供億不乏賊不敢窺邊者二年二十有一年授龍虎衛上將軍御史大夫江南諸道行御史臺事黃華反徴內地戍兵進討未能平賊多奴良民以歸公令監察御史提刑按察司隨在糾核皆止還之以疾歸㑹諸侯王巴延反帝欲自將征之公曰始太祖分封東諸侯王及侯其地與户臣始知之以二十率之彼得其九䝉古烏嚕扎拉爾鴻吉哩伊齊嚕斯五諸侯得其十一彼力滋多吾亦滋多吾有衰耗彼亦衰耗然要其歸五侯之力終多彼二惟責徴兵五侯自足當之何煩乘輿臣昔疾今愈請事東征制可賜介胄弓矢鞍勒命公董是五諸侯兵以行與巴延接戰屢摧其鋒再與其黨一王塔布岱戰淫雨不止軍以乏食求却公曰兩陳之間勿作事先已而彼軍先動公悉衆乘之逐北二日身中三矢禽塔布岱斬和掄輩後與伊囉勒太師合力始誅之賜銀為兩四百五十幣帛九不再月其黨一王哈丹復叛公再請往詔與諸侯王鼐瑪岱討之公狃於屢勝一日不虞賊游兵卒至止從三騎返走有壑絶前廣二丈深加廣半追兵且及獨公䇿馬能越三人後者皆見殺人以為天相忠義後逐北極於東海之壖哈丹自引去獲其二妃斬其子魯德於陳凡戰四年所俘金銀悉散將士以故人致死力賊平敕一妃賜鼐瑪岱一妃賜公陳金銀器延春閣召東征諸侯王及公至將分賜之問公汝家是器幾何鞶帶有無公曰以陛下威德奉身之物亦畢備矣帝曰朕出此物本酬卿曹之勞在人則伐其能以幸多取朕問猶曰既有可謂謙挹不眩於貨者豈令其徒手歸姑賜是器五百兩草八年改河南宣慰司為行中書省求可首是省平章者凡三奏皆不允末乃及公制可授榮祿大夫平章政事淮鹽為引歲六十五萬前政多逋至公如額而集賜異幣一開封監縣特穆爾告廉訪使胡某不戢其民昏集曙散縣簿陳績置巡屋器械於村又周劉光店為墻四其門扄鐍司夜出入詔公按之皆誣杖而徙戍南邊後詔天下括馬不當及公等之家公曰吾家有馬羣連郊坰不思佐國無以為方三千里官民之倡其入騬馬十有八匹河水遷流無常民訟退灘連歲不絶或以其地投獻諸侯王求為佃民自蔽公奏正之仍著為令河後泛濫堤掃橫潰歸德睢州汴梁水及城下漭為巨浸公親行視督有司捍完之皇上元貞二年遷公平章陜西未行而改復為河南入覲奏䝉古一軍戍北歲久衣率故弊請以臣泰安州五户歲入絲一斤積四千斤盡輸內帑易為匹帛分賚諸軍上以為益敕遞車送逹軍中賜銀為兩百五十幣帛三陛辭之日上諭之曰卿今白鬚世祖德言實足聽聞事更加愼中書平章琳沁宣政院使達實密合奏始者伐宋世祖分軍為兩右則屬之巴延阿珠左屬之博爾歡今巴延阿珠皆有田民而博爾歡獨無可後上曰何久不言豈彼恥自白耶其於淮東所嘗戰地髙郵已籍之民賜五百户以上中下率之上一而中下各二及圈背銀倚比再至汴踰年凡流外官久滯不銓旅食道宫者旬月皆出之大德之元叛臣約木呼爾鄂拉巴哈來歸公遣使驛聞始是諸王叛由其父是輩小弱若無與知今焉來歸宜棄前惡以勸未至上曰是奏深契朕衷改平章湖廣賜金鞍勒至汝寧合福建省於江浙授公光祿大夫上柱國江浙等處行中書省平章政事賜白玉腰帶夏旱隨禱而雨杭之豪民十家入賂於官大為釀務髙其估而專其利酒日醨惡公變其法張省四憑其富蓄凌轢府縣肆為姦利自刻木牌與交鈔雜行民間實侵貨幣與國爭利又盜隄海之石墻其私居公欲斬之而中書刑曹當以杖然亦由是大姓始重足立矣以大德庚子五月二十有二日薨於臨安寓舍年六十有闕以其年七月八日葬於檀州西北太行山不封最其平生典兵則右衛都指揮使都元帥樞密院風紀則御史大夫宰相則三為右丞四為平章與夫四十七年馬足所及西南雲南西北金山東北海隅東髙句驪東南吳閩再討叛臣四征叛王其間事平而疾聞變請行惟以有國艱虞為憂視轉鬬乎萬里之逺厯歲之久若堂奧之朝夕焉雖風雪皸瘃其膚鋒矢交集其躬飲食飢渴不時其口體皆不避恤必致寇首戲下歸報終事而止真凛凛有曽考風上尤眷重之若世祖身御櫜鞬弓矢皆百世傳寶不以賜臣下者惟以賜公海東青雜鶻先朝多或十賜惟至白鶻觜爪玉如聖語曉曰是禽惟朕及鷹師所鞲以卿世臣諸孫宣力之力日桑榆矣無以娛心河南治地平衍而逺且多陂澤鵝鸛所集時出縱之使民得見昭代春秋搜田之盛不敢萌啓邪心皆殊錫也夫人某氏男四人宣慰憲副參政季博囉公於庭臣居家最名有法夜分不寐諸子列侍其前聽談祖宗故實母敢或歸私室宴奉樽爼迭歌舞以娛賓亦無有酒失者女六人長適國戚本布次適蘇察罕平章子僉書樞密院事旺扎勒次適國王弟布哷齊次適伊徹察喇太師弟克哷楚次適山東宣慰使璸咱雅幼在室銘曰皇矣太祖肇造方夏右之左之惟十闕者公之曾考展一其中折矢瀝告帝視友同敵陳來加挺戈而出大奔其軍免胄而入五兵之長無矢不仁由賊叩輪懋功是創帝惻其心百俘償死顧成嘉止既王其子逮分茅土帝自等差國以泰安二萬其家公祖王季勤績克類再傳而公世祖之事勳閥遺苗帝植以培而獨於公嘗譽其材聽於禦闈無止入出翼翼其心彌謹自律隨遇而安利患靡干承命即往奚逺奚難東北海隅西南六詔甌閩炎陬金山遐徼聞有艱虞必請赴趨大獄叛藩無一漏誅人臣憲憲曰省臺院平章大夫宥密鈞踐先聖今聖賚豫優優良駟天間豪隼御鞲櫜鞬介胄鞍帶衣裘黃白之金委家如丘皇矣太祖于疆于理惟公曽考實成其始遺厥大艱畀之神孫神孫世祖闢乾翕坤考其皇輿南北猶判孰是浙右嬴鬼歆祼大興師征嶻嶪百城罔不簞壺竭蹶義聲傳其國都孱王銜璧蕞爾淮東諸州猶壁詔公進攻蕩殱渠凶九域攸同公焉成終將天之意悠悠或在成始之孫宜際斯㑹益封桂陽江嶺外內於乃先烈克光以大嘗聞古先誓侯功臣泰山如礪國以永存嗟公王孫國泰山下權輿礪如其自今也平章政事徐國公神道碑公揚珠濟達氏諱徹爾曾祖塔爾楚初將突騎百夫宿衛從太宗戡定中夏又劗平宋彭義斌淑擾山東太宗分土功臣由徐邳再刳於兵户不足萬故國以兩州祖納呼憲宗伐宋師由蜀入從攻合之釣魚山戰疾力考掬旅局監其國以世祖建極中統之年庚申夏五月十有二日生公六歲而孤母夫人冨察君介介自持動以禮節親戚不敢干以非義教子讀書天質粹美不勤外傅六經二氏悉涉源委以故聰明開益日多才略兼人恆以匡君經國自期至元十有八年軀幹異常襲其祖衣長不能勝則知其先益魁傑也其年入見帝賜之問而竒其對進侍帷幄湛露龍光汪濊涵濡絶其等夷時詢民情細微敷告無隱一諸侯王稱兵東北帝自將征入其地矣軍中夜驚公出撫遏人識言音喧咈一寂跳梁既平為奏兵餘之民艱窶剝膚不賑恤之將不生活賴賜穀帛牛馬脫寒飢者亡慮數十萬人歸擢利用監古武庫也匪簡在帝心人者不以付之二十有三年詔求逸遺於江之南且省其俗時相方急治賦鬻民學田官有其直令既行矣公則止還諸學用為完廟養賢之須歸以事聞制甚嘉可明年僧格分中書庶務立尚書省初為平章後為丞相凡昔盜殺臣為領部為制國用使為尚書省所逋錢粟併歸中書舉誣為中書失徴殺其二相大為計局鉤考毫釐諸省承風鄂省已劇浙省尤酷延蔓以求失其主者逮及其親又失代輸其鄰追繫收坐岸獄充牣㮄掠百至或關夫三木責妻市酒以償民不堪命自經裁與瘐死者已數百人虐熖熏天諸王貴戚亦莫誰何無不下之獨公奮然數其奸贓帝初未然益犯威顔言色俱厲帝以為醜詆大臣失幾諫禮怒遣左右批其頰辨不為止曰臣非有仇於彼而然直不忍其罔上自私敢因雷霆一擊遂爾結舌使明帝有不受言之名臣實憤恥帝意始解命將衛士百人控鶴倍之入籍其家得金寶衍溢棟宇他物可資計者將半內帑罪既彰白始鈐其人諸繫計局者皆出之又命籍黨惡浙省諸臣平章左右丞參政烏瑪喇默哷實都王濟等家併僧格之姻鄂省要束木皆醢以謝天下以成其獄凡四過徐不入其家為帝所忠怒御史臺臣不善疸惡坐觀致此其自當汝罪皆曰奪職追祿杖三者惟命江浙平章夙有怨於臺乘其憑怒自傍激之謂湖北廉使功臣諸孫盜燒鈔八百定堂帖二十下容姦數年贓終未入抱案帝前示曰稽是可見誤裂卷為兩縫留半印公曰縫用印者以杜罔欺汝為宰相持半印案以訟人餘半烏在其人言塞帝顧罵而起臺辨始釋明日拜御史中丞無幾時拜榮祿大夫平章政事行省福建賜為兩金五十銀五千令行禁止民便安之惟汀漳劇盜積歲未平公身將諸戍之兵申明約束不貪勝不蹂禾稼不入民舍惟張皇武威過栅不攻示以整暇晝則合圍山中夜則稅野偃旗仆鼓賊或僞降覘其何為乃豐酒肉飲食曉曰汝昔由不堪汙吏侵暴潛逃居此能棄險而還耕桑則平民矣吾安忍被汝反名而加誅夷寡人之妻孤人之子獨人父母而利其財悉縱歸之他栅聞者相率以出其渠歐狗日浸南奔大兵隨之偷生塢中其黨縛致於軍血鋒刃者才是一馘自是方三千里枹鼓不鳴正席其堂畫諾而已聞帝不豫馳歸京師嘗藥晨夕俄然賓天與諸侯王大臣定䇿禁中遣使逆成宗龍庭入踐天位大德之元拜江南諸道行御史大夫一日召其都事賈鈞今參議中書者謂曰明詔責使肅清宣明風俗教化而刀筆流為御史者肆為苛虐惟急徴贓以多為功至迫子證父妻證夫弟證其兄奴告其主敗風教者我實行之汝宜以是出訓其屬帝聞之以為得職風紀大體微意柏臺七年改浙省平章政事其治如臺門無私謁以轉粟京師多資東南居天下什六七而松江填淤歲久富民利之當水出塗築為圍田以故瀰漫浸灌沮洳廣逺民不可稻公發卒數萬浚決揵石堤之導水入海使復其故凡身董役經時而成民得良田若千萬頃至今賴之九年召入平章中書闕中州名賢文表卷十一
