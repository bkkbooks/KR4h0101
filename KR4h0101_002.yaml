body:
  text: 中州名賢文表卷二明劉昌編許文正公雜著讀易私言初初位之下事之始也以陽居之才可以有為矣或恐其不安於分也以隂居之不患其過越矣或恐其愞弱昏滯未足以趨時也四之應否亦類此義無應則或困於弱有應則或傷於躁坎無應而凶頤有應而凶之類是也大抵柔弱則難濟剛健則易行故諸卦柔弱而致凶者其數居多豫剝坎恆困井旅小過未濟剛健而致凶者惟頤大壯夬而巳若總言之居初者易貞居上者難貞易貞者由其所適之道多難貞者以其所處之位極故六十四卦初爻多得免咎而上每有不可救者始終之際其難易之不同蓋如此一本作其難易之勢固如此艮六居初者凡八隂柔處下而其性好止故在謙則合時義而得吉在咸則感未深而不足進也以是才居遁則後於人而有厲然位卑力弱反不若不往之為愈也蹇之時險在前也止而不往自有知幾之譽勉於進則陷乎險也艮以止於初為義故但戒以利永貞漸之才宜若此也雖小子有言於義何咎旅雖有應而不足援也斯其所以瑣瑣乎小過宜下而反應於上斯其有飛鳥之凶乎柔止之才大率不宜動而有應動而有應則應反為之纍矣謙最吉小過最凶坤六居初者凡八坤柔順處下其初甚微而其積甚著故其處比與否之初也皆能獲吉豫有應在上是動於欲而不安於分也凶亦宜乎一本無上二段二二與四皆隂位也四雖得正而猶有不中之纍况不得其正乎一本乎上有者字二雖不正而猶有得中之美况正而得中者乎四近君之臣也二逺君之臣也其勢有不同此二之所以多譽四之所以多懼也二中位隂陽處之皆為得中中者不偏不倚無過不及之謂其才若此故於時義為易合時義既合則吉可斷矣究而言之凡為陽者本吉也陽雖本吉不得其正則有害乎其吉矣雖得正矣不及其中亦未可保其吉也必也當位居中能趨時義然後其吉乃定凡為隂者本凶也隂雖本凶不失其正則有緩乎其凶矣雖失正矣茍或居中猶可以免其凶也必也不正不中悖於時義然後其凶乃定故陽得位得中者其吉多焉隂失位失中者其凶多焉要其終也合於時義則無不吉悖於時義則無不凶也大矣哉時之義乎一本自究而言之以下文少不同今重録如左凡陽本吉凡隂本凶陽雖本吉不得其正則害乎吉矣得正矣不及其中亦未保其吉也必也當位居中能趨時義然後其吉乃定隂雖本凶不失其正則緩其凶矣失正矣或能居中猶可免其凶也必也不正不中悖於時義然後其凶乃定故陽得位得中其吉多焉隂失位失中其凶多焉要其終也合於時義則無不吉悖於時義則無不凶也大矣哉時之義乎乾九二九剛健之才也而承乘又剛健之至也處隂得中有溥博淵泉時出之義臣才若此其於職位蓋綽綽然有餘裕矣夫剛健則有可久之義得中則有適時之義兼二者而得雖無應可也况六五虛中以待已者乎此八卦所以無悔吝而有應者尤為美也兌九二兌之九二剛而得中也雖上承於柔邪不足為纍此以得中之義為勝也獨節之為卦自有中義所不足者正而已今既不正矣其何以免於凶乎巽九二兌之中以剛為說巽之中以剛為入皆有才適用之臣也然兌務於上上一隂為主巽務於下下一隂為主其勢有所不同如井之義貴於上行也而九二無應徇巳才而下之違時拂義人莫肯與以谷射甕敝取象其亦宜乎坎九二下隂柔之始也上隂柔之極也而巳以陽剛之才獨居中焉是已無賴於彼而彼有待於巳也加以至尊一作君主應之則險道大行不爾一作然則幾於困矣大率有應而道行則以貞幹之義為重無應而處中則以須守之義為重錯舉而言一本作錯舉而吉則卦之才皆備焉坤六二否之時不為窮厄所動豫之時不為逸欲所牽非安於義分者莫能也坤六二居中履正且又靜而順焉宜其處此而無敗也雖然創物兼人陽之為也柔順貞靜隂之德也以隂之德而遇剝觀則剝傷於柔而觀失於固矣夫何故時既不同義亦隨異此六爻所以貴中正而中正之中又有隨時之義也震六二六二隂柔而在動體雖居中履正然下乘陽剛成卦之主其勢不得安而處也非惟其勢不得安而處揆其資性一本作才質亦不肯安其處也或上應或下依有失得之辨焉復無應而下仁吉之道也過此則違道而非正矣頤隨益之方受彼也上下之來又何患焉無妄之世方存誠也或應或依秪足為纍他卦皆以乘剛之義為重也屯震噬嗑大率處則乘剛動有得失非坤二柔中之比也一本震六二在艮六二後艮六二以剛處上以柔處下尊卑之勢順也艮之大體既備此象矣而六二又承剛履柔居中得正宜其處諸卦而無過也雖然柔止之才動拘禮制若當大有為之時則有不可必者故在蹇未能濟處艮莫能止究其用心忠義正直終不以事之成否為纍也一本不可必作不可卑究其用心作究論其心為纍也作為疵也離六二初與三剛而得正皆有為之才也然其明照各滯一偏惟六二中正見義理之當然而其才幹有不逮其明者甚矣才智之難齊也得有應於上則明有所附矣然非剛之善用明實明之能自用也大抵以剛用明不若以明用剛之為順故八卦應五附三其勢略等而離之六五有應於下者為最美也三卦爻六位惟三為難處蓋上下之交內外之際非平易安和之所也故在乾則失於剛暴在坤則傷於柔邪震動而無恆巽躁而或屈離與艮明止係於一偏坎與兌險說至於過極皆凶之道也然乾之健雖不中也猶可勝任坤之順雖不正也猶能下人二者之凶比他爻為少緩若夫坎之與兌以隂處陽以柔乘剛不中不正悖於時義其為凶也切矣是知乾坤為輕坎兌為重總而論之亦曰多凶而已矣乾九三過剛而不中難與義適然以其有才也故諄諄焉戒命之曰夕惕曰敬慎曰艱貞庶或有可免者不然則用所偏而違乎義矣凶其可逃乎四四之位近君多懼之地也一本作近君之位先生親改如此以柔居之則有順從之美以剛居之則有僭逼之嫌然又須問居五者隂邪陽邪以隂承陽則得於君而勢順以陽承隂則得於君一本作隂而勢逆勢順則無不可也勢逆則尤忌上行上行則凶咎必至離之諸四皆是也震則四為成卦之主才幹之臣也是動而知戒是以有補過之道以陽承陽以隂承隂皆不得於君也然陽以不正而有才隂以得正而無才故其勢不同有才而不正則貴於寡欲故乾之諸四例得免咎而隨之四夬之四有凶悔之辭焉無才而得正則貴乎有應故艮之諸四皆以有應為優無應為劣獨坤之諸四能以柔順處之雖無應援亦皆免於咎此又隨時之義也乾九四九而居四勢本不順然以其健而有才焉故不難於趨義又上卦之初未至過極故多為以剛用柔之義以剛而用柔是有才而能戒懼也有才而能戒懼雖不正猶吉也兌九四處下而說則有樂天之美處上而說則有慕爵之嫌初九雖無應猶可也一本作故初九無應猶可得吉九四雖有應尚多戒辭也然以剛說之才易得勝任故有應者無不吉而無應者亦有免之之道云一本勝任下作故有應無應有得吉之道云離九四陽處近君而能保其吉者以其有才而敬慎故也火性上炎動成躁急非惟不順君之所用且反為君之所忌也恣橫専愎鮮有不及禍惟噬嗑之去睽離之相保與羇旅而親寡之時取君義為甚輕故其所失亦比他爻為甚緩究而言之固非本善之才也震九四離之成卦在乎中故以中為美震之成卦在乎下故以下為貴若是則震之九四乃才幹之臣也君之動由之師之動亦由之其功且大矣其位已逼矣然而卒保其無禍者何哉蓋震而近君有戒慎恐懼之義以陽處隂有體剛用柔之義持其術以往其多功而寡過也宜乎雖然功大位逼而不正不可以久居其所也久居其所則勳德反下此恆之所以戒於田無禽歟一本作然而卒保無禍者以有戒慎恐懼之義也陽處隂位為體剛用柔持是以往其多功而寡過宜哉雖然功大位逼而不正不可久居其所也久則勳德反下此恆之象有田無禽歟巽六四隂柔之質自多懼也順入之才能承君也以是而處每堪其任故八卦皆無凶悔之辭一本作陽上隂下與坎不殊順而入之相得尢固此所以亦無凶悔之辭坎六四其以隂柔得位而上承乎中正之君略與巽同然又有以險之性焉以此處多懼之地則宜矣故八卦亦無凶悔吝之辭一本作以隂承陽其勢已順而其才質且能周旋曲折不違於正道是宜處多懼而無咎也艮六四以柔止之才承柔止之君雖已身得正一本已身得作曰居而於君事則有不能自濟者必藉陽剛之才一作應而後可以成功故離九應之則終得婚媾震九應之則顛頤獲吉至於止乾之健納兌之說皆可成功而有喜不爾處剝見凶處蒙蠱見吝矣艮以能止為義能止其身則無咎可也一本凶咎不作蓋臣之道子之道妻之道主於貞順貞順則無過矣坤六四坤之六四不問有應與否皆無凶咎蓋為臣之道大體主順不順則無以事君也五五上卦之中乃人君之位也一本作人君位也諸爻之德莫精於此一本作莫有粹於此者故在乾則剛健而斷在坤則重厚而順未或有先之者至於坎險之孚誠離麗之文明一本無二之字巽順於理艮篤於實皆能首出乎庶物不問何時克濟大事傳謂五多功者此也一本此也作以此獨震忌强輔兊比小人於君道為未善觀其戒之之辭則可知一本作觀其辭則戒之之意可見矣乾九五剛健中正得處君位不問何時皆無悔咎惟履之剛决同人之私昵不合君道故有厲有號咷也一本乾九五是以剛健中正之才而處人君之位也不問何時皆無悔咎惟履之剛决同人之私昵不合君道故有厲與號咷也兌九五下履不正之强輔上比柔邪之小人非君之善道也然以其中正也一本作勢非善也以其中正故下有忌而可勝上有說而可决大哉中正之為德乎一本無德字離六五强輔强師而六以一本無六字文明柔中之才而麗之一本無之才而字悔可忘也事可濟也然更得九二應之為貴濟也下一本作更得剛陽下應則尤善故大有睽鼎未濟皆吉而他卦止以得位得中而免也一本無得位二字有有應於下者五字震六五九四陽剛不正之臣一本無九之臣三字為動之主而六五以柔中乘之一本無六字其勢可嫌也一本無也字得九二剛中應之一本之臣其勢頗振動故恆大壯解歸妹比他卦為優而豐之二五以明動相資故其辭亦異焉一本作故亦勝於豫震小過之無應也巽九五以巽順處中正又君臣相得而剛柔相濟相得則無內難相濟則有成功不待於應自可無咎應則尤為美也一作以巽順之道處中正之位君與臣相得也剛與柔相濟也相得則無內起之難相濟則有成功之理不待於應而自能無咎也坎九五以剛陽之才處極尊之位中而且正一本無之位之才四字可以有為也然適在險中未能遽出能一作得故諸卦皆有須待之義夫能為者才也得為者位也可為者時也有才位而無其時一無其字不緩待之則有咎矣一本作惟待為可待而至於可則無咎矣艮六五君輔皆柔且無相得之義本不可有為也一無且也二字以六有靜止得中之才上依而下任也一作時以靜止柔中止依下籍故僅能成功一無故字能作及然非可大有為也一無然字可作能更或無應一本更作二則獨依剛傅於君道為愈下矣一作是不得於臣又不得於君於君道何取焉坤六五坤六居五雖不當位然柔順重厚合於時中有君人之度焉得九二剛中應之則事乃有濟故師泰臨升或吉或無咎而他卦則戒之之辭為尤重蓋隂柔之才不克大事且鮮能永貞故也一作以六居五中而不正得九二剛中濟之事乃可立故師泰升臨或無咎而他爻率皆戒辭蓋隂柔之才不克自立又鮮能永貞故也上上事之終時之極也其才之剛柔內之應否雖或取義然終莫及上與終之重也是故難之將出者則指其可由之方否解困渙未濟事之既成者則示以可保之道蠱無妄頤家人革漸才適時甚足貴也隨離臨艮時過適則難與行也乾坤小畜泰節中孚大過恆益巽兌小過既濟義之善或不必勸則直云其吉也大有剝大畜遁睽鼎勢之惡或不可解則但言其凶也屯訟比噬嗑復坎眀夷夬歸妹豐旅巽小過既濟有始不得志而終無悔吝者同人姤有始饜其欲而終有禍敗者萃旅因其偏而用者才尚可也蒙晉升反其常而動者事已窮也師謙賁損質雖不美而冀其或改焉則猶告之豫大壯益震節位雖處極而見其可行焉則亦論之需蹇艮有成終之義故八卦皆善䝉蠱賁剝大畜頤損艮履係於所履觀係於所生吉凶不敢主言也大抵積微而盛過盛而衰有不可變者有不能不變者六爻教戒之辭惟此為最少大傳謂其上易知豈非事之已成乎一作蓋其事勢已成也讀文獻公揲蓍說盧君校正揲蓍之說一本作校定耶律公蓍說曲折艱深辭意隱晦及探其所以去取之由則有甚可疑者如舊說一爻變究以四齊之而不合乾坤六子之率及自為說乃以八齊之一法而兩其數其為不同也甚可怪况四齊八齊之後尤不能一無能字見靜變往來之實雖能茍合其率而不知實不相似也且初揲必令多少之數均是分二之後不掛一而掛二也既違大傳又悖先儒其不敢以為然也審矣因演八卦靜變往來之數云為乾而靜者八千一本自注云諸卦大抵靜者最多而一爻變者次之二爻變者又次之三爻變者為最少一爻變而之巽之離之兊者皆四千八百二爻變而之艮之震之坎者二千八百八十三爻皆變而之坤者一千七百二十有八一無有字計三萬二千七百六十有八正合十五畫卦之數立方除之得三十二并坤卦則六十四矣六子皆倣此本無正合至倣此止下云坤與六子同為坤而靜者二萬一千九百五十二一爻變而之震之坎之艮者三千一百三十六二爻變而之兊之巽之離者四百四十八三爻俱變而之乾者六十四爻以老動而隂性本靜故在坤而變者為極少計三萬二千七百六十八一本無此為震為坎為艮而靜者皆一萬五千六百八十一爻變而之坤者皆七千四百有八而震之兊離坎之兊巽艮之離巽者皆二千二百四十二爻變而之乾者皆三百二十而震之坎艮坎之震艮艮之坎震者皆一千三百四十四三爻皆變而為巽為離為兊者皆一百九十二右三卦亦皆三萬二千七百六十八一本無此數為巽為離為兊而靜者皆一萬一千二百一爻變而為乾者皆一千六百而巽之艮坎離之艮震兊之坎震者皆六千七百二十二爻變而為坤皆四千闕三十二而巽之離兊離之巽兊兊之離巽者九百六十三爻皆變而為震為艮為坎者皆五百七十六右三卦亦皆三萬二千七百六十八一本無此數却有八卦靜變之數計二十六萬二千一百四十四凡一十八字諸卦之數大率靜者最多而一爻二爻變者次之一本作一爻變者次之二爻變者又次之三爻俱變為最少蔡氏曰一竒二耦對待者隂陽之體陽三隂一一饒一乏者隂陽之用故四時春夏秋生物而冬不生物天地東西南可見人之瞻視亦前與左右可見而背不可見也不然則以四十九蓍虛一分二掛一揲四則為竒者二為耦者二而老陽得八老隂得八少陽得二十四少隂得二十四不亦善乎聖人之智豈不及此而其取此而不取彼者誠以隂陽之體數常均用數則陽三而隂一也觀此則盧君之得失可見戊申八月庚辰識於家孰用驗他日學之進否論隂陽消長凡隂陽消長皆始於下故得下則長失下則消自始長而至長極凡八消自始消而至消盡凡八長蓋消之中復有長焉長之中復有消焉長中之消其消也漸微消中之長其長也亦漸微故一復長而至三益三復消而為二震二長而至四無妄四復消而為二明夷二長而至四家人四復消而為三豐三長而至五同人五復消而為二臨二長而至四中孚四復消而為三歸妹三長而至五履五復消而為三泰三長而至五小畜五復消而為四大壯四長而不消遂至於極也雖然此姑論六畫者然也積而至於九至於十二以至於無窮則所謂純陽純隂者正猶一尺之箠日取其半萬世不竭其細微之極非特不可取而得亦不可視而不可見也是知天下古今未有無陽之隂亦未有無隂之陽此一物各具一太極一身還有一乾坤也孟子謂萬物皆備於我者是已苐未得一元之數沿而下之以見吾生亦未得吾生之數泝而上之以見其元安得如康節邵先生者從而問之至元三年十一月二十有一日謹記時寓燕京崇天觀中長一三二四二四三五一四三五三五四極消五三四二四二三一四二三一三一二盡中州名賢文表卷二
