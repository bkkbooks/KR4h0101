body:
  text: 中州名賢文表巻十八明劉昌編馬文貞公碑誌大興府學孔子廟碑昔我太祖皇帝受命造邦金人孫于汴太祖即以全燕開大藩府制臨中夏維時已有定都之志矣故太宗皇帝首詔國子通華言廼俾貴臣子弟十八人先入就學城新刳于兵學官攝於老氏之徒迨世祖皇帝敎命下始正儒師復學官廟事孔子歸壖垣四侵地勒石具文作新士子至元二十四年既城今都立國子學位於國左又因故廟爲京學京師雜五方俗尹治日不給廟之墻屋弊壞將壓以毁講席之堂粗完泰定三年今大尹曹侯上視廟貌祠位皆不如制割稍入爲僚寀倡然後大家富人合資以聚財者有焉釋子方士分食以庀徒者有焉施施于于咸樂相成延兩廡五十有二楹締構塗飾工良物辨象從祀諸賢百有五人妥靈惟肖威儀有容又懇請于朝得廩餼弟子員百人受學於師復其身不勞以事於是天下首善之敎興焉廟肇自唐咸通中至遼金燕爲都邑故嘗用天子學制選舉升造與南國角立亦一時之盛也而太宗皇帝當雲雷經綸之世聖訓諄切以德賞喻父師以檟楚懲子弟飢焉粟肉渴焉酒醴力焉僕使恩義甚備其養賢勸善之誠固已高出百王之上矣世祖皇帝立極作則人文昭明登用儒臣躬親講學故當時勲賢之裔以及宿衞之臣罔不以揖讓俎豆之爲懿顓䝉昏庸之爲恥也而三代國學黨序遂庠家塾之等秩然羅列於上下才學經術用世之士踵武而出暨仁宗皇帝賓興大比四方舉進士凡登賢書䇿名禮部者京師屢倍於外郡非列聖仁涵義揉百年之禮樂文物推而致之歟燕自虞夏爲武衞之服召公之化尚矣昭王築臺以徠賢士鄒衍樂毅劇辛至有稱於世韓嬰以詩易爲一家師孔頴達博綜五經卓然庶幾醇儒今多士游歌在庭摳衣在廟將見鄒魯之美矣若嬰頴達宜所不道矧衍毅辛之徒哉夫儒者之學詩書六藝之文以至施之天下之道無有二也後世敎不明家異人殊各溺於所習以相詆訾由上之敎無以一之也嗟夫古者小學大學之師弟子之傳皆本於道德仁義之實著於詩書六藝之文非有敎有授則不敢以傳也傳焉而龎雜不經則上有刑也是故風淳而氣同由上之敎有以一之也而王國多士逢文明之會𨽻業有學學有師春秋祀其先聖先師者又有廟有位入有食以處出有貴於衆所以報稱列聖敎化之德而應賢侯承宣之志者必冠而起矣提舉學事崔居中敎授賈良弼正張禎録司視以狀請曰廟之成前尹馬思忽實能始之今尹曹偉實能終之經歴王孝祖薛讓警廵監院諤都穆爾使李權且能考工於下也余既爲言正兖郕沂鄒四公配食東鄉位其來請遂爲銘詩不辭詩曰皇元有赫奄受大國于月之􅀈于日之域京邑翼翼莫不來極予誕敷文德新都有嗟辟雍峩峩􅋒弁之瑳濟爾象犧鍧爾弦歌新宫則那舊廟如之何皇帝在御百度咸若海輸維枏河浮厥柏是尋是斵虞庠嶽嶽式光我上國元聖儀儀元紞龍衣衎我先師既右享之采茆于池薦此明犧用介我蕃釐蕃釐伊何彼美多士克明克類克諒厥事以登膴仕以媚于天子有鏗華鐘路鼔逢逢言燕于公有翼有顒多士既同天府是庸維曹侯之功曹侯誾誾廼承廼宣御劇廼專虞庠連連王士安安祇國維賢天子萬年安豐路孔子廟碑泰定元年東平岳復經歴安豐路事相路學孔子廟皆不稱謀所以大而新之告其長屬一府盡傾意樂成大者割財小者奏力咸出名姓以來就功二年總管拜珠君上謁廟又先發稍入會錢遣學正及生二人作雅樂諸器於呉中於是安豐路學祠事先聖先師廟位禮器秩有序列矣四年教授官許士淵以狀走京師請曰安豐全楚東境州來之郊其土廣衍其物阜大其民質實力穡而勤宋失國南播江表嘗恃其人以扼兵衝故百年間人俗獷悍當是時雖有聰明俊秀之資生於其鄉無師以傳業無友以講學士因亦不得稱於世斯豈吾民之罪哉國家覆被蒸庶涵育生遂重熙累洽薫爲泰和薄海外内詩書禮樂之敎興父兄子弟老老㓜㓜日趨於化矣而安豐爲郡在今綏服之内宻邇天子聲名文物之盛民生衣食仰於田桑無靡習雜好以遷其耳目視聽其志專一而易敎而吾經歴君總管君協恭在官勸民以學子備纂注之職可不記以示人乎祖常拜而爲書曰孔子道大天地日月不可象也然古之學者入學必祀其先聖先師後世廟孔子於學春秋天下通祀之所謂推本其始而喻之以義也今二君守官知敎民不在笞辱奔走而在於俎豆揖讓不以小法苛急而以大道磨厲先使之入學矣而又使之習禮器且有所尊敬焉嗚呼有官者皆視其民如二君則天下有不治乎飾屋製器用錢中統鈔㑹之凡七百一十四定一十五貫用食工米麥凡二百一十石髹漆黝堊陶瓦材木磚石篾枲之具輪山航流無􅀈各致二君才諝之施於民者它可卜矣祖常旁州之民也聞鄰州之士鼓篋而游歌于廟于學章甫而逢掖于鄉樂其州有愷悌之政而爲鄒魯之俗也詎得巳於言乎遂爲詩曰桐柏囓囓淮水中潏左峙楚都安豐之揭殖我禾麥有顒者民田田宅宅奠居飽嬉弗大厥知官師維良開黌納之嗟我士民天德元善昔逢不辰胄而不弁今天子聖俊乂咸事嘉生靈應駢入遝至泰和至順庠序聿興詩書禮樂喤焉古聲古聲喤喤􅒶敔瑟琴有薦豆籩求神陽陰我神降嘏多士在學賔興于鄉其光嶽嶽二良民庸作民維同鐫辭伐石上于考功重修通濟渠龍祠碑銘延祐六年閏八月二十有六日皇帝御便殿詔大司農臣晏若曰昔我世祖夜夢龍見于掖庭外垣之水中因命祠而神之書其事於碑矣粤在朕躬纂紹繼述今兹龍神之祠弗治將庳已詔少府相宜度工其始列之碑文略事隱汝晏可同禮部尚書養浩重譔碑銘以進朕將俾勒於石焉臣晏等承詔惶恐謝罪退而爲辭曰謹按龍見之水始爲淵泉涵澤滋滌物潤不燥中居京邑爲利最大及至元二十年乃導泄漕引東導沽潞於是名曰通濟渠即其南堧爲龍之祠表位顯岩象設肖似周宫翼室旁臨夾峙煌煌乎岌岌乎巳莫可尚矣而聖上孝德純一必欲深體先志示教萬世故葺刓補弊塗塈再新埏埴黝堊髹漆鋈錮之制不侈而文祠旁又爲觀音大士堂二楹齊庖房宇曲對列居環以天潢浮光上下龜魚泳游日星景采誠可妥神棲而宅龍靈也某年月上以大比丘尼某主領衆比丘尼率奉祠事歳時祝香有使嘉應旋臻今年夏天不雨有司告狀上屬巡幸北都遣官來祠行事之夕澍雨大注逮車駕還御光天宫明日又雨臣衞胥恱幾甸大穰自兹上益神之臣晏等伏惟世祖聖德神功文武皇帝繼天撫運乾奮飛御感召陽類夢孚神龍所謂變化不測雷雨下方者也迨皇上登極文治聿興至誠格天深仁被物嘉禾駢植乎壠畝瑞芝聮莖乎廟學百神述職三辰順軌諸福彚集有禱斯應况龍者天神之精靈明所鍾固能陰助施他贊相元氣於冥漠之中者也嗚呼歴觀隆古哲王清心無爲然後可以對上帝洽人神而納一世於大和至壽之域也今我聖天子宵旰圖治光大祖訓所以寵綏煦濡鰥寡惸獨者靡不悉所以祈天永命斂福錫民者亦靡不䖍斯其祠龍之神而資我生齒年穀之事也歟猗歟盛哉臣晏等謹百拜稽顙而獻銘曰於穆聖祖天聲震發陽德正中監觀景鑠有龍孔靈協夢之徴下見池籞侑帝歳登帝曰祠之罔神之媚訊占習古考祥天類亦既在庭厥德嗣興牆屋雅雅靈棲是承惟延祐天子凡生資始敷文周雍祈年漢畤皇武繹思兹宫重新工徒獻功丹漆矢陳榱題完好不礱以斵神具厎寧相我銚鎛惠布甘澍勿需禜雩神嘘爲雲出入罔以輿帝伻來臨薌藉式忱祝辭不誣神其時歆神其時歆皇永有報億萬之年用祠昭孝勅賜宏濟大行禪師創造福州南臺石橋碑銘至治三年今天子嗣大厯服慈仁儉勤思與元元共迪天休惟浮圖意義廣大廼嘗詔祠官咸秩厥祀凡其徒功行峻潔者特褒寵之踰年改元泰定宣政使臣伊埒特穆爾以福建平海頭陀禪錄白業修著宜錫恩渥謹上言曰師王姓法助名也世爲泉南農家母感異夢而生生十二月而爲沙門又一年而受沙彌戒又七十五年而殁殁三年而葬葬又九年儻無以表異之非天子廣慶推恩褒寵功行之旨也師天性圓悟善心自然始執業於靈應師再叅諸毗尼師不泥不拘無有障礙惟以發明巳事爲究竟故研窮内典洞了佛乗日發猛勇以畢至願嘗見舟濟西江者即惻然曰是必及於難報止之弗聽卒之暴颶飄溺又嘗爲埭於海濵水囓蝕埭且崩師麾以翣潮爲縮云身衣百結木食澗飲更歳時寒燠不懈蓋道益勤而心無怠年益邁而志彌篤此其行甚高福唐粤閩之會城三面距江其水皆有高下石錯出其間若騎布獸伏迅湍囘洑旁折千里匯而爲南臺江日以舟櫛比連大縆爲浮梁以濟每潦漲卒至則縆絶舟裂於兩碕民多溺焉師故將橋江以利涉者先命弟子呉道可走京師因圓通元悟大禪師李公聞於上天子嘉其意詔師卒成之既被命矣衆愈弗疑於是大姓割其財小夫奏其力閩鹽轉運使王某且率其屬合治之不一年得錢爲貫者數百萬廼爲墩二十八植材木礱宻石納水腹而基之工未告具而師化矣後二年其徒曰嗣玉法喜法秀德遇嗣永實終成之長一百七十丈有奇仍積其嬴資及故端明殿學士王君某田之歳入岸南北爲亭北岸之東爲寺御史中丞曹公扁曰萬壽橋寺如橋之扁師所至人争趨之故居泉則有毗藍菴彌勒菴居興化則有嵩山院寶塔院居南安則有星聚堂昆崙堂凡爲菴爲堂爲院爲亭爲塔爲陂爲埭爲杠爲大橋爲三門佛殿總一百八十有六狀皆瑰詭殊絶而南臺萬壽橋其尤鉅者也此其功甚大先是師未殁之二年仁宗皇帝賜璽書加號宏濟大行禪師帝師亦授衣一襲爲傳法本其所以寵賚光大之者匪自今矣嗚呼一眞如界復何假於人天小果也夫然相以表性非象不彰故彌勒之華嚴阿育之寶塔遍於十方豈真爲偉卓觀美而已今之學佛者昧於此或離乎真或蔽乎物倀倀焉幾無以存其身而大戾厥教視師爲可媿矣是其功行皆可褒崇奏聞有制曰可其命史臣爲文以刻諸石銘曰菩提大士諦真如假象現法表道樞宏濟禪師廼其徒心如摩尼形槁枯洞開五藴觀空虚究竟三乗超有無食糲衣卉損豐腴精勤妙用行不渝閩人歡喜歌以趨鉢錫隨地成屋廬作杠截流載大塗車跡步武乾無濡萬猊蹲蹲護浮圖長杙下入龍蛟區磅礴山骨積重跗中鑿水空通尾閭居者行者若賜酺坎其擊鼔吹笙竽師歸冥冥衆爲吁百神導引幡幢紆海國田良陂有魚稚齒生長耋耄娛史臣爲銘承帝俞世世無圯視其郛翰林學士元文敏公神道碑有元古文之宗曰翰林學士清河元公以至治二年壬戌二月七日薨於位葬而墓碑未刻其長子奉議大夫同知峽州路事晦又死次子暠七歳一女病而不嫁一孫尚乳也夫人清河郡夫人李氏纍然抱其孫僦船歸清河織紝以居賔客僚頴皆四散無一人顧之者獨其友𤣥敎大宗師呉全節謂馬祖常曰清河公以文起家可謂貴顯光榮矣而其葬之後無碑以載其官閥世次行事之實爾宜爲文我求善楷書者礱石以刻焉祖常曰嗟乎世之士一得志則攘袂於所親一不得志褫魄若不能生者比比也今子託跡老氏而以禮義之事振吾徒何能哆言以飾媿哉謹按公諱明善字復初資頴悟絶出讀書目所過即記諸經皆有師法尤深於春秋弱冠遊呉中憤宋金季世之習已名能古文流傳江淮間浙東部使者薦之行省辟正安豐路學再正建寧路學居歳餘行樞宻院辟充令史故辨章董公士選實僉院事敬之如賔不以曹屬御之也董公遷江西行省左丞復羅致之省中曽贑賊劉貴反從左丞將兵討之擒賊三百人議緩詿誤得全活者百三十人又將斬一賊命公臨斬左丞曰掾儒生能臨斬乎當震怖矣終刑已色不變將佐白宜多戮人及尸一切死者用張軍聲公固爭以爲王者之師恭行天罰若等小賊跳梁殺其渠魁耳餘何辜焉賊貴盜書民丁十萬於籍有司喜欲發之公夜置火籍藁中焚之以滅跡贑吉遂安南行臺聞之亦辟爲掾未幾進登仕佐郎樞宻院照磨轉中書省左曹掾曹無留事坐誣免不辨僑寓淮南文學益肆頃之坐誣事明復掾省曹至大戊申我仁宗皇帝養德東朝左右文化選天下髦俊之士列在宫臣公首被簡㧞授丞直郎太子文學仁宗即皇帝位遷翰林待制承直郎兼國史院編修官與修成廟實錄明年與修順廟實錄加奉議大夫是年陞翰林直學士朝列大夫知制誥同修國史有詔命節書文譯其闗政要者以進公請與宋忠臣子集賢直學士文陞同譯潤書成每奏讀一篇上必善之曰二帝三王之道非卿莫聞也太皇太后既受尊號朝堂集議宜赦公曰數赦非善人福宥過可也乗傳出賑山東河南飢彭城下邳諸州連數十驛保馬民飢官無文書公專以鈔萬二千定分給之民免死徙皇慶壬子修武宗皇帝實錄明年遷翰林侍講學士中奉大夫預議科舉服色延祐乙夘國家始䇿試士子選充考官廷對又充讀巻官迅筆詳定試巻數語辭義咸委曲精盡他人抒思者不及也改禮部尚書正孔氏宗法以五十四世孫思晦襲封衍聖公事上制可之叅議中書省事毗贊良多知戊午貢舉復入翰林爲侍讀學士通奉大夫歳中拜湖廣行省叅知政事便道過家上冢鄉之父老子弟迎謁勞問禮意周洽庚申英宗踐祚徵入爲集賢侍讀學士召至上都議廣廟制授翰林學士資善大夫修仁廟實錄百官迎仁廟聖容云有卿雲見承詔爲文以紀之賜酒加賞英宗親祼太室禮官進祝冊奏請署御名上命代署者三眷遇褒優近世無有也既薨之三月歸葬於清河王家原之先塋西三里泰定間得請於朝贈資善大夫河南江北等處行中書省左丞追封清河郡公諡文敏曽祖諱興不仕曽祖妣楊氏二世以下皆以公貴祖諱海贈嘉議大夫秘書卿上輕車都尉追封清河郡侯諡貞惠祖妣高氏追封清河郡夫人考諱貢將仕佐郎同管勾蘆瀝鹽塲贈中奉大夫吏部尚書護運追封清河郡公諡孝靖妣弭氏追封清河郡夫人元氏蓋拓䟦魏之苗裔南北轉徙不知所系家清河者至公四世矣享年五十有四其文有賦五詩凡一百六十三銘贊傳記五十九序三十雜著十五碑誌一百三十出入秦漢之間本之於六經以涵泳其膏澤叅之於諸子百家以騁其辨刻而不見其迹新而必自已出蔚乎其華敷鐄乎其古聲倡古學於當世爲一代之文宗者栁城姚燧暨公而已信乎其必傳也雖然才用而未盡積厚而施寡徵之於天其善後也無疑祖常曩從公遊及公考士又辱第下列義當銘銘曰於維公文並古立大沛厥辭世莫躓震讋瞽聵力不克蜚聲天衢名薿薿位臻公卿發軔跡藴而不施用弗極神柅其馳學廼碩天藻掞縟琢圭璧五十四年返元宅集賢直學士貢文靖公神道碑銘天厯二年十月朔旦集賢直學士貢公殁於家越五年爲元統甲戌其子師謙來官京師以公之行治泣請於朝天子贈公翰林直學士太中大夫輕車都尉追封廣陵郡侯諡曰文靖集賢臣顥又奉詔令臣考公族世里居官次蹟業之實賜師謙以刻於石以寵賚貢氏之家以勸朝著師謙知臣於其父宿有好也廼錄翰林修撰臣李黼編輯之狀授臣曰先臣之生其有所自立其流聲美於人其可以傳世而善後者孤不敢贊巳維墓有碑實後嗣所以記先人之德而飭其千百世子孫於無窮者今幸得以承聖天子明詔以請焉其足以稱碑辭而無恧者公幸張之臣敘曰公姓貢氏諱奎字仲章其先大名蒲城縣人七世祖祖文以武德大夫扈宋渡江繇鍾陵徙居宣城之南湖因家焉曽王父大用王父應霆宋承節郎以公貴贈中順大夫禮部侍郎上騎都尉追封廣陵郡伯妣黄氏廣陵郡君父士濬累贈亞中大夫秘書太監輕車都尉追封廣陵郡侯甫冠以詞賦試漕司中程明年黜於儀曹即自訟曰學之時其道未足以爲已志已在於爲人亦可謂謬用其心矣謬用其心雖有志於爲人其能乎哉乃力自學行歌詠息偃以忘其年視世俗之好無足累心者獨愛公甚於他子曰三郎和易端厚頴悟若過人者吾世有藴德發必在是兒也公年十歳輒能屬文巳有聞於人及壯讀書并日夜忘寢食於經子史傳無所不治於其章義辭句類數名制委曲纖妙無不究詣於文章辨議閎放儁傀不狃卑近必以古爲韙故出而名振江南初被淛省檄爲池州齊山書院山長終更謁選吏部時天下久平大臣常欲引海内儒學之士聚之館閣所以長養其才而待上之用公亦欲以功名自顯果於自立故不爲非常茍異之節而清約才博之譽大夫士翕稱之大德六年中書奏授公太常奉禮郎兼檢討上書言先王之制禮雖節文有經而本誠貴質惟不蔽於禮之文而得禮之意則可以對越而無慊不然煩爲之節無益也朝廷多采其議九年遷翰林國史院編修官至大元年轉應奉翰林文字階將仕郎預修成廟實録丁秘書府君艱比京師至家毁瘠枵然言不能聲太夫人見之曰爾嗣業於祖從事於朝少而學壯而仕父母曰是將大吾家鄰曲曰是能華吾鄉宗人朋友之望爾猶是也爾父不幸死喪不有中制耶脱有諱非孝也始勉之粥食以自強嗇延祐元年服闋起除承事郎江西等處儒學提舉明年就官見列械署庭胥旁午走繫數人立吏持牘詣公署曰是學校吏報事愆期者公斥之曰金穀勾稽犴狴木索賤有司事爾以天子命提舉儒學敎吾職也刑奚以爲悉命釋繫以械屬縣官大書其坐之屏曰讀書之中日有其益飲水之外他無所求與諸生講説文義爲師弟子揖讓周旋日匡坐堂上人見其色和其容謹其言繹繹有理輒退而燕處聞其哦咏之音若程工督計者故士之屨恒滿户外其及門者亦進不怠以止五年遷翰林待制預修成廟實錄書成特賜金幣有差至治元年謁告歸里第與兄仲堅甫奉太夫人以居斂氣下聲昆弟相顧白首怡然鄉人皆樂與從之游至於羈旅游客其歸之者無不厭其意公於接之雖勤未嘗見懈色於資之衣食給物雖頻未嘗有所吝惜太夫人病竟夕立床第前聞太夫人咳息之出輒倚氣喘戚若以身代然者泰定元年太夫人卒三年復起公爲翰林待制進承直郎秋七月拜集賢直學士奉訓大夫秩從三品天厯元年文宗即位冬十月上親祝香幣命公往祠北岳淮濟南鎮二年春還自會稽涉呉中以疾歸臥於家至十月朔謂其姪師文曰吾夢夜賦詩有云竹樹蕭蕭夾泉石又云九轉丹成生羽翼不祥耐何語竟溘然以殁公有智識度量人不見其涯涘凡與鄊試文衡一爲廷對讀巻官所取士多知名於時其所第甲乙人咸服其平允其爲天子代祠之使者再其攝大禮使侍天子祼太室者一皆肅恭靈神䖍致上意爲使而不疚於貨賄不煩於有司攝官而竣事無違禮是皆公行之微而世亦不能及也然公負有爲之志不得盡見於事於勢利之間又不求機以投合取顯以其故終於館閣文字之職而人之被其澤者蓋尠嗚呼此人之所以爲公惜公之所以爲公者如此而臣以此悼公者也公一時之與交者若清河元明善東平王士熙四明袁桷巴西鄧文原長沙文矩悉當世豪傑聲名之士若臣者亦公之所厚故於公之碑得以盡臣之言焉而非私也公以殁之明年正月八日庚申葬宣城縣射亭鄉生田里之原享年六十有一母夫人李氏追封廣陵郡夫人配張氏封寧國郡夫人追贈廣陵郡太夫人子男二人師謙從仕郎集賢院照磨師泰由胄子試中程授從仕郎太和州判官辟署江淛省掾曹女一人適阮垕孫男三人高安奴吳山奴萊山奴孫女六人其所著曰雲林小槀曰聽雪齋曰青山謾吟曰倦游集曰豫章槀曰上元新錄曰南州紀行凡百有廿巻晚年粹擷諸禮書爲一家言未就而卒今師謙師泰皆孝弟純篤緝學以世其家加之以磨礱灌養之功而不止其所至方未艾也論次終始作爲銘章豈特以榮貢氏以慰其孫子以勸以侈以貽其鄉里哉將以昭聖天子褒優儒臣之意以垂盛世之鴻懿也謹再拜稽首爲銘以獻曰貢氏來比肇自武德藎其忠威光被南國有善自身乃開承節繼屬綿綿其承有奕秘書有子以文起仕奮蹟大常旋書帝制有嶷其容志眡萬里大騁瑰辭綜經緯史始來玉堂騰聲其駕惟長在右惟同在亞在側惟僚相頌歎訝公夷坦坦弗矜愈下銓覈再試士曰予歸讀巻廷中帝曰予依淮濟呉越四周所覆公馬騑騑持幣奔走神歆公䖍蕃祉以茂式久在序侍從之班告疾歸止幾佚於閑竹水以居南湖之山公出公休鄉人㘖㘖廩餘者粟與黨及鄰屋藏有書遺其後人素領丹頤隤焉以怡言笑在耳乃哭於帷維公德善殁不見其窮維公所著傳不見其終有嘉二子且用未極其崇維儉於厥躬永也其鴻刻銘墓宫䜿江之東有萬子孫紹美於公大元贈中奉大夫行中書省參知政事張公神道碑公諱昂霄字雲卿姓張氏其先世居定州五代時晉高祖割燕薊諸州賂契丹又徙鎮定民以實平營故今爲平州人金末擾亂世牒無所稽祖伯韜有文學不仕讀書授徒爲鄉人俎豆師生鑑鑑爲海山縣丞有惠政娶聞士程虞卿女有子三人長即公次沖霄仕平州酒稅醋使以卒次平霄副鎮江丹陽酒稅醋務殁贈官從仕郎保定路易州判官公力孝弟尚學術敦慎以睦宗族子姓稱賴無有間言國初檄文臣詣都邑試士人學中程者復其家公首以詞賦備選至元七年辟署平灤路轉運司知事十年階前資提舉北京平凖行用庫克勤厲守咸較然有聲終更序績遷管勾濟民鹽塲顧子弟曰曲直有施而莫盡材余豈能僶俛中哲匠繩度者而或子强也惠㓜禮長葺力食生知天德自貴於物而行茍不怍人道殆其盡於兹巳奚必仕而爲榮爲得禄哉於是居閒益講詩書六藝之學置諸生左右摭掇前聞分釐辨對俾達所趣内熙外易慥慥肫肫對客燕坐語及古今人物賢否事後成敗利鈍若水斷縷緝悉有左契毎臨筆爲文詞必縁情稽類不峭􅪣艱逺而夷然有古作者風意歳時從容課童僕治生業往來里閈十有餘載無忿氣無慢容殆依依乎厚君子也以至元廿五年秋七月二十有四日考終於家享年七十其年十月某日葬平州西苑家莊之原子男九人長諱杲卒海山縣酒稅醋使次諱某早世次諱昱同監昌黎縣酒稅卒次名昇今奎章閣大學士資善大夫爲時名臣次名昆承務郎陜西等處儒學提舉次諱曇少知好禮讀書日記數千百言弱冠爲兵曹掾聞其師滕司業卒中山謀請臨哭其喪例不許因棄掾得就哭還金敖務自多學記覽以博其用而不幸亦卒次名晸承直郎直定路藁城縣尹次諱晟既冠而世次曰旦承事郎遼陽行省照磨官女一人適士人劉源男孫凡十有三人曰璲監安豐路霍丘縣酒稅曰琳學而未仕曰山童夭曰璵將仕郎章佩監知事曰琦從仕郎隆鎮衞千户所知事曰琪甫冠卒曰仁童曰居安曰鮮州皆夭曰瓚國子生曰琥未冠卒曰珪曰琢幼而學曽孫男三人曰紹安憨兒范陽𤣥孫男三人曰元孫聞孫定孫皆幼孫女五人長適同監馬城縣務趙蕳先卒次又適蕳次適遷安趙壁次適大寧楊誠次名賽未笄卒曽孫女二人曰高曰順𤣥孫女一人幼未名泰定二年以公子昇時官階二品例推恩二代鑑皇贈嘉議大夫禮部尚書上輕車都尉追封北平郡公妻程氏追封北平郡夫人公皇贈中奉大夫河南江北行中書省參知政事䕶軍追封北平郡公初娶白氏卒繼室故元帥龍德讓女宜家訓子成其内助而先公十九年卒追封北平郡夫人再娶夫人妹後公廿年卒國制諸夫人當封者格止一人昇以妻封讓後夫人龍氏得請亦追封北平郡夫人咸祔葬公塋禮也至順四年春集賢侍講學士昇以狀屬其門生馬祖常雖不獲拜公而辱公子昇知最久跡其尹汝南焚禁書以全逮繫治越州忤權臣以逭民賦及􅆒厯臺省則又有猷有爲而公之流聲遺澤可考而知矣嗚呼燕營間山川磅礴鬱積之交鍾而爲人者發舒凝蓄固有晦有明而豪俊瑰瑋之器世恒見之豈不以其稟之厚歟公生當草昧之初能知讀書業儒而躬不食其報殆所謂稟之厚而未顯者也不然胡寧公卒甫五十年而張氏之門躋膴仕紆章紱者充然滿廷耶是豈特因公之緒以知公又將驗夫燕營間靈明之所鍾也廼爲之銘曰有燕營陬有鬱平州藹其烰烰孰涵以收張氏德門實會其休王父伯韜肇兹善慶間闗以生乃起厥問積厚而微勃焉其奮寔生縣丞撢于惠政世濟其美伊自公始既穀既官而屹其止曰熙曰勤以淑有子維德之徵爰受多祉後五十年奕其有侈于公于侯籩豆承祀紱冕車服舄奕委委昇也履之公實啓之有封馬鬛神安居之本哉沄沄迪爾後昆矢詩貞石式昭覃恩敕賜贈參知政事胡魏公神道碑皇帝御咸寧殿御史大夫臣某侍御史臣普化奏言侍御史臣彝服勞官常夙夜殫忠力以稱所使䝉陛下器選爲臺臣秩第二品得贈其父官中奉大夫職江淛等處行中書省叅知政事勲護軍爵魏郡公蓋所以慰寵胡氏以昭其先人之善者既鴻奕已臣彝將敘緝其家之望郡系世及其父祖妣之休聞實澤刻書於碑圖久不泯以侈陛下之賜以賁其鄉里以勸其後孫子於亡極彝惶懼未敢以聞惟陛下哀憐之制曰可乃敕臣祖常爲製其辭臣昧死敘列以進曰胡氏遠出於舜周武王時有封於陳爲舜後者曰胡公至春秋之世楚滅陳子孫轉徙因氏胡爲肇姓其後仕於漢曰建曰廣者以勲名著歴魏迄唐代有聞人金之末鄢陵之胡氏徙相州之安陽縣公諱景先字彥明相州安陽人也少端黙有逺操内自修飭不求當世之譽樂其所守謂窽術求榮不多於竭力以供子職枉巳逐物不賢於隱居以遂吾志故事親爲學力田業生以終其世於貴富寵炎未嘗動於意兄殁事寡嫂岳尤盡禮畜其孤某如巳子里人有貸錢爲本業子本相埒至萬十數貧莫能償主責之棘聲自經公捐資與償之里人謝爲劵質公所公火其劵歳大侵出廩實以賙其鄉既匱又賣田繼之至熟人將酬之不受鄰有喪子弱貧無所有公爲具飯含及衣被棺木以歛藏之恤其孥既長俾有家願傭以報不許盜有竊其牛羊者又竊所乗馬公知賊處一不問人嘗具饌奉公公肉而甘召庖人問之曰燔能澤濡能燋味奚是適庖對以法上下釡皆新鑄合肉其中宻其款頂跡加火焉公曰毋得釡損乎味於適而器於弊吾弗忍其平居恂恂恭謹遇人無戚疏豁然無機疃或欺罔之不以變春秋高矣出入閭里嘗却車馬不御與故人父老游或具几杖亦不扶以故鄉人皆德其善而嚮其莊不忍以字稱之尊之謂翁其長者謂其子弟必敎以公爲法曰爲人若胡翁足矣其歿也惸寡飢饉難亟患阨之人相值必曰胡翁之亡俾吾無所控恃致和元年二月六日方與親戚高會言笑如平時忽舉手謝容匡坐而殁得壽八十以其年五月十日葬安陽縣孝明村之原初封奉訓大夫載封朝請大夫同簽太常禮儀院事騎都尉安定郡伯進封翰林直學士亞中大夫輕車都尉安定郡侯累贈魏郡公夫人王氏亦鄢陵望族慈孝貞靜處親族逺近長幼間盡其宜嚴饋祀親紉縫澣濯至老而無懈容事夫能成其志敎子能成其材􅂜官於朝閭里以爲夫人榮而卒不見其喜彞官歸以貧匱不足於養爲憂輒喜曰此吾所以教子也彞居魏公艱服除起拜陜西行臺治書侍御史辭就養夫人止之曰西臺臨四省四憲朝廷倚爲重地且秦中歳饑是辭豈義之急病讓夷者而忘而父之訓耶後公三年六月六日卒祔公墓累贈魏郡夫人臣嘗銘其壙子二人曰􅂜由丞相掾起家爲工部主事官十轉爲中奉大夫職十有二遷爲侍御史曰規兵部曹女三人適鄭某王某李某皆士族孫二人敬伯侍儀舍人柏壽尚㓜孫女二人適大司農侯公孫某樊某臣嘗聞彞爲河南行省左右司員外郎時河南大饑使告發廩者如繹省臣以格未即許彞時代判省牘廼專發米三十二萬石所活五十餘萬人其爲河西隴右僉憲隴右地極邊吏往往闊略乾没無所顧􅂜按擿繩姦賕墨坐者十有一人釋濫繫者八人没贓四百五十萬緡其爲右司都事有以西域僧卜兆言釋重囚以解除者中貴人傳旨引富人子當死者至内廷將脫械彝白宰相置之獄其爲御史爲員外郎左司所言於上悉同宷所不能且不敢言者臨事裁決引大體略細故矯矯無所屈又聞其爲尚書戸部也天子入正大統故與親王宗臣庶官衞士錫予之數爲金幣榖帛以萬萬計時浹月間舉故典者再執事者請括金民間以充用時廷臣多是其議彝獨以爲不便乃稽諸内府之隱覈郡縣上供之實與内帑歳積之羨不給則令鹽商入銀以凖幣大朝會遂無闕事臣攝官御史中丞知經筵事實與彞同署又見其闡翼憲紀糾繩官衺入侍講幄考質經義究觀前世之變而至夫理亂興壞之際必委悉焉此彝之事臣得之於耳目者士論咸以誦彝而彝之語臣必曰魏公之敎不敢忘嘻觀彞之事而質以其言蓋可以知公矣考諱用璋疎達明信不肯爲自欺以德行化其鄉曲鄰有棗樹歳秋實積墜舎旁地命左右拾以歸其主與人交不矯矯以異亦不翕翕以同以故人莫能親疎之居嘗自號曰陶然翁嘗語公謂胡氏之先世大業有藴德未發當後有食其報者至彞果顯用爲賢臣亡妣祝氏修身理家有懿則其智識德量過人遠甚畜馬有夜盲者僮擅靣謾市人取直以媚夫人遽叱還其直且謝曰僮不以質言而輒汝紿吾不忍也以􅂜貴皇贈嘉議大夫吏部尚書上輕車都尉魏郡侯祝氏魏郡夫人嘻觀公考妣之事而徵以公之善尤足以知公世德之遠哉初吏部與其晜弟起鄢陵提家北絶河來相晜弟皆還鄢陵而吏部獨考室于相焉其先嘗繼爲宋金顯官而天興剽薙之餘雖鄢陵葬有塋塋有碑石剝泐文不可識故其世莫得而詳然胡氏陳胡公之後於陳氏國分姓也昔漢陳太丘之仁鬱抑於當世而紀諶羣泰貴顯者數世豈魏公之先既有榮名而子孫逢時不祥又有翳善晦德如太丘者乎不者何後世之碩大蕃興若是臣又知彞之孫子貴顯尚未艾也臣奉詔以國子博士臣沂原大敷懿之狀考公子之所履以求公之世而得公之言行如此於是謹爲之銘曰周有胡公賓王纘聖陳墟姓别昉氏安定曰建曰廣漢樹顯聞亦有威奮蜚聲魏晉彌宋涉唐代奕其盛子孫世食占徙靡常既又抑阨載遷安陽維安陽里其承有煒吏部之孫魏公之子讜論侃侃稱天子使天子曰嗟彝侍御史工協於極邦肅於紀咨予爾嘉懋正厥事彞拜稽首臣昔筮仕左右致養以官就侍天子之仁既多受祉臣罪不穀失我怙恃帝閔臣孤賚之慶貤有爵有官秩躋第二生則孔榮殁顯亦熾維昔魏公殖善弗匱備樂孝養亦又多譽發祥在彞實興佐時維皇好德是緝公熙肆厚厥有乃永其貽繩繩𦙍似勿替承之鄢陵之野既封既樹相城北西亦有新墓帝錫之碑昌此文壽百世其延庸勗爾胄濟南安氏先塋碑濟南安氏有諱圭字伯玉者明法律起家始試補行省刑部令史尋遷樂安鹽司判官濟南府經歴官未幾又補行尚書省令史權行省刑部員外郎仍正授員外郎進至濟南行省左司郎中是時君年甫踰六十矣即謝事家居不起以至元甲子五月初七日終於正寢享年七十有一其子某以是月十三日葬君於某鄉某原先塋之東夫人成氏祔焉君先娶成氏再娶張氏成氏宣武將軍章丘簿昌之女先於君二十年卒有子四人長曰伸次曰僖曰倪曰侃女一人適濟南張鐸伸爲登寧場鹽司管勾配成氏有子五人長曰惟湛次曰惟潛曰惟澄曰惟溥曰惟泌僖監泰安州酒醋稅配段氏有子二人長曰惟洪中議大夫江西湖東道廉訪副使次曰惟洋倪爲濟南府孔目官早卒無子侃朝列大夫知安東州配李氏有子三人長曰惟潢從仕郎冠州判官次曰惟淑監濟州稅曰惟漢早卒曽孫一十人長曰景范惟湛子也承務郎彰德廣平臨水等處鐵冶副提舉曰景元惟演子也進義副尉監杭州富陽縣稅曰景時早卒曰景良曰景嘉惟溥子也後衞典吏曰景益惟洋子也曰景璘惟洪子也曰景肅景周景魯景開景略皆有學未官按安氏上世家棣郡後遷濟水南郎中君獨能以吏文崛起致身高顯而其子孫廸蹈世美或仕或學悉有名稱豈非郎中君生平有淑德懿行嗇用世資不赫赫發於其躬而彌致其來者踵踵也是宜植石鑱辭以昭示無極銘曰惟鼎鍾以受也惟穀帛以售也德克肖之永有紹也故禮部尚書馬公神道碑銘公諱烏呼訥世本屬雍古部族居靖州之天山天山古居延海也曽祖諱特穆爾伊克祖諱博索瑪伊埒蘓海以財雄邊父諱實喇濟蘓當金遷汳都尚書省辟爲譯字掾曹試開封判官改鳳翔兵馬判官死節贈鎮國上將軍柏州刺史官名優瑪因以立氏父死節時公年甫十七壯其父之忠義奮而投冠於地􅊎曰吾父死於國難吾紓家難可也遂侍太夫人王氏間關鋒鏑䟦涉星夜出汴絶河而北見憲宗皇帝於和寧年少辭容端敬憲宗嘉賞之命贊布扎爾斷事官事國朝天造之始總裁庶政悉由斷事官燕故城爲斷事官治所中原久刳兵燹民謳吟思見太平之日公力籌畫規度政修事舉士恱民附胥爲太和世祖皇帝以親王南伐公從行畱汴餽饟六師悉發軵音冗人賦一石取濟南鹽自堰頭舟行陸輓數百萬斤散布軍所過州郡汴蔡河南之地農在野而商在塗不恐不驚而軍政修焉世祖皇帝即位降詔褒奬其詞有曰有此勤瘁深可尚嘉云者阿拉克徳勒據魚兒泊叛倉卒之際公罄家貲市馬五百疋進上世祖皇帝嘗給劵賜其家曰後當償汝也版戸遂試學子通一經即不同編民今令甲儒免丁者公始之也中統建元既肇建省部明年拜禮部尚書佩金虎符四年八月二十一日薨於上都之邸第訃聞内外文武之屬縉紳之士咸嗟悼䀌傷形諸文字之間迄今傳而不泯也嗚呼公之薨年甫四十有八即以某年某月日葬於大都宛平縣清水河之陰之原太夫人王氏墓後梁郡夫人白氏祔後六十四年爲至順元年曽孫祖常辱官禮部尚書請於朝追號推忠宣力翊運功臣勲上輕車都尉階正議大夫爵梁郡侯官僉樞宻院事諡忠懿子十有一人長諱世忠常平倉都轉運使次諱世昌行尚書省左右司郎中孫祖常官忝第二品推恩二代贈嘉議大夫吏部尚書上輕車都尉梁郡侯次諱世顯知通州事次世榮早卒無子次世靖不仕次世禄中山府織染提舉次世吉承公廕絳州判官次審温嘉議大夫歴台州淮安瑞州路總管餘三人蚤卒不仕女四人三蚤卒一嫁廣東道副都元帥庫哩濟蘓孫二十人長諱潤朝列大夫同知漳州路以子祖常備侍御史贈中奉大夫河南江北等處行中書省叅知政事護軍梁郡公次節入王屋山爲道士次禮下砂鹽司丞次淵不仕次開監在京倉次遺道遵皆卒次通迪次保六賜提舉都城所次未名卒次岳難武略將軍蘭溪州達嚕噶齊次雅古處士以孝聞次必齊納奉訓大夫同知興國路事次祝饒監富池茶場餘四人未仕曽孫三十一人長祖常由進士轉官侍御史次祖義郊祀法物庫使次祖烈汴梁等路管民總管府案牘官次天合監杭州鹽倉次祖孝管勾河垜鹽場次易朔南察院書吏次祖謙昭功萬戸都總使府知事次祖元信州路敎授次羅和知行唐縣仕者九人餘者學而未官也𤣥孫若干人長武子中書省掾次文子國子生次獻子惠子並國子生餘皆㓜諸女孫以多載於家傳兹不重出嗚呼我曽祖尚書德足以利人而位不稱德才足以經邦而壽不享年世非出於中國而學問文獻過於鄒魯之士時方遇於草昧而贊襄制度則幾於承平俾其子孫百年之間革其舊俗而衣冠之傳實肇於我曽祖也嗚呼祖常生三十三歳父潤南官漳州敎祖常曰吾祖有德未盡發吾官州郡不得施今汝頗樹立其大將在汝也後祖常佩父訓不忘忝官翰林直學士太子右贊善大夫禮部尚書叅議中書省事入臺進侍御史叨冒寵榮夙夜憂懼惟恐違父之敎而墜我曽祖之業蒙不孝之罪死不瞑目於地下葬儀不具塋域不廣欲改卜而遷之宗人曰封樹八十年矣神殆安兹未易改卜嗚呼祖常既撫我曽祖行實萬一而略論次之矣忍不泣而終銘之銘曰有崛而起之孰趨而掎之將濟世美必承而履之懿矣我祖百年於兹衣冠之傳實維啓之世多王公亦多華靡惟不革俗而忽其圯繩繩孫子思馬有氏咸宜習禮以續廟祀中州名賢文表巻十八
