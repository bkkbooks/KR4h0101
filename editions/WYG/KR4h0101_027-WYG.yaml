body:
  text: 中州名賢文表巻二十七明劉昌編王文定公碑誌大都復虞帝廟碑幽陵之祠虞帝所從來綿邈廟據金故苑西北維兵後廢不治獨唐貞元間復廟碑宛在顔真卿子頵書人屢欲易去礱焉以它用主者心戃恍若有儆動迺已厥後道士陳志𤣥直廟西百舉武起真陽觀爲長春别院復購焉約不犯元刻用石背勒營建本始備力來徙碑與趺坼身挺植重不克舉仆道士惕息磬折向碑祝曰今神顯思若是願置安處且逺荒穢尚敢他用以黷聖靈神惟降監庶畢兹志安載而去吁亦異哉初樞密趙公良弼嘗建學宫於鄉縣求志𤣥爲工師既迄功以徙碑事蹟來告公曰嗚呼噫嘻皇乎休哉惟帝明德萬古是式況冀土茫茫析而爲幽州者帝之所經畫宜乎燕人祠饗不忘廟屢廢而旋復也又遺碑巋然自唐歴五代遼金當大元戊寅凡五百有餘歳神物護持俾勿壞汝歸興復之責不在師乎志𤣥曰唯即以道宫丕構作新廟而奉黼扆焉既而趙公將志𤣥之懇以復廟記見屬某拜手稽首而颺言曰日月星辰帝𤣥明也君臣父子帝彝倫也山川風土帝疆域也是則聲敎所暨巍巍乎與天地同休孰能名而能報哉今志𤣥黄冠師因趙公一言而復數百年之舊俾來者瞻天就日知慕帝德如蟻之赴羶可謂推原道本敬其所當敬乃知天理之在人心者曾一息而間斷邪至於稽古樂善因機就功毗贊皇猷思成比封之美又以見趙公事君治民孳孳焉以堯舜之道存其心者也誠宜特書以詔來哲仍繫樂章使都人歳時祀饗登以歌焉其詞曰帝降諸馮東方人兮幽幽深山鹿豕羣兮耕稼陶漁至爲帝兮風動八區烝一又兮矧惟析津帝經制兮物不苦窳化土泥兮聖靈在天濡鴻私兮阜財解愠南薫時兮鳶飛魚躍日用而不知兮風移俗變天理存厥彞兮燕人懷思歆明德而祠兮八音庭陳鳯來儀兮九疑雲深望何依兮我賡九歌言匪空兮皇天降衷􅂶綏惟帝聰兮恫彼下民中庸其鮮充兮嗚呼而能一天下之慮允執其中兮平陽府臨汾縣重修后土廟碑平陽府治之西有鄉曰晉源帶汾河表姑射林墟櫛比泉流交貫無寸壤閒曠山霏夕景杳藹如畫故河東稱膏腴勝槩之地於斯爲最風俗率勤儉盡地利憂深思逺有陶唐之遺化焉用是富庶而事神報本之禮尤恪歳時單出惟恐居後豈終歳之勞一日蜡者之意歟樊氏里后土祠其來浸邈蒼煙喬木輪囷離披已百餘年物也兵燼來雖正寢巋然日就蕪圯里中父老某等憫其若是乃諗於衆曰吾黨仰滋天休取足厚載歳比豐穰人用樂胥可不知其自邪今神庭未備不足妥靈揭䖍其謂我何咸儆懼聞命相與經畫起廢完故益新智者作其謀富者資其用取材於河陶甓於野􅀈礎於山然後工者輸乎巧壯者服其役營務既興先後有敘於是繚重垣建臺門作重寢列兩序樹庭屏凡三十八楹丹刻翬飛輪煥離立其配侍法從之屬旄纛儀衞之數金碧絢爛森布左右莫不畢備游人過客載瞻載儀溪山草木亦爲動色凡費枲幣僅萬疋既落成某人等以禮幣求文於予將以幽贊神明紀夫廟貌興衰之自謹按汾陰后土祠乃魏鄈丘之制其典秩華縟肇於漢武元鼎行幸之初千載而下令人歌秋風之辭詠汾陰之曲想夫泛樓船濟汾河千乗萬騎威靈振赫回旌跓蹕躬祀睢上祈榖報功於是乎在故歴代因仍以爲聲明盛事曠古當然之典是則崇奉者國家之事非鄉民所得擬也以理究之神睢者即有國之大社而社者自天子至於鄉遂皆得置而通祀苐禮文制節有隆殺之異爾況土爲神廣大博厚無所往而不在又汾陰在晉爲屬邑以兹爲離宫異館神游美報之所其誰曰不然嗚呼三代已降教化衰而禮樂廢禮樂廢而祀典亡林林總總之民物則既戕心惑所嚮有射利徼福而已故祀非其類僥倖於萬一者胡可勝數今冀方之民獨能敦本返始奉所當祀俾歴世相承之俗敬恭誠潔永永是尊以荅高廩無疆之休較夫淫祀野祭者可謂知所嚮矣乃爲作送迎神辭春祈秋報歌以祀云其辭曰汾流兮容與林葩兮綉組被汾兮一曲坎坎兮擊鼓薦瓊芳奠桂醑俟神來欣樂胥芳菲菲兮滿堂偃金枝兮翠羽報神德兮德何溥右迎神澹林扄兮山煙乗回風兮雲軿神欲旋兮何邁奄上征兮朝元衆紛舞兮羅拜欲神畱兮無言望極浦兮𣺌𣺌愁予目兮娟娟神篤我祜兮歳有年右送神絳州重修夫子廟碑絳爲州甚劇其地蓄河山之潤總六縣以三萬戸爲河東冠俗剛儉尚氣義奄焉有三晉餘習州治民廬高下覆壓蟠蜛枕跨岡陵是依獨夫子廟學據城之東北隅爽朗夷衍奠澤宫甚宜而素汾北來盤折容與帶郡城而西望之一泮水然廢撤既久莽爲榛墟逮州將艧澤郭公來始圖興復遂起大成殿泮宫門各三楹甫朽棧而公卒漠然狼藉者蓋三年於兹噫將有待而然邪至元九年秋奉議馬公來尹斯郡既謁告顧瞻咨嗟憫夫垂成之功日就陊剝乃以完故益新爲任於是完正殿壯臺門創兩序凡就屋五十餘楹層棟軒翥墀陛整削松桷有舄碩碩其庭中設素王像以顔孟十哲配侍左右東西兩廡繪六十二子及大儒二十有四袞冕冔裳峨峨奉璋奎壁輝映煥焉有光廟既成適選舉令下士子來歸洋洋滿庠既而衆議以州之治化及民者非一其大者著者可無聞於后來謁文於余因勉爲撰述且寓夫予之所感焉嗚呼三代之治道莫先於敎學無重於育材材弗育則用乏其人民失化則不明乎善善不明則民入於僻民蕩於僻則幾何不爲禽犢也哀哉欲求吏之良政之善胡可得已若夫天地縕絪山川開闔蟠精粹靈非有今昔醇醨之間人之秉彝具存天之生材不乏然氣之不充俗之不美者特以敎之無素養之未至耳今國家崇聖道開化源建辟廱於京師立學師於鄉遂顓本業者復其身鳴一藝者無不庸是則大易人文之化菁莪樂育之方靡不備至奈何吏治者鮮推其本以簿書獄訟是務爲士者不思根極聖道以大學自任區區從事於章句之未是不副上之所求所望焉而曰道不明秦無人也宜矣尹蚤以學術侍彤庭厯臺閣熟其然故下車之初首事學校作新士民耳目至成就若爾可謂能也已尹諱闕郡人既書其興建本末而繫之以詩其辭曰厥初生民秉彝昭融物慾外遷良心蔽䝉於鑠元聖乃大有覺何効何則而先乎學吁嗟叔世降及漢唐道統湮微絺文繪章士騖空言吏昧厥治朝夕孜孜匪不摩勵科學異端簿書期會愚者不及淪於自棄聖不世出發越道源粃糠虚文浩浩其天廟宫之建序庠是宣穆穆睿思意兹在焉而吏而士尚克勉旃盤盤閟宫完故益新馬公之功本既立矣道由生矣眎爲餼羊乃予之恥絳州曲沃縣新修宣聖廟碑曲沃縣學舊矣始完於宋嘉祐初盛於金泰和間貞祐之兵蕩焉無餘前政茍訿初不遑䘏園蔬興感薪刈其下者幾五十祀逮至元己巳邑尹石抹公慨然以圖復爲事工垂構而去尹侯簿賈天衢相與顧歎曰蕭武弁能是烏可不卒其美然澤宫故地庳陋湫隘不足奠安神觀聳邦民瞻相治城西北陬勢夷且爽遂増崇前規而敞其禮殿焉既落成董事者許良等感蕭君經始之勤今政贊終之善來謁文將刻石廟庭俾簉名於孫曹諸賢之列用垂示來哲竊不自揆敢以聖道之隆汚廟學之本末互陳而歴告之三代之世家有塾黨有庠術有序國有學以師以令肄俊造其中時書歳考小大有成然後賔而興之其典則六德六行其藝則禮樂射御書數然不可不知其所自故入學釋菜奠弊於先聖先師示不忘本也彼朝夕見瞻無非智仁聖義忠和孝友睦婣任䘏之方凡邪説詖行放蕩僻異之術非可輔世敎明人倫者率屏絶不容髪其間故三代道出一致有學而無廟周衰王者迹熄生民不被庠序之敎天理茫昧心喪厥守異端百家之說乗隙竝騖不無厖雜壅厎之蔽此太史公讀功令未嘗不廢書而嘆也及漢興學館林如鴻儒繼作師傳業受學古蒞官守其說而不易故謀王體斷國論一以經旨爲據於時公卿大夫士吏文學氣節雲蒸霧散彬彬然幾三代之風何其盛哉此無他聖道明而百家自息也逮魏晉隋唐以來慕高尚者以虚無爲宗干利禄者以科舉爲業其視窮理正心修已治人之道懵不知爲何事時則三物之敎弗明於上先王之澤不及乎下單爲廟祀尊孔氏而王之三代敎育之實泯泯掃地矣所謂有廟而無學間有卓越特達之士出芟夷浮學羽翼聖道爲任然莫能拯起其弊而全濟其溺者何哉蓋道之隆汚學之盛衰一繫夫王政好尚而爲之有無也嗚呼三代吾不得而見之得見兩漢斯可矣今國家昭至德建民極勸學敦農崇化厲賢凡所以風四方而開太平之基者靡不興舉故經明行修之士往往賓興天府擢位卿相以心正意誠國治天下平之道已嘗佐天子而理百官矣士之不志於古則已茍志於古舎斯時之易將何所求所待焉曲沃自昔以劇稱土腴物阜爲絳諸縣甲俗剛僉力穡尚氣義憂深思逺奄焉有唐晉餘烈尤不可後者敎也本既立矣道由生矣師帥者能仰體上之所嚮以明倫實敎作新士民耳目俾知所以學異時人材輩出斌斌然追兩漢之風孰謂不張本於斯邪不然釣采華名爲餼牽告朔之所吾不知其可也銘曰維晉曲沃以劇稱絳山左戒汾右傾山川開闔氣上蒸風俗勤儉餘剛稜邑居萬家業有恆既富而敎廼世程嗚呼庠序敎所生石君作尹追良能奉宣德化根以誠清廟起廢功勃興心計百至經載營惜哉垂構任遽更後人繼之率有成方華古礎排巨楹文欀藻棟浮雲縈相前増崇尤克承敎其鋪敦道日宏春風隱耳絃歌聲始謀贊終匪自矜吏民懷感思以銘我詩刻石碑廟庭解州聞喜縣重修廟學碑銘堯舜用道以治天下孔子任道以垂萬世其所以明倫建極論政造士邇說遠懷者不外夫術有序國有學而已後之君人者思欲化隆唐虞坐牧牖易之道舎夫子之敎將安法歟我國家尊師重道明德新民風動海㝢爰自京師達於郡邑鄉遂率建敎官勉士以德趨民於學其比隆致治之意固云極矣而承宣鼓舞寔守令之職是則道生之本敎始之基其可後而聞喜在秦曰左邑桐鄉逮漢元鼎間始易今名其爲縣􅒓董澤奠鳴條雄盤逺帶風土夷沃通晉走蒲古爲咽會名卿碩德代不乏人顧山川之氣鍾靈萃秀必自人文德化薫陶涵浸者爾縣廟學舊矣枕城之艮隅地勢穹窿如神龜負圖背露淵水蒼官薈鬱環列庭戺秋煙古色望之儼然皆數百年物也按廟碑由宋迄金宰是邑者增崇非一故制度宏麗甲於諸縣遷革以來神栖碑屋幸脫煨燼然歳年緜邈人迹罕至浸淫於壤藂草棘而宅狐狸蓋有年於兹至元己巳從仕郎張君來尹是縣首以營治爲任既而監縣事托台簿司天禄佐史劉瑞爭出廩料資所費而濟厥􅍇如榱棟桷櫨之傾腐者瓴甋階陛之缺裂者舉易而新之復起講肄之堂齋廬之位至於神門庖庫畦圃游息之所莫不畢備用十年春二月釋菜禮告成厥功百年偉觀頓還於舊粤明年春史劉瑞介汾西前尹王延年持溫國文正公學記踵門而請曰不腆敝邑猥致力於鄉校功甫僝而尹適去烏可俾上官之譱藐焉無聞於後以職以分瑞也寔任其責擬揭諸麗石以告來哲不肖素陋於文以懇請堅切辭不能已敢勉爲書之又竊喜幸得列名於司馬公之下風固所願也尹晉州臨汾人諱仲祥資明良果於從政故其爲善卓卓有成也如是較夫從事於簿書期會之末者不曰有志於本知敎之所基者歟誠可歌也已其辭曰維漢聞喜古桐鄉東浸董澤南條岡千年喬木秋煙蒼廟宫盤盤枕艮方平時絃誦溢兩庠代不乏賢古明良如儉顯魏度相唐風雲感會龍虎驤至今德業何昭彰神居雖存地土荒蒿萊没人狐兔藏風雲穿漏摧棟梁張君下車心慨傷首以營治如弗遑同寮見義爲贊襄咨嗟吾道百孔瘡頓還舊觀蔚有光齋廬有室講有堂我南走蒲過此邦親覩盛事思彷徨吾儒有例善則揚作詩豈惟示不忘士民嚮化此本張嗚呼廟碑古甘棠重修孤竹二賢廟碑首陽山孤竹二賢祠肇見於李唐増隆於前宋金貞祐末爲戍兵撤而槱之國初郡人徐帥因廢基而屋焉後四十載當至元九年𤣥黓歳惲自御史裏行來官河東以是年冬十有一月按部至於蒲坂適致祭令下遂齋沐奉祝祇拜墟墓庭序藂翳路寢傾圯遺像黯昧陊剝就滅於戲前政之不舉至於斯邪非惟不稱明詔尊顯風烈之義而大懼不職下隕敎條吏隳不恭惡可狥狃於是祇會屬吏作新是圖資聚既營衆工趨事仍命府掾長吳舉董治厥役改新肖像以儼神儀逮明年夏五月復行縣次蒲吏告訖功用六月丁亥躬率僚屬以少牢之奠敬妥神棲帶河表華新宫敞然山煙庭木奕奕動色守吏不任之責庶乎其少塞矣知府楊居寛請書其事於石以詔來者噫二賢聖之清者也其出處大節求仁本心興懦厲貪之操息邪懼亂之功孔孟稱之詳矣揭若日月亘終古而不熄小子其敢儗諸然讀黄太史所述去國諫伐蓋宗國有不說好事者爲之説耳竊有所疑焉若曰非讓而逃國人惡而逐之烏在其爲賢也且以避紂不有其位孔子何爲稱求仁得仁子貢何以審夫子不爲衛君乎至於義抗自終恥食周粟亦謂事不經見臧哀伯何獨稱武王克商義士猶或非之不然二賢者北自海濱聞善養來歸當周命惟新明義崇德之世不知俯仰何所愧怍僵踣於兹山之下乎故特表而出之必有能辨之者仍爲蒲人作迎享神辭俾歳時歌以祀焉辭曰瓊爢潔兮蘭馨錯􅅔蔬兮薦神庭條之山兮河之水迴風瀟瀟兮波瀰瀰神之逺游兮邇何歸南呌虞舜兮帝禹與追以暴易暴兮吾知其非國極所欽兮祀典載熙槃非周粒兮桂酒芬菲民之載神兮清風庶幾偃迴斾兮入室陳鐘鼓兮載考載擊千秋兮萬歳於焉兮永息衞州創建紫極宫碑銘維衞紫極道宫全真師沖虚子房公所剙建也初公既參丘尊師於海上長春目其氣志非凡殊稱異之居無幾何全公主馬坊之清真觀迨國朝壬寅歳聊攝趙侯請師住持郡之元都宫於是鶴馭東游道出敝邑汲長趙實扈林聞師道價重一時以治城崇道里隙地廣六十舉武縱則倍之奉師爲元覽别館忻然許焉輟其徒張志洞等結茒以居嘗闕地得石上刻宋太宰張邦昌詩什知爲呉越錢氏子孫隶華庵故基也師畱博僅紀而西還淇上方履滿戸外毎以居逸敎無爲慮因集其徒而告曰吾大方家雖清虚自然爲宗要以應時衍化爲重詎容山林長往歸潔一已乎且吾行天下多矣未若衞之土中而處會俗美而易化不於焉闡吾敎尚何往然祝延寶供香火焚修之所非大壯麗不足以張皇敎基竦道俗瞻敬之心也廼命門徒孟志元趙志樸率衆下商洛之材跋涉囏阻以歳月得木萬計遂建正殿七鉅楹内設三清大像示至道之原也中起通明觀以奉玉皇黼扆欽天帝之尊也後復作七真殿五筵敘列僊品見𤣥敎之傳也下至壇墠神闥齋室庖湢廐庫蔬圃莫不畢舉師素負巧思志堅而氣充規橅位置意匠中定不待畫宫於堵而爲執用者之法要使堅完鞏固爲數百年物尋師委蛻仙去遺命志樸等曰今大功將集無以吾存殁而作有間勉强前修以卒吾志故志樸等三十年間焦心勞思攻苦食澹繼述師訓猶一日然今則繪彩供帳截然一新金光五雲絢爛溢目宏麗靖深爲一方偉觀其工費之廣自力其力初不外假而衆忘勞焉實經始於壬子之春迨至元甲申秋工告迄功志樸乃件右師之行業與夫興造本末踵門磬折謁予文者再余以鄉梓盛蹟且與師有元談之雅勉爲敘次之師諱志起濰州昌邑人幼業儒既而以異夢有覺遂入道爲人氣貌魁奇操行清峻通古今善篆籀樂與名士夫遊至於醮祭之獲福雲鶴之顯異所在驚動世之耳目者爲多遺山謂師外朴而内敏質直而尚義似夫墨名而儒實者蓋確論云宜其事業成就如此至元戊寅志樸以師德請於朝䝉敕定僊號曰宏貞體靜真人若志樸者於師弟子之禮始終盡矣尚猶以師不覩道緣大成爲欿予慰之曰不然昔真人舎清真而遊博去博而終税駕於衞今雖神游無方其眷戀於此也必矣況共衞間名山勝境固有小有洞天如元元化現於仙山公和舒嘯於蘇門海蟾畱題於白鶴仙蹤靈貺前後接踵見於方志雜出於傳記之說者昭昭矣異時馭風騎氣追陪真仙安知不過故山而畱語俯華表而増懷而爲孫劉絶塵之舉也邪仍作歌詩詳見師志俾刻諸樂石雖緜亘千祀庶幾來者有所考焉其辭曰道家者流本靜清杳冥而無迹與形崈慈尚儉貴不爭兹乃黄老之常經有時土苴爲世程祈禳醮祭由是生像緣敎設雖强名雄樓傑觀爭崢嶸猗嗟先生起營陵魁偉德業元門英至人未免安傃行河山兩戒䃲金庭方花古礎排巨楹紫雲爲蓋青雲城羣仙嫓統須皇靈紫垣落落羅天星先生演化意有徴後孰倦焉先此營庶用張本道可興隂助政治歌清寜大緣未竟歘上昇門人攀慕涕雨零歳纍月積大有成惜不久視爲宗盟仙宫洞房本不扄神遊八表風泠泠來過故國宜少停紫極夜氣開蓬瀛追攀逸駕非吾能尚想爲國儲休禎風時雨若穀不螟下洗澆俗還淳誠我詩刻石何千齡要作華表歸來銘大元國大都創慶天慶寺碑銘并序大雄氏之爲敎如慈雲慧日覆燾無際惟得其人道乃大行宫居像設亦從而熾盛之我國家鼎定全燕敎隆内典故精藍勝刹粧嚴寶界金碧相望有佛國大乗氣象維永泰寺肇基自遼彌陀者泰之别院也大安兵燼廢撤不存鞠爲茂草者五十餘年大元至元壬申有僧雪堂者始來結菴而主之先是師業嗣法猶窟潛天德以經戒嚴機鋒峻越在雲朔名動京師嘗假息間有以天慶名所栖而告之者初不諭其故既而駙馬高唐郡王聞師名德喜之既覯止即依慈蔭叩真詮師順事隨方日有所覺以至承嗔獲譴非罪而罹苦毒者因聞一言多所縱釋其後王請師住豐之法藏院仍贈具錦法衣用著顯異尋以道行上聞有詔所在護持及觀光大都郡王廼出重幣易是院爲師待問駐錫之所與其徒奉香火修潔精進而已至於建大道場擴充無量功德蓋遵養而有俟也逮甲申冬皇孫噶瑪拉以師持誦保釐故欲辟靜室處之宫府辭不可翼日出貨泉二十五百緡洎名驃二仍諭留守段禎詹事丞張九思即所居庀徒藏事起三大士正殿丈室七巨楹下至門閭庖湢賔客之所畧皆完美始於乙酉之春成於丙戌秋仲役初作闕地得廢鍾所刻天慶二字考之蓋有遼建號也事夢既協即爲新寺名額於是倚晬像於金光沸潮音於空際有來諸天普臨雙樹顧諟永泰廢餘復爲清涼法觀矣後三歳奉皇孫奩香禮江浙名刹起造藏經師冐涉江湖往返萬里存神過化高風所及奔走供養且有金仙通靈伽藍主護之應吁亦異哉凡得經四藏計二萬八千餘巻分貯大都之開泰天慶汴洛之惠安法祥及永豐法藏院仍以法物付之使人無南北通暢元風壽聖皇贊寶緒天花雨紛梵唱雷動日開八方之供者此師之所圖惟也宜其經來神衛號應基先雖老柏重榮神松回指有不是過者遂不千里逺持待制王之綱事狀以寺碑來請曰山僧空疎無足比數以義以契尚憲使與顧以銘章貺之始終之願畢矣予以師憙儒學有器識所交皆藩維大臣文武豪士緩急於士大夫周旋不榮悴間解紛振乏要有實效然去來其間殆雲凝而風休也嘗即寺雅集自鹿菴左山二大老已下至野齋東林凡一十九人作爲文字道其不凡時方之廬阜蓮社云是亦將因儒釋僧之特達者也宜其行業成就如此固可以著金石而垂不朽矣師諱普仁字仲山姓張氏雪堂其道號也世爲許昌人父世榮官至豐州司録叅軍母夾谷民師生有徵祥甫毁齔不葷酒嚌初祝髪於壽峰湛老再具戒於竹林雲和尚及參永泰贇公一見器異即䝉印可至有機鋒灑落瑩徹冰輪頭角崢嶸光騰星緯之諭贇𣲖出臨濟第而上之師乃慧照十九代孫也過鎮陽樹碑表行濬源接派以昭眞本於尊祖追逺光又赫焉余嘗論天下之事雖小大有殊醻酢注措皆有本末就釋氏敎論之佛法者本也塔廟者末也崇其末而遺其本求進於道亦以難矣若師也可謂持用有方審所先後者哉乃隨讚歎而作偈曰道之大原出於天物生而靜乃本然扶持有術繫後傳惟聖日逺湮其言奪攘矯䖍紛目前佛乗自西來竺乾慈愍濟度心爲先衆生迷惑不知覺沈溺苦海甘流連人人安得以手濟以法爲栖經爲船奉持頂戴破黑業火宅變幻生青蓮龍宫紺殿儘瞻禮貝香須滿黄金田阿師振錫下南海豈爲頭角爭昂軒向來四萬八千偈重與震旦開經筵燕豐汴洛還舊貫佛界珠網摇秋煙羣昬再曉栖至善如夢日月金沙淵漢人得經纔四十未若此舉思無邊功圓行滿師不有歸之帝孫祈永年八方奠枕磐石靖天子萬壽南山堅聖孫神子麗不億惟城惟藩復惟宣歸來文室炷香坐但覺鐘鼓清而圓從此婆欏雙樹底知師澄定草鞵禪渾源劉氏世德碑并序金源氏倔起海東當天會間方域甫定即設科取士急於得賢故文風振而人材輩出治具張而紀綱不紊有國雖餘百年典章文物至比隆唐宋之盛若夫篤志力學挾藝應選首破天荒魁冠多士父子昆季相繼擢第爲名士夫作良牧守文行端雅門第清峻爲金朝第一流者其惟渾源劉氏乎劉氏出彭城望族五季板蕩播遷朔土遼末逺祖諱用者居宏州順聖縣之耀武闗世業耕稼生子翰贈承德郎配張氏追封彭城郡太君生撝字仲謙即今監察御史鄰之高祖也始釋耒耜習進士業當遼金擾攘際學未嘗一日廢天會二年肇闢科場公以詞賦第一人中選惟遼以科舉為儒學極致文體厖雜萎薾視晚唐五代尤為卑下公勵精種學文辭卓然天成妙絶當世一掃假貸剽切牽合補綴之弊其後學者如孟宗獻趙樞張景仁鄭子􅅨皆取法焉金國一代詞學精切得人爲盛由公有以振而起之也釋褐右拾遺轉知天城陽曲懷仁三縣擢大理正遷平陽府判官安東節度副使兩貳大理寺出刺石州累官中大夫年六十三卒於位翰林學士張景仁碑其神道公性淳厚見義固執待物誠好誘掖後進三爲理官議獄主恕不屈於權貴故多平反尤長於治民興利除害若嗜欲然施設有條理簡便可持久所去見思圖形奉事素愛渾源山水幽勝買田家焉晚號南山翁夫人渾源雷氏北京轉運使思之女封彭城郡君生四子曰汲曰渭曰􅒔早世曰濬汲字伯深穎悟絶人早傳家學與弟渭同擢天德三年進士屢爲州縣有聲累官朝散大夫應奉翰林文字西京路轉運司都勾判官平生寡合不羇慕郭林宗黄叔度之爲人晚節倦於游宦放浪山水間以遣興讀書爲樂稱西嵓子述壽藏記敘其行已甚悉卒年五十八鄆王府文學陳訥銘其墓有西嵓集行於世屏山李之純引其端娶曹氏追封彭城縣君一子偘字稚川大定十年進士第積資奉直大夫豐王府文學兼記室叅軍孫一從䕫字和卿奉職出身善作詩曽孫文祖渭字仲清少好學克紹箕裘既登第授承德郎知秦州隴城寨事調隰州軍事判官終朝列大夫岢嵐州刺史號闕老人一子价河水泊酒監曰濬廼鄰之曽祖博學强記少有聲場屋間既而用廕入仕至安逺大將軍饒陽令配張氏封彭城縣君生四子佖似儼俁佖字稚行宣武將軍眞定府軍資庫使三子從善字澤卿彰德府酒監從皋字平卿從契字禮卿武義將軍克勝軍副都統孫五人曰郊義武將軍曰郅等俱早世似字稚章孝敬友愛出於天性力學能文稱其家聲四試於庭不偶用恩賜第授承仕郎華州教授再任承直郎主沂水縣簿娶王氏封彭城郡太君壽五十五終於家遺文雄深簡古有廼祖風嘗訓子孫曰爲士當先行檢如絲之潔將立其身愼無㸃汙汝佩吾言則無忝矣故屏山李純甫表其竁曰善人劉公之墓其爲士夫之紀蓋可見矣一子從益字雲卿自髫齔時已有成人度擢大安元年進士乙科調鄯陽丞長葛簿陳州防禦判官皆有治績投機應變措畫出衆意表進提舉南京路𣙜貨事丁沂水君憂起復拜監察御史君負材尚氣資之以學欲使事業表表大見於世一旦職與志合所言朝廷紀綱時政利病竟與宰臣辨論得失不屈去職閒居淮陽與諸生講明伊洛學久之選令葉縣至則鋤强剔蠧豪族惡黨禁不敢少肆請免通租三萬石致流民自歸者口數千大起孔子廟既樹敎本集諸生肄習其中風化大行考課爲河南最未幾詔入翰林爲應奉不踰月而卒得年四十有四雷御史淵誌其墓趙翰林秉文勒銘神道皆稱其器識明敏剛直敢言學可以輔政敎材足以濟時艱齎志以殁士論惜焉葉民至廟而祀之孔子稱遺直遺愛者豈近是邪蓬門其自號也蓋取南山翁誡子詩元自蓬蒿出門戸莫交門戸却蒿蓬之句有文集十巻粹而贍通而不流類其爲人内子嚴氏封彭城縣君子二祁郁祁字京叔少穎異爲學能自刻厲有竒童目弱冠舉進士廷試失意即閉戸讀書務窮逺大涵􅀈鍜淬一放意於古文間出古賦雜說數篇李屏山趙閑閑楊吏部雷御史王滹南諸公見之曰異才也皆倒屣出迎交口騰譽之及與御史公退居於陳相與講明六經直探聖賢心學推於躬行踐履自是振落英華收其真實文章議論粹然一出於正士論咸謂得斯文命脈之傳壬辰北還鄉里躬耕自給築室􅖑曰歸潛歳戊戌詔試儒人先生就試魁西京選充山西東路攷試官後征南行臺聶赫公聞其名邀至相下待以賓友凡七年而没享年四十有八翰林承旨王磐誌其墓娶史氏洛陽名族一女適前監察田芝子文冕一男景山終國史院編脩官孫一興同有神川遯士集二十二巻處言四十三篇歸潜志三巻行於世郁字文季亦名士中統元年肇建中省辟左右司都事出尹新河召拜監察御史能文辭工書翰别號歸愚卒年六十一娶趙氏前禮部尚書璜之女一子景嵓鄴字伯震一子景巒儼字稚昂鄰之祖也登承安二年進士第累官至中奉大夫祕書少監壬辰北渡痛宗國云亡蹈河而死配李氏封彭城郡夫人三子從禹字虞卿登至大七年辭賦第官至朝散大夫同州錄判一子曰都從愷字舜卿自幼卓犖不羣稍長入鄉校擅能賦聲再舉不契就廕補官授武義將軍登封主簿已能綜覈縣務束溼吏曹人不敢以少年書生易之國初生聚稍集遴選廉能急於撫字辟府君攝領韶州事繼真授宜陽令縣當兵後庶事草剙下車廉知其利病休戚斟酌而更易之凡科取差徭必騐其等第俾均輸焉暇則集俊秀於縣庠講明禮義美善風俗爲政才期月而頌聲四達終更授河南府路經歴素精吏事婉畫恢恢刃游餘地致六房無滯務公餘與紫陽楊丈西菴楊公九山李子㣲薛庸齋㣲之觴咏於泉石間中統四年正月二十八日以疾卒於私居之正寢壽五十有五娶張氏宣德望族貞靖柔懿自在父母家已稱純孝及歸于劉事舅姑恭順飲食服御非經其手不進也終於至元二十三年十月二十日享年七十有五葬合袝子男三人􅅠字君美平江路人匠提舉至元三十一年十一月以疾殁得年五十有五配段氏享年四十有九鄗袁部場管勾鄰才識警敏練達時務由省掾授承務郎工部主事次陞承直郎順德路總管府判官選充監察御史女二長適渾源州王氏次適應州元帥韓公之孫孫五紹祖江浙省宣使慶祖澱山巡檢繼祖勝童乞童從稷字賢卿終濟南路儒學敎授三子曰郇曰郴曰郛俁承奉班祇候遂州酒監一子從周字文卿劉氏先壠始葬順聖之耀武闗南山翁徙祖塋於渾源縣東北黄嵬鄉御史君以世故流離起先塋於宛丘神川旅殯洹水歸愚定窆燕山令鄰奉大父中奉公衣冠及考妣柩安厝於河南北邙之原是爲渾源劉氏洛陽新阡鄰復欲彰先懿昭孝思圖不朽諗不肖嘗問學於神川先生知其家世頗詳持張陳李趙雷王諸公銘誌求述世德碑以猥列後進年迫衰謝不能發越先賢事業且何敢秉筆於諸名勝之後堅辭者久之鄰復曰金亡士之北渡者百不二三今消磨已盡求接見先輩老於文辭而最知名者莫公若也今弗惠顧則先世之事將何於託不獲巳廼採掇諸公緒餘及已之聞見而知者會歸其極而系之銘銘曰漢庭射䇿貢士遺風排黜百氏仲舒是崇唐文三變敗北無從振起衰薾尊昌黎公兩公傑出莫之比隆考其𦙍裔孰繼芳蹤大名難再氣數奇窮金源立國網羅才雄首魁多士惟南山翁程文妙絶一世師宗當時景仰韓董攸同子孫克肖家學是攻巍科七決聲華摩空故家文獻泱泱大渢蓬門卓爾世業克充言直行果節效匪躬支撐傾頺致時之雍齎志雖没留名則鴻中奉矯矯職貳大蓬存亡惟義表我孤忠子孫昌熾爲報則豐神川力學洞聖心胷明理貫道匪文奚工玉佩瓊珠大振辭鋒導家學之淵流會百川而朝東章甫適越惜不時逢陰相同氣先志恢洪朱衣白簡乗御史驄何劉氏之多賢試紬繹其始終種德植善無踰於農立志務學祿在其中忠義仁恕傳嗣彌縫維人事之克盡見天理之昭融宜澤流渾水之源青蔚南山之峰北邙之原巋然新宫世故牽率匪忘祖封是惟金百年文宗之裔過者敬恭中州名賢文表巻二十七
