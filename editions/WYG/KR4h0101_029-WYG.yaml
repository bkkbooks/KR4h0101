body:
  text: 中州名賢文表巻二十九明劉昌編富珠哩文靖公碑銘真定路宣聖廟碑初鎮州置真定路以中山冀晉趙深蠡府一州五土地人民奉我睿宗仁聖景襄皇帝顯懿荘聖皇后湯沐首務立學養士當是時也世祖聖徳神功文武皇帝淵􅅗朔庭聞鎮之學緩未即敘龍集丁未敕有司勿怠其事於是以金粟岡廟址崇殿廡闢黌舍太原元好問有記越十有四年庚申世皇即祚都燕統一八表置憲肅郡府鎮憲為諸道之冠庠序闕略必憲人府人胥議興治至元暨今雖屢加葺猶有未備至順辛未憲暨府議倡集楮弊三萬市物傭工募役自殿之廡自廡之門新其屋楹三十有二棟宇軒楯拱挾環合左右翔峙作杏壇於殿之北神厨扵廟之東自廟徂學門垣梐枑循序森立瓦墁締築堅麗於舊先是府尹瑪蘇庫已基未構而去政人遷易者十餘年尹張猛合倅和則平治中和允升繼至憲使托歡提其綱賔佐韓復理其目始克有濟其年夏告成壬申春府遣吏李明善介徵士贍思狀來請志其績翀嘗貳憲燕南義不容讓稽宋蔡京遷學陸佃記略曰真定雖塞北有江南之勝江南豪傑特起如臨川王公與孟子相上下真定初未有聞噫是何言之怪也真定者冀州東垣堯舊封也昔帝堯以帝嚳子侯恆山之唐自唐侯即天子位徙山之西號陶唐氏太行東西境數千里皆帝所圻真定固神明之宅也孔子經法於易則遡伏羲以本無言書則始唐虞以道政事詩則采殷周以正性情春秋則黜五霸以嚴名分禮樂升降以鑑窪窿天人之道至矣廼曰惟天爲大惟堯則之唐韓愈謂堯以道傳舜禹湯文武周公孔子孟子蓋孔氏立教如帝典微言如三謨帝堯孔子位不同而同聖王安石背道迷經䝉君誤國京佃傾黨滋熾世益大壞河南程氏兄弟承先聖之緒捄之終賴其言道不墜地新安朱氏師則兩程裒輯遺言貫通折衷以悟百世先正許文正公見其書神感明㑹相我世皇同符堯舜世道人心翕然大正洙泗淵源日月昭朗今神聖繼興世日趍治鎮股肱郡也帝堯之思在焉朝廷之化先焉崇事先聖所以敎也鎮士知所嚮往下學上達尊經慎藝何德不進何業不修何邪不鑑何古不及憲牧之輔治敎縉紳之報君父於是乎在廼賦詩以慰鎮人士曰太行之山滹池之水孰古與美陶唐之里滹池之滸太行之所孰今與伍皇祖之土恆山嶙嶙滹水沄沄昊天生民思堯之仁滹水湯湯恆山蒼蒼帝堯相望於赫世皇始鎮之府時未忘武維士與女澤沐時雨龍德出潛萬方既瞻春熙秋嚴自北而南皇風斯扇時雍於變視彼侯甸恆鎮之先大殿周廡先聖之宇久未今覩誰敢予侮有廟有庭有戸有扄肅肅其凝昭昭其靈新是鎮學式對恆嶽惟士也確順我先覺求門於牆求室於堂伊洛考亭使我不盲惟聖之𤣥惟王之素圜冠方屨天地之度侃侃誾誾夭夭申申如目之眴如躬之親既儼既翼臨汝明德以賔皇國方州是則鎮人聚喜歸功憲紀憲人曰止其誰敢爾顒望神京稽首奉揚配天無疆天子之光平章政事致仕尚公神道碑大德八年春三月己巳中書左丞尚公請老上不允若曰其服朕命母怠冬十月稱疾力請予告九年春還保定時年六十有九明年夏六月拜昭文館大學士資德大夫中書右丞商議中書省事召不起武宗即位加榮禄大夫預司農司事中書職仍舊召秋九月覲龍虎臺大臣莫不譽公上恱若曰衆以卿宣力我家爭譽其賢故耳公再拜稱觴上萬歳壽御琖賜之酒故事酒答臣下琖人授之不親賜也時特授公左右相目嗟異冬十有一月東宫賜宴翰林俄以疾還至大二年春正月使召辭三年冬十月贈爵三代仁皇出震召問大計稱旨賜宴清勝園皇太后賜宴南園夏五月丏去陛辭上御武帳聞之以氣暄室隘敕近臣出諭若曰卿來盡心獻納朕未始不從稱老懷歸豈遽忘國家耶凡益國便民其以疏聞當行朕即行之敕宰相李道復等進秩慰餞遂加銀青職仍舊賜白金百兩金綺二匹宴中書驛送還歸時年七十有五延祐五年制贈曽祖考仲資善大夫翰林學士上護軍追封上黨郡公妣魏氏郡夫人祖考安榮禄大夫大司農柱國祁國公妣王氏國夫人考汝楫銀青榮禄大夫大司徒上柱國祁國公妣李妻魏皆國夫人六年春正月拜太子詹事使三往廼起三月辛酉見上嘉禧殿之後閤上顧太保庫楚目公曰是自世祖皇帝効力潔浄人也徐曰周卿汝前汝知古今識道理練大務太子託汝善輔之有言勿吝善敎之此朕意也公見皇太子首以念祖宗孝兩宫養德性辨邪正陳之大子異其言夏五月北幸覲花園北行殿上若曰朕不文直諭汝勿惜盡言敎太子賜尚醞馬酒各一罌詹事俸入不受俄謝歸時年八十有二泰定三年以中書平章政事致仕制授於其家賜楮泉萬緡綺帛四端尚酒二尊公表謝復賜酒時年九十有一朝廷尊賢養老思輔長治其見於公如此四年十月八日薨享年九十二訃聞制贈推誠佐治寅亮功臣金紫光禄大夫大司徒上柱國追封齊國公諡正獻公諱文字周卿祁州深澤人幼嗜學甫踰冠卓邁有聞世皇御極急務求賢二三大臣體上意銳采擇中統元年張忠宣公文謙宣撫河東還故參知政事王椅薦公忠宣奇之辟掌書記至元元年辟西夏行中書書表二年始立朝儀詔魁賢鉅德者討論詳定太保劉文貞公秉忠薦公參預凡常朝朔望起居元日冬至會覲再拜内外文武仗衞布置服色差等圖象規製皆公掌之節次入奏清問所及必公條對明白久之聖鑑通朗敕結綵畫位皇城之東百官肄習上御法座臨之見大書宸極御座之居上召公問之對曰天極居中衆星環共帝德無爲天下歸之其象類此上恱習已大恱遂爲定制播告天下七年敕知事大農八年轉大農都事禮成置侍儀司大保以公見上仁智殿擢右直侍儀使十有二年復都事大農其佐農政也置七道巡行勸農事聯保五課耕桑修水利立社學築義倉革浮薄禁游惰多自公畫十有七年出守輝州不事刑撻因其土俗以禮導之令行禁止河朔大旱禱輒兩歳大熟踰境旱自若也聞者異之懷孟馬氏宋氏被誣殺人訟蔓不決提刑部使檄公讞之推跡究情得尉史獄卒鍊嗾狀兩獄皆雪牧輝二年民安事洽十九年冬召拜戸部司金郎中初竹稅置提舉𨽻省部懷衛居民犯一筍一竹率以私論至破家至是抗言罷之課入郡邑害遂弭明年秋使山東定征稅度風土市廛立中制江西省憲交訟裕皇令中書公奉敎訊詰罷省臣宣慰臣各一追白金千二百兩二十一年冬改戸部郎中明年春都事御史臺㑹聚斂臣達拉木珪阿薩爾等謂海内財穀省院臺内外監守里魁什長率有欺蠧請大蒐抉上允敕衆勿沮利黨嘯結兇壬儗使旁午省臣御史掾吏民庶罹穽陷日衆人情危駭先此南臺御史封章言帝春秋高宜禪位於皇太子皇后不宜外預太子聞之懼公因祕之以杜讒隙此曹覘之鉗臺史督索公白中書右丞相安圖御史大夫伊囉勒拒之越翌日其黨以聞敕大宗正薛尺玕取其章太子益懼二相憂變不測公思用拯之方閱舊案得兇黨罪玷數十白大夫曰事急矣請就省圖之至遂説曰丞相大夫以勲貴忠賢荷天寵柱石廊廟皇太子天下本固本安天下兩公任也此輩傾險乗釁奮不逞祕章出禍可言邪今先計奪謀使噤不容喙䇿之上也二相曰善入言狀上怒若曰汝等無罪耶震勵未止丞相前曰臣等有罪不辭但此黨名載刑書類非慎潔動必鷙害生靈宜選重臣使爲之長庶靖紛擾上徐霽威可其奏二相出宣制緩其行兇爓爲沮俄而告贓賂者喧集事聞天威大震或誅或竄或奴時漢人臺臣皆闕公位幕佐以智勇忠義動大臣悟明主殲大憝銷大釁旬日之間中外清泰聞者壯之俄丞大農治京北屯田畎澮汎溢不菑二十四年置尚書省柄臣顓政急賦讒戮大臣衆股栗使者四出峻繩督務贏官緡徼賞恱公使燕南得鈔緡約四十萬與民者三之二賞雖不及功亦見時至元鈔始行置寶鈔提舉司𨽻都省金與銀禁私易小人挾威張罟擭飽饕餮摧破民産動再年使江西治其敝吏行詐舞文各以罪論或誣熊氏子買藏金尺吏訊則無之訊益酷乞輸直不聽聚貸簪珥作新尺符其妄廼已劉氏子誣其弟貨利潛易金銀獄久不絶事皆類此公至率清脫民始寧息其年理鹽茗雜稅江右明年升少卿理獄理賦山之東署置濫溢汰之政令苛虐蠲之事理欺惑正之尚書省罷政歸中書遷吏部侍郎考覈尚書省臣鈐錝所不當最簿上之流品清别井井不紊始以肅政廉訪司憲諸道明年公使憲湖北初提刑按察之憲鄂也行省奏罷其司聽攝山南者再事滯民疚公曰此憎忌者間之耳凡政刑大務即省議之慶祝大禮赴省行之糾按貪墨不少貸讒格政行民始受賜三十一年秋召爲刑部尚書公以逺近稟決刑制不一吏誕民癏請依古律令采寛厚新憲章以一吏治不報成宗元貞元年春拜侍御史會江浙省平章用虐行悖行臺御史浙西憲人條狀彈劾制遣公洎大都護往詰之左驗明著平章者挾貴驁岸不臣公等以聞平章者以國制軍數禁宻無敢或預御史嘗取數鎮兵於是藉其故擅驛走都以相噬咋都省奏不用臺臣特以都護按問制可御史逼威即承兩造具備敕省臺太師宣政等衆大臣雜議率阿勢貴犯輕宜宥御史法當死公曰不然御史職號監察今所繫者上欺下暴制使馳訊拒捍無禮罪重不輕必以軍數有禁言之小吏佐書掌給鹽米甲簿伍籍數誰不知況御史因兵卒交愬責令長帥均役情無害法縱有罪亦輕不重皇上御大寶赦天下德洽民心豈宜濫刑以累聖治議都堂三辨巖廊再衆列奏公廷爭剴切上開悟平章御史各杖遣衆呼萬歳他日集肅政堂衆憂省臺不協公曰天下無難事苐恐處之失其要耳都省長百司丞相握大柄相抗不敵動瀆天聽取厭傷體自今而後狼貪虎暴者抨彈之事不涉私者正救之果大鉏鋙論斥未晚何用紛紛衆韙公言未久猜釋風紀肅然二年請無數赦罷役不急上嘉納大德元年夏河決蒲口冬公使憲河南明年春偕勅使相決河籌久利公建言長河萬里湍猛東注下盟津地平土疏蕩徙不常失禹故蹟流患中土不知幾何千年孰保無患治得其當則民省而患遲失之則力費而患速此定論也今陳留抵睢東西百有餘里南岸故河口十一已塞者二自涸者六通水者三岸高於水六七尺或四五尺北岸故堤水高北田三四尺或高下等大較南高於北約八九尺堤安得不破水安得不北也蒲口今決千有餘步􅌺快東行得河舊瀆行二百里至歸德横堤之下復會正流或彊湮遏上決下潰終竟無成揆今之計河北郡縣順水之性逺築長堤以禦汎濫歸德徐邳聽民避衝潰圖所安嬰患户齒河南淤田量給永業他決視此即救患之良䇿也蒲口不塞便䇿上廷論從之河朔郡縣山東憲部爭言果然則河北桑田盡化魚鱉之區矣塞之便復之明年蒲口復決障塞之役無歳無之是後水北入巴河復故道竟如公言三年秋憲山東宣慰使挾壻宗室以浮論懲叛謂治淄青政宜猛故藉是久居方閫外掠譽而内貪虐憲糾小有違言吠咥即至公度難力爭使者往來公以温言順附而嚴礪之彼乃感服其下稔惡會有告者選官按詰得二十餘人決杖追贓以慰惸弱遂大慙謝逐所親暱用事十餘輩歸民田二百餘頃四年秋授中奉大夫參知政事行省江西既莅政以吏選淆濁凡庠序之師軍民之佐財穀之主典隨事立法貟數百浹日皆注無復容私衆始睚眦終莫奪俄趣公分鎮嶺南快私憤公曰此軍政也非制敕不敢行驛使顓稟得報䝉古平章偕公在省餘以次出鎮衆計沮事聽公決摧彊生枯濯煩疏壅省悟清簡六年秋九月移疾北還冬十月拜江南行御史臺中丞辭明年召至京師拜資善大夫中書左丞時朱張氏得罪省臣率譴逐唯左丞相兩新平章洎公凡四人調燮政務浙西水沴民饑山東歳兇盜充獄公議發官廩周罄乏縮湧價舒市易泄富足通閉遏責兼并仁客佃民能施米上三百石爵有差得米石五十萬救呉越餓殍爲蘇出官緡八百五十餘萬拯齊魯敓攘亦息選清望臣使十道宣撫天下采訪其得失黜貪暴安善良江南官民田賦均減三之一西方學浮圖氏號白雲宗者髪而妻子田宅訹愚䝉託祝釐逭徭賦倖習甘賄奏爲總攝錫印章郡縣富豪名署七千餘所衆數十萬於是罷之斥散黨與同民賦役時順德忠獻王達爾罕與君同心輔政選庶官齊百度罷斜封汰冗員絶寶貨約濫支節滛費量入制出擇民牧屛世守定贓律除虐禁明㛰制阜民生綱正目舉有中統至元之風公粹美高亮行修潔年十六七志學溯伊洛究洙泗完經大史諸子百家該洽無不綜一以仁義爲根極孝友行業著見州閭大臣交薦聲名日振世廟方大有爲衣冠元老森然以所能輔經緯公翺翔上下畫佐開先實與有力歴事五朝才識宏經濟功名映寰海德望尊廟堂忠信締淵穆懸車私第嗣聖繼明眷注益渥使車累召進必勇退從容事外二十餘年壽考康彊几杖清寂手不釋巻搢紳造之非聖賢中道經綸大經置不談聞者隨其器量大小皆潤溉天下望之若瑞星神岳素縝嚴繇飲食動靜皆有節制居位應務察事理守名法簡易正大物無不容推行所宜不膠不固大政大節利不回威不屈仁勇沛然綽有餘裕古遺愛遺直公盡兼之於戲世皇長駕闊馭網羅英才培植之久大德卿相稱賢無右公者養賢資世豈易言哉公娶某氏子男某某孫男某某年月日葬完州某鄉某原公弟之子曹州判官克和以國子助敎張執中所狀公行遂以銘託烏乎公往矣文行事功百世師也其敢以昧陋讓銘曰皇元統天大定于一聖聖明明崇建皇極三光五岳氣象渾同天產人瑞以弼帝功瞻彼恆山峩峩大茂挺生尚公神峰綜秀始遇世皇邁績華勲禮樂稽古稼穡養民鴻臚大農事係賢哲左右後先夷䕫稷卨朱轓五馬衞源之滸里詠塗歌神明父母孰驚皇靈七鬯震摇用輔執法正色立朝孰斵民力烈火凝霜用使四方雨澤春陽孰縱陸梁摧我獬廌用立憲紀鋒稜益大孰徇貪蠧柅彼鴻鈞用握政柄化育載新年鄰七􅐆勇於告老天制臣義豈曰太早昔也廟朝淵淵昞昞軒后之鑑神禹之鼎今也鄉社于于雍雍天下之表人中之龍有謁其庭鄙吝清滌齒頰餘論皆世藥石道德之容禮樂之度大醉而醒孰寐斯悟善數數之侯卿侯公百歳完潔其誰儗隆有德有文有位有壽功在史牒名垂宇宙太行嶙嶙滹易沄沄刻此銘詩相配無垠大都路都總管姚公神道碑公姓姚氏諱天福字君祥拜監察御史彈擊權臣無所顧畏世祖皇帝賜名巴爾斯國言虎也其係出唐賢相文獻公元崇文獻諸孫伯祿卒絳州觀察判官葬絳之稷山縣南陽里繇是世爲平陽絳人公考處士君諱君實字仲華甫冠辟兵鴈門金進士趙泰以子妻之生公及和衆主簿天祿公姿白皙美風矩童丱不凡聞處士訓忠孝奉受惟謹從事郡府挺潔不羣儕輩畏之仕懷仁爲縣史世皇以太弟駐白登公從縣進蒲萄酒見奇之畱侍宿衞至元初丞縣懷仁大帥楊庫庫楚薦其能於丞相塔齊爾丞相奉使朔漠修睦宗藩引與之偕五年立御史臺丞相爲大夫奏授架閣管勾秩將仕郎十一年以承事郎拜御史十三年江南平冬十二月宰相銜怒左遷同知衡州路明年春三月以朝列大夫改河東山西道提刑按察副使佩金符夏六月拜治書侍御史秩中順十六年春使憲淮西江北道秩嘉議十八年憲江南湖北二十年夏憲遼東明年春以母老請歸養不允二十二年春召爲刑部尚書秩通議逾年總管揚州不赴二十六年夏復憲淮西秩正議三十年拜中奉大夫甘肅等處行中書省參知政事以親辭改肅政廉訪司成宗即位使肅政廉訪於陜西元貞元年春三月遷眞定總管冬丁太夫人憂自鴈門徙處士君柩合葬絳之稷山中書起公還眞定大德三年春二月拜江西行中書參知政事辭奉使山東還四年秋七月以通奉大夫參知政事行大都路都總管兼大興府尹本路諸軍奥魯總管管内勸農事六年春正月二十有八日薨於位年七十有三公至元名臣勲德焯著其薨也朝廷悼惜吏士護喪歸平陽以夏四月某日葬稷山西北嘉禾里泰定三年以子侃請制贈正奉大夫河南江北行中書參知政事護軍追封平陽郡公諡忠肅天厯己巳侃以公行實徴銘神道之碑不獲終辭因采其本末而次第之公始爲御史條奏宰相阿哈瑪特罪二十有四召廷辨公枚數其罪彼輒引服數至於三氣沮情駴上動色若曰此三者罪已不宥目公曰巴爾斯臣下有違太祖之制干朕之紀者汝抨擊勿隱廷臣震竦其事今祕世未有聞時方倚相理財姑釋不問衆亦爲公危之太夫人趙君有賢識朂公曰國爾忘家汝苐盡力果不測吾追蹤陵母死日猶生年公泣謝白其長曰萬一得譴乞不以老母坐連也語聞上歎曰是母子有古義烈敕侍臣董文忠宣付史臣書之監大名堪布得罪御史按之至見毆辱繼用公往間道微服入境察悉其情還取驛抵其所擿抉如神簿責死罪十有七械送輦下俄以宥免經臺門大詬公在察院促捕之檢行橐得賂侍御史安威實訥救免狀即桎堪布而祕其事夜用巡符託詗邏奄至一道士室盡獲其賂明日陛奏上曰彼七死猶赦汝欲何爲公對罪十有七赦七留十餘誰任咎上悟戮堪布斥安時御史大夫二安善其一既斥與所善猶雙陸禁中公曰安庶人耳豈得與大臣狎叱令起座皆失色公即入奏一蛇九尾首動尾隨兩其首行不能寸今憲不綱蛇首二也上曰然一人二冠可乎召兩大夫諭以公言大夫博囉懼以年少自劾罷有讒提刑按察之不便者有旨罷之是時廣平貞憲王裕嚕魯爲御史大夫公告之曰往者悖叛蝟起鄣塞見聞今列憲宇内廣視聽虞非常慮至深逺不但繩督有司而已也縷縷陳之大夫悟矍然曰幾失是夜造禁密詳奏上曰此天下安危計也其勿罷會駕北幸所擊相馳騎士縳公閱其家脫粟數斛外得言事故藁羅織苛毒公亢聲曰乗輿行狩戕害言官宰相寧欲反邪捃拾無所得斥遷衡州俄憲河東太原民飢開廩賬䘏議者以擅罪公上知不私置勿問朔方兵興役民轉粟人畜顛踣公曰執政非䇿自蹙其本也投闕論奏改和糴疲瘵爲蘇畱遷治書出憲淮西先是蘄黄有叛者將吏臧獲良民以萬數公皆理歸民伍衆感泣相率立生祠徙節湖北劾省臣楚國公罪以聞上閔其有勞爲痛治其黨會阿哈瑪特敗大遣使治官慝遼東宣慰使阿喇卜丹權黨也侵暴尤横召公使遼至則封府庫究簿書審事察寃正魁惡著公道使還即命長憲遼東公疾馳夜入詰旦莅事民懽吏愕郡縣竦動初遼朔旱蝗公至雨澍蝗滅其境域烏桓白霫故地也民喜畜牧習射獵不事耕學公敎以稼穡詩書居數年農勤士奮民之孝者旌之不義而訟積年不決者訓睦之稔惡者懲艾之武平縣民劉義訟其嫂與其所私同殺其兄成縣尹丁欽以成尸無傷憂懣不食其妻韓問之欽告其故韓曰恐頂䪿有丁塗其跡耳視之果然獄定上讞公召欽諦詢之欽因矜其妻之能公曰若妻處子邪曰再醮令有司開其夫棺毒與成類并正其辜欽悸卒臺章以公詣平灤按總管劉納古伯公至劉欲遁去公密令憲傔張仲威作漁人匿西城橋伺之劉果與吏徒會橋下謀揜其愆仲威得真公一問皆伏吏胥之黠而虐扼民之吭而快其所欲而民莫敢校者率以罪黜平灤都吏張氏子尤狡而忮杖去之逺近震讋道行遵化風旋馬前公黙謂之曰汝冤從我吾爲汝理至縣舍風即見令縣以櫜鞬士從憲傔覘之信宿及蓊薈而風息得五尸皆短衣其一衣中得小印公下令居賈行商以端匹赴縣聽和市辨之賊果執遼粟歳輸灤陽使督運急時民方饑公曰吾􅃘視邪畱粟賑糶使不敢沮民賴以生遼人以公政通神明追思惠化立祠頌德入長刑曹讞獄與衆不合歸臥於家竟如公言衆得罪公望益隆淮西不治復握使節申飭舊規風采立變初宣饒徽數州有亂者官軍併俘齊民加以刼掠絡繹淮境公責守令嚴津防峻訶譴民復其鄉者數千餘家帥臣昂吉爾閫淮殆二十年位中書右丞以宣慰使操制兵民黨結中奥其子亦握兵煽虐奴官屬轢風紀莫敢誰何宿盜數十出沒淮海陸梁自宋未有制者宋亡帥葆芘其徒通納賄賂縱其所爲公遣健士襲捕得所匿兵㐲貲財定案市殉者七人自是帥漁鷙狀百出公疏其跡取驛上聞帥鉺驛勿給公潛前走得驛馳去帥遣兵校丁文虎追刺公至六河館不及公至揚州文虎亦至誣公於行臺俄而六河館人以刺公狀聞文虎被執公赴覲制遣近侍阿珠治書侍御史烏遜馳訊帥以罪廢已而赴闕以擅殺淮賊譖公不中憤而斃淮境大寧丞相僧格之黨虐平陽者尤劇其敗也用公尹其府以清宿蠧詢父老得郡邑田里真僞利病緩急先後審行之民輯事理遼西呉氏子贗爲女巫行眩衆事之若神人公洞其詐攝至府吏欲案究公曰亂常之跡可侈言邪立命撲死衆股栗政闕驛傳雜沓事闕痿大臣蠟真奉牧闕遂尹真定道壅闕枯壯弱日聽愬闕堅動無泥閡人人竝引衆走府治瞻判決優絀不爽初饋餼不充徴需日困公以楮鏹貸民因母取子繁畜孳豐廩稍闢大賔館水磑創立如平陽用有餘羡宗親之位傔從之區秩秩井井甲諸路歳省官帑而下不加擾憲人摭細故劾公中書敷奏事不涉私法可施用宜著令式以示他州制可郡人集衆象龍祝雨公曰無益令撤去廼慮獄囚底平允雨大霈驛置新樂北阻派水便价車騎自南而北者雨溢夜暝野次無所建議徙置派南衆大便順築寺五臺督民運木奪農癏衆令方急公不從府懼佐貳交諍之公曰吾民牧也惟民是恤請待農隙朝省爲允欒城盜殺人取財夜舁尸置民隆氏邸縣笞伏隆氏父及二子當死械囚送府哭於庭尸母辨贓無其子印識公疑之會使者決大辟公紿他賊承盜殺狀隆氏獄緩真盜遂獲黜吏退胥之在民間者不啻百數刼持官府而肥其家咈其心則禍之管庫稅廩之徒往往破產質妻鬻子以償所欲而不敢與辨公劭農諸縣得其姓名杖死數人質鬻者還之餘多遁去或改行爲善士其尹京也立誠信繩桀驁挫強禦䘏惸弱事至而斷豪右斂迹三河民藏古銅印怨家訟曰將謀作亂縣搒掠其囚使符所訟至府辨其文曰三河縣印公曰何亂之爲以不輸官罪之制令尚廐芻稈以鹽易諸畿民霖溢害稼公請市旁郡户部據令督責上下洶懼公帥京屬從部白省竟以公謀寧息京甸京人弟假姊財不劵姊嫠益貧弟賈益富姊嫠徵財弟曰有劵即與姊憤愬聽者難之愬於公諭之曰汝但歸俟徐訹刼盜扳弟對詰大懼吐實暨姊中分其貲公果毅直諒立朝敢言操行清介忠孚信格有賜輒辭上至引唐太宗賞魏徵故事曉之對曰臣言分也受賞非分也竟不受持憲總郡皆有聲績以治盜赴鄂民衆衞送不絶盜聞之戒其徒曰姚公正人也勿犯性孝太君年踰大耋公拜參知政事甘肅難於輦養辭不往世高其行縉紳推論聖朝人物骨鯁有爲終始不貳其操者公當第一固確論也蓋嘗稽之鴻惟世皇神鑑睿算長駕逺馭文武效能光輔丕業甸萬國冠百王盛矣然廊廟岳牧邪慝間出兠鍪劍擊之輩以佐命勲致封爵者或驕恣不法公起宿衛當至元之際奮下列搏權奸莅方州滌巨蠧使辨捷不能措其喙仇憤無所憑其兇風㮣氣節炳燿一世淵衷之所孚公論之所與豈徒然哉其忠義剛大藴積有素故也公揚歴四十餘年功名事業磊磥赫奕侃訪輯遺軼既久始備因歎世有家者之子與孫或不侃若先烈湮滅可勝惜哉敘而銘之或有待也公始娶趙氏繼楊氏皆平陽郡夫人子男三人壽童蚤卒祖舜祕書著作郎卒侃内藏庫副使楊夫人子也銘曰帝運開大中統至元人傑斯寶匪寶璵璠惟天聰明憲象執法元化宣朗昭融六合堂堂忠肅始峩廌冠讜言正色英風夏寒虎炳其文山立殿陛檮杌饕餮魄褫魂悸宸扆凝邃上動天容庭有直臣庶儆其同有鑒其明有玉其潔桓桓其勇夬夬其決孰撓斯曲孰鍊斯柔善善豈親惡惡豈仇雖千萬人莫沮吾往如脂如韋有泚其顙侯符三剖憲節六持義㮣秋凜仁術春熙上亮其忠史載其信何勸不懷何懲不震碣石之北淮海之南社稷尸祝無怠其嚴滹沱溶溶霍岳峩峩其融其結百世不劘台鼎之崇芥視不屑京尹之雄莫仲與伯有烈終始無間險夷誰近而忽益逺益思汾川西流河水東會稷山之銘惟以永配參知政事王公神道碑至大元年汴梁路總管兼府尹王公年逾七十拜參知政事行尚書省雲南秩中奉大夫仁宗皇帝以公至元大德名臣拜昭文館大學士皆不果行延祐元年冬十二月七日薨汴私第春秋七十有九明年春三月十二日歸葬趙州寧晉之金符鄉換馬里中書以臺疏列公行績以聞贈通奉大夫河南江北等處行中書省參知政事䕶軍追封太原郡公諡憲穆元統元年冬其仲子承務郎萬億賦源庫提舉鈞以翰林侍制蘇君天爵狀徴銘公碑翀汴諸生也其敢辭公諱忱字允中世居寧晉曽大考進晦彩不耀大考守忠金承信校尉考玉太祖皇帝威行中夏率郡民款附從太師國王穆呼哩用武有功累官定逺大將軍慶源軍節度副使夫人王氏生公剛毅正直讀經史不事空言能見之行事裕皇位儲宫取勲舊子孫入侍公被選忠恪小心十有餘年日慎一日或因事進說明諒不阿世祖皇帝察其能至元十七年拜山北遼東道提刑按察副使秩朝列大夫東藩諸王鷹人縱暴民大厭苦公繩以法遂斂避不敢犯宰相哈瑪爾掊克固寵希合之徒言利徼倖小吏耿熙告北京宣慰臣逋官緡若干萬既聞勅徵之熙懼失實増益制敕逮繫百餘人公疏其妄熙獲罪裕皇賓天儲極虚位帝春秋高中外危之言者雖衆未見允可公建言陛下臨御多歴年所至元初預建太子天下歸心鶴馭上賓臣民憂懼惟早定大計以幸宗社章三上帝俞其言俄勑皇孫佩信寶撫軍朔幕大業廼定二十四年憲河南時南北既一無俚兇慝略民子女轉賣四方公謂此徒於聖天子仁覆天下之政梗害非常建請嚴立法禁從之遂著令甲息民汪清占息民籍已再世矣兵豪狀愬帥府曰吾亡奴也即馳騎數十殺清滅口取其妻孥貲產清子成逸出赴民有司愬之兵民文移往來數年不決潁兵朱喜始以避亂奴於人其主知其難於奴也集鄉胥里長同署券免之𨽻潁兵籍巳久喜家火其故主子謂券巳焚而復奴之喜持券出愬訟不決皆詣公愬之稽清占籍以歳壬寅其奴亡以甲辰喜券足徴白之鎮南王府誣者皆屈明年兩訟之仇結近侍誣奏公徇制下中書遣使收公案訊公疏臺請聞有旨馳召入見敷陳盡底藴帝大恱曰若人非素餐者敕省臺讌慰還職近侍及使者皆以賕敗清喜數百口脫虎咥繪公像事之二十七年置肅政廉訪司以新憲度明年公副使燕南河間鹽漕官守盜用賦緡十餘萬覈正其辜諸王分地恩州其下以錢貸民加倍徵息公令子母相當則止餘有罪先是以民入兵限私田四頃優其家公曰國家取天下以來兵無寧歳今海内雖定征戍逺方一兵歳費不啻千緡區區限畞豈易充給在民編者守令猶歳差富貧以均其力一入戎行永不可變請増田額使無饑寒内顧之憂不報其後以兵力乏竭敕樞宻召公等會議以真定順德廣平等路俾之詢簡得富民數百家充兵兵之貧者遣還民伍人服其平公以舊臣屢憲方州至是威名益振三十年拜廣西肅政廉訪使秩嘉議臺檄以其廉能曉諸道疾不赴成宗皇帝即位元貞二年春使憲河東召見栁林撫慰優渥會并汾旱饑請發粟賑哺全活者衆五臺大建佛廬敕中書擇銳事吏董役工部司程陸信驅民夫數千冐險伐木死虎豹蛇虺者百有餘人其時皇太后幸其所公入言以寺福民福未及而害己甚非初意也徽聽開悟減其役仍賜䘏死者家宗王分土并門廩餼歳取民間或不能供輒立契約毋息倍稱或不能償𨽻其子女民患苦之公請出錢縣官贖還其親者百二十四人於是諸王膳貲歳頒於官民瘼始蘇王嬖臣哈達布哈怙威肆虐公按正款伏王爲之請弗聽王馳使譖公上未信會駕北幸罪人亡走愬公不法敕中丞崔彧問之俄彧卒駕還復愬詔省憲雜訊之無騐愬者抵罪由是王禁戢藩傔民境晏寧大德三年遷江陵路總管不行七年遷汴梁汴故宋金都邑號難治公至省人憲人以公舊望不敢以府屬眎之政訟之難悉聽鑑裁下無隱情久之政清訟簡吏民歌詠方宋包拯公莅汴之四年歳次丁未河決原武注汴宋汴尤急吏士具舟楫以逭漂溺民大懼公白省請疏導順下勢家以田疇不利難之公曰吾守臣也當任其責即行河決壅以完城邑水息大築隄防羌族礮手居䣕陵者萬餘室民役不預公督使趣工得萬人不日隄成民至今思之公精明有斷不畏強禦所至興學奬士脩政新民不專法令威愛兼行爲世名德故姚文公燧劉文靜公因與公游雅相敬尚蘇君公鄉人也時賢言行優於志載其言曰世皇天縱有爲公及陳公天祥程公思廉姚公天福皆骨鯁敢言視社稷民物利害若疾痛嗜欲在已才猷風采凜震一世庸夫庸婦知其姓字豈聲音笑貎爲哉天故生之以弼治效善論也公夫人張氏封太原郡夫人子男二人曰銳曰鈞孫男三人洙浩以胄子肄業成均淵幼銳鈞皆有學行翀固知之其諸孫爲胄子皆馴謹向學佳子弟也助敎陳旅云銘曰世廟帝運鴻惟永年仁浹義洽德崇配天咨謂裕皇左右前後侍衞僕從詢賢世胄時也憲穆宿衞青宫行必循矩言必見忠涵育有年一靜一動帝曰良哉才可試用卿貳東臬位四品秩碣石醫閭光昭化日來歸定省遂莅河南上觸廷怒下讋狼貪帝曰忠哉斯豈尸位丞相御史燕勞還轡皇鑑昭明飭新憲綱卿才而舊益礪干將太行西東鴻河南北草木知名山川正色棲遲晚暮尹汴四封宋陳許鄭春陽誕充偪側將迎於此大府齒健而獰猶憚叵處上獲下順居五閱年華髪蕭蕭益壯益堅其巻其舒大義終始鋼百其鍊肻柔繞指五握憲節郡符再分洪波砥柱矻立不羣政預鈞輔逖矣其道文崇祕館允也其耄之顯高朗之幽神明之地列岳之天列星滹沱之郊邯鄲之鄙刻銘豐碑徵信惇史大元奉元明道宫修建碑銘并序老子生殷亳社苦縣厲鄉曲仁里距縣東不半舍九龍井在焉崇事宫廟歴代相因憲宗皇帝四年龍集甲寅故太師汝南忠武張王閫亳得太清明道兩宫遺址兵燼悉爲荒墟以文之燕請事脩復長春嗣敎真常大真人李宗師遣隱真大師提㸃石志玉通微大師知宫李志祕綜其務歳丙辰誠明真人張宗師奏請崇道真人張尊師棲雲真人王尊師主其宫制無幾何棲雲蛻化其門人輩亦皆協力崇道則始終不懈未踰一紀締構宏麗􅁢惟明道故宫以河渦混匯圯溺迨乎石李二公相繼爲真人結廬墾田充益歳廩事修治疏河流入北門繇是窪下澱而窿漫漶涸而燥至元壬辰棲神真人陳志微以陳道潤張道淵楊道和等率衆除荒實塹陶甓峙材凖基定位以陳志和李道堅等協襄事功達之長春元逸真人張宗師用道潤提舉宫事大德己亥棟宇克完百度鮮整棲真真人李志本薦道潤志和道堅等陞提㸃今凝元真人馬道逸飭舊圖新日益充大謂宜立石鑱銘示永久元統元年特進神仙掌敎凝和大眞人苗宗師召太清提㸃趙道真來京道潤志和等因馬介趙屬筆於翀昔也馬真人乘傳北廻嘗識於衞趙君用是惓惓遂不終讓序曰隋名苦縣曰仙源唐曰真源宫曰紫極追上老子𤣥元皇帝以本帝系築宫縣隅東北備嗣皇帝駕次之齊居㮄曰奉元天寶二載易紫極爲太清宋加太上老君混元上德皇帝名縣衞真真宗兩謁太清壇奉元之陰東鄉祝拜易宫額曰明道金仍其制錫良田豐祝事鴻惟太祖聖武皇帝奉天威君六合天寤宸聰使車馳召長春丘仙翁崑嵛之山厯數年踰萬里覲遐朔推道餘沃淵衷拯生靈仁萬有其功大矣老子亳宫之方葺也世祖皇帝潛藩下敎令即位錫以寶書申護禁朂匠役遣使致祭太清畢工敕翰林承旨學士臣鶚製其銘中書左丞臣樞書其文中書右丞相臣安圖樹其碑寵嘉之數滋隆往昔今道家殊流皆宗老子太清明道源本所在長春道葉主嗣亳敎知所宗矣翀惟大元慶運開兆李唐奉元得名元天陰騭今宜兼用唐宋舊額榜曰奉元明道以尊皇極孰謂不可趙聞之曰唯唯廼銘曰老聃之生於殷之亳微妙有無天地槖籥非隱非見仕周藏史龍乗風雲帝先誰子繩繩道裔上徳是宏儼像殿室堂陛崚嶒隋唐以來紫極崇峙𤣥教昭宣無間遐逺惟兹亳土九曲神湫孰源其泉孰洩其流振古及今緜數千載際我皇明華有餘彩昔我太祖雷厲八紘崑嵛赴召軒轅廣成坐進元言天心沃啓宇宙在手天慈救衞有赫世皇光繩祖武乾德龍飛萬物斯覩溥浹寰海如天之仁知風之自道系有真中統至元運開鳳紀因亳仙源厲鄉仁里嶽竦雲騰宫復太清濬鑑昭錫詞臣著銘趾邑艮方宫曰明道傾圯沮澤久未締造嗟哉岸谷變易高深逢我盛明抗起湮沉張肩王隨石孟李仲班班偉人繼拯元統至道坦坦至衆林林才角其力徳厭其心棲神棲真踵武徐起習馭輕轅通轍順軌載定其址載峩其宫煙霞洞府風雨幈幪山川㑹靈紫氣充盎羽衆式瞻淵宗有象邀食於地邀樂於天果蓏在圃稼穡在田聖祖神孫開此道域其寧不思荷帝之力瞻彼蒼昊有開必先奉元明道名豈徒然太清在東長春在北祈我皇祚永配無極中州名賢文表巻二十九
