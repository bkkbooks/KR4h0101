body:
  text: 中州名賢文表巻二十五明劉昌編王文定公記序祥露記先母夫人平時顧惲讀書作言辭喜見於色曰好此吾殁且無憾若汝長仍能辦日飯一盂啖我過於鼎餗榮矣亡後十有四祀方得廪食於官而菽水自供之養曾不少及第新婦推代中饋勞者僅六年風樹之慼其何有涯故每讀文正范公饗若曹之歎未嘗不撫巻流涕也甫十年不幸先君亦捐館以治命建新阡於河西鄉用明年百五日奉遷二親藁殯於沁曲𤣥堂纔開有二黄蝶飛出其先妣柩蓋珠露凝綴晶明煥爛駢羅角結殆寳幢纓絡䝉覆其上旦聞清香襲人觀者異焉天日照臨移刻乃晞嗚呼夫人自己酉秋棄養至是整十祀矣在窀穸間祥見如此恐非偶然也昔人有夢持炬下入祖禰壙中識者謂光昭先世之兆兹夢也或有異不異焉今野蔭之氣化為真露露膏澤也復聯綴而成雯華意者先妣之徳有幽光而未發耶不然將澤及子孫有以文而興起者邪開先之慶固當有在惲固不得而知也至元廿一年歲舍甲申正月二十有八日中議大夫山東東西道提刑按察副使男惲百拜泣血追記清蹕殿記維衞州太一廣福萬壽宫伏為憲天述道仁文義武大光孝皇帝赫臨之盛易常然丈室大起行殿邇天威而貯寵光焉既落成嗣師蕭全祐以其事上聞賜名曰清蹕全祐將文諸貞石以傳不朽謂臣嘗忝屬太史於法得書乃具其本末來請臣謹按初上之在潛也思得賢俊以俾至理聞太一四代度師蕭輔道𢎞衍博大則其人也於是以安車來聘既至上詢所以為治者師以愛民立制潤色鴻業用隆至孝者數事為對上喜甚錫之重寳辭不受曰真有道士也賜號中和仁靖真人冠帔尊崇之禮前後有加迨已未春鑾輅南駕次牧之野時師仙游已邈上以隠居所在特枉駕來幸周覽殿廡儀享丈室詢慰夙昔者久之所以欽挹真風懐思不忘且從五代嗣師居壽之請也及登天寳復降璽書追寵師徳有清而能容光而不曜富文學知變通嚮朕在潛與之同處何音容乍逺冠履遽遺殊用悵然之歎居壽等以遭際聖明顯異家教其臨幸之榮又為前代希闊之遇顧惟丈室罔稱淵躍思丕御天之構者念兹在兹繼承詔住燕之齋宫致有待而未遑焉建六代度師全祐既主法席首以繼述先志為切始克丕建實至元廿三年丙戌歲冬十一月也桓楹松桷孔㬅且碩藻棟文榱龍鸞交映内拱宸居穆穆中闢應門應門鏘鏘玉宇開于前方壺翊於後蒼官鉅竹儼侍左右其宏麗靖深宛然帝者之居望雲就日奕奕動色于以焚修頌禱仰介萬壽無疆之祉其於貯寵渥廣敬恭報恩徳而圖不朽者亦以勤矣載顧載瞻中外咸若轔轔焉如聽屬車之音肅肅焉若覩羽旄之美千古而下焜燿煒煌何啻振碧霞之孤風為郡國之盛事也臣以為自昔聖帝明王崇𤣥重道以萬乘之尊求一言之要者不過體尚𤣥黙企慕貞純載其清淨躋民壽域擴充無為之化耳如軒后訪道於崆峒漢文受經於河上是也以今方之越光顯有加焉異時史臣有鋪張洪休揚厲無窮之美者因蹟以求聖皇睿意之所在其于斯宇亦將有所取焉至元廿五年戊子歲夏四月廿有五日謹記堆金冢記國朝癸酉歲天兵北動奄奠中夏明年分道而南囘亘河朔衞乃被圍粤三日城破以州旅拒不即下悉驅民出泊近甸無噍類殄殱初星妖下流淇上羣兒氣吐成謡閧歌里陌間曰團欒冬半破年寒食節絶人煙之䜟尋罹厄實貞祐二年春正月十有二日也時太一度師蕭公當危急際以智逸去是年冬十一月師自河南來歸見其城郭為墟暴骨如莽師惻然哀之遂刮衣盂所有募人力歛遺骸至斷溝眢井攓逵破塞掇拾罔漏迺卜州西北二里許故陳城内地鑿三坎瘞而丘之復設醮祭以妥厥靈游魂禠魄薤露莙蒿同歸一竁其深林暮夜之號陰壁枯血之火熒沉啾寂無復光怪蓋因冥薦而脱異滯之幽依道廕而復坤靈之厚幽冥雖殊存殁兩有慰焉而師之掩覆仁心於鄉梓之義極矣今其封俗呼為堆金冢言人骨久而化金石也每歲清明後一日邦人聚奠以信些孺本宫為尸而祝之六代師全祐懇予文紀其事以昭先徳嗚呼三代而下以智力相角其勢不干戈血肉而莫之已何天地生物之仁反如是其盭哉豈周天之運厄㑹有時中來而不可逭邪豈立極之道仁義迹熄自取陵遲而然邪豈蒼茫兩間關係物盛而衰自然而然邪皆不可而必也第嘉師生平以道濟衆力茍可及不忍以一物失所類如此初師既葬主祐之延祥觀壬辰冬大兵至城下師懲前日河朔兵兇之慘復以一言活萬家於鋒鏑之下古稱澤及枯朽矧生人乎師之謂也向使師遭時得位其仁民愛物之功豈如是而已耶因併及之師諱道輔字公弼甫冠嗣主宗教後加諡號中和仁靖真人云至元十九年龍集壬午窮臘日謹記表忠觀碑始末記至元庚寅冬予自福唐得告北歸前次臨安客有以表忠觀碑為言者字作擘窠大書殊偉麗也詢之馬御史徳昌如所聞云觀在龍井不十里逺能一到其下豁先覩為快何如予以長淮迫凍為謝適鮮于生在坐屬伯機他日打一本惠及足矣曰諾既而杳然明年辛卯秋吾友傅君士開赴官兩浙仍託以取逮壬辰夏六月傳自杭特令人付來其碑作四巨軸裝演如法蓋亡宋故家物也噫坡書在霄壤間忠義之氣鬱鬱然秋色爭高雖片言隻字不可遺逸宜其世寳而力致之也故心存夢想求以三歲之久跨越江湖至自二千里之逺一旦高堂素壁如天球河圖𢎞璧琬琰對越左右誠可貴也左山云古人不可復作所得見者筆蹟而已况公斯文關繫世教令人讀之油然有忠孝之勸烏可祗以翰墨為之論乎然一一較之蓋即印泥折釵股之法也是月廿八日書於春露堂之扶疎軒創建伊洛五賢祠堂記大徳丁酉春洛陽薛君友諒即邵氏安樂窩故址起祀屋中設康節迂叟明道伊川横渠肖像庸致歲時香火之奉榜曰伊洛五賢祠神嵩清洛光動户庭明年秋來京師屬不肖為之記迺告之曰二帝三王修己治人之道待孔孟而後明立極垂憲貽則無窮不幸厄於秦雜於漢歴六朝隋唐雖有名公碩士間作迭出其氣量恢𢎞至道闢除異端奈智識不能直窺聖賢要奥擇焉不精語焉不詳又局夫章句文辭之末亂以功利禍福之説故學者汗漫支離莫知統紀時則有違道之士而無傳道之儒陵遲至於五季其斵喪可謂極矣伊洛諸公奮起百世綰持道樞探窮淵源克紹絶學内有以究聖賢規模之大外有以備踐履節目之詳故孔孟之教復明斯文得歸於正後學知所適從蓋二百年於兹矣然科舉利祿之習既久遽未丕變以極夫功用之至伏遇我世祖文武皇帝資挺上聖運啓休明崇尚儒術尊禮賢俊於是許竇王姚諸公宗伊洛學陳説孔孟立極垂憲之教以致二帝三王所以修己治人要道蓋已收明徳新民殊効於中統至元之際今内而贊助經綸外而佐理政化多前日執簡傳經之士推原本自則伊洛諸賢發明維持之功不為鮮矣雖配享學宫天下通祀可也况二程世家河南康節迂叟横渠聿來胥宇相從至數十年之久聚精㑹神推明訂正莫匪修齊治平之方性命道徳之理至於談笑遊衍亦皆格物致知之餘篤志力行清修苦節專以移易風俗勉勵學者為主今讀遺書按故迹其英邁純粹氣象尚可髣髴復廟而貌之俾向之景仰高風者足以致其誠懇今而後瞻拜清光者可以感其善心尚何俟贅蕪陋於其間哉敢以不敏辭友諒曰昔潮人修韓文公廟東坡有碑南雄起三先生祠晦庵作記謹歲月以示來者不為無例曰若扳援昔賢則不肖年迫衰老懶於筆研又瞠乎其後惟友諒先世為洛中名士其讀書慎行名簉仕版可謂不墜箕裘矣前任常徳府推復九賢祠今又剙兹宇庶幾有志於修已治人者非特邀取美名而已也是不可不書大徳戊戌歲冬十二月臘日記唐建昌陵石麟記唐昭慶陵在新隆平縣南十有三里使相鄉王尹里其石儀一十八事儼然具在内二石麟身首蹄鬛一與馬同第題顛有觡突出肉葳蕤其端所謂示其武而不用者也兩膊雲豔光拂􅀈鬛尾上揭類牛而短雖雨蘚模糊雯華剝裂而制度精絶可愛傳曰麟四靈之瑞麕身牛尾一角五彩色備王者至仁則被應而出又云視明禮修則至今刻像列諸陵闕豈顯夫祖宗生有至徳殁備盛飾以表其仁厚故耶既而入東南招提讀開元十三年縣尉楊晉所撰碑頌蓋知為唐皇兄宣簡公懿王陵墓也儀鳯元年高宗追諡尊號宣簡曰宣皇帝陵曰建昌懿王曰光皇帝陵曰延光仍配守衞者三千人勅象成令專知檢校州刺史歲别一巡其石儀之制固當追尊崇建歲作也寺即總章間立額曰光業由是而觀其夤奉之嚴守衞之盛累聖明禋之禮郊歌時薦之儀固云極矣今陵圍夷滅無復所見有荒煙野田而已嗚呼盛極則隨衰藏侈則厚發自必然理也上世葬之中野不封不樹何摸金暴骼之有文質中判古不能復然則何為而可漢之灞陵其中制乎至元十九年壬午歲夏六月十九日秋澗王惲記投壺引古之人心正意誠之學無或不在也予於投壺見之矣壺之義三代之遺制也自諸侯至於卿大夫靡不行焉或堂或庭野外軍中必設兩階以明賔主之禮置壺楹間取其中也北靣受矢尊其賔也兩黨相嚮比其誠也絃以貍首殺其等也鼓以魯薛節其事也勝飲不勝養弗能也司射申誠儆其慢也若夫左右盍簪臨壺荷矢身跛倚則壺不相直也氣渙散則志不能碇也手不端則矢弗能順也必也心正意誠神凝於内坐與壺相當扶與矢相應故的然而中無過不及之差豈非誠心正己之道歟且古之為學怠惰之氣不設於身其或少焉必有休息之具曽不以奇技滛巧令人心蕩而狂也故壺之義有足尚焉然壺亦兵象也與射禮畧同蓋兵凶戰危人情之所惡燕飲娛賔人心之所欲也先王因其所欲而寓其所惡於其中俾樂為之不厭則平日之所尚乃異時之所用也且漢唐以來博戲之事多矣獨奕之技行於今不廢然迹其用心傾危抵􅇖一著一機司明以之眊亂靈臺為之攙搶必决其存亡而后已傳曰性相近也習相逺也術之不善擇也如此悲夫予自憲臺秩滿居閒不出者動渉旬朔時雨霽堂廬清停披之餘無以休息用此以佐雅歌之樂庶幾動靜周旋其心一出於正方之既飽而嬉莫知所嚮者其賢乎哉其賢乎哉至元辛未夏六月望日序文府英華序僕自弱冠時從永年先生問學先生以科舉既廢士之特立者當以有用之學為心於是日就通鑑中命題或有其義而亡其辭或存其辭而意不至者課之以為日業雖云此何時也然觀多事之際斯文有不可廢焉者小子其勉旃及長年以來綿歴世故愈知先生之言為有徵至元三年予自魯返衞居閒痛悼墮窳日以書史振勵厥志因覩古人臨大節處大事征伐號令渙汗云為之際含章時發以之功業成而聲名白者良竊慨慕焉遂斷自戰國已上迄于金取其文字粲然適用於當世觀法於後來者得若干首題曰文府英華非敢妄意去取第類集以廣怡説其或從事力列屬辭比事庶有効於時實自先生之教之中來也是不可不序四年丁卯秋孟三日引博古要覽序予性澹癖無他嗜好獨於古彛器愛而不置雖造次必摩挲瞪視辨其名欵為何代何物間有所得則悚然起敬想見當時氣象令人有不能已者第所見不廣究其義未詳耳十四年春余入翰林四十有七日侍左丞相耶律公於玉堂坐間出宣和博古圖三十巻示予因假以歸與院史趙復取鍾鼎韻歐陽子薛尚功欵誌吕氏博古李羣舒考古等圖參讀而節約之觀其制作之精微錫用之所以篆籀之古而不苛文章之雅而不迫取物象形垂儆萬世其為法深且逺矣因念三代吾不得而見之得見是器斯可矣矧微辭奥㫖引據攷證於粲昭著生平所疑前賢或闕而莫可致詰者一覽而盡得怡然理順渙焉冰釋筆削既已從其類而作若干巻題之曰博古要覽客有過而笑曰子之學弃俗尚從寂寞惟恐其不古也其如適越而冠章甫何予應之曰不然方今明天子御極神聖慈武撫四海而有之禮器縟典將維新是圖一日告功神明郊祀饗獻之禮行有每事而問者據所得而告之曰此鼎也彛也卣也匜也爵也罍也犠也象也如是而已其於魯兩生間安知無一日之長乎客笑而退於是乎書以為序潔古老人注難經序醫之有難素猶六經之有春秋易也書雖盡言言不極意神而化之存乎其人潔古張先生醫師之大學也以是書注釋雖博未免有仁智殊見體用不同之間於是研思凝神探索𤣥奥發遺意於太素之初出妙理於諸家之表使體用一源得失兩判復隨其應證附以禁忌方論述經解廿四卷先生高弟東垣老人以其書授羅君謙甫兵後文多墜簡及得田氏口傳易水遺㫖百餘條苴補脱漏遂為完書予嘗觀其㫖要顧天下之事未有不極其理而能臻於妙者矧醫術精微主司萬命惟其至精非一世之所能備惟其至微非一賢之所能窮故軒岐開天如大易之畫其卦越人撮要猶三傳之贊其經迨潔古講解古今之善傳注之能事畢矣誠生民之命脉醫學之淵㑹也嗚呼醫固難事學即能至至於提挈造化㑹歸一身如秦扁闚五臟而洞癥結察形聲而辨死生推原本自心融手應坐收神聖康濟之功要以理明學博精詣其極有不期然而然者其功用之實咸在是書學者宜盡心焉而太史公稱扁之術得於餌桑君之藥飲池上之水特以診視為名恐未之思耳謙甫將板行以壽其傳求題諸篇端予嘉其學術及物之外能光昭師道如是可謂知本也已先生諱元索易水人潔古其自號云至元十七年歲次庚辰中伏日記新修調元事鑑序士之有志於道者當以聖人為則有志於天下者當以宰相自期降是夫何言焉然宰相者輔天子坐廟朝經綸一世豈偶然哉是在彼者得之為有命而在我者烏得而不盡之哉况相之為任正己以格君心之非進賢以盡知人之鑑理物以代天地之化盡誠以成天下之務尤需以學術而為之先若不學無術則闇於政體是最大臣之所深敝故賢如傅説典學初終聖若周公思兼四事逮夫叔世多故大學之道不明於上爕理化為權衡論思變成機務相之徳業其所存而不亡者幾希矣此事鑑之所以作也嗚呼三代而上如禹益稷契其謨猷徳業光極臣道日星麗天尚何議擬故斷自殷周已來終之近代上下千有餘載間其相之賢否具列無遺俾歴朝之用舍一代之安危前後鱗差易於即見至若善或當與詳其所可法惡或可奪書其所由然凖以夔契伊周之所行斷以孔孟諸儒之正論間以臆見附之要本徳學材識公明正大以道事君為事業經綸之最至如遭際聖傑不善更化祗以權謀功利為尚雖濟一時而不可多得終非鑑之所先務也僕老矣壯而所期見於世者百不能一必故朝夕覃思是編庶成一書亦畎畆不忘之心也俾後之君子有志於斯民者識前言而明治體稽往行而處事機其於衮職不無少有補焉至元二十年歲次癸未夏六月十有七日序顔魯公書譜序古人以書學名家者甚衆今獨取魯公而譜之者重其人以有關於風教故也兼公之書上則窺三蒼之餘烈中則造二王之微妙下則極古今書法之變復濟之以文章氣節之美故後人作之終莫能及東坡云評書兼論其平生茍非其人雖工不貴昔莆陽鄭樵嘗集公代有金石刻得七十有五予之耳聞目覩洎有其名而亡其書者得六十有二備錄家藏實有五十有一只以澹僻酷愛營求三十年之久纔所得如是念其嗜之無力自非夤緣物聚於所好亦已難矣嗚呼公之書今存於世者無幾加之歲刓月敝有劘滅而已可勝惜哉若夫千金之璧為世重寳人能碎而不靳者以求而可復有也若公之書寧復載得邪故余作譜按公春秋與所書碑刻歲月官封詳考而次第之俾觀者知公之書因物賦形變態百出其胷中忠義之氣葱葱鬱鬱散於筆墨之間者至終老而不少衰所謂止見性情不見文字令人想見當時氣象有興起而不能已者是不亦關於風教者乎譜既成客有過予而問曰二王乃真行之祖顔陳縱横曾不踰矩曷若即而為法乎余曰不然孔子吾徒之願學也然升堂入室固當有序若即此而求臨池之妙則思過半矣客謝而退至元癸未得伏日序上巳日林氏花圃㑹飲序四序言讌氣有慘舒不無哀樂從違之間維暮春元巳物華澹豔極夫舒樂者也故昔之人迓續維新祓不祥於川流之上其來逺矣然例以三日為節緣不克與已㑹者蓋尋常焉今歲人和氣稔適與己契又可重也不揆援永和之舊例嗣舞雩之清音徵賢合友禊飲林氏花圃尋盟而至者凡一十二人於是登野彴酹清波折栁脱窮秉蕳即宴歌絲間發羽觴交獻不數行四座紛然迭為賔主酒既酣秋澗老人繼以栁圈新唱詠四者之來并喜三樂之同集揚觶娱賔傾冠倒佩不知其不可也已而客有稱於坐者曰昔㑹稽諸賢禊集雖雅未免因述梗懐俯仰今昔動終期歸盡之感今吾與子一攄底滯增暢老懐顧知己而無雜賔聆歌聲而免詩苦以此方彼疑若可繼樂有所踰也是不可以不志明日弟沈輩來解醒首賦佳篇乃以其序屬余余亦以㑹鮮離多樂之不易再也筆泚餘酣率爾而作時至元二十四年歲在丁亥甲午日也謹序編年紀事序史書浩博殆藥山然用之不盡取之不竭弟掇之者不易區别編紀之書有不得不作者然務博者或詳其不必書從簡者至畧其所當取斯蓋漫然中無所主故也大抵觀史者湏當見其一代興衰之自要本不出君與相好尚治忽而已如賢否之用舍治亂之所由生刑政之寛虐民情之所從易安危之機截若影響此理之必然也是皆吾儒法之而為明時治平之具者得不詳且備歟若筆之而無所用則上下數千載之事績特斷爛朝報耳廿一年余解印西歸休焉而無所事日纘相務為業編年者尤不可斯湏而去手遂與韓生𢎞因其舊編增而廣之事備於前統明於舊若夫世主之御天接統輔相之登庸宅揆前後繫屬一不敢闕所謂該夫運之盛衰者則思過半矣明年冬既斷手生曰增輯之意不可不序諸篇端吁吾年向耄前日所進今日不覺其忘小子其秘之於以備吾家藥籠中用可也時則二十四年丁亥歲夏仲日序禮部尚書趙公文集序至元丙子夏五月予考試河南道出臨汝館望崧樓者再宿歴覽後圃總為塵迹所謂汝海虚舟者於蒼煙老樹間巋然獨存因得防禦趙公亭記於壁間倚杖披讀者久之令人想見承平官府之盛惜公遺文不多見也後七年予自齊還衛日與公孫維𢎞杖履倘佯言笑者無時一日出耐辱集一編示余曰此先祖通奉君之遺藁也予請而讀之者數日得辭賦古律詩及雜著樂府等篇若干首其氣渾以厚其格精以深不雕飾不表襮遇事遣興因意達辭畧無幽憂憔悴尖新囏險之語信乎太平君子假樂有餘而神明與祜者也維𢎞遂以集序見屬予曰以遺山先生之論之詳此固以為之足矣然士君子之學文章徳業名為兩涂其實一致有以事業而垂世有以文章而名家者傳曰我欲載之空言不如見諸行事之深切著明也吾儕孰不欲得時行道使利澤施於人名聲昭於代蓋有幸不幸遇不遇者焉如仕宦利達復擅文雅以事業盛而揜其所謂文者從其重焉可也若文彩絺紩竟不得以片善及物者其或曰若何克為一文士而已此真為妄人尚何知兩塗一致之理者哉既為其序且寓夫予之所感云先生諱思文字庭玉明昌五年進士官至通奉大夫禮部尚書初河朔雲擾公流離兵間挺身歸國遂為徳陵所知故其仕宦通顯而為兩朝名徳一世之龍門者云至元戊子秋八月朔旦謹序星丸漏詩序司錄判官趙㝢到任之明年置星丸木漏於衞之汲門上仍繪采為圖擕之來謁再拜請題辭於後予以為政有緩而似亟事有微而實著者更漏是也雖因象制器特挈壺氏一士之職也然天地朝昏我則司之官民勤息我則警之上而日月運行於三百六十度之中外而二氣渾侖磅礴於三十七萬里之表使不出於三尺之幈百有餘丸之數非格物善政者其能之乎予嚮官平陽亦嘗創此其攷述測驗知為匪易今司錄小秩也首此為務舉行廢典其儀物有足觀者是欲勤政率先因器警民者矣然年少氣鋭當從仕之初能推廣是心始終罔間則張希顔以夜漏嚴明等數事得稱為好官員者恐他日不難至矣至元二十五年戊子夏六月入伏三日題老子衍義序壬辰冬余應聘至都既館壽宫嗣教𤣥逸張公與一杖者相陪來謁䰅眉皓白氣貌魁偉敦兮其若樸聽其言冲冲然殆有所深藴隨見所賦詩顧非澹泊忘言者尋西還求辭方知君為重陽宫主𤣥學師也既而其徒執老子書請見稽首再拜為致師求序取重之懇避席拱立需命而退因勉為説云天下所謂聖人者以其理之所在治從而出焉舍是何所望於著書立言者哉然聖道溥博該貫羣倫其為用也為天地立極為世主明道要不過以靜制躁以簡御繁以直黜偽以樸還淳以正息妄以公去私以理勝慾以法防亂而已惜也老􅆅氏潛輝柱下不出於文武周召之時當王道中微禮壊樂崩仁殘義缺之後萬偽並作猝莫能觀其復思逺駕流沙高出物表抉天機體𤣥化吐辭為經過為奇憰憤激自成一家之言庶幾廓清澆偽再造堪輿之意歟雖然矯枉者必過其正迨夫末流仁智異見戸牖各開曲暢旁通肆為駕説養生者以久視為心尚𤣥者以清談為樂宜乎晉史譏王政之虧知幾㸃河公之注今玉丈蜀産皓首𤣥學獨能㧞出衆流間索正岐根於治平者為多無乃見幾而作由儒而逃墨者邪故特樂而序云紫山先生易直解序紫山胡公年未强仕應奉翰林潔居官舍者幾十載致力讀書究明義理期於逺大取易卦辭徧書屋壁時不肖忝在言列過而見焉詢其故曰吾朝夕洗心將範模四聖人庶幾言行適宜而寡尤悔焉非特説夫言奇而法也識者已以通材有用許之爾後郎地官佐省幕總尹大郡提憲外臺平生藴藉見諸施設其至公正大之論卓異特達之舉固不可枚數要之伸吾道行吾志不阿合取容於時不俯仰勉從於衆可行即行不可即止又其晚節脱屣軒冕笑傲林泉進退兩間知命隨時從容中道蓋棺論定皆曰紫山曠達英邁士也稽驗疇昔諗其得於易者為多初不知其有所著述公没之三載嗣子伯馳擕所著易解懇題其端公與僕自弱冠定交氣義契合互為知己今雖衰懶撫其遺書忍無一言發越潛輝夫易聖人憂世書也純粹精深通貫三才理包萬彚其用心須見於開物成務之實然通其變必當達其辭達其辭欲見諸用者不於先覺躬行踐履之實跡而取法焉未見能造其窔奥也昔宋名儒劉斯立作學易堂記但序日用常行事而曰金學易矣論者以為得體况紫山踐履功夫形諸事業復推已所得纂而成書啓廸後人可謂得聖賢忠恕之道矣學者復能考公平昔操履得其端倪以之尋繹隠賾奥妙之㫖則思過半矣大徳二年冬十月八日謹序遺安郭先生文集引關輔天下形勝地有終南太華洪河涇渭為之襟帶姬周之所積累漢唐之所經營雖時異事改彼忠厚雄傑之餘風山川英靈之萃秀而在於人也意其必有瓌奇文雅之士生乎其間僕嘗思一遊求其人與之縱奇觀歴遺跡羡河山之良是歎興亡之無窮豁達芥蔕以忘吾憂寤寐平生未遂斯願至元乙亥冬猥判晉幕夤緣迎謁抵華陰東歸殊悵然也爾後每自秦雍來者必為訪問雖得其髣髴而士之隠見初不知也大徳庚子春方謝事不出有客叩門剥啄自稱奉先郭良弼嵒甫􅂝示先世遺安先生文集請引其端細為披讀蓋信道篤燭理明攻詩文為顓門之業者也豈非向所謂瓌奇文雅之士乎雖未西遊其山川人物已在吾目中矣奈何衰老懶於論載請益勤乃勉為之説曰文章雖推衍六經宗述諸子特言語之工而有理者爾然必需道義培植其根本問學貯蓄其穰茹有淵源精尚其辭體為之不輟務至於圓熟以自得有用為主浮艶陳爛是去方能造乎中和醇正之域而無剽切撈攘滅裂荒唐之弊故為之甚難名家者亦不多見惟周卿先生天資冲粹内守峻潔自幼力學為健舉子中年流離不易所業故徳望彌高文學益富致逺近尊禮又少日以外孫行接際蘭泉先生所交麻叚孟李諸公皆秦晉名士其資之深學之博與夫淵源講習可謂有素矣故詩文温醇典雅曲盡已意能道所欲言平淡而有涵蓄雍容而不迫切類其行已靄然仁義道徳之餘孔子曰有徳者必有言信乎其有言也所可惜者連蹇塲屋不遂一第侍謀省幕道弗大行然化乎今者不必傳於後晦其始者其終必顯曰顯與晦必時之待揚雄氏所謂五百年必得其人然寥寥四海豈無知音者恐瓌奇之言乃為通論况有賢子孫為之揚顯者哉今文治蔚興學者日衆異時板本一出有序關右之宗派究蘭泉之命脉者則於是集知所崇尚矣中州名賢文表卷二十五
