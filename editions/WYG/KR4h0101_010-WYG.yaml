body:
  text: 中州名賢文表巻十明劉昌編姚文公墓碣國子司業滕君墓碣銘觀漢諸碑凡門生為師作者其文多稱在三之義盖本欒恭子民生于三父生師教君食惟其所在為言又列郡邑姓名字官人出幾何錢于碑陰多至百人或倍之令人毎興今無古者篤於其師之慨至大己酉燧長翰林之明年國史院編脩官東平蔡文淵狀其師國子司業滕君之行與門生許質求表其阡以君之再入成均横經丈席者嘗數百人礱石所資一不偕人出二子獨加異乎古豈不於在三足拔浮俗斯時耶君諱安上字仲禮其先自洛徙中山不可推采其世考府君某隠德委吏斗食自捐生君八年而不祿妣李夫人撫君誨曰而性質開朗記識兼人且金名士趙燦離孫不可以貧廢學感聖善言師西巖君克自砥礪勤心聖學暨其長也尊聞行知如不足日私居自持衣冠齊遫及出接物一誠以和郡無少長相謂不字咸稱先生學積其躬道行其家化及其鄉府臣歸髙薦名於朝敕教中山是府多士求親輝光謦欬欲聞鼎鼎其來服縫掖者將半齊魯庭臣善其職士有聞用以職民主禹城簿壓于為監為令與丞刑或過中必揆以義馴馴上説不使黥湼妄加疑盜廢棄永世仁譽既章宣司所臨若縣與州事有未竟必檄往治裁中情法守令憚之出將入迎若事大吏徴為國子博士以其平昔自律為先蚤作晏休誨誘諄諄發䝉疏疑立懦尅剛各因其才矯拂于善黨坐羣行齒而序之其極弗率有黜與扑成均作則井井有條即升監丞再丞太常世祖賓天成宗繼序圓丘請諡太室升祔凡厥禮文酌古損今皆所訂稽元貞之元拜監察御史京師地震上疏曰君失其道責見于天其咎在内庭竊干外政小人顯厠君子名實混淆刑賞僭差陽為陰乗致静者動宜兢兢祇畏側身修行反昔所為以盡弭之之道其説累數十百言反覆深切有司不敢以聞君則曰吾不得于言者遂委印去反闗其家著書自怡尋起為國子司業時已疾矣顧言其子治䘮無用二氏以其年乙未夏六月廿有五日卒年五十四葬府城東南崔丘里為文一本理義辭㫖暢達不為險譎非有禆世教者不言有東菴類稿十五巻故江西亷訪使趙秉政板之行世矣又有易解洗心管見藏之家亦多乎哉其不年者世同哀之而文淵猶以不侍經筵職絲綸謀廟堂為憾嗚呼夫既師成均官奉常歴臺諫而又有德有言足矣奚必兼彼數者始為至耶夫人李氏貞順柔嘉姻里範焉後君八年卒子翊去尉東明自致終喪亦足彰君刑家之自今尉元氏兄羽有文行蚤世銘曰孰不曰士於學始志迄用有成千百一二允矣滕君敏修篤行鐘鼓衡門益大其聲勅起布衣於定敦教祁祁縫掖來則來效再主禹城簿領勾稽不枉刑墨仁聞日躋滿秩而招入為胄監由博而丞俊髦是範轉而奉常禮文斯綱或革而因酌損用章遷拜御史為帝耳目言責塞求龍鱗逆觸一不見入納履而行反闗立言行後是程方徴司業年過知命遽啟手足理也莫竟短者已而其長斯存何以貞之石有誄言河南道勸農副使白公墓碣銘彦隆始由太原徒行至河内致其父書魯齋先生願游其門未有介也乃因吾友翰林侍讀髙凝得操几杖主凝家二年而歸侍其親而先生亦召北矣尋由避宅左揆以集賢館大學士祭酒國學教貴胄乃奏召舊弟子散居四方者以故王梓自汴韓思永蘓郁自大名耶律有尚自東平孫安與凝燧燉自河内劉季偉吕端善劉安中自秦獨公自太原十二人者皆驛致館下三年吾儕或病告官去而先生亦浩乎其歸乃奏有尚與公從仕郎國子助教昔者貴胄友也一旦能横經下心事之為師屬非其道聳是曹不可得其馴然北面俄侍裕廟東宫公為講鄭伯克段于鄢巳講而出裕廟語人曰是非空言意固有在也以國史院編修從仕郎仍助教擢奉訓大夫監察御史發阿哈瑪特賊國諸不法彼顧誣公糾摘非實捕送刑部獄引鄰婦有色者教誣公嘗竊往來怒鄰婦力明其無有鞫之墮孕而事始白又糾鷹師西京宣慰使道拉實以已憾殺其幕僚凡是皆庸懦縮首危者而峻風節者咸偉之出簽陜西漢中道提刑按察司事燧亦為其道副故得詳西上所為其按歴皆分險僻荒寒諸州南而褒鳯金洋北而綏麟葭丹塗經龍門西河絶崖髙可去水百尺止通一騎必遣導者先之有來騎使駐之寛所卒至則兩不可班視燒棧猶車衢也如是之地皆周焉制度卒有反者不即覺捕惟罪社長監郡與憲司麟州人告陰濟民乗馬疾馳其識仇也問曰所懷何書濟民紿以反書仇上變延安延安移文吾憲公又請往治之所牽連二百許人繼燭治之再旬是州小僻無紙至覆舊案以書適近侍臣括馬其州館鄰牆也聞獄吏呵問終曉得公姓名歎曰世有克勉其職如斯人者使人勞苦之曰吾見陛下當首聞公竟白濟民無佗特杖其紿仇非冝言者公位憲諸君下㑹王相府拜巴哈右丞勲臣子開省京兆特異禮公其按問諸司皆拱聽者改僉河南河北提刑按察司事臺檄檢覈中興鈔庫中興故李夏都𨽻隴右河西道憲令竟事始聼東任公又走沙莽往復近萬里半嵗而歸與其副程思亷發數縣民完堤以捍河水罷當暑賦民牛車轉粟入淇又改僉燕南河北道提刑按察司事趣裝其考巳疾行至衞而卒公與兄楹即藏衞西輝之蘇門周卜村南原而其妣亦疾乃朝夕哀死事生即授教于輝明年燧召直翰林感其毁瘁骨見衣表弔哭之餘其徒數十人拜庭進退朋讓賓敬之道囂囂然先生成法也為嘆曰嗚呼燧亦先生弟子者何嘗有一善及人如是明年燧疾滿告歸鄧而故司農卿侯爵託語彦隆或河南北農副制下必墨縗以出世議隘薄自便非時燧傭車過衞不可留不得身見為書語其然聞方督課有績其妣亦卒附其考墓竟以是謝所事以至元己丑秋八月三日年四十六卒苫廬嗚呼學可以範世行可以礪俗而已是哉夫人賈也以燧平昔善公録河南北道勸農副使茍宗道埋辭求銘神道毎一讀之一抆淚擲筆數年終不能叙其事去冬以史事又召入翰林過輝夫人祈世母夫人為言持幣泣請且使其子安禮與游其門者庭拜燧還其幣曰吾無答吾亡友者以是佐刻石碣嗚呼非公仁義行家能使婦人如是切切惟恐沒其夫子一善可曰賢已公諱棟考天禄雖官而不顯居頥樂堂號順樂先生唐白居易家狀云白姓家太原者楚熊君孫勝白公見殺于楚其子奔秦孫乙丙與裔孫起為秦將封武安君賜死杜郵始皇思其功封其子仲太原公豈其苗裔耶銘曰聞古五十年不稱夭公是不盈天道未曉學不篤耶得譽先師道不行耶裕廟嘗知職不舉耶三憲著效力不本耶耕播之教况冠獬角敢言人難彈射柄臣聽者毛寒猶枚其外未及其内視親于喪觀婦于介靡一匪善靡一可涼非我友私月旦章章嗚乎白公耳孫猶令其貫古松嵗逺滋勁士不盛位而盛吾賢盛位者衰盛賢日延有方其趺有剡其首碣石阡隅千祀無朽河内李氏先德碣銘至大庚戌鄃王府長史兼經歴典食司與所部人匠都府官李惟恭持其鄉士席雲漢狀其祖潤文玉使懷之利用庫日民調商征之入吏禄公須之出不遺於受不僭于發如他人侵蠧以溢其家負而責償罪沒産者皆無之與交人以誠御下以寛禮賢樂善者求表其阡燧曰管庫之官則古委吏亦下士也所可筆者豈專由孫貴耶盖鄃王之考初尚主世祖再尚主裕宗自稱晉王克用裔孫為置守冢數十户于雁門禁民樵牧由分地在髙唐即是進爵為王世居静安黒水之陽為廟以祀孔子元貞始年賀表聖節獨書漢字庶其尊禮斯文者惟恭今臣其子觀其所事者賢若不可辭矧有大此者懷之為州憲宗大封同姓初國世祖于秦以户寡益封之至元之末以封其孫順宗既之國未至疾返成廟賜名懷寜以王今聖時方撫軍于北皇太后儲皇往居者二年則懷為三聖龍潛之地傳曰小國之君當大國之卿為下士是邦者當宜何哉則君善職管庫者有不必言矣卒以大德乙巳三月十有八日年六十七垂絶猶念惟恭不置曰吾平昔鍾愛是孫今逺宦數千里不及聞吾顧言可憾也哉妣王後二年亦卒二子從鼎從信孫則惟恭其長初由王府郎中羅忠國使懷聞其好學慤有立志遂與偕北即婿其家進之于王王甚禮之言無不從事必見咨妻卒賜楮緡二千五百為娶元氏子季惟寅銘曰荀卿子言臂非長升髙而招所見彰斯若可用為君方惟懷為州河之陽實為三聖淵龍鄉其間下士雖守藏或小大國君卿當其貴可參攀鱗翔况復有孫翼賢王逺塞而近孔子堂仕優學以能自强何畏潛德無輝光故提刑趙公夫人楊君新阡碣銘維蔚州蜚狐趙氏系不可逺本繇今江西湖東道肅政亷訪使秉政而上推得二世祖崑金帥府評事卒𦵏其鄉二子珪瑨珪將萬夫戍蜚狐後遷刺蠡州留瑨在鄉守舎天馬南牧度形勢不支倡縣民以城下之從大師國王徇地至蠡其刺猶城守礮殺王悍將蕭大夫王恚欲阬城公請以身贖母兄死王哀之并全蠡民以戰績毎最進冀州元帥虎符復推與其兄廷議多其悌讓改公冀州軍民總管别錫虎符入覲受知睿宗承制監易州再遷行省中都金平監中山府當憲廟世世祖方淵龍收召聞望之臣求治道之冝今者置經略司于河之南宣撫司從冝府于陜之西行部于秦都漕于衞東西二千里道不拾遺而邢則今中書右丞相之祖封國政弛民散最號弗治求潛藩制官惟嵗入其貢賦為安撫司後邢易為順德升州為府乃以近故太師廣平王從祖托克托與公為㫁事官位安撫上公年盛强俾與開國勲臣苗胄為友則潛藩期任公者巳不小矣世祖踐極制監真定路位總管上俄遷順天路宣慰使肇置四道提刑按察司以公使燕南河北轉使河北河南累章請老不可年七十九始聽歸卒年八十三以監中山有田朱固鄉不返葬飛狐即塋是鄉堯封原亦昭時崇顯夀考人也夫人既同享有其樂公當不恙亦以官植業順德盡析秉政夫人從養及子貴食其禄以終年八十二不及公才一年何夀考萃是一門哉因惟女子子天父天夫者也父不能必子之貴能之者夫子焉耳而難其全今之儲才將相係望海内者毎在乎風紀之官夫人以提刑使之妻而母亷訪使詩曰教誨爾子式穀似之彼奕葉襲芳不隕世德夫人之功亦鮮儷哉古邦君之妻人曰小君禮士喪妾不得匹其夫必曰君妻曰女君後世封羊祜妻為萬嵗鄉君則令甲郡縣君之原可為今不敢氏夫人而君君之凡其不反葬中山即别塋順德李馬村若不同穴記稱合葬非古也因求之吾家巂州都督文獻公開元宰相考也葬陜之峽石百官咸㑹焉及妣夫人劉氏卒則葬萬安山萬安嵩髙西趾去峽石二百里耳以唐相之貴月入俸錢三千緡有力不足于至哉則不合祔者亦從古也今秉政斯兆未必始亦由此燧以其於古有徴為發之夫人生三男二女男秉政秉彛秉衷女適焦簡周某孫男女九人秉政又曰吾他日亦域是嘗聞諸師古人不諱死惟不趨取死之途今之人鼎鼎焉惟死途之趨復苦諱死亦惑哉如師之言則秉政不徇流俗語身後事于其生亦庶幾古達者也銘曰襄國所直趙南魏北其西太行冀方四塞求田惟良宜莫如襄衍沃平平千里其疆生家其間沒即斯瘞奚取日者風水焉泥孰陪平原如阜而尊左之右之昭婦穆孫天厚其門既夀既祉流澤淵淵未艾來只世生顯人如夫如子故金甄官署令魏府君墓碣銘燧還呉中過廣陵日今嘉議大夫行臺御史中丞初請曰吾祖靖肅公顧言以吾曽祖甄官署令即死所藏亂離失其處他日必虚為丘先塋石載其事無使吾先人魂遊徬徉無所以歸而一善之或遺也子義為銘隨又遣其少子可亨拏舟廣陵五千里追之襄陽不及返而及之鄂授其考所輯家塾記曰掇是事銘嗚呼確哉逺而勞焉乃本之曰魏氏繇唐相知古子林刺朔州子孫居桑乾桑乾為今𢎞之順聖遼有延恕者生中奉大夫守成中奉生通奉大夫餘慶通奉生兠荅館酒使子貞兠荅實生甄官署令君諱允元改德元字信之甄官生進士特賜及第笏特賜生思亷即記家塾者思亷生初初生翰林院修撰必復可系者是九世其大于金繇兠荅弟資德大夫參知政事柱國鉅鹿郡開國公子平相世宗致治隆平祖考中奉通奉再世官皆以公貴贈兠荅及子隴石令景元甄官與逸其諱一人再世官皆以公貴廕君始監順聖酒改𢎞州酒使鄧州榷使抽稅設防有方與宜平不増斂姦無走匿額有贏籌民不苛之入副堂厨庫又為使改文繡上林兩署令同知易州入令裁縫署改令甄官署以卒年六十三官止廣威將軍夫人髙氏七男笏珫瑜琦玠璠玉琦太中大夫行部侍郎玠朝列大夫延安司獄璠翰林修撰今諡靖肅公與特賜皆以明經進士官珫懷逺大將軍耀州庫使瑜監豐利酒皆廕官玉進士未禄卒二女一歸同知荆州節度使事秦德美一歸其鄉右姓孫氏君究心本冨計田疇第舎牛馬雜樹直可為錢千者五萬嵗入粟為石者三萬嵗抽其十一為七子求師取友須令節休旬大集衣冠令枚誦所業覈其進惰已則鴈序立前侍飲前脩聲輝耳目漸涵化淪其心繇是成德達才多萃其門章宗甚嬖李妃夫人視妃母王姑也數召通籍禁中不可後從秋獵易州君方除道橋諸水復召曰吾思與若晜弟語久矣終不能一致今行之所在是而夫子倅是便且時也無終見避之深夫人以君出不敢專行俾子瑜請之亦不可曰是家膏也親將汚人人有為不善者不畏取戾府縣惟憚君知兵興下令急甚敢有舎奴婢亡命不告者罪及其鄉人猶利其傭輕私役之覺則殺以滅迹或致大獄君時鄉居聞有出入非常者召問得情嚴其錮防書致其主歸之約示薄威以懲其再無殘其生終不語其主以獲之誰舎所也比卒免家僮久故者民之作詩與斯世決沐浴冠衣揆日而逝君之孝友天得非學其使堂厨以鉅鹿公子叔元未仕曰大臣子故屯其膏澤不見及耶三求推所居官縣官以故事無有不可又恤其無子以靖肅後之靖肅又無子顧言後初則甄官子孫世世圖報鉅鹿者何如也其家塾自序曰繇吾季曽鉅鹿輔政兹降修仁潔義可謂曰久仕之達者列品而九不過中中天嗇為報將待夫後之人耶最初之仕外僉提刑司事為副為使入為監察御史治書侍御史侍御史御史中丞三十年間風憲之官無不揚歴司清議者猶大有期曰將不已是於今嗚呼自序君其知子哉矧必復于靖肅公克世其官可大可久與亨學行嶷嶷可述銘曰反覆觀先民吁可哀積充報衘身期後來門令容駟馬堂三槐必貴于天者如取懷惟中奉亦然祥用獄至鉅鹿再傳既鈞軸官不私其子甄官承承三遜其季叩莫譍又仁厥乏祀修撰繩官以祀比言祀則大以今修撰孫後者再小宗既顛蕃大宗賴藏偶失故所魂依依招之從先墓來如歸膴膴桑乾原終天地碣孰華其文太史燧領太史院事楊公神道碑嗚呼有秦君子楊公諱恭懿字元甫其先始鄉耀之同官中避宋亂徙美原五世祖儀徙今京兆之髙陵與髙祖亨再世力田曽祖植祖禮再世仕縣吏考天德擢金興定進士第由博之聊城丞掾陜西行臺權大理寺丞主京兆長安慶陽安化簿辟令順德之隆德及安化而安化兼録事州之判官三職具修積官中大夫其德其烈有先師司徒許文正公墓誌言章宗南郊為太常臣授幣而立御史將劾不恭其友曰夫夫習于禮者名行秘書盍從而問曰授坐不立御史慚縮而止太常則孫公通祥實公外王父公以至大乙酉生于其居京兆之雙桂坊童而讀書記識强敏日數千言時艱從中大夫逃亂而東不恒其居於汴於歸德於天平雖間闗險阻未嘗怠弛其業年十七侍中大夫西歸無田于郊假室以居鄉鄰或繼其匱皆謝不取惟服勞以為養暇則力學綜博於書無不經目而究心者摳衣之徒户外滿屨横經入問為析疑義源源其辭若決江河而下之名聲日延海内搢紳友太中者馳書交譽知之膚者求觀其文侈其肆者以為鱣堂之席有繼與其極者直期以宗盟斯道於將來時已邃易禮春秋思有纂述恥為章句儒而止志于用世反覆史學以監觀廢興存亡理亂得失于千數百年之中曰輔治之具禮樂兵刑禮樂非王者果為不可興行于天下兵恃以芟暴亂而安元元刑取其弼教循本以求皆仁義之資也不講之有素或一旦帥三軍為士師貿貿焉不知其方反受成教武人俗吏乎事雖未試從可概見其佐王之略年二十四始得朱子集註章句四經太極圖小學近思録諸書誦其言而推其意歎曰人倫日用之常天道性命之妙皆萃此書今入德有其門矣進道有其途矣吾何獨不可及前脩踵武哉窮理以致其知反躬以踐其實動静云為一乎持敬行之以剛健居之以悠久日就月將俟其成功於潛齋之下自任益重前習盡變不事浮末矣嵗甲寅司徒奉潛藩教來秦公往見之際其道德之光聞其仁義之言于傾蓋頃歸心服曰世烏有斯人之倫敬事猶師而司徒友之亦至分庭而行抗席而坐一遇講貫動窮日力而所造益深平居訒于為言喪中大夫絶口水漿五日喪葬用牲盡祛桑門惑世之法為具不足稱貸益之棺槨皆黄腸衣衾必縛疏衰􅊡粥悲憂為疾杖始能興司徒㑹葬歸語學者曰小子志之世墜典曠夫夫特立而獨行之其功可當肇脩人極聚居六年司徒東歸喪妣夫人猶中大夫其疾益阽三輔士夫知由禮制自致其親者皆本之公先是宣撫司行省欲以掌書記共議事禄之皆不能屈至元七年詔司徒由國子祭酒拜中書左丞始與右丞相安童共政日譽公賢丞相以聞十年上遣協律郎申敬來召疾不能行十一年儲皇下教中書汝如漢惠聘四皓者其聘以來故丞相遣郎中張元智書致是命其冬下車京師上遣丞相弟今國王和童勞其逺來他日入見上問何鄉先德為誰從何師學子今有㡬無不周悉其夕嘔血上遣尚醫來候且賜之藥少間明年月正元日之翼日上御披香殿以大師南伐使久不至方念之深欲筮之時以日者待詔公車百數十輩獨以命公盖以其道德素著可交神明者其言頗秘侍講徒單公履請設取士之科詔先少師文獻公司徒竇文正公與公雜議上奏曰三代以德行六藝賓興賢能漢舉孝亷兼䇿經術魏晉尚文辭而經術猶未之遺隋煬帝始專賦詩唐因之使自投牒貢舉之法遂熄雖有明經止于記誦宋神宗始試經藝亦令典矣哲宗復賦詩遼金循習將救斯弊惟如明詔嘗曰士不治經學孔孟之道日為賦詩空文斯言足立萬世治安之本今欲取士冝勅有司舉有行檢通經史之士使無投牒自薦試以五經四書大小義史論時務䇿夫既從事實學則士風還淳民俗趨厚國家得識治之才矣奏入上善之丞相毎咨世務倚以自毗㑹其北征公遂請畢男婚而歸十三年詔改厯太史王恂總算同知郭守敬推測司徒明厯理或言公嘗推厯終一甲子而日月薄食者七十有奇曰日月之𤯝古無是之多也十六年召公著厯義十七年授時厯成奏曰黄帝迎日推䇿顓頊載時象天堯之欽若舜在璣衡周太史正嵗年以序事皆日官世守其業隨時占考以與天合暴秦焚書廢古偽作置閏嵗終兩漢因之建厯之本必先立元元立然後定日法法定然後度周天以定分至賈逵譏其守一元不與天消息杜預謂當順天以求合非為合以驗天者皆確論也臣今治厯廢厯元日法析舊儀六合三辰四遊而異之省天經黄道惟用四遊移天常赤道遊於南軸之下以取候視之無窒倍八尺之表而五之以影符進退其晷使不失于芒忽日日測考積月為嵗積嵗為世必於厯法益精益宻非但正數十年一改之弊且可上追黄虞三代之舊矣又曰一月之始日月相合謂之合朔漢太初厯用平朔法小大相間或有二大以故日食或不在朔先後一日時亦鮮中宋何承天測四十年得三大二小以正朔朢使食必在朔隋劉孝孫劉焯為定朔唐傅仁均取以造戊寅厯貞觀竟改從平朔李淳風造麟德厯得四大三小求避人疑間以平朔又為進朔使食避元日一行造大衍厯以為四大三小何害今授時厯後是二年當十九年自八月後四月幷大實日月合朔之數皆改從實方奏太史臣皆列跪詔獨起司徒及公曰二老自安是年少皆受學汝者故終奏皆坐畢其説亦異禮也授集賢館學士太中大夫兼太史院事明年以徙家得請歸又明年儲皇俾靈臺郎岳鉉召後中書議相承㫖李濤儲皇不可以公為識治再召又明年詔翊儲皇以為太子賓客二十二年召明年以昭文館大學士正議大夫領太史院事召二十九年以耆艾議事中書召皆辭疾不行三十一年疾亟親賓問之忽長息曰有是哉國哀也聞者危之亂以他言徐又曰誠哉後三日顧言子寅曰敬慎小心以卒實正月二十有五日也後嗣位詔下則賓天果以其日人以為平生與國至誠所格嗚呼使入哭者有如温公則公當亦如吕誨起言天下事矣徴士蕭􅆽誌其墓曰朱文公集周程夫子之大成其學盛于江左北方之士聞而知者固有其人求能究聖賢精微之藴篤志於學真知實踐主乎敬義表裏一致以躬行心得之餘私淑諸人繼前修而開後覺粹然一出乎正者維司徒曁公嗚呼誠知德不易之言哉後十年寅以江南行臺監察御史疾得告去自金陵過宣以燧少受知公而耳其雅言求銘墳道然所貴乎君子三焉耳德耳位耳道耳得于心之謂德用于時之謂位行其學之謂道如􅆽之言同其德矣未及位也以年考之司徒之生前公十有六其入見前十有四其卒也前十有三而卒官皆昭文館大學士領太史院事同其位矣然是位也皆極人臣之亞為古八命位實行道之鎡謂不得君知名而召既至則温其玉音以勞疾則尚醫交候饋藥太官繼膳疑政賜問入見坐語聞辭則留留而不可暫聽其去去而思之復召司徒十召公八召其體貌之亦至矣哉如是而兩公迭為循牆不可謂道之行亦天也雖然天道逺遥不可以已事而知必來者始見猶農夫焉未有播粒于土而不苗者今也四海匪獨士子凡筐篋之吏求售于時其誦而習亦先四書盖天理同根人心誦其言而衆則為其道者將多非兩公肇是太平之基其誰力歟斯古之人所以重歎其善作而不必善成者也公以卒年三月從葬中大夫之昭文有潛齋遺稿髙祖妣齊氏曽祖祖妣皆紀氏妣冦氏孫氏夫人李氏以柔嘉作配君子姻里德焉三子寅其胄也宙今令京兆蒲城㝐方學女子子四人適主京兆長安簿席貽士子馮嘉鳯翔提控按牘王繼述樞宻院掾傅昱孫男僖女子子二人長適吕曽幼姆銘曰維天生賢匪使自有俾拯蒸民為責已厚公於明命實肩實負乾乾其行艮艮其守師古喪祭如禮不茍三綱之淪我條自手推得其類無倦誨誘學者宗之西土山斗鳶飛魚躍潛齋自蔀令聞之延已徹宸黈束帛戔戔賁及林藪丹扆曰來何暮汝叟大師之南伻㫁已久其宜進退汝蓍以叩又曰多士文字儷偶求得碩才奚䇿以取又曰厯義羣喙紛糾汝折衷之其從誰某凡是大政無不可否公拜稽首瀝膽悉剖丹扆曰噫惟兹儲后端本萬邦汝賓以友儲后曰今識治黄耉惟汝為可肱股元首公益抗章臣蚤衰朽養安踰紀僅止中夀歸從先藏奉政之阜止阡有碑無我樵槱垂詩千齡以告爾後中州名賢文表巻十
