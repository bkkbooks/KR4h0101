body:
  text: 中州名賢文表巻十七明劉昌編馬文貞公騷賦發淮浦發淮浦兮遡黄流鼓船舷兮極浮游雲英英兮天已秋攬芙蓉兮艤芳洲酌吾酒兮樂無憂懷佳人兮結綢繆我思操八風兮渢渢政宣兮音通律節兮應同臣商兮君宫龜之山兮松有枝羑之里兮田有萊天不喪兮何悲願復願兮令我思傷已賦嗟余生之多憂兮幾顚踣而數窮誓纘言以自見兮力遲古之高風呼䒶龍以駕我兮伻䒶使使爲期何九稼之不一獲兮尚偃蹇而如兹豈剞劂之有不善兮將世德之下賢薦芻茭於宗器兮綴履綦以璣璿封敦旄以塊泰岱兮謂汎濫其莫涯冠髫童以弁冕兮問禮意而莫支決大疑於淫鬼兮憑巫傅以度揆願聖言之鞿靷兮指綱維爲械意憫相道之無朋兮去一髪之幾希柅吾車之莫騁兮膠吾口而難辭懲前悔之不憚兮配古道其或可思一旦舎此而改圖兮念後余之病我日浚惡以啓堙兮患世之屏經而好權邅岐蹊之多迷兮世或謂其固然抱昌辭以適與我兮俟來學以偕行辨百家之糺紛兮孰察余之衷情亂曰我涉大波孰爲航兮我載大塗孰爲箱兮古聲喤喤金石之揚兮世無倀兮悠然閣賦爲周南翁作舒吾眺之落落兮覿寥廓之無跡會冥冥之遐思兮契萬品之攸職擬大化而罔象兮悼世德之囿形聿逍遥而容與兮泊乎游乎泰清是有當於吾衷兮表吾廬以自肆騁余馬於析津兮崇吾屋乎江汜掲高躅於古道兮追前修其或然偉一世之君子兮又贈之以蘭荃曰余未有知兮何私意之彷彿懿夫子之悠然兮殆反余乎空谷制誥遣使巡行詔朕祗承洪業夙夕惟寅凡所以圖治者悉遵祖宗成憲曩者屢詔中外百司宣布德澤蠲賦省刑賑恤貧乏思與黎元共享有生之樂尚慮有司未體朕意庶政或闕惠澤未洽承宣者失於撫治司憲者怠於紏察俾吾民重困朕甚憫焉今遣使宣撫分行諸道案問官吏不法詢民疾苦審理冤滯凡可以興利除害速宜舉行有罪者四品以上停職申請五品以下者就便處決其有政蹟尤異暨晦跡於丘園才堪輔治者具以名聞咨爾臣庶體予至懷太保左丞相封贈三代制匡時靖難資大䇿於元臣崇德報功覃湛恩於累葉奉常議禮奥壤定封具官某故曽祖服勤侍衞秉信功臣太傅銀青榮禄大夫上柱國梁國公諡敬簡塔瑪噶圖秉質無華詒謀有永早僃鈎陳之列式昭析木之祥衍善慶於曽孫篤忠貞於熙代使宅百揆光於前人於戲開國浚郊具儀文於鈇鉞承家新鄭紹世美於衣冠錄我絲綸告爾窀穸可追封陽翟王朕論功定賞念扞衞之多艱推慶行封俾覃延於三世懿彼靜女配予先臣具官某故曽祖母梁國夫人呼圖克章早飭壼儀克承宗事不假詩書圖史之戒素嫺織紝組紃之功迪美萃於曽孫發祥殷於令族新廟奕奕斲松柏於析津原田每每畫封圻於梁土龍章有赫象服來歆可追封陽翟王夫人朕奬元勲恩推舊德濟其世美詒厥孫謀屬大業之中興賴名藩之外援追封奕葉實著彞章具官某故祖父守忠翊正效節宣力功臣太師金紫光禄大夫上柱國梁國公諡莊順青海質稟淳龎躬行愷悌櫜鞬宿衞久服勞於王家弓冶承傳遂開先於相閥方乾坤之清謐俾綸綍之渙頒用禮勸忠書功旌善於戲伊洛瀍澗樂哉魂魄之遊山川土田衍爾烝嘗之奉昭兹來裔祐我丕基可追封河南王命婦朝后彤管著於女箴令妻相夫鞶絲陳於内則亶惟淑德嬪於名門具官某故祖母梁國夫人呼喇章毓質柔嘉修容婉娩久襲祥於世業當擢秀於孫枝爲國懷材贊予茂烈雲翔鸞誥俾澤漏於泉臺飈轉魚軒想神遊於梁苑尚貽多祐福爾後人可追封河南王夫人惟王建國必崇德以報功自天降康乃生賢而靖難兹眷元臣之懿宜推先正之褒具官某故父懷忠濟美積德崇慶功臣大師開府儀同三司上柱國特進河南王諡忠懿濟濟哩藴善弗彰紹謀斯永爲郎執㦸夙多宣力之勤有子克家益勵敎忠之訓定中興之大䇿立不世之殊勲匪衍王封曷稱朕意於戲河山帶礪式藏盟府之書乾坤珍符期篤熙朝之祐格思英爽歆此寵光可追封鄭王朕惟元臣克相中興之業母有令子宜膺崇秩之封稽諸彝章廣我孝治具官某故母河南王夫人揚珠濟農夙嫺姆訓綽著婦功奉筐筥於烝嘗節珩璜於夙夜内政素勤於在饋慈訓尤切於斷機德啓閨門光資邦國倬兹鄭圃乗翟茀以來遊嘉彼召南賦鵲巢以行化俾頒綸誥用賁泉扄可追封鄭王夫人平章伊蘇德爾封贈三代制夫用之紓者積必厚行之徐者力弗殆斯道之常匪曰責報也平章伊蘇德爾曽祖父贈定威佐運功臣榮祿大夫司徒柱國追封曹國公諡忠定布色出於華族夙奮材武從我太祖皇帝親屬櫜鞬崛起戎列威行方國戰功良多及定隴陜斬將搴旗臨敵致死大節赫然傳不云乎活千人者有後兹爾數世之逺傳家孫曽愈碩大光顯又得議封於禮官博士非用兵有活人之德而然乎命頒異數開國曹南中土奥壤襲慶濟美可示爲將者之勸可贈定威佐運功臣光禄大夫司徒上柱國追封曹南王諡忠定古外命婦朝后是則婦官尚矣平章伊蘇德爾曽祖母追封曹國夫人塔本劬勞慈育生子克家戰勝攻取丕佐興運議禮制度于爾有封從夫之爵曹國小君象服翟茀歆兹追寵可追封曹南王夫人朕稽古爲治立國以禮故臨御四海永慕祖宗創業之艱難美其興運佐命之臣厚厥世賞以訓臣鄰矧其𦙍裔又有能全其終始者乎平章伊蘇德爾祖父贈宣忠靖逺功臣光禄大夫中書右丞相柱國追封曹國公諡桓毅額里根蚤僃宿衞分從賢王前驅先登戡定河外俾金爲墟而宋社遂以屋者蓋爾戰多之力焉異姓封王於爾爲寵矣英爽不亡尚保爾世哉可追封宣忠靖逺佐運功臣金紫光禄大夫中書右丞相上柱國追封曹南王諡桓毅夫恩禮覃於百官則先近臣漏澤施於九原則觀來者平章伊蘇德爾祖母追封曹國夫人黙哷早嬪高門無違宫事克相君子爲王虎臣又有聞孫贊予景運俾有司議封乃追命爾爲王夫人以曹南之田爲脂澤之賦尚歆寵渥益衍廟食可追贈曹南王夫人先王有崇德報功之制豈曰觀美蓋以旌善而勸忠也平章伊蘇德爾父光禄大夫中書左丞相先贈恊謀定逺佐理功臣太師開府議同三司上柱國曹國公諡宣武阿喇罕生長富貴宴安而無子弟之習勝衣荷戈奮身前驅維時世廟觀兵江滸貔虎百萬之衆謀臣如雲乃能立功名於其間北征叛王轉戰千里南殄奔君樹旗海嶼勲勞顯著寵賚便蕃我國家於君臣之道可謂至矣朕不聞鼓鼙猶思將帥況爾有後爲予藎臣中興之初率兩河將士戮力介胄之間大臣以聞乃隆推恩之禮上及於爾三世焉曹南之郊桑穀沃壤開國稱王人臣極位爾克有靈歆我綸命可贈推誠宣力定逺佐運功臣太師開府儀同三司上柱國追封曹南王諡忠宣我家經營南國之初尚賴膂力之士材武之臣克成大業勲勞之蹟皆已銘於太常矣又且尊顯其身以至於室家之有慶者兹非典禮之懿乎平章伊蘇德爾母曹國夫人托多淑慎端惠夙配君子尊召南之化而象服是稱施孟母之敎而訓忠有言卓兹令器爲朕虎臣臨御之際褒錫宜先開國曹南以衍脂澤之賦煒其榮哉賁爾窀穸可追封曹南王夫人君子不昵於宴安之私以能成其功名者亦嘗資於内助焉平章伊蘇德爾妻曹國夫人庫庫倫幽閑端懿雞鳴而起相其宗事婦德有稱没從夫爵啓封曹土魚軒象服裕爾後昆可追封曹南王夫人太傅圖嚕封諡制帝垣台位象已著於上元太傅師臣官尤崇於常秩有懷舊徳追錫眞王太傅圖嚕蚤陟華階懋脩素履小心翼翼文昭持櫜之班終日乾乾勞著屬櫜之績宗親入覲儐相是資酎金不罸於諸侯英蕩悉同於元會樞機宥府奠軍國於乂寧鼎鼐台司贊陰陽於化育踐􅤬禁近閱歴歳年持風紀於臺端肅官箴於朝著天不憖遺朕用䀌傷思答茂勲爰申䘏典於戲胙爾茅土俾開國於廣陽播予絲綸尚流澤於幽壤諒兹靈爽服此寵章可贈懷忠秉義昭宣弼亮功臣太師開府儀同三司上柱國追封廣陽王諡清獻男位正家恒有資於内助女師結帨庸作配於上公奬我舊勲迨於佳儷太傅秃魯妻輝和氏幽閑毓德婉孌賦姿象服是宜奉蘋蘩於祭祀彤管有煒謹珩瑀於箴規懋著婦功克相宫事痛所天之先殞誨厥嗣以益嚴石窌啓封賜廣陽之大國容臺議禮贊召南之夫人享爾高年欽此異數可封廣陽王太夫人右丞阿勒坦封謚制朕以崇德報功之制聖王建國之皇圖論名立諡之稱昭代褒賢之鉅典用光綏寵俾洽臣鄰右丞阿勒坦少稟晬姿蚤登膴仕周廬星列入陳扈蹕之勞專驛飈馳來上屯田之奏恩威襲蠻夷於冠帶忠孝擴詩禮其箕裘錫類著乎家邦浚明勤乎夙夜貂蟬七葉飾躬不瀆於華鮮弧矢四方迪德彌彰於懿美篤生令器丕佐明時聿殫嘉猶晉參大政横經内殿矢兹宻勿之言熙載外朝體朕都俞之意有司考禮於汝推恩爰頒渙號之辭式副光榮之志於戲丞相一品英靈尚克以歆承泰階六符善慶益延於似續錄諸告第欽我贊書可贈秉義效忠著節佐治功臣太保開府儀同三司上柱國追封特進趙國公中書左丞相諡貞孝周南正始敎化被於閨門趙國疏封寵榮光於泉壤爰稽彝典用奬有官右丞阿勒坦妻唐古氏毓質柔嘉脩儀婉娩來嬪閱閥蚤乗翟茀之車克相夫君益著鵲巢之德篤生令器褒作名臣服慈訓之不忘迪嘉謀之入告推恩追錫體人子報本之私考禮飾終示我朝廣孝之治尚昭懿範歆此告詞可封趙國夫人表牋賀元旦表皇極建中賁嘉生於世運乾元資始衍嗣歳於人時叶氣開先純陽肇德中叙道全居正功洽體仁坐宣室以受釐百神奉職御明堂而布政萬國咸寧勾陳環列於端門庭實駢羅於文陛臣某等塵聮烏府迹簉鵷行進封事於銀臺慙稽衮補紀卜年於寶厯欣對嵩呼正旦賀興聖宫表帝厯開天祥發貞元之會母儀法地源疏河海之涵百物順嘉四時叶序中叙陰功庀世懿德承乾肇聖緒於姜嫄彌䖍祖武刑徽音於太姒益衍孫謀茂綏獻歳之祥膺保履端之吉臣某等遭逢世泰綴列朝行官備中臺王朔願敷於錫福慶隆長信民功仰荷於資成賀建儲表伏以天潢毓德聿開聖嗣之隆廟祐承祧爰啓儲闈之慶祥臻泰道福集昌朝中叙迪德堯仁躬親舜孝日麗乎天而明兩益紹重華帝出乎震而洊雷彌嚴繼體乃眷元良之懿式膺監撫之崇臣某等備立烏臺趨朝雞曙前星奏瑞載瞻青輅之旂太極含元第衍黄圖之籍賀春宫箋甲觀儲祥肇泰始含章之慶春宫正位受少陽體德之尊神器有歸宗祧是賴中叙生知忠孝夙稟温文躬問侍之勤德已昭於帝胄膺監撫之重道允叶於皇猷承華克紹於丕基建本方隆於大寶臣某等忝居侍從喜際文明鶴禁景遲願早親於四學雲門樂奏期介祉於三宫監修國史賀正表瑶圖撫運紹開致福之祥寶厯乗時肇序體元之始大鈞播物淑氣迎和中敘道洽古今性資文武潛心帝王之學聖敬日躋合德天地之仁皇猷允塞歳事啓成於農扈治功端本於王正臣某等辱備台司監綜史氏觴稱萬歳樂快覩於龍光書載三墳期永垂於狐筆賀立后建儲表冊建中宫體黄裳之居正祧承長器仰蒼震之儲祥國本以寧壼儀攸敘中敘聖資神武𤣥德欽明美敎化厚人倫允叶相成之業奉宗廟承祭祀丕昭繼照之明慶洽三宫懽騰八表臣某等職塵仙館班簉帝廷運值上元盛典並行於吉日天開泰定顯謨已著於初年箴銘書櫝銘農善銚鎒匠利斧斤其器既精其績惟勤以食以居可必於懵士不農匠崇文著書濟濟閒燕明世所須秘冊於櫝經史百家内沭其澤外芬其華漆梓勒銘以告弟子我承庭訓敢不礪爾惟天精明不嗇於人惟物淫昏乃迷厥眞匪聖匪賢曷先我覺匪訓匪辭我孰從學曰我祖考奕葉顯揚革我世俗維文是將迨兹百年士而不民我辭諄諄庶大爾身書几銘木也材漆也堅工之良其成器也完吾克有之利於燕閒之觀居室銘茍居室也敬則疇之可訂茍學古也專則疇之不傳有幽者神有穹者天將寵綏之爾益勉旃辴然亭銘維兹世人時化物遷雜沓紛至攻於吾前吾乃應之而一辴然其辴者何不呉不敖不震不謨順受維嘉豈嘻笑之怒者耶龔友輔纘古齋銘古有道載諸辭我績之徵於斯維友輔篤古學予爲銘聽毋藐舟箴伐木於山既斧既鎊於綴以頴金於屋以編菅杵堊縷枲研桐之脂塗於木間以禦外波不觚而刳不趾而趨南國利之以載以居不車不廬越紀彌章矢溺溷濁汙海若之宫馮夷乗顛軒輊上下萬縆千纒不施其功卒不思改圖由是言之水豈不仁哉題䟦書翟太素彈琴詩序後古堂上樂皆亡獨琴在今之琴雖盡非古意然猶愈於亡也省菴周先生謂余言汴士翟太素雅善鼔琴羣髦方聲其工被歌詩間子盍賦之予悼道不傳纘綴事方殷不能爲韻語俾太素絃之省菴周先生其無庸病我䟦夫子擊磬圖天地日月不容繪畫而松雪翁寓意於翰墨之中吾固知其歎荷蕢之非眞知聖者也記御史臺題名後天厯初有制命御史臺具石題名聖言渾灝有訓有戒天聽明達照知物情而文字簡易蓋堯舜都俞之音也天地之大日月之明何德以象之臣趙世延既承詔爲文至順三年九月日臺臣等謹敷宣德意列載如上維時長貳曹屬之次仍列於下後之來者尚徴於始而繼之也且人之善惡咸在是亦懲勸之義不可廢也嗚呼慎之哉題松㕔事槀略後昔祖常承乏察院初官未熟時事往往篤信古道動輙得咎言秦州山移之變則得奉祠太社論特古斯丞相廢法擅權則謫官開平嬰虎口之毒擯斥五年幸遭遇天日清明更張化絃凡是同惡姦狀顯露善類彚進衆賢登朝而祖常忝備召用待罪詞垣暇日偶繙閱書簏見有章疏舊槀數十紙因繕寫成一編祖常詎敢賣直要譽庶亦存愛君憂時之萬一云耳名之曰松㕔事槀略者明其與同官論列者皆不記也至治三年端陽日浚儀馬祖常識䟦誠求堂詩得龍之嗜龍可以豢知馬之畏馬可以舞彼含氣之不靈而我得其精寔用乎誠況靈於彼者可不以兹求邪章疏請慎簡宫寮疏伏覩延祐三年十二月十九日皇太子正位春宫百司上箋稱賀禮畢欽惟列聖繼統治功大洽文恬武熙百年於兹矣聖天子高覽古今軍國之幾蚤建天下之本日月之明無以比德皇太子殿下温文仁孝天賦美資急宜招延天下碩德雅望文采博通之士朝夕起居以侍左右輔養懿美薫陶沖和三代紹述厥要惟兹傳云成王始爲太子也太公爲師周公爲傅召公爲保伯禽唐叔與遊目不閱淫豔耳不聞優笑居不近邪庸及爲君也血氣既定游習已成雖有放心不能奪已成之性今皇太子殿下春秋鼎盛神明日彊道德之言禮樂之事當豫講而速親其方不過求賢而已伏乞今後議行建立宫寮之時公集大臣覈求名實相副端能調護羽翼儲闈之才以係四海之望所謂下官臣僕亦冝精擇而不可雜以商賈冗瑣之流天下休戚之源實在於此卑職草萊賤士誤被㧞擢敢不盡言少紓重責請量移流罪禮樂刑政治國之具有一不修則㢮法度欽惟國朝有天下以來不嗜殺人仁覆生齒􅇽濡煦育洽然太和而於用刑尤切慎重然伏見近年頒降德音中間屢無量移流徙之文竊慮聖人愛物之仁推恩未悉有傷至化夫大辟死罪或被赦原釋然歸保妻子而減死流罪竟無寛宥不得生還里閭此豈法之平允哉乞今後如有例合長流罪惡别請定擬長流條例其不長流者亦請驗情輕重度地善惡每遇恩澤輒行量移如䝉檢舉典故施行則天下生靈幸甚辨王左丞等竊聞傳云王臣蹇蹇匪躬之故國家實賴焉夫便佞辨給徒利一已視國與民漠然如無情者國家何補哉伏見中書左丞王伯宏前中書平章政事拜珠曩在政府常以直言正色力持公平與權臣特穆爾德爾抗論可否若此二人其國家緩急之際剛毅不屈信可倚仗宜從憲臺聞奏將二人擢寘機要不令外補實社稷之計論執弓矢禁例近承奉照會該欽奉奏准禁約漢人百人以上執弓箭打圍處重刑百人以下流逺方微及一之獲罪各有差竊謂作法有名垂訓無弊且今日見行條例已有禁漢人弓矢之科又有禁諸人聚衆之制若復以上項打圍處重刑等例錯綜而網羅之誠恐愚氓舉足䧟罪難避易犯實爲可憐而朝廷受禁人捕獸兔之名尤爲非美宜從合干部分檢舉禁籞囿地舊規遵守施行不勝幸甚論秦州成紀縣等處山移事伏見議遣大臣馳驛陜西賑恤災異祈謝岳鎮卑職叨冐言路敢有愚昧謹用敷請夫山移大變實惟天譴是爲不動之物而動大臣以下各宜辭避官位推議賢能畏懼修省表奏待罪庶乎對越上帝而爲緜延丕基非但遣使祈謝賑恤一方一隅而可彌災也竊又聞之應天以實不以文昔師曠對晉平公石言之語載在方冊世世爲監今山移之譴理無虚示豈非在野有當用不用之賢在官有當言不言之佞所以感召不動之物而動毒延庶民甚可哀痛且端本首善在乎幾微萬物咸遂百職共宜然後高下奠位山川宅寧伏乞憲臺早爲敷奏任用賢才相應舉翰林待制袁桷等上件官學問究極乎羣經文章粲著乎當世修國史則足以宣揚聖業代王言則足以潤色皇猷久次翰林屬官誠爲淹抑翰林修撰陳觀性稟端方操履嚴慎使之居糾察之地必能振舉職業不茍於事前國子司業呉澄知經博古學術淳深求之海内可謂名儒如䝉擢置兩院以備訪問相應記序小石山記岳鎮之列居四方其間出雲氣神物變化靈異以之順成年穀滋益品類者大矣至於巒壑之美巖穴之秀木榮泉清珍禽異獸之所託依往來仙眞高人之所棲宿是皆有以寓游觀樂放逸在君子之所不可廢者也淮以南諸山石礦而不瑩余得小如盎者一鑿器實水植之其中亦磊落峻㧞含蓄雄偉可喜也彼雖不能如岳鎮之大出雲氣光景神物變化要受封祭然世或欲揵淇竹以塞河決錬五色以補天漏則予斯石也其能無尺寸之功歟石田山房記桐柏之水發爲淮東行五百里合溮潢山谷諸流左盤右紓環繚陵麓其南有州曰光土衍而草茂民勤而俗樸故贈騎都尉開封郡伯浚儀馬公實嘗監焉公之子祖常少賤而服田於野以給饘粥鄉之人思慕郡伯之政念其子之勞而將去也迺爲之卜里中地函其葺屋而俾就家焉屋之側有崇丘可六七丈溪水旁折而出岸碕之上嘉樹苞竹薈蔚蔽虧前爲木梁梁溪而行周垣悉編菅葦門屋覆之以茨歳里鄰酒食往來牛種田器更相貰貸寒冬不耕其父老各率子若孫持書笈來問孝經論語孔子之說其耕之土雖磽瘠寡殖不如江湖之沃饒然猶愈於無業也祖常者因樂而居焉於是名其屋曰石田山房且自爲記與圖以屬當世能言之士請爲賦詩異日使淮南人歌之小圃記余環堵中治方一畛地横縱爲小畦者二十一塍崑崙奴頗善汲晝日縆水十餘石井新浚土厚泉美灌注四通陽春土脈亦墳起古所謂滋液滲漉何生不育者信矣哉雜蘆菔蔓菁蔥薤諸種布分其間柵以稭薪限狗馬越入蹂躪圃在前時爲故主馬廐土有糞合水之膏澤併漬之後菜熟芼羮以侑廩米之饙餾吾於世資蓋寡取也如是可日計矣學子汪琯曰鑄鐵作齒綴於横木使土平細尤宜菜余謂不然土之力完則殖繁若力盡則亦不殖矣因爲小圃記上都翰林分院記天子歳省方畱都丞相侍省中率百官咸以事從或分曹釐務辨位考工或陪扈出入起居供張設具或執櫜鞬備宿衞或視符璽金帛尚衣諸御物惟謹其爲小心寅畏趨走奉命罔敢少怠而必至給沐更上之日迺得一休也惟詞臣獨無它爲從容載筆給軺傳道路續食持書數囊吏空牘旬日不一署文書夙夜雖欲求細勞微勤以自効而亦無有然後知上之人不欲役其心使之研精於思慮而專以文字爲職業非如衆有司務之集事爲賢者也至治三年汶陽曹公子真分直學士院實應從行祖常攝官待制聮屬以偕上日懼譾薄無以稱其官幸遭逢國家治康内外清謐臣鄰廉恥不煩訓誨蠻夷懷柔不待約束所以敷宣播告之辭猶慎且簡間爲民爲歳而祠其詞之祝亦不誣神而夸故其意質而文又寡是以益積其藴蓄而不得肆發而爲歌詩以形容國家太平之功乃更相與樂其秩之美而憙其被光寵於明世也吾徒之服是選者良亦榮矣夫良亦貴矣夫可不研精於思慮以俟上之召必蹈渾噩之實而列陳之則庶乎不戾於躬也不戾於躬則於古也近矣志諸壁因以存故實云禮部合化堂題名記凡職事官悉有司也惟六官𨽻丞相府分領庶務頒降文書春官典禮古秩宗之職或謂之南省或謂之儀曹其視五官非獨有司之事焉天子祠郊廟則贊相中書論制度則與議朝覲會同之班簿聲名文物之品節咨辨位之名數稽載籍之推本莫不於是詳定焉褒崇旌異勸善成俗報德尚賢尊右儒學之義咸敦大而涵煦之優柔而裕養之生而不殺之道存焉與夫饔膳醴齊之薦於上餼牽牲牢之饋於下以仁睦親以德體物分吏以上四方之職貢專官以比四方之賔興嘉穀靈獸獻禎奏祥皆附以達彬彬乎華要之地而大夫士之高選矣天厯己巳皇帝御極之明年飭百官修職禮部奉命惟謹乃相告戒不敢怠於事登公堂而更相命曰傳所謂禮樂合天地之化者豈不謂兹類耶請用合化爲禮部公堂之名記堂之始遂亦署官名之員聮屬之次於左方云令甲尚書三員侍郎二員員外郎二員主事二員令史十九人通事一人國字譯史二人西域譯史二人知印二人奏差十二人官並載其姓氏序遷之由令史以下因制以具名俾後之人有徴焉察院題名記審官之法既壞仕者雜出而天下始不治矣或因縁時貴以取進或多資以交結變易詭詐佞媚側辟一朝居位而臨民民烏能償其積貪乎世祖皇帝至元五年立御史臺設監察御史振肅庶官糾劾貪邪以繩吏牘以除民瘼當是時宋尚未納土餽饟供給羽書四馳中原數十百州日以飛輓爲事自唐漢之主觀之當以軍府爲急矣而我世祖皇帝憂民方深不俾瘝官毒我黎庶則雖堯舜明四目達四聰者豈過是哉列聖相承成法具在天厯皇帝登極顧御史大夫特穆爾布哈若曰内外非臺察則官以墨敗者無由而知貪何以懼姦何以發乎汝可於臺院殿院察院刻石以題名焉嗚呼天厯皇帝丕承世祖之謨烈詔臺臣三院題名者臣祖常才雖譾薄不識帝王之度要非夸以示人必勸之以善而懲之以不善也名既刻矣後來者有目爲材御史者有否者則爲御史者可不慎哉臣祖常於是而知天厯皇帝帝王之度也守院御史托克托王德新請曰石既具矣請以爾言爲察院題名記起自至元五年至至順三年監察御史姓名咸列於左方云送崔少中序談者謂近世治賦之臣率多弄刀筆畫籌䇿日夜屑屑析毫毛利害飛文舞書陽與陰掇一有豪傑魁偉之士學古之人以仁義爲説者則羣笑目譏指號狂惑斥去恐後太師長史燕國崔君以今年春提舉山東鐵冶將行天山馬祖常曰子好仁義説久矣持仁義説往治東賦是舞干羽而戰也是擊鐘磬而田也或曰不然夫操戈以入人之室雖三尺童子亦將召徒而拒之使之端委執綏揖讓下車而問館焉則盜跖有所不敢辭道之於天下如是哉遂系以詩曰衣之華兮雖絅而章道之華兮雖闇而光有美一人兮佩鏘鏘捨我而他其何可忘國語類記序結繩不施書契有作科斗鳥獸之迹籀篆𨽻分及今之書雜然並傳觀乎黄帝帝嚳而下迨晉楚列國其間貨錢刀布鼎彝敦簠誌記銘刻文字形畫之殊極六書制作之變曽不少相襲體而其聲文音義相生相成百世一道我國家造䝉古書因天地自然之數以成一代之書求合乎先王之意而不柅於人宜乃列之學士置博士弟子員敎授不廢是以近世之士鼓篋而游學宫者嘗比於孔氏之徒焉太僕經歴持廣平張大卿所著國語類記若干巻來請曰是書實古轉注之義爲多切講此有年矣大卿乃能綴緝本末成一家言凡國語之引物連類假借旁通者班班具焉子盍爲我序之祖常曩讀曲臺所記及漢急就章諸篇等知世之古今文字論列辨博纖悉畢載何則其資寡者其中窳其籍厚者其内充則大卿之爲是書後世稽古者尚有考焉游經歴字序游氏爲河南望族河南祖常父母邦也宜知游氏爲甚悉始辨章公起家以清德素業敎諸子皆恭儉守家法傳數十年不殄而愈熾以及其孫僎僎年弱冠即筮仕爲監修國史叅軍宣政院經歴僎曰子知吾家世吾且有請先是翰林姚公名予曰僎矣而字則未有也願有以字我祖常曰惟古之道冠而字於阼階禮之意以責成人也今子官於朝有年矣庸藉乎字爲也雖然子有命所不敢辭請字曰嘉賔夫僎主人之貳也古之人相見而讌飲也主有僎而賓有介焉僎能修主人之辭以致乎賔賔以授介介亦有以復焉於是乎宣禮節合文章觀辭命整容體油油然大順生人道成矣嗚呼其義顧不深哉是則曰嘉賓如之何不可尚思有以實之王夫人貞節序集賢待制兵部郎中喀爾庫庫之外祖姑王氏故贈上護軍琅琊郡公之女故御史中丞薊國文正公女弟陜西行省郎中劉天瑞之夫人也夫人十四歳嫁劉天瑞又十六年而夫死又二十六年在所有司上其事於丞相府旌其門焉嗚呼甚矣禮之可以善俗也古者婦人夫死已稱曰未亡人則是欲從而死也今王夫人始爲顯官女與婦也則夙夜敬事修飭工容及其夫之没也則疏布被體號泣若將終身嗚呼婦人之行盡如王夫人則俗豈有不善者乎然善俗之道視其上之禮如何爾上之禮既已敷錫導揚表異褒美書在官府名在州里凡所以善俗之道者亦云至矣而縉紳學士讀古詩周知先王善俗之意相屬而爲之詩以宣昭天子人倫之化且使民有所歌詠而觀感焉是亦縉紳學士之懿德也爲義固不偉歟送聶道元詩序少之時隨親提攜往來宦游江淮之交纘古績文視世之進取不屑也及官浮光祖常年已二十矣旦夕侍出入吏來白事嘗從㕔事後竊聽吏多以名呼私甚薄之獨聶君道元先子毎特稱其字焉私又疑之請曰聶君持筐篚曹屬獨字之何先子顧祖常而敎之曰兒來前立吾誨汝言聶君異他吏當休沐下直跡他吏皆縱酒叫號市中道元服澣衣而講律義於家不出也斯可敬矣汝無忘吾言後其名日大彰灼淮西山南部使者並檄聘之貢地官掾轉登臺郎奮迅騰㧞出贊淮東憲府而祖常承大宗伯之職於朝道元喜且命曰先大夫知我我之行子豈無言乎縉紳之士咸已賦詩爲贈矣子宜爲序若夫壯詩人之情性惜執手之别離則詩序之製也因情性之所由以達乎人之親慨别離之相慕推今日以至於當時則兹序之所起也敢以是爲道元送别詩序臥雪齋文集序夫人之有文猶世之有樂也樂之有高下節奏清濁音聲及和平舒緩焦殺促短之不同因以卜其世之休咎象其德之小大人之於文亦然然不能强爲也賦天地中和之氣而又充之以聖賢之學大順至仁浹洽而化然後英華之著見於外者無乖戻邪僻忿􅓰淫哇之辭此皆理之自然者也非惟人之於文也雖物亦然華之大豔者必不實器之過實者必不良必也稱乎求乎稱也則舎詩書六藝之文吾不敢它求焉袁君德平之文可謂美矣優柔而不譁典則而不質可以施之宗廟告之朝廷而今已死無及也其子杲游於國學以余嘗從其兄伯長甫官史館而伯長甫又好余甚者也請重序其父之文焉噫德平之文世雖無知者抑何傷乎子杲兹又槖而歸於越山之下一日太史占候言南方有光氣上達於天者其必德平之文在其下也夫周剛善文集序六經之文尚矣先秦古文雖淳駁龎雜時戾於聖人然亦渾噩弗雕無後世誕詭骫骳不經之辭司馬遷耕牧河山之陽得中州布帛菽粟之常著而爲史其言雄深唐韓愈挈其精微而振發於不羈嘻文亦豈易言哉栁宗元駕其說忿􅀈恚怨失於和平淮西雅歌晉問諸篇馳騁出入古今天人之間蔚乎一代之製而學士大夫皆宗師之宋以文名世歐王曽三氏降而下天下將分裂道不得全業文之士咸澆漓浮薄不足以經世而載道焉皇元隆平宣布文化姚燧元明善褎然在廷以文致位光顯而於今傳之周剛善彚其文數十篇俾余觀之質實而不窳藻麗而不華殫其思以志於文而未已者也兹將官南方故書以爲文序而略告之送雅勒呼参書之官靜江詩序奎章閣参書雅勒呼字正卿取高科登朝廷以文學才諝遇知於天子出貳郡治以宣上德而修百姓之務亦可謂榮矣然而有爲不懌者謂正卿宜在館閣華要與諏訪獻納發謀議佐政事而事效於靜江荒逺僻側隅山洑海之地孰失之歟余爲之言曰中州大夫士吏南越者往往不樂其土其仕皆有茍且而無憂勤之心以故其政事解弛莫致其治敎之意而蠻民與猺合盜廣西數郡罹其暴天子宰相以靜江重鎮守臣未易稱任又知正卿嘗家衡鄂壁於其壤識其山川巇坎之勢市里田土風謡習尚話言之變害利詭冐憸良之形制其傾揺跳躪而導其善心必有素計也他日正卿以親老乞高郵便養而天子宰相特有是命焉夫以嘗仕於朝出入禁籞爲文學之臣而治其所居已安所有事之宜否皆已習熟之士專思一慮以勞其職以宣布上德而無茍且以憂勤百姓之務余知其必能成在官之政爲後來可守之法矣此正卿所當自致其治敎之意而天子宰相之所以命正卿者也又孰失之歟然余聞往時廣西憲臣帥守嘗併力以勝盜勝則削骸戮孥撟䖍毒民使荆湘衡鄂兵以萬數卒殮焉正卿其特將除是而已邪抑用之爲小異也豈亦制而導之之素計猶不免爲是也天子宰相任之之意其然耶孔子曰天下有道盜其先變乎亦嘗思於其言否耶繇鄂泝湘過衡麓抵靜江吏者多中州大夫士正卿爲余諗其賢者曰受命爲吏大者專方鎮小者一郡一州起居靡有所失食飲不侈以妄雖越南與中州不大異也豈當以不樂而置官以不事利進襮耶儻曰余之言可豈得蠻猺之爲盜哉噫亦其民之幸也已於是不懌者與館閣僚友及京師聲明之士各欣然爲文章以美其行而勸其無久於外以致其去處之情而請余爲之序正卿固喜任事者故次第其言以送之中州名賢文表巻十七
