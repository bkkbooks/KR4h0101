body:
  text: 中州名賢文表巻十九明劉昌編馬文貞公碑誌敕賜御史中丞趙公先德碑銘皇帝御奎章閣詔大學士臣阿榮若曰御史中丞臣世安事朕日久克庸祇畏相彼世傳諒有啓迪之者其令臣祖常爲文以刻於碑臣祖常北向受詔迺屬辭爲碑之文以應詔曰皇帝將勸忠於天下俾人知善後之道兹千萬世慮匪私於臣世安也謹按中丞臣世安姓趙氏始居奉聖州之礬山四世祖柔當金季朔南淪胥爲丘墟矣柔團結義民柵險以阨其兵衝使不得犯爲便道以給薪水如平時鄉之人賴以全活者億萬計會天兵下紫荆口柔率義民歸行省八札且以單騎入各堡砦諭逆順各堡砦豪長皆弛兵來歸我行省行省以聞制授龍虎衞上將軍眞定涿易等路兵馬都元帥佩金虎符兼總管銀冶再進總管諸處打捕鷹坊加金紫光禄大夫有子六人長守贇佩金符僉山北遼東道提刑按察司事仍總管大都保定打捕鷹坊次守信忠翊校尉廣宗縣尹人戴之如父母焉次守仁蚤卒不仕次守純官百夫長次守政權打捕鷹坊府職一學老子法有道提㸃汴之朝元宫以方外故不名守贇二子長謙襲總管打捕鷹坊次晟善治民作縣安喜鋤其武斷鄉曲者縣在畿甸上下稱之選為行監察御史再遷監察御史山東道廉訪副使燕南道廉訪使以年改翰林直學士遇公卿輒指言時事利病不休也守信二子長貫蚤卒次簡今洺水縣尹貫子世安迺今中丞守純三子長還閭官百夫長次遷閭提領打捕鷹坊次山閭蚤卒守政二子長允昭信校尉保定路總管府判官次宻總管大都等處打捕鷹坊維趙氏以國姓世系綿遠譜牒無考北土尚質復不肯以姓之顯者爲所出故奉聖趙氏自元帥以下遷卜珠顆山之陽巳而又卜宅於龍安今遂爲易州淶水人淶水趙氏雖四世爲郎官大夫然自中丞起家給事禁闥侍武宗皇帝冕服即蹈規矩言行有常事今上皇帝於潛邸勤勞夙夜夷險一心天厯之元皇帝入正大位徵拜叅議中書省事旋入中書叅知政事上讓位居東宫改詹事丞領典用監卿復入中書參知政事領經筵事陞拜中書左丞入臺爲御史中丞官資德大夫立侍正府以中丞兼侍正光顯榮遇在廷鮮倫而其折節下士蓋有人所不能跂及者令典官第二品得封二代異恩特封三代焉曽祖柔追封天水郡公諡莊靖曽祖妣南氏追封天水郡夫人祖守信贈資德大夫中書右丞上護軍追封天水郡公諡康惠祖妣李氏追封天水郡夫人父貫贈榮禄大夫大司徒柱國追封魏國公諡貞憲母劉氏追封魏國夫人臣嘗讀古書厯徵紀載年表列傳臣事多矣其際會者不一或以戰多或以民庸或以文章或以勤勞或奮於功名以垂於簡牘夸者謂各以身致亦無有不奕世載德爵位不大以藴蓄芘䕃於後昆者也古則達矣臣又幸得備從官聞世祖養德王藩時則有若姚樞趙璧仁廟則有若李孟斯亦雲從龍而風從虎矣其濬源豈無自哉要之必本於仁而其傳自逺也傳曰活千人者有後元帥生逢末世手搏鬭諸盜以完黔首者衆矣奚啻千人哉則其後碩大昌熾遭遇聖明以成其名以顯其親者揆之於天道何疑焉中丞今一子曰亨提㸃太府監内藏庫臣祖常辱列侍御史毎從中丞在官日聞論議持平臧否於疾言遽色弗之有也詔既命臣爲文臣敢舞蹈百拜而獻銘曰有趙之裔北遷於南淶水亢宗元帥多男赫赫元帥叱咤風霆柵木壘石保有萬丁鬭賊於原完我耄倪自頂及踵膚無一疵豈無膚疵又無凍飢便其薪蒸食飲以時活人萬億歸我行省天子曰嘻予大肆眚凡厥逋逃悉來奠居申命元帥金紫縣魚有善有慶具美於𦙍分憲尹氏咸樹官政廣宗之郊土瘠而磽膏以糞壤衆桑咸苞民樂趨事戴以父母迄今有歌興於田畝安喜繼武實爲弟昆鑠其頑礦使民不寃司徒魏公隱德於躬鍾美集厚全天而終發祥中丞事我皇帝兢兢翼翼夷險不二皇帝曰咨咨爾臣同我篤爾先維以勸忠移孝於忠培植基本爾臣銘之告於公衮敕賜大司徒薊國忠簡公神道碑公世出朔北屬輝和爾小字孟古徳濟初公父多喇珠從高昌國王内附當我定宗憲宗之時以未用中夏文字多喇珠始用其國記畫言語爲扎書習諸部人世皇在潛邸亦頗講於其學多喇珠既卒廼敕使者召公朔北公至上手公入便殿謂昭睿順聖皇后曰是兒㓜貌偉絶肖其父宜出入屬侍間朕不忘多喇珠也久之以能世父業命以其書職敎内諸御出宫人呼塔噶妻之至元十年特命公提㸃資成庫階奉訓大夫主尚方幄殿仗宿屋令十五年詔改資成庫爲尚用監拜公太監階中順大夫十九年遷太府太監廿五年又改尚用曰中尚仍拜公太監進太中大夫未幾遷中尚卿階嘉議大夫尋命兼知太府監事階通議大夫成宗在位思顧舊臣以公久勤事特授正奉大夫進秩二品時上省方陪都嘗清暑西華門見公第庳隘衞屏飾不稱遣近侍諭公曰朕固知爾能守貧然家茍不給當朕言毋諱公謝曰臣材亡可録者被先朝恩冐有俸稍廩既以給衣食乗堅䇿肥若疇人子姪非不有所欲顧以無能不敢浮竊厚貤爾上聞益賢之武宗至大元年詔陞中尚監爲中尚院就拜公中尚院使三月拜大司徒進階榮禄大夫從一品秩公以位泰固辭不許仁宗奉昭憲元聖太后入平内難召公計宜降福宫公從容籌對多援祖宗訓實及制事御統之變其語罕泄不傳皇慶元年仁宗即位復拜公中尚卿毎給事直宫對上必懇陳治要與國政在顯位無益於民者指切言之上亦以公宿貴有德者多味公言敕中書賜以楮幣萬緡公又謝曰臣自以爲置肝腦不足酧上德日兢兢不敢有墜言汙履以孤累聖之眷故常有狗馬之心今病力不能任服事寧幸財於無功耶上固勉之終不受其年十一月二十六日以疾薨於昭回坊之賜第壽七十有六初葬順州第四鄉發信材之原元統元年四月公第五子監察御史塔納始買地於大興縣燕臺鄉艾村原作爲塋垣樹列翁仲石儀舉公及夫人之柩葬焉於是臺臣以聞有詔贈公銀青榮禄大夫太保上柱國追封薊國公諡忠簡夫人呼塔噶贈薊國夫人仍命具公行壽善勞世族官治樹文於碑刻之神道以假寵公之孫子塔納以監察御史某之狀以請臣論次其言曰我國家肇奮朔土車輿廬帳冠帶裘服以旦暮從事於四方有攻伐之具有守禦之備軛牛軺馬必物其足力毳革筯木束輳之器必權其功啙節比協材必皆良而後用故國初即設官以典焉蓋一代之制不比於衞尉太僕乗黄守宫令供億於祭享會朝幸畋而已公以朔北聞族受知世祖自少以至於老曰資成曰尚用曰中尚未嘗一歳去他官而尤悉力以勤其事不以久而不足狃也其知此者乎夫在位者數徙則不得久其官官非久則無以習而知其事故下無所馴以安其治其弊賢者不能以及於功不肖者罪不積於著而免天下之不厎於理其不由是歟臣觀公之久於其任任之之專而得世祖任官之意焉雖然在位者非其人而恃久以爲治亦未有能治者也又觀公之善於其職與其廉取辭榮而得公之爲人焉信公之言以質公之行則其賢逺哉是不可使無銘也巳公有子十人曰明理忠翊校尉監重慶路瀘州曰拜珠巴哈亞中大夫監安豐路致仕曰秃忽赤奉議大夫監南陽府裕州曰達努武德將軍監汝寧府光州曰塔納奉直大夫監察御史曰托里布哈曰太平曰奇稜布哈未仕曰托布哈曰齊達勒布哈曰奇善皆夭女一人爲監薊州名上都之妻孫男十四人曰托和中奉大夫湖南道宣慰使曰托克托忠翊校尉同知宿州事曰和托曰呼圖克布哈曰都哩布哈曰布爾罕和爾曰萬僧努曰華善曰吉楚克曰雅克特穆爾曰達繖曰芬濟瑪曰班巴爾曰孟克特穆爾俱未仕曽孫七人班廸承事郎昭孝營繕司大使曰華善曰興格曰沙克善曰哈尚曰觀音努曰福善俱㓜嗚呼公既顯榮壽考以終其身距今甫二十四年而後嗣之蕃衍盛昌若此塔納又能修敏質勤以名其官方嚮用未極非其力勞而報約之徵耶古所謂淑人君子者公於是可以當之矣臣攝官御史中丞塔納在察院故於其請奉詔不敢辭迺再拜稽首爲系之銘曰位囏而勩世不必久也公不以久而績益懋也寵貤而豐人寠斯受也公不以寠而廉自厚也夫惟其賢宜有壽也既碩既延公多後也燕臺北鄉墓焉公藏奚改於卜龜食惟祥曰貴與財孰碩靡懷貴驕財悖式貽身哀維公則否維志之求敢告𦙍續禔公之休敕賜太師秦王佐命元勲之碑元有佐命元勲之臣曰太師秦王中書右丞相巴延宏乂帝室有猷有烈輔理旬宣弼諧寅亮小心夙夜幾三十年人用揄誦延兹休聲蓋古所謂社禝之臣也上即位之明年制詔御史中丞馬祖常若曰臣巴延有勲德於世宜文諸石以勸有位爾言不誣其令有司具其翊我文宗中興之賢勞及其世閥行治序次之臣祖常受詔百拜退爲文以進曰初文皇帝以武廟之子出居南服民神咸思依歸焉王時以平章政事佩虎符節制江淮諸軍鎮汴故太師太平王右丞相臣雅克特穆爾建義迎文皇帝於邸使以告王王即檄下諸郡縣便宜發民丁給衞士聚芻糗金帛驛輸之用地不足則貸商人貨約償倍稱息又許民折來歳賦充上供殺諸不用命者奪之官日櫛盥介胄坐省中指笇釐劃節警近廣儲峙浚湟壘堞剝缺弗完治使堅夜臨按盡五鼓下不遑寐雖葦礫械鑰之微服饍饌享之具必曲殫其心力别募虓勇五千人往扈䟆於道始察里爾者有貳于上屬乘傳來京師遣部人䝉古布哈伊埒台羅壘遂殺之尉氏館平章奇嚕右丞伯奇特穆爾以私持時銳鈍疑沮王王手刺死之榜於衆以舉義事戒有司奉行毋忽民翕然引領幸上之來朝夕急而叅政圖卜台萬户明安岱爾欲連兵圖不利圖卜台手刃坐王下數數睨幾刃王王起㧞劒擊之走追斫其右臂殺之以狥取所佩符節整齊其部兵得驛馬千二百騎下明安岱爾獄使聞上恱甚遣薩里布哈拜王河南行省左丞相是年秋八月廿日大駕臨御汴王擐强槖鋒率汴父老子弟導上至汴邸摻階下諸陪從官帥卒吏賞予各有差百給物罔有纖鉅畢取如寄而汴人且嘔吟市易殆不知載休之大而勞也明日上解所被金鎧御服寶刀及海東白鶻文鶻爲賜王趣勸上曰神器虚久請亟北轅以主宗社迺毖車徒嚴約令麾罼羅絡扈上渡河道計日以息至則頓遞供張靡一不具士無敢譁以怠而民扶㩦望拜歡呼如恐後越七日駕還宫以九月十三日正皇帝位詔天下改年天厯大業遂定加王銀青榮禄大夫河南行省左丞相尋拜太尉賜黄金二百五十兩白金一千兩楮幣二萬五千緡加開封儀同三司錄軍國重事御史大夫中政使明年正月拜太保加儲慶使尋又賜白鶻文豹降虎符加忠翊侍衞親軍都指揮使時上以天下讓明皇帝居東宫拜太子詹事太保官階勲職悉仍故八月拜中書左丞相九月加儲政事三年正月拜知樞宻院事至順元年特命王有大勲勞於天下凡飲晏賜以月脫之禮國語喝盞也王定大難誅戮既多宜防不測賜集賽岱百人摩哩齊百人阿斯罕百人俾朝夕宿衞王左右以備非常仍賜黄金雙龍符其文曰廣忠宣義正節振武佐運功臣組以寳帶令世為明劵又命尚庫庫楚王之孫女二年八月進封浚寧王加侍正府侍正十月加昭功萬戸都總使十二月加宣毅萬戸府萬戸忠翊侍衞親軍都指揮使佩故金符三年十月加徽政使元統元年六月今上踐祚以翼戴定䇿之勲越二日拜太師中書右丞相上柱國監修國史兼奎章閣大學士領學士院太史院總回紇漢人司天監事八月加領經筵事十一月改封秦王二年正月加威武衞親軍都指揮使太師總餘職佩符領軍如故王昔十有五歳奉成宗命侍武宗於藩飭躬盡瘁不自暇逸勞任愾使必先諸御人仁宗王明宗於周命王爲周王常侍四年拜江南行臺御史中丞五年拜御史大夫六年拜江淛行省平章政事七年拜陜西行臺御史大夫至治二年又拜南臺御史大夫泰定二年拜江西行省平章政事三年拜河南行省平章政事在汴所至索政所宜施利害與民舉除之而宿姦碩豪異時常矯䖍以毒民者往往褫魄去懼罪之將及巳故四海之人靡不相爲鼓頌而被惠之邦尤嗟其來之暮而以不久留爲歎且望也父曰武宗嘉愛焉大德五年從武宗北征與海都軍戰特濟庫地戰哈喇台和坦地斬虜最諸將十年部將烏魯斯錫巴爾等遁王追擊之錫巴爾格鬭不下王數戰力至實喇布拉克地錫巴爾降即不殺十一年武宗自和林入纘大統錫名曰巴圖爾拜吏部尚書巴圖爾國語雄武也至大元年改尚服使其年十一月拜御史中丞二年十一月拜尚書平章政事特賜龍虎符領右衛親軍都指揮使三年正月加官特進延祐三年錦濟勒總宿衞興聖太后宫皇贈懐忠秉義毓德衍慶惠迪功臣太師開府儀同三司上柱國追封鄭王諡忠懿妣揚珠濟農鄭王夫人大父曰青海故領軍百户從憲宗平宋攻合州釣魚山戮力王事以殁皇贈守忠翊正效節宣力功臣太師開府儀同三司上柱國追封河南王諡莊順妣呼喇濟河南王夫人曽大父曰塔瑪噶圖給事宿衞皇贈服勤翊衞秉信基德功臣太傅銀青榮禄大夫上柱國追封陽翟王諡敬簡妣呼圖克陽翟王夫人元統二年上猶以恩禮爲未稱也令有司更議進封曽大父曰服勤翊衞履信基德功臣太師開府儀同三司上柱國追封淮陽王諡忠靖妣淮陽王夫人大父曰推忠宣力同仁效節勤逺功臣追封淮王諡忠襄職階勲如故妣淮王夫人父曰推誠秉義協恭保德翊運功臣階勲爵諡悉如故咸有褒辭以示殊禮正室夫人克哷展氏加封秦王夫人故丞相額森巴哈女故太傅右丞相圖克勒之女弟兄四人長伊蘇徳爾平章政事留守次蘇尼台次雅克特穆爾中政使次嘉琿廸尚服使皆世弟二人巴延台蚤卒次曼濟爾台今御史大夫子男二人長巴拉錫哩次沙克嘉錫哩咸備宿衞世摩爾奇特氏夫以王之忠清粹德輔翊累朝孝友於家嘉靖於國禮以自持義以立功董萬事之紀成熙洽之治爲一代之臣宗而又捍王定䇿之大勲著在我國家信史有載鼎銘是刋宜也矧又秉國釣撢化澤佐我天子於未艾則夫爵有王土極此光耀寵榮以鑠休美於後世不其尤宜哉古稱有社稷臣者王之謂矣國家平康百有餘年君臣之際於斯爲盛天子名碑首曰佐命元勲臣祖常文其敢辭謹齋沐而獻銘曰赫矣文帝龍奮於南雲雷經綸家難用戡梁奠中夏八方之樞一有􅀈獍則柅我徒豈柅我徒民胥於痡匪直於痡將斁我大謨有嶷秦王殿師於梁襲甲於裳斬其無良合兵在郛秣馬在廐以迓我元后則罔不奔走元后戾止耄倪郊迎弓矢鈇鉞象箙鸞弸大勞兵士牛酒金帛賈歌於區農嬉於陌艤舟河滸讙帝之來神工授能瞬兹濟而帝曰王賢汝久服事相予有家式殫勤瘁予聖考武皇惟王之嘉大纛攸指愾無留遮外官蕃垣焱其鷹揚奉予一人烝徒皇皇虎旗龍章日月之光帝車載安言畱上國廟見告主配天建極乃肆大眚乃旌有德王實左右以毗以翼皇帝曰嘻晝日三接鎧服寶刀金篆符節往總予揆施我民禔獰者以恬呻者以恞孰降割於下鼎湖攀號時定大䇿王實焦勞肆聖天子文皇帝是似乃圖王封繹彼世祀山川土田南國之涘曰佐命元勲惟王實有天子詔臣臣掲碑首臣辭不誣庶以永後作秦王考以續周卣太師太平王定䇿元勲之碑皇帝御興聖殿制詔中書省臣曰惟太師太平王中書右丞相臣雅克特穆爾以忠孝世臣戴予中興功在社稷其令臣祖常文於碑以昭示無極焉臣聞帝王受命天必儲瓌偉絶世之資將相之才與之會遇以成大業如我太祖世祖英傑智謀之士聮裳充庭以爲一世之用者豈非天哉天厯元年戊辰皇帝將正大位天人合應丞相臣雅克特穆爾以八月四日甲午率勇士十七人兵皆露刃建大義於禁中迺誓於衆曰武宗皇帝有聖子二人孝恭仁文天下大統當歸之今爾一二臣敢紊邦紀有不順者斬手捽平章額卜德哷勒巴延徹爾縛之分命勇士執諸疑貳者咸下獄待罪籍府庫錄印符空百司皆入内以聽命其日屬學士臣明埒棟阿等乗遽迎皇帝於中興路宻以意諭河南省臣而稱臣勸進者接踵於道左矣癸夘弟薩敦子騰吉斯皆棄其妻孥來皇帝以是月之甲辰發中興以丁巳至京師比至浹旬之間兩以左右矯稱使者南來者云駕巳次近郊諸王及河南省臣萬户各以兵從民勿譁驚北來者云皇帝大兄且至於是中外翕恱而衆志定矣九月庚申諸侯王王禪將北軍軍榆林西丞相出師彼未及陣趣薩敦馳入營壁衆潰追之懷來戊辰敵入千門鎮闗薩敦赴之戰薊東敗之十有三日壬申上即皇帝位於大明殿受百官朝甲戌進開府儀同三司上柱國錄軍國重事中書右丞相監修國史知樞宻院事賜黄金五百兩白金二千五百兩中統楮幣一萬錠金織雜采二千匹白鶻一青鶻一文豹二承詔將大軍東出薊討圖們德爾平章即日就道乙亥宿三河夜二鼓偵者報王禪兵奪居庸闗略大口丙子裹糧趨榆河未戰聞大駕出宫將親督將士亟請見上奏事曰凡軍事一以付臣願陛下班師撫安黎庶上旋還宫明日丁丑指揮使呼圖克布哈塔海特穆爾同知台哈布哈隂構變未發事覺械三人送闕下斬之己夘與王禪前軍戰榆河勦之追殘兵於紅橋北阿拉克特穆爾槍刺馬前盤馬斫之刀中左臂部曲華善斫呼圖特穆爾亦中臂二人皆騎捷將也會日晡就宿戰所庚辰上聞之遣使賜御衣一襲慰勞甚渥兩軍隔紅橋水爲營辛巳合兵鏖戰白浮之野大敗之手刃七人夜二鼓盡呼禆將阿拉克特穆爾博囉齊伊勒吉使將百騎風上大譟亂以鉦鼓箭射營中自相蹂躪至旦始悟壬午天霧王禪等得棄甲北走癸未兵復集我軍列白浮行伍立如植木敵不敢犯至夜又命薩孰出其後南向巴圖爾托克托穆爾出其前北向鼓譟大呼吹銅角雜人馬聲彼營軍不知計又皆夜相射旦乃西走巴圖爾者華言猛士也甲申襲王禪兵於昌平北上遣使上尊酒諭㫖曰丞相毎與敵戰親冐矢石脫不虞奈宗社何以大將旗鼓督戰可也丞相曰凡戰臣先之敢後者臣論以軍法是日斬首數千級降者萬餘人乙酉去衣履徒跣求生者又萬餘人王禪遂單騎亡入北山發也蘇達拉額布勒薩敦追之是日還至昌平南敵將凖塔台庫庫攻破虎北口掠石槽民丙戌先令薩敦進以大兵㑹諸侯王兵轉戰四十里至牛頭山獲博囉特穆爾䝉古達實特穆爾薩喇屯四大將縛兩手載於馬鞍獻上天子斬之降者萬人餘兵四散夜遣薩敦托克托穆爾遮虎北口要其歸途丁亥諸侯王額森特穆爾及圖們德爾驅萬人薄我畿甸跳梁通州城下十月己丑朔日晡彼方憩馬我軍直擣之不及抽一矢東渡潞水而逃庚寅各面水陳兵不戰辛夘宵遁我軍渡潞水襲之癸巳再與諸侯王太平額森特穆爾多羅岱及圖們徳爾塔海血戰檀子山棗林騰吉斯從殺太平於陣中餘夜遁甲午薩敦托克托穆爾將兵追捕乙未諸侯王呼喇岱指揮使阿喇特穆爾安圖自紫荆闗口犯良鄉丙申我軍循北山而西士皆馬上食馬以囊盛草粟繫馬口且行且食至蘆溝呼喇岱兵潰凱還都人觀者拜者填道入見天子無矜容焉上大恱己亥進封達爾罕太平王以其地爲食邑降制褒美功名烜耀刻黄金爲印章以寵賚之珠對衣寶帶一其荅喇罕華言世貸之也圖們徳爾復入虎北口戰檀州南殲之萬户哈喇諾海以截下兵降殺圖們徳爾函首京師誅呼喇岱阿喇特穆爾安圖多囉岱塔海於國門之外齊王裕嚕特穆爾元帥布哈特穆爾乃起兵嚮開平曰皇帝正大統於大都矣汝等知乎姦臣道拉實囚首請死十月廿有二日庚戌奉皇帝璽來上天下業遂定明年己巳上固讓位於大兄明宗皇帝命侍御史臣薩勒廸致讓奉迎三月戊辰丞相䕶皇帝璽於北土明宗皇帝嘉之拜太師官階如前迨明廟上賓皇帝洊昇大位一歳之間爲天子佐命兼揖讓征伐之事而使中外清謐華夏乂寧者兹非天儲其才使與受命之君會遇以成大業者歟文未奏上詔賜定䇿元勲名碑嗚呼盛哉臣祖常拜手稽首而獻頌曰皇帝應天赫矣龍奮風霆不驚受命啓運曰皇考武皇御極維昌靈在天維祥神在廟維享右厥聖子弗畋以逸弗燕於室海上浴日車環周逵陰隲我民上帝監觀儲兹師臣維兹師臣出將入相戴我天子征伐揖讓桓桓于于有亟有徐露刃袒呼虎旅疾趨建義禁中羣疑未同縛二三臣誓言於公曰大統之傳武皇帝有子天序秩秩孰敢干紀聖祖明訓封建伯叔分地車旗屏翰外服孽臣萌芽交構我家神怒而憤民恫而嗟于徒于旅闞其如虎仗忠履順有弗義者斧地官金帛司馬介胄於時廷臣先事恐後大車出之軍容大施扼其重闗使不得突馳羅絡森峙戰守攻具潢池弄兵悉衆來赴載同我馬東北之野斬鯢戮鯨血衊地赭褫衣跣徒日降萬夫號泣草間丐其完膚皇帝曰嗟丞相汝勞晝日三錫寶帶珠袍丞相稽首是皆帝祉驍將賈勇及我弟與子十月日吉來上玉璽姦臣蹷顚泥首就死奠兹海㝢登世萬千矢辭貞石元勲之宣元勲之宣開國江壖子孫保之維善慶弗愆傳息甿傳淮北堧有州曰息先息國也居申蔡沈頓胡黄之間自古國有南北分則受勦焉以是地大壤曠蓬茅聿興天元視四海爲堂陛力田之甿多就墾焉有甿嬀姓於凡甿中最稱善播種事致殷厥家然大都世之靡麗奇瓌淫冶纖豔可酣可嗜者一切無所好俄爲子求婦甿翁謀於其媪曰今兹東家女清婉靜淑姿美甚年且盛可當吾兒須召媒氏通殷勤頃之果召媒氏往問媒氏乃過女父母家匿所過事陰覘女子病癭腫至不辨頸頷背如負箕腹下垂如斞目黒白不分色漆墨率自項及踵無一善相媒氏竟去報聘子婦者曰所問女不足當郎君萬一具言狀其翁媪反訾媒氏謂間諜兩好且繩女子有柔德能女功不論色也仍召他媒氏往他媒氏性駔儈善佞承戒過女家既見女父母詫陳國嬀氏聖舜苖裔今家同姓之國淮西堧有畝粟十鍾地百頃資巨萬其子復丰姿容多才藝門下女妾孰知儻毋靳賄我俾二姓合好則門下女專有其家父母如所請期受聘金日半相餽他媒氏還報曰女子玉色豐頰巧笑美目騰光古毛嬙西子不敢近又刺繡剪縷膗􅀈芼腊極天下之工味願亟聘無怠否則爲王侯夫人翁媪喜不任比聘女先出束帛勞他媒氏乃别奉白玉二㲄黄金十鎰純繡采稱是請日納聘雜凡翁媪内外族暨里閈所善聞之皆切笑相與圖告翁媪云他媒氏言􅀈於情先媒氏乃摘實耳翁媪俱不聽命其子遂婚迎成禮女子既歸夫家諗舅姑不我陋貞夫之覿我之不灼也讐族里之宿毁囓我也大肆專妬日凌其夫凡夫黨之登其門者壺漿亦不饋焉惡聲章著醜狀百出雖夫之女兄弟佩履聲過戸外亦恚恨不解居半歳舅姑怒於堂夫惡於室諸所與無不欲速其夫之出之也久之沉憂積思行吟悲歌無所寄託於天地之間屬淮濱大水因自溺死世之女子至今羞道焉太史公曰傳稱西子䝉不潔則人皆掩鼻而過之雖有惡人齋戒沐浴則可以祀上帝吾徵諸古君子可信使此女幽閑貞懿以組紃爲事不害其爲賢也庶幾尚德之君子亦娶之矣何乃用媚道賄媒口進於夫夫初不灼見厥醜久鮮不敗彼舅姑者擯良媒不聽信聾於他媒氏納陋婦終致貌行不可掩積怨交惡稔禍室家宜乎世之出婦也多矣附錄敕賜故資德大夫御史中丞贈攄忠宣憲協正功臣河南行省右丞上護軍魏郡馬文貞公神道碑銘并序許有壬至正七年七月丁丑集賢侍講學士通奉大夫兼國子祭酒臣天爵言故資德大夫御史中丞贈攄忠宣憲協正功臣河南行省右丞上護軍追封魏郡公諡文貞馬祖常早擢高第歴踐要途始終五朝有文有政宜賜碑紀德庸示報功集賢院以聞制可命臣有壬爲文臣元爲書臣起巖篆其額三人皆文貞公同年進士而有壬託知尤厚始以學士被命繼冐承旨皆職紀述其敢辭公字伯庸世雍古部居靜州天山有錫喇濟蘇者高祖也金季爲鳳翔兵馬判官死節贈桓州刺史廟賜褒忠子孫因官以馬爲氏曽祖烏呼訥從世祖征宋留汴掌饋饟累官禮部尚書贈推忠宣力翊運功臣僉樞宻院事諡忠懿祖世昌行尚書省左右司郎中贈嘉議大夫吏部尚書父潤朝列大夫同知漳州路總管府事贈中奉大夫河南行省叅知政事追封梁郡公妣湯氏追封梁郡夫人梁公官浮光因家焉公七歳知學得錢即以市書十歳見燭欹燒屋解衣沃水滅之人歎其異蜀儒張公䇓講經義眞公未冠質以疑義數十張公奇之科舉詔下鄉會試皆第一廷試第二蓋以國人冠也授應奉翰林文字承事郎同知制誥兼國史院編修官拜監察御史仁皇久正辰極猶居東宫近侍利燕飲得請公抗言當御正衙立朝儀御史執簡太史執筆雖有懷姦利已乞官賞者亦不敢出諸口承天地祖宗之重當極調攝至於酒醴近侍進御當思一獻百拜之義英廟爲皇太子請慎簡師傅下至臣僕亦宜精擇時大姦當國公首知其盜觀國史洎同列疏其十罪仁宗震怒罷之黨與之布要地者皆論列黜之端人昔與牴牾而擯斥者請㧞用之泰州山移公言山不動之物而今動之豈在野有當用不用之賢在官有當言不言之佞大臣皆家居待罪薦賢㧞滯知無不言改宣政院經厯月餘辭歸起爲社稷署令罷雜事於泉南大姦復相左遷開平縣尹欲中傷之退居浮光大姦死除翰林待制泰定建儲擢典寶少監太子左贊善尋兼翰林直學士成均釋奠陳太子視學之禮内出禮幣命公助祭除禮部尚書祖母張夫人卒護喪歸起爲右贊善復禮部尋辭歸天厯初再使召爲燕王内尉仍入禮部兩知貢舉一爲讀巻官時號得人叅議中書省事叅定親郊典儀充讀祝冊官禮成賫金幣拜治書侍御史賜犀帶及御書奎章閣記内庭宴服七襲金玉腰帶各一改徽政副使拜南臺中丞今上即位召議新政賚白金爲兩二百楮幣爲貫萬金織綺爲端四改同知徽政院事拜御史中丞以公疾特免朝禮命光禄日給上尊知經筵進說必陳經史大義叅以祖宗故實持憲務存大體西臺御史劾其僚禁酟時面有酒色以苛細黜之山東憲以孔氏訟聞以事闗名教不行按者亦引去司憲有以貪墨敗没入其田廬請歸曲阜陵廟從之拜樞宻副使居無幾辭歸復南臺中丞遷西臺疾不赴積階自承事郎至資德大夫至元四年三月丙午薨於光州之第得年六十是年四月壬申葬州北平原鄉西樊里有司以聞有今贈諡配索氏封梁郡夫人子男二武子承事郎湖廣行省檢校官文子徵事郎秘書監著作郎孫男三女二公言事剴切嘗建國人暨諸部既誦周孔書當尊諸毋以厚彞倫兵家子驕脆有孤任使庶人挽强蹶張老死草野當建武學武舉儲材以備非常時雖不用識者韙之至於論刑一本哀矜嘗言死罪遇赦且原減死流徙未䝉殊渥當驗情遇恩内徙漢人滿百執弓矢獵者死不及百者流條格已有禁弓矢聚衆之條又復爲此是錯綜網羅之誠恐愚民舉足蹈罪至論建德民妻之不首夫死者則當以必死其得用法之意乎國家涵濡百年譽髦斯士公先世已事華學至公始大以肆爲文精核務去陳言師先秦兩漢尤致力於詩凌轢古作大篇短章無不可傳者與修英廟實錄譯潤皇圖大訓承華事略編集列后金鑑千秋記若干巻至順間龍虎臺應制賦詩有玉食之賜嘗進擬稾爲之歎曰孰謂中原無碩儒乎文集若干巻臺檄刻之揚州郡庠仁皇始行貢舉國人而下列爲四色國人洎諸部爲右榜試目視左榜差優公雖右榜左列及之者指未易屈焉且其爲學初不爲貢舉也以挺特之資丁大明之會褎爲舉首馴至達官威重足以鎮薄俗文章足以追古作議論足以正風敎設科得士不得不以延祐之初爲盛也不幸壽僅六十未究其用悲夫銘曰元大一統六合同風南臺北萊芃生其中部族有儒文貞伊始文貞之世翼翼廟祀後承聿修講學諸夏延畀至公有文無摦嶄然異稟㓜不事弄濡衣撲燎智劇碎甕益習以進益混以澣不溺於流而登於岸先秦兩漢華咀實擷天籟泠厲石湍激洌天子有詔乃興乃賓實三其魁一推國人甫試館職倏峩豸冠以爾枘鑿安我考槃遐心浮雲束帛空谷春坊翊贊經筵啓沃皇格於天公司其度俊造鑑衡風紀砥柱厖恩異數川委充溢云胡修途六十而柅既易其名亦大其封於光之原賜碑崇崇賜碑崇崇於赫厥銘同年之紀考信匪譝惟爾部族文貞有躅叙倫敦典益介戩穀昌至光州聞城南十五里有馬中丞墓問之儒官邑老不知中丞爲誰既發光州抵固始將還至光山尋墓謁之作詩以寄意持節行辭古弋陽五更燈火照浮梁城臨臺殿僧鍾起水映星河賈舶長一鴈叫霜秋寂寞亂雞啼月曙蒼涼秖應又轉南巡轍御史墳前致瓣香成化乙酉春昌在古期思城書馬中丞墓在光州西南十五里碑石趙孟頫書不知何人譔闊可五六尺厚二尺餘高可丈四五已斷裂加剝蝕不可讀墓前二三百武亦有碑埋土中首微出土上令從者發視之乃故御史中丞贈攄忠宣憲協正功臣河南行省右丞上護軍魏郡公諡文貞馬公神道三十三字皆𨽻書大如盤完好無缺始知爲馬祖常墓無疑遂召其左右居人責問皆云廢已久矣因使叢置諸斷石爲屋覆之復下文於州中加修祀云懷賢清淚拭初乾獨訪遺踪駐馬鞍雨蝕斷碑苔漠漠雲埋高冢草漫漫立言有要名應逺蔭後無餘志豈安怪殺白楊愁思惡西風葉葉送秋寒二月十二日昌題於中丞墓石後昌前至光州課士之暇過兵部右侍郎霍公宅公爲體薦禮飲昌昌因詢馬中丞遺事公曰吾宅故中丞公石田莊也中丞葬後子孫徙居闗中不聞以儒顯多習武間有為武官者亦不甚知名相對慨然久之且出所藏中丞公石田集示昌昌假歸屬録於州守今表於集中者是也踰年至彰徳始得許文忠公所譔中丞公神道碑并附焉成化丙戍昌在太行山石壁下識昌在光州時謁司馬文正公祠有詩云三朝名徳已尊崇祠廟深嚴近學宫香燭薫春天地老文章歴歲日星同堂堂遺像生神氣耿耿孤心著朴忠瞻拜移時勞戀慕可堪庭樹起秋風至古期思縣謁楚令尹孫叔敖廟又有詩云期思城裏弔遺蹤祠廟深沉動鼓鍾隂徳已聞慈母敎餘恩還啟後人封霜葭摧碧連荒草雨蘚沿青上古松讀罷殘碑出門去寒山漠漠水重重及謁馬中丞墓往返數日在大賢君子之鄉所以仰企徳馨思一振厲者不容於心日暮途逺歸情浩然古人重知已之難遇而感不朽盛事之難成有以哉昌在菊潭題壁馬中丞文雄徤典則雖其天分之髙有足過人而當時師友之間如姚文公元文敏公虞文靖公袁文清公所以相輔而資取者不可誣也君子之名世道徳功業文章三者中丞公盖兼有之夫既博資於人而其得於天者又清粹而穎敏以是而厲志於所向夫孰得而禦之哉讀中丞文為之俯首三嘆成化己丑七月劉昌在涑水書堂跋中州名賢文表巻十九
