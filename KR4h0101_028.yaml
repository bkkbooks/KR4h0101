body:
  text: 中州名賢文表卷二十八明劉昌編王文定公題跋跋蔡中郎𨽻書後科斗書當秦有天下未盡廢而程邈易篆作𨽻特用便牘削耳逮中郎蔡雍去取丞相斯大小篆為八分實秦𨽻書也近觀公建寧三年所書五官功曹掾夏承墓表真竒筆也如夏金鑄鼎形模怪譎雖蛇神牛鬼厖雜百出而衣冠禮樂已胚胎乎其中所謂氣凌百代筆陳堂堂者乎故書家評公書骨氣洞達爽爽為有神宜矣昔張長史作書多先觀古鐘鼎科斗文字遂楷法妙天下不然則無漢晉已來高古氣骨不肖往年道出襄國讀宋文貞神道碑見其筆畫一一涵篆穎古意乃知其言為有徴後之學者茍志於古舍兩漢孰宗匠哉至元辛未中秋前二日同相人馬才卿觀於省掾吳蔓慶之寓舍衛人王惲斂袵書跋中興頌歐陽公稱浯溪頌石歲久剝裂字多訛缺獨李西臺家藏最為完好豫後得而見之宦學四方來藏魯公書甚多兹獨闕然及調官平陽會郜君和之出故家墨刻八軸蓋浯溪臨本也命兒子孺臨摹雖精氣轉索庶幾典型具爾嘗聞公平生書五百餘石其風骨氣韻率洞洞有神如忠臣正色立朝羣姦魄褫又如元氣賦物流形都異因其人而為變耳始秦越人探丸起死不主故常在邯鄲則為帶下過洛陽則稱老人西入秦又以嬰兒醫名也故評兹帖者謂閎偉發揚狀巨唐中興勳德之盛豈虛言哉間間公偶以銀鉤鐡畫目之恐未盡善也至元十二年乙亥歲夏四月六日臥病中書於謝帥第之北軒跋郎官石柱記後唐尚書右司員外郎陳九言文古人稱長史得草聖不傳之妙豈知真書在唐為一代精絶所謂能行而後善走者也魯公書學氣侔造化真楷得法多自公始郎官帖精絶為至舊刻在京兆今亡或云淪瘞廳事址下近從曹生季衡得墨本全文蓋丞相壽國高公故家物也老眼增明伏玩不置者纍旬真希代寶也十有三年春正月人日題於西山之讀易龕跋手臨懷素自序帖世傳懷素自敘帖有數本劉御史文季云昔吾從祖河平君所藏本最佳後有蘇才翁跋云前紙縻潰親為裝禙且為補書不自愧其粳粃也有杜祁公題云狂僧草聖繼家顛卷後兼題大厯年堪與儒門為至寶武功家世久相傳後又有山谷楷書釋文蔡無可家故物也北渡後觀金城韓侯及祕府所收俱無蘇杜二公題跋似亦非長沙真筆至元辛未秋九月晦余謁左轄姚公出示太保劉公家藏帖前三十三字亦云子美補亡披玩之餘令人仿像意韻盤礴於胸中者纍月冬十月甲午是日極暄妍可愛乘筆墨調利喜為臨此拙惡非所慮庶幾見其典刑云耳監察御史汲郡王惲仲謀甫題識題懷素草書千文後豫觀藏貞大厯二年海西寺所書千文極縱橫捭闔之狀其欲斷還連似斜復整筆增妍而不繁其減者意足而悉備如風檣陳馬驟不可當倒冠落珮狂莫得制至於氣凌過庭勢迫張顚雄偉豪邁超於法度之外者一一視之皆篆𨽻之古文耳兹本雖出臨摹精氣固衰骨脈具在所謂雖無老成人猶有典刑十一年正月五日風日清麗手柔筆利乘興學書覺胸中煩滯拂然從筆端出矣跋張嘉貞書近考瘞鶴銘乃知為右軍龍爪書也豫所藏唐中令張公嘉貞北嶽廟碑其意韻骨氣敦厖古怪如衝戈植劒特龍爪遺法為正書之一變耳張公當開元初拜大將提重兵臥護北門其氣固已雄一世矣及繼璟而相以強敏風操聞然史臣稱公性疏簡與人交不疑內曠如也古人以書學為心畫故其筆不得不雄放奇偉象乎為人然未免夫捧心效顰也如優孟抵掌談話與叔敖俱化一一較之有不然者蓋其嚴辨有餘而高風絶塵為少衰矣戊辰中元日書跋麻姑壇記後歐陽永叔云仙壇記有大小二本此大書者也其興寄縹眇穠纖妍麗無不可人正如覩麻姑手爪令人背癢時不待􅐡搔已渙然冰釋矣魯公書大抵與兩儀渾淪千態萬狀不可端倪因其人而為變耳第記中皆戃恍不經之事公特為書之豈王中令謝太傅文彩勳名凌跨百代未害登東山而有高世雲霞之志也題魯公書臧氏碑後魯公書三原臧氏二碑所謂糾宗者作擘窠大字體端整而頗瀟散如羽林壘壁橫天作陳勢相戛摩與衆星爭光而色正芒寒之氣為有間耳其懷恪神道銛鋒徑畫望之凜然挺植戈戟一一較之不無利鈍惜乎出秀岩臨摹使千金駿足困伏皂櫪間其超逸絶塵之想索寞無光惜哉乃知太師忠義之氣發於筆端者諒非積學而後能也至元乙亥秋七月朔得此帖於參政李公跋竹溪所題東坡墨戲後竹溪書所見多矣未有若此帖之真楷蕭散者大似虞中舍諫獵奏狀間以側筆學坡之媚耳乃知公當大定明昌間不只以篆𨽻獨步於玉堂金馬矣輔之韞櫝愛玩亦醉翁之意也可謂真知賞音者哉跋孫過庭書太宗以英偉之氣凌跨百代萬機之暇遊心翰墨故二王法書盡入祕府摹倣臨拓然後以牙籤玉軸遍賜諸王何好尚如此其篤臣下得不從風而靡過庭適當其時今觀此書規模步驟一宗二王得飛鳥出林驚蛇入草之勢然點畫散落往往斷而弗連蓋體具二王而章草為羽翼也東坡謂陶詩初若緩散不收反復觀之乃得奇趣余於吳郡亦然但近代名公品題不到豈具眼者未暇及之邪豫特表而出之至元辛未冬十一月二十四日與兒子孺重觀於京師咸寧里之寓舍時雪霽氣清率爾而作汲郡王惲謹題跋荆公墨迹豫嘗觀壽國高公所藏心畫水鏡知此為臨川所書無疑雖風骨遒徑而筆勢散落無繩削可據殆似公當軸時變新法調夸毗子青苗助役無所紀極噫一念之差至於筆墨間尚能髣佛其為人如此後之學者處心擇術當如何哉至元壬申重陽前四日書於平陽官舍跋黃華墨迹豫觀公書多矣曰黃華山主者蓋公中年筆也其格調步趨要本二王氣韻蕭散得元章之勝徑厲初不逮之然如王謝子弟以生長見聞猶足以超人羣也殷溪云題黃華與李彥明太守一十三帖彥明係公同年友也此數帖蓋公官翰林時書也至有飢寒之厄近在旦夕又云收拾扈從秋山貧家至甚不易令人披讀可勝嘆惋當明昌嚮文之世公以文彩風流照映一時其窘迫乃爾豈官散祿薄未為道陵所知不然貧乃士之常事造物者庸玉汝於成邪至於文翰之妙如荆金和璞自有定價不待稱而後重也跋任龍巖烏夜啼帖南麓書在京師為最多其擘窠大書往往體莊而神滯獨此帖豪放飛動超乎常度而木庵師謂醉後興逸妙能天成豈長沙率爾而顚字字圓轉之意邪然古人得意處非一如去乖就合意居筆先乘其調利例多高風絶塵不只藉步兵作氣而能奪三軍之帥也跋任南麓所臨潛珍閣銘為大陽津張提舉彥亨賦總一百八字提刑王子勉目曰數珠帖南麓書在金大定間號稱獨步然擘窠大書往往體莊而神滯今觀此帖筆勢超逸氣韻兼勝豈非抵掌談笑善學叔敖者邪宣聖小影後跋語金正隆六年太學生馬雲卿筆襲封衍聖公孔元措題識宣聖肖像繪者非一憑聖儀四十九表擬之猶潢潦之於河漢培塿之於泰山也孔氏云家廟所藏衣燕居服顏子從行小影最為真像此本蓋再一傳也嗚呼尊其道踐其迹是謂之恭敬不然天容日表雖參於前而倚諸衡是不幾於黷乎至元乙亥夏四月命士人王友仁臨寫小子惲百拜敬書跋周處府君斬蛟圖後役萬物而君之者莫靈於人而處尤以氣勝者也彼司馬肜之虺鄙未若神蛟之變怪也老於莵之殘猛不減氐萬年之嘯凶也處一旦視之猶尺蠖與孤豚耳乃知擁殳之際其氣固已蓋西戎矣然有憾無援受制於人卒為二豎所害噫千載而下令人讀臨戎之篇凜凜然猶有生氣其睨梁王不糞土若也雲史筆之諒有激而云跋陶縝生菜圖蔬果猶犬馬然以其恆見而難為工故生意彩色有郊圃水濵之異縝之筆不見收於御譜而為金陵所題詠所謂一杯密雲龍足以知名於當代也跋范中立茂林秋晚圖中立初年本學營丘極平逺炯秀之狀至於山骨鬱茂林麓幽邃咫尺杳靄逺隔千里蓊然若太隂雷雨不可端倪兹蓋居終南晚年之筆也故當時有棄墨如泥之目是知遊藝雖宗匠前修唯其胸中自有一天乃能造微入妙題王生臨道子橫吹等圖後書與畫同一關紐唐賢善臨書宋人工點本要之極形似而出神爽為佳蒲江王生以讀書餘暇遊藝丹青於臨放為尤能蓋致思詳雅不為法度窘束筆與意會將天機所到近為豫點道子馬融橫吹營邱寒江晚捕為可見昔龍眠作李北平射邊騎圖觀矢之所直乃應弦斃也若向作著矢狀則風斯在下矣知此則能造微入妙文甫其沉潛可也丙子清明日書於行館之敬止堂跋秦得真墨軸後墨之名家者唐已來不數人其難工也若是如坡公尚煤松自劑放潘谷漆法至竈發舍焚曾無倦色宜乎秦君嗜之而不厭也蓋將紹潘張之絶藝發潛德之幽光耶豫近以沈煙寶劑就龍尾石試之其黑而能光清而不沍乃知精妙入神方駕前輩為諸公所稱道宜矣祭霍山祠題名至元九年冬朝廷以郡邑鎮山大浸載諸典秩者所司三載一祀霍嶽在河東實為靈鎮故事每嵗以仲夏土極之日用信報禮昭虔度也明年癸酉夏六月二十二日惲行縣北走霍邑前次洪洞雨不克邁越翼日抵趙城適嚴祀省牲之夕乃率霍州判官連漢臣監縣事塔迪尹裴國用主縣簿劉偉齋宿祠下將事之夕霧雨交作既祀之朝陰霾四開三獻禮成冷風肅然神峰鷲嶺軒豁呈露雖韓潮陽之禮衡嶽孔廣州之祀南海不足以喻其快也陪祀者府兵曹解禎縣佐史高政稅監張承慶邑人薛昌齡嶽廟道士李志真興唐寺僧普光執事者吏王庭玉等一十五人遂相與饜飫神貺而退承直郎平陽路總管府判官汲郡王惲題記從行者閭山張思誠子翁孺跋唐忠阼柘條白頭翁圖忠阼前宋人宣和畫譜有傳前人稱忠祚畫不唯極其形似如花美而艷竹野而夭能狀物之性為好耳余尤愛其科條徑挺放筆而成得妙意於法度之外殆書家所謂錐畫沙也乃知畫與翰墨同一關紐豈虛言哉跋楊息軒江灣漁樂圖豫初不解畫工拙非所知但開卷瀟灑見漁家風味令人渺然有江湖塵外之思不知何時得帶笭箵以駕船獨聱牙而揮車去作西溪漫叟為畫家所傳寫似亦不虛負此生矣跋藏春劉公東亭等帖此太保劉公書也觀其筆法若不作意故飄逸如此絶似長沙素苔磯靜釣等帖識者當以豫言為不妄黃氏裝潢者能愛之以為珍藏豈性與藝習而相近然邪自題所書草字後今日午睡起偶作草字數行因悟筆勢貴其神速要如李訴夜半乘雪出其不意乃能懸瓠城縛取元濟爾題丙博陽問牛圖後蕭曹稱漢賢相然未免有牛飲池汚之論豈狃於休息重夫更化者乎及博陽秉鈞闊略細務每以燮和為心神爵五鳳間蔚然有聲為中興名臣以二公較之佐命外吉寅亮之功有足多者胡氏謂體元者人君之事調元者宰相之職信哉彼闔里門而消沴因淖車而被謗者坐享堂封無所事事曽不若丞相嘔茵吏耳豫適纂述調元事鑑友人敬之之子公讓請題其後故書題王郎中國範所藏唐翰林供奉畫玄宗幸蜀圖世知天寶之禍階於九齡罷相政歸楊李不知枉害忠良一言玄宗已為聲色蠱惑其明理亂顚倒莫知所從逮夫九縣飈馳越在草莽方思曲江忠諫遣使祭墓嗟何及矣今觀是圖自馳出大內宫衛依然供頓咸陽父老進説次馬嵬而六師不前痛九廟而太子北駕至犒遣扶風蹭蹬蜀道倣佛躑躅惄焉如搗之懷去五百餘載按圖思事如在目前令人動被髮伊上之感可謂畫中有史其垂戒深矣題坡軒先生詩卷後豫嘗於鹿庵宴席見老人數輩衣冠楚楚容止足觀當時顯宦有不復及者詢之皆前朝𣙜釀官也而況坡軒者乎先生在大定間調監相酒其風流文采照映一世時賢與之不在明昌詞人之下所存片言隻字猶當享之千金自非篤好有睨而不顧者夢卿出將家喜詩學固能寶而藏之異時釃酒臨江助吾橫槊之氣者不為無得於斯文也題李懷逺事系後李鎬字之京涿之定興人父金大定間進士第終蘭州刺史先生姿沖淡樂山水初蘭州府君官鳳翔府近山多勝槩公日登覽怡説至樂而忘歸自是畫品日進北渡后留寓淇上僕猶及識之番番然一良士也嘗作樊樓風雨春雲出谷二圖大為東瀛子蕭公所賞識曰士夫間不多見也以門勞官至懷逺大將軍集慶軍節度副使壽六十五卒於衛子師孟字希賢今年七十有五為人質直好義無它腸精力強明飲啖不少衰時時尚能浮大白酣適簪花曳杖遊行閭里豫每遇諸塗更忙與從容抵掌談平日心事初不以惸獨而屑懷也然未免作句讀師自給其日料焉復為一慨然耳戊子歲端月上元日秋澗老人書且得載郡志寓居之列云跋淡遊先生詩後黃華先生以海嶽精英之氣發而為文章翰墨當明昌間照映一時惟其早世識者至今惜之余向客京師好事家屏圍慎軸無非淡遊詩翰乃知老成雖逺典刑盡見於是此幅公之老筆尤瀟灑可愛豈神完守固氣自清明雖耄而不衰者邪戊子冬陽生后日秋澗惲謹題題雲麾帖後李北海書融液屈折紆餘妍溢一法禊飲序但放筆差增其豪豐體使益其媚如盧絢下朝風度間雅縈轡回䇿儘有藴藉三郎顧之不覺歎美東坡云豫書初學李江夏后來自成一家及以雲麾帖一一較之坡第按之稍扁而青出於藍耳蘭亭在古今為真行之祖自太宗崈尚一代學者爭師宗之然如徐季海輩尚未免結體之俗況餘人乎公於斯時獨能高視逺步造微入妙臨池䇿勳固當為右軍忠臣矣有具眼者出乃知余言為不妄戊子冬孟秋澗老人王惲謹題跋米南宫書曽夫人墓志銘後顔魯公稱殷成已雅善填書嚮見唐人作禊飲序每行特留二三白者使見其已者之功夫耳初觀是帖即疑其神爽索然乏飛動縹眇之勢再視之乃知為成已法也緣襄陽出奇無窮雖憑軾縱觀不無看朱成碧耽嗜者心慕手追豈不踐迹終不入於室邪夢卿來託審定所見如此於戲夢卿其寶之安知飛電流雲之駿不踵門而至者乎戊子歲秋八月二十七日秋澗老人題跋香林先生老叨賦後真楷有常規而顚草無定態魯公傳長史之法東坡得魯公之妙至於率爾而顚餘未見能旭也今觀此帖馳騁長沙氣劘禱佛之壘耳鳴呼百年來人物淵源之盛槩可見矣先生姓田字信之前進士蒙城人學顔而至者也晚進王惲謹題跋唐韋皋畫像豫嘗觀皋王畫像魁偉奇傑顔赫奕視猛而髯戟如老羆抗首有百獸不敢傍之氣不如是何以破吐蕃四十八萬之衆擒殺節度都督籠官千五百名乎至外臣自預政抗章勸進軍旅之目以定秦鏤號其豪侈橫恣在所不論及殁有司欲追繩其咎賴門士陸暢者得解至今盛名有光於蜀嗚呼竹頭木屑其可忽也哉秋澗老人偶題附録大元故翰林學士中奉大夫知制誥同修國史贈學士承旨資善大夫追封太原郡公諡文定王公神道碑銘皇慶壬子歲朝廷推恩舊學贈先考中奉府君翰林學士承旨資善大夫追封太原郡公諡文定先妣推氏追封太原郡夫人眷恤隆渥上及二代明年春正月丙午焚黃祭告寵賁松檟越王氏有煒是用追述先公立身行道致兹顯揚者敢昭告於神道先公諱惲字仲謀世家於衛曽祖諱經隱居讀書鄉黨化其德諡文元先生曽祖妣吕氏臨清大家祖父諱宇亡金衛州刑曹孔目官精於文法官敦武校尉用公貴贈集賢侍讀學士大中大夫追封太原郡侯諡敏懿祖妣孟氏韓氏並追封太原郡夫人顯考諱天澤資剛明決科律學魁多士亡金忠顯校尉戶部主事中年折節讀書務教子起宗所交皆海內名士易名文通先生用公貴贈正奉大夫大司農卿追封太原郡公諡莊靖顯妣靳氏追封太原郡夫人先公幼有至性勤學好問若飢渴然弱冠受教於鹿菴王公詩文字畫巳有聲紫陽遺山一見為指授所業期以國士楊西菴曹南湖高吏部徒單顒軒愛其材器折行輩與交極口為延譽中統建元左丞姚公宣慰東平辟充詳議官尋被中書特授翰林修撰同知制誥兼修國史院編修官制詞有行已無玷博學能文顧超絶之逸才足鋪張於偉績之旨士論榮耀焉一時詔制辭命皆出其手共稱敏贍既而兼中書省左司都事建言曰廟堂出治之源今機務草創當究其本末先後酌而行之允焉遇事詳處得宜同列許其明達至元五年肇立御史臺首拜監察御史獻書曰憲臺執法糾正邪枉今無法可守取人無路宜講治制以立紀綱設科舉以取人材體用既明朝廷不勞而肅矣憲寮為首前後申明典制彈劾姦邪凡一百五十餘章切直敢言不畏強禦於政體多所禆益如劾劉都水怙勢作姦陷公儲四十萬石權貴為側目九年升授承直郎平陽路總管府判官晉大府也先是吏風盛民嚚於訟公用誠敬待官長威嚴肅吏屬作勸諭文二一則勉飭州縣革弊勤政一則諄告百姓務本畏法致吏民感化奉約束惟謹歷二考如一日絳兵卒陳姓者殺同産兄杜獄因鬻緩逮繫者三百餘人延滯至五年之久逺近為憤惋省檄鞫問廉得實迹一問即服時晉絳久旱是夕大雨霑足咸謂伸理寃抑所致各路設辨課官例分門下平陽所轄院務幾百按籍點差終任不易藩府採姑射山文石藉夫匠力闢山蹊為坦途者六十里西山伏利由之而出土人刻石紀其事大起府學敦勉師生傳授暇率吏屬聽講風俗為一丕變又復回車嶺孔子廟首陽山二賢祠修建廨傳遞鋪以間計者千數增戶餘三千敕使過晉者以政績上聞至蒙奉公勤政之諭十三年奉命同陳節齋考試河南五路儒士語於陳曰吾道如線不宜用平時取法凡就試者皆以通文學第之十四年授翰林待制奉訓大夫鹿菴大學方執文衡屢稱其文章精妙明年秋選授朝列大夫河北河南道提刑按察副使改除燕南秩競移山東東西道先公之任風憲嘗諗僚屬監司職在繩愆糾繆肅清政務惟自治而後可以治人又憲府非有錢穀詞訟之繁特明大體布公道事當核議極乎中正方可服衆惟克已自勵故按治州郡褰帷具瞻有風動百城之目部內府尹恃占名鷹房恣為不法公納賄賂莫敢誰何即按劾罪狀以聞蒙杖而黜焉憲臺遍諭諸道逺近為肅然冀州監從人因造作掊衆利甚夥與監逸去事白曰行司巡歷動經歲時俟獲而治則姦人得計矣質其田宅償其民南宫弭筆者號尹庫因告訐曽蒙賞賚沮嚇官府肆凶侔利或言其擅殺耕牛歷數姦惡痛杖之而死萬戶稱快又辨釋德平民劉氏疑獄一十八年除行臺治書侍御史不赴進承華事略於東宫廣孝立愛端本類二十篇採古儲二善事前有圖後斷以已意蒙裕皇遍覽稱善賜酒有極用心纂述之諭令諸皇孫傳觀宫寮稱其宏益良多聖上命近臣繪寫以賜東宫二十二年奏充中書省左司郎中屢趣不應時小臣盧以理財用事或問其故曰力小任重剝衆利已未見能久者可近乎既而果敗衆服其識先而有守二十六年授少中大夫福建閩海道提刑按察使甌閩僻在海隅歸附後官貪民殘奄為盜區黜尤貪惡者數十人乃上章彈劾行省官非其人宜選文武備具有籌䇿大臣矯正枉濫肅清邊陲則民心服而寇盜息巨賊鍾明亮嘯聚洪閩郊東擊則西逸西逐則東奔彼此玩寇師老無功乃請立主師專號令朝廷允焉賊果潰滅二十七年以疾得告北歸二十八年朝廷以耆宿來徴明年二月謁見世祖皇帝於栁林行宫蒙慰諭久之繼上萬言書條陳時政一曰頒憲章以一政體二曰定制度以抑奢僭三曰節浮費以豐財用四曰慎名爵以攬威權五曰重廉司以勵庶官六曰嚴保舉以核名實七曰設科舉以收人材八曰試吏員以清政務九曰恤兵民以固邦本十曰復常平以廣蓄積十一曰開屯田以省逺餉十二曰息逺略以撫已有十三曰感和氣以銷水旱十四曰崇教化以厚風俗十五曰減行院以一調遣十六曰絶交貢以示曠度上嘉納焉授翰林學士嘉議大夫與議政事凡預庭議知無不言成宗嗣位獻守成事鑑曰敬天法祖愛民恤兵凡十五篇逐事直説本諸經旨侍臣謂純正親切有魏文貞司馬端明之風元貞改元加通議知制誥同修國史纂修世祖實録作表進呈及封諡除拜大典册皆經定撰大德元年進中奉明年戊戌春以三朝舊臣賜楮幣萬緡其年七十請老不許五年再上章懇請除公孺自祕著司刑鄉郡以便侍養仍官孫笴祕書郎榮其歸方優遊鄉里樂遂安間不幸於大德甲辰歲六月辛丑以疾薨於私第正寢之春露堂享年七十有八越九月己酉葬河西里之先塋夫人推氏祔焉送葬餘萬人及四方來弔祭者哭皆失聲曰五百年那復生此公耶先妣共城人尚醫推公季女資婉順事舅姑睦姻親以孝敬聞先公所得俸給均之家人惟恐失所若稍越規矩即治之如法故皆恱服而不敢犯女侍生二子善加撫育無異巳出內助力為多先十八年卒生子公孺奉議大夫知穎州事孫三笴朝列大夫中書刑部郎官次詵詵侃侃尚幼女孫二長適昭文館大學士耶律伯強子著作郎楷次適寧氏子重孫五男漢璋德璋潤璋女二皆幼庶子二公儀廕授承務郎同知磁州事公説衛輝路儒學學正生子瑣住先公資明敏正大材器英邁操行純古博學有經濟器業與人交樂易直諒不能詭隨與時俯仰常曰士當行其所學明義達道一以至誠將之窮達得失有不在已者當官持重有體守正奉公表表欲見於世故所至有聲遇不平事及惡之可疾者憤然必窮治乃已官清要四十年自奉如寒士平生篤於禮義視勢利蔑如藩國世子且貴顯於朝招翰林諸公宴集私覿禮衆議未一曰禮上國卿當下國君遂平揖而已省掾趙和之病疽迎醫救視沒為殯斂以行槖付其家友人周曲山能官至廉卒無以葬營治至成禮南宫劉文卿善數學客死於衛既周其喪妻少囊珍具甚富求一室相依以禮謝去其廉正類此少與西溪香山友善時目曰淇上三王别號秋澗晚節名德俱重為世尊仰不稱姓字但曰秋澗公作為文章不蹈襲前人要自肺腑中流出平居談話無異於人及操觚染翰經旨之義理史傳之鋪陳子集之英華古今體制間見疉出雄深雅健辭古而意不晦以自得有用為主宜乎綰持文柄獨步一時字畫遒婉以魯公為正所書卷帖為世珍玩樂教掖後進明義理工文章必盡所得又善因材致篤故藉之多顯達者自少至老未嘗一日不學易簀方停筆平昔著相鑑五十卷汲郡志十五卷其承華事略守成事鑑中堂事記烏臺筆補玉堂嘉話賦頌詔誥表啓書疏詩文碑志銘贊樂府號秋澗大全文集者一百卷延祐六年蒙朝廷公議為之刋播焉富哉言乎其勤篤至矣其振耀後世宜矣至於論列時務利害互明得失兼著忠愛情切聞一事可行一士可用必為建白雖未盡行後竟如所言較其蘊奧見諸行事者才十之二三故贈諡制詞有觀其遺書蓋抱經綸之志詢夫成迹豈特黼黻之材惟治朝蓍蔡之是稽繄晚生山斗之所仰蓋公論云敢用是為銘辭曰士惟有立德功與言能一於此不朽者存顯允先公眷兹克勤䇿勳學海力振斯文擴我浩氣塞乎乾坤手抉雲漢大放辭源鴻文大册帝載昭宣人所共知方駕昔賢紹韓歐之宗派得文章之正傳匡時禆政人有未知志存經濟惟日孜孜拜章奏記罔或少遺有物禁訶百才幾施時耶命耶而止於斯載瞻遺藁為世蓍龜山斗聞望後學仰規內相美諡恤典恩推見諸行事功止一時著書傳後千古是希孰得孰失必能辨之又何俟曠世相感則吾道為庶幾用是昭告神寧無疑大行峻極清泉漣漪淵峙無窮永照豐碑嗣子公孺撰文定公子公孺公儀皆能文公孺子笴亦以文顯而笴後漸無聞昌至衛訪之不可得最後於史參政坐聞參政舉玉堂嘉話數事顧謂昌曰此在王文定公集中集板在嘉興可致也昌又遍訪之祥符儒官有自嘉興來者乃始託購文定公集踰年而得則殘缺過半矣又求山鐫野刻於衛浚之郊得文定公及公孺公儀笴文為多嗚呼以文定公啓之繼以公孺公儀與笴才百五六十年所以考見其美者乃藉於是集而子孫墳墓漫不知其所在使又百年併是集亦磨滅則王氏傳承之美且復有不可考者此昌文表所以繼作也嗚呼以世以地豈獨為王氏哉劉昌在西河舟中試筆文定公為翰林學士時有文刻水簾洞中昌課士之暇遂出衛西門尋青嵓山山在淇縣南四十里有水簾洞然險僻不可入昌乘興由金牛䫈折而西行深澗中石磊磊擇地始得步乃舍輿躍騎陟石崖二里許至小風門人有攀蘿而上者望之危若懸猱不能不為之目瞬心掉又折而西北十餘里始至大風門舍騎而登挾以兩𨽻而加之引行十里至所謂雲夢山今云北坡山望煙起叢薄間從者曰此道院也乃少憩有二三老攜茗飲來為盡一盂又行里許見臺殿金碧朗麗若浮空而出者締視之則在大石上端嚴宏偉所謂玉皇殿也而四面皆石壁萬仭深杳迂回下緣山趾登大阪始及門如投阱中然既入則寬間寂寞真神仙窟宅也南即青嵓山今云南方山蓋以其形似言之耳洞在崖半中有井常出光怪水溢流沿洞而下若簾然故云水簾道院為汲判井德常建磨崖刻翰林學士王惲記上為盤螭中可一丈許下趺為左顧龜極工記文宏深典重真可垂傳而洞口刻三四詩極高者苔蘚蝕澀不可讀其下二詩皆贊井公者東入老君祠有洪武戊寅歲彭守約題時已卓午從者具蔬飯飯畢出望蒼峪及桃峪口欲尋醉仙迹不果夫山窮水僻處幽勝之境出於天造地設而井公獨能用志於此名因文傳而文與洞且將與天壤共弊不亦奇哉昌固有志焉而力不能及也漫詩以識之漠漠寒山隱隱鐘迢迢石磴接諸峰支笻欲下人如鳥攬轡先登馬似龍蒼峪雨添溪碓急青嵓雲護水簾重徘徊讀盡磨崖記却笑無能繼後蹤又題水簾洞云秋雲不捲水晶寒芝草年深溼未乾翠壁懸冰鳴劍佩蛛絲穿露織琅玕夕陽照影鮫綃薄春雨添流瀑布寬我欲尋真問丹訣憑誰傳簡借青鸞成化己丑秋姑蘇劉昌在湯陰察院書中州名賢文表卷二十八
