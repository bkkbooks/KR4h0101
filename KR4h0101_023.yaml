body:
  text: 中州名賢文表巻二十三明劉昌編王文定公賦弔廉將軍墓賦并序三代而下功利之說興人臣擅恃功能鮮以禮讓為國者觀頗挾勲内忿忸居人下加諸彼不淺相如引車避嫌有犯無校蓋出天禀粹然處之為非艱至頗聞急先一言遽能握髮數罪受責門庭在將臣為實難若將軍者可謂不逺而復得無祗悔之義哉遂摛文以弔其辭曰渉滹沱而北騖兮過常山之故城何高丘之突兀兮鬱劔氣之崢嶸野人指而告予曰此廉將軍之封陵也人與骨而塵朽兮義於粲乎日星遂陳辭而弔古兮命僕夫以停征嗚呼休哉昔伯禹之所以聖兮始不伐而不矜秦誓之所以經兮善悔過而胥盟觀戰國之多士兮依稀猶三代之英惟功利之時尚兮天理有時而蔽明能不逺而復初兮其惟趙之廉卿方國都之中立兮資内附而兵精頗分閫而秉鉞兮騰茂實而蜚英聲梁從隨而楚讋兮燕弭伏而齊并時有以卜將軍之意氣兮殆雷動而滿盈遽相臣之出右兮何發言之盈庭幾肉餧而食甘兮奮兩虎之必爭及聆急難之一言兮輙弭耳而服膺復頓顙而悔過兮折節負贖罪之荆在引車而不必多兮將臣及此所以為古今之難能也逮漢起而帝稱兮禮飲至而策勲何諸將之失度兮至擊柱而紛紜安得將軍從容為一言兮解販繒屠狗之棼彼臣濬之耄耋兮加充渾之貪䝉咤吳平於帝前兮互滔天而為已功安得將軍滌易其褊薄兮俾無成而有終嗟鄂國之列公兮挾勲勞而凌帝宗縱私忿而無忌兮一墮夫臣子之恭安得將軍北靣而同列兮以中和之氣銷悍戾於未然之胸也雖哀之而不能鑒兮文空言其奚庸繄慨慕其耿光兮日三省乎微躬蕩吾伯夷之隘兮擴乎穆公之容希前賢而同升兮附驥尾而竭忠雖斷斷而無它兮庶幾凜凜徳讓君子之風衝山煙而暮去撫鳴劔兮増雄熙春阮賦并序𤣥暉上人得隆徳故閤餘材斵而為阮因以熙春目之亦文殊之義也至元戊寅春同寗尹端甫劉御史叔謙趙太博彦伯坐心逺軒師為鼓綠水悲風二曲清越悲壯坐客感歎興亡有愴然於懐者師請予賦之其辭曰天新雨風日妍心與閒㑹境趣靜便拉曠懐之逸士過雪庵之老禪斂袂危坐添鑪炷箋於是出桂阮調素絃控朏月而當抱撫筠柱之横駢師曰兹熙春之斷餘偶絲之而清圓者也遂鼓一再行清越悲壯如泉咽冰底風行樾間翛翛兮欲斷而復作淙淙兮似漱而還湲鏗爾擿銅丸之韻淒兮聆高樹之蟬又如游士騁說劔歌去燕何辭氣之從横激太清而沈羽淵客乃呀然而驚慘然而悲信乎物之感人有不期然而然者想老徽之般樂盪侈魄以無前厭華陽之湫隘敞樓居而致仙海鼇首抃金鵬翼騫鬱鼎蓮之香霧鎖月殿之嬋娟蔭千秋之歌舞壽艮岳而不騫俄龍移而鼎去繼金亡而閤遷殆露盤之聲折悵秋風而涕澘興廢一瞬兩朝百年委繁華於野草鎖莽苑之荒煙咄此木之何幸遇幽人之達觀納彌盧於芥子寓餘哀於一彈猶足以舞魚龍於海曲洗亡國之愁顔也嗚呼噫嘻向之使人凛而悲者物詎能動於人哉人之哀樂妄為物之所牽不知太虚寥寥既寂而𤣥唯此理之嘿識何繁華廢興之足歎師曰子其為我賦之吾欲秋月當戸松風滿軒寫仲容之别操合清商而洞宣使雲陰蔽空𤣥鶴下躚走商延於濮上掩新聲於師涓也鶴媒賦并序中統二年予在上都掌記中堂客有負青障挾長权二鶴馴於後以廪繼來請問其役曰以鶴取鹿者也嗚呼鶴善類也喙雖長不鉤銛以噬爪雖巨無跅指以攫而於麀伏容有忮害其如人之不仁何至元壬午冬與禮部王兄子冕因話及此慨然有感曰今人以智計相傾内險外易者何殊於鶴之取鹿也作鶴媒賦其辭曰萬物者元氣之盜氣之靈者莫人若也既役物而君之其忍以盜作智而為得計乎如絓麂草間圖鷓潔地胔紙求蜂葉城綱雉盜物矜雄此何足異以智獵愚理固宜然用愚戕愚斯則不仁之極也鶴本善類與物無忮飛翔寥廓仙游之驥教之羽舞已違元性詐以摽鹿遂戕彼命是則鶴之善人則用而險之返有過於機穽也鶴了不知鹿終弗悟歲供庖㕑皆鶴之故何殊人心内險外易以詐假仁顯比陰忌將取彼有則必姑與彼昏不知日狎而伍一落其機投足無所誠何異以鶴而媒取也吾然後知物之顯暴者既得預而防之愚而深中者尤不可玩而侮也示我同志筆而為賦五言古詩擬韓子秋懐十一首出郭行時稼秋風正薿薿臨川閱逝波浩浩去不已富貴來幾時及此行樂耳把酒對西山坐看秋雲起夭矯化蛇龍異狀紛莫似世態初不殊儻來安可恃我懐㧞俗標干霄仰逸軌酒酣歌嗚嗚振衣私自喜秋風拂庭柯物意自含悴松栢抱貞心表表歲寒地長年豈致養易衰匪自恣浩浩一氣中所禀蓋殊鬼人尤物之靈要以天爵貴天運健不息君子戒靡曼讀書下硬寨肌腸充藿飯造道苦未深紛華非所願秋風動黄鵠千里奚足歎風濤北溟鯤變化摶九萬大邦易為仁郁郁文獻半出處貴有時莫遣夜鶴怨攬衣起秋早露氣清凌凌偶書秋懐篇悮筆成蒼蠅吾言固不佞未免人屢憎聖域有坦途學步高山陵尋源有靈槎臨池弄鯉罾我生恐不偶鄙事從多能虚室生夜白清露發鶴警空庭海月上愛此良夕永今年苦煩歊似值苛政猛盻盻秋風來汲深持短綆庭菊被焚燎脫禍乃差幸朝來有佳色一笑倚軒屏露叢低寒花促織泣暮景呼兒曝羣書趂此秋日炯弊帚享千金利途競纎梗二者昧所思厥病失坐騁既悟前日非敢事子淵請長夜苦漫漫長空星斗暗商歌南山翁遺愛有餘憾秖知享高明曾何恤鬼瞰而我獨於世滋味嚼蠟澹畏途足風波汹汹洪水濫濯足尚云可浣纓豈宜暫此身矧虚舟敢不慎蕳纜天心幸私我書史日與勘庶還浩浩天未害家儲甔殘暑不肯退秋陽麗庭軒靜觀消長理警此歲月奔成功嘿嘿去天道何曾言斂衣坐一室書帙散我前開巻飫至味忘却盤中飱最愛歸去辭雋嚼了一篇作者古不少文字浩萬千感君固窮節當年亦辛酸遥持酒一瓢同醉東籬邊九原不可作念之終歲年青竹不耐暑索寞衆葉乾白露下天宇洗此青琅玕風枝􅉡餘潤暗滿佳菊團依依南飛鵲遶枝擇所安感時賦秋懐古井翻晴瀾我生分已定安用資走丸出門安所之呼兒解征鞍閉門秋月上靜院圍蟲聲幽人掩牕臥一室鑑虚明四序倐以周代謝何其誠物華有盛衰天地復虚盈君子順所履持身嚴五兵牛羊旦旦伐山木時以榮所慎獨處際心蕩韓盧令離離壠上禾望望日攸好不勤耘耔功秀實應不早西風巻黄雲收穫走鄰保荒田棄足惜揠之遺其稿致役貴厥初無為宋人道寒雀歎閒庭有遺粒寒雀往還飛盼睞傍無人翔集下疎籬一啄復三顧慮為物所窺幽人負暄坐玩之澹忘機一笑拂衣起羣驚向空歸因之感吾生分外非所期富貴倘僥倖何殊鳥驚疑吾儕以義榮先賢有良規鹿喻我本麋鹿性出處安自然金鑣非所慕志在長林煙得逺機穽地食苹飲清泉呦鳴錫同類甘以辭華軒野兕出其側暗蹂山前田農家伺所害乃知獸之愆彼兕以計去嘉禾歲芊芊野人居山中數畝事墾劚慮為町疃場指鹿乃兕屬雖無擉刃心見之惡且逐鹿心素無機澹與標枝閑遁跡入幽谷擇音逺人寰尚為山中人置疑齒頰間溪田暮歸疎林煙火微草露溼芒屩遲遲歸路長清月掛林杪依依南飛鵲幾回驚且繞一枝幸得安誰復睇雲表田家固作苦遺安子孫寳彭澤百日令解紱徑歸老我心黙有契縻爵豈不好違已病交攻飢凍止枯槁躬耕南澗垂浩歌樂槃考昆陽懐古行役宛葉郊路入昆陽城􅘷水抱城左蕩潏東南傾川原入四顧蟠亘多崗陵城頽削懸崖草深惡鴟鳴嗟爾一抔土當此百萬兵莽圖十九年聚此天為阬王者況不死千騎驚龍騰漢業兆豐沛赤伏此中興創復兩不易山川賁雄名東西遙相望盤盤兩神京千年事雲㪚草木含威靈野人無所知城邊事春耕扶犂上廢壘壠畝縱復横只應懐古士千古愴餘情為東坡昆陽城賦泛漳篇并序予以王事奔命今春環走二千餘里前次漳陰車殆馬煩且得目眩髀痛疾逺不能騎舟行東下庶得一日之休富覽大川勉卒來事作泛舟篇以見意時至元辛巳四月十一日也盤盤魏大名屬縣行且周銷我髀裏肉四月猶綿裘舍車出漳陰步上枋頭舟咿啞理雙棹信船下中流清風泛微瀾篙師訝當頭豈知河伯意故故為遲留汀花助行吟孰取澤畔愁解衣卧篷底穩似畫舫幽駭觀兩岸移灣環轉林丘灘回淺能澁波富去自遒拍拍風水聲雨打空階秋白鳥何處來雪㸃河之洲前飛如導予翔集聲啁啾欽念川上歎晝夜何悠悠宜為智者樂曲折涵至柔中擅利物功轉漕半九州君看萬斛載掀舞一葉浮仍為勉不息能若兹水不行行望沙麓且得一日休呼兒覔殘紙題作漳川遊野河渡蒼茫劉橋渡南北凡幾過清霜十月交澄湛東流波飲馬立水邊照我兩鬢皤行役非所苦傷懐動悲歌三年恒山趙彈劾兼拊摩熬熬眼中民力弊差與科不能一勺潤慰彼煩與痾顧此衣帶水溉載功實多人而反不若低首愧野河素餐吾可逃奈此蒼生何折齒吟二十四韻吾年未四旬顱髮白勝雪兩眼眩生花一耳或通塞所喜牙齒牢未省有殘缺飲食雖壽基齒壯物喜囓庶幾桑榆境健啖延歲月所以胾與餅飢來若刀截今晨具盤飡軱肉固纖屑一嘬出不虞左齒拉而折羣稚慘不嬉病妻驚欲絶汝老不自量無故取摧摺予云盛則衰百醜見兩頰平生好言辭咀嚼出五色文戰怒欲碎醉飫乾甚決運用勤亦至半百當衰苶一作歇時時以舌䑛乍脱覺中熱一落不復生根权漫枯枿駭若中堅摧闊於山口豁自今湏慎䕶作事思妥帖一柔勝百剛有味老𥅆説唅呀動恥念顛倒潄水怯猶勝昌黎公餘者堅尚潔既不妨歗歌底用心􅑶臲齒墮端午前詩裁重午節成虧恐有數歌以散憂結汲冢懐古丁亥歲三月十八日觀稼西疇遂至伍城抵安釐王陵下歸作是詩者蓋自江左平後竹書多傳於世余憂好奇攻異者讀之恐有致逺汨泥之弊故不得不辯云濔迤伍城郡背水猶陣圖魏陵廢已久磅礴如覆盂草樹慘不春穿穴狐狸墟我來登其巔懐古心躊躇憶當戰國際安釐亦狂且澤麋被臯比坐為秦人驅敗亡自此始保邦何乃疎不知身後藏安用書十車上窺姒與辛下逮蒼周書零亂竹簡光詭説何紛挐征南辨已詳多出行怪徒稽古不適正死為毛頴誣其中亟當辨阿衡被夷誅孔子修六經亦已防姦汚大書一徳後薨葬開亳都在易最奇法安取理所無兹焉萬世程洋洋真聖謨何煩事幽賾致逺泥所趨長歌望陵去樂過風乎雩擊訓狐訓狐本惡鳥飛潛林谷間眎夜返為晝聲勢何軒軒矜凶聚妖異其氣幾神姦家僮夜得之縛致庭階前目光爛兩炬狂躍倖一騫羣兒顧之駭四走入席眠我因為沈思善惡以氣宣古云鷹隼輩不如鳳與鸞以兹惻懚心逺彼凶與殘胡為止我屋夜半呼聲乾女奴前致辭此物何足患西家養以久逸飛偶翩翻内疑始冰釋念之心稍安緬懐昌黎公心炳陽鳥丹彎弧親斃之絶類不使蕃揮策碎厥首亦與韓意然長令杖端血著此一綫殷比跡孔段笏異世同不刋起視夜何其斗插西南天蒸雲變曉黑漠漠來輕寒望崧吟至元丙戌長至日追作二十韻前歲試洛師憶與節齋約同作崧少游心賞為一豁羸驂鞭欲前竟為事所却宛循洛水東馬首眺陰壑洪濛元氣湧磊落雷雨惡不有此峻極安得雄四岳只緣不得登萬象負酬酢諸峰羅六六景氣終慘錯披榛入㑹靈宋離宫名吟倚廢宫角陳公最健者帥可三軍奪空餘墜仙興出世説飛墮迷嶺崿歸尋黑石渡易馹指鞏洛行行嘆不勇失此寧復作吾儕貴乘時過慮自羇靮至今有餘恨夢繞神崧脚盤空轉危磴矯首看飛閤探穴不知畏入室不挽葛兹焉即神清洞户四開闊山人喜余至供具為止泊㑹凌列宿嶺一笑動寥廓雙廟懐古鐵轝動地來獵火燼九縣睢陽東南衝江淮國所援蔽遮不使前恢復可立見二公明此機死守誓不變雖危所保大如蝮螫解腕最難結衆心存殁匪石轉彼蒼畀全節誰為落賊便已矣君不忘握爪掌為穿竟能濟中興淮海了清奠至今忠烈氣皎皎白日貫賀蘭觀成敗不飲浮屠箭殺亡計多寡此論誠可辨我來拜遺像凜對如生靣乞靈激懦𠂻剸決剛同錬朔風吹樹聲尚想登陴戰暮倚暈月城悲歌涙如霰苦熱歎四十六韻效昌黎體祝融駕火虯頓轡周八裔戰酣西北乾回薄餘暮熾朱光沸虞淵大地蒸一氣蒼茫夜色溼酗鬱𤣥象醉今年六月中荼毒逾徃歲金晶才始伏熛怒勢此鋭炎官張火傘屏翳揚赤幟四合歊陳來一鼓赫離治天潢影半涸星鳥芒欲彗吟風樹葉噤塌翮林鳥墜併兼坎兑權不使天地閉王城十萬家燻灼迫一勢乾坤墮熾瓮逸徳駭天吏掩闗人事絶藏伏敢口議褰裳起中夜通夕不容寐捫背赭汗流窺井湯泉沸松間有困鶴無夢到清唳墻根有腐草螢化光晳晳穿簾入我室照眼驚火齊陰蟾遁老魄火䑕騁黠智夜深過我前跳躑翻飲器屋古又足蝎伺螫尤謹避簟紋燎炎輝側脅能少憩舉動體愞熟歔欷氣短細抱冰眠或可揮翣何所濟二年客京師身幸置散地雖無束帶勞唯老覺加倍彷徨不知曙種髮沐而被四序本平分偏盛誰所致火攻出下策不已熸萬類嗟此一世人暍死將何厲此生匪金石流鑠吁可畏内熱復自焚衰槁將立至燥惟以靜勝事湏以義制冰山詎可依煬竈非所媚遐想崑崚巔庭觀何偉麗巍然五千仭日月光隱蔽回環十二樓空明澹無際水晶作柱礎羣玉絢軒陛天風掠枕席月露溼環帔瑶臺擁灝靈萬舞發清吹真仙事朝元鸞鳯互驂翳閬風接𤣥圃追陪憶游戲何年墮塵緣坐想無由詣安得萬里風振此垂天翅脱落區中囚高舉尋吾契虞姬墓在靈璧縣東三十里虹縣道南陰陵山北舊有廟在山上今廢重瞳鮮情人鍾愛獨虞美五年有天下寵幸想無擬一朝走陰陵楚歌聞四起君王大事去飲訣共欷歔感君伉儷恩死不為漢鬼一坵鳯陽東粉黛見石紀空餘山頭草纔歌葉披靡定應月夜魂長遶烏江水食鱸魚鱸魚昔人賢我行次吳江秋風時已過滿意蓴鱸香初非為口腹物異可闕嘗口哆頰重出鱗纖雪爭光背華㸃玳斑或圓或斜方一脊無亂骨食免刺鯁防肉膩勝海薊味佳掩河魴燈前不放箸愈噉味愈長張翰為爾逝我今赴官忙出處要義在不湏論行藏倚装足朝睡且快所欲償夢驚聼吳歌海日方蒼凉平望道中今日風色好舟行喜清和吳江抵嘉興逺不百里過解衣坐蓬底閒聼吳儂歌大艑從東來帆檣鬱嵯峨云是淮海公赴召躭微痾倉皇不少住進棹如飛梭物情忌太盛從者不得多尚餘蔽川載意氣隘兩河有懐陶朱公霸業到不磨功成委之去敝屣與棄蠡左顧萬金槖右顧西施婆可想不可見五湖渺煙波響板辭笙篌雜箏琶悲篥合蕃唱喧然一堂間餘音胡得抗紅牙掩自無按拍喜時向響板出新聲激烈極清亮都來三臠木手拉若爾壯逺疑啄木禽扣户何異剝近驚老鸛喙頓齒振林壑劃然透空去夜靜秋城柝方能節衆音乃見終始作我本幽吟人避喧便澹泊奈何將兩耳聼此終日聒君不見陶琴無絃趣有餘子幼嗚歌死哀樂望黄金臺有感樂生與郭隗儗徳非同儕九九乃小數正可訓提孩樂生復國讐强齊捲輕埃燕昭師事隗竟築黄金臺我思賢王心要罄初始懐在昭固至徳贊襄誠衆哉卧龍以力食躬耕亦堪哀昭烈昧三顧孔明甘草萊一語萬代譽正獨龎公開鳯凰巢千仭一舉出九垓翺翔覽徳下千年能幾來捄時不易得況復管樂才毅然好賢心無為古所咍壯士吟題郝奉使所書手巻使節駐淮海人望兩好熙宋人足變詐觀望占成虧不知破武事中伏混一機壯士死則已不死將有為宋琚凜風概天馬不受羇拘隔一館間激之見連雞事久變乃生勢去心恫疑奄奄十六年慘悴甘湘纍内鬨既首䑕外侮宜紛披盛氣屈使降壯心終不移睨柱欲碎首忍見王人微松嚴操愈厲草綠秋更萋蕭爽隱霧豹脱畧觸藩羝老賊主一殺幽憤將何施庭芝一援手所惜良不貲兵交使其間天理或可期子卿才屬國所報亦以卑至今郎山塚突兀空蟠螭兩行清汝帖只有老天知題焦節婦巻後焦氏有賢女姿禀與衆殊既笄樂貧素出嫁南征夫一朝聞卧病尋訪邊之隅怙恃力眷挽在妾夫何如竟能遂初志扶喪歸里閭朝昏事蠶織恭侍舅與姑百年終孝養葬祭何勤劬拊畜兩孤幼嫁娶禮與俱孫門固衰謝賴一貞節扶夫婦人倫始因之變時汚一端青榖信至死誓不渝采詩論國風彤管宜沾濡誰謂閭閻間凛此風烈媰猗猗谷蘭馨落落青松孤豈惟表門闕抑備太史書達卿昧平生容齋文可娛美節觀東州亦用播友于清風振孤標讀者宜嘻歔送許澹齋提舉隆興學校我初入玉堂喜識澹齋靣忠翁兩朝士極口為稱羨子逺東嘉人文綵金百煉妙年登巍科巧宦歴幾徧風儀聳四筵目光雙炯電前年來京師得遂依劉願校書天祿閤音吐見雄辨長河瀉建瓴灑灑江左傳三釡固祿微一官爭鶚薦行李日羇栖猶是多士冠今來得美除提舉江西彦在吳列朝行客燕領詞翰洪都儘經學文藝業多擅好將鑄顔手主善志無倦習俗與命胍風雅為一變江煙送行舟瀟灑離亭餞清吟代驪歌别思空眷戀依依鄉國情去逐南飛鴈我老歸未得松菊夢秋澗衣冠拱清朝粲馬珠㑹弁自慚老無能零落秋風扇君行重感慨黽勉磨鐵硯長江控高閤百丈驚井幹梅花㪚春妍蒼煙開禹甸江山有清眺風月興不淺南昌地卑溼衆流爭凑衍去年水為災孤城江四轉兒童化魚鱉萬竈産鼃黽慨然為開陳此事豈小便一鍤濬東湖澄江靜如練澹齋素有為肯遣空懐巻七言古詩金馬門行贐董參謀彥才之元帥府十年金馬門中客萬里風雲横上策貂蟬要自出兠鍪拏舟渡江江水窄新豐樹色繞千官一片丹心懸魏闕洞庭白波木葉下千騎臨江思飲馬堂堂大帥晉龍驤聲振南陲無吕賈止則如山戰則克更著君侯叅幕畫淮陰何止一軍驚滿眼旌麾動秋色萬竈連營楚戍煙一樽回首銅駝陌功名年少貴力取行與諸兄垂竹帛蹇予久事筆研間天東倦客未能還夢回破屋見星斗商聲夜半歌南山虚名不到麟閣上白日能饑苜蓿槃何如乘此長風去濁浪吹破東南天銅方爵歌為翟器之賦荒陵盤盤枕山埛石麟埋没秋草平陰燐夜出金作聲牧兒走避羣雉驚佳城一朝見白日神物還從野人得勒銘壬子歲幾周考究古書猶可識篆文鐫刻非近世周鼎殷盤廼倫擬兩柱作一作撐具形四趾垂象齒雷章繞腹隠觚稜老鳯喙長驚下陊土花繡澁不敢蝕飜成翠羽丹砂紫我觀三代制飲器多圓體咄爾形模方劖刻殆神鬼秋菌春蒲非可比物之隠顯固有數流落君家得所止士雖好尚具眼少博雅如卿古君子補亡吕氏尤取重元氣淋漓開太始君不見達人大觀者今古一昏曉人生極壽百歲止作計千年意何藐我歌君試聽古人誰盡了九原不復作此器君當寳一笑尊前為傾倒短歌行山中寒食作是日遊李馬二墳花枝入簾晴晝長游絲翻空網春光一聲金縷酒滿觴聼予短歌踏春陽雲澹風清日將午信馬東城歴煙隖人家野祭湏墓頭白白紅紅滿原圃饑鳶欲下影婆娑不待墦間徹盤俎陂陵高下麥青青貴賤賢愚同一土況兹百歲忽如寄過眼浮榮誰比數古人感此由重論力取功名照千古東崗畸人説隴西攀附雲龍總風虎鉅株枝散勢莫依瀟索荒邱穴鼯䑕豈期健婦持户門一片豐碑論世譜林宗不作蔡邕死旌紀紛紜爭媚娬銀罌酒暖藉草坐滿引一杯私自語吾家先壠在衞南老柏如林百年許起身耒耜世有澤嗣及先君擬掀舉生平抱負奈數奇賫志下泉良獨苦悲纏風樹逾一紀業在青箱恨難抒伐柯有斧睨不逺負荷至予尤莫取一官羇靮晉州城竚望南天涙如雨沙堤行君不見漢家日月四百載比隆三代追唐姚經綸帝業頗多士規為始自曹與蕭又不見丙與魏孝宣中興賴宏濟似慚燮理化權衡重以文儒緣吏事羽毛千古動雲霄黄閣清風兩無愧潭潭政府中書堂朝廷思治具畢張歴觀至元中統間諸公翺翔佐時昌相君繼踵叅幕畫快決不數陳元康況今炎風朔雪混一統軍國庶務何穰穰一朝鳴佩見獨歩恩波鳯沼翻晴光小心清慎富籌策人望翕爾稱賢良房謀古推帷幄傑匪以杜斷疇能將璣旋衡斡日萬計夙夜宻勿心靡遑愛君南選儘公允要使四海桃李俱芬芳我常叩君見餘藴選進久已歸鞶囊栁陰大道沙堤長迤邐逺竝宫圍傍錯金輕軟襯珂馬火城前導光煌煌行人走避歎禮絶焜燿爀奕何非常相君報國有能事澤民三代君虞唐火城沙堤誠足當況兹三陽排凝出九地君子道長羣陰亡惜哉時乎不易得為君一言陳斐狂蕭曹開濟固云重丙魏論思詎可忘羽林萬騎歌并引至元丙子歲立春后三日醉入奉御宅明日酒惡隠几坐殆不能為懐遂取通鑑閲唐明皇帝清宫事蹟作古樂府一章號曰羽林萬騎歌書示表弟韓從益且浮大白數四覺酒氣拂拂從指間出去矣其辭曰韋娘雞晨遵簒武牡雛啄李求太女履霜得冰忽深戒禍始房陵帝私語神龍殿前虹貫日王氣龍池濯煙縷羽林萬騎驍且雄守捉内外生陰風韉裁文豹虎衣炳扼腕久弗諸韋容潞州别駕眼横電虬髯英姿真太宗暗中結納許清禁繼以幽求𤣥禮仙鳧忠𤣥武門前聽二鼓散亂天星隕如雨平明一掃妖氛空相王已是𤣥真主東城瑞靄朝日鮮五王甲第臨天淵三郎歸來龍在沼晴波翠灔終南煙開元隆平此張本煙火萬里春熙然誰圖勇斷蛾眉劔翻作環兒竝轡鞭畫家有玉環並轡圖謁蘇墳在汝州陜縣釣臺鄉峨眉山前神嵩崩騰萬馬東汝流西來横玉虹山川秀潤不少悴知有峨眉老仙宅其中先生立朝有大節南游天使完其忠胸中英氣蟠不盡餘藴散作文章宗天章昭回爛雲漢下探萬古英靈空前年西堂覩先生之真像今年此山拜先生之堂封嗟予何者有此幸青藜得照龍淵宫汝陽樓上重回首安得追逐逸駕攀高風滌濯固陋開顓䝉公雖僵卧其猶龍虎牢闗行至元三年夏六月予與總管陳慶甫考試洛陽東還汴京道出其下鞏原北望河洛郊嵩邙東走脊尾高憶初洪水勢方割湯湯北匯深淵壕千年水去兩崖出天險東阨開成臯中原失鹿在所逐河山戰氣秋蕭騷當年劉項儘勍敵阮生猶為歡非豪竇王掎角更可笑如蛾赴燎其能逃秋煙古戍深黄蒿狐狸夜上闗頭嘷空餘千古荒城路輸與行人説爾曹商鼎歌并序燕士張君父季讀書不求官治生不務富稍有贏餘即購求古器書畫為事故其家藏三代已來鼎彛敦卣及前賢法書名畫甚富素負藻識遇夫奇妙不惜資貨期於必得既得之傳觀借玩初不吝惜暇則明牕棐几展布陳列迺沾沾而喜曰古人不作古意尚在三代之英精諸賢之純粹今吾何修一朝盡得而有之其稽古尚友之誠靜觀適懐之樂於斯時也中心充實意得所寓回視晉楚之富趙孟之貴不啻如雲煙之過目遇佳客踵門焚香煑茗盡發秘藏為序説家數評論其優劣雍容文雅有都城古家風味於足稱也仙露寺僧寳藏商鼎有年不惜百金易而得之愛玩不足復求館閣諸名勝詩詠喜為序其平生澹癖仍以古調歌之其辭曰維商賢君六七作禮重烝嘗制於鑠只緣近古俗忠厚象形作器窮精鑿敦彛鍾鼎賜臣工重比諡贈縻天爵當時文獻不足徵故家餘俗歸寥索蒼銅不逐太社亡千古流傳誇灝噩供佛牀頭夜壑深物歸所好得真托張君稽古負精識入手摩挲三歎息兩耳高撐足拱三六乳附觚何的歴饕餮繞腹雜雷紋紫翠英英悵猶溼細觀款識商父丁崑玉南金非所惜平生澹癖心不足此日大嚼情暢適模形逺紹考古圖發揮假手詞人筆君不見當年莘叟負謁湯高宗肜祭雉雊鬲黄金塗耳玉鉉光此事傳聞已陳迹一朝怳墮三亳間神明之器今目擊或䙚沈煙讀誥盤或挹殷谿煑巖石尚友直探三代英平生閲古心方畢憫雨行至元十七年夏四月二十四日自束鹿縣入深澤午憩西河鄉錄父老語車中足成此詩時所在祈雨旱蟲食桑桑葉無榖不出壠麥欲枯人間四月號清潤物色慘悴幾焚如車前田畯向予説半歲無雨曾霑濡春蠶滿箔弃欲盡鋤户趂熟多空廬社翁致禱略不神盻盻一雨何時蘇嘗聞古人遇災懼牲幣徧走山川雩外修政務内自責念及女謁并包苴昨朝冠蓋稱勸使田務督責湏勤劬農非耕稼何所事勸至無勸將何趍一和繆盭良有謂蝪蜥滿盎真無辜我初聞言顔已厚食不下咽心為瘉憑軾歸時長歎息欲對畸人意先屈因思漢相問行㹀燮和恐是三公職近年氣運例險食忍待湏臾莫倉猝驅車疾去指前途落日蒼茫下喬木宣和寳墨歌贈顔提㸃仲復宣和殿深春晝長老徽宸翰昭回光墨卿入奏少許可追逐五李參三張猶卑古法出新意萬笏細搗和龍香宫鴉借色翻朝日三十六宫香霧溼鳯飛龍舞九天來雙影盤盤落𤣥璧流傳人間今幾春顔公得之知所珍有時一勺試曹溪翠研霮䨴看𤣥雲錦囊舉世為寳玩何知尤物反玩人以兹過客目有屬重似連璧輕埃塵龎眉書客秋澗子老不道進技乃伸右軍筆端有陣法需此甲盾方通神作謌一笑師應聞聚星鳯池硯歌宋賔客宏道出端研示予背有七眼題曰星聚鳯池其狀皆作人目平堅蓋未嘗見也先生喜翰墨又目疾新愈即得此硯豈尤物有歸將為文字之祥耶將洞發神光增雙明於桑榆之境耶喜為作詩以歌之其辭曰硯之同功甲與鋋試之敵場惟利堅其或返是奚用焉嗚呼此硯從何傳墨華猶帶紅雲鮮景星㑹弁舌有泉鳯池春漲光流淵松風瑟瑟聽磨研君看淚眼真茫然斵手愛惜猶珠蠙江山秀發駭一世乃令碧眼開癯仙先生神光還舊觀皎如明月澄秋煙潛心雖澹開有兆不爾此物胡為前硯园喚起襄陽米走虺驚蛇見醉顛讀五代史記作古樂府五首楊栁枝辭唐昭宗天復三年梁王温辭歸鎮留宴壽春殿又餞於延喜樓上臨軒泣别因賜楊栁枝辭今亡乃為補作楊栁枝風吹何嫋嫋暖煙如織綠絲柔延喜樓前春色好臨軒奏曲送行頻梁王重有回天勲一忠之外何復云安得高祖太宗之業如栁新檀來歌汎樓船下淮浦百萬豼貅歌且舞不殺降不掠虜吾君弔伐真湯武爾檀來不欺汝皥皥王風樂吾土椒蘭怨昭皇迫東遷望絶忠臣援堂堂鴈門兵祗足速禍變帝酣長星杯醉魄迷椒殿神龍失水机上肉惡梟啄門夜漏半龍興赤霧天為紅一竁三百皆皇宗唐家大業至此盡自古亡國未有若此之哀恫梁王歸罪將誰紿奴輩雖誅天有在金祥殿空殺氣高賤珪白刃專相待氾水行五季權在兵逆順係財賄同光當宁能幾朝牝雞司晨頒内外添都買宴物山積盡入掖庭充内費君王政荒優宦狎將相無辜恣誅殺蜀資百萬賊所徼縱有其能供近渴一夫夜呼汜水東絳霄樓頭兵反攻雍陵竟墮所好死英武杳逐仙音空先皇有識如相問三矢雖還未克終劉山人歌劉山人黄鬚糢糊衣袖䄛蓍囊藥籠手自攜親詣宫門來省女將軍物色不少差其奈后方爭寵嫵被驅吾父已兵死何物田翁來辱汚椒房恩遇望遂空破帽東歸心痛楚長吁行念樂天歌不重生男重生女此事到吾為妄語嗚呼五季皆天民人倫濁亂疎反親當時乖盭同一氣天理何有劉山人劉山人莫悲泣伎方終老固賤貧却免誅夷為外戚過宋義墓予往年東走魏過楚上將軍宋義墓欲作詩為弔而未暇今日與諸生講讀至義之本末前後諸儒略不見論説因賦此篇以發前賢之所未發者秦兵西來勢莫當羣䧺假義尊懐王我雖三户秦可滅彼蝱可搏微者或莫傷將軍乘勢思一掃當時籌策誠難量項家父子本强暴以謀制勝非渠長義維去暴失之易一死竟墮貪如狼重瞳子何猖狂只知帳中奇兵化青血不悟鉅鹿之戰開天亡風雲慘澹蛇作龍安得即遇隆準翁使我目亂狐裘茸高陽酒徒號狂客醉中兩眼何其瞳攀鱗掉舌纔數語兩女輟洗來趍風英雄有時利不利俛首何限甘長終楚王店頭土一丘至今草棘荒煙愁我來弔古還一嘅西風黄烏聲啾啾秋澗著書圖歌贈畫工張仁卿張生寫出秋澗圖先生胡為此游居知余讀書樂幽寂況復野麋之性宜與水石俱西風蕭條秋氣餘浮雲身世將何如江蘺託詠太哀怨老松臥壑甘扶疎逢時不作棟樑用且湏著論希潛夫盤盤澗曲深幾許長呑逺汎知攸徂百川横障使東往細大不擇羞潢汚考槃有歌誰與伍山鳥山花吾友于張畫師王宰徒雲煙落紙何舒徐吾今屏居日已久為我作此真良謨平生未常學學焉於此初古人尚友無老壯要欲靜泊志可明而逺可逾駸駸晚景幾桑榆不知此去澹泊得似畫中無目明神王骨相臞一丘一壑著幼輿畢此一事為成書此外何有於余乎此外何有於余乎時集錄古今相業為調元事鑑圯上行邳州道中作十一月初四午刻書於宿遷楚兵東來殺為嬉烈火西捲如飇馳為藂驅爵恐過慘天賜漢以興王師憶初椎秦天下震盛氣不折將徒為泥中進履屈亦至不爾安制重瞳兒往年親祀濟北石此日還賦圯橋詩神龍變化不復見仿像鬼物來陰機素書三巻不必怪要本老氏持其雌飛廉舘瓦研歌癸巳六月六日病中作贈王冲霄洛邑西遷漢靈泣一炬南宫三月赤飛廉鎩翮化青鳧老瓦淪胥何所得太陰凝魄祕興亡土花千年不敢蝕劉郎杳杳秋風客神鳥冥飛憶初格豹章爵首尾蟠蛇建章千門風洌洌磨礱頭角入孤圜收斂松聲聼蕭瑟墨花供筆發幽光長日玉堂生五色張華愽物見初心笑泚𤣥泓為渠説昭陵柏城初覩汝十五年來莫渠别䕶軍紀漢明有書應劭箋形更精潔道初在邇求轉遐半世看書眼空纈冲霄持贈有深意澹僻憐予如任俠一朝入手與神㑹過户不知吾屐折嗚呼三代不復見兩漢規模儘堪説寳藏宜與瓦礫殊隄備有人來揭篋昭陵柏城宋仁宗陵也在河南鞏縣西南七言律詩登凌雲閣布衣塵滿戴儒冠風袂來登上將壇棟藻雲飛朱栱溼檐牙霜重玉梯寒風煙逺勝籌邊逈氣勢雄吞汴水乾經略江淮有成算不湏重展地圖看登資聖閣傑閣當年瑞靄氤亂餘金碧半塵昏豈知象教移中土猶揭雄名䕶國門法界冷沈梁苑月寳香難返汝陽魂傷心五嶺騰煙語舉世從風莫與論過朝歌山勢西來擁廢宫荒煙回首接南鄘緬懐藝祖初經野忍見狂童到覆宗野水作聲知客恨幽花含露為誰容千年快意商郊戰流謗爭教有二兇銅臺懐古都邑盤盤據四衝登臨形勢覺天雄歌樓暖響春風細綺陌香銷寳氣空笑著孱王承宋弊至今姦孽擅唐終憑高誰識神州恨付與衡漳日夜東聞詔灤水嵩呼萬歲觴綸章飛下紫泥香九天空有風雲夢萬國爭依日月光草木變衰元氣活乾坤開濟老陰藏兩都耆舊欣相告四十年來未省嘗上王翰林白衣如鵠禁闈春九萬曾搏北海鯤獨翼龍顔潛代邸親承雲錦織天孫兩朝耆徳尊元老千古雄文説赦恩寂寞黄金臺下客詠歸心久在龍門祗謁昭烈皇帝廟一劔功成百戰場三年章武事堪傷力扶漢祚圖燃燼規取劉璋出侮亡若論託孤徒啟簒試評含泣到分香秋風一掬宗臣血五丈原頭落日蒼燕城書事二首都㑹盤盤控北垂當年宫闕五雲飛崢嶸寳氣沈箕尾慘澹陰風貯朔威審勢有人觀督亢封章無地論王畿荒寒照破龍山月依舊中原半落暉朔風千里捲孤蓬斗酒難澆磈磊胸清濁滄浪知自取䝉茸狐服竟誰從燕臺坐老黄金客甲第爭高白玉鍾撥土便成千尺榦露恩初不負嵓松望西陵漳川北岸望西陵馳道東連講武城將略有餘開戰伐墓碑無謂自題評一棺何在彌天力九錫徒誇盜漢名千古遺墟冷煙底定軍山樹拂雲平牧野道中野人川浴振裳衣況接恩波沐鳯池莫訝出門何刺刺湏知去國自遲遲河橋飲餞無千騎文物聲名又一時有淚不揮離别際西風空送鴈行悲上史丞相百揆端歸一相尊中臺潛隠北溟鯤人間桃李爭時晝天上風雲擁㦸門駑蹇遇知思一顧家山回首惜空奔幸䝉翦拂長鳴去㑹有文章報至恩直中書省紫禁彤庭尺五天沈沈碧綺鎖秋煙鳯池波暖鏘鳴佩翰苑才疎愧昔賢人世好懐能幾度風塵長路已三年綠陰好在西園樹辜負移牀聽晚蟬白樓晚眺條山東峙畫屏開樓外長河一線來簷瓦蘸波鴛夢渚鏡鸞空影月臨臺千年事往情如昨滿目春傷恨未裁更著野花留寳靨女墻隨意㸃晴苔洛陽懐古重城繚繞枕邙腰二水交纏㑹洛橋勢即土中多漢制錦圍林苑訝隋妖山川開闔悲今昔陵谷更遷笑市朝萬古消沈竟何有總成閒話付漁樵游玉泉山山腰一徑轉雲蘿照眼平湖漲碧波形勝左蟠遼海逺風煙還覺玉泉多自憐俗駕來逋客急遣清樽發浩歌笑拂巖花醉歸去山林鍾鼎兩蹉跎歸潛洞眼冷朱門鶴蓋陰自開幽洞事幽尋飄蕭書劔三秦客盤礴風雲萬里心竹澗度凉便夏永藥囱留暖愛冬深何時為濯長纓土丹竈茶煙共一林至元七年庚午奉陪憲臺諸公闕下賀正口號盤盤帳殿敞彤庭天仗宵嚴擁萬靈玉筍東班分列辟龍墀首拜認前星煙蟠鼇柱霑吟袖樂泛仙音近御幈歳歲大酺恩例溥自慙虚薄仰皇扄司馬才卿暇日登昊天寺寳嚴墖有懐高摽直上跨蒼穹物外方知象教雄九陌市聲同曉色兩都喬木動秋風遥憐漢馬屯湘渚安得長書附去鴻寂歴村墟野煙外誰家簾幙夕陽紅題張府君墳丘子傃字行甫曾任判官孫二人龍公祠下府君墳岡勢西來虎豹蹲翠琰盛傳千字誄青衫還有讀書孫喬林氣鬱雲山重一水春涵徳澤温白首故侯長健在緊須著力大于門别高屯田晦之十年冠蓋幾相逢邂逅燕城燕喜同清賞已歌梨雪白歸期休負牡丹紅千屯曉月鞭聲底一片田旌夕照中自笑欲歸歸未得草堂無地著盧鴻佛狸祠在𤓰洲城江山照眼舒清眺千古興亡墮眼前𤓰歩市長連野戍佛狸祠古慘荒煙柁樓看取平吳日父老空傳飲馬年此日不湏開濁浪好風都屬往來船送舍弟南歸穰下壬辰十月二十日彰徳相别相思渭北常年事逺送漳南恨别心沙暖暫聯鴻鴈序霜寒淒斷鶺鴒音兩鄉健在都能幾千里含情老更深慰託此懐知懇切不教消息到浮沈賦王詹丞宣賜玉杖王諱慶端字正甫藳城人青宫宿衞舊將軍家世今誰萬石君千騎寵光承眷顧一枝方杖表忠勤靜臨春桂堂階月暖帶紅鸞扇影雲若把璠璵比良徳健於羅結更温文一作前日倚毗今有効雲臺從此策高勲癸巳清明後三日偕益津李士觀登太史臺客中何處散幽懐放眼高明恐易裁兼覺形神未全老試憑筋力共登臺山河繚繞陪京壯樓觀參差落照開曳杖不知雙髀困銅駝巷陌晚歸來徳壽殿玉方池研理宗所御徳壽殿為太上皇后所居殿緝熙講經殿也硯即碧絲歙玉斵坤形霮四溟丹書猶認壽宫名紛紛落墨騰蛟霧浙浙秋風拉瑟聲神物不知崑火烈碧絲今對玉堂卿眼中多少興亡事白髪孤臣最愴情當時同僚承㫖留中齊學士劉東崖侍讀趙方唐皆宋人也為周紫巖賦冬日牡丹蘇州人右職出身新簽兩浙行省事中齋索賦翦翦江風十月霜寒梅時序見花王一枝重薦金盤瑞滿幄濃薰麝粉香協氣暗扶忠節壯名葩來伴紫巖芳故園從此恩光爛巻裏題詩半玉堂聞友人買犀帶聞君饒價買犀躔佀為精神見老年論品要勝華衮異垂腰猶欠玉魚懸通天即是裴公賜素髪其如白傅顛留取百錢休妄費安排開歲置貂蟬寄何參政郎山山下讀書堂萬巻芸香綴夜光贊善昔推東道主賢參高卧北牕凉林烏返哺犍為守易水悲風劔客鄉擊筑㑹傾高麥酒滿壇秋草酹昭王贈西雲上人系海南高弟吏用公才不易逢茶煙都颺落花風登壇懸斷羣機息靣壁傳心萬法通慧眼正來珠媚浦浮雲飛盡月當空虎溪公案元瀟灑㑹約松軒一笑同送安參政南還汴梁參政安公與僕定交於中統初元契濶者二十寒暑大徳戊戌春邂逅於京師樽酒談話追憶疇昔念故舊之彫零感歲月之易邁情不能已者謹以唐律為贈既光回斾且寓愚意之所託云黑頭蚤插侍中貂當日雲霄一羽毛忠翊殿庭稱謹宻量吞湖海見雄豪風雲夢繞調元鼎珌奉光含切玉刀此去斯文應有記豐碑還擬泰山高中州名賢文表巻二十三
