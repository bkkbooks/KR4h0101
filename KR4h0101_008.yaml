body:
  text: 中州名賢文表卷八明劉昌編姚文公碑文中書左丞李公家廟碑燧嘗觀人臣私廟之祭易乎古而難乎今三代不論也漢之時功臣侯者土地人民傳及子孫故嗣侯得以致隆數於其祖宗世世無有所殺後封功臣皆虛邑無有土地人民子孫或官卑力微往往不能為廟與雖為廟以記曰父為大夫子為士葬以大夫祭以士祭既用生者之祿勢有必不能致隆者姑借先宋氏言之如文潞國作廟洛西其先未嘗將相也顧受祭將相潞國嘗將相者其及子甫惟得祭以大夫祿是於不為將相者致隆其真為將相者復加殺也如斯者幾何人哉惟吕正獻惠穆於文靖范忠宣恭獻於文正世其將相者史冊二百年間才十三見事亦曠世而希有者也然自中元以來漢人父子將相者故丞相史忠武公與今資善大夫中書左丞贈銀青榮祿大夫平章政事諡武愍公二家重輝襲芳震耀一時豈獨為之子者信敬於昭昭厥考亦足以慰靈於冥冥矣惟李氏家隴西成紀者實秦將信諸孫漢至六朝門閥甚峻惟與崔盧鄭氏姻不連他族唐李王西夏甚盛强雖宋金嘗加兵終莫能服我太祖始平之其宗有守兀納城者獨戰死不下子惟忠尚少求從父死為今分土淄州諸侯王所得於公為考後以金符監淄州有子十三人公次居四王妃愛其頴異嘗子之在先朝故事凡諸侯王各以其府一官入參決尚書事公代其兄為之李璮為逆有迹淄州君獨從公馳聞璮繫闔門獄中璮誅得出上盡賜償所亡失授公淄萊路奧魯總管後改宣武將軍益都淄萊路新軍萬户與城夾寨圍吕文煥於襄陽四年而下之加明威將軍虎符丞相巴延南征宋兵戍郢十萬城西郢鎖戰艦絶隘為陳我舟不可越乃渠黃灣拖舟泛藤湖以出唐港棄郢去留公後拒敗其追兵行拔新城沙洋下復破夏貴陽邏口下鄂漢陽從故丞相阿里公時以左丞戰荆口禽高世傑下嶽進坑沙市下荆南傳檄歸峽辰沅靖澧常德諸州皆下之又徙鎮常德左丞徇地湖南丞相兵及浙西以地逺援疏詔公與宋都統張茂實吕師䕫闢都元帥府江右公為左副都元帥破劉槃軍下隆興禽熊飛建昌撫瑞吉贑與廣閩諸州皆下㑹宋幼主出降其將相張世傑陳冝中挾益王是衛王昺浮海趨福立益王元以景炎閩廣諸州應者十五郡縣豪傑亦爭起兵公出定反地大破吳浚軍十萬南豐浚走如張文虎復合兵十萬又破之兜港伏尸三十里浚走合其相文天祥瑞金又大破之天祥走據汀别將孔遵窮追并破趙孟瀯軍復其州而還隆興守帥覬利巨室罪以隂與賊連已誅夷百三十家公還白其非辜出其未盡誅者獄中帥府改宣慰司加昭勇大將軍同知江西宣慰司事尋加鎮國上將軍福建宣慰使又改江西宣慰使天祥復陷汀行收兵出興國又擊走之追四百里及之空坑散降其衆草餘萬禽趙時賞以下文武將吏數百人拜參知政事行中書省江西益王殂廟以端宗世傑復立衛王元以祥興移柵海中崖山近去廣治四百里授䝉古漢軍都元帥經略廣東進復梅循英德與廣之清逺走王道夫擊凌震海上獲船三百艘禽將吏宋邁以下二百人又破其餘軍茭塘江淮省亦遣都元帥張𢎞範至自漳與共圍崖山勢計窮蹙度不能國資致陸秀夫抱衛王蹈海死獲其金璽其將吏死焚溺者十萬餘人翟國秀凌震皆降世傑遁去風壞舟死海凌港南海平朝京師上勞苦之其將佐與錫宴者二百功升者千授資善大夫中書左丞移省荆湖凡虜男女奴鬻之者皆罪而正之常德辰澧沅靖五州大荒民至易子以糴為發廩賑之所活為口亡慮十萬計征占城詔使給糧仗造舟海南取得其冝黎儋之民勸趨之疾還詔從皇子鎮南王征交趾敗其兵天長府其王遂舉國航海將舟師追之敗諸洋中獲海艦三百始公䇿城天長儲穀待賊敓衆議不果盛夏軍士疾作漲潦冒營遽議旋軍賊躡敗吾後拒王以公殿賊閉永平關傅藥弩矢射公貫膝負創奪關出境以毒發薨思明州年止五十最其平生小大百戰下城邑百有五為户三百萬嗚呼其亦勤巳後薨七年而贈官賜諡封公之命始下玉音仁煦恩重書棺人臣獲此哀榮極矣公雖不可作巳安知其不肉骨九京耶公諱恆字德卿自號長白篤孝純至淄州君卒方擊兩王閩廣淄州君顧言我死必無訃吾兒使㑹喪縱敵南海平始克銜哀摧慟屢絶且泣謂所從曰為我語諸昆弟妻子吾不得以時喪先公既抱恨以終天今復棄養太夫人而身先朝露於是遐夷吾目不瞑下泉矣其謹事之夫人王氏視分土諸侯王之妃姑也訃至夫人祕不敢聞之姑惟發哀私室公則再見夢太夫人曰兒今死戰日南矣太夫人泣言吾再夢如是豈誠然耶夫人始情告曰婦無以安君姑氏心也覆是久矣始發哭服喪嗚乎死而精魂猶惓惓其親可哀也巳可哀也巳子二人世安以監廣州從朝京師授新軍萬户同知江西宣慰司事再嗣公益都淄萊本軍萬户後以正議大夫仍將本軍僉江西行中書省事再升中奉大夫參知政事行尚書省江西尚書省罷今以上官參知政事行中書省仍江西嗚呼六官而三踐公武已可見其才之無羞子職者自其既相亦解兵其弟世雄以宣武將軍將之乃作河洪之詩使歌以祀公其辭曰李氏之在與水細大河洪姑臧有夏而王越三百年傳歷既長極崇而墮亦天之道日月作矣衆星匿耀王孫始卑徂東自西淄水幽幽束楚之流曰職不豐猶監一州有蟊吾民有梟吾土吾力不能天子肆汝從父奔告帝嘉為心乃陟潛沈寖向用公泱泱漢水南紀所恃為池襄陽金湯陛陛公將萬夫長圍四祀而竟下之岷江失藩沿流列城振落摧乾至莫難一文軌判裂萬里收功九重授䇿惟是武庚狂志復殷爵人號年大蠢甌閩終兄弟及公膺奮擊與鬬四年崕山翦克血其䲔鯢南海無波廄馬笥衣其賚如何帝曰汝烈冝置左相授兵而子西護湖廣公拜稽首天子萬年帝德聖神臣何力焉湖廣聽命壤三千里陰翕陽施賞刑自已及兵占城轉粟黎儋歸佐皇子致討日南不測風洋冒履而三由淄而漢由江而海其涉日深蜚聲日大蕞爾南夷曰尺箠笞狃勝者家輕于出危賊䇿我師不能炎暑敦弓綿力犀甲敗雨避來弗迎邀歸以爭既奔先偏左廣亦傾孰作士氣公殿奮武斬輻短兵援枹鼓鼓格鬬比死冠纓不顛裹轊馬革踐迹文淵維昔禡時皂纛有翩乃今還歸粉篆丹旃兆夢悠悠魂魄遼逺致身移忠維孝其本黼扆思之録其庸勞寵幽上公可謂曰遭公亡不亡公有良子亦秉國鈞實法實似有嚴作廟簠簋維時神容與耶去此奚之維淄維漢維江維海其流或枯廟主斯毁何以麗牲樂石峩峩太史詩之以侑以歌長春宫碑銘元貞之始年秋九月七日皇帝御香殿守司徒臣諤爾根薩里集賢大學士臣布哷齊奏輔元履道𤣥逸真人臣張志仙言臣之曽師長春子丘處機為全真學於寧海之崑崙山太祖聖武皇帝當􅗴金之十年方事西域聞其有道自奈曼俾近臣劉仲祿持詔求之又急其見而遲其來繼伻以迓之抽兵以衛之與語雪山之陽帝之所問師之所對如敬天愛民以治國慈儉清靜以修身帝大然之曰天遣仙翁以寤朕命左史書其言又以訓諸皇子者世祖聖德神功文武皇帝已敕臣徐世隆載諸靈應之碑惟是太祖格天之年丁亥夏五詔因其號易所届太極為大長春宫猶未有碑至是六十九年人已無知受名所自不及今焉陛下昭代曉之詞臣俾刻金石則益不白於將來也敢昧死請制曰可十月十日事下翰林臣燧實以其日直筆故得兢惕以奉明詔臣聞老子曰取天下者常以無事用是究觀歷古受命之君規規務取止乎禹迹之舊其所後服固非兵不能讋故萃衆智驅羣雄謀而鬬之櫛沐風雨露處暴衣審彼已以效成敗或纍嵗踰紀耘鋤未平可謂紛紛事至殷也矧我太祖天戈所直無敢傃仞視徹四海之土疆墟萬國之社祧與臣妾億兆蒼蒼以生之黔首不啻疾風之振林槁非囿夫祝㮚䝉汜燭龍不照而馬足所及其勢猶不是止焉庸以較夫聲教不出禹迹者正如耳之在面有不能居其十一可曰自有生民以來所無惟所有逺故后服益多惟為猷大故久焉而成功其事之殷有百十於古先者於是之時乃遑旁求方外之士從容暇豫猶功成治定束干戈無所於試之世不知垂統之艱苦不待長春之告顧於老子取天下者嘗以無事之言巳陰契其說而冥㑹其機嗚呼聖哉然考仲祿之行其年己卯長春承命絶宋金使幣從其徒十八人者以行明年馳表謝之猶宿留山北辛巳㑹趣使再至始發軔撫州經數十國為地萬有餘里蹀血於戰場避冦乎叛城絶糧于莽閴之沙漠自崑崙四年而至雪山馬上舉䇿試之未及積雪之半觸寒溧裹皸瘃寧其身之不恤以憂軫斯世計是勞勩有不在開國諸勳之下故帝錫之虎符副以璽書不斥其名惟曰神仙凡為是學復其田租蠲其征商癸未至燕年七十六矣而河之北南已殘首鼠未平而鼎魚方急乃大闢𤣥門遣人招求俘殺於戰伐之際或一戴黃冠而持其署牒奴者必民死賴以生者無慮二三巨萬人其推厚德植深仁致吾君於羲軒者歷古外臣當受命之初能為是乎匹夫一言鄉人信之赴訟其門聼直其家為有司者猶罪以豪傑以武自斷而渙其羣以二三巨萬之人散處九州統馭其手帝不疑之斯必有以豈屈子所謂名不可以虛作者耶有遇其時未必見隆于后世祖嘗語其嗣道者曰乃丘祖仙翁朕及識之加贈長春演道主教真人二祖之見而知者然已陛下以聞而知顧為碑以表所由則長春之名藉三聖以久垂者毋惑也臣又思之官之與碑宜一其時太定憲三宗日不暇給嗣教真人尹志平李志常不請則冝以世祖之聖在位之久其培樹擁衛斯學之力而張志敬王志坦祁志誠不一言焉及仙今請而輒報可豈天固存列聖未究以待陛下為終之耶矧即位踰月為壇夀寧宫凡日月列星風雨雷電百神之親上山川社稷林藪走飛諸祇之親下莫不奏假赤章以禋致之十一月與改元端月才九閲月實三為壇其後壇之延春閣天步一再親以戾止其為國與民介祉導和受釐請命者文亦極矣又虞自經厄以還禁為醮祠今雖開之京師而外未白也乃下詔萬方其㫖若曰先皇帝令江之北南道流儒宿衆擇之凡金籙科範不涉釋言者在所聽為若然先皇之開醮祠者有成命也為犯法臣所不愛竟抳而止自今其惟以先皇成命從事是世祖獨未究者陛下又終之也嗚呼事之開也有門而來也有途其就也有時而成也有候方是詔下四海之人感激奮言始吾以為經厄之餘丘氏之學熄矣陛下噓而然之俾屯者以亨塞者以通梗其道者除之取其業者還之叢是數美于仙之身又冠之以寶冠薦之以玉圭被之以錦服皆前嗣教者所亡嗚呼仙之求以報盛德圖以酬至恩其子若孫與雲礽其來亡極者為陛下祈永永萬年當何如也臣燧敢拜手稽首而詩之曰於赫我祖帝縱其武俾肅將之劗平下土既奠南邦西陲未疆乃鼓乃桴龍旗載揚何水不亂亡山不越萬國弱草剛風斯拔踰十暑寒振凱未曰六飛之騁確確其艱孰灼帝心休其益閒繼夕以朝黃吳尚友方詔外臣道德資取崑崙載牽于于其來及之雪山年已徂摧瀝厥腎腸為告悃悃莫匪至言身國之本維帝孚之曰天覺豫飭無怠忘子訓史書虎符寵綏璽書誕告凡為爾學其復亡撓又曰長春而所宿號即名而宫歸主其教假以澤物宏帝之仁于死于存必拯以全旋還其真子孫衆有一絶一繼孰世其守有惑其道而否臧之人曰不然太祖皇之矧我世祖封植益力曰爾長春朕幼及識太祖皇之維朕將之增諡四言煥其唐之有嚴今皇乃聖乃哲身先孝治祖塗孫轍爰詔下臣伐石劘穹臣拜稽首三祖之功豈人不忘維帝欽崇驅馬飛亷屬車豐隆或從上帝陟降斯宫靡祥不臻奚祉弗届於皇我皇萬祀攸賴延釐寺碑大德八年蒼龍甲辰之秋制移江東憲使臣燧于江之西參行省政十月而至裁再閲月嘉平兌弦王相塔齊自軍中啓遣開成路總管府判官常謙數千里驛致安西王教于燧曰吾繇不忘世祖聖德神功文武皇帝順聖皇后深恩大惠嘗請於帝求即六盤興慶池園為寺用資兩聖冥福以永帝之億萬斯年制可加賜黃金兩計者二百五十楮幣貫計者五萬米石計者千四百五十規制一以都城敕建諸寺為師而小之又虞衆役顓俾有司緩則後功急將罷力命王相阿爾輝身綱維之而時其饔勞節其休作經始于元貞丙申省成于大德癸卯非託金石將無以白始此者吾之心成此者帝之力也汝製寺名而文之碑其令集賢學士劉遜書徴士蕭㪺篆額燧敬受而伏思之今焉詞垣之臣雲蒸林立教不是徴而燧之命實繇燧者嘗以文學及侍先王烏乎可辭敢上本所自而言曰在昔憲廟大封宗室以世祖母弟國之關中于後立極之十三年當至元九年詔立皇子為安西王以淵龍所國國之明年至長安營於素滻之西毳殿中峙衛士環列車間容車帳間容帳包原絡野周四十里中為牙門譏其入出故老望之眙目怵心齎咨嘖嘖以為有國而來名王雄藩無有若是吾君之子威儀盛者其時揵河之外秦固內地教令之加於隴於涼於蜀於羌諸侯王郡牧蕃酋星羅棋錯於是間者靡不輿金篚帛效馬獻琛輻輳庭下勃蹊竭蹶如恐於後其大如軍旅之振治爵賞之豫奪威刑之寬猛承制行之自餘商賈之征農畝之賦山澤之産鹽鐵之利不入王府悉邸自有又明年詔益封秦王綰二金印易府在長安者為安西六盤者為開成皆聽為宫邸用不足取之朝廷嵗或多至楮幣貫計者百三十萬裁七年而棄其國明年詔遣今王嗣國之四年當十九年益封江西吉州實食之户六萬五千嵗入楮幣貫計者十萬三千春秋之服紵縑為匹各千嗚呼斯又歷古展親之未聞者於吉王未始至嵗維關中夏則樂其髙寒即六盤居稽諸地志實漢北地郡之略畔道道下于縣其吏長而不令後廢隋義寧中置樂蟠縣既訛略畔矣六盤又樂蟠之訛然以其地介乎涼隴羌渾之交時平則列置監牧攻駒而蕃息之有警則命將出禦無有常制四海無所為而至者惟世祖淵龍之加兵大理也既嘗禡牙於茲及平而歸又飲至焉最其駐驆三易寒暑夫既久此必遺澤餘波深浹他邦而王父子再世受之古稱河潤九里海潤百里信如斯言則發源天潢衍溢涵濡將不千里其藩輔天子寬西顧憂者又不百世而止也亦竊思之王之有國二十有六年克自卑抑恆逺其宫而弗遑處為天子援枹鼓進退諸軍于外以捍侮西北其忠勤如何於此之地心焉慺慺欲祈年今聖於昭昭追福往聖于冥冥王考妣亦與薦焉為宇事佛猶不率作得可而行其孝恭如何枚是數者善美孰與大書之言曰天道福善又曰作善降之百祥易又曰積善之家必有餘慶燧學儒者未嘗知為佛氏之言如佛亦視是忠勤而孝恭者為善而福之則其教與儒可殊塗而同歸也禮諸侯祭其封內山川華之為嶽實王封內嶽祠之門揭為宣釐則表寺之名莫延釐為冝也銘曰於昭列聖事佛盡敬爰質之書古無有並土木之工雕楹繪墉朱塵綺疏匹帝之宫金莖一氣頡頏上下靜供之修乘輿必駕佛逝悠久其言斯存孰為其言百世梵孫帝度其孫而教善治無間邇逺京師必致匪徒致之曰時豫師坐而袵連出轡並馳有如今王於親則懿制地千里規為時寺頥指其相展若易然矧錫金粟帝開其先面勢略畔八稔成績巋然都城敕建遺式帝師京師時寺門楣以長以雄匪弟子誰鼓鐘之音梵唄之力釐帝之餘必王見及帝億萬年王年斯千為磐石宗以固以綿燧作是詩刻時樂石尚憑佛乘垂示無極崇恩福元寺碑大德十有一年先帝立極親祼太室乃慨然曰豫曽豫祖世祖聖德神功文武皇帝裕宗文惠明孝皇帝至元三十有一年成宗既祔廟矣而惟皇考實誕眇躬未大尊顯肆類上帝誄行定諡曰順宗昭聖衍孝皇帝琢玉寶冊納諸廟中尊皇太后以儀天興聖慈仁昭懿夀元之號邇之為子逺之為孫其孝以慈可謂致極而於宸心猶若未然明年至大之元詔羣臣曰昔朕萬里撫軍北荒險阻踐踰躬擐甲胄北冦砥平實艱實棘時有願言皇曽考妣皇祖考妣之豐功茂德皇考太后之厚澤深仁圖以報塞必俟他日振旅而南大建寶剎憑依佛乘上為往聖薦福冥冥慈闈祝釐昭昭下而億兆臣民休祥䝉賴初非有求年千世百專利一已卿曹其灼是懷惟以其日鑾輅親巡胥地所宜于都城南不雜闤闠得是吉卜敕行工曹甓其外垣為屋再重踰五百礎門其前而殿于後左右為閣樓其四隅大殿孤峙為制正方四出翼室文石席之玉石為臺黃金為趺塑三世佛後殿五佛皆範金為席臺及趺與前殿一諸天之神列塑諸廡皆作梵像變相詭形怵心駭目使人勸以趨善懲其為惡有不待翻誦其書已悠然而生者矣至其榱題梲桷藻繪丹碧緣飾皆金不可資算楯檻衡縱捍陛承宇一惟玉石皆前名剎所未曽有榜其名曰大崇恩福元寺用實願言外為僧居方丈之南建為行寧屬之後殿庫廄庖湢井井有條所置隆禧院比秩二品守以相臣割田外郡收其租入以給祝髮日廩月餼坤維為殿乘輿時臨留必信宿久或旬浹其急其成為如何哉功垂什八期以四年正月八日大慶贊將遍賚工官下及役夫何意其日奄以奉諱羣臣進勸宜如故事即踐天位皇帝未忍宅恤經時而始受朝稱天誄曰武宗仁惠宣孝皇帝恭抑之道亦云至矣又哀先志之弗竟懼成功之將墜飭敦匠臣益䖍乃職罷行工曹入於留鑰曰凡修營石木陶繪百工衆技汝實司之與煩文移人取汝所何若從汝自為則易為力而程蚤集矣且敕臣燧汝文之碑臣管以窺天子以四海為家何適非鄉而獨不忘其生所者人情之同漢祖西都關中若忘沛矣及平英布歸過其鄉賦大風使子弟歌之曰朕千秋萬嵗後魂魄猶思沛太祖奮迹龍庭斯固其鄉由世祖都燕宫室池籞百官府庫根柢乎此一嵗乘輿留居者半以故武宗巡幸以還搜田而歸必于是焉大饗飲至若鄉然矧建大剎位置行列棊錯星羅出其睿畫為往聖今聖薦福祝釐者尤所惓惓陟遐之日有未訖工在天之靈懷乎故都他日過之睹是翦然而完粲然而新必甚懌曰畢吾願者真嗣皇為賴哉臣燧載拜稽首為之頌曰鈞之為地匪福不異其異維何由建而寺且地之有於開闢初何千萬年混為民廬何於其時曽不䝉福而至今也梵宫大築曰不難知譬人之身正氣周流隨日而新嗟若梵宫相方視址授其成規維昔天子寫材於江伐石於山言出風行草靡庶頑又假相臣汝往敦匠易衣寒暑飢俟汝餉於兹三年大立細捐垂欲落之而陟配天皇帝曰噫朕兄所志有銜未究其在傳次乃敕攸司無替爾程其用則取邦賦之經佛宇敕為前古有是而其所無兩聖之治前聖往矣於佛焉依今聖萬年與日齊輝濡軌長江拳石喬嶽善頌之存梵唄攸託普慶寺碑大承華普慶寺者皇帝為皇祖妣徽仁裕聖太后報德作也裕聖以嵗戊午來嬪越三年大帝建極當至元乙酉方草有八年裕祖陟天在疚㷀㷀茹茶與蓼上以慰安大帝於倦勤中以惠鞠晉邸順考成廟之不天皆俾不大䀌傷乃心下為皇孫武宗聖上擇師取友督勸于學俾知先王禮樂刑政以為治國平天下之具若曰乃裕祖獲心九有者正由乎斯外接宗親之㑹見內飭宫臣之率職致孝極慈敦睦示嚴如是而善韜智晦明以藏其用大帝才之關政於家則曰於婦是謀投大遺艱不言意喻草九年順考陟方又二年大帝登遐柱傾於天維絶于地急變秋也徐為圖回未嘗大聲以色益示暇豫經時無君四表不聞枹鼓一鳴召至成廟于撫軍萬里之外授是神鼎易天下岌岌者為泰山之安俾聖子神孫得以乘承今億萬年大德二年詔武宗復撫軍于北日侍慈闈者惟今皇上一焉耳故情不分而愛彌篤怡言煦之摩手撫之食焉而羮息焉而牆又伺有無而增益之㑹太官答難監龍興還由老無子自簿臧獲數千指牛羊馬駝蹄角亦數千田屋資貨猶不與存盡獻之隆福宫裕聖則曰吾何庸斯其賜今皇上四年裕聖上仙撤是獻屋為殿三楹事佛妥靈以盡孝思由前順考之國河內未至而還乃與今皇太后克成先志出居二年成廟登遐馳歸京師內難謀作兆緒滋章先事奪之殄殱大慝清宫以待武宗之至既踐天位惟以其月授皇太子寶中書令樞密使誕告萬方明年至大之元視昔所作圖報弗稱乃慨歎曰德一也時則二焉始之報也吾未出閣惟其身今也登兹元良可不為天下報乃市民居倍售之估跨有數坊直其門為殿七楹後為二堂行寧屬之中建殿堂東偏仍故殿少西疊甓為塔又西再為塔殿與之角峙自門徂堂廡以周之為僧徒居中建二樓東廡通庖井西廡通海㑹市為列肆月收僦贏寺須是資大扺撫擬大帝所為聖夀萬安寺而加小其盤礎之安陛戺之崇題栥之騫藻繪之輝巧不劣焉亦大役也未嘗發民一夫皆傭工為之其費一出宫帑既其落止淨供之修薦福冥冥或者裕聖乘風御雲陟降自天歆兹崇報必反而酬陰隲于下降福穰穰者理則有之何難灼見焉惟今皇握黃圖以負丹扆其大則天其威則雷霆其不測則神明推是報德而上之將不裕聖一世而止其孝思逺及烈祖者何窮已哉崇祥院臣請礱石以頌功德敕命臣燧臣伏思之佛氏之言為書數千卷博大閎肆學佛之徒猶有白首不能遍觀儒生未嘗夙一經目雖勦為說終爾膚近不能深造其微故惟如敕所教惟詩報德其辭曰有岑其宇有踐其廡有楹惟旅金鋪雕礎瞿瞿其瞻劌劌其亷秩秩其正於粲其嚴伊誰考斯帝宫亞匹則今皇帝覺皇氏即其圖以進薦福於幽於我裕聖報德是求惟我裕聖為烈無競大帝遐征儲席虛正時我成廟撫軍龍荒惟朝委裘三月皇皇萬里召赴天位畀據其神而明孰測為度如是拱默宫居深安陋昔后母簾政僣干惟撫慈孫於學知勵又開太平大業今繼始為之小其報猶私今焉一人以天下為以天下為誰專裕聖嘉與慈闈實普其慶往聖已矣慈闈萬年翼翼綿綿悠久如天皇上之心初豈以巳覺皇貞之其錫繁祉中州名賢文表卷八
