body:
  text: 中州名賢文表巻十六明劉昌編馬文貞公七言律詩送徐侍御之南臺雲蘂天然拂曙橋鍾陵松檜識南朝臨書應憶晨趨漏把酒何妨夜聽潮官美當年裁錦繡時清今日奏簫韶佇觀召對通明殿别擬題詩寄使軺和繼學郎中送友歸越中薊門東望海無波誰許山人問薜蘿雀舫春聲留水燕鵠袍秋影動天鵝鑑湖草滿芙蓉少鄞縣潮來牡蠣多羞見京塵遮㡌頂羊裘亦欲換漁蓑輓何得之先生手織烏紗日賣錢全家閒住五雲邊伏生有女書空在伯道無兒世共憐北市行歌花爛熳西亭坐嘯月嬋娟少微光氣今年闇知是詩隨過海船賦王叔能宅芍藥鸎粉香奩豔有光天工巧製殿春陽霞繒襞積雲千曡寶盝脂凝蜜半香竝蔕當階盤綬帶金苞向日剖珠囊詩人莫詠揚州紫便與花王可頡頏上京翰苑書懷三首沙草山低叫白翎松林春雨樹青青土房通火爲長炕氊屋疏涼啟小櫺六月椒花駝貢乳九秋雷隱菌收釘誰知重見鼇峰客颯颯臨風鬢已星門外春橋漲緑波因尋紅藥過南坡已知積水皆爲海不信疎星又隔河酒市杯陳金錯落人家冠簇翠盤陀熏風到面無蒸暑去鳥長雲柰客何萬里雲沙碣石西高樓一望夕陽低谷量牛馬煙霞錯天險山河海岱齊貢篚銀貂金作籍官窰磁琖玊為泥未央殿下長生樹還許尋巢彩鳯栖送胡長史之淛憲淛水秋濤溢尾閭外臺清政自涵虛七州課最求儒效一府分曹責吏書氷檗久知諧素履風霜兹復見亷車春坊記我曾聯屬懸喜迎親侍版輿次韻王叅議寄上京胡安常諸公氷盤珍果進紅消九部新聲擬奏韶洛宅土中諸國㑹甘泉天近侍臣朝仙官鳬至應飛舄廉吏珠還豈織綃早晚秋河烏鵲渡彩霓千丈不須橋贈陳玉林道士學士書名御榻前先生歸臥大江邊飛龍亭在山還好伏虎丹成鼎不穿萬頃玉林煙滿地九重金闕日升天聖君若許秦淮去擬借雲房宿一年次韻王編修送彭道士南歸故山松老鶴知年歸寫丹經帶槧鉛鍊杏春林求水碧步虚秋館佩山𤣥石鞭海上無精衛花發江南有杜鵑一曲鑑湖何處覓我今騎馬似乗船貢院憶繼學治書棘闈粉署隔重牆校藝分官屬正郎五夜風簾燒蠟燭九天氷樹劑龍香周旋接武尚書履供帳留茵御史牀臚唱閤門春色曙侍臣應奏慶雲章繆郎中雪谷早行圖十里寒林葉盡凋谷中深雪客行遙留連獻賦遊梁苑辛苦哦詩過灞橋竹裂若聞金石奏山空不聽斧斤樵未央前殿氷花滿郎吏催班已趁朝龍虎臺應制龍虎臺高秋意多翠華來日似鑾坡天將山海爲城塹人倚雲霞作綺羅周穆故慙黄竹賦漢高空奏大風歌兩京巡省非行幸要使蒼生樂至和送安慶路敎王中夫南國煙花一萬重浮船春水正溶溶舒州城壯山偏護博士官清印自封夜誦挑燈吟蟋蟀秋行攜酒采芙蓉仙人李白今應在問訊時時過宿松送胡古愚歸東陽二首籍籍詩中一世豪瑤池三度食蟠桃小移夜雨紅蘭槳旋翦春風白紵袍供奉氷銜從古貴東陽酒價近來高行臺若見王公子道我官曹似馬曹江東亷使王繼學也沈約才清不耐秋歸艎南去漫夷猶還家少拂雙鴛被到闕重修五鳯樓袍色映江榮錦里詩聲傳紙快書郵蘭溪畫燭非蓮炬春早來從十二斿送客歸揚州揚子江頭水拍天人家種栁住江邊呉娃蕩槳潮生浦楚客吹簫月滿船錦䌫憶曾遊此地瓊花開不似當年竹西池館多紅藥日日題詩舞袖前送王叅政上京奏選滇池細馬蹋龍沙宰相朝天路不賒峽裏琴泉春作乳月中珠樹夜成花三千禮樂尊儒術百二山河壯帝家魚上禹門無㸃額直郎宣奏日當衙贈内幾年不入鹿門山妻子相看亦强顔桂樹有枝曾獨折女蘿無蔓不同攀仙人樓上騎黄鶴野客籠中放白鷼莫恨五湖波浪闊鬢毛歸去未全斑送毛眞人還山手提仙印碧霞裳賜履承恩自尚方雨灑石壇苔錦滑日穿油幌竹書光葉鳬此日還滄海漢鵠何年下建章琪樹萬叢芝萬本江南歸路水雲香雜詠歩出汀洲拾翠翎仙家幢節樹亭亭山躋薈蔚籠紗縠波瀉漣漪漾醁醽黄鶴來時天有日𤣥猿啼處夜無星舟行又過淮南國招隱詞高世莫聽𤣥眞觀借居山光朝暮鳯池西襆被仙家共鶴栖且向竹林移坐具都將柿葉寫詩題宅門好牓神清洞書燭終然太乙藜昨夜𤣥壇星斗近步虚聲外望文奎張居士手種梧桐斲素琴親開墨沼寫來禽人間日日朱門別江上年年碧草深勾漏丹砂慙自乞鹿門妻子願同尋我今五十身多病翹首南雲望故林送揚州方敎授煬帝宮前錦纜舟江都不是古揚州船中鏡鑄芙蓉月江上簫吹楊栁秋芹藻有歌來士子魚鹽無賦到田疇戴憑重席男兒事莫向淮南怨白頭寄王繼學亷使班超生入玉門關聖德如天逺賜環已有聲華通北斗又將詞賦動南山薇垣春滿雲猶溼茘浦秋生月更彎京國故人星散去病來題字不能刪喜小孫誦書弋釣爲生不負丞江關詞賦屬徐陵舊傳仙訣能餐玉新試官箴合飲氷坐上看雲秋渺渺夢中聽雨夜澄澄淮天七月猶多暑喜見孫兒學聚螢無題四首瓦溝銀竹曙翻江閬苑涼風滿石幢葛令寄來丹臼一陶公歸去酒瓢雙梧桐寂莫陳宮井薜茘扶疎玉女窗天畔地車呼小鳯桂花流水夜淙淙鶴城十二曡瑤光琪樹懸秋四面香蛺蝶染花生粉白玻瓈著酒煖金黄熏爐舊夢憑荀令燭釦閒吟屬沈郎南國鴈來書不至江樓誰爲製荷裳三湘瀟灑恨無潮烏鵲塡河願有橋丹穴鳯來龍樹逺海門魚去蜃樓遙已知京兆誇高髻不信章華鬬細腰船尾横江春水急長年無事醉吹簫愛酒書生白髮垂鸞膠獺髓豈能醫漢宮鬬草端陽節唐殿穿針七夕時竹上礪房眞可買石間芝箭似難移揚雄擬奏河東賦但乞君王酒一巵次前韻四首岷峨山下錦城江好買𤣥都翡翠幢竹種篔簹千萬箇鳥飛鸂鶒兩三雙銅龍漏下春生水金馬神來霧入窓花落天台招小隱胡麻飯熟石淙淙切玉龍刀寶氣光袷羅半臂麝臍香茘枝囊蜜嫣嫣紫盧橘團金顆顆黄秦氏故侯更漢主石家小婦嫁孫郎江心誰鑄芙蓉鏡照見嫦娥織翠裳錢塘八月水生潮闕筰千年竹架橋簟織龍鬚天路近衣裁蟬翼渚宫遙府中丞相魚垂帶閫外將軍箭挿腰無奈黄金閒買賦雲間學得鳯凰簫樂部韋娘舞小垂病來能召翰林醫嗔人書奏三千牘勸客詩歌十二時金谷花枝隨雨盡石城江水逐潮移世間若有神仙樹西去瑤池醉酒巵龍門萬壑奔流一峽開君王歳歳御龍來人間塵土常相隔天上星辰到此廻草木四時承午日風雲半夜束春雷自慚曾奏長門賦䟦馬徬徨念暴鰓還過龍門紫塞秋高鳯輦廻龍門有客去還來蕩摩日月崑崙坼吐納風雲混沌開天地有神司主宰地靈無力戴崔嵬誰吹石瀬成飛雨不使時人汚酒杯送宋顯夫南歸琵琶溝北識君初籍甚才華二十餘欲賦兔園干孝邸不因狗監進相如瀟湘路熟逢知己韋杜天低望故居㩦㓜歸來拜邱壟南遊莫戀武昌魚駕發上京蒼龍對闕夾天閽秋駕凌晨出國門十萬貔貅騎騕褭一雙日月繡旗旛講蒐獵較黄羊圈錫宴恩霑白獸尊赫矣漢家人物盛馬卿有賦在文園和袁伯長待制送虞伯生博士祠祭嶽鎭江河后土夫容仙掌坐中低后土霄光手可齊棧路蹴雲山有閣蜀天常漏石無泥岐陽過馬應聞鳯陳寶停輈莫信雞使者才華似揚馬題詩應近草堂西次呉眞人梅花韻羅浮庾嶺大荒濱燕薊氷姿好寄身地勝不招金谷客賦成重寫洛川神碧窓逗日留私煦丹井呼泉漬古春草木有知應自喜白衣如我是山人五言絶句雪中登郡城西亭二首澗谷垂寒藤氷光見魚影歳暮風雪交敲瓶煮茶茗飛花墮横塘鏡影照空額天路昭華管吹香慰幽客弔節婦白日松臺閟青山石槨沈空餘哭夫淚下入九泉深題四皓圖二首不聽高皇召還來太子宮阿􅀢人彘禍吾恨紫芝翁鴻鵠歌雖壯長門事可憂閒居紫芝客終不似巢由閒題樹葉上秋意鳯城多涼飈奈夜何題詩滿霜葉不見洞庭波馬户日午炊煙起人家半是農賣田當保馬無褐過三冬朝歌霧黯山沈樹風號路起塵朝歌醉王死周室又歸秦墨竹扇頭氷紈已却暑况此碧琳琅好伴玉麈尾涼颸滿高堂李陵臺二首故國關河逺高臺日月荒頗聞蘇屬國海上牧羝羊蹛林聞野祭漢室議門誅辛苦樓蘭將凄凉太史書歐陽原功銘馮少府墓古鼎刻龍文新銘少府君欲聞蒿里輓零露濕秋墳題猿圖江渚無來鴈山樊有宿猿秋高盧橘熟巴月樹連村偶成山中木葉落江上水波生自是年年事漁樵不必驚黄河塵海東南下雲山西北高黄流蕩中潏萬里費波濤節婦張氏磨筓山月寒織素機石冷閨深鏡塵奩泉咽水結井獨石秋瀬喧石梁臨流不肯渡與客坐忘歸山寒日將暮題王氏樓二首岑樓臨曲水小檻背重城懶慢淮南客終須掉臂行乳燕穿花去倉鶯拂樹來淮天春又夏獨立意徘徊七言絶句楊妃墓漢廟衣冠照碧燐唐陵翁仲作黄塵馬嵬坡上棠棃樹獨占秦原幾日春帥臣子劉宗道藏其父之詩請䟦將家子弟讀兵書欲斬樓蘭換印魚獨有劉郎偏醖藉阿翁詩句作儲胥鎖院獨坐書事口號松間行屋無人到恰似篷船泊浪中午夜風聲敲雨㸃夢廻錯認是漁翁與庫庫子山郎中時祈雨長春宮中郎齋沐醮星官風馬雲車下石壇深夜步虚詞更響要將靈雨濕春乾題劉伯宣哀輓詩揚子橋邊水正波蘼蕪秋草徧陂陀江潮日日風聲急似爲孤臣賦九歌慶陽苜蓿春原塞馬肥慶陽三月栁依依行人來上臨川閣讀盡碑詞野鳥飛驪山三首繡嶺春來緑樹圓東風吹影入温泉華清夢斷飛塵起玉鴈銜香墮野田玉女泉邊翠藻多石池涵影媚宮娥可憐繡嶺啼春鳥猶似棃園弟子歌華隂道士長松下留我煎茶看古碑衣上征塵都莫洗天風一夜爲君吹洛中二首龍門三月洛波清正是花時過故京尊酒不來芳樹逺碧雲初合暮山横東望梁園是故鄉懷歸夜夜夢池塘春城碧樹淮南路飲酒當年似漫郎七夕舟中苦熱嘗憶銀牀桐泣露更思玉椀蔗流漿天孫初嫁龍綃薄却恐秋河入夜凉戲馬臺將軍一叱廢千人未去掀髯便笑秦枉築高臺閒戲馬漢王將地擬功臣歌風臺祖龍無廟托孤魂羽泣妖姬死更奔獨有沛中隆凖客歌風臺上望鄉村集袁王二學士詩爲首二句祖常足成之石城月落鴉棲堞秋浦天青鴈拂簷春送亂紅浮酒面山飄空翠濕書籖送胡古愚還越四首越江秋水得霜清夜夜天南婺女明客子布衣風又急世間無用是才名北風吹鴈不成行揚子江邊上夜航剡紙題詩三百首人來爲我說錢塘秋樹紅時客欲歸江寒潮小鷺空飛東陽有酒堪賒飲莫問桐廬借釣磯送客歸山天正霜吳江蠏美橘初黄上林千樹櫻桃熟莫戀金華是故鄉過故相宅瓦墜當簷燕不來白頭老妾賣花栽舊時小吏今身貴羞近門西上馬臺閩浙之交月出山頭犬吠雲隔林鐘磬鶴應聞老僧見客閒留坐風落松花滿寺門出都潞水年年沙際流都人車馬到沙頭獨憎楊栁無情思送盡行人天未秋獨立玉署凉生試裌羅堦庭新雨長青莎睡醒獨擬三都賦不換人間瑞錦窠誚燕風雨池塘鬬頡頏春來秋去一生忙世間多少寛閒境辛苦營巢傍屋梁送廬山周道士崆峒移得三株樹獨向江邊種未成南國祗應仙露少却來天上瀉金莖送侯嵓亮西南萬里青山路君在峨嵋第幾重莫愛平羌江上水明年京國約相逢題道友舒貴和扇吳蠶入繭素絲多乞與天孫織扇羅氷雪地清天不暑月中仙子種桫欏宋高宗書光武度田圖漢家自有雲臺像誰取丹青畫度田宋主欲興江左業却將書字送長年暑雨凉生紗縠玉秋清雨氣霏霏滿鳯城湖上荷花雲錦爛不能臨水一閒行蜀道士歸儒青城羽客燒丹罷要近東家問六經却笑山隂痴道士白鵝閒覓寫黄庭功德使薩木丹巴勒藏英宗皇帝所賜御書中有御製詩云月色清