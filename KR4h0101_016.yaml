黄雲千里鴈影暗北風裂旗馬首囘漢家衛霍今何用見說軍還如裹痛不思百口仰食恩豈念一身推轂送如今天子皇威逺大磧金山烽燧鮮却將此地建陪京灤水囘環抱山轉萬井喧闐車戛輪翠華歳歳修時廵親王覲圭荆玉盡侍臣朝紱蠙珠新高昌勾麗子入學交趾蠻官貢麟角斗米三錢金如土國人謳歌將軍樂將軍樂四海清吾皇省方豈田獵觀風察俗知太平擬白頭吟君家四壁立妾家萬黄金憶初未相知良媒頼鳴琴遂以身許君偕老畢所願如何忍相忘恩情忽中斷昨朝雙鴛鴦今夕守空牀茂陵展嬿婉還彈鳯求凰凉月凝玉露秋聲在庭樹歌我白頭吟相子長門賦紅淚濕芙蓉緑苔鬱葱籠差看舊雙鏡不敢歸臨卭西施怨三首吳王水殿看芙蓉十二簾櫳罨畫重新得西施顔似玉不敎宮漏滴銅龍妾家本在苧羅山一入呉宮便不還自是夫差心未醒枉將亡國怨朱顔爲妾輕身作館娃妾心刺血報夫差范生事主還無䇿敎妾傾人亦可嗟車簇簇行李陵臺西車簇簇行人夜向灤河宿灤河美酒斗十千下馬飲者不計錢青旗遙遙出華表滿堂醉客俱年少侑杯小女歌竹枝衣上翠金光陸離細肋沙羊成體薦共訝高門食三縣白髪從官珥筆行毳袍衝雨桓州城次韻端午行羅襦垂垂扇奩歇守宮持紅不數蝎挏官馬酒銀流澌内饔餅啖酥凝雪灤水之陽漢陪京拂天翠華風日清繡絲鞋牆擅南陌玉環鏡鼻專東城射栁王孫五花馬醉來見客不肯下擷藍攬緑鬬草嬉靈運無須更誰詫香爐薰衣今幾人蘭階晝永簾光勻圍坐屏風罨畫劇杯中菖蒲笑囘春前宛轉曲紫檀出海南削成琵琶槽上有鴛鴦絃彈曲聲嘈嘈客問此何聲新聲名絳桃一奏桃始華再奏花枝斜笑靨頰暈粉仙源飯蒸霞度作新聲曲春樹雙鶯逐雙鶯逐擲金梭魚藻蕩圓波陌上行車帶結羅絳桃年少光隂多蕭性淵善鼓琴予嘗爲之作我思操今自和林歸再任廵徼之職於江南比行又求予詩遂爲賦漢銅馬式歌以送之漢家金銅鑄馬式求馬相此不失一塞上將軍得一匹驌驦如龍高八尺日斜騎出隂山道獵獵霜風鳴淺草鞍後並懸雙白狼歸來穹廬月弓好江南緑蕪春接天只須一抹蹴雲煙摩訶舊是將軍種酒涴青衫學控弦楊花宛轉曲空中游絲已無頼宛轉楊花猶百態隨風撲帳拂香奩度水㸃衣縈錦帶輕薄顚狂風上下燕子鶯兒各新嫁釵頭燼墜玉蟲初盆裏絲繅銀繭乍欲落不落春沼平無根無蔕作浮萍纈波繡苔總成媚人間最好是清明清明豔陽三月天帝里煙花匝酒船石橋横直人家好小海白魚跳碧藻榆莢荷錢怨别離不似楊花宛轉飛楊花飛盡緑隂合更看明年春雨時公子行緑香繡帳垂流蘇牀頭三尺紅珊瑚十八窈窕秦羅敷曲房小步璫鳴襦高堂公子吹笙竽百斛明珠買氍毹蘭燈桂漿炙文魚但苦不駐羲和車擬唐宫詞二首華清水殿繡芙蓉金鴨香銷寶帳重竹葉羊車來別院何人空聽景陽鐘長門月轉漏聲催自熨寒衣減帶圍休怕官家嫌體弱細腰曾是楚王妃贈陳衆仲纈雲辭纈雲織波射金水郎君水西着皮履南陌紫塵十丈高捋鬚買酒意氣豪萬里將書憑海鳥茘枝千顆團團小天津不隔少微星閶闔門開夜光曉雜言題太白晴碧圖我聞天星之精化爲石况爾柱地名太白又聞崑崙崆峒天壇禹穴雲爲衣何如錦樹翠蘚錯落照晴碧山寒日暮虎豹逺髣髴巉巖霧雨澀淮南筍鞋今不至令人塵笠歌青壁李仲淵御史萬竹亭君不見江有蛟龍宫又不見竹有鳯凰實江波沈沈竹林合中涵絪緼太古色君侯亭子書帙光依微靜緑棲墨香東家絲桐閒高堂我方與客歌篔簹狎蛟龍兮騎鳯凰渭川淇園在何鄉喜知經筵蔡國張公至行夷猶憺容與載兩旗駕四牡踰曾山遵大路日在天雲作雨將至止德容度晨修觀適帝所楊孝廉義烏密雲縣裏日欲西楊家樹上烏來棲啞啞鳴聲似兒啼日出捉蟲哺母饑君不見延秋門姑蘇臺詩人歌曲至今哀烏兮烏兮去復來孝子有念烏無猜商學士萬里圖曹南商君儒家子身登集賢非畫史酒酣氣豪不敢使揮灑山水在一紙咫尺萬里乾坤意人言造物眞兒戲盤紆流動各有象變化倏忽風雲至吾觀崑崙西月出更觀扶桑東日生形勢開合限内外分野上合星辰精大禹鑄九鼎鄒衍外九州豈但草木異乃有鬼魅憂噫嘻奉常官禄薄百錢縫囊貯邱壑爲爾作歌還一噱何年淮南戴青箬聯句秋雪聯句同袁伯長賦白帝欲返馭伯長𤣥神已先驅南山黯遐睇祖常西顥阻清歈刻雲環珮雜伯長剪水瓊瑰敷金英受剛潔祖常丹桂遭模塗高標變鬒髪伯長爽氣通微軀羣隂孤陽僨祖常積素五采腴路脩天鵝疑伯長穴覆野兔呼蟬猶抱殘槐祖常鴈仍驚折蘆滉瀁露莖溜伯長空清氷柱酥或云勢已盛祖常又言理非殊先時明堂嚴伯長薄刑蓐收誅浮華敵春澌祖常歛實侔冬輸慘立各動色伯長沈思儼徐趨鴻鈞轉橐籥祖常緹室潛葭莩觀物昧休徴伯長永歌啓貞苻祖常鸚鵡聯句同王繼學賦雕籬居啄桃繼學袨服儀采緑南荒孕靈質祖常西顥發麗曲頸綬紅縈絲繼學喙棘頳屈玉蓄慧婉含章祖常襮彩粲成縟能言貫珠舌繼學善舞凌雲躅金眸肖韝隼祖常珍畜異巢鵠層塔寶舎利繼學深杯注醽醁流丹曙林度祖常墮翠春洲浴石鏡影毰毸繼學銅梁步陸續題賦吾豈能祖常入貢應爾録繼學都城南有道者居名松鶴堂暇日同東平王繼學爲避暑之遊因作松鶴聯句偃雲聳層霄繼學警露落古雪虬枝憙垂澗祖常鷺羽陋鳴垤蟠石千歳苓繼學頂朱百齡血胎禽哺春巢祖常乳脂凝沍節舞蓋竽籟喧繼學啄粒苔蘚囓𤣥玉薰麝煤祖常碧脛溢雞榤陟岳秦爵崇繼學授甲衛軒劣沐髪豹霧深祖常引吭鳯竹裂風馭八極小繼學河舟三翼拙魯縞曵䙰褷祖常夏社挺嶻嶭任重明堂材繼學言歸華表別拳縮包胥立祖常堅剛伯夷烈延世餌芳液繼學顧步炫高潔作室擅兹美祖常觀物入獨閲誓將束囊書繼學從爾解珮玦祖常至治癸亥八月望同袁伯長虞伯生過槍竿嶺馬上聯句有嶺名槍竿伯長其上若棧閣白雲亂石齒伯生青峰轉帘脚積氷太古隂祖常出礦無底壑馬飲沆瀣泉伯長鷹盪扶搖幙轍蹟委垂紳伯生人聲發虚橐舄飛接鳥背祖常羽没疑虎膊霧松秋髪長伯長霜果紅頰薄斤樵不知疲伯生獨往端有愕兢兢矛頭浙祖常杌杌井口索凝睇見日觀伯長引手探月廓南下渺塵海伯生北廣絡沙漠金橋羣仙遊祖常寶塔百神鑿禽鳴蜀帝魂伯長鐵鑄石郎錯闌干掛鈎衡伯生攙搶歛鋒鍔屬車建前矛祖常馳道狥嚴柝載筆三人行伯長弭節半途却伯生天慶寺納凉聯句同王繼學賦槐幄夏隂繁繼學石池暑氣清高堂瞰福田祖常邃宇依王城午磬梵唄集繼學夜廊酥燈明龕經鬱金字祖常璧礎承丹楹寂寂鴿棲罘繼學宛宛燕穿榮露葵炫晝豔祖常霞藥敷陽英境閴便靜適繼學心古樂高情逍遙祗園賞祖常迤邐廬社盟山枕籍雲潤繼學水簟凝氷輕飯孟給香積祖常袈衲褫華纓海圖岩壑拆繼學天學音聲鏗茘牆䕶筠粉祖常桐甃沈榴瓔共忻朋簪合繼學敢謂詞鋒幷睥睨荒草棘祖常横縱按林坰幽尋振塵鞅繼學雅談止飛觥鄙哉河朔飲祖常投幘得世名繼學中州名賢文表巻十六
