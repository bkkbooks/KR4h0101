body:
  text: 中州名賢文表卷三明劉昌編許文正公雜著紀疑二事答李仲叔家語亡弓聖人之道惟仁與義仁則物我兼該義則職業有分體用參錯莫可相離故語仁而不及義非仁也其流必入於兼愛語義而不及仁非義也其弊必至於為我考西銘理一分殊之説尤為著明四五年來執此以為是用是心以揆昔者人亡人得之説故卒難領會近又推而論之似終有不可行者且弓之為物細物耳雖曰人亡人得而勿求其失未甚顯也使楚子亡其夫人亦曰人亡人得而勿問則已不可矣况桀紂所失之天下即湯武所得之天下使曰人亡人得而勿恤則淫暴之惡未可非而天命之斷未足懼也其可乎哉竊謂楚子亡弓之初當趣令求之求之不得當自反曰我蒞事不敬也委任非人也往者既不可追矣繼自今日兢兢焉業業焉任賢使能俾無再失則庶乎古人改過不吝克勤小物之義今乃舍此不務以能忘為貴則是既失於外而遂遺其內職業不守而以溥博自居無亦近於兼愛之流歟論語豫所否者聖人之心固天地之心然其處事接物必以巳義制之初不問彼之天命何如也若以孔子之不與者遽為天之所厭則其説反似過髙而有難充其類者如不見趙簡子而趙氏之世方興請討陳恆而陳氏之族方盛若以趙氏田氏為不義則可也若遽以天厭言之則有礙矣田橫若不死而仕漢則酈商必無可友之義曽子出妻所適之人曽晳必無受贄之理應事接物恐止以巳義制之不必要彼以天之厭不厭也今日所見若此未知何如衡再拜言來諭以反身而誠為顔子樂處意極精切衡雖未能悟厥旨謹受教矣家語論語説猶未盡曉敢言所疑論子玉請復曹衛論君子者必以德論小人者必以詐以德度德則君子之優劣見矣以詐較詐則小人之勝負分焉德也詐也雖有善惡之殊然各就其中間論之則未始不以深造者為得也為君子而不至於善之長為小人而不至於姦之雄則未見有以過人者蓋嘗於晉楚爭霸之際觀之楚之得臣不自料其詐力之所造與文公君臣孰淺孰深遽使伯棼請戰於楚子告於晉師請復衛侯而封曹徒欲急間讒慝勇於立功而不知區區小數已墮文公之譎矣以詐力之淺者角夫詐力之深者是猶以瑕而攻堅以弱而制強吾未見其可也城濮之師其所以潰亂而莫能支者是果誰之咎耶子玉請復曹衛愚請數其失而論之自周衰以來世以詐力相髙然其詐力之所以髙者亦皆有過人之才焉識慮淺而不險者不足以為詐故伯比之間隨也遺其禍於數年之後喜怒輕而量不宏者不足以為詐故句踐之滅吳也忍其心於屢請之時今得臣既昏且蔽又躁而急乃欲擁西廣東宫與若敖六卒以挫堂堂之晉宜乎其敗也彼文公君臣巧譎萬變自古為詐之人未有出其右者且明分曹衛之田以賜宋者非厚於宋也激齊秦之怒也私許曹衛之復使絶於楚者非愛曹衛也致楚師之戰也至於退三舍而言愈恭者用以驕敵用以報德用以感諸侯之心用以作三軍之忿而得臣於此豈惟不知多方以誤彼又且甘投陷穽以致敵於人噫詐力之淺者見挫於詐力之深者亦不足重煩吾儒之議然於楚子怒得臣之際愚獨有矜焉自楚之竊據東南也憑陵上國號召諸侯其聲威氣熖懾動當世亦可謂甚強矣然楚子既命無從晉師而得臣不忍私忿固請一戰楚子雖怒其不可而竟不能止孰謂以跋扈之君反不能下制一臣吁可怪也巳三綱倒置人倫不明國雖強大而君子已為寒心城濮之戰萬不可勝政使偶而或勝則得臣他日恃功専恣之禍必有甚於喪師之慘矣世之詆霸者猶以尚功利為言殊不知霸者之所為橫斜曲直莫非禍端先儒謂王道之外無坦途舉皆荆棘仁義之外無功利舉皆禍殃彼詆霸者以功利何其僭譽之深耶斯言其至矣辨説辨欲其信也辨而後信未若不辨而信辨而不信尤未若不辨之為愈也辨之要在於自克自克則喻喻則無事於辨矣偶或未曉則盡其心善其説以懇導之猶或未曉不強也二曉字一本皆作喻字幸而開悟則歸美而加敬焉晦其迹使人不知其出於已也此辨之善也雖然辨出於不得已得已而不肯自已者是易言也易言則難信難信則人亦不信病其不信也力辨之辨之愈力而愈不信較勝不已至於忿爭敵日益多力日益困至其敗也猶悔辨之不至此豈辨之不至辨之巳甚也吾竊歎憫思有以告之未識其果信否也既而悔之以楔出楔以酒投酒是亦得已而不肯自已五十步百步又奚辨焉姑記其説時用自省王生名字説王氏子昔嘗從豫遊曽未閲歲乃遷居燕然於今蓋十數年矣頃來復過吾門狀貌加偉而其禮節恭謹無異平時豫嘉其處心近厚也思有以教之因其求更前名遂為説以命之夫有禮則安無禮則危君子有以終身守之者誠以大中至正而不可去也薄俗昏愚鮮克由禮昔為師友今為路人滔滔者皆是也之子從學未久而獨能眷眷於相從之舊非本心之明有以自守其何以能之謹訓其名曰遵禮字之曰安卿誠能因其所已知而擴其所未知因其所已能而推其所未能則他日修身事親之際將不止如今日之王生也吳氏傷寒辨疑論序先朝國醫吳敏修著傷寒辨疑論實得仲景傷寒之要先生猶子墇亂後獨有其書頃嘗幸得而詳讀之概見先生醫學所造之妙嘗謂醫方有仲景猶儒書有六經也必有見於此然後可與議醫然其文古其義隱學者讀之茫乎不可涯涘今是書辨析疑似類括藥證至發先賢之未發悟後人之未悟雖以愚之不敏一讀且有開益彼専門業醫者得是説而推之則所謂茫乎不可涯涘者當了然矣目曰辨疑夫豈徒云已未冬十月戊戌河內許衡序髙凝字説髙生講冠禮豫忝預既字之且求所以命字之意因為説以告曰世變以降波蕩風靡而天下日趨於薄昔者聖人蓋憂之故其垂世立言莫非惇本抑末以謹厚篤實為勸蓋天下之善必原於謹厚篤實天下之惡必始於浮躁淺露此尊君命生之名取於鼎象之意歟尊君以古自立而又以古教生其命生之名取易卦鼎象凝命之凝欲生之以厚自成也以正自守也猶鼎之峙焉雖然此體也未適乎用欲生之博文約禮日篤於人道之常猶鼎之享帝養人之用不為法器而已也夫父子君臣者天之命也人之道也去古既逺天下之俗日趨於薄風靡波蕩一往而不可住其間能以古道自重卓然不為流俗所移况又益資學問之力以進乎道則厚也不徒為厚其正也不徒為正體具用行而於出處窮達無施而不當其亦賢乎留别談彥清談君彥清辭氣溫雅自始識竊有慕焉既又見讀吾聖人書雖館傳暮夜手不暫釋益使人歎仰既又接其論議則尚慕古人以敦本抑末實學為己任雍容樂易大有以畏服人者方將鞭䇿駑蹇私擬竊效未能也將别再三求言正所謂借聽於聾假道於盲其不可也又奚疑雖然盛意不可虛辱將以私擬竊效者告焉可耶否耶請之勤而後言其或可少恕耶夫人患不博古而博古或滯於形迹而不可用於時人患不知今而知今者或徇於茍簡而有害乎道二者雖有皆未也惟學古適用隨時中理其庶幾乎君之尚慕古人雍容樂易既能是矣能是而又言之不幾於贅乎蓋將堅其所已至而期其所未至故云又一本談君彥清辭氣溫雅自始識有慕焉既又見讀吾聖人書雖館傳暮夜手不暫釋益使人歎仰既又接其議論則尚慕古人以有為於時為己任雍容樂易大有以畏服人者方將鞭䇿駑蹇私以擬效未能也將别去再三求言正所謂借聽於聾假道於盲其為不可也固矣然盛意不可虛辱將以區區者告焉可耶否耶請之勤而後言其亦庶乎可耶夫人之學貴於師古而師古者或滯於形迹而不適於用也貴於隨時而隨時者或徇之茍簡而不中於理也二者其可謂善學乎惟師古適用隨時中禮然後可以論學君之向慕古人有志於時蓋能尚矣呈丞相乞致仕狀許衡呈衡舊患腳氣復因憂戚變為水腫此等病候類多難治三數年來止以忌慎之嚴茍延視息今乃叨居要地陪列元臣乏德乏才既不足以辦事非勳非舊又不足以服人虛負寵恩莫任憂畏以故耳增重聽心苦多忘腰痛未已而手麻腹滿才輕而溲澀有困危之勢無安養之期望加矜憐特賜聞奏使退循常分仍守舊資豈惟免尸位之愆亦可效育才之助心獲無慊疾庶有瘳仰干髙明伏幸裁處右謹具呈丞相閣下某年月日許衡呈辭免京兆提學狀後學儒人許衡先於輝州承奉令旨遷來京兆教授人家子弟欽依外今月初一日續奉令旨遷來京兆該亷宣撫保奏令衡充本府提學者衡自推非才不敢祗受即於宣撫相公及以次官貟處告覆至今未蒙允納竊聞提學之官即師表之任也儀刑多士檢正學業實風化人才之所自緣衡早年羇旅學無淵源於舉業功夫未至成就若不量度叨冒寵榮取四方之譏辱王府之命不止為罪於一身也事有所繫義在必辭伏乞宣撫使司詳察擬為回奏施行取鈞旨乙卯年三月日儒人許衡狀對大小學問人稟天地之德五行之秀所以為人故人之德有五仁義禮智信人之倫亦有五父子君臣夫婦長幼朋友以人之德行於五者人倫之間各盡其分乃所謂奉天命立人道也然人生氣質所稟不同上品之人不教而善中品之人教而後善下品之人教亦不善凡上品下品之人分數常少而中品之人分數常多聖人立教使民生八歲皆入小學及其十有五嵗始與王公卿士之子同入大學小學教人自下事上之道如子孝於父臣忠於君之類大學教人自上臨下之道如敬天修德節用愛民之類上知所以臨下則下順下知所以事上則上安上安下順此古昔治平之興必本於小學大學之教也韻語祭鄒國公文惟公之生運適周衰正途壅底大道凌遲分承三聖力破羣疑禽獸楊墨妾婦秦儀宜載祀典宜配先師敢修庶品敬薦於時祭李生文炳文惟生總角從吾誦詩讀書善言日親惡言日疏二十安學志向吾儒經史晝夜筆硯朝晡道則周孔治惟唐虞究始與終論精及粗事我甚専敬我無渝不恤異議不為俗拘較之後生鮮或能踰我年四十病稔微軀别汝西歸待死鄉閭三年林下頗得安舒事既加少病亦尋除念昔舊學日就荒蕪思欲講明共力誰歟我來自西跋涉﨑嶇省汝視汝操立何如身出門庭名聮士夫斐然成章不忘其初我竊慰喜有汝生徒遂意老日相與鄰居益汝新聞卒我前圗舊縣之别中懷未敷擬再會見敘此區區行舟催發水路縈紆十日之程復歸吾廬昔者憂汝多病而癯此别安強謂必無虞訃音忽來告汝身殂我初聞之恍如乘虛撫手痛悼放淚長呼三日皇皇食無一盂束裝東行令壻與俱官事適丁引類連茹悠悠逺思阻越旬餘今我來期弔汝城隅不復歡迎但爾荒墟可勝哀哉可勝悲夫道之隳廢欲汝同扶天既奪汝天其喪豫我年日衰我德日孤思之念之我心如刳汝之父母平日勤劬汝之兄嫂竭力馳驅汝未一報人世俄殊生非巳有死獨誰無惟汝之死家道淪胥幾成而敗欲榮而枯念之思之能不噫嗚魂兮魄兮知乎否乎一杯薦生生其饗諸留吳行甫疏竊以學務求師師明則正可就學賢期衛道道明則益以為賢義有當從謙何過執行甫先生德堪模範學窮淵源巳煩善誘之勤先著小成之效逺圗可望幼志俱親豈容中道之退歸深抑輿情之企慕智惟成物忠必誨人忍令諸子之無依坐視前功之不繼萬願復垂絳帳𢎞古人之舊風重受青襟起今日之新學謹修短疏用表深衷切望髙明特賜允許寄張左丞弔者在門慶者在閭一倚一伏孰知其初君子存誠克己就義始合甚難終知甚易可委者命可憑者天人無率爾事有偶然舍苖不耘固為有害助而揠之其害愈大既徴於色又發於聲天道無他庸玉汝成稽古千文太極之前此道獨立道生太極函三為一一氣既分天地定位萬物之靈惟人為貴太古結繩民醇而愚茹毛飲血穴處巢居伏羲畫卦始造書契神農黃帝三王繼治五帝少昊髙陽髙辛堯舜揖讓傳中以心厯數在禹夏承虞禪謳歌歸子啓與扈戰太康遊畋羿距於河仲康失權胤征羲和一成一旅少康中興桀虐百姓天道禍淫應天順人殷湯革命咸有一德伊尹元聖太甲放桐盤庚遷都武丁中興受終獨夫文王事殷明夷蒙難武王開周首訪洪範成康持守周召夾輔穆王訓刑宣王復古幽惑褒姒犬戎所喪平王東轍國風遂降虛器尊周五伯馳騁孔聖春秋爰始魯隱七國爭雄蘇張縱橫孟子仁義卒老於行孝公強秦鞅變井田赧朝昭襄周阼以遷併吞六國始皇詐狙罷侯置守焚書坑儒阿房長城賦役虐民二世子嬰陳吳亡秦項起泗楚劉興沛中項弒義帝劉從董公轉戰五年資謀三傑進嬰垓下始定漢業髙帝忘功誅醢械繫溺愛戚姬欲立如意良招四皓幼惠遂定吕雉鳴晨房闥出政陸賈計行平勃交歡祿産就誅劉氏乃安文帝恭儉詔半為農景帝遵業醇厚民風武承富庶始建年號窮兵雪恥末年減耗立昭繼武功歸霍光孝宣中興道雜霸王元成哀平權移女黨張禹佞諛乃生王莽十有五年亂生新室更始劉盆王尋王邑光武中興羣盜皆滅寇鄧元勳耿賈洪烈天下平定進尚文史退全功臣封縣數四禮優嚴陵占動太史二百年間名節奮起明帝苛察章帝寬厚和誅竇憲殤終襁幼安雖享御權歸外戚北鄉弗永順淪嬖習沖幼質聰弒於跋扈桓誅梁冀陳李黨錮靈委宦孽黃巾嘯聚進召董卓獻終漢緒曹丕稱魏先主興蜀孫權號吳三國鼎足混於西晉都於洛陽武惠懷愍劉聰所亡元帝南渡一馬化龍建康再振為晉之東明成康穆哀廢簡帝武安偽楚恭遜劉裕原晉之弊起於浮誇清談之極禍成永嘉宋齊梁陳元魏東西南北瓜分後周併齊隋文混一始盛開皇煬帝窮奢恭帝禪唐唐髙之興太宗之謀閨門慚德責以春秋田以租調兵以府衛七百餘員首定官制貞觀仁義髣佛三代本根不正隨亦闕壞再傳髙宗已罹女禍李績一言唐業幾墮武后稱制欲立三思儻非仁傑孰引柬之中宗復辟嗣興韋后睿遜玄宗以功授受開元太平天寶昏亂貴妃內惑祿山外叛肅宗即位大分安在中興有頌功不贖罪代宗中材德宗猜忌奉天所倚陸贄仁義順在東宫隂賜天下憲任裴度平淮有雅惜其晚年禍生不測穆敬昏庸不能討賊文宗鋭意太和清明僅殺宏志莫正典刑輕用訓注禍成甘露武用德裕遂平澤潞宣宗寡恩唐治以衰懿僖昭哀遂不可支唐患非一朋黨閹寺藩鎮強大宣武篡弒朱梁李唐至於石晉劉漢郭周是為五閏錢馬髙陽承襲割據李王孟劉各復僭偽兵變陳橋宋祖即位克平中夏以國傳弟九葉中衰訖於元世四海會同本枝萬年稽古提綱維此千言墓銘南京轉運司支度判官楊公墓志銘公諱天德字君美其先耀之美原人徙同官至髙祖儀徙髙陵世業農曽祖諱亨祖諱植始為縣吏父諱禮以大定庚子嵗十二月庚子生公於北郭公之父雅好儒而仲兄茂實克家厚資公使遊學公亦勤篤能副所望既肄業太學登興定二年進士第釋褐補博州聊城丞未及赴辟陜西行臺掾尋權大理寺丞繼擬主長安簿未幾正主慶陽安化簿尋辟德順之隆德令再辟安化令補尚書都省掾遷轉運司支度判官京城不守流寓宋魯間十年而歸長安公自讀書入仕至於晚嵗風節矯矯始終不少變其為隆德也被圍於德順冒圍請援以死期於復命及復立縣治撫養瘡痍誅鋤強梗民賴以安慶陽之圍也復任安化主帥以公忠勤使兼録事并鎮撫軍民又牒令判府事晝夜不遑處盡智畢力拒守踰年居民餓死殆盡卒逮救至圍解召公還京師公歎曰既不能救民之死又暴其骸而去之吾不忍也擾攘中竟留月餘悉收葬之其忠主愛民若此亂後士夫或不能自守而公於勢利藐然如浮雲晚讀大學解沿及伊洛諸書大嗜愛之常語人曰吾少時精力奪於課試殊不省有此今而後知吾道之傳為有在也埋沒篆刻中幾不復見天日目昏不能視書猶使其子講誦而朝夕聽之以是自樂及有疾親友往問之談笑歌詠不衰曰吾晚年幸聞道死無恨矣以戊午嵗十月四日卒於家春秋七十有九公娶寇氏早亡一女適三原郭孝亷再娶太常少卿京兆孫通祥之女一子曰恭懿孫男曰寅孫女二人皆幼以是年十二月十日葬於髙陵閏國鄉奉政原之先塋公子孝亷篤實克紹先志平居事公已著信於朋友而執喪毁至五日不食寢苫枕塊居廬啜粥又能行古道其治喪一從公之遺命用司馬氏朱氏考訂古禮民迷固久而公獨得以禮葬有子如此公為不朽矣河南許衡敬敘其事而為之志且系銘曰出也有為死生以之處也有守不變於時日臨桑榆學喜有得其知益精其行益力吾道之公異端之私瞭然胸中洞析毫釐外私內公息邪距詖俯仰古今可以無愧受全於天復歸其全尚固幽藏無窮嵗年中州名賢文表卷三
