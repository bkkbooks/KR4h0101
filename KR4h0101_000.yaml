body:
  text: 中州名賢文表總集類提要臣等謹案中州名賢文表三十卷明劉昌編昌字欽謨吳縣人正統乙丑進士歷官河南提學副使遷廣東參政是編即其官河南時所搜輯凡許衡六卷姚燧八卷馬祖常五卷許有壬三卷王惲六卷富珠哩翀原作孛术魯翀今改正二卷又略依本集之類各以碑志銘傳等篇附録于後考許衡魯齊遺書馬祖常石田集許有壬至正集王惲秋澗集雖尚有傳本而惟魯齊遺書有刋板餘皆輾轉傳鈔舛訛滋甚賴此編擷其英華得以互勘至姚燧本集五十卷富珠哩翀本集六十餘卷見於諸家著録者已久佚不傳獨賴此僅存其表章之功亦不可泯矣每集末有昌所作跋語數則亦頗見考訂王士禎香祖筆記載其觀宋牧仲重刻文表且云欽謨諸跋當悉刻之以存其舊此本實康熙丙戌宋犖授錢塘汪立名所刋其附入原跋蓋本士禎之意昌自序又謂此其內集尚有外集正集雜集若干卷今俱未見殆久而散佚歟乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部八中州名賢文表總目總集類卷一許文正公奏議奏對卷二許文正公雜著卷三許文正公雜著韻語墓銘卷四許文正公書牘卷五許文正公詩章詞調卷六許文正公附録卷七姚文公詩賦代言銘辭卷八姚文公碑文卷九姚文公記序卷十姚文公墓碣卷十一姚文公神道碑卷十二姚文公神道碑卷十三姚文公神道碑卷十四姚文公神道碑附録卷十五馬文貞公五言古詩七言古詩五言律詩五言排律卷十六馬文貞公七言律詩五言絶句七言絶句樂府歌行雜言聮句卷十七馬文貞公騷賦制誥表箋章疏記序卷十八馬文貞公碑志卷十九馬文貞公碑志附録卷二十許文忠公古賦五言古詩五言律詩七言律詩七言絶句歌行贊題跋序卷二十一許文忠公記碑志卷二十二許文忠公碑志附録卷二十三王文定公賦五言古詩七言古詩七言律詩卷二十四王文定公奏議記序卷二十五王文定公記序卷二十六王文定公碑志卷二十七王文定公碑志卷二十八王文定公題跋附録卷二十九富珠哩文靖公碑銘卷三十富珠哩文靖公碑銘記序詩頌附録中州名賢文表原序文之行世不猶水之行地中乎河洛淮濟天下之水之盛者也其行於地中或數千里以至萬里而入於海茫乎沛然孰得而禦之何哉有源故也賢者之於文亦然仁義以為本禮樂以為用詩書以為輔騷史以為飾矩度以為凖開闔以為勢鋪張以為體其言主乎立教其志將以求合於聖人之言故曰觀於海者難為水遊於聖人之門者難為言夫言之非難其將以求合於聖人者之難也而賢者乃獨務其難卒使其言垂世而立教者何哉有本故也惟修辭立誠以益充仁義之本斯言不戾於聖人猶水之有源則其出也必盛此理之常無足怪者昌奉詔提學中州且九年嘗觀濟之源於王屋觀淮之源於桐柏濟與淮中州之名川也所謂天下之水之盛者也濟出王屋伏行二百里而始大發發而即盛淮出桐柏行百餘里亦大發發而即盛非若溝澗溪澮挾潢潦以自溢者比此非其源之深乎既又南觀河洛河出圖洛出書在古聖人之世而皆在中州之境中州居四方之中嵩嶽在焉詩有之維嶽降神生甫及申故昌嘗旁探逺覽自申甫而下於漢得賈生於唐得韓文公於宋得兩程夫子於元得許文正公皆中州之名賢也今或數百年以至千年而其言猶傳非其本之大乎本以仁義用以禮樂輔以詩書飾以騷史其言之所主要皆教之所寓而矩度開闔鋪張之大較森然畢陳此宜不戾於聖人而有傳也懷慶守吕恕以許文正公遺書授昌昌遂附之以姚文公燧馬文貞公祖常許文忠公有壬王文定公惲富珠哩文靖公翀諸集之僅存者而表章顯著之蓋皆中州之名賢也故題之曰中州名賢文表夫諸賢之文其行世如河洛淮濟之行地人固無有禦之豈必昌之能表著哉愛慕之已切記憶之務勤維日維夜手披口誦則可謂云爾已矣此其內集復有外集正集雜集凡若干卷云成化七年三月朔旦姑蘇劉昌序前明姑蘇劉欽謨氏提學中州編纂元世名賢許文正公衡姚文公燧馬文貞公祖常許文忠公有壬王文定公惲富珠哩文靖公翀六君子之文如干卷鋟板行世六君子皆中州産也名曰中州名賢文表余自少知有是書輒景慕鄉先生遺風餘烈心嚮往者久之後建節三吳得於藏書家亟以授汪子西亭重付剞劂既訖工㑹余奉命入掌銓衡走使持槧本請序余惟六君子之文崒乎與嵩嶽二室爭髙固無俟余之讚述乃若劉氏汲古之勤表賢示後之切惡可無一言以襮其美哉夫許魏公以真儒為帝者師其立言皆原本洙泗佐佑濓洛牧庵其髙第弟子倡明古文蔚為當代宗匠他如浚儀安陽兩雄並跱秋澗公獨步一時魯參政師道自任其所著述宜皆炳炳麟麟不可磨滅矣顧自六君子距劉氏近才百餘年逺不過二百年而殘編斷簡日就雕亡其辛苦營購而僅得之者亦多缺誤向非劉氏蚤夜矻矻作為是書再越幾百年以迄於今其存也有幾乎劉氏之有功於前賢甚大劉氏既傷集本之失墜凡山鐫野刻靡不搜討所過前賢遺址必禮其祠墓録其子孫遇豐碑巨碣必周覽摩挲備紀其髙厚廣濶上下盤趺之狀雖其廢擲偃仆於雲埋雨蝕中者必洗剔植立深簷蓋覆以致其懷賢思古之幽情跡其過百泉尋蘇門遊嘯處憑弔文獻之餘踪訪水簾行深澗舍輿躍騎舍騎而登捫蘿陟巘窮幽遐險絶以讀磨崖之記蹣跚躑躅於寒山石磴青巖蒼峪之間雖好竒如康樂柳州無以過嗚呼夫亦可以想見其髙風邈世矣余嘗慨夫世之為政者非法令所及不復議生平宦遊所歷未嘗不以表賢復古為志蒞吳之日前賢之為吳寓公有蹟可尋者嘗為之還其舊觀重開雕其遺集以垂後世今劉氏故吳之先正也劉視學吾鄉且九年而余撫吳凡十有四年迹偶相類而汲古表賢之意復曠世相感又其所編纂皆吾鄉先生琳琅金薤流落而僅存者少而知慕老得遂其手胝口沫之思蓋不勝欣然喜喟然歎茫然長懷而願後之君子相與共存是志於無窮也六君子元史各有本傳今載卷端備考康熙四十五年七月既望商邱宋犖序蘇州劉昌欽謨氏視學河南搜許文正以下六公之作題曰中州文表凡三十卷書撰於成化之初去元未逺而姚文公集五十卷富珠哩文靖公集六十餘卷已不復見藉是編所録以傳其表章之力匪細矣按欽謨序以是為內集復有外集正集雜集惜其並亡訪之儲藏家不可得吾師商邱宋公手授藏本命讐校而鋟之凡匝嵗而後卒業云康熙丙戌嘉平錢唐汪立名謹識中州名賢文表原序中州名賢文表本傳許衡許衡字仲平懷之河內人也世為農父通避地河南以泰和九年九月生衡於新鄭縣幼有異質七嵗入學授章句問其師曰讀書何為師曰取科第耳曰如斯而已乎師大竒之每授書又能問其㫖義久之師謂其父母曰兒頴悟不凡他日必有大過人者吾非其師也遂辭去父母强之不能止如是者凡更三師稍長嗜學如饑渴然遭世亂且貧無書嘗從日者家見書疏義因請寓宿手抄歸既逃難岨崍山始得王輔嗣易注時兵亂中衡夜思晝誦身體而力踐之言動必揆諸義而後發嘗暑中過河陽渴甚道有梨衆爭取啖之衡獨危坐樹下自若或問之曰非其有而取之不可也人曰世亂此無主曰梨無主吾心獨無主乎轉魯留魏人見其有德稍稍從之居三年聞亂且定乃還懷往來河洛間從柳城姚樞得伊洛程氏及新安朱氏書益大有得尋居蘇門與樞及竇默相講習凡經傳子史禮樂名物星厯兵刑食貨水利之類無所不講而慨然以斯道為己任嘗語人曰綱常不可一日而亡於天下茍在上者無以任之則在下之責也凡喪祭娶嫁必徴於禮以倡其鄉人學者寖盛家貧躬耕粟熟則食粟不熟則食糠核菜茹處之泰然謳誦之聲聞户外如金石財有餘即以分諸族人及諸生之貧者人有所遺一毫非義弗受也樞嘗被召入京師以其雪齊居衡命守者館之衡拒不受庭有果熟爛墮地童子過之亦不睨視而去其家人化之如此甲寅世祖出王秦中以姚樞為勸農使教民耕植又思所以化秦人乃召衡為京兆提學秦人新脫於兵欲學無師聞衡來人人莫不喜幸來學郡縣皆建學校民大化之世祖南征乃還懷學者攀留之不得從送之臨潼而歸中統元年世祖即皇帝位召至京師時王文統以言利進為平章政事衡樞輩入侍言治亂必以義為本文統患之且竇默日於帝前排其學術疑衡與之為表裏乃奏以樞為太子太師默為太子太傅衡為太子太保陽為尊用之實不使數侍上也默以屢攻文統不中欲因東宫以避禍與樞拜命將入謝衡曰此不安於義也姑勿論禮師傅與太子位東西鄉師傅坐太子乃坐公等度能復此乎不能則師道自我廢也樞以為然乃相與懷制立殿下五辭乃免改命樞大司農默翰林侍講學士衡國子祭酒未幾衡亦謝病歸至元二年帝以安圖為右丞相欲衡輔之復召至京師命議事中書省衡乃上疏曰臣性識愚陋學術荒疏不意虛名偶塵聖聽陛下好賢樂善舍短取長雖以臣之不才自甲寅至今十有三年凡八被詔㫖中懷自念何以報塞又日者面奉德音叮嚀懇至中書大務容臣盡言臣雖昏愚荷陛下知待如此其厚敢不罄竭所有禆益萬分孟子以責難於君謂之恭陳善閉邪謂之敬孔子謂以道事君不可則止臣之所守大意蓋如此也伏望陛下寬其不佞察其至懷則區區之愚亦或有小補云乃陳立國規模中書大要為君難及農桑學校等事詳見奏議帝深嘉納之阿哈瑪特為中書平章政事領尚書省六部事因擅權勢傾朝野一時大臣多阿之衡與之議必正言不少讓已而其子又有僉樞密院之命衡獨執議曰國家事權兵民財三者而巳今其父典民與財子又典兵不可帝曰卿慮其反邪衡對曰彼雖不反此反道也阿哈瑪特由是銜之亟薦衡宜在中書欲因以事中之俄除左丞衡屢入辭免帝命左右掖衡出衡出及閾還奏曰陛下命臣出豈出省邪帝笑曰出殿門耳從幸上京乃論列阿哈瑪特専權罔上蠧國害民若干事不報因謝病請解機務帝惻然召其子師可入諭㫖且命舉自代者衡奏曰用人天子之大柄也臣下泛論其賢否則可若授之以位則當斷自宸衷不可使臣下有市恩之漸也帝久欲開太學㑹衡請罷益力乃從其請八年以為集賢大學士兼國子祭酒親為擇䝉古弟子俾教之衡聞命喜曰此吾事也國人子太朴未散視聽専一若置之善類中涵養數年將必為國用乃請徴其弟子王梓劉季偉韓思永耶律有尚吕端善姚燧髙凝白棟蘇郁姚燉孫安劉安中十二人為伴讀詔驛召之來京師分處各齊以為齊長時所選弟子皆幼稚衡待之如成人愛之如子出入進退其嚴若君臣其為教因覺以明善因明以開蔽相其動息以為張弛課誦少暇即習禮或習書算少者則令習拜跪揖讓進退應對或射或投壺負者罰讀書若干遍久之諸生人人自得尊師敬業下至童子亦知三綱五常為生人之道十年權臣屢毁漢法諸生廪食或不繼衡請還懷帝以問翰林學士王磐磐對曰衡教人有法諸生行可從政此國之大體宜勿聽其去帝命諸老臣議其去留竇默為衡懇請之乃聽衡還以贊善王恂攝學事劉秉忠等奏乞以衡弟子耶律有尚蘇郁白棟為助教以守衡規矩從之國家自得中原用金大明厯自大定是正後六七十年氣朔加時漸差帝以海宇混一宜協時正日十三年詔王恂定新厯恂以為厯家知厯數而不知厯理宜得衡領之乃以集賢大學士兼國子祭酒教領太史院事召至京衡以為冬至者厯之本而求厯本者在驗氣今所用宋舊儀自汴遷至京師已自乖舛加之嵗久規環不叶乃與太史令郭守敬等新製儀象圭表自丙子之冬日測晷景得丁丑戊寅己卯三年冬至加時減大明厯十九刻二十分又增損古嵗餘嵗差法上考春秋以來冬至無不盡合以月食衝及金木二星距驗冬至日躔校舊厯退七十六分以日轉遲疾中平行度驗月離宿度加舊厯三十刻以線代管窺測赤道宿度以四正定氣立損益限以定日之盈縮分二十八限為三百三十六以定月之遲疾以赤道變九道定月行以遲疾轉定度分定朔而不用平行度以日月實合時刻定晦而不用虛進法以躔離朓朒定交食其法視古皆密而又悉去諸厯積年月日法之傅㑹者一本天道自然之數可以施之永久而無弊自餘正訛完闕蓋非一事十七年厯成奏上之賜名曰授時厯頒之天下六月以疾請還懷皇太子為請於帝以子師可為懷孟路總管以養之且使東宫官來諭衡曰公毋以道不行為憂也公安則道行有時矣其善藥自愛十八年衡病革家人祠衡曰吾一日未死寧不有事於祖考扶而起奠獻如儀既撤家人餕怡怡如也已而卒年七十三是日大雷電風拔木懷人無貴賤少長皆哭於門四方學士聞訃皆聚哭有數千里來祭哭墓下者衡善教其言煦煦雖與童子語如恐傷之故所至無貴賤賢不肖皆樂從之隨其才昏明大小皆有所得可以為世用所去人皆哭泣不忍舍服念其教如金科玉條終身不敢忘或未嘗及門傳其緒餘而折節力行為名世者往往有之聽其言雖武人俗士異端之徒無不感悟者丞相安圖一見衡語同列曰若輩自謂不相上下蓋十百與千萬也翰林承㫖王磐氣概一世少所與可獨見衡曰先生神明也大德二年贈榮祿大夫司徒諡文正至大二年加正學垂憲佐運功臣太傅開府儀同三司封魏國公皇慶二年詔從祀孔子廟庭延祐初又詔立書院京兆以祀衡給田奉祠事名魯齊書院魯衡居魏時所署齊名也姚燧姚燧字端甫世系見燧伯父樞傳父格燧生三嵗而孤育於伯父樞樞隱居蘇門謂燧䝉暗教督之甚急燧不能堪楊奐馳書止之曰燧令器也長自有成爾何以急為且許醮以女年十三見許衡於蘇門十八始受學於長安時未嘗為文視流輩所作惟見其不如古人則心弗是也二十四始讀韓退之文試習為之人謂有作者風稍就正於衡衡亦賞其辭且戒之曰弓矢為物以待盜也使盜得之亦將待之文章固發聞士子之利器然先有能一世之名將何以應人之見役者哉非其人而與之與非其人而拒之均罪也非周身斯世之道也至元七年衡以國子祭酒教貴胄奏召舊弟子十二人燧自太原驛致館下燧年三十八始為秦王府文學未幾授奉議大夫兼提舉陜西四川中興等路學校十二年以秦王命安輯庸蜀明年漢嘉新附入諭其民又奉命招王立於合州又明年撫循䕫府凡三使蜀皆稱職十七年除陜西漢中道提刑按察司副使録囚延安逮繫詿誤皆縱釋之人服其明决調山南湖北道按部澧州興學賑民孜孜如弗及二十三年自湖北奉㫖趨朝明年為翰林直學士二十七年授大司農丞元貞元年以翰林學士召修世祖實録初置檢閲官究核故事燧與侍讀髙道凝總裁之書成大德五年授中憲大夫江東亷訪使移病太平九年拜中奉大夫江西行省參知政事至大元年仁宗居藩邸開宫師府燧年已七十遣正字吕洙如漢徴四皓故事起燧為太子賓客未幾除承㫖學士尋拜太子少傅武宗面諭燧燧拜辭謝曰昔臣先伯父樞嘗除是官尚不敢拜臣何敢受明年授榮祿大夫翰林學士承㫖知制誥兼修國史四年得告南歸中書以承㫖召明年復召燧以病俱不赴卒於家年七十六諡曰文燧先在蘇門山時讀通鑑綱目嘗病國統散於逐年不能一覽而得其離合之概至告病江東著國統離合表若干卷年經而國緯之如史記諸表將附朱熹凡例之後復取徽建二本校讐得三誤焉序於表首略曰其一建安二十五年徽本作延康元年凡例中歲改元在興廢存亡之際以前為正當從建本於建安二十五年下注改元延康其二章武三年徽本大書三年後主禪建興元年建本無三年則昭烈為無終徽建皆曰後主於君臣父子之教所害甚大是起十四卷盡十六卷凡曰後主者皆失於刋正也當於三年下注帝禪建興元年明年大書帝禪建興二年庶前後無齟齬也其三天寶十五載注肅宗皇帝至德元載明年惟曰二載為無始當大書二載上加肅宗皇帝至德使上同於開元三者鈞失而建安之取至德之去統固在也若章武之距建興才三年耳遽有帝父主子之異豈不於統大有關乎詳見序篇燧之學有得於許衡由窮理致知反躬實踐為世名儒為文閎肆該洽豪而不宕剛而不厲舂容盛大有西漢風宋末弊習為之一變蓋自延祐以前文章大匠莫能先之或謂世無知燧者曰豈惟知之讀而能句句而得其意者猶寡燧曰世固有厭空桑而思聞鼓缶者乎然文章以道輕重道以文章輕重彼復有班孟堅者出表古今人物九品中必以一等置歐陽子則為去聖賢也有級而不逺其文雖無謝尹之知不害於行後豈有一言幾乎古而不聞之將來乎當時孝子順孫欲發揮其先德必得燧文始可傳信其不得者每為愧恥故三十年間國朝名臣世勳顯行盛德皆燧所書每來謁文必其行業可嘉然後許可辭無溢美又稍廣置燕樂燧則為之喜而援筆大書否則弗易得也時髙麗瀋陽王父子連姻帝室傾資結朝臣一日欲求燧詩文燧靳不與至奉㫖乃與之王贈謝幣帛金玉名畫五十篚盛陳致燧燧即時分散諸屬官及史胥侍從止留金銀付翰林院為公用器皿燧一無所取人問之燧曰彼藩邦小惟以貨利為重吾能輕之使知大朝不以是為意其器識豪邁過人類如此然頗恃才輕視趙孟俯元明善輩故君子以是少之平生所著有牧菴文集五十卷行於世子三塤圻城馬祖常馬祖常字伯庸世為雍古部居靖州天山有錫喇濟蘇者於祖常為髙祖金季為鳳翔兵馬判官以節死贈恆州刺史子孫因其官以馬為氏曽祖烏呼訥從世祖征宋留汴掌饋餉纍官禮部尚書父潤同知漳州路總管府事家於光州祖常七歲知學得錢即以市書十歲時見燭欹燒屋解衣沃水以滅火咸嗟異之既長益篤於學蜀儒張􅓄講道儀真往受業其門質以疑義數十􅓄甚器之延祐初科舉法行鄉貢㑹試皆中第一廷試為第二人授應奉翰林文字拜監察御史是時仁宗在御已久猶居東宫飲酒常過度祖常上書請御正衙立朝儀御史執簡太史執筆則雖有懷姦利己乞官求賞者不敢出諸口天子承天地祖宗之重當極調攝至於酒醴近侍進御當思一獻百拜之義英宗為皇太子又上書請慎簡師傅於時姦臣特們德爾為丞相威權自恣祖常知其盜觀國史率同列劾奏其十罪仁宗震怒黜罷之秦州山移祖常言山不動之物今而動焉由在野有當用不用之賢在官有當言不言之佞故致然爾疏聞大臣皆家居待罪祖常薦賢拔滯知無不言俄改宣政院經歷月餘辭歸起為社稷署令亡何姦臣復相左遷開平縣尹因欲中傷之遂退居光州久之姦臣既死乃除翰林待制泰定建儲擢典寶少監太子左贊善尋兼翰林直學士除禮部尚書丁祖母憂起為右贊善復除禮部尚書尋辭歸天厯元年召為燕王內尉仍入禮部兩知貢舉一為讀卷官時稱得人升參議中書省事參定親郊禮儀充讀冊祝官拜治書侍御史歷徽政副使遷江西行臺中丞元統元年召議新政賜白金二百兩鈔萬貫又歷同知徽政院事遂拜御史中丞帝以其有疾詔特免朝禮光祿日給上尊祖常持憲務存大體西臺御史劾其僚禁酤時面有酒容以苛細黜之山東亷訪司言孔氏訟事以事關名教不行按者亦引去除樞密副使頃之辭職歸光州復除江南行臺中丞又遷陜西行臺中丞皆以疾不赴至元四年卒年六十贈攄忠宣憲協正功臣河南行省右丞上護軍魏郡公諡文貞祖常立朝既久多所建明嘗議今國族及諸部既誦聖賢之書當知尊諸母以厚彛倫又議將家子弟驕脆有辜任使而庶民有挽强蹶張老死草野者當建武學武舉儲材以備非常時雖弗用識者韙之祖常工於文章宏贍而精核務去陳言專以先秦兩漢為法而自成一家之言尤致力於詩圓密清麗大篇短章無不可傳者有文集行於世嘗預修英宗實録又譯潤皇圗大訓承華事略又編集列后金鑑千秋記略以進受賜優渥文宗嘗駐驆龍虎臺祖常應制賦詩尤被歎賞謂中原碩儒惟祖常云許有壬許有壬字可用其先世居潁後徙湯隂有壬幼頴悟讀書一目五行嘗閲衡州浮居院碑文近千言一覽輒背誦無遺年二十暢師文薦入翰林不報授開寧路學正升教授未上辟山北亷訪司書吏登延祐二年進士第授同知遼州事㑹關中有警鄰州聽民出避棄孩嬰滿道上有壬獨率弓箭手閉城門以守卒獲無虞州有追逮不許胥𨽻足跡至村疃惟給信牌令執里役者呼之民安而事集右族貪虐者懲之寃獄雖有成案皆平翻而釋其罪州遂大治六年己未除山北亷訪司經歷至治元年遷吏部主事二年轉江南行臺監察御史行部廣東以貪墨劾罷亷訪副使哈濟蔡衍至江西㑹亷訪使苗好謙監焚昏鈔檢視鈔者日至百餘人好謙恐其有弊痛鞭之人畏罪率剔真為僞以迎其意管庫吏而下榜掠無全膚迄莫能償有壬覆視之率真物也遂釋之凡勢官豪民人畏之如虎狼者有壬悉擒治以法部內肅然召拜監察御史八月英宗暴崩於南坡賊臣特克實遣使者自上京至封府庫收百官印有壬知事急即往告御史中丞董守庸守庸謂宫禁事非子所當問有壬即疏守庸及經歷多爾濟巴勒監察御史郭額森呼圖克阿附特克實之罪以俟十月特克實伏誅泰定帝發上都御史大夫紐澤先還京師有壬即袖疏上之及帝至復上章言特們德爾之子索諾木與聞大逆乞賜典刑其兄弟勿令出入宫禁中書平章政事王毅右丞髙昉橫罹奪爵而四川行省平章政事趙世延受禍尤慘皆請雪寃復職繼上正始十事一曰輔翼太子宜先訓導二曰遴選長官宜先培養三曰通籍宫禁宜别貴賤四曰欲重兵權宜削兼領五曰武備廢弛宜加修飭六曰賊臣妻妾宜禁勢官徴索七曰前赦權以止變宜再詔以正名八曰特們德爾諸子宜籍沒以懲惡九曰考驗經費以減民賦十曰撙節浮蠧以紓國用帝多從之泰定元年初立詹事院選為中議改中書左司員外郎京畿饑有壬請賑之同列讓曰子言固善其如虧國何有壬曰不然民本也不虧民顧豈虧國邪卒白於丞相發糧四十萬斛濟之民賴以活者甚衆國學舊法每以積分次第貢以出官執政用監丞張起巖議欲廢之而以推擇德行為務有壬折之曰積分雖未盡善然可得博學能文之士若曰惟德行之擇其名固佳恐皆厚貌深情専意外飾或懵不能識丁矣議久不决三年六月升右司郎中其事遂行已而復寢獲盜例有賞論者多疑其僞有淹四十餘年者羣訴於馬首有壬曰盜賊方熾求疵太甚緩急何以使人但經部使者覆核者皆豫官俄移左司郎中每遇公議有壬屢爭事得失汛掃積滯几無留牘都事宋本退語人曰此貞觀開元間議事也明年丁父憂天厯三年擢兩淮都轉運鹽司使先是鹽法壞廷議非有壬不能集事故有是命有壬詢究弊端立法而通融之國課遂登至順二年二月召參議中書省事未幾以丁母憂去元統元年復以參議召明年甲戌拜治書侍御史轉奎章閣學士院侍書學士仍治臺事㑹福達嚕噶齊旺布藉丞相勢宿衛東宫其行頗淫穢御史劾之旺布藏御史大夫家有壬捕而遣之九月拜中書參知政事知經筵事帝詔羣臣議上皇太后尊號為太皇太后有壬曰皇上於皇太后母子也若加太皇太后則為孫矣非禮也衆弗之從有壬曰今制封贈祖父母降於父母一等蓋推恩之法近重而逺輕今尊皇太后為太皇太后是推而逺之乃反輕矣豈所謂尊之者邪弗之聽中書平章政事哲爾特穆爾挾私憾奏罷進士科有壬廷爭甚苦不能奪遂稱疾在告帝强起之拜侍御史㑹汝寧棒胡反大臣有忌漢官者取賊所造旗幟及僞宣勑班地上問曰此欲何為耶意漢官諱言反將以罪中之有壬曰此曹建年號稱李老君太子部署士卒以敵官軍其反狀甚明尚何言其語遂塞廷議欲行古劓法立行樞密院禁漢人南人勿學䝉古輝和爾字書有壬皆爭止之重紀至元初長蘆韓公溥因家藏兵器遂起大獄株連臺若省多以贓敗獨無有壬名由是忌者益甚有壬度不可留遂歸彰德已而南遊湘漢間至元六年召入中書仍為參知政事明年改元至正有壬極論帝當親祠太廟母后虛位徽政院當罷改元命相當合為一詔冗職當沙汰錢糧當裁節如此之類不一而足人皆韙之轉中書左丞二年納木嘉勒青善巴及博囉特穆爾獻議開西山京口導渾河踰京城達通州以通漕運丞相托克托主之甚力有壬曰渾河之水湍悍易决而足以為害淤淺易塞而不可行舟况地勢髙下甚有不同徒勞民費財耳不聽後卒如有壬言先是有壬之父熙載仕長沙日設義學訓諸生既沒而諸生思之為立東岡書院朝廷賜額設官以為育才之地南臺監察御史茂巴爾斯緣睚眦怨言書院不當立並構浮辭誣衊有壬並其二弟有儀有孚有壬遂稱病歸四年改江浙行省左丞辭六年召為翰林學士既上又辭監察御史纍章辨其誣俄拜浙西亷訪使未上復以翰林學士承㫖召仍知經筵事明年夏授御史中丞賜白玉束帶及御衣一襲未幾復以病歸監察御史達蘭巴哈銜有壬時短長之奏劾甚力事尋白十二年盜起河南聲撼河朔間有壬畫備禦之䇿十五條以授郡將民藉以安十三年起拜河南行省左丞朝廷遣將出征環河南境連營數百里一切芻餉皆仰給之有壬從容集事若平時然十五年遷集賢大學士尋改樞密副使復拜中書左丞時以言為諱有壬力言朝廷務行姑息之政賞重罰輕故將士貪掠子女玉帛而無鬬志遂倡招降之䇿言多不載有僧名開自髙郵來言張士誠乞降衆幸事且成皆大喜有壬獨疑其妄呼僧詰之果語塞不能對轉集賢大學士兼太子左諭德階至光祿大夫有壬前朝舊德太子頗敬禮之一日入見方臂鷙禽以為樂遽呼左右屛去十七年以老病力乞致其事久之始得請給俸賜以終其身二十四年九月二十一日卒年七十有八有壬歷事七朝垂五十年遇國家大事無不盡言皆一根至理而曲盡人情當權臣恣雎之時稍忤意輒誅竄隨之有壬絶不為巧避計事有不便明辨力諍不知有死生利害君子多之有壬善筆札工辭章歐陽𤣥序其文謂其雄渾閎雋湧如層瀾迫而求之則淵靚深實蓋深許之也所著有至正集若干卷諡曰文忠子一人曰楨王惲王惲字仲謀衛州汲縣人曾祖經祖宇仕金官敦武校尉父天鐸金正大初以律學中首選仕至户部主事惲有才幹操履端方好學善屬文與東魯王博文渤海王旭齊名史天澤將兵攻宋過衛一見接以賓禮中統元年左丞姚樞宣撫東平辟為詳議官時省部初建令諸路各上儒吏之能理財者一人惲以選至京師上書論時政與渤海周正並擢為中書省詳定官二年春轉翰林修撰同知制誥兼國史院編修官尋兼中書省左右司都事治錢榖擢才能議典禮考制度咸究所長同僚服之至元五年建御史臺首拜監察御史知無不言論列凡百五十餘章時都水劉晸交結權勢任用頗専陷沒官糧四十餘萬石惲劾之暴其姦利羣貴側目又言晸監修太廟畢功特轉官錫賞今才數年梁柱摧朽事涉不敬宜論如法晸竟以憂卒秩滿陳天祐雷膺交薦於朝九年授承直郎平陽路總管府判官初絳之太平縣民有陳氏者殺其兄行賂緩獄蔓引逮繫者三百餘人至五年不决朝廷委惲鞫之一訊即得其實乃盡出所逮繫者時絳久旱一夕大雨十三年奉命試儒人於河南十四年除翰林待制拜朝列大夫河南北道提刑按察副使尋改置諸道制下遷燕南河北道按部諸郡贓吏多所罷黜十八年拜中議大夫行御史臺治書侍御史不赴裕宗在東宫惲進承華事略其目曰廣孝立愛端本進學擇術謹習聽政達聰撫軍崇儒親賢去邪納誨幾諌從諌推恩尚儉戒逸明分審官凡二十篇裕宗覽之至漢成帝不絶馳道唐肅宗改服絳紗為朱明服心甚喜曰我若遇是禮亦當如是又至邢峙止齊太子食邪蒿顧侍臣曰一菜之名遽能邪人耶詹事丞孔九思從旁對曰正臣防微理固當然太子善其說賜酒慰諭之令諸皇孫傳觀稱其書宏益居多十九年春改山東東西道提刑按察副使在官一年以疾還衛二十二年春以左司郎中召時右丞盧世榮以聚斂進用屢趣之不赴或問其故惲曰力小任大剝衆利己未聞能全者逺之尚恐見凂况可近乎既而果敗衆服其識二十六年授少中大夫福建閩海道提刑按察使黜官吏貪汙不法者凡數十人察繫囚之寃滯者决而遣之戒戍兵無得寓民家而創營屋以居之每謂為治之本在於得人乃進言於朝曰福建所轄郡縣五十餘連山距海實為邊徼重地而民情輕詭由平定以來官吏貪殘故山寇往往嘯聚愚民因而蟻附剽掠村落官兵致討復蹂踐之甚非朝廷一視同仁之意也今雖不能一一擇任守令而行省官僚如平章左丞尚缺宜特選清望素著簡在帝心文足以撫綏黎庶武足以折衝外侮者使鎮靜之庶幾治安可期矣時行省討劇賊鍾明亮無功惲復條陳利害曰福建歸附之民户幾百萬黃華一變十去四五今劇賊猖獗又酷於華其可以尋常草竊視之况其地有溪山之險東擊西走出沒難測招之不降攻之不克宜選精兵申明號令専命重臣節制以計討之使彼勢窮力竭庶可取也二十八年召至京師二十九年春見帝於栁林行宫遂上萬言書極陳時政授翰林學士嘉議大夫成宗即位獻守成事鑑一十五篇所論悉本諸經㫖元貞元年加通議大夫知制誥同修國史奉㫖纂修世祖實録因集聖訓六卷上之大德元年進中奉大夫二年賜鈔萬貫乞致事不許五年再上章求退遂授其子公孺為衛州推官以便養仍官其孫笴祕書郎大德八年六月卒贈翰林學士承㫖資善大夫追封太原郡公諡文定其著述有相鑑五十卷汲郡志十五卷承華事略中堂事記烏臺筆補玉堂嘉話序雜著詩文合為一百卷富珠哩翀富珠哩翀字子翬其先隆安人金泰和間定女真姓氏屬望廣平祖德從憲宗南征因家鄧之順陽以功封南陽郡侯父居謙用翀貴封南陽郡公初居謙辟掾江西以家自隨生翀贛江舟中釡鳴者三人以為異翀稍長即勤學父殁家事漸落翀不恤而為學益力乃自順陽復往江西從新喻蕭克翁學克翁宋參政燧之四世孫也隱居不仕學行為州里所敬嘗夜夢大鳥止其所居翼覆軒外舉家驚異出視之冲天而去明日翀至翀始名思溫字伯和克翁為易今名字以夢故後復從京兆蕭㪺游其學益宏以肆翰林學士承㫖姚燧以書抵㪺曰燧見人多矣學問文章無足與子翬比倫者於是㪺以女妻之大德十一年用薦者授襄陽縣儒學教諭升汴梁路儒學正㑹修世祖實録燧首以翀薦至大四年授翰林國史院編修官延祐二年擢河東道亷訪司經歷遷陜西行臺監察御史賑濟吐蕃多所建白五年拜監察御史時英皇未出閣翀言宜擇正人以輔導帝嘉納之尋劾奏中書參議元明善帝初怒不納明日乃命改明善他官而傳㫖慰諭翀巡按遼陽有㫖給以弓矢環刀後因為定制還往淮東核憲司官聲跡淮東憲臣惟尚刑多置獄具翀曰國家所以立風紀蓋將肅清天下初不尚刑也取其獄具焚之時有㫖凡以吏進者例降二等從七品以上不得用翀言科舉未立人才多以吏進若一概屈抑恐未足盡天下持平之議請吏進者宜止於五品許之因著為令除右司都事時相特們德爾専事刑戮以復私憾翀因避去頃之擢翰林修撰又改左司都事於是拜珠為左相使人勞翀曰今規模已定不同往日宜早至也翀强為起㑹國子監𨽻中書俾翀兼領之先是陜西有變府縣之官多罣罥者翀白丞相曰此輩皆脅從非同情者乃悉加銓叙帝方獵栁林駐故東平王安圖碑所因獻駐蹕頌皆稱㫖命坐賜飲上尊從幸上京次龍虎臺拜珠命翀傳㫖中書翀領之行數步還曰命翀傳否拜珠歎曰真謹飭人也間謂翀曰爾可作宰相否翀對曰宰相固不敢當然所學宰相事也夫為宰相者必福德才量四者皆備乃足當耳拜珠大悅以酒觴翀曰非公不聞此言迎駕至行在所翀入見帝賜之坐升右司貟外郎奉㫖預修大元通制書成翀為之序泰定元年遷國子監司業明年出為河南行省左右司郎中丞相曰吾得賢佐矣翀曰世祖立國成憲具在慎守足矣譬若乘舟非一人之力所能運也翀乃開壅除弊省務為之一新三年擢燕南河北道亷訪使晉州達嚕噶齊有罪就逮而奉使宣撫以印帖徴之欲緩其事翀發其姦奉使因遁去入僉太常禮儀院事盜竊太廟神主翀言各室宜增設都監員內外嚴加扃鎖晝巡夜警永為定制從之又纂修太常集禮書成而未上有㫖命翀兼經筵官文宗之入也大臣問以典故翀所建白近漢文故事衆皆是之文宗嘗字呼子翬而不名命翀與平章政事溫德亨等十人商論大事日夕備顧問宿直東廡下文宗虛大位以俟明宗翀極言大兄逺在朔漠北兵有阻神器不可久虛宜攝位以俟其至文宗納其言及文宗親祀天地社稷宗廟翀為禮儀使詳記行禮節文於笏遇至尊不敢直書必識以兩圈帝偶取笏視曰此為皇帝字乎因大笑以笏還翀竣事上天厯大慶詩三章帝命藏之奎章閣擢陜西漢中道亷訪使㑹立太禧院除僉太禧宗禋院兼祗承神御殿事詔遣使趣之還迎駕至龍虎臺帝問子翬來何緩太禧院使阿榮對曰翀體豐肥不任乘馬從水道來是以緩耳太禧臣日聚禁中以便顧問帝嘗問阿榮曰魯子翬飲食何如對曰與衆人同又問談論如何曰翀所談義理之言也從幸上都嘗奉敕撰碑文稱㫖帝曰候朕還大都當還汝潤筆資也遷集賢直學士兼國子祭酒諸生素已望翀至是私相歡賀翀以古者教育有業退必有居舊制弟子貟初入學以羊贄所二之品與羊等翀曰與其饜口腹孰若為吾黨燥濕寒暑之虞乎命撙集之得錢二萬緡有竒作屋四區以居學者諸生積分有六年未及釋褐者翀至皆使就試而官之帝師至京師有㫖朝臣一品以下皆乘白馬郊迎大臣俯伏進觴帝師不為動惟翀舉觴立進曰帝師釋迦之徒天下僧人師也余孔子之徒天下儒人師也請各不為禮帝師笑而起舉觴卒飲衆為之栗然文宗崩皇太后聽政命拜布哈達實哈雅阿爾斯蘭馬祖常史顯夫及翀六人商論國政翀以大位不可久虛請嗣君即位早正宸極以幸天下帝既即位大臣以為赦不可頻行翀曰今上以聖子神孫入繼大統當新天下耳目今不赦豈可收怨於新造之君乎皇太后以為宜從翀言議乃定遷禮部尚書階中憲大夫有大官妻無子而妾有子者其妻以田盡入於僧寺其子訟之翀召其妻詰之曰汝為人妻不以資産遺其子他日何面目見汝夫於地下卒反其田元統二年除江浙行省參知政事逾年以遷葬故歸鄉里明年召為翰林侍講學士以疾辭不上至元四年卒年六十贈通奉大夫陜西行省參知政事護軍追封南陽郡公諡文靖翀狀貌魁梧不妄言笑其為學一本於性命道德而記問宏博異言僻語無不淹貫文章簡奧典雅深合古法用是天下學者仰為表儀其居國學者久論者謂自許衡之後能以師道自任者惟耶律有尚及翀而已有文集六十卷子逺字明道以翀廕調祕書郎轉襄陽縣尹須次居南陽賊起逺以忠義自奮傾財募丁壯得千餘人與賊拒戰俄而賊大至逺被害死逺妻雷為賊所執賊欲妻之乃詆賊曰我魯參政冢婦縣令嫡妻夫死不二肯從汝狗彘以生乎賊醜其言將辱之雷號哭大罵不從乃見殺舉家皆被害中州名賢文表本傳
