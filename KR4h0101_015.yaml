body:
  text: 中州名賢文表巻十五明劉昌編馬文貞公五言古詩壯遊八十韻十五讀古文二十舞劍器馳獵溱洧間已有丈夫氣裹糧上嵩高靈竒發天祕爍爍三秀枝爲我擢粲翠空青丹銀品伏龜鏤文貝駢羅星辰精附麗日月㑹紫鳯友朱鷺翩翩劇翔戲飛閣舒鳥翼懸泉瀉珠琲摩崖見古刻應是列仙記捫蘿欲登觀苔滑阻凌厲煙霞薈蔚隮霧雨蕭䬃至余時戴籜冠緑壁照縞袂檀欒有磐石眞人每同憩北臨黄河水濁流觸天沸蛟龍逐黿鼉鱗介滿水裔衝波崩金堤萬夫廢穡事官家憂且勞玉馬歳沈祭江淮畫鷁船夜上歌嘒嘒魚鹽不直錢寡婦豈拾穗釀酒相呼飲傾倒再拜跪中心忘嗔訶縱談詆漢魏三十能歌詩鄙薄雕蟲技不肯學仕宦慷慨負高義持錢送酒家觴至即一醉羮芼嶰谷筍飯煮山陽穄峨冠擬魯儒短衣眞楚製逺行探禹穴六月剖丹茘巫峽與洞庭彷髴蒼梧帝江左佳麗區幼婦蛾眉細唱歌攪人心不可久留滯沿淮達汶泗摩挲泰山礪聖鄉有亡書求道亦容易童子操觚牘價重麒麟罽京國天下雄豪英盡一世舞羽肅文教櫜甲飾武備馬迹見騰塵車轍聞戛轊翬騫天觀起鱗雜井屋綴千畝開靈潢馴象浴其汭我皇拓文場羣髦咸戰藝洎予黔婁生言辭罔絺繪但幸鼂董死收拾在等第臚唱下閶闔恩澤承滂沛春雲覆林塘雜花懸火齊詞垣正舒華吹竽獨無喙執筆御史府羞縮如牡蠣彈評則春秋齟齬失剞劂問俗西夏國馹過流沙地馬齧苜蓿根人衣橐駝毳雞鳴麥酒熟木柈見乾薺浮圖天竺學焚身取舍利安定昆戎居貪鄙何足貴返途歴邠岐原田表古綴宛宛陶穴民艱難謀樹藝驪山葬秦魄茂陵迷漢竁黍離悲故宮脩竹徧清渭日入狐貍驕天隂螮蝀翳温泉出津陽古瓦識唐字關河隔山東華岳秋更霽首陽餓夫薇霜露已顦顇鑄牛挽河梁恍惚水所噬晉俗棗齒黄冀馬電蛇駛井陘阨坤維大行逼象緯煌煌日圍近赫赫天人瑞田舎植汶篁郵亭擷呉桂優游逢化國俯仰詠樂歳豈用百二險乃自十一稅北都上時巡扈蹕浮雲騎宴鎬帳殿移拜洛周盧衛巖空山櫻䋣川曲紅藥膩列障敕勒塞萬里靜烽燧九節菖蒲良貢篚充藥餌疇昔閉户居耽讀未見試三年不窺園自謂五經笥四十得俸禄僅可給羮饎誰能薄淮陽不作鴻臚寺簡書畏懷歸弧矢示初志振鷺方擢質冥鴻忽垂翅感歎對囊螢興言友荷蕢諒非廊廟具頗異市井輩當曵鄒陽裾願擁文侯彗贈客疊巘擢薈蔚䋣英粲紛葩銀繭霰已積翠幢柏方遮劇飲肆豪縱清談宴賓嘉叫嘯虎當巖趨蹌鶴行沙聯娥聘趙女貫珠唱吳娃露庭泛蘭藂風閨透窗紗魚泳文波圓禽翔矞雲斜逸樂諧金石清眞況煙霞洗藥秋汲澗種秫春燒畬寓言託莊列潛心著羲媧所貴丘園賁終然心匪遐讀陶潛詩伯夷恥粟餓屈原避讒死獨有柴桑翁一不失張弛所以百世下風流激頽靡遐觀八極表衰榮何足數送袁伯長歸浙東龍角不如犀常不生馬廏麟趾不如牛終當在君囿我行泰山阿日觀望潮候見子被雲服家居夾靈鷲揖之不得近跂慕塵光後貢待制文修撰王都司同賦牡丹分得色字名都擅穠華竒葩紛翕赩頰暈紅紛豔囊垂挂蠹蝕初凝沆瀣氷漸展蒲萄織仙綬曳雙環么鳯盤六翼粲粲春奩瑩皛皛風燈直可憐昭容袖縹緲見顔色齋宿太社署朱門屹南起金水經北流繚垣外旁達周屋内廣修圭玉承璅藉碧鏤飾衣篝中壇土五色夏松露浮浮改容事明神豈謂兹淹留古意秋羅畫雙蝶涼練透紅綃攀紆翠襞積騰挐鳯盤翹公子高宴集水閣芙蓉搖來禽丹砂紅石蜜春氷消歡情光景洽壯意風雲飄所期國士知豈謂虞人招苦寒三首肅肅歳已晏冽冽氷霰集寒雲光不流槁木鳴日夕挾纊處南户嚴稜坐相襲端然成離居企念穉陽復南户日頗暄居獨意亦適觀物契妙道含情想眞識靜囂理雖殊造定趣乃一古人不可求兹焉寄游息日精赫重光午景延冬暄眞見煦物功始覺陽道尊𤣥冥歛時肅衣被元氣温鼻端有消息守此觀化原報春堂青陽布仁德萬品含景滋人道貴有報天施終匪私遲遲春暉和寸草爲生資聊觀孟氏詠載攷生民詩古詩繾綣憂腸興觴至不能釂高飇揚塵沙倐倐滿户竅冠屨對孔經蠅亦集堂窔淹留藉君子相與一晤嘯擬古崇臺拂䋣雲阿閣䕃廣路上有彈琴女文采被煙霧玉食薦翠盤渴飲瑤草露鄙薄貧士妻終歳弄機杼春寒二首叶風應青陽羲御南其輈生榮兆植物民氣趨和柔三農興歳功銚鎛日以修云胡司寒神正月行歛收獵獵驚飇來壯士晝索裘氷梁阻沃漑龜坼横大疇穡事忽愆時誰與饑餓謀得見吹律衍吾將迎道周歳律啟璇室天家授人時嘉生達勾萌厚德宣靈祗𤣥功旣旁被吾人亦咸宜曩在閉關日商旅車不脂瑟縮謹蓋藏宛宛如蚌龜兹遇孟陬月遲日載景熹春酒續古意游子求履綦豈恱草木華所貴陽道施陽道一以施衆美俱無疵送幼度御史南游辭官亦有道諧世亦有窮君子尚高義賤物不賤躬含情適夷曠潛心入𤣥中弓旌或南出求子江水東田間中田蒔柔桑周垣列菀栁居然成農耕林盧頗完好朋從時往過牀頭出尊酒意氣每酣適仰視北有斗豈知念湘纍那復嗟漢叟丈夫貴立志文字託永久王維輞川別業詩圖野水已不流野田已無塍日夕華子岡狐貍上丘陵高人兹爲土畫墨飛塵凝空餘古韻語髣髴金石興飲酒二首簡編有重譌折衷無權衡黎庶有重困救藥無持平昔者聖賢出屯蹇躓其身躓身不躓道龍蛇果能伸棄置姑飲酒陶然㑹天眞萬物各遂性雜沓向我陳嗟哉寡諧合蒼髪秃不齊觴至即飲釂猶恐逢訶詆衆人以儒進我不限吏資入官養交譽惟恐不合時含笑作雅詠遭罵亦詭隨出入踐華要諈諉成其私積階踐崇貴剽獵章句辭鼓頰說古今證據稱云爲斯世豈可誣小夫甘自欺興言發喟嘆飲者終不知蔓草不除大夏萬物長蔓草多華滋勾芒發苕穎苞實各及時頼爾有野意使我情恱怡誰云田中殖嘉穀亦如兹端午效六朝體脩篁發秀林圓荷疊芳池采絲擷露縷紗縠含風漪蕤賓應樂律端陽正歳時馥馥蘭湯浴灩灩蒲酒持漢宮鬬草戲楚船張水嬉江心鑄龍鏡好用照湘纍田居二詩寄元參議二首積潦被原田瀦水滿陂塘具我錢鎛器剉稭飼牛腸周垣無不完南東植柔桑欣欣條枝發向日欲奮張衆草還芊芊朝雉鳴陽岡始旦荷畚去取糞城邑旁敢辭作勞苦但願筋力强上馬作將軍下馬作博士服賈眞無良蓐食勤穡事王朝列公卿田稅豈十二同里相勞勉牛種更貸貰雖無凍餒憂未可恱親志親志在光榮禄養乃始貴爲詩獻儒宗秋獲見稔歳初日詩二首初日照我樹我樹日華滋檀欒緑隂合四顧無曲枝盛暑熾煩歊其中有涼颸成林䕃千畝棲息任所宜初日照我書我書在東牖赫矣先聖言天地相永久秦火雖燎原其灰爲世壽人文待兹成老死學敢後飲田家留題田家酒初熟邀予坐籬根我復不辭飲喧譁輒傾樽耳熱歌擊缶雜坐忘卑尊論古似嘲謔顚倒羲與軒禮容或稍稍愛此情義敦丘原正春意歸路花栁䋣翻翻鳥飛去悠悠寄情言史館閒題二首騎馬到書省冠佩趨几筵豈但文字美所樂長官賢京國足府寺金穀相百千飛書日雜遝奔命愳不先肅肅館閣嚴操觚績簡編上有日月光下有草木妍森羅大象列俟此言語宣蹇予昧儒學羣髦辱官聯遭逢頼明世益喜身悠然畫省眞仙居華屋映丹樹青石倚闌干松髮沐雲霧綺疏刻連錢承塵畫翔鷺中有河漢文夜深寶光聚玉函黄金鑰太史自侍御河上一豎儒伊吾誦章句偶趨彤庭詔詞林邇天路雖樂文雅懿終慙紬繹誤奉和王儀伯參議龍門衆鎭列方國兹山入叢霄隱雷鬰夜壑奔潨劇春潮跛鼈不可升負鼇詎能超媧鍊役萬神禹鑿勞百僚我行當晨興雞鳴馬蕭蕭巋焉見閶闔煙雲限紛嚻所樂鎬京從敢賦淮南招摛詞造鵷行藻思芳年彫飲酒輒亦醉泛泛風鷗飄日畿芙蓉衢玉輈九天遙高詠青霞篇翹首扶桑朝擬古驅車上疾阪六馬汗滿溝解航下急瀧百夫不能留微機有逆順無用卜筮謀車遲或可安航速或覆流送別李彥方憲副之官昔在翰林日與子同官聯出入文史間篇章雜朱𤣥飲酒學士家走馬大道邊各不識時貴浩氣超八埏今兹兩秃翁短髪咸被肩睽違諒不樂國憲屬持宣八州多疲氓豪吏爭控拳擊搏并喣嫗所施務兼全期子上報政慰我心惓惓種桃種桃南山麓三歳不得實種𤓰東郊園擷之在百日豈於思遲暮終焉有常食如何種瑤草千歳始一獲王繼學同張學士壽寧宮祠宿奉寄一首永日坐虛館晏然有餘清迤邐違世嚻沖融叶道情修管文賦成歌詩藻思生涼颸入書幌逍遙命觴酒披拂有庭花山石可繫拊下階就步武布席思我友我友不可思方與神仙期峨峨華陽巾左右委佩垂夜半登𤣥壇象緯光陸離天門倘有遇爲我含景滋潁郡孤城介汝潁四野盡衍沃梁楚異風氣沈頓錯封域畇畇墳壤美宜我稼稻粟居民尚樸儉遺邦頗文物邈哉宋兩公當年擅高躅至今風月夜西湖有鳴玉朅來載淮舟登高恣遊矚古老不可問聲華竟誰續昌平道中次繼學韻清朝富文物冠蓋塞兩京角藝百技並論經千儒并下才沗供奉肅肅齋館清朝出都門道羣山愜幽情聮鑣有髦士海内馳英聲白馬嘶南風羅袍映田塍笑我如培塿自比山崢嶸度居庸關次繼學韻飛鞚陟雲巘􅒙眥盡圖畫天風吹高寒山雨灑長夏冥冥白鳥去寂寂松子下陸行石當塗水舂泉繞舎高與蜀道齊深廼盤谷亞筍輿約重來羸馬苦常跨朋從詠連疊酬應給閒暇得見王子喬吾將驂鶴駕七言古詩所過張良廟前流水聲歌風臺下曉雞鳴行人舟中寐復起此生亦欲成功名白髪可憐升斗禄持歸不足求田屋揮杯㸔劍獨長嘯萬里朝雲見晴木淮安路池山淮浦蒲花秋渺渺淮岸楊花春褭褭白魚初下酒船來十里風煙隔飛鳥吾生欲向淮南居更聞池山好田廬濯足滄浪箕踞坐不問朝家來聘車寄鄉友河邊老父念我出逺寄京華書一行謂言白髪今多少又報南園竹樹荒門前石田秔秫熟犢子新生走如鹿莫戀官家有俸錢長年作客身如束送周南翁之官池陽霏微桂藂緑霧深集仙書殿秋沈沈九華山影墮酒醆便欲起挹青楓林青楓林高霜葉赤遙遙連雲鴈行急蜀麻吳鹽來往時閒坐城樓聽江笛宿興化縣界去年七月淮水發獨乗扁舟觀禹迹今年七月天又雨躍馬南上閩嶺石蹉跎歳時身老大𤨏𤨏茍禄慙莫述白髪山中抱孔經㑹見青藜下太一上京書懷燕子泥融蘭葉短疊疊荷錢水初滿人家時節近端陽繡裌羅衫雙珮光共笑江南五雜組畫鷁浮波供角黍沙苑射栁追風駒古來北地爲名區上京效李長吉龍沙秋淺雲光薄畫羅宮衣侵曉著吳娃楚娘侍團扇象輿鳯輦明珠絡椒花染紫風雨香三十六盤天路長南都北都望行幸千秋萬歳迎君王李夫人未央天子香熏骨夫人不貯黄金屋水銅無光澀秋月留得當年舊蛾緑瑤臺夜佩聲闌珊沈雲叫鴈沙泉寒二十五絃彈鳯皇玉釵小燕飛春山蔡州伎趙氏墜崖以死自誓作詩諷俗鱗鱗汝水氷碧光汝之左右百草芳紅蘭紫桂媚長晝鉤輈鳥子囘銀塘茭蒲無數菱葉小西家鞦韆屬年少燕泥霽雨風景酣簾箔依稀有歌笑趙氏母子邯鄲倡綵絲繡履踏春陽心思宛轉縈雲縷羞對兒郎唱鳯皇樂山嵯峨石生雨鄉人迎神奏歌舞婆娑起向神祠前祝願生身事鍼組野風吹目雙淚零泉聲松韻相泠泠誰言女子情愛癖誓死命輕如鳥翎鳥翎飛上合歡樹開花夜夜無愁苦秋香不斷相思浦小釵玉股埋黄土秋意銀牀墜露下高桐竹練含氷留麝籠蒲萄酒作碼碯紅湘娥江邊采芙蓉月華流影天漢東素商淒清颺微風草根知秋有鳴蛩五言律詩固始縣南岳行祠往歳曽登眺今朝又謾來山禽鳴獨樹石壁漬荒苔水淺沙痕亂天低雁影廻春風吹白髪有酒且銜杯送人之陜省幕和韻綬帶驚沙鶴紗巾逐海鷗驪山泉未冷華岳樹先秋路出汾陽里家仍晏子裘風流蓮幕美君豈歎淹留謁告書懷先子桐鄉地年來憶舊游山春花競發沙晚水閒流石屋青霞夜藤牀碧樹秋防身龍具在强欲問呉鈎送董仁甫之西臺幕西南萬里地詔屬大行臺秦樹浮天去巴江帶雪來山河無用險邦國正須才檐幕風流美書籤想盡開送周南翁待制雞曙辭宮漏鷗天趁客船帝書鸞紙瑩母侍版輿鮮林壑煙霞舊松楸雨露偏儒臣文藻劇瀧表勒高阡華清宮故基開元人物盡兹地尚華清古道風塵急溫泉日夜生碑詞惟石蘚宮樹有春鶯過客知王建題詩不記名舟中藂灌縈雲曲岡巒引霧深舟輕風燕疾衣薄水螢侵夜久江喧瀬秋清竹滿林閒情任飄泊到處欲登臨再從浙入閩積雨關河溼今朝日始晴浮船下夜瀬覓酒近春城鵝鴨將雛出牛羊傍母行獨憐無似客萬里又南征崇眞宮西棃花春日棃花下相逢把臂行香痕憐粉薄酒暈惜紅輕影動簾穿燕聲來樹度鸎共當拚一醉莫待鬢華生明日在羅中官園池自次韻帝里春光媚花前可獨行額黄團蔕小睂緑畫痕輕蕩槳波浮鷁裁衣粉妒鸎却愁風信惡明日樹隂生武當山道士贈行幽居鑿石楹仙路接青城印字苔行鶴梭金樹度鸎飛光無短景上壽有長生星斗何曾闇𤣥壇夜夜明贈廬州黄孝子我家淮水上孝義夙多聞邑屋封華表丘園聘束纁久嗟毛義檄更歎董生文白石山中去吾將問隱君出都長城懷古處身在日華東水出盧龍塞山連碣石宮沙鷗終日白霜樹忽然紅雲海鴻濛氣歸飄杳靄中紫芝不用事霞纈盤華蓋天葩擢矞雲孕靈非有種掞藻忽成文冠矗仙裁羽纓垂女製帬原田多衆草獨爾擅絪縕贈楊洞天道人我自不入俗君今又欲仙鳥啼百花裏屋住萬山邊密樹雲難過空潭月易圓題詩秋巻了爲説小行年贈彈琴道人苦竹到階深雲房豈易尋倚松聞磬韻對石振塵襟芒屩𤣥壇曲瓊冠紫殿隂仙翁嫌我俗不肻坐彈琴用韻上繼學時祠禱天寶宮𤣥關松桂深長晝客來尋撫石雲生手弄泉風滿襟鶴巢連屋角蝸迹上碑陰須信祠官美烹茶更鼓琴徐州弔蘇睂山城角黄樓壯蘇公骨已仙亂流無齧石宅土有居廛才大爲時忌名髙得世傳舟中臥讀賦臨水一琅然五言七首大行東北去形勢自天分一葦航呉越千車輓朔雲衣冠今復盛豪傑古猶聞欲獻三都賦茫然媿不文不作還山夢因吟李杜詩平生無飽飯抵死只憂時事實兼唐史風流揖楚辭山川舊遊處千載有餘悲王子不耐俗還山應恐遲挑燈同此夜把臂憶當時愛我常懸榻逢人只語詩買田吾已􅒙莫負耦耕期好去春山路騎驢罨畫中徜徉紫芝客顦顇鹿皮翁得酒寧辭醉逢人莫話窮乾坤皆古意人自不相同古意在睂宇新詩應口哦無錢賒酒得有屋喜人過宇宙千年事功名一曲歌執鞭吾亦可稅駕欲如何聞道光山縣城南十里賒人家依翠竹野水亂梅花應有仙燒藥寧無客艤槎行當問田畝結屋貯煙霞又是蒺藜秋浮槎繫旅輈古城空石堞平野半沙邱自笑滄洲客還期汗漫遊明朝入衛國淇上買扁舟次韻石老石何年有依稀滿路傍無人愁飲羽有客坐忘羊戒世能言晉傳書豈姓黄補天成五色何獨柱明堂石田山居五首甲子人愁雨河田麥已丹歳凶捐瘠衆天逺禱祠難賈客還酤酒王孫自飽餐更憐黧面黒征戍出桑乾積雨衣裳溼愁人是麥田泥將深沒馬霧欲墮飛鳶爨火勞薪盡家居老屋穿牆根雜蛙蚓擬買繫籬船光山楓製錦潢浦荻飛綿秫熟何論酒魚來不計錢卜鄰多野老求藥有神仙爲客留羮筍清晨步石田作客何多意淮南即是家自牽蘿屋小不正葛巾斜書嬾眠尤熟詩來酒更賒春天雲嫵媚相對坐鷗沙淮南窮僻地先世有林廬花曙鳴山鳥芹春躍岸魚鼓琴仙度曲錬杏客傳書朋舊如相覓休嗔禮法疎五言排律春行南郊緑樹連城合蒼藤入澗懸作橋分野路取竹縛溪船載酒誰留客看花我欲顚歌詩諧故老笑語屬神仙自鑿蒲萄井人開苜蓿田銜櫻黄鳥哢窺藻白鷗翩狎坐欣時俊隨行喜妙年山隂知寂莫春服且雲煙應制壽王少傅皇極敷多福臣工保壽耆禔身名愈茂佚老眷殊彌疏廣金無幾祁奚子更竒堯尊霑露醴齊服剪氷絲几杖隨春到冠巾與野宜珊瑚生海石琥珀出松脂西掖清光徧東朝寵渥私仁風初煦煦化日自遲遲宸詔徵歌曲仙音被樂詞乞言方有待莫去采靈芝送文著作往鄂州諭南使大化均天施皇圖象岳寧宣風依日月發號布雷霆貔虎嚴分鎭鵷鸞蔚在迋芝莖連孔廟蓂葉茂堯庭珠米圓圓白樓桑箇箇青謳吟興隴畝游衍及郊坰楚俗那三户滇童信六經已知含煦育復此仰儀刑使得皇華美歌應湛露聽賜衣裁錦段官醖溢瑤缾上國崇懷服熙朝尚德馨魚書閒粉蠹雞卜枉軺星鶚渚翔鸚鵡燕臺念脊令歸途囘四牡楓樹失江汀伯長内翰與繼學内翰聯句賦畫松詩清壯偉麗僃體諸家祖常實不能及後塵也仍作詩美之呉絹氷絲白秦封石髮青沐華浮鶴露戢景蔽鶉星刻畫風雲狀雕鑱鳥獸形哦詩鏘玉署集句燦珠經奕奕舒光氣沈沈逐杳冥離歌三曡送凱奏萬鐃聽肅穆官師位雍容樂舞庭江花春豔豔山竹雪亭亭自笑如塵俗懷慙似酒醒無因題琥珀有去對鵁鶄送劉侍儀祠祭北鎭名鎭坤維左雄藩碣石邊宵明觀海日春媚禊河川塞道迷沙磧郵亭過玉田驌驦憐驛騎襏襫費羊氊亦有鮫人室應無蜑户船山椒雲物異天角斗樞偏望美祠官貴時清祀事專祝禧孚感格錫福待敷宣輓饒國呉公泣雨纏丹旐靈風攪素帷番君歸廟日饒國表阡時穹石鑱仙籙華編綴誄辭山原松漏月墓道櫟生芝諧世資清福全天樂壽耆孫聯書殿列兒侍竹宮祠執紼嗟何及居廬願莫私明王崇秩祀歛錫待敷施送王伯𢎞平章衮職華蟲燦台階象緯明世須先穀帛治理後章程所貴求儒效何勞得論衡退公無候吏飲介有諸生楓陛都俞密槐庭屬望清助耕千畞籍謝絶五侯鯖疏傅專高節韋賢擅令名臣工商相重鄉國魯公榮汶水春跳鮪徂松夏囀鶯來宜思舜慕去合體堯情尚醖隨飛驛宮衣賜滿籯曹裝應再趣莫擬種黄精秋谷平章生日上宰儒宗重中台位望隆承天施坱圠捧日照曈曨汾路精靈合文章運㑹通酇侯初亦昴周翰降維嵩姬正逢陽復羲車舎斗中睂毫齊紺髪仙骨炯方瞳鸞鳯翔千仞貂蟬侍兩宮天池浮畫鷁公衮煥華蟲造命毗元化書思沃帝聰山河尊社稷禮樂頼臣工韓國蕃宣永髙皇報施崇從來黄閣貴只屬紫芝翁檻竹沈沈翠庭花灼灼紅道山藏畫象詞館轉詩筒洛下耆英盛人間壽域同君王自養老何羨菊潭東泉南孫氏園亭鑿石通歸汐浮梁看浴暾鴨闌萍上甃鹿柵蘚生垣薝蔔垂梔子篔簹長竹孫書香芸辟蠹席煖錦裁鵷交客登仙籍承家荷帝恩氷甌蠭蜜溜酒榼茘漿翻吹籥花圍屋彈琴鶴舞園海雲春有態閩雪夜無痕誰謂衣裳嬾余今杖屨煩捋鬚歌月地翹首望天門次韻繼學三首金爵層霄外銀猊曲檻邊含香俱國士持槖半神仙豈有遮塵手應無見麯涎地青天似水席煖罽如綿客送蒲萄酒人分苜蓿田書思趨豹省掞藻賦龍船時上京自大都移舟至誰念馮唐老爲郎白首年雞塞西寧外龍沙北極邊有天皆入貢無地不生仙鵲玉光含水驪珠溼帶涎香清堪閉閣衣薄豈勝綿珥筆遊鼇禁扶犂占鶴田酒來揚子宅人上剡溪船自信篇章貴能歌擊壤年丞相晨趨漏元戎夜拓邊碧雞崇漢畤丹藥監秦仙敢謂鼇頭選初逃虎口涎栁詞方濯錦雪賦已抽綿豔豔金爲屋輝輝玉滿田客身隨楚製鄉夢逐吳船所賴三階正螭坳記有年送可升法師祠武當山華芝三曲蓋靈馭九龍車人喜仙官至誰云帝闕賒山神驅黑虎眞侶耀朱蛇石髪松膏霧天衣雨織霞澗青春舞藻巖紫晝垂花醮席羅星斗賓筵競鼓笳乘槎過博望噀酒問欒巴竭澤無魚罟施逵有兔罝熙熙歸化域遲汝報重華送楊仲禮江淛提舉儒學江海雄南服衣冠重北門仗雲移振鷺船霧送翔鵷酒屢招人飲文多與客論名高依日月道大信乾坤官拜儒臺貴班聯㑹府尊齋廚還筍蕨賓所盡蘭蓀佐吏言猶雅公庭禮不煩過家歡上冢去國戀承恩田埭觀魚子鄰牆撫竹孫光榮休負弩歌鼔樂鄉邨送宋誠夫太監祠海上諸神上聖崇明祀元臣屬有文内香開寶炷制幣出𤣥纁授節臨前殿傳臚聽後軍酒清黄木廟魚祭武夷君颶母應囘雨天妃却下雲不勞風有隧猶願楚無氛漕粟琅邪見還珠合浦聞穹蒼天坱漭溟渤氣絪緼龍户編魚賦鮫人織霧紋畤祠光炯炯宣室語欣欣鵬運連番舶軺歸願冀羣觀書曾拜洛歌賦不横汾越水琉璃靜閩花茉莉熏伏波封莫請宵旰念華勛贊御書雪林二字爲趙伯寧中丞作聖主敷文化臺臣得寶書方員河洛出次舎日星居禹畫州圻古羲爻物象初克勤資負扆躋敬頼儲胥王錫非鞶帶天光豈器車傳家恩有渥訓德義無餘浩浩氷華潔亭亭木本疎山輝因玉潤雲氣是龍噓瑩爽才尤峻裁培力不虚明良須慶㑹動植樂舒徐眷遇榮金匱謳歌媿石渠賤微叨下列瞻拜舞階除虞伯生學士畫像韋相傳經業楊門世講官箕裘君自得文字我知難汲冢朱塗誤秦灰墨補殘黄流凝玉瓚仙露滴金盤不肻投漫刺偏宜戴小冠近林聽竹雨臨澗看風湍詔入蒲輪軟訶歸釣石團青山連蜀國白石照長安擬卜龜呈兆將書鶴借翰風流圖畫裏方目見神完寄舒眞人金闕來華蓋琳壇集羽衣石因鐘乳膩松爲茯苓肥劑墨香翻杵修琴玉布徽天低臨象緯日近逼光輝竹裏開長徑池邊敞小扉紅迷霞綺錯緑漲水環圍仙杏旉凝赤蟠桃萼翦緋龍來還獨宿鶴去更知歸割蜜蠭先避銜書鳯自飛祠雷陳古磬符鬼掣靈旂丹井泉偏冽銅盤露未晞俗人那得識詩客盡相依伊我逢休澣從兹詠浴沂憑師消鄙吝猶可采山薇送華山隱之宗陽宮江閤魚龍近山房霧雨多地清天不暑池曲水無波筍籜迎書帶櫻桃送錦窠呦呦呼伴鹿唼唼換經鵝養素行編屨消閒坐織蓑幾篇餐玉法一帙醮星科香灺沉銀葉衣裾佩紫荷丹光留海月絳景出松蘿醉憶泉㳅乳幽憐石爛柯神君攀緑桂天女蹋青莎邀客登山頂尋眞入澗阿洞簫吹道曲雲紙寫漁歌予髪今如此君心可柰何高壇見明月爲我問婆羅登雨花臺積翠生層巘凝光浴巨濤呉城花覆井楚舸竹裁篙地近魚龍逼天空鶴鸛高野橋皆螮蝀溪水盡蒲萄雨石逢芝箭風林得鳯毛臙脂兒女小罨畫鬼神饕六代都銜璧三山尚戴鼇故宮猶荏苒古樹漫周遭仙洞歌瑤草人家宴碧桃飯香非接淅酒好不篘糟緑霧春連閣丹霞曉暎袍攀躋忻境勝跋涉憚人勞老我才還劣清資媿重叨采詩今有使問俗似無曹佳麗千年最聲名一世豪歳時休澣日擕手可遊遨中州名賢文表巻十五
