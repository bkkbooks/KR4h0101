body:
  text: 中州名賢文表巻十二明劉昌編姚文公神道碑中書左丞姚文獻公神道碑姚公諱樞字公茂事世祖潛邸十年左右宸極十有九年居近宻之地受尊寵之任可謂必世之久惟其不固富貴進退禮敬窮逹一節不易寒士故不取恥當時明哲保身以薨帝為震悼賻楮泉為千者千五百閔惟子煒生十五年未授之室賜聘財如所賻明年官以禮部郎中皆異數也既没世而名聲日延後十九年當元貞二年裕聖太后以嘗侍講裕宗言之成宗贈諡榮祿大夫少師文獻公至大三年武宗追號嘉猷程世舊學功臣太師開府儀同三司魯國公諡仍其舊又推恩再世考仲宏贈太保儀同三司魯國康懿公祖錡銀青榮祿大夫大司徒魯國惠靖公妣張氏祖妣李氏皆魯國夫人惟姚氏為神明之後歴三代秦漢魏晉宋齊傳次或絶或續與梁陳隋唐可譜究者别載世錄惟本五季梁唐六鎭節度使勍生金吾將軍漢英周廣順初太祖遣之使遼見留事世景聖三宗加安時制節𢎞化翊亮功臣開府儀同三司樞宻使檢校太師兼政事令上柱國東陽郡公生中書門下平章事北面宣徽使衡之生給事中同中書門下平章事居政生太師左金吾衞上將軍䖍州節度使景祥生太子洗馬企華生金東上閤門使金州團練使玢生閤門祗候武徳將軍佺生武徳將軍獲嘉令錡生安逺大將軍慶陽安化丞淵後更仲宏生公及弟楨格公自稚弱一力於學晝則經紀其家嚮晦則讀書夜分不輟魯國夫人恐傷耽苦每止之乃塞牕不使見燭就枕必盡三鼔聞將遷關中康懿公錄事判官於許俾取師氏姑及姑之夫子昌以來公徒行懐書困休於樹宿止於邸亦出以誦自期甚髙宋内翰九嘉少登科甲時有重名方閒居許雅折行位與之游一日召賓㑹錄事名召公内翰怒曰公茂負王佐之略豈可若是易之先祖曰同僚呼兒軰宜然猶竟席不樂其為前軰見推如此壬辰許城被圍州版公軍資庫使與副夜直四鼓聞牕外歎曰人獻東門出索之無得副曰吾嘗遇兵河朔鬼物云然宜捄吾家乃相與歸街陌横鈴索㫁行見其懷印若赴州計事者至家乃盡出金銀酒具奩飾裹餱糧為逃死謀日出而東門果破邀軍將蕭姓者入家盡付所出蕭曰吾嘗受丘眞人敎汝軍中惟救人無殺吾捄乃死公聞太宗詔學士十八人即長春宫敎之俾楊中書惟中監督則往依焉中書少公六年兄稱之與偕北覲時龍庭無漢人士夫帝喜其來甚重之乙未詔二太子南征俾公從楊中書即軍中求儒道釋毉卜酒工樂人㑹破棗陽併公所招將盡阬之大將幕竹林間公前辯析眀詔如此他日將何以復命乃蹙數人逃入竹中潛歸其營匿嚴侯軍中纔脫死數十人繼㧞德安得江漢先生趙復仁甫見公戎服而髯不以華人遇之至帳中見陳琴書駭曰西域人知事此乎公為一莞與之言信竒士出所為文數十篇以九族殫殘不欲北與公訣蘄死公留宿帳中旣覺月皓而盈惟寢衣存乃鞍馬號積尸間求至水裔脫屨被髪仰天而號欲投溺而未入也公曉以徒死無益汝存則子孫或可傳緒百世保吾而北無他也遂還盡出程朱二子性理之書付公江漢至燕學徒從者百人北方經學自茲始歲辛丑賜錦衣金符以郎中伊囉斡齊行臺於燕時惟事貨賂天下諸侯競以掊克入媚以公幕長必分及之乃一切拒絶人有以銀二笏來見既謝却乃出置氊簾間遣人追及與之遂徙家來輝墾荒雲門糞田數百畞脩二水輪誅茅為堂城中置私廟奉祠四世堂龕魯司宼容傍垂周兩程張邵司馬六君子像讀書其間衣冠荘肅以道學自鳴佳時則鳴琴百泉之上遁世而樂天若將終身後生薄夫或造庭除出語人曰幾禠吾魄又汲汲以化民成俗為務自版小學書語孟或問家禮俾楊中書版四書田和卿尚書版聲詩折衷易程傳書蔡傳春秋胡傳皆於燕又以小學書流布未廣教弟子楊古為沈氏活版與近思錄東萊經史論說諸書散之四方時先師許魏國文正公魯齋在魏出入經傳子史泛濫釋老下至醫卜筮兵刑貨殖水利算數靡所不究公過魏與竇漢卿相聚茅齋聽公言義正粹先師遂造蘇門盡錄是數書以歸謂其徒曰曩所授受皆非今始聞進學之序若必欲相從當盡棄前習以從事於小學四書為進德基不然當求他師衆皆曰惟先生命則魏國公由窮理致知反躬實踐為世大儒者又公所梯接云歲庚戌盡室來輝相依以居㑹上在潛邸遣托克托故平章趙璧驛至彰德恐公避逃托克托留璧獨至輝以過客見審其為公始致見徴之旨公曰天下之人同是姓名何限恐使者悞徴不敢妄應璧曰汝非棄伊囉斡齊隱此者乎公曰是則然矣璧曰良是乃偕往彰德受命遂行旣至上大喜日客遇之俾居衞從後列惟不直宿時召與語隨問而言久之詢及治道公見上聰明神聖才不世出虛已受言可大有為感以一介見信之深見問之切乃許捐身驅馳宣力盡其平生所學敷心瀝膽為書數千百言首以二帝三王為學之本為治之敘與治國平天下之大經彚為八目曰修身力學尊賢親親畏天愛民好善逺佞次及其救時之弊為條三十曰立省部則庶政出一綱舉紀張令不行於朝而變於夕辟才行舉逸遺愼銓選汰職員則不專世爵而人才出班俸祿則贓穢塞而公道開定法律審刑獄則收生殺之權於朝諸侯不得而專丘山之罪不致茍免毫髪之過免罹極法而冤抑有伸設監司明黜陟則善良姦窳可得而舉刺閣徴斂則部族不横於誅求簡驛傳則州郡不困於需索脩學校崇經術旌節孝以為育人才厚風俗美教化之基使士不媮於文華重農桑寛賦稅省徭役禁游惰則民力紓不趨於浮偽且免習工技者歲加富溢勤耕織者日就飢寒肅軍政使田里不知行營往復之擾攘賙匱乏恤鰥寡使顛連無告者有養布屯田以實邊戍通漕運以廪京都倚債負則賈胡不得以子為母如㹀生㹀牛十年千頭之法破稱貸之家廣儲蓄復常平以待凶荒立平凖以權物估却利便以塞倖塗杜告訐以絶訟源各疏張弛之方其下本末兼該細大不遺文不具述上竒其才由是動必見詢使授太子經以太師淇陽王之兄故丞相摩多格爾故右丞布哈濟勒丹今司徒買努為之伴讀日以三綱五常先哲格言薫陶徳性明年憲宗即位詔凡軍民在齊拉衮山南者聽上總之大為張宴羣下罷酒將出遣人止公頃者諸人皆賀汝獨黙然豈有意耶對曰臣欲陳之他日不謂遽問且今天下土地之廣人民之殷財賦之阜有加漢地者乎軍民吾盡有之天子何為異時庭臣聞之必悔見奪不若惟手兵權供億之須取之有司則勢順理安上曰慮所不及者遣人入聞願總兵與國戮力報可公䇿太祖承天大命兵取天下功未及竟而遂陟遐太祖平金遣二太子總大軍南伐降唐鄧均徳安四城㧞棗陽光化留軍戍邊襄樊壽泗繼亦來歸而壽泗之民盡於軍官分有由是降附路絶雖歲加兵淮蜀軍將惟利剽殺子女玉帛悉歸其家城無居民野皆榛莽何若以是秋去春來之兵分屯要地㓂至則戰㓂去則耕積穀髙廪邊備旣實俟時大舉則宋可平上善之始置屯田經略司於汴西起穰鄧宿重兵與襄陽制閫掎角東連陳毫清口桃源列障守之又置都運司於衞轉粟於河繼餽諸州陜西則移隴右汪義武公戍利州劉忠惠合哈喇爾于成都割河東解之鹽池歸陜西置從宜所中粮興元猶懼不繼置行部秦州順嘉陵漕漁關沔池轉粟入利其年大封同姓敕上於南京關中自擇其一公曰南京河徙無常土薄水淺潟鹵生之不若關中厥田上上古名天府陸海上願有關中帝曰是地户寡河南懐孟地狹民夥可取自益遂兼有河内壬子夏入覲受命征大理至察遜諾爾夜宴羣下公為陳宋祖遣曹彬取南唐敕無效潘美伐蜀嗜殺及克金陵未嘗戮一人市不易肆以其主歸明日早行上據鞍呼曰汝昨夕言曹彬不殺者吾能為之吾能為之公馬上賀曰聖人之心仁明如此生民之幸有國福也明年夏瑪雅陸盤大張敎條俾公以王府尚書身至京兆置宣撫司以楊中書為使奏諸千夫長不法奪有人室者旬月之間民大和浹道不拾遺師行留裕宗後謂曰姚公茂吾不能離恐廢汝學今遣竇漢卿教汝先遣三使入大理諭招許不殺掠大軍經吐蕃刋木求塗以前三使先至諭㫖彼以為誑磔其尸於樹大師及城其相髙祥登陴望之見吾軍威之盛駭愕口張不收飭公盡裂橐帛為幟書止殺之令分號街陌由是其民父子完保軍士無一人敢取一錢直者惟急求三使之首或曰投洱水中遣漁者網之無得也俾公為文以祭賜其家人數千户世無有與及歸馬多道死公惟一馬瘠不可乗則牽之襟穀數升時揺木盂以飼雪深三尺軍馬所經踏為冰梯惟旄牛負橐以從徒歩僅千里而中原馬至分賚之始免繭足上駐六盤公疾求居關中教使勸農身至八州諸縣諭上重農之㫖凡今關中桑成列者皆所訓植歲丙辰公入見或讒王府得中土心帝遣阿拉克徳勒大為勾考置局關中惟集經略宣撫官吏下及征商無遺羅以百四十二條曰俟終局日入此罪者惟劉史兩萬户以聞餘悉不請以誅上聞不樂公曰帝君也兄也吾弟且臣事難與較逺將受禍未若盡是邸妃主以行為久居謀疑將自釋復初好矣上難之翌日語再及曰臣過是無策思久之曰從汝從汝先遣使以來覲告時帝在河西聞不信之曰是心異矣曰來詐也再使至詔許馳二百乗傳棄輜重先及見天顔始霽大㑹之次上立酒尊前帝酌之拜退復坐及再至又酌之至再帝泫然上亦泣下竟不令有所白而上敕罷關西鈎考廢行部安撫經略宣撫都漕諸司帝規自將南伐與上閲地圗俾公跽指瀕江州郡津歩要地可舟越者遂復上兵遣由鄂入歲己未秋及江而憲廟陟遐問至上猶濟江駐兵結層樓蒙以臯比日居其上臨攻鄂城東北賈似道聞公諮謀軍中比為王猛城垂㧞前茅上及長沙下及隆興聞叛王將為非覬於家追前茅還遂振旅斷浮梁以歸帝即大位以王文統為平章盡出藩府舊臣立十道宣撫使諸侯惟嚴忠濟為强横難制乃以公為東平至居庸北制下受命即南或勸無行當入覲陛辭公曰文統新當國彼将以我為奪其位至治郡置勸農檢察二人以監之推物力以均賦役罷鐵官居三月大駕北征天后留燕遣使召公兒軰幼時汝授之書何人留彼時摩多格爾為丞相惟專從衞宫閫諸事疑則見謀二年拜太子太師公曰皇太子未立安可先有太師還制中書改大司農公奏在太宗世詔孔子五十一代孫元措仍襲封衍聖公卒其子與族爭求嗣為訟及潛藩帝時曰第往力學俟有成德達才我則官之又聞曲阜有太常雅樂命東平守臣輦其歌工舞郎與樂色俎豆祭服至日月山帝親臨觀飭東平守臣員闕充補無輟肄習臣宣撫東平嘗閔先聖大賢之後詩書不通義理不究與凡庶等版洛士楊庸選孔顔孟三族諸孫俊秀者授之經而學夫禮盍眞授庸教官以成國家育才待聘風動四方之美又詳議王鏞亦善士錬習故實宜令提舉禮樂庶其歲久不致敗壊皆從之又具奏八事曰舉老成以輔皇子重省臣以振朝綱定法制以齊庶政立銓選以轉百官其四如兵衞屯田學校農桑皆所屢陳又具四事保民守信强幹弱枝脩内治外敦本抑末於兵衞又申奏曰内地之民不習武事不耐勞苦第可使出財賦以資國用西京北京諸路之民習武耐勞可盡復其差賦充本路保甲屯田使進有取而出有歸可鎭内竊以禦外侮漢軍除守禦南邊可選精勇富强三萬燕京東西分屯置營以壮神都此左右中三衞起本者詔赴中書議事講定條格其勉諭曰姚樞辭避台司朕甚嘉焉省中庶務湏賴一二老成同心圖贊仰與左三部尚書劉肅往盡乃心其尚無隱條成與丞相史忠武公奏之帝深嘉納後詔中書右丞相安圖同知樞宻院事巴延翰林學士承㫖哈喇哈遜近史天澤姚樞講定新格朕巳親覽可行於今卿等聞否亦當一一參攷速行其間一二可增損者記録以聞李璮召其質子彦簡竊歸反有迹矣帝問卿料如何對曰使璮乗吾北征之釁留後兵寡瀕海搗燕閉關居庸惶駭人心為上䇿與宋連和負固持久令數擾邊使吾罷於奔救為中䇿如出兵濟南待山東諸侯應援此成擒耳帝曰若是賊將何出對曰出下䇿三年文統伏誅西域之人為所壓抑者伏闕羣言回回雖時盗國錢物未若秀才敢為反逆帝曰在昔潛藩商訂天下人物亦及文統姚公茂言此人學術不純以游說干諸侯他日必反去年竇漢卿上書累數千言亦發其必為亂首秀才豈盡皆斯人然文統之相參知政事商公挺實譽之至是費寅以九事中時恚忌訟商公為文統西南之朋引陜西郎中行宣撫使趙良弼為徵幽商公上都以良弼多智略疑為文統流亞械繫於獄㑹遣阿陶行院成都而無輔行俾省擇人公奏惟商挺可陛下寛其前罪責成斯行遂出而遣之公又入奏方踐阼之初非良弼詗事關中恐後事㑹寧身負矯擅誅東西川兩帥之罪以寛陛下西顧之憂推是為心忠純皎然安得與文統蓄異志者比臣請質闔門百口必其無他帝悟出之四年拜中書左丞至元之元出省臣三罷世侯置牧守遷轉河東山西河南山東官吏公行省河東山西明年而歸或言中書政事大壞帝怒天降大臣罪有入不測者公上言太祖開創跨越前古施治未遑自後數朝官盛刑濫民困財殫陛下天資仁聖自昔在潛聽聖典訪老成日講治道如邢州河南陜西皆不治之甚者為置安撫經略宣撫三司其法選人以居職頒俸以養廉去汚濫以清政勸農桑以富民不及三年號稱大治諸路之民望陛下之治已如赤子之求母先帝陟遐國難竝興天開聖人纘承大統即用厯代遺制内立省部外設監司自中統至今五六年間外侮内叛繼繼不絶然能使官離債負民安賦役府庫粗實倉廪粗完鈔法粗行國用粗足官吏轉換政事更新皆陛下克保祖宗之基信用先王之法所致今陛下於基業為守成於治道為創始正宜息聖心答天心結民心睦親族以固本建儲副以重祚定大臣以當國開經筵以格心脩邊備以防虞蓄糧餉以待歉立學校以育才勸農桑以厚生是可以光先烈可以成帝德可以遺子孫可以流逺譽以陛下才略行此有餘邇者伏聞聰聽日煩朝廷政令日改月異如始栽之木生而復移旣架之屋起而復毁逺近民臣不勝戰懼惟恐大本一廢逺業難成為陛下之後憂國家之重害帝恚為釋五年用兵襄陽立河南行省經理屯田以公僉省八年入覲十年拜昭文館大學士詳定禮儀事其年襄陽下問其事宜公對吕文煥以江淮一使兼上路總管生劵軍縱還熟劵徙之河北皆可十一年初議大舉奏如求大將非中書右丞相安圖同知樞宻院事巴延不可七月左丞相巴延陛辭付敕書惟逆戰者如軍律餘止殺掠古之善取江南者惟曹彬一人汝能不殺是亦一彬也旣濟江下鄂使至夜召見公帝憂見色曰自太祖戡定天下列聖繼之豈固存之令久帝制南國邪蓋天命未絶朕昔濟江而家難作天不終此大惠而歸今巴延雖濟江天能終此與否猶未可知是家三百年天下天命未在吾家先在於彼勿易視之其有事宜可書以進公言嚴兵守鄂無使荆閫斷陽羅渡先遣使責負歲幣留行人之罪明年公又言由陛下降不殺虜之詔伯顔濟江兵不踰時西起蜀川東薄海隅降城三十户踰百萬自古平南未有若此之神㨗者然自夏徂秋一城不䧏皆由軍官不思國之大計不體陛下之深仁利財剽殺是致降城四壁之外縣邑丘虛曠土無民國將安用比聞揚州焦山淮安人殊死戰我雖克勝所傷亦多宋之不能為國審矣而臨安未肯輕下好生惡死人之常情蓋不敢也惟懼吾招徠止殺之信不堅詐其來耳是用力拒宜申遣公幹官專輔巴延宣布止殺之詔有犯令者必誅無赦若此則賞罰必立恩信必行聖慮不勞軍力不費老氏有曰大兵之後必有凶年疾疫隨之軍雖不試而民止得其半况今民去南畞來歲之食將安所仰帕手腰刀必唱為亂袒臂一呼數十萬衆不難集也雖非勁軍壁山柵水卒未易平是一宋未亡復生一宋又南方官府以情破法鞭背文面或盛竹絡投諸江中又鹽鐵酒酤𣙜自漢代其後因之不廢今方新附若復徵之人必離散制曰鞭背黥面及諸濫刑宜急除之𣙜酤後議十三年罷昭文館拜翰林學士承㫖仍詳定禮儀宋平凡其侍從之臣以士子入見者必令見公詢其學行而官之九月享廟拜大禮使明年上以自九月不雨至於三月問可以惠利斯民者公曰靡穀之多無若醪醴麴蘖京師列肆百數日釀有多至三百石者月已耗穀萬石百肆計之不可勝算與祈神賽社費亦不資宜悉禁絶皆從之初公方奏事得疾忽跽不能言帝急命從臣扶出登車至家未甦百日而愈後三年疾再至昬黙三日薨壽七十八京師士夫哭祭如失親戚曰自今帝側圗回天下者豈復有斯人者邪惟僉宻院趙良弼賻俸半歲為位祭其家終䘮時孤姪燧仕安西燉僉淮西提刑煒獨舉其柩藁葬京城東南别墅後十八年當元貞二年五月煒徙葬卜於西洛金門山祖塋别兆於輝菊山之陽公天資含𢎞而仁恕恭敏而儉勤理生惟務本實不事末作未嘗疑人欺已有負其德亦不留怨胸中憂患之來不見言色魏國公每譽其善於順受人莫可及在京晚屢輟禄雖奉朝請假質劵劑盈束視貧甘心不一出言恃其久故干人聞不足於上有來即謀必反覆忠告惟恐吾言之不盡及秉筆中書或咎公獨遺門牆故人公曰用人威權當出天子果若賢材烏避不聞其瑣尾者烏敢藉權樹親賔市私恩乎他善衆多今惟表其大益斯世者四其一倡鳴斯道使今天下鄉校童蒙之師猶知以小學四書為先雖戴惠文身為刀筆筐篋之行與非華人亦手披口誦是書求厠士列者往往多然故中書左丞之制有曰德全天懿學得聖傳㫖固有在於斯也再則中土士夫不知為廟作主以奉先祀自公始輝人多化之而祖考妥靈有所三征西南夷為陳曹彬取南唐兵不血刃贊神武以不殺四當世祖淵龍規一幅員之判裂也請開屯田淮蜀移兵戍之固已起平宋之本及議南伐而難大將又上言非中書丞相安圖同知宥宻巴延兩人不可宋平又與諮謀其新國圗任其降臣隨有兩王作難海隅當十五年炎燼撲滅而公始薨古以揆之晉羊祜首䇿平吳吳平而身不及見樂毅有曰善作者不必善成蓋當其時自明其身不終所事於燕惠數百年後猶能取必於祜今焉不效於公歟四夫人惟王氏先公卒繼宋氏後公七年卒公贈少師贈吳興郡夫人及公國魯與完顔氏李氏皆從封魯國夫人後公三十四年完顔亦卒故三夫人皆祔煒李出今中奉大夫河南北廉使其忠厚清慎有克繼先烈之譽二女姊宋出娣完顔出姊卒娣繼皆嫁為開府忠武公中子杞淮東肅政廉訪使妻皆卒孫尚孩嗚呼燧生三歲而孤公卵翼之不知其蒙闇教督而急其成俾粗有聞承乏翰林復世公官恐公事業不能詳盡不敢干他詞臣故惟自述文不過華質不至俚而摭其實焉耳矣銘曰惟天聰明視聽自民沃天子心啟莫匪臣舜察邇言昌言禹拜稱聖萬世臣何與在粤若世祖方龍躍淵載牽徵車遐蒐逸賢即輝起之爰置左右授太子經事靡不叩公感一介盡其平生所學與知傾敷悃誠書首八事脩身以始賢親畏天愛民以次申以卅條捄弊之方施治所宜如紀在綱上總兵民公請民去上受封國公擇地所上征南詔公陳遏劉上曰汝言吾行優優展也神武操旣有要天下定一於時已兆移兵戍邊首蜀尾淮免夫春秋剽殺去來汴置經略秦以宣撫三年其民歌舞樂土治效若斯公於之時一出為猷不無贊彌又從濟江内難方蹶帝遄其歸大統入繼移昔已試施諸萬方帝思舊人台衮用章公拜稽首元良未建臣何力有太師顧先改為大農尋拜左丞申以責難書存可徵南土既平諮謀新國昭文禁林必首見及後聖相承言行其生没為法程諡以諱名旣又進加功臣開府莫尊太師莫尊國魯哀榮若斯大書穹碑比其生全千祀可貽參知政事賈公神道碑賈氏之顯在金叔世由大考銀青榮禄大夫上柱國尚書右丞河東郡襄獻公諱守謙相宣廟故曾大父衍金紫光禄大夫曾妣實嘉夫人焦皆從封河東郡夫人考頤武節将軍兵部主事蔡州觀察推官生公鄭州年十五汳亂已失兵部奉妣夫人孫踰河依舅氏居天平甫及冠入官行臺於時法制寛簡凡受事者惟以賄先或餽黄金為兩半百峻絶不取太宗聞之稱其清愼特敕有司月給白金為兩百世祖淵龍驛致諸邸與語合意俾董城上都竟工丁妣夫人憂去及踐天位首以為中書左右司郎中不名惟官命之坐政事堂位宰相下他為郎者莫之與班由善國言小大庶政不資舌人皆特入奏其冬帝自将討叛王漠北漢人惟丞相史忠武公及公二人者從歸賜西錦服賞其周旋莽閴皸瘃之鄉不懈益勤也帝問卿郎俸幾何公如數對則曰何薄如是敕増之公曰品制宜然後太保劉文正公奏公參知政事公又曰他日必有由郎援例求執政者將何為禦皆不許至元始元官朝請參議中書省事詔同燧先世父太師文獻公時以中書左丞行省河東山西罷世侯置牧守五年再為左右司郎中者三年盗殺臣為平章欲擅利權病其束手中書不得肆欲奏求分六曹繁務立尚書省授公中書給事中丞相惟署制敕而已隨同兩丞相史公耶律公潤色國史翰林十年襄陽下詔令即汰生熟劵軍隨授知襄陽府府隨陞路官太中襄陽路總管虎符明年詔淮安忠武王巴延時以中書右丞相河南王阿珠以平章楚公阿爾哈雅以右丞行中書省將圍襄諸軍濟以新籍之兵合數十萬衆平宋授公宣撫使議行省事浮漢濟江下鄂大師其東留右丞及公戍鄂明年授僉行中書省事荆閫遣安撫使髙世傑來襲右丞出禦敗之降世傑乗鋭下岳進㧞江陵又移軍圍潭獨公留戍士民求見者前其人而却其贄金帛一錢不入其門酒茗之微亦絶戢吏卒無入鄉敢縱暴者刑以重典發庾賑飢宋宗室仰食官者仍廪之不變其服而行其楮幣弛湖荻禁聽民漁樵東南未下之州商旅滯此者給繻歸之剏舟百數十艘操以水軍免括商民置藥局遣醫更視疾瘻婁安邦以信陽來歸從其子入覲矣禆將陳思聰屠其家逆端則見或議加兵公曰為是益堅其叛惟可計致遣朱千户從十人往使戒無操兵好謂之曰汝與安邦同功有怨盍明之省何俟其出而屠其家或仇黨夙夜甘心於汝奈何宜身至省告余以故余則直汝不然少猶豫則以叛加兵興誅矣思聰果來隨徵其妻子其徒至數以戕賊主帥家與未受使言迎射殺其從二人罪併肆其子諸為亂於市幼主旣降其相陳宜中文天祥挾益衞兩王逃之閩廣爵人號年東南大蠢覬倖之徒相煽以動大或數萬小或千數在在為羣蘄宼起司空山剽黄及夀昌夀昌距鄂尤邇鄂屬縣傅髙亦集衆跳梁為應公多為檄曉曰汝皆平民為賊驅脅至此俘殺之獲子女貨財渠惡悉有汝何利焉捐父母妻子徒受叛逆之名以取族為鄉里所醜今能投兵返其居者復齒平民不蹤跡其既往有斬賊首至者以級多少受賞以渠首至者官之言中其情上下猜沮稍稍離渙壓以官軍遂盡株橛翦平無留髙亡之江西武寧公又檄敢舎匿者誅及其鄰窮無所歸變姓名返家為尉吏縳致磔死初遣萬户某者討是賊其人顧以髙為辭請急盡殲鄂之豪傑大姓以絶禍本公曰應賊者髙䑕子何為旋就梟夷豪傑大姓初無與知奈何以髙誣誅逆天欺君以禍民夫誰敢然汝第往吾能必其無他其人出留所善部將戒曰聞吾還軍汝舉烽城樓内外合發必盡殲是㑹其戰不利水死其始事彰鄂人大恐轉益徳公恃為司命時精兵盡於圍潭居守半老疾乃雜新民乗城民相誓曰設宼誠至吾曹二三千人必無四顧其家專擁衞賈相十四年官中奉湖北宣慰使明年授參知政事無幾時遷江西行省參知政事民素父母愛而神明敬之號送其去像事於學先聲至江西民有迎訴千里外者時其省收海隅偽命甚急有者坐以連賊無者謂為靳匿將為後用誅論巨室踰三百家猶有幽獄未斷者公至出其非辜下令凡宋告身以城來者朝廷既加其舊官之矣自餘蓄此無所敘復徒自取禍其悉投水火敢有以索兵仗為名俠入民家㒺為收匿以起獄取貨與取妾人子女痛繩以法明年大水壊民廬室藏蓋者發粟以賙其逃登屋木者遣吏具舟載糜粥糗糒以食脫沈溺數萬家宰相出入以甲士導從至省班立庭下其冬大雪堕地旋消移時不能滿寸右丞托爾楚勲貴胄也顧謂公曰南方竝有北寒減三月公曰相公襲貂裘熾炭其前而張幄於後言是則宜彼庭立者必以為加三月矣右丞屬觴於公謝其失言休士於廡由是知其為心斯須不忘恤下也事必資決不敢友視而師之明年李梓發盗據南安公虞他將往則為暴堅其不下請身往平纔從兵千營於城北為檄推誠招懐梓發度其猖獗日久勢不敢歸以其徒知公有素或貳其操戰不為用懼左右竊取其首為功乃閉妻子一室自焚死衆皆散還其鄉不戮一人平南安歸江東饒之屬縣都昌杜萬一挾左道媚人有衆萬數狂僭置相公曰都昌與吾南康止限彭蠡此宼不馘將亂南康乃調兵戍遏彭蠡西瀕别遣方招討將其軍伏仗舟中偽為商農徑造茇舎生擒萬一與其相曹者以歸磔龍興市其徒散駭復其民居後有列巨室姓名百數來上云與賊連公曰大慝誅矣延求何為火之而江東宣慰使某者媢其成功遣使入讒公不俟江東兵至惟遣南將往討私有其藏以八日屠禁日殺人㑹公亦遣使至制責江東使曰賈郎中為者何有過差且是賊非羊豕人也雖殺以朔日猶可十七年詔再征日本賦江浙江西湖廣三省造海艦公極言如是將亂江南欲身任入聞陳其過舉他相以為不可廢閣詔令異同之間其年七月二十日年六十三薨於豫章而始成戰艦遣宣慰某者總致於軍東征丞相憤失軍興將以是日斬使忽詔下既江西海艦後期罷兵君子謂公薨猶利國如古尸諫以其冬十有二月歸葬威州井陘牛山先塋嘗㝡其平生家居事妣夫人曲極孝敬迨薨移是以養寡姊夫人李氏信氏雍睦無間言視政之休未嘗廢書從戎亦橐駞負書以行從討叛王度漠有暇猶為世祖陳說資治通鑑納君於善延師私塾毓徳諸子日或至其舎出門交友貌粹而言温侃侃易直無有城府機穽尤篤故舊故第邇太室歳常以十月剛日大享其日每風雪沍寒非執豆籩聞鐘鼔振發不敢安臥其室冠服庭立至乎已享積學其躬如是施諸用世事世祖二十有一年其居中當睿聖大有為之時與二三元臣上以毗贊其經國下以燮熙其子民者十有三年出而經理南紀謀猷大軍於襄陽於湖廣於江西新造之邦嚮化未純安而集之喣而濡之如恐一夫不獲其所一有海隅之難盗賊附起禍譬而賞勸徳綏而威撻徐革其面而浹其心俾方三數千里之氓一喙同辭稱其仁人求能推守大帝諭忠武王以曹彬取南唐不殺之訓者無公亞疋嗚呼後公之薨廿有九年今聖言念盡瘁大帝功加生民贈推忠輔義功臣銀青榮禄大夫平章政事定國公諡曰文正哀褒之典無一遺者恩重書棺公而歆茲可作於九原矣五子鐸淮東宣慰使鈞中書省參知政事鉞不禄鏞令曹之禹城鍔知鹽官州二女適臨湘令劉彧僉山東道肅政廉訪司事王遂男孫五汝玉行臺監察御史汝立汝礪餘未名女孫五有從者三吉州校官許崇慶戍守眞陽萬户劉遂壽武庫使劉復餘幼男曾孫五女曾孫一皆幼銘曰定公筮仕於顧成世弱齡卑官潔慎已至世祖淵龍謂治須賢蒐以自毗如渇繘泉公焉其時先後胥附及踐天位大正百度以公為郎左右中書凡我庶政丞相共圗日月入告天顔諟顧不恇於威不愉於豫垂十五年政治隆平維帝之明公猷是經將一文軌襄漢其始出公軍諮為烈益偉旣下江夏人暴而仇公則緩之敷澤優優粟飢藥疾於賦於役勝國厲民靡不與黜大盗劻勷動萬為曹以言為兵訓枿其豪民視曰公予父予母胡不像之事以豆俎聞遷省洪出涕齎咨洪聞其來人抃以嬉既繫岸獄載糗與粥舟取溺逃於彼登木南安勦狂不缺斧斨僭偽都昌生致用方惠懷其仁兩省千里聞其告凶號啼婦子疇非位相死而罵長伊疇若公没世不忘諡於太常傳以太史矧世其德衆多令子有毖巋山螭石劘穹神保焉依期古與終僉書樞宻院事董公神道碑公諱文忠字彥誠眞定藁城人曾大父哲大父昕父俊材而略太祖兵金由農畞將鄉民萬衆來歸官以龍虎衞上將軍右副元帥知中山府事時太尉史忠武公兄河北西路都元帥天倪開閫眞定其倅武仙殺元帥一家百口據眞定叛而臣金太尉集兄散卒復之仙走壁雙門夜又襲入太尉唯與故侍衞親軍都指揮李伯祐投城渉塹奔藁右副聞亂已艤舟滹沱即馬入槀合力再復之仙走壁抱犢旋踰河太宗以太尉為眞定河間東平濟南大名五路萬户右副長千夫從追義宗歸德薄北門而陳金縱兵夜擊我師敗績右副死事夫人李氏九子公次居八憲宗即位明年壬子年二十有二始入侍世祖潛藩承旨王文康公鶚言詩敎問公能乎對曰臣少讀書唯知入則竭力以事父母出則致身事君而已詩非所學癸丑從征南詔己未伐宋王師臨江與兄忠獻公文炳翰林承旨文用率勇士乗鵃䑠求先濟敎遣他將舟師繼之三戰三㨗得敵艨艟百艘遂進圍鄂上正宸極中統之元置符寶局以公為郎後官奉訓大夫居益近宻上嘗不名唯第呼董八亦異數也而不為容悦隨事獻納中禁事祕外多不聞舉所可知如至元二年安圖以右丞相伐宋中書建陳十事言忤天聽公曰丞相由勲閥王孫夙以賢聞今其始政人方延佇傾耳而所請若是後何以為乃從㫄代對􅈤悃詳切如置符疏者始俗開可八年侍講徒單公履欲行貢舉知上於釋崇敎抑禪乗是隙言儒亦有是科書生類敎道學類禪上怒已召先少師文獻公司徒許文正公與一左相廷辨公自外入上曰汝日誦四書亦道學者公曰陛下每言士不治經究心孔孟之道而為賦詩何關脩身何益為國由是海内之士稍知從事實學臣今所誦皆孔孟言烏知所謂道學哉而俗儒守亡國餘習求售已能欲錮其説恐非陛下上建皇極下脩人紀之賴也事為之止君子以為善於羽翼斯文十一年以大師南伐民困供億奏蠲常歲他名之征後燕見降將問宋所由以亡皆曰賈似道當國薄武人而唯文儒之崇武人怨之後大師至外而疆場内而京都莫有鬬志釋甲投戈歸命恐後上問公之言何如公曰似道薄汝而君則爵以貴汝禄以富汝未嘗汝薄也而以有憾而相移怨而君不戰而坐視亡國如臣節何似道薄汝豈以逆知汝曹不足恃為一旦用乎上深善之詔徙大都獵户郢中奏止還貧弱者弛收官鬻田器之稅聽民自為以勸本富俗㑹患多盗敕茍犯者殺無赦在在繫纍充牣犴獄公言今殺人於貨與竊一錢直上均死一斷不屬憯黷莫甚恐於陛下致祥之氣好生之徳多所干傷敕革之或告漢人毆國人傷又或告太府屬盧某盗斷監布上命殺以懲衆公言今刑曹於囚罪入死者已有服辭猶必詳讞是事未可因人一言遽置重典宜付有司簿責閲實以俟後命乃遣近臣圖們覈毆傷公覈監布告毆得誣杖遣之監布葢太府始受端外皆有羡尺適尚方工宫有需其入惜毁成端斷羡以給非身利而為也降㫖原之責侍臣曰方朕怒際卿曹皆結喙非董八啟沃朕心則殺是非辜必竊竊取議中外矣賜金尊曰用旌卿直儲皇亦曉宫臣曰方壓以雷霆而容止話言暇不失次卒矯以正實人臣難能者太府屬摯而泣謝曰鄙人腰領賴公以全公曰吾雅非知子其必拯濟諸阽危者葢與國平刑非期子見德也其返而摯自安圖北伐犯法臣哈瑪爾獨用盗弄威福衆立親黨懼平章廉希憲復相必妨其私表以右丞江陵者踰年公奏希憲昭代名臣今端揆虚席不可久使居外以孤人望宜早賜環從之十六年十月乙亥還自萬壽宫祝釐所奏曰陛下始以燕王為中書令樞宻使纔一至中書後冊儲皇累使明習軍國事者十有餘年終守謙抑非不奉明詔也亦朝廷處之未極其道夫事已奏裁而始啟白為人臣子惟有唯黙避在不敢以令可否制敕而已以臣所知盍令有司啟而後聞其有未安斷以制敕則理順而分不踰必不敢辭責元良矣其日盡前省院臺臣将百人上面諭曰自今庶務其聽皇太子臨決而後入聞尋語儲皇董八崇植國本者其識勿忘禮部謝昌元請立門下省封駮制敕以絶中書風曉近習奏請之源上銳欲行之詔廷臣雜議怒承㫖少保王文忠公盤曰如是益事汝不入告而使南土後至之臣言之用學何為必今日開是省廷臣三日始奏公為侍中兼其屬多至數十人其臣弗便也入言陛下將别置省斯誠其時得人則可寛聖心以新民聽今聞盗詐之臣與居其間言多目公公恚辯曰上每稱臣不盗不詐今汝顧臣而言意實在臣其顯言盗詐何事上出奏者公猶愬不止且攻其賊國之姦上曰朕自知之彼不汝言也然終忌公得君清愼無過莫可指以為報者乃以楮鏹萬緡為夀求交驩擯棄不取忠獻公卒官中書左丞故太傅巴延公表其可相上使嗣為公曰臣兄有戡定南土之勞位是則可臣給事居中宣何力焉而可嗣為十八年陞局為典瑞監郎為卿階以正議大夫俄受資德大夫僉書樞宻院事卿如故始不從蹕留居大都凡宫籞城門直舎徼道環衞屯營禁兵太府少府軍器尚乗等監皆領焉兵馬司舊隸中書併付公將權臣累請奪還中書不報是冬十月二十有五日雞鳴將入朝忽踣家庭氣息奄奄上遣中使持藥投捄不及遂絶傷怛不已猶覬其息敕勿速斂五日乃匶且知公圗書外無他居積賻錢數千萬儲皇等是以十二月六日歸葬其鄉髙里先塋最始至終實三十年征伐蒐田無地不從凡乗輿衣服鞶帶藥餌小大無慮百數十橐靡不司之中夜有需不以燭索可立至前風雨寒暑饑渇駿奔心無怠萌口絶勩語屬屬乎惟以執事不恪獲譴為懼故能滋久眷寵彌深為臣則然其在家出門弟弟敦宗賢賢信友淵懿而明炳孫㳟而易直倫理之間人文燦然元臣故老奉朝請者上所存問及有欲言皆由公傳逹權倖不敢讒危之及是則皆出涕几筵曰哀或若人曾未中夀而不淑自兹君側失正人矣一貴戚獨曰天乎世無吾曹千人誠不加少而奪公歸耶下至傭人販夫亦失聲投業後廿有二年當大德辛丑天子言念其功贈光祿大夫大司徒封夀國公諡忠貞配顧氏從封夀國夫人男五人士珍資善大夫御史中丞士良同知開州士㳟正議大夫典瑞太監士信蚤卒士能未仕女三人長適中書左丞史彬次適集賢學士張晏次適王某男孫七人長守中内供奉次守庸利用監資用庫提㸃次守恪内供奉守遜守簡守常守讓女孫六人長適左藏庫大使史燮次適劉文鐸幼姆士珍將銘墳道持遼陽行省參政王公思廉之狀逺走江東而以訪燧義有二焉一以其伯仲父忠獻與翰林承㫖與公由先少師儲邸舊學命之不官必曰先生一以燧嘗同受學司徒文正公且與今忠獻子其兄江淛行省左丞士選相好實再世契奚言而辭銘曰在易六位以爻居四上承五君多懼之地於皇前聖與天巍巍神明其變雷霆其威公三十年日侍帷幄出入起居不辱於數初匪知計其身包周臣職克脩敬愼無尤人膚其觀曰郎典寶其自任重引君當道不剛悻悻不柔容容揆義為中闕焉彌縫或攻聖學異敎之似公曰其言由孔孟氏彼去其實務華辭章為利達資何關綱常足明其心斯道力衞病為朋黨彌禍於未父子之間進說多艱庶政既先國本泰山其入告内無是為大他随事陳㒺遺於外其非廷尉獄由平反施令必臧等乎納言姦窳滔天庭伐其慝雖未即誅中劇矛㦸黄髪番番致臣而家歲時存問天語柔嘉晚書宥宻瑞監仍柄何天不弔年過知命前聖忠之賻以送終嗣聖功之追爵上公人臣龍光至是焉極矧子廊廟清劭執徳無石維年竹帛豈夷賴垂休聲其以是詩中州名賢文表巻十二
