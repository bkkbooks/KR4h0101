body:
  text: 中州名賢文表卷一明劉昌編許文正公奏議時務五事至元三年臣衡誠惶誠恐謹奏呈時務五事伏念臣性識愚陋學術荒疎不期虛名偶塵聖聽陛下好賢樂善舎短取長雖以臣之不才亦叨寵遇自甲寅至今十有三年凡八被詔㫖中懐自念何以報塞又日者面奉徳音丁寧懇至中書大務容臣盡言臣雖昏愚荷陛下知待如此其厚敢不罄竭所有思益萬分但迂拙之學本非求仕言論鄙直不能回互矯趨時好孟子以責難於君陳善閉邪迺為恭敬孔子謂以道事君不可則止臣之所守者其大意蓋如此也伏望陛下寛其不佞察其至懐則區區之愚亦或有少補云立國規摹一為天下國家有大規摹規摹既定循其序而行之使無過焉無不及焉則治功可期否則心疑目眩變易紛更日計有餘而歳計不足未見其可也昔子産相衰周之列國孔明治西蜀之一隅且有定論而終身由之况堂堂天下可無一定之論而妄為之哉古今立國規摹雖各不同然其大要在得天下心得天下心無他愛與公而已矣愛則民心順公則民心服既順且服於為治也何有然開創之始重臣挾功而難制有以害吾公小民雜屬而未一有以梗吾愛於此為計其亦難矣自非英睿之君賢良之佐未易處也勢雖難制必求其所以制衆雖未一必求其所以一前慮却顧因時順理予之奪之進之退之内主甚堅外行甚易日戛月摩周旋曲折必使吾之愛吾之公達於天下而後已至是則紀綱法度施行有地天下雖大可不勞而理也然其先後之序緩急之宜密有定則可以意㑹而不可以言傳也是之謂規摹國朝土宇曠逺諸民相雜俗既不同論難遽定考之前代北方奄有中夏必行漢法可以長久故後魏遼金歴年最多其他不能實用漢法皆亂亡相繼史冊具載昭昭可見也後魏拓拔氏改姓元都雲中遷洛十六帝一百七十一年遼耶律改劉氏都臨潢徙無常處九帝二百一十八年金完顔氏都上京遷燕九帝一百一十八年前趙劉元海據平陽三主二十五年後趙石勒都襄國六主三十二年前燕慕容皝都薊遷鄴三主三十四年前秦苻堅都長安五主四十四年後秦姚萇都長安三主三十四年南燕慕容徳據廣固二主十二年南涼秃髮烏姑據廣固三主十八年西秦乞伏國仁據金城四主四十七年後燕慕容垂據中山鄴四主二十五年夏赫連勃勃據朔方三主二十五年國家仍處逺漠無事論此必如今日形勢非用漢法不宜也陸行資車水行資舟反之則必不能行幽燕以北服食宜凉蜀漢以南服食宜熱反之則必有變異以是論之國家當行漢法無疑也然萬世國俗累朝勲貴一旦驅之下從臣僕之謀改就亡國之俗其勢有甚難者茍非聰悟特達曉知中原實歴代帝王為治之地則必咨嗟怨憤諠譁其不可也竊嘗思之寒之與暑固為不同然寒之變暑也始於微温温而熱熱而暑積百有八十二日而寒氣始盡暑之變寒其勢亦然山木之根力可破石是亦積久之驗也茍能漸之摩之待以歳月心堅而確事易而常未有不可變者然事有大小時有久近期小事於逺則遷延虛曠而無功期大事於近則急迫倉惶而不達此創業垂統也以北方之俗改用中國之法非三十年不可成功在昔金國初亡便當議此此而不務孰為可務顧乃宴安逸豫垂三十年養成尾大之勢祖宗失其機於前陛下繼其難於後外事征伐内撫瘡痍雖曰守成實如創業規摹之定又難於嚮時矣然尾大之勢計聖謀神算已有處之之道非臣區區所能及也此外唯當齊一吾民使之富實興學練兵隨時損益裁為定制如臣輩者皆能論此在陛下篤信而堅守之不雜小人不營小利不責近效不恤浮言則天下之心庶㡬可得而致治之功庶㡬可成也中書大要二中書管天下之務固不勝其煩也然其大要在用人立法二者而已近而譬之髮之在頭不以手理而以櫛理又譬之食之在器不以手取而以匕取手雖不能自為而能用夫櫛與匕焉是即手之為也上之用人何以異此不先有司直欲躬役庶務將見日勤日苦而日愈不暇矣古人謂得士者昌自用則小意正如此夫賢者識治之體知事之要與庸人相懸蓋十百而千萬也布之周行百職具舉宰職總其要而臨之不煩不勞此所謂省也然人之賢否未能灼知其詳固不敢用或巳知其孰為君子孰為小人復畏首畏尾患得患失坐視其弊而不敢進退之徒曰知人而實不能用人亦何益哉人莫不飲食也獨膳夫為能致氣味之美莫不睹日月也獨術者為能歩虧食之數得法與不得法固難一律論有馬不能習必使廐人乘之有玉不能治必求玉人雕琢之小物尚爾况堂堂天下神器可使不得法者為耶古人謂為山必因丘陵為下必因川澤意正如此夫治人者法也守法者人也人法相維上安下順而宰職優游廊廟之上不煩不勞此所謂省也里巷之談動以古為詬戲不知今日口之所食身之所衣皆古人遺法而不可違者豈天下之大國家之重而古人成法反可違耶其亦弗思甚矣用人立法今雖未能盡如古昔然已仕者便當頒降俸給使可養亷未仕者且當寛立條格俾就叙用則失職之怨少可舒矣外設監司糾察汚濫内専吏部考定資歴則非分之求漸可息矣再任三任抑髙舉下則人才爵位畧可平矣舎此則堆積壅塞參差謬戾茍延歳月莫知所期俸給之數叙用之格監司之條例先當擬定至於貴家世襲品官任子驅良抄數之便宜續當議之亦不可緩也此其大要須深探古人所以用人立法之意推而行之則何難見之有若夫得行與不得行在上之委任者何如而能行與不能行又在執政者得人不得人爾此非臣之所能及也為君難三踐言心防欺天任賢去邪得民順道生民有欲無主乃亂上天眷命作之君師必與之聰明剛斷之資重厚包容之量使首出庶物而表正萬邦此蓋天以至難任之非予之可安之地而娯之也堯舜以來聖帝明王莫不兢兢業業小心畏慎日中不暇未明求衣誠知天之所畀至難之任初不可以易心處知其為難而以難處則難或可易不知為難而以易處則他日之難有不可為者矣孔子謂人之言曰為君難為臣不易則其説所由來遠矣為臣不易臣已告之安圖至為君之難尤陛下所當専意者臣請舉其切而要者欵陳於後踐言人君不患出言之難而患踐言之難知踐言之難則其出言不容不慎矣昔劉安世見司馬温公問盡心行已之要可以終身行之者公曰其誠乎劉公問行之何先公曰自不妄語始劉公初甚易之及退而自櫽括日之所行與凡所言自相掣肘矛盾者多矣力行七年而後成自此言行一致表裏相應遇事坦然常有餘裕臣按劉安世一士人也所交者一家之親也一鄉之衆也同列之臣不過數十百人而止耳然以言行相較猶有自相掣肘矛盾者况天下之大兆民之衆事有萬變日有萬㡬而人君以一身一心酬酢之欲言無失豈易能哉故有昔之所言而今日不記者今之所命而後日自違者可否異同紛更變易紀綱不得布而法度不得立臣下雖欲黽勉而竟無所持循徒汩没於瑣碎之中卒於無補况因之為弊者又日新月盛而不可遏在下之人疑惑驚眩且議其無法無信一至於此也此無他至難之地不以難處而以易處之故也茍從古者大學之道以修身為本凡一事之來一言之發必求其所以然與其所當然不牽於愛不蔽於憎不因於喜不激於怒虛心端意熟思而審處之雖有不中者蓋鮮矣奈何為人上者多樂舒肆為人臣者多事容悦容悦本為私也私心盛則不畏人矣舒肆本為欲也欲心熾則不畏天矣以不畏天之心與不畏人之心感合無間則其所務者皆快心事耳快心則口欲言而言身欲動而動又豈肯兢兢業業以修身為本一言一事熟思而審處之乎此人君踐言之難所以又難於天下之人也防欺人之情偽有易有險險者難知易者易知易知者雖談笑之頃几席之間可得其底藴難知者雖同居共事閲月窮年猶莫測其意之所向雖然此特繫夫人之險易者然也又有衆寡之辨焉寡則易知衆則難知難知非不智也用智分也易知非多智也合小智而成大智也故在上之人難於知下而在下之人易於知上其勢然也處難知之地御難知之人欲其不見欺也蓋難矣昔包孝肅剛嚴峭直號為明察有編民犯法當杖脊吏受賕與之約曰今見尹必付我責狀汝第呼號自辯我與汝分此罪汝决杖我亦决杖既而包引囚問畢果付吏責狀囚如吏言分辯不巳吏人厲聲訶之曰但受脊杖出去何用多言包謂其恃權捽吏於庭杖之十七特寛囚罪止從杖坐以沮吏勢不知乃為所賣卒如素約臣謂此一京兆耳其見欺於人不過誤一事害一人而已人君處億兆之上所操者予奪進退賞罰生殺之權不幸見欺以非為是以是為非其害可勝既耶人君惟無喜怒也有喜怒則贊其喜以市恩鼓其怒以張勢人君惟無愛憎也有愛憎則假其愛以濟私藉其憎以復怨甚至本無喜也誑之使喜本無怒也激之使怒本不足愛也强譽之使愛本無可憎也强短之使憎若是則進者未必為君子退者未必為小人予者或無功而奪者或有功也以至賞之罰之生之殺之鮮有得其正者人君不悟日在欺中方仗若曹擿發細隠以防天下之欺欺而至此欺尚可防耶大抵人君以知人為貴以用人為急用得其人則無事於防矣既不出此則所近者争進之人耳好利之人耳無恥之人耳彼挾詐用術千蹊萬逕以蠱君心於此欲防其欺雖堯舜不能也任賢賢者以公為心以愛為心不為利回不為勢屈寘之周行則庶事得其正天下被其澤賢者之於人國其重固如此也然或遭時不偶務自韜晦有舉一世而人不知者雖或知之而當路之人未有同類不見汲引則人君無由知也人君雖或知之召之命之汎如厮養而賢者有不屑就矣雖或接之以貌待之以禮而其所言不見信用有超然引去耳雖或信用復使小人參於其間責小利期近效有用賢之名無用賢之實賢者亦豈肯尸位素餐徒費廩祿取譏誚於天下哉雖然此特論難進者然也又有難合者焉人君位處崇髙日受容悦大抵樂聞人之過而不樂聞已之過務快已之心而不務快民之心賢者必欲匡而正之扶而安之使如堯舜之正堯舜之安而後已故其勢難合况姦邪佞婞醜正惡直肆為詆毁多方以陷之將見罪戾之不免又可望庶事得其正天下被其澤耶自古及今端人雅士所以重於進而輕於退者蓋以此爾大禹聖人聞善即拜益戒之曰任賢勿貳去邪勿疑貳之一言在大禹猶當警省後世人主宜如何哉此任賢之難也去邪姦邪之人其為心險其用術巧惟險也故千態萬狀而人莫能知如以甘言卑辭誘人於過失然後發之之類惟巧也故千蹊萬徑而人莫能禦如勢在近習則誘近習勢在宫闈則諂官闈之類人君不察以諂為恭以訐為公以欺為可信以佞為可近喜怒愛惡人主固不能無然有可者有不可者而姦邪之人一於迎合竊其勢以立已之威濟其欲以結主之愛愛隆於上威擅於下大臣不敢議近親不敢言毒被天下而上莫之知此前人所謂城狐也所謂社鼠也至是而求去之不亦難乎雖然此由人主不悟誤至於此猶有説焉如宇文士及之佞太宗灼見其情而竟不能斥李林甫妬賢嫉能明皇洞見其姦而卒不能退邪之惑人有如此者可不畏哉得民心上以誠愛下下以忠報上有感必應理固宜然然考之徃昔有不可以常情論者禹抑洪水以救天下其功大矣啓賢能敬承繼禹之道其澤深矣然一傳而太康纔畋於洛萬姓遽仇而去之吁可怪也漢髙帝起布衣天下之士雲合景從其困滎陽也紀信至捐生以赴急人心之歸可見矣及天下已定而相聚沙中有謀反者此又何耶竊嘗思之民之戴君本於天命初無不順之心也特由使之失望使之不平然後怨望生焉禹啓愛下既如赤子矣民之奉上亦如父母矣今太康尸位以逸豫滅厥徳非所以為父母也是以失望秦楚殘暴故天下叛之漢政寛仁故天下歸之今髙帝用愛憎行誅賞非所以為寛仁也是以不平推是二者叅較古今凡有恩澤於民而民怨且怒者莫不類乎此也大抵人君即位之始多發美言詔告天下天下悦之冀其有實既而實不能副遂怨心生焉一類同等無大相逺人君特以已之私好獨厚一人則其不厚者巳有疾之之意况厚其有罪而薄其有功豈得不怒於心耶失望之怨不平之怒鬱而不觧雖曰愛之惡在其為愛之也必如古者大學之道以修身為本凡一言也一動也舉可以為天下法一賞也一罰也舉可以為天下公則億兆之心將不求而自得又豈有失望不平之累哉奈何此道不明為人君者不喜聞過為人臣者不敢盡言合二者之心以求天下之心則其難得也固宜順天道三代而下稱盛治者無若漢之文景然考之當時天象數變如日食地震山崩水潰長星彗星孛星之類未易遽數前此後此凡若是者小則有水旱之應大則有亂亡之應未有徒然而已者獨文景克承天心消弭變異使四十年間海内殷富黎庶樂業移告訐之風為醇厚之俗且建立漢家四百年不㧞之業猗歟偉哉未見其比也秦之苦天下久矣加以楚漢之戰生民糜滅户不過萬文帝承諸吕變故之餘入繼正統専以養民為務其憂也不以已之憂為憂而以天下之憂為憂其樂也不以已之樂為樂而以天下之樂為樂今年下詔勸農桑也恐民生之不遂明年下詔減租税也慮民用之或乏懇愛如此宜其民心得而和氣應也臣竊見前年秋孛出西方彗出東方去年冬彗見東方復見西方議者或謂當除舊布新以應天變臣謂與其妄意揣度曷若直法文景之恭儉愛民為理明義正而可信也天之樹君本為下民故孟子謂民為重君為輕書亦曰天視自我民視天聽自我民聽以是論之則天之道恒在於下恒在於不足也君人者不求之下而求之髙不求之不足而求之有餘斯其所以召天變也變已生矣象巳著矣乖戾之㡬已萌而不可遏矣猶且因仍故習抑其下而損其不足謂之順天不亦難乎右六者難之目也舉其要則修徳用賢愛民三者而已此謂治本治本立則紀綱可布法度可行治功可必否則愛惡相攻善惡交病生民不免於水火以是為治萬不能也農桑學校四語古之聖君必曰堯舜語古之賢相必曰稷契蓋堯舜能知天道而順承之稷契又知堯舜之心而輔贊之此所以為法於天下而可傳於後世也天之道好生而不私堯與舜亦好生而不私若克明俊徳至黎民於變敬授人時至庶績咸熈此順承天道之實也稷播百穀以厚民生契敷五教以善民心此輔贊堯舜之實也是義也出書之首篇曰堯典曰舜典臣自十七八時已能誦説爾後温之復之推之衍之思之又思之苦心極力至年五十始大曉悟以是㕘諸徃古而徃古聖賢之言無不同驗之歴代而歴代治亂之迹無不合自此胸中廓然無有凝滯斷知此説實自古聖君賢相平天下之要道既幸得之常以語人而人之聞者忽焉泛焉莫以為意察其所至正如臣在十七八時蓋無臣許多思慮許多工夫其不能領解理固宜然然間與一二知者相與講論心融意㑹雖終日竟夕不知其有倦且怠也蓋此道之行民可使富兵可使彊人才由之以多國勢由之以重臣夙夜念之至熟也今國家徒知斂財之巧不知生財之由不惟不知生財而斂財之酷又害於生財也徒欲防人之欺不欲養人之善所以防者為欺也不欺則無事於防矣欲其不欺非衣食以厚其生禮義以養其心則不能也徒患法令之難行不患法令無可行之地上多賢才皆知為公下多富民皆知自愛則令自行禁自止誠能自今以始優重農民勿使擾害盡敺游惰之人歸之南畝歳課種樹懇諭而督行之十年以後當倉盈庫積非今日比矣上都中都下及司縣皆設學校使皇子以下至於庶人之子弟皆從事於學日明父子君臣之大倫自灑掃應對至於平天下之要道十年以後上知所以御下下知所以事上上下和睦又非今日比矣能是二者則萬目皆舉不能是二者則他皆不可期也是道也堯舜之道也堯舜之道好生而不私惟能行此乃可好生而不私也孟子曰我非堯舜之道不敢陳於王前臣愚區區竊亦願學慎微五定民志慎喜怒崇退讓守信定民志民志定則不亂下知分則上安夫天下所以定者民志定也民志定則士安於為士農安於為農工商安於為工商則在上之人有可安之理民不安於白屋必求祿仕仕不安於卑位必求尊榮四方萬里輻輳並進各懐無厭無恥之心在上之人可不為寒心哉崇退讓臣聞取天下者尚勇敢守天下者崇退讓不尚勇敢則無以取天下不崇退讓則無以守天下取也守也各有其宜君人者不可以不審也慎喜怒審而後發發無不中否則觸事遽喜喜之色見於貌喜之言出於口人皆知之徐考其故知無可喜者則必悔其喜之失無可怒者則必悔其怒之失甚至先喜後怒先怒後喜先喜是則後之怒非也先怒是則後之喜非也號令數變無他也喜怒不節之故是以先王潛心恭黙不易喜怒其未發也雖至近莫能知其發也雖至親莫能移故號令簡而無悔無悔則自不中變也人之揣君必於喜怒知君之喜怒者莫如近愛是以在下希進之人求託近愛近愛不察乃與之為地七姬七珥之類甚至無喜生喜無怒生怒在上一人獨以喜之怒之為當理而不知天下四方譏笑怨謗正以為不當理也最宜深念其失在於不守大體易於喜怒也守信數變巳不可數失信尤不可周幽王無道不畏天不愛民酒荒色荒故不恤方今無此失何苦使人不信奏對至元三年二月二十有六日檀州北李家莊後山見上面奉徳音竇漢卿獨言生以道重當時汝亦知之何為徇情不言豈孔子教法使汝若是耶汝不遵孔子教法自若是耶徃者不咎今後無爾也是云是非云非可者行不可者勿行我今召汝無他也省中事前雖命汝意猶未悉今特面命汝也人皆譽汝想有其實汝之名分其斟酌在我國事所以無失百姓所以得安其謀謨在汝也謂汝年老未為老謂汝年小非小也正當黽勉從事無負汝生平所學安圖尚幼未苦更事汝謹輔導之汝有嘉謨先告安圖以逹於我我將擇焉對曰聖人之道至大且逺而學者所得有淺深臣生平雖讀書而所得甚淺然既叨特命願罄所知者言之其所不知亦不能强也安圖聰悟且有執持告之古人言論悉能領解臣以所知者盡告之但慮中有人間之則難行外用勢力納人其中則難行臣衡竊意國家自壬辰之後便當詢求賢哲商論歴代創業垂統之宜𠫭酌古今稍為定制使後世子孫垂拱守成此有國者之先務也因習宴安以為不可而其委任又多殘民蠧國之流壬寅以還民益困弊至於己酉庚戌民之困弊極矣困弊極殆將起亂當是時陛下有愛民之譽好賢之名聞於天下天下望之如旱之望雨故先皇帝繼統民皆忻悦將謂信從陛下選任善人更改弊政以興太平不意仍踵前失再用此徒委天下之民使之刻剥付天下之物使之侵欺大為失望所賴者分河南關中得陛下委之諸賢不一二嵗疲民大安恩雖未普而天下之心巳歸之矣此曹畏避威名不敢縱横但於君臣骨肉之間隂行譖愬將為不利於陛下但天命人心皆在於此故不得遂其所願然委付一事實為不可而其間節目又少有可不可焉其可者巳在不可之中不得為可其不可者是又不可之不可者也淺見若此未知是否臣衡伏覩先皇帝聖㫖叮嚀懇至其大要欲事辦民安二者而巳然所委之人惟能刻剥害民阿附近要肆為欺蔽竊據寵權又烏知事之所以辦民之所以安乎虐政所加無所控告先皇帝在潛固知此弊及其繼統不惟不見黜逐且遽復大權而委用之於此見欺而所命之㫖皆屬不可不必更於其中有可不可之辯也賈誼告文帝削地制敵文帝雖喜賈誼之言猶謙讓以為未遑然終能舉行其説者審而後發發無不中也中州名賢文表巻一
