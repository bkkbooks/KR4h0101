body:
  text: 中州名賢文表卷二十六明劉昌編王文定公碑志大元故懷遠大將軍萬戶唐公死事碑銘天下有酗戰之士拳勇絶人捐軀徇國雖一時之短其義烈言言超千人而挺生奮百世而獨存者非乎南陽唐公其人也公諱琮世居內鄉縣浙川之白亭伯祖諱臯金季以鄉豪署峽口鎮將父諱慶仕亡宋用邉功起身自保義郎京西副將纍遷至左領軍上將軍諸軍統制歸附皇元後終江淮軍民安撫使惟襄鄧自昔為用武地唐氏世鍾材武繼領韜鈐剛毅奮發馳聲疆場稱山南名將家公軀幹魁傑而善於騎射黝色鷹視氣吐鍾鈜然擐甲橫槊出入行陳間人愕而聳之至元十三年襲父爵授武略將軍管軍總把明年丁丑轉武德復安撫使仍佩金符十六年以勞績進階宣武授金虎符管軍總管十八年升懷遠大將軍萬夫長二十年改授唐州軍府萬户二十五年移鎮泉道屯駐舂陵時安南保蕞爾域負固不服聖上赫怒詔諸道兵以討之公到鎮甫二旬而檄至即閲數軍實申嚴節制明日大宴郡僚叙别或以期遠緩發為言公曰不可征討國家重事忠勤臣子大節况吾家三世迭將逮不肖之身分符顓閫備具爪牙恩寵深厚思畢力邊陲以暢天子威命則死之日猶生之年也尚敢以顧忌為計哉詰旦啓行旗斾精明鼓角清亮識者壯之遂㑹諸將屯靖海境溪嶺湍險艱於馳逐北兵不習地理與鱗介爭利於舟楫叢薄間已非所長加以瘴癘流毒海飈騰炎吏士觸冒疾疫者過半躬自撫視左饘右劑恩義備至若父兄之於子弟致人人感激思奮島夷幸我師不利乘便突出逞獰肆凶次年己丑三月大戰於鹽場之三江口公率衆先入所嚮披靡賊兵衆開而復合者數四致麾下散失公力戰手剚數十人以殁得年四十有九訃聞部曲至刲股肉致祭朝廷為嗟惜之公天資雄峻沉鷙有將略號令精明拊循有素期於恩威兼濟當戰陳際奮勇愾敵不自顧藉有古烈士風概故所向克捷自筮仕不十年正位帥閫平居與人交氣怡辭溫謙恭惟謹未嘗以色待物人視之儒素也其死生義利胸中權衡素定决非奮不慮死徼取美名者嗚呼忠義天下之大間志士仁人終始一致雖頽嵩岱不吾壓也豈以暫不幸而墮吾名節哉王者推而褒之所以砥礪多士窒不軌也故周崇死政漢寵死事然皆有等級次序俱未若皇元即以父祖之爵祿畀其子孫有崇無降其報恤激勸之典視前代為重公可謂得死所矣夫人李氏亦內鄉大家資度純懿克嫓公德孝以奉舅姑慈以鞠幼稚生三子一女孟曰世忠仲曰世英季曰和尚孫二長靈童次保保世忠子也世忠嗣承世爵往奠舊服追忠思孝罔替箕裘奉公衣冠葬襄陽穀城縣鳳溪鄉丙山先塋之次起祠墓前歲時享獻庸展哀慰復念非假辭紀績曷以垂鴻無窮儻得書太史氏則先業為不朽矣遂介祕書監丞申敬載拜來請豫以忠君孝親係風化所在有不獲辭輒論列而係之以銘其辭曰武當西來萬馬驤漢水東注為滄浪鳳溪之里穀伯邦盤盤沃野開荆襄丙山衣冠唐所藏維茲唐侯百夫防佩服義烈南方強三世崛起參戎行幢牙茸纛金節煌王常鐡石我所將維南有交伐用張一軍來戍心靡遑萬甲夜卷趨敵場桓桓不憚天戈攘誓此一去批其亢舂陵宴訣何琅琅回溪失勢臣分當鮫鱷肆毒紛蜂螳氣憑銅柱鷹孤揚海霧翻瘴霾三江奄奄戰鼓聲則鏜一僨不救千夫僵蛟匣零亂劒有光臣維有霣甘自戕一日之短百世長恨以鱗介易我裳義存身亡臣節昌勝負况復兵家常恤典昭報恩澤􅗈嗣侯孝思示不忘葬而從祖饗有堂巫陽下招為悲傷羈棲胡為滯此荒魂兮歸來安故鄉牲牷肥腯羅酒漿部曲儼侍備兩廂鼖鼓鐃鐸聲鏗鏘子孫歲時供蒸嘗銀鈎翠琰勒我章忠傳孝繼渢大泱陵遷谷變事叵量英聲載世永不亡大元故大名路宣差李公神道碑銘并序大元以神武戡定區夏長䇿遠馭控制撫御之方甚悉故治無大小例建官臨護猶古監郡然而權威視前代為有加維魏府盤城千里為户幾十萬其襟帶之雄節鎮之重自昔號建國至署監總者必勳閥世胄練達時體通習漢事忠貞而有材望者膺選在桓撥甫夷之後官府草創之初布宣皇靈統攝羣屬具民瞻而勝保釐之任者鈐部李公其人也公諱益立山其先係沙陀貴種唐亡子孫散落陜隴間逺祖曰仲者與其伯避地遁五臺山谷復以世故徙酒泉郡之沙州遂為湖西人顯祖府君歷夏國中省官兼判樞密院事皇考府君用級爵受肅州鈐部其後因以官稱為號喪亂譜亡遂逸名諱公昆弟四人獨公少負氣節通儒釋洞曉音律以廕儤直宫省積勞調沙州鈐部建國朝運開乾維時公兄由肅州長奉使於我太祖聖武皇帝異其材辨因與館接使察罕深相結納情好既密約輸欵內附天兵圖肅以射書事覺遇害及丙戌冬師次燉煌公審天命之攸歸憤兄忠之不果遂拔部曲詣軍門迎降太祖以公首效忠赤特加褒命𨽻國王穆達哩帳下從征羌落每戰敵王所愾故所向克捷有功丁亥夏師還乘破竹勢命圉將呼圖克特穆爾偕公招諭沙州守臣率衆僞降伏發擊走之呼圖克馬踣追兵垂及公下所乘授之得逸去乃麾左右􅊇戰却敵而還王壯其勇召使前勞焉曰當危急際委已以濟人汝命固不靳邪對曰彼國之勳舊倘墮姦計有辱君命以新附顯被驅䇿效節死事乃所甘心太祖聞而嘉之仍諭曰卿勉宣忠力㑹當以好爵縻汝明年戊子春從攻沙破之帝怒不時下欲屠其城泣請曰彼逆命者渠魁一二人民何與焉若悉坑之恐堅未降者心且臣賤屬咸在願賜全宥帝録其功忠許焉闔城賴以生既而命貮伊瑪齊行其部斷事官公不鄙夷其俗故裁遣終日無倦色人服其詳明焉庚寅秋有詔檄諸部精兵忠朂之士西征阿蘇部署公選鋒率轉鬭而前斬艾不勝計進圍城聚踰月不即克公一夕伺守陴者怠帥猛士潛登其墉殺十餘卒即大呼臼城已陷矣諸軍進隨阿蘇乃潰䇿功居第一擢千夫長自是勳名焜耀朝廷有意大用矣歲甲辰詔選勳能佐行臺於燕上以公克諧往焉時節制所及二十餘道機務填委日復一日公輔相聼斷動合事宜政多便於時者辛亥春朝廷稔公綜練國事復有顓面西土之寄以年髙辭不拜憲宗皇帝奬其舊臣處內地便之命錫金虎符充大名路都達嚕噶齊復賚白金御驃以寵其行魏自兵後官府甫建羣豪諸司錯迭長雄不相下致政令不行事多齟齬公知其然無巨細一以重典從事初則遌然既乃弭耳聼約束惟謹大綱既振於是舉廉能拉姦暴扶良善惠瘝寡凡政之不便民所欲而未得者率立行而更張之至於外而營幕連野內則使者旁午咸畏公方剛莫敢侵分少有牟於民一日釋萊廟學顧禮殿黯圯公喟然歎曰澤宫風化所繫今若爾何以興善心於民乎即完治一新其亭傳長府皆以次修舉衡漳歲霖潦泛溢為民害甚侈公請於朝跨河楗堤仍植槐栁萬本苞固峻址捍禦崩嚙且充歲時材㸑之用迄今公私賴焉相有劇賊張黨結百餘輩在所為梗官不能鈐潛入境行劫公廉知窮其根株窟穴撓捕無遺自是相魏之郊民安田里暮夜絶桴鳴之警矣已未春今皇帝南伐駐驆濮苑起公從征既而知公恙命尚醫診視眷顧殊渥其年秋七月竟以疾薨於位春秋六十有九公資嚴明不妄言笑清峭有機警以忠順上結主知致出參大政名聲揚於時利澤施於世平居循循為善若不足惟恐一物之傷及束濕吏曹紏繩姦謬不絲髮少貸虎符麟節長魏師者九年號令明肅豪右屛息四境樂業鄰藩悚其威望初公行春近郊見盛挾果芳者公責之曰此天地秀實以養人多折何為乃撲教而去自是方苞體之物莫敢有暴殄者其始焉以重典立威終之以惠愛及物類如此至元戊寅葬公於大名縣臺頭里之新阡從卜食也夫人田氏白氏祔焉三子長曰愛魯克襲公世爵至元四年遷金齒等國安撫使尋升授雲南道宣慰使兼都元帥今進拜中奉大夫參知政事行雲南等路中書省次羅和終大名路行軍萬户次小鈐部代兄民職孫三人長嘉琿孝友英發樂問學有藴藉至臨政精核矯矯有祖風今階正議大夫佩金虎符充大名路總管府達嚕噶齊兼新附軍萬户曰特穆爾敦武校尉固鎮鐡官提舉曰萬努簉中朝侍從官嘗聞活千人者後乃有封公沙州之請何啻千人哉今子孫繩繩承世爵而繼祿次豈非隂積致然耶既襄事之三年嗣侯嘉琿百拜以墓碑來請曰我祖捐館以來將二紀於茲曽是表峙神道無顯刻以昭裔昧朝夕惴惴有不遑息者幸憲使惠顧以畢厥志庶圖報遹追之心有以昭告存殁大獲慰焉惲謝不敏禱愈懇以教孝求忠之義固不得辭謹按所具善狀叙而銘之其辭曰乾龍奮飛天北方潛蛟乘時亦雲驤李公材武邦之良拔身嚮明佐興王西傾崑崙掃河湟有來羣后何瀼瀼公從鈐校參戎行卒能建功出非常天威西收陳堂堂凱歌歸來百戰場龍泉精英百鍊剛試之剸繁尤允當行臺駐燕總皇綱上計委積如陵岡劍伏雄毅歸贊襄於惟致君變時康我聼我理多救匡一日聞望馳四方酬功便老國有章付之方嶽又汝長魏昔建國千里疆德星出昴光煌煌憬彼羣屬勢軒昻正名定分我所遑拊摩瘡罷抑豪強百廢具舉用乃張若傳有亭積有倉里不桴警孰竊攘大賁禮殿開兩庠春風絃歌齊魯鄉漬民於淵吾憫傷躬督萬夫舉隄防濁流不揚耕且桑功餘保障歲屢穰始焉立威肅秋霜終以惠鮮熙春陽民祝公夀福此邦曽不少留我涕滂公雖遽往有不亡隂積陽報理乃彰子孫嗣封奕葉昌髙牙大纛宜彯揚河流洋洋少麓蒼是為元臣衣冠藏惟德在民久愈光嗚呼此碑古甘棠大元故鄭州宣課長官盧公神道碑銘并序至元己丑冬豫提憲福唐識前政太中盧君沉厚謙抑蓋卓卓有為者及聞諸僚友間君自平江浙以來治軍撫民俱有成效惜去之遽不暇欵接也後六年豫方紬書石室來謁曰天祥負釁深重嚮任回甫拜先壠不幸考妣相繼奄逝今祥禫已終惟是告神明傳永久者不內翰是託其疇依幸惠顧無讓既而持善狀以墓碑來請乃勉為論撰之公諱元姓盧氏世為許之臨穎縣里仁鄉人曽祖祖世代邈名諱俱逸樂耕稼以善行庇一方父諱某金季以勞主襄城簿有聲妣李氏姿明慧知經史公垂髫教之讀書每以言動不妄為誡及長存誠尚義挺然有守不為流俗所移歲壬辰公避地鄭之管城及汴梁下民環鄭而來者日以千數公知衆心去留未定即㑹而喻之曰鄭土號稱沃壤菜荒歲久畝可數種今棄而不耕狃遷避為安其安果何在哉吾欲捐私廪助種食與汝曹並耕而食一旦有成不猶愈糊其口於四方君等其有意乎衆感而唯命由是遠近孺慕歸依者衆生聚煙火漸復平日之舊迄今鄭人尸而祝之庚子辛丑間朝廷聞公信義多之乃曰智效一官用未可量也遂舉充鄭六縣課稅長官數年間事辦而民安不知有壟斷也其寬和如此既而歎曰放利而行不容無怨况非素志遂投牒而去優游田間處身事外有教子讀書立門户盡地利厚蓋藏而已歲時伏臘擊鮮具釀與親戚父老寧止燕衎樂於胥也先是治第郡城中然未嘗久處杖履所安多在里仁别業辛卯冬一夕與鄰里辭訣曰相親久幸各自重遂命駕入城衆訝其遽如許也已而果微恙召諸子若孫告之曰昔吾翁媪兵燼餘營理生産五十年間勤苦備嘗方致茍完今夀踰八秩嗣子致位通顯吾何修而然是皆祖禰積德勤力所致第官無高庳廉慎能安家無肥瘠勤儉可保吾平生行已汝曹猶及見之諸孫溫飫不知囏難所自讀書力田慎勿偏廢如是則盧氏其未央也言終而逝饗年八十有二夫人薛氏祇嚴貞順母道有光夫婦相處五紀公之意不毫髮少失後一閏無疾而終四子長天祥太中大夫福建閩海道提刑按察使次天驎未仕天祐忠翊校尉行軍總把戰占城殁皆薛出天瑞晉江縣尹前公卒一女適曹氏子孫七人從善從禮從順從道從正從德從謙從禮襲父天祐職忠顯校尉行軍千户餘皆幼孫女九人四適士族餘在室曽孫一人曰允孫曽女孫一人尚幼某年月日天祥等奉公柩葬大陵先塋某穴夫人薛氏祔焉公為人魁梧重然諾寡言笑言則為衆信服處身治家不侈不陋理恆業課僮僕各得其宜故能上下戮力農事修整子孫朝夕問謁肅若官府雖搶攘際姻親鄉曲賴其依藉與平時無異初江左平公南遊襄漢遇俘者疾病顛頓道涂間憫焉遂罄行橐中物贖而良之者甚衆至於行髙恩積在人又似夫漢樊重之行事也是可銘銘曰天禀中厚百焉可為事以誠應其將孰違暨暨盧氏家頴之涯三世在野篤為農師顧此大本我控我持逮乎府君一誠是思積而能散識符事幾大梁既下流氓四馳環鄭而來莫知所依一語還定衆安若歸畇畇鄭圃淡淡沖陂煙火相望雞犬喧籬繄鄭有存曰僑曰皮尸而祝之非公其誰豈惟義豪善人幾希逹而拜官非吾所期解紱南轅幅巾杖藜秩我東作西成可知崇彼禮節張吾四維嗚歌有子幼之樂營産盡吾樊之規流惠閭里賑乏宗支人以為君子富於此見智人所推取諸理化政將同施婆娑故里夀髙期頤子孫簪紱何若若兮纍纍臨終朗朗二者勿遺蓋耕稼乃種德之本教子隆起家之基古人取必於身後公獨饗福於平時狼陂奫淪大陵崔嵬異時瞻豐碑於木杪其有感於斯者知無愧辭噫大元故奉訓大夫尚書禮部郎中致仕丁公墓碑銘并序金制大定間限以三品至五品職事官承廕子孫內班供奉或省署儤直者同吏員許試六曹令史中其選驗班秩崇庳而收補焉謂之班祗出身於以抑任子茍進之風且勵多士特達者之志在當時號稱入流美科如吾奉訓丁公卓然以材術拔出倫類表見一時可謂篤志君子其敢以門資待之乎公諱居實字仲華高祖孝溫仕金朝官金紫光祿大夫臨海軍節度使遂世家錦州曽祖興宣武將軍終興化簿大父從吉明威將軍宜陽令考鐘太康稅使纍官至宣武將軍公少孤稍長力學不倦每以藉廕入雜流為慊遂去習城旦書用明威資中正大四年部掾甲首例補尚書吏部令史南播後封壤蹙貟多闕鮮中外官守代攙滯公詳酌格例若不顓泥而銓調以方至事行而人服其當因建言曲阜令孔氏世繼終其身有不便者請優以兩考調他任擢族中賢者嗣秩乃爾則聖人之後材能輩出不致沉鬱朝議從之未幾擢權尚書省令史明惠太后崩暨國信出使皆以材選從事爼豆縉紳間稱其敏達積前後勞官昭信校尉勳雲騎尉金亡流寓天德黑水間國朝方事江淮總廪餉於衛漕長宗侯亨奏公充軍儲經歷官收德望也公籌㑹漕計雖內輸外饋應期取辦顓以抒民力為心俾人忘飛挽之勞士有足食之樂公力為居多逮中統建元開府史公宣撫河外方圗任舊人以副閫寄故首薦公咨議幕府事公竭誠殫慮思盡心所行簿書外典憲獄情尤所明慎初許民得千户印章於􅡡間以窶甚冒稱偏禆獲戾投欵而南以徼賞格既而潛來事露有司抵之極刑公曰不可原其情非逆不過以譎圗賄爾竟從減死論故制辭有處心純正用事詳明熟識國典之諭其為朝野推重如此四年復應左丞庫公辟署大名宣慰司幕官適青齊用兵調度星火急公晝夜措畫責分而事辦有宿盜扺法上官主以劓刑决之公力辨曰時方關動肉刑久廢行之恐衆情疑駭且復纍公遂處以常法一邊將以罪叛獲奴從欲殺之公請讞於朝左轄公曰從逆者坐死尚何疑公曰彼固有罪為士師則可以僇之况奴為主脅寧知得已乎上之囚果縱釋後來謝公拒絶不見曰嚮非汝私論國典也其清眘强幹至為子清公賞識且以大用許之五年朝廷大明黜陟調中外官銓法曠久後生晚進有愕然手不易措者以掌故起公遂授吏部貟外郎所謂吏勳總格貼簿之類指授大略然後以今酌古裁為新格粲如也庳秩崇資升降注擬多適其宜以能升奉訓大夫尚書禮部郎中尋以年老請老諸相謂公齒力健未宜失此老成人請益堅得告沾沾而喜曰自今方為一事了人也其含章有終為可見矣時致仕例未行俗且以奔競患失為風聞公勇退若爾識者莫不歎羡翰林諸公至餞以歌詩美之公氣貌魁偉資頴悟廉直精敏過人挺身正路動以撿押自律與人交雖小信不忒及談典故論法家令人聼之娓娓忘倦故至元已來刪定儀制公每預其庭議焉嘗有以瓜果為獻者謝去之曰此固微物第生平未省一介妄取諸人其自克治多類此疇謂阿私可得而浼耶中年後敕斷家事毋復關白以書史自娛喜讀司馬公通鑑日手書為課曰一録則勝數過矣五載間寒暑不輟遂成全帙故晚節識益明志益篤然於世猶有未忘者十三年夏余考試在汴尚憶公危坐一榻吐論猶健間及世道理有所臲􅑶慨然義形於色因泣下沾襟余訝其遽如許也明年秋八月遘疾卒於家春秋七十有五夫人趙氏金太中大夫太常卿文簡公之女孫泗州防判經之女正內主饋壼儀有煒生四子皆讀書公資之殊力長曰誠克家不仕曰詢有文學淇州教官曰訓通吏事任江州某職曰諒能以孝移理於官而義襟靄如嘗為河南宣慰司提領按牘官又不負公之所鍾愛云孫男女如干公殁後八年子詢諒來謁余跽而請曰維憲使與先君世契厚從游且久知行已為最詳今墓石未銘敢百拜屬筆庶假寵後人以垂不泯幸先生毋讓以弟其善狀而表之以銘銘曰士志𢎞毅奚間隆汚譬彼玉瑩丹青不渝顯允丁公志𢎞氣愈脫落門閥奮飛亨衢貞我憲度勵夫廉隅擢居省署以才以譽契囊佩玉氣貌舒徐表見一時聲光兩都開物成務綽然有餘其出其處與時盈虛解紱歸來詩書自娛人曰吏師我曰通儒淺之為失昧於卷舒公卿之門形勢之涂老不知已伺候奔趨衆視為常曽何異於我獨翩翩勇退自如以此較彼孰賢孰愚豈惟知止而近不殆古所謂賢哉二大夫者公其庶乎我銘表德過者嗟吁大元故中奉大夫浙東道宣慰使陳公神道碑銘并序士有奮身韋布作時藎臣志足以有為材足以應變氣足以充守學足以明義毅然以致君澤民為已任雖罔獲克畢厥志不幸而罹患難猶能挺樹名節勵渾俗於當年激清風於來代古難其人今於宣慰陳公見之矣公諱祐字慶甫世家趙之寧晉為人固窮尚志好讀書恥陸渾泥塗間癸丑歲以藝能應穆王府辟一見而列侍從官公勤勞所事進盡忠言王嘉其大有禆益遂賜號尚書俾顯異於衆及分土陜雒其監與守承制封拜以公充本道軍民總管且洛邑關河衝㑹政荒民耗困於兵賦轉輸不大更張之將無以為治即啓其利病之要者得二十四事率如請又奏免征西屯田軍士數百家歲負糧料及椒竹等課甚衆自是殿夷屎息日就安集之樂八年間規為保障率以身為律度至今人賴其惠至元二年調官制行授奉政大夫南京路治中徐宿大蝗移公督捕役農民數萬度其勢猝不能殱秋稼垂成即散遣收穫自救不然秉遺無餘或以不可諌曰救菑獲罪乃所甘心朝廷以從權韙之尋授嘉議大夫衛輝路總管其治比洛愈精勵有方正官紀革吏習杜私交審聼斷務以至誠感發期於實惠及民每庸調之下必經畫寬便使民有餘力部內屯戍習豪橫眂民司蔑如莫敢誰何公因事致詰落其機牙衆譁噪擁其長以來意在棖觸公坐㕔事上折之以理厲聲色略不相假貸為氣褫而退自是闔境肅然奉教條惟謹復比干祀大起孔子廟暇則集諸生肄經史以敦教本至風化大行吏民稱美刻石以頌之時憲臺初立首以材擢授山東東西道提刑按察使公喜其責與志合踔厲英發擊豪右擲姦伏逆見隨决所至以神明稱貪墨者往往投劾而去褰帷具瞻有風動百城之目平時底藴雖略張設而惓惓朝廷之心不食寢忘嘗以三本陳事忠嘉剴切反覆論列至纍數千言大率太子國本建立之際宜早中書政本責成之任宜顓人材治本選舉之方宜審又羣小流言干撓庶政恐習以成風私門萬啓於下公道孤立於上臣知承平吉祥之言必不出於若輩之口事雖不報士論偉焉時機務多出尚書權臣意欲獨顓柄用乃以併中書設三公為言事下大臣敕公預其議有說公宜審所向可致大用公不顧乃直言可否曰中書政本所係併尚書為一省便右丞相安圖位尊望重宜端揆如故三公虛位不須設置衆因以聞事遂寢斯皆國家大計人所持難公慨然吐論曽不少顧自是忠直之名聞於蓋代然不說者衆矣俄遣簽書中興行省事十三年改授南京路總管兼開封府尹屬吏憚公方嚴有不安者仍諭之曰汝昔為顔今跖吾以法繩之昔為跖今顔吾以禮遇之善惡自取吾何心其間衆恱弭耳趨事許蔡郊有劇盜號賊李三黨結甚衆朝夕囂嘯公然剽劫凶焰動兩河間及公來逸去以計捕獲即檛殺之萬口稱快明年春進拜中奉大夫浙東道宣慰使時江左初下人情臲􅑶例賂遺相尚公表以廉正濟以恩威遠懷邇又浙人忘亡其不貪毋擾之戒兹有驗矣福建平大軍俘溫台新附萬餘人而西公力為申援還民伍者什七八越校廪繼米幾萬斛掩為兵食驗籍復於舊行省下令算啇酤頗亟公建言兵後瘡痍未復宜停征以示優恤遂檄公覆明台營田歸頓新昌值玉山冦出剽報至衆謂可去曰吾守土臣義不當避去之民曷依俄凶黨突入衆寡不敵遂遇害實至元丁丑歲九月十七也得年五十有六靈輀抵越人士素服哭祭皆失聲願留葬起祠以奉嗚呼非守義不回推忠及物安能感人心如是子䕫請兵討復得首惡七人僇越州市次子臯扶其喪歸殯洛陽縣之北邙原公剛明廉介博學有經濟材信道篤立志堅從政果於應變為尤長氣之所充雖百折不撓故處大事臨大節審量合義挺然力行要欲表表有所見於世而勢利可得奪耶其愛君憂國之忠出天性固然與人交有終始不可干以私官二千石三十年自奉猶寒士不知富貴為何物可謂甘貧苦節不愧神明者也以用罔能盡死非其所訃聞識與不識舉為愴惜之生平喜作詩辭必已出能道所欲言節齊其别號云曽祖懷妣范氏祖宗妣張氏世在野父諱子安性慈祥美丰儀易農而醫壬辰際以其術多所全活陳氏之興豈其是邪用公貴封資德大夫妣張氏順德夫人賜錦衣各一襲公夫人翟氏以貞靜能安公貧子三人長曰夔武略將軍佩金虎符充某路行軍總管次曰臯讀書克家矯矯偕有父風次庶未名女三俱適士族孫八男女各四人卒事之明年孤子䕫等喪服纍然百拜涕泗以墓碑為請因念公與不肖交素厚死生之際三入豫夢皆有明徴豈非精爽交感動於彼而應於此然耶雖既挽而復誄其戚於豫心者固有所未盡今屬筆來圖不朽以義以分其敢以不敏辭謹按毋弟知府天祥善狀勉為論次之銘曰維天降材畀我共治其道伊何曰忠與義安而行之匪功匪利致君堯虞否乃豫愧不曰藎臣其將孰謂堂堂陳公元精貫中貞亮之義謇諤之忠以剛而順以介而通養我浩氣塞乎昊穹一朝遭際奮從雲龍即事進諫礪夫深衷列二千石敏焉赴功以德以讓凛兩漢風擢登使車攬轡而東三年齊魯一鶚橫空治安陳善衮職是縫明我國本如棟之隆充庭預議孰知雷同屹然有立砥柱河衝望公廟朝帝載奮庸持節江海卒與禍逢命也何言其來則豐哀哀嗣侯子職大供臨江一慟揃夷姦凶憤雪九泉與沒其躬癭陶之墟洨川溶溶顧瞻佳城祖禰是從魂兮歸來安此新宫忠傳孝繼有泱其渢是維慶父之表過者敬恭大元故中順大夫徽州路總管兼管內勸農事王公神道碑銘并序上登極之二載詔以前泉州路總管中順王公作尹於徽制下而公已卒士論慨歎惜其備具文武才未究於用也明年春正月嗣子謙持太史屬王德淵所撰善狀百拜來請銘自惟識公始用情交終以義合至死庚寅歲邂逅於歐閩後二年豫入翰林公亦終更來燕玉堂多暇日夕從游詡詡相得校夫三十年間㑹晤雖數在京師為最洽公今已矣銘其墓宜莫豫若公諱道字之問姓王氏其先為京兆終南縣人世將家公姿魁偉勇而多力幼讀儒書長喜武事飛箋走檄尤翩翩也公既負器局挾藝能不肯碌碌居人後間出大言捭闔時事及作為歌詩藻思甚壯激昻頓挫以驚動一世謂將相無種功名可戾契致也然干時貴近終無所合至元更化以剔民蠧清吏弊為亟公曰兹吾之時也乃走燕上書請置執法官如是則吏畏政肅澤被於下政化可得而成六年憲臺肇建遂辟充掾史公志在澄清一旦抱牘齷齪鳬進論得失於簿領間恥於屑為才數月即拂衣而去適朝家遴選文學士充東宫講書官用昭文竇公薦得入侍經筵進讀際辭理敷暢間以時務意在互有發明由是稔知為奇士進見顧盼與餘人異欲大用而有需也十三年江左平福建內附蠻夷悍輕易怨以變蛇豕婪婪血人于牙何所靳顧非大行臺鎮之不足制內而撫外也故郎署官重其人方裕宗皇帝參聼朝政乃選公充福建行省左右司郎中時柄用者專尚威猛不能導揚恩信慰安遠人凡事之悖理政之害民及私意之所宿者公皆執而不行至面折力諍必理得事正而後已如宦族趙知府元輩六十三家閒居室潤誣與山賊通擬挺殺之意在籍沒掩利餘資公抗言宋故官纍詔恩恤今以昧曖一概孥戮有傷朝廷好生之德止杖八人餘悉縱遣降將弔眼陳據漳州叛賊勢張甚招討潘力不支踰城走泉行省以失守罪縛出將戮焉公曰招討秩三品有罪當禀於朝不可擅殺上官怒遣督將二人率甲士擐公曰字不同署罪當相及公乃具朝服望闕再拜曰省官不有朝廷脅我以兵欲將何為吾寧與潘同死字不可得也彼莫能屈潘竟減死論其守正不屈類如此由是強橫氣褫善良攸賴閭閻間至畫公像事之二十四年授中順大夫泉州路總管兼府尹泉據南海津㑹豪儈吏商假權貴聲勢日凌轢請索紊大府紀綱牟取衆利公折以理拒以威輒落其機牙束手噤語而去公堂為肅然先時晉江之安溪土賊張大老方德龍嘯聚畬洞無賴二萬餘人時出搶掠為一方大患者幾三十年聞公至私相約束曰王老子來當謹避之勿輕出公為布耳目設方略不踰月生擒賊酋二十三人悉榜殺泉市餘衆駴散百姓為之歌曰藥不瞑眩而疾祛非良醫而誰乎兵不血刃而賊除非智士而誰乎其為輿情感恱可知矣在任凡四載代歸鄉里以營治先塋樹植碑表為務屢供具召親友燕衎為樂若日不足者家人亦訝其遽如許也元貞二年春二月十有二日以疾終私居正寢享年七十葬維州北海縣樂泉里金山原公強矯有守臨事敢言膽氣噴薄無所回撓志在開布公誠砥礪名節表表有見於世孰謂勢利可得而奪邪至於擲姦發伏不避持難又似夫漢王尊之在東郡虞詡之治朝歌也奮身布衣起家至二千石剛直之氣至老不衰其功業止斯而已此士論所痛惜也逺祖金初以武功賜完顔氏世襲千户官至金吾衛上將軍曽祖諱虞卿大父諱從正歷隰州太守父諱成皆嗣承世爵金亡復故姓仕國朝任樂安縣令因家焉今為廣固人公先娶孫氏生子謙夫人年八十二卒繼室羅氏亦先公卒生二子曰諒曰惠謙幼侍東宫才敏有時譽能政克家蔚有父風今官奉訓大夫大司農少卿男孫四人謙之子三曰元孫仲孫季孫諒之子一曰彥孫公平生著述號雲門老人集殆千餘篇傳於家銘曰繄王使君起海堧妙齡飛英振孤騫陳琳書檄何翩翩一箭擬下聊城堅心惟嫉惡民瘼蠲驅逐鳥雀同鷹鸇一行作吏非所便騫帷有志澄八埏封書直上沃帝淵太微執法光炯然春宫嚮學開經筵一日登封席為前顧公可試宜擢遷利器當遇蟠根宣歐閩行臺兩廣連陽舒隂慘持化權幕非其人奚望旃六十三家宋故官執之犴死何繁寃公為辨析皆平反潘惟不支心則丹以死信理人所難維閩之南大府前畀公撫循面則顓鋤剃強梗安惸鰥風帆踔海魚龍翻萬貨山積來諸番晉江控扼實要關勢取豪索非一端不動聲氣為周旋安溪有盜勢結盤撞搪呼號動百千公然剽竊三十年為一郡患何迍邅公來約束毋妄干老熊當道百獸跧一旦解刀耕壠間溪山淡淡風日閒帥得其人人自安如君兩除稱衡銓幕府坐嘯鳴化絃簡節疏目政猛寬四載終更公孰賢王尊虞詡相後先千年神劒埋山原鬱鬱夜氣生紫煙何以驗之石有鐫金故朝請大夫泌陽縣令趙公神道碑銘金自南渡後封壤日蹙軍國調度百色所須悉取辦民間然迄於亡而不知困其良法善經維持而有力者多農司辟令是歸若乃䇿名俊造列官令宰終其職而不負所舉者趙公其一也公諱鵬字搏霄蒲之河東人幼習舉業弱冠有聲場屋間擢貞祐三年詞賦進士第父元善聲韻算學世以農致富及公第諸負債者悉折劵以貰曰吾所得已多尚何貪為其知止如此公釋褐主苪城薄秩滿令闕縣請留公行臺廉其能俾攝縣務既而調同州澄城令民安公教政方著左曹請赴入補尚書省掾未幾用薦者辟授泌陽縣令泌邊邑也户繁俗剽薄多不地著號稱難理公下車設教條督游墮行視田里相民利病而興除之見其土腴而桑鮮及知玉池沱坡等陂民嘗資以蒔稻歲穫千萬鍾年深堤堰圯漏貪取恣引強者有餘弱者不足田有涸而生埃者致相訟竟歲公審其若是令曰水為利殊博旱乾有藉焉正患潤餘而用不均又曰設使菽粟如流寒無袴襦將奚以卒歲乃揵圯苴漏瀦漶散理溝洫復作斗門提閼十數處量田疇為可溉約束又置鼓畜犬於田畔以警其姦竊自是紛爭息民無所私及課植桑歲至三十萬株縣以之致富焉公曰既殷而教聖人之大經於是謹庠序表善惡以敦其禮讓有射生張青者闖跨兩徼頗橫恣不法民嫉之公廉知攝至庭嚴加教戒就給田牛易籍農伍許以自新曰今而後姦枿少萌吾將不汝貸青悔愧自斂迄終更不復為非其興利易俗先教後罰殆召父之治南陽也農司核實以其績上聞至有州縣得人之諭尋遷豐衍庫司京城變人饑至相啖同僚欲私帑物以易斗食公曰我主吏死則吾分可竊君藏以偷生耶其人慚而止北渡後流寓淇南貧無為資時當路有知公之賢欲以一縣相屈者公聞之曰余方以儉素自守其可榮以仕乎竟不應遂教諸生為業識者多之以甲寅歲夏六月二十九日觀漲西城歸憩坐礎言笑而逝春秋七十有三積官至朝請大夫至元戊寅歲改葬公郡城東郭顯應祠南百許步郡君邢氏祔焉公凡五娶楊氏生子庭嘗為郡學官女某適同年何氏子郭氏生女華仙適齊氏次雷氏令狐氏再娶閿鄉邢氏生四子一女男曰康曰廣廣傳家學嘗任管庫以廉能稱曰應曰廉讀書通醫術女舜英適陳嘉謀孫七人良弼遂良濟民從龍顯祖時敏克謙先生資雅厚長身白晢與人接未嘗出一妄言衣冠顔貌望之知為一醇儒也所交皆一時才傑如石御史子堅李右司欽叔暨其弟欽用欽若楊都運煥然王華隂元禮何學博與之嘗觀河華風土秀潤雄碩不隨時高下先生挺生其間清明之所萃鍾英彥之所霑浹宜其角逐文場而擢名進士揚歷中外而稱材大夫所居民富所去見思廪廪然有德讓君子之風詞賦為平生顓門之學其經指授者皆有所成就惲年方志學受業門下今老矣凡兩入翰林三二憲府粗有所聞於時先生之教有力焉子廣來請銘曰是惲之責也其敢以不敏辭銘曰於休先生德讓君子力擢巍科聲馳膴仕二宰劇縣政平訟理敬謹廉勤富開田里化先罰後安行樂止異績殊聞驚目駭耳人非不能未免有已鄒論為邦厥有深㫖樹畜耕耘王道伊始史傳漢循龔黃信臣奮髯抵几莫之與倫諒公平生有得於此至今遺黎歌詠餘美天步改玉士或易節布衣歸來教授為業斗食茍生寧飢不屑銘無愧辭劖此麟碣是為亡社大夫之墓其光有曄故正議大夫前御史中丞王公墓志銘至元二十六年二月丙辰辰刻正議大夫御史中丞橫海王君以疾卒於私第正寢斂有七日其子庸彛輩縗服纍然持事狀百拜以壙銘來懇以義以分有不得辭者公諱復字子初初名趾麟伯其字曽祖瑜大父松世家滄州俱隱德不仕禰府君諱昌齡金季嘗遊宦河南大梁亡起從恆山史侯參議軍府事後以公命來攝衛州事有惠化於民惟君器識早為經略公所知已未冬自齊經中起君襲父職仍領州務明年中統建元真授衛輝二州同知又明年由州而路就升二總尹君遵守成憲越先正有光至元甲子轉官制行授朝請大夫改倅彰德路無幾以德望入為中書兩司郎中調議密勿宰相至以佳士上聞魏河朔巨鎮吏重而俗囂號難理特輟君以少尹來治乃曰清心不如省事省事莫若先殺吏權於是汰冗濫屏姦惡絶私謁尚德化民有李氏者珥筆構黨持短長嚇官府張甚君發其姦杖踣之萬喙稱快自是闔郡嚮風書葉翻香曹務為清簡八年辛未春自中書舍人出知歸德府府居河下流其秋水大至環城為海衆胥沉為戚君乃督櫂師浮舟楫濟民於丘陵林木上遂相水衝循橫堤疏二渠一注汳瀆一達河故道水隨退得腴田萬頃佃貧民仍請廪粟得萬五千石活饑殍者既而復揵治回龍堤葛邑口於府西以絶永患曰烏可使吾民重漬於泉故水去而民益親繼丁母夫人憂去職未期詔起君充河南道宣慰副使國家方有事襄漢順流以成破竹之勢故軍需百色羽書交督急於星火一責於我中間籌辦君力為不少時大軍復東掀五河戰力而餽乏河走凌蔽川不易轉致衆艱於行君毅然以漕事自任至撞冰東下一夕凍歘解軍威藉以振衆且服君事不辭難而害不茍避有如此者明年超擢陜西四川道提刑按察使尋進拜嘉議大夫行臺御史中丞用膺才選既署事有告蘇州應草竊以城叛者或議調急兵徑討公曰維揚去吳才三百里不當猝有此變恐憸人流言激之閧乘間以利賄耳與省議合遂駐兵近郊偵其實繼發未晚已而果如料吳人得無虞而妥其臨大事處置明審例如此淮甸沃壤千里公於上前論奏宜設農司募游食者開耕屯以盡遺利若爾非惟實內地且威剔遐陬坐銷外侮韙其議付有司施行俄加正議大夫徙按河東山西道以事免歸居三年竟以疾酬之遂至於斯哀哉享年六十有四前後寵錫凡十有一命官極通貴哀榮終始不為未遇以是月壬申葬汲縣親仁鄉王尚里禰塋三昭首穴夫人夾谷氏前公亡再娶夫人秦氏生二子曰彛曰範範前公九月暴卒二女長安歸徒單衍亡次適趙常白夫人杜氏生子曰庸二子並願而有文學皆公所自教云曰子度曰女壽適陳氏皆先亡孫二人曰青牛範之子一在褓公為人器量𢎞深有經史學善持論識變通無贅言居養甚重周防甚謹及開物成務當其可為推致所學惟恐不臻於極然事無巨細率以大體中持恥近效取譽所謂以道事君者近之至威儀柔嘉小心式訓又類夫仲山甫衛武公之行已承㫖鹿菴王公人品清峻慎許可嘗詔公舉可執政者乃以君名進奏其經濟德業可知已初官河東時憲府爭索隱幣以副上需分司者不計應否悉掩為已功弊久恬不為怪至是公以前行沒入十萬餘緡盡給之民又平陽府胥有以母喪甫窆輒從吉執役者公曰忘孝之人胡可與處乃按而斥之其惜體正俗又如此可書者尚多惟著其繫夫事之重恐亦公之志也歟銘曰大學為道將何為俾民一德新民彛行焉而底善是依要本平治先修齊俾民厥體用或違其在孔學非吾知倬哉王公天秉岐自稚細行初不遺若考翼事子肯基一日雲厦看巍巍揚歷中外厚自持柔嘉維則非公誰又復當用行不疑翰音登天翅屢垂越若有物中縶維從心罔單體服羸期於俯仰無忸怩人或咨惜我則熙以道事君其庶幾六十四載麟儀儀綬何若兮印何纍賁夫松檟餘光輝天其或靳將後貽俾為清廟璧與圭奉之天門光陸離仙山東麓朝氣霏佳城鬱鬱君所歸殁而從禰為受釐足慰下泉舍笑嬉零落不必西州悲我銘昭昭惟昧詒中州名賢文表卷二十六
