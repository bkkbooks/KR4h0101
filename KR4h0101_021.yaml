body:
  text: 中州名賢文表巻二十一明劉昌編許文忠公記雪齋書院記天地淳渾樸厚之氣鍾於北自顥穹生民偫而未泄一旦若再開闢與物為春我國家龍興適丁其㑹焉天佑下民作之君作之師君以治之師以教之世祖皇帝以大聖之資膺君師之任德業之盛固由天縱亦惟一時命世大才相與扶植斯道有以繼天立極也斯道也何道也根於降衷見於實踐傳之而濟斯民者也三代而下道有晦明而其明也其本於經乎金源氏之有中土雖以科舉取士名尚儒治不過塲屋文字而道之大者蓋漠如也天相斯文新安朱子出性理之學遂集大成宇宙破裂南北不通中原學者不知有所謂四書也宋行人有篋至燕者時有館伴使得之乃不以公於世時出一論聞者竦異訝其有得也皇元啟運道復隆古倡而鳴者則有雪齋姚公焉至大間先生之姪牧闇為翰林承㫖實握文柄家學益明孫堉由世賞踐歴有聲今吏部侍郎昔守吾郡一日請曰子嘗長翰林寔今太史吾祖之塋牧闇已銘之矣書院尚未有記子其勿辭夫以牧闇之筆猶子之於諸父公之德業精覈詳盡尚何庸贅而書院之紀時未及也辭不獲為書其槩公諱樞字公茂營州栁城人後遷洛陽考諱仲宏贈太師儀同三司追封魯國公諡惠靖子煒故榮禄大夫陜西等處行中書省平章政事贈推忠秉德佐治功臣光禄大夫河南江北等處行中書省平章政事柱國追封魯國公諡文忠姪燧是為牧闇燉僉江西湖東道提刑按察司事公幼篤孝敬長力於學天賦既髙濟以實力故其成也大太宗擇必且齊子教漢語文字俾楊中書惟中監督公往依焉與偕北覲時龍庭無漢人士夫上喜其來甚重之乙未詔二太子南征俾公從楊中書即軍中求儒道醫卜人拔德安得江漢先生趙復仁甫與之言信竒士出所為文數十篇以九族殫殘不欲北留帳中一夕惟寢衣存求至水裔欲投溺而未入也公曉以徒死無益遂還盡出程朱性理之書付公公得之躬行實踐發明授徒北方經學蓋自兹始伊囉斡齊行臺于燕諸侯競掊克入媚以公為郎中必分及之一切拒絶攜家來輝墾荒糞田誅茅為堂置私廟奉祠四世中堂龕魯司冦容傍垂周程張邵司馬六君子象讀書其間衣冠莊肅以道學自鳴汲汲以化民成俗為心板小學論孟或問家禮俾楊中書板四書田尚書板詩折衷易程傳書蔡傳春秋胡傳又以小學流布未廣教弟子楊古為沈氏活板與近思録東萊經史論説諸書散之四方時魯齋許公在魏公過魏與竇漢卿相聚茅齋魯齋聽公言議正粹遂造蘇門盡録是數書以歸謂其徒曰曩所授皆非今始聞進學之序必欲相從當盡棄前習以從事於小學四書為進德基不然當求他師衆皆曰惟先生命魯齋盡室來輝相依以居卒為大儒牧闇銘謂公所梯接云世祖在潜邸歲庚戌遣平章趙璧來徴既至大喜時召與公語公見上可大有為乃盡平生所學為千百言首以二帝三王為學之本為治之序與治國平天下之大經彚為八目次及救時之弊為三十條疏弛張之方其下本末兼該細大不遺上竒其才由是動必見詢且使授太子經日以三綱五常先哲格言薫陶德性壬子受命征大理至曲先腦而夜宴羣下公陳宋祖遣曹彬取南唐敕無效潘美伐蜀嗜殺及克金陵未嘗戮一人明日早行上據鞍呼曰汝昨夕言吾能為之公賀曰生民之幸有國之福也師及城飭公盡裂槖帛為幟書止殺之令其民父子完保軍士無一人敢取一錢者上駐六盤公疾居闗中教使勸農身至八州諸縣諭上重農之㫖凡今闗中桑成列者皆所訓植公言在太宗世詔孔子五十一代孫元措仍襲封衍聖公曲阜有太常雅樂命東平守臣輦其歌工舞郎與樂色爼豆祭服至日月山上親臨觀又言臣宣撫東平閔先聖大賢之後詩書不通義理不究與凡庶等版洛士楊庸選孔顔孟三族諸孫俊秀者授之經而學夫禮盍真授庸教官以成國家育才待聘風動四方之美又詳議王鏞練習故實宜令提舉禮樂庶歲久不致崩壞皆從之上嘗令公料李璮之反公對曰使璮乗吾北征留瀕海搗燕閉闗居庸惶駭人心為上策與宋連和負固持久令數擾邊使吾罷於奔救為中策如出兵濟南待山東諸侯應援此成擒爾上曰賊將何出對曰出下策後如其料王文統伏誅西域人羣言回回雖時盗國錢未若秀才敢為反逆上曰在昔潜藩商訂天下人物姚公茂言王文統學術不純他日必反秀才豈盡皆斯人襄陽下議大舉公奏如求大將非同知樞宻院事巴延不可及伯顔陛辭勅逆戰者如軍律餘止殺掠古之善取江南者惟曹彬一人汝能不殺是亦一彬此皆公自潛邸時有以啟沃而簡在帝心也既濟江公又言由陛下降不殺之詔兵不踰時降城三十戸踰百萬自古平南未有若此之神捷者然自夏徂秋一城尚不降降城四壁外縣邑丘墟曠土無民國將安用比聞揚州焦山淮安人殊死戰我雖克勝所傷亦多宋之不能為國審矣而臨安未肻輕下蓋懼吾止殺之信不堅詐其來耳宜遣官專輔巴延宣布止殺之詔有犯令者必誅無赦上皆從之公自召居左右不去側者二十年中統元年拜東平宣撫使明年拜太子太師辭不受改大司農四年拜中書左丞至元五年出僉河南行省十年拜昭文舘大學士詳定禮儀事十三年拜翰林學士承㫖十七年薨於京師夀七十八歲士大夫哭祭如失親戚葬輝州菊山之陽成宗朝加贈嘉猷程世舊學功臣太師開府儀同三司追封魯國公諡文獻至正七年監察御史言雪齋姚先生當世祖龍潛之時首陳二帝三王之道佐立萬世無疆之基所以闡明道學其功大矣聖朝以魯齋許文正公從祀孔廟覃懷又立書院先生首倡道學輝州講道之地宜立書院設山長以淑諸人廟堂韙之今教養不弛堉經葺惟謹公事業滿天下牧闇之銘備矣而大節在首倡經學闡明斯道記立書院故凡有闗於斯道者尤致詳焉世言儒者不知兵蓋兵在擇將若淮安王平宋之功跨軼今古公之薦也將貴料敵若公之料李璮古名將不是過受命征大理首陳曹彬不殺至下臨安始終此論開屯淮蜀勸農闗中固巳合幅員而混於一矣某因記書院而竊有感於今者故雖牧闇已書而復及之非贅也是皆開國大功源於道學而其流發見之尤較著者也誠以斯道之明君臣端拱而天地位焉萬物育焉一指顧之頃爾士子之學於斯者一誦是記知公事業之大必推其所以致此者則其為學也至矣道學豈空言而已哉陜西行中書省題名記至正丙戌冬陜西行中書省平章政事多多公合其寮寀移書有壬曰吾省據要重以控西北南三陲者八十五年矣昔保釐長貳若亷希憲商挺薩達齊輩皆蔚為名臣而無託以徴及今亟求已不可得乃斷自後至元元年得若干員刻之石識往行朂後繼敢以屬子有壬惟陜西當天下一面名雖數更地之雄劇則古今不異也我元天造立宣撫司以養以治中統三年始立陜西四川行中書省至元二十三年朝議分省四川咨答轉滯改陜西行省而四川自為省矣中更王相府宣慰司者一尚書省者二尋復其舊此其大較也世皇宏規逺模立中書省總於中分省釐於外行省遵成憲以治所屬決大獄質疑事皆中書報可而後行則為行省若甚易者然地之所直有險易則任之所寄有重輕矣秦地形勝之雄建瓴東夏分鎮夾輔宗子維城臣工旬宣寔任其重中統初㢘希憲為宣撫商挺副之同寅行省事治難為易繼以賽典赤之賢山川之險適足以固吾之國故地之險夷視人愚哲朝廷慎簡宜何如哉則是保釐長貳之善可為法惡可為戒者此不容泯此所以有待於題名俾後世得以指議也國家百年來法令明備遵之者福戾之者罰若殛隨所戾而至孰敢不畏然人情有玩於法狃于習而不知畏者於是法有所不行矣而其本然之善則未嘗泯可觴之機則未嘗息題名一刻俾一見之頃知某之為善使人歆慕若是我獨不能效之耶某之為惡使人嗤唾若是我獨不能戒之耶用是為政豈特為法之一助而弭惡遷善蓋有出於法之外者焉尚論古之人由周而來著績斯土者軌躅相接逖聽風聲皆吾師也若夫德於人而未忘迹於事而未熄率爾踵武其文正乎平章暨諸公竭誠踵武㒺俾專美矣斯石之刻又與人為善於無窮焉後之來者知其名之必列於斯也可不畏乎虚其石以待之晉寧路鄉賢祠堂記治民有政化民有禮政雖不可弛聖人不急也禮則不待親炙而有得於私淑者已惟其不得於親炙也世之君子汲汲有事於前修往行者所以寓淑人之機焉古鄉先生没而祭於社鄉先生之德鄉人心悦而誠服者其秩於祭宜哉世逺禮墜著於令有不舉者况咸秩無文乎然其廢舉亦視所遇何如人爾鄉飲酒禮主人就先生而謀賓介主人謂諸侯之卿大夫先生謂致仕老於鄉里而教者大夫則就而謀之又卿大夫飲國中賢者諸侯卿大夫猶能致禮於鄉賢之生者天子牧守獨不能致禮於鄉賢之没者乎祭於社之制不可考附廟學作屋而祭之者則間有之矣晉寧在河東為古今名郡廟學罹地震仆而復建講堂西四賢堂故基獨蕪穢不治今總管仇侯理棼舉墜劭農敦學歲復告豐治捷桴鼓顧瞻隙地慨然捐俸金倡僚屬而復為堂焉經始至正二年孟春迄功二月乃取隋文中子而下凡若干人設主以祭前國子司業王君走書京師請記於愚愚惟萬物竝育而不相害道竝行而不相悖物之所以育者道也道之所以行者人也道之統在聖而其寄在賢或晦或明或絶或續有不得而殫論者大抵先王承天之道所以維人紀於萬世者禮而已矣禮之目有五而祭統乎吉然而公於天下者先聖先師是也有尊於一鄉者各賢其賢祀於其地者是也公於天下者以其道被於天下也尊於一鄉者道之所著莫先於鄉而鄉人之所感視衆人為尤易由是而國而天下矣王豹處淇而河西善謳綿駒處於高唐而齊右善歌曲藝且然而况為聖人之學者乎晉當變風變雅之餘有憂深思逺之意俗美且厚人生其間雖德之大小不同而位之顯晦亦異要其所至有足以任斯道之寄者若隋文中子唐裴文忠公宋司馬文正公其出處勲德為如何他如裴𢎞中趙元振之相業陽亢宗司馬表聖之節操趙伯循孫明復之經術與夫金源百年以迄我朝其行足以範世而軌俗其風足以㢘頑而立懦其學足以垂後而淑人不待親炙而有得者多矣鄉先生之功不亦大乎生為晉人没為晉神其秩於祭宜也然其中有從祀孔廟而又班之斯堂何哉從祀公於天下者也斯堂專於一鄉者也使薫德而善良者益寓其没世不忘之思非黷也昔魏杜畿為河東太守開置學官執經教授郡中化之以多儒聞其功不在蜀文翁閩常衮下而未聞有祠今舉而祀之可也夫以陶唐之故墟際皇元之嘉㑹魁竒材德之生蓋鼎鼎也明其晦續其絶廓聖人之學而任斯道之寄者豈無其人又有嗣而秩之者巳侯燕人名濟字公度化民有禮其杜畿之流乎司業名士元字善甫則郡人也龍德宫記天水云涸金源告竭天一之真肧渾朔方混為慶元流澤萬世我太祖聖武皇帝盛德啟運為民立極維時佐命皆不世出之才足以輔成大業而上聖識慮超越規摹𢎞逺惟績易凝惟道務至非博大至人曷贊元化聞寧海崑崙山丘公其人也遣近臣劉仲禄自奈蠻國即其地徴之公知天命之不可違化機之不可失絶宋金使幣幡然應詔跋涉數萬里見上於西域雪山帳殿言修身治國撫民止殺之道大契天心東歸居燕之太極宫後因其號易名大長春宫賜冠服金印掌全真大教是為長春真人全真者恬澹無為全其本真其學倡於其師重陽真君至是𤣥風播而道化行徒衆盛而宫觀興矣長春法系之弟曰太古真人郝公太古傳盤山真人王公歲己未長春以汴之重陽觀實真君昇舉之地命盤山入汴主之肇建大朝元宫構築規制之大甲江北諸宫觀丞相史公以龍德亦古名地請盤山竝主之構殿熙春閣基之前扁無極以奉三清與朝元遂為宗屬龍德宋同樂園道君既禪之所居地直乾位故為是名有十洲三島亭臺樓觀極土木之侈居無何而北矣宋南渡為道宫馴至今日文醇德懿知常翊敎大真人姬公既襲教積儉儲贏以待後用至元丙子虚𤣥應物通真道人李公命宫主高志和陳道祥即熙春閣基建通明殿以奉昊天上帝營東西廡以庇其徒貤至崇𤣥誠德洞陽真人徐公泰定虛白文逸明德真人司公俱以善繼見稱八傳而至通𤣥文德虛逸真人王公公名德衡天均其自號也述事尤力闕者備之弊者新之秩秩就緒矣爰自乙未構築丙子増建且百二十年或剏或葺厥惟艱哉天均念祖師經始之難前輩繼承之勤不勒之石曷暢𤣥風曷永教事命提㸃陳道新狀其故絶河來請有壬惟老子著書五千餘言道德之意後之絀之者甚也謂五經不如其約者亦非也蘇黄門謂天下無二道所以治人則異聖人中心行道不毁世法然後可耳蓋言君臣父子之間非禮法則亂木食澗飲心存至道以之治世則不可也坡公見其經解有言使戰國有此書則孔老為一不惟不絀而深有取焉蓋公言治道貴清静本老子之㫖也漢文景而後為治者多宗之所以絀之者以其獨善而不兼也若長春之遇太祖言修身治國撫民止殺由身而國知所本矣當草昧用武視民草芥之時而以撫民止殺為先其為兼也不亦大乎其有得於以道佐人主佳兵不祥之㫖哉易曰天地之大德曰生孟子曰天下定于一不嗜殺人者能一之長春之言又有契焉坡公所謂孔老為一者非牽合也即其書究之太平經曰上士學道輔佐帝王輔佐帝王舍長春之言皆去道矣有壬因是宫道君之居而有稽焉宋自太宗建太平上清太一宫祥符窮極土木崇觀間道經設博士躋史漢列傳之次崇奉之道可謂極矣而其效漠然者非道之過不知道之過也我太祖皇帝用長春之言開萬億年太平之基此其所以為道也既為叙次其師先之槩終以道之大者使學道之徒知道之在此而不在彼嗣者知所以敎不徒構築像事而巳焉則祖師之道不失其傳矣河南省左右贊治堂記世皇一區宇河南地大民夥闢宣慰司於汴至元壬辰改行中書省國制中書總庶政是為都省幅員際天機務日繁相天下重地立行省而分治焉若稽古制魏晉有行臺齊隋所管置外州稱行臺尚書省唐以諸道事繁淮齊分置今行省其遺制也官有平章政事左右丞叅知政事丞相則設置不常佐幕有左右司都省分為二行省則合為一設郎中員外郎都事各二員一省贊畫賴焉左右司名昉乎隋唐改郎中為左右承務趙宋尤重董正六曹彌綸省闥紀綱百司舉正文書之稽失非習知臺閣故事不在兹選我朝簡擇尤慎内外不殊由是而至執政者班班可紀河南佐幕往者不可悉考今則刑部郎中觀音訥員外郎托音陜西省郎中趙中為郎中宣文閣鑒書博士兼經筵譯文官哈里都汴梁路治中布特穆爾南臺監察御史范勿為員外郎上都留守司都事圖們徳爾檢校官羅吉董守成為都事朝議以用兵供億而溢其員也其堂舊無扁都事田吉入為禮部郎中請於承㫖歐陽公扁曰贊治吉走書相下請記不果作及來承乏鞅掌倥偬亦不暇作一日謁詔使汴梁府署宻邇省治有間道可不往適過所謂贊治堂者憩焉吉輩請曰記久未得兹躬履其地其有時乎乃為之説曰字書訓贊曰佐曰助平時之治且資佐助在今日宜如何簿領鉤稽其常職也非贊也贊亦有說乎上官之曲而其直之下情之隱而其豁之刑獄之濫而其平之財粟之出而其節之逃亡未復復不遂農疆域多戍戍不知兵移病流弊萃於省垣治之不力迤邐顛危而扶而持竭誠殫智治效有不著乎且稱人之美亦曰贊世蓋有好諛而樂受欺者茍贊其美不救其惡治何望焉抑昔人有言上策莫如自治斯言雖為它設敢斷章為諸君獻惟自治而後有以贊吾之治斯不負堂扁矣遼山縣儒學記遼山縣治萬山中平原什一岡陵坡坂墾闢殆徧而民亦多屢以故環數百里内矇不知學俗日以媮作縣者率以供資糧屝屨為急於學校蓋蔑如也延祐乙夘新河李行簡來尹是縣縣以附郭屬有事於州學營材董役李君力為居多既而慨然曰吾治雖下邑亦設學官以總鄉校而使之僦民屋為茍且計是大不可於是命工求木即醖務廢址構堂凡十二楹函丈位中四筵秩秩師生有歸人得矜式教諭馮成終徴余辭記其實惟天朝龍興列聖崇教天下郡邑莫不建學獨縣治之附所屬者其為學則不一在江南則建設畢備越河而北附路府者且不兩有而况於州乎今吾州二學廼獨克備李君之力可知己遂呼其民而語之曰人之所以異於禽獸者以其有禮義也禮義根於心非外至也特不知學則物欲得以蔽之矣且人之於禮義猶饑之於食寒之於衣雖有智者能饑不食寒不衣乎饑寒切身必汲汲乎求其所以禦之者固無待於勸之也於禮義而不知求是猶甘饑寒而死不求所以禦之也朝廷崇學校設教官勸人以無待人勸者何哉誠不忍見其甘饑寒而死强聒勸其所以禦之者此聖人之仁也閩蜀蠻徼一變為華遼故中土人性亦猶昔也顧乃抗倥侗而走顓䝉者蓋以無啟之者也今而邑長推上意建學以居爾教官奉常職執經以淑爾其忍閩蜀之不若耶聞吾言必奮然有以自力矣若夫視學校為干禄地修天爵以要人爵則非吾之所望也學也禄在其中有不期然而然者第黽勉進德已自有以處之矣嗚呼尚監兹哉彰德路創建鯨背橋記聖朝既平宋經畫遐邇大都小邑枝疏脈貫際天所覆猶身焉政令之宣布商旅之通遷水浮陸馳舟格梁濟荒陬僻壤無逺不逹猶氣血周流百骸用康一或壅塞則身為之病矣故橋梁若道路路若府州縣皆專官董之歲時廵行而察其廢修此朝廷著令示為政之先務也彰德實古相河亶甲所居禹貢冀州之域也世有廢興邑有改徙而山川之流峙形勢之雄偉津塗之要衝有不得而變者焉我朝為路路則今制而名則昉自石晉宋若金皆因之郡直孔道驛傳屝屨歴涉尤劇郡北四里洹水所經夏秋受西山萬壑之流奔横駃悍滅防齧涘蕩然四溢官舟濟人而要需阻尼上曝下淖負挈奔渡擠排蹴蹋㪺漏中流惴惴及溺水涸作橋因肆掊歛聚良用惡薄覆弱搘行者杌隉莫不股慄歲一修拆民大有輸締構之用百才一二蠧財病民不知其㡬年矣西域荀公凱霖嘗監安陽縣位卑力小有志未就余待罪中書適赴調京師嘗語及是慨然曰使不武長郡必作石橋余既從㬰之且語之曰果成余為若記俄陞路達嚕噶齊至元二年歲丙子春蒞事首號於庭曰洹橋病民耄倪具知為永逸計非石不可且嘗請諸冬官冬官可之總管馮公思温繼至而同知阿拉克判官摩哩章暨幕屬諸君莫不協恭贊畫乃相舊渡沙深水闊柢難為植疏鑿引水人用重勞東一里水磑廢渠土性堅良面勢惟允基是締構事半功倍相距㡬舉武後先㡬年莫有迹者目力一及若發蔀物出莫不躍然以喜地為天寧寺業世不可牟也乃召其徒以其法語之曰佛以慈航濟渡故凡世之𢎞益於人者多若輩為之且聞有所謂八福田者若橋梁居其一焉則是役也若輩宜為之况而地乎惟其力之有不及也其亦難强於而哉誠捐此地吾有司自為之福田利益其亦肇基於若乎師徒聞之聚而謀曰是誠吾徒之當為而不能為有為者出尺寸地尚可靳乎相與署劵入官約又不畔既得地以府帑贏息募工購財惟石之用以尺計者數餘二萬攻琢輸輓費勞實繁得石水冶近而易致蓋昔産地也甓灰鐵鋌靡不具集安陽縣尹趙時敏寔集其材復董其役恪共朝夕用底於成經始丁丑二月凡四閲月而建其陿未廣而淺未濬卑未陻而防未堅者明年夏始克訖功其長亘十五尋碇基於淵兩端磩岸中作三墩析水為四而鋭刃其西以劈水怒四環順列一脊穹起植欄兩翼其廣可以行四車凡材假於民直有未歸者馮公入為刑部侍郎總管杜公德逺適來乃共發帑悉酬之予得請歸二公率其屬請曰橋之成國家之福民庶之力而適歸而身履之昔之言今其酬哉予亦昔之冬履危而夏冒險者也紀功示後記宜為也况有言可食乎天下之事成於有志一僧孑然而出儲無宿舂植一標於荆榛瓦礫之塲而萬間金碧不日突起矣天下之橋以雄偉名者多其徒為之孰有儋天子之爵操得致之柄而反不彼若哉愚者不能黠者不為也其或勵志率作而同僚嫉之上官搤之自非先之以定見守之以定力奮不顧流議而勇於必為者鮮有濟焉初是役之興有言韓忠獻三守相凡渠水之利莫不修復使橋可作則必先矣蓋不可作也殊不知古人蓋亦有不及為而後人為之者未聞古人事事盡為而後人無一可為者也昔杜預起建河橋於富平津衆論以為殷周所都經聖賢不作者必不可作故也預曰昔造舟為梁則河橋之謂也遂作橋成則知古人之立事亦未免譁於浮議而成於定力也噫作者之難若是俾其功勿壞而施於無窮則有望於繼者焉既為記之又采輿人之謡為之頌曰洹水浟浟載伏載流始於濫觴俄而勝舟胡為悍肆奔騰喧豗揚為驚濤激於堆埼伻馳孔殷商途攸出乗危將墜濟險慮覆歳狃日偷安斯匪今孰急其病而疚其心豈無徒杠亦有輿梁朘民之膏視為故常膏朘靡恤事功奚益枯株槁壞載胥及溺乃有長人職思其忠心匪石轉詢謀復同浮言譊譊謂古有賢而不此作豈昧於前我不爾咎爾亦匪誣我病誠切孰興孰除千夫運斤山石為竭曾不逾時横空嶻嶭鱗集櫛比堅猶纍玊蜿蜿龍卧岧岧雲矗昔也江海今而堂閨傴僂絡繹晝提夜㩦凡今之人盍究所適旦播未周夕求其實有為逺慮人即迂之雖略近效久大可期繼今有位勿怠其成水厭横流岸虞善崩洹水浟浟頌聲洋洋百世而下於戲不忘上清儲祥宫記勝國之崇事𤣥教也導原於端拱懷襄於祥符崇政土木之跡可徴焉汴朝元宫通𤣥文德虛逸真人天均王公屬記上清儲祥宫屢伻不倦乃徴其跡而叙之宫始太宗作於朝陽門外不五十年而火以其地為禁軍營監察御史裏行包拯上疏請勿修故也又三十七年復事修建歴十三年而後成蓋元祐六年也翰林學士承旨蘇公作碑未幾誣以失實毁之令蔡京别撰金源氏復葺翰林侍讀學士趙秉文有文歲壬辰天兵下汴宫觀僅存師徒解散時全真之教方興長春丘公起海濱至西域見太祖皇帝論治道以修身治國撫民止殺為對上大恱命史録之長春法系之弟為太古郝公太古傳栖雲王公長春以汴重陽觀故基實主教重陽真君昇化之地命栖雲主之營建幾三十年是為朝元宫丞相史公復請兼主太一上清龍德諸宫觀事惟上清為潦水所圯規制宏闊力不能復命巨提㸃者購地於惠和坊為畝六十撤故宫材崇三清之殿於前次列真之宇於後神門壇壝左右雲堂四周接屋餘百楹雖非其地而名不泯也泰定三年虚白文逸明德真人天游孫公以故宫之基石刻故在不可終廢命提㸃純素清逸大師黄道真從事修復道真殫力承命遂成三殿尊𤣥元聖像於前奉栖雲祖師於後翼以齋序繚以周垣庖廥場圃所資悉備視舊規雖有逕庭而存古修廢功亦懋哉愚嘗記龍德宫言道之在此而不在彼者悉矣茲因天均之請推太宗之初意且讀蘇蔡之文而重有感焉太宗意在清静無擾讀道德經慕其所趣詔近臣曰虛静致治老氏之深旨也無為之道當力行之斯言果踐其有契於老氏之㫖矣蘇公謂道家者流本黄老以清静無為為宗以虛明應物為用以慈儉不争為行秦漢以來始用方士言飛仙變化之術丹藥小技皆歸於道然黄老之道本也方士之言末也修其本而末自應可謂盡善盡美矣京之言則謂宫在國東為震為春為仁於應為子孫太宗作宫子孫衆多篤生真宗受封國者八王火於仁宗再造於神宗亦子孫衆多受封國者九王蓋因方士言宫之所在為國家子孫之地故太宗神宗多男火於慶厯不事修復故仁宗卒以無子京雖不訟言之而其意實在是也斯言不㡬於法巫醫史之說乎即二文之去取有以見宋之不能國也嘗論宋三百年道學之明家法之正人才之多文物之盛三代而下無與倫匹至於崇𤣥虛攻土木不能無議焉是宫丁世變之後繼其教者易地作新且復其舊天均増其未完葺其已弊不煩縣官服勤致用可謂能已後之嗣者尚泝老氏之旨以繼列師之志則𤣥教不患不興𤣥教興則祠宇不患不復是為記公生明堂記彰德屬州曰林俗淳訟寂號易治且山水可適高唐孫君徹徹篤由中書直省舍人來倅是州上官與其能小民安其政山水之適則未遑也州治西北有公明亭圯廢已久金承安間朱黻記文石刻故在一日孫君洎其守若僚請曰亭故游息地今不能復其扁則可取然不若用其全句之該也因書公生明三字揭之州堂日視以為儆予喜為書之既又請抒其義以發其蔀請亟而切乃為之說曰公之為義大矣哉天無私覆地無私載日月無私照黄帝之治天下語其輔佐亦曰公而不阿而已周官曰以公滅私民其允懷說者謂以天下之公理滅一已之私情則令行而民莫不敬信懷服矣則是公之為用通三才而一之自天子以至於嗇夫板尹不可須臾離者也人禀天地之中以生具衆理應萬事者心也虛靈洞澈無物不燭一蔽於私䝉昧昏錯而其本然全體固自若也荀卿於是立公生明之說啟人至矣蓋公也者無私之謂也無私則浄浄則眀明則如鑑照物姸媸黑白舉無遁形明也者公之發見者也而所謂生者謂有此公即有此明猶播種於地而必出焉以之扁堂觸目儆省而又克已復禮以立其體應事接物以適其用不徼名以為公不任數以為明一毫私欲無自而入理之㣲地之逺莫不瞭然在吾目中尚何覆曖之有哉若夫不下比以闇上不上同以疾下分争於中不以私害之荀卿所謂公士者諸君得之矣惟公生明之極致尊君愛民物至而應事起而辨將不進為通士乎諸君其勉之碑志敇賜推誠宣力定逺佐運功臣太師開府儀同三司上柱國曹南忠宣王神道碑銘并序曹南忠宣王薨六十年若乃祖乃父豐功髙烈墓道之石咸未有紀至元六年嵗在庚辰十二月己亥中書右丞相臣托克托左丞相臣特穆爾布哈等以聞敇中書叅知政事臣有壬為銘翰林學士承旨臣庫庫為書翰林學士臣𤣥篆其額臣有壬承命兢惕而竊又自幸皇帝不以臣庸劣俾叅台司而王之子臣托歡寔平章政事世講義篤當悉其世家飭其未至以章眎來世矧威命有赫其敢以弱陋辭王諱阿喇罕蒙古扎拉喇氏祖諱布色贈定威佐運功臣光禄大夫司徒上柱國追封曹南王諡忠定父諱額里根贈忠宣静逺佐運功臣金紫光禄大夫中書右丞相上柱國追封曹南王諡桓毅祖妣塔本妣穆爾俱追封曹南王夫人忠定幼宿衞太祖皇帝服弓矢割烹征屢有功竟死於戰桓毅嗣宿衞事伊勒吉太子從庫楚呼圖克圖太子伐金遂侵宋以功陞萬戸尋以天下馬步禁軍都元帥副大將察罕征討察罕没遂代之統大軍攻淮東西諸城至廣陵戰没王嗣職統其軍己未從世祖皇帝渡江破宋師隆興北山還上都賜黄金五十兩中統初詔將所部討阿勒達爾琿塔罕追至河西有功二年從征額哷布格賜金箙一文繒九三年從宋王哈必齊討李璮賊搤老僧口日夜搏戰走之奪其輜重進拔濟南賜金鞍文錦各一黄金如上都數四年春錫虎符銀章至元四年有事襄陽走宋師安陽灘賜白金衣物五年大軍圍襄樊分戍百丈山以掎宋師戰屢捷十年拔襄樊十一年略地郢復奪郢州南門堡視地執可達戰艦於江遣徹爾瑪勒貝大將自沙蕪口入江取鄂州泝江陵復遵陸略地至鎮江十二年擢昭毅大將軍仍蒙古軍馬上萬戸權行中書省事駐建康與右丞相巴延叅政董文炳為三道水陸分進期集臨安王以右軍取道獨松闗破東壩砦至護牙山遇宋師手斬其將杜總管獲甲盾數百入溧陽界復值宋師斬騎將二人擒禆將祝亮等四十二人斬首三千級進拔溧陽獲首虜七千戰章步橋斬其將吳奉使斬首三千級進攻建平破之斬吳許兩總制拔廣德西安長興攻獨松闗擒谷總制至柏市擒其將張八斬首二千級進中奉大夫行中書省叅知政事十三年三軍㑹臨安宋亡九月徇浙東未下郡邑所至納款降趙提刑等五百餘人追宋宗室秀王與擇於閩至福安轉戰四十餘里殺其步帥觀察使李世逹於陣俘與擇及其子弟監軍趙由􅀈防禦使林德獲印章五器仗萬計安撫使王吉等皆望風降偏師入興化擒宋相陳文龍招降宋官二百餘人淮兵三千人江南平十二月以行中書省叅知政事行江東道宣慰使十四年入覲進資善大夫行中書省右丞仍宣慰使十六年進資德大夫行中書省右丞使如故十八年入覲賜玊帶弓矢進光禄大夫中書左丞相行中書省事統師四十餘萬征日本次明州而薨年四十有九是年十月吉日葬曹州濟隂縣郭村之原初贈協謀佐理功臣太師開府儀同三司上柱國曹國公諡武定加贈推誠宣力定逺佐運功臣太師開府儀同三司上柱國追封曹南王諡忠宣配托多庫庫掄呼圖克台竝封曹南王夫人子男二曰伊蘇徳爾襲左手蒙古萬戸天厯初有擁護功遂叅預河南省三轉知樞宻院出為河南省平章政事兼山東河北蒙古軍大都督入為集賢大學士進銀青榮禄大夫薨曰托歡起家同知蘄州路四轉為河南左丞由南臺侍御史再遷為西臺御史中丞母疾棄官歴江西湖廣江浙三省平章政事進階光禄大夫拜南臺御史大夫改河南平章以母老辭至元六年拜中書平章政事在政府念母老而逺語及輒流涕南臺總十道按三省非重臣不可復拜御史大夫且便其養也女五人適管軍總管呼喇楚珪齊衛副使巴罕瑪勒䝉古軍千户塔齊爾真定路總管哈喇遜蒙古右手萬户額爾吉納孫男女若干皇元以仁武取天下艱難肇造與共事者惟國人爾而國人中尤賴以濟者若扎拉爾氏則四傑之一焉王之乃祖乃父無征不從無戰不捷而所部之士威信素著如臂使指無不如志天下既一俾率其部而世其職雜居心腹之地以制四方世祖皇帝萬世之逺圖也王明而恕謀而有斷始襲其部士皆樂為之用提兵鼓行指期制勝其追叛河西攻堅歴下力戰襄樊略地郢復可謂雄偉之績矣若夫巻甲沙蕪而長江失天塹之險分節獨松而重闗若無人之境卒使宋主面縛海隅風靡則無忝爾祖而世篤有加焉日本之役未至而薨厥後蹉跌貽悔議者謂使王在當不至若是也皇元屈羣策以一區宇舊勞之臣耆艾熾昌者非一王暨祖考皆死戰陣以致寧敉乃身不享之昔賢謂世德之臣厚施而不食其報然後其子孫能與守文太平之主共天下之富王夀不滿其德而二子佐列聖重熙之運皆致位崇極王薨甲子一周矣賜銘墓道哀榮益新又立祠建康賜祭田千畝世福蓋未艾也嗚呼崇德報功朝典縟矣歸美報上獨不在王子孫乎臣有壬謹再拜稽首為之銘曰於赫天造秉鉞四馳芟夷蕪梗以式九圍河翕嶽喬貴胄接武闞如奮出奔走禦侮桓毅之子忠定之孫率我舊部朂我鋪敦帝命南伐潰襄拔郢夷庚既塞我旅爰整嘽嘽匪車舟乃陸通投鞭斷江率滸而東三軍掎角分趣吾㑹遂啟溧陽肆我禡類崩角稽首漿壺食簞廣德弗城獨松弗闗大㑹臨安組頸道左乾坤清夷四方來賀蕞爾島夷乃敢不庭皇風播海長星墜營訏訏郭原鬱鬱王兆焯勤崇極申以廟貌既歴五紀盍文其碑亦惟天道遲速有時假寵九原追功未墜聿聲其休永錫來裔敕賜興元閣碑太祖聖武皇帝之十五年歲在庚辰定都和林太宗皇帝培植煦育民物康阜始建宫闕因築𣑽宇基而未屋憲祖繼述歲丙辰作大浮屠覆以傑閣鳩功方殷六龍狩蜀代工使能伻督絡繹力底於成閣五級髙三百尺其下四面為屋各七間環列諸佛具如經㫖至大辛亥仁皇御天聞有弊損遣延慶使綽斯戬輦鏹葺之又三十一年為至正壬午皇上念祖宗根本之地二聖築構之艱敕奇凌府同知今武備卿布達實哩暨嶺北行中書省右丞今宣政院使裕嚕特穆爾專督重修歴四年方致完美周塔塗金晃朗奪目閣中邊頂踵巨細曲折若墄平髹堊靡不堅麗精至重三其門繚以周垣煥乎一新縣官出中統楮幣為緡二十六萬五千有竒費視昔半而功則倍之丙戌十一月七日上御明仁殿中書省臣奏閣修惟新不可不銘敕翰林學士承旨臣有壬文諸石臣有壬拜手稽首而言曰天地運用之妙臣無得而名焉即其形之近者言之風雷雨暘之散動潤烜發生萬物者皆自上而施於下源泉陂澤之流通抒泄灌溉大田者亦由髙以及乎卑我國家興王之地俯瞰萬國大聖人首出庶物位乎天德引閡孳萌紐互開闢而後蓄而未發之氣以資始品彚自上而施於下由髙以及乎卑故澤之流若髙屋之建瓴師之出如太山之墜石功烈之成登三邁五漢而下莫我儗也定都和林造邦之基立矣太宗憲宗雖干戈間而以不嗜殺人為心聞象敎清浄覺皇慈仁之㫖有契宸衷資其說以格蚩蚩之未格者非大示尊崇則無以為感觸之地而大聖人礨空四海撮土八埏囊括宇宙席捲河山之量寔兆眹於是焉臣有壬生長熙洽之世朔南名刹㒺不歴觀聞嶺北人譝閣之大竊疑其夸質諸嘗行陜蜀江廣閩浙且仕嶺北之人信天下之閣無與為比也昔祗桓寺基八十頃一百二十院祗陀須逹二人成之我國家富有四海視布地之金特錙銖爾則此閣締構之峻偉傑峙與雪山相髙鷲嶺侔盛宜也閣始無名但以大閣寺著稱皇上賜名曰興元之閣蓋經始之日實我元順天應人龍興之初名協於實矣且和林自元昌路為轉運司為宣慰司又為嶺北行中書省丙辰迄今九十一年而列聖駿極之蹟雄都瑰異之觀無一人一言及紀述者一旦形諸玊音刻之堅珉遲速其亦有縁乎於戯休哉為大利益可量也夫銘曰鴻蒙再闢世再初聖神立極卑黄虞建都乃握天地樞俯拾萬國如墜枯嗸嗸赤子饑待餔后奚後我來其蘇天戈豈欲專天誅心以不殺人自孚顧兹象敎非虚無與我異世而同符以大智慧明羣愚開極樂國包寰區祇園方欲鳩其徒乗龍遽爾及鼎湖後聖繼作志不渝巍巍成此兠率居不宏其規豈逺模矗天拔地髙標孤中有屹立金浮屠諸佛環擁分四隅至大修廢走使車三十一年等須臾吾皇法祖恢聖謨坐令金碧新渠渠厖恩覆幬均堪輿如閣容塔綽有餘中書有請帝曰俞汝臣有壬其大書不騫不磷磐石如億萬斯歲緜皇圖中州名賢文表巻二十一
