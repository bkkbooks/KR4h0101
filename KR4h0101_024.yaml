body:
  text: 中州名賢文表卷二十四明劉昌編王文定公奏議論政事書臣近䝉禮部符承中書省劄該憲臺欽奉聖㫖召臣惲馳傳赴闕庭者臣惲伏自欽承明命風夜祗懼不知所為意者憲臺過舉俾備顧問庶有所發明因自忖量國家之事日有萬幾非愚下所能識然臣自中元迄於今日久叨仕進區區管窺不無一見輒敢以時務所宜先者數事昧死上聞臣聞自古創業垂統之君必定制畫法傳之子孫俾遵而守之以為長世不拔之本欽惟皇帝陛下聖文神武以有為之資膺大一統之運長策撫馭區宇民數逺邁漢唐其所渴者特治道而已然三十年間勵精為治因時制宜良法美意固已周悉今也有更張振勵講明畫一若懸象而昭布之使臣民曉然知其法之所以豈不便哉故臣以立法定制為論治之始一曰議憲章以一政體傳曰法者輔治之具一日闕則不可君操於上永作成憲吏承於下遵為定式民曉其法易避而難犯若周之三典漢之九章是也今國家有天下六十餘年小大之法尚逺定議內而憲臺天子之執法外而廉司州郡之法吏是具司理之官而無所守之法猶有醫而無藥也至平刑議斷旋旋為理未免有酌量准擬之差彼此輕重之異臣愚謂宜將已定律令頒為新法或有不通行未盡該者如纍朝聖訓與中統迄今條格通行議駁參而用之與百姓更始如是則法無二門輕重適當吏安所守民知所避而難犯天下幸甚二曰定制度以抑奢僭夫制度者明尊卑别貴賤法天道而立人極也故古者衣服飲食輿馬屋廬皆有恆制至於庶人僕妾其禁尤嚴惟在君人者制節謹度率先化下為務何則上之動靜為人勞逸之本上之奢儉為人富貧之源可不鑒哉欽惟皇帝陛下御極以來躬先儉素思復淳風如輕紵衣而貴紬繒去金飾而朴鞍履至衣服等物銷織鍍砑之類一切禁止以奉行漸逺不無㢮緩今也臣民衣飲踰於公侯婦女衣著等於貴戚以致聘財過於卿相男女不能婚姻正以用之無制僭越暴殄有不能供億者故物價不得不踴而貴錢幣不得不虛而輕上下困弊日甚一日假若巨室之家親屬奴𨽻衣飲等差若例而一之寧不困乏臣愚以謂宜一切定奪大行禁止使民志定而不少僭越用既有度物自豐饒恐亦實楮幣殺物價之一端也三曰節浮費以豐財用夫一世之財足周一世之用不必專豐其財去其害財者可也今國家財賦方之中統初年歲入何啻倍蓰而每歲經費終不阜贍者豈以事勝於財過有所費故也為今之計正當量入為出以過有舉作為戒除饗宗廟供乘輿給邊備賞戰功救荒歲外如冗兵妄求浮食冗費及不在常例者宜撿括一切省減以豐其財財豐事勝食足氣充以攻則取以戰則勝以柔則服將何為而不成何求而不獲古之善為國者君不必富富藏於民故用雖多而取不竭孔子曰百姓足君孰與不足此之謂也且財非天來皆自民出竭澤焚林其孰禦之但力屈財殫非所以養民而强國也昔亡金世宗諸王有以不給而請告者世宗曰汝輩何騃殊不知府庫之財乃百姓之財耳我但總而主之安敢妄費迄今稱說以為君人至言可不鑒哉四曰重名爵以攬威權古人稱官爵謂之天秩王者代天爵人鼓舞一世使天下之人奔走為吾用者此也惟爵與祿不輕以付人曰賢曰材乃能得之蓋以為礪世磨鈍之具若得之輕則視之輕視之輕則人不重人不重將見君子逺小人至此必然理也惟其磨礪轡馭之權世主操於上不輕授人與當其材何患氣之不振力之不竭事之不成者哉今四海一家權宜假借之舉日漸希闊正國家收攬威權之時如近年委任稍重者罔考平素即授崇品激之建功立事固是駕馭英雄大權茍非其人不無叨竊不安之懼今中外無事朝廷宜重而惜之昔有唐使職或帶相銜然止行見職曾無分省實權五曰議廉司以勵庶官臣聞古之善為國者不使人有怠惰不振之氣若作於心而害於政茍非以德振起之須度時宜本人情齊之以法故得小大畢力上下勞而衆事舉今州郡之官品流殽雜既無選舉甄別止循常資紛紛藉藉聚散於吏部例得一官誰不因循茍且以歲月養資考而已欲望承流宣化趨事赴功卓有惟新之政亦已難矣嘗觀漢唐之馭吏也能者增秩賜金公卿缺則補之以表其賢否者放田里而不事事唐則召七品以上官集於闕庭親與訪問究得失而進退之然二者不過爵祿為勸爵祿極則意滿足意滿足則怠心生亦有無如何者故持斧直指採訪黜陟等使歲相望於道而本朝之舉高出前代比者廉司之設初氣甚張中外之官悚然有改過自新之念大姦巨猾致畏懾而不自安庸人懦夫將卓爾而有所立行無幾何法禁稍寬使監視者徑挺之氣不息而自斂聽從者姦弊之萌潛滋而復枿恐徒易其名而不能革州縣之故習夫刑罰崇寬固是國家美政然分别善惡以示勸懲豈得專務寬恤昔亡金大定間尚書省奏順州軍判崔伯時受贓不枉法准制當削官停職世宗曰受財不至枉法以習知法律故也所為奸狡習與性成後復任用豈能自悛雖所犯止於追官非奉特㫖無復録用以致犯禁者鮮此先事之明驗也今風俗澆薄遇有所犯茍免無恥臣愚為法宜稍重以權一時其要在人法並任精擇官僚優加吏祿憲綱既立公道大行官有作新之氣吏無糊口之虞我之氣既伸彼安得不振我之政既肅彼安敢或私所謂上行下效源清流長將見風采百倍有登攬澄清之望矣六曰議保舉以核名實方今親民與參佐官莫縣令經歷為重縣令乃百姓師帥師帥賢則德澤宣參署為一路紀綱紀綱振則政務舉今例出常流安取殊績臣愚以為若行品官保舉法庶得其人其法品量舉主與所保者資歷相應既皆兩可復精加磨勘無謬妄私意然後許令入狀相小大之才授繁簡之任限以歲月如唐制釐務出二百日者是也課其殿最升黜舉主得人者受知賢之賞不職者坐不當之罰舉官自然盡心受保者常恐相纍如此庶立功而寡過矣其南選尤宜施用此法何則江南比至平定諒為不易凡所𨽻附秋毫無犯可謂仁義之師只以前省調官賄而海放行省注擬尤為濫雜侵漁掊克慘於兵凶至盜賊竊發指此為名仰賴天恩幸其無事今宜委官分揀以行此法其停革人員不至罷黜者降之邊逺邊逺見職委有聲迹者使之內遷亦激勸一法兹蓋自漢唐五代迄於亡金皆遵而行之當時號稱得人然必須內設審官考功等職專掌其事七曰設科舉以收人材方今名儒碩德既老且盡後生晚進既無進望例多不學州府鄉縣雖立教官講書㑹課祗皆虛名略無實效以致非常之材未聞一士州郡政治苦無可稱思得大儒碩德難矣臣愚以謂不若開設選舉取驗之速也夫進士選歷代號取士正科將相之材皆從此出前代講之熟矣理有不可廢者若限以歲月而考試之將見士爭力學人材輩出可計日而待也論者必曰今以員多闕少見行壅滯若復此舉是愈壅而滯之也臣謂不然蓋科舉之設本以核實學而取多士清仕途而息雜流庶得將相全材為國論治道備大用也豈不愈於學校徒設汗漫而無所成乎八曰試吏員以清政務前代取吏之法條目甚嚴如宰相子辟舉令取充省雜終場舉人試補臺掾品官子孫吏員班祗閣門等人出身者試補六部令史夫令者明法令曰令史者通經史曰史今府州司縣應用一切胥吏多自帖書中來官無取材勢須及此所習既凡聞見或寡欲望明刑政識大體務清弊革難矣臣愚以謂為今之計莫若將合歲貢吏人以吏員法試之中選者仍許上貢補充隨朝身役外州府郡見役者從廉司以校法試驗庶幾激之積漸肯學其月請俸給亦合定奪能使得糊其口然後可責以廉何則今廉司專抑吏權察非違少有貪鄙不計養廉即按而治之是縱之竊而責以何盜之為豈理也哉九曰恤軍民以固邦本近命新省整治以來一切事務盡從簡靜可謂不嚴而治不肅而成者也中外熙熙翕然有拭目太平之望兹蓋皇帝陛下屏去姦慝保合太和嘉靖邦本專任責成之效也然猶有當軫慮者夫為治之道政貴均一不少偏重否則必更而張之使至公均被國家且自攻圍襄陽以來簽取軍役蓋四舉矣將著中物力等户盡充軍站中間拋下上户其能有幾皆貧難下戶而軍興百色所須皆仰供辨江南甫下遭值前省和顧和易急徵暴斂侵漁不法又將軍站閃下差稅不問多寡止除四兩餘者分灑見戶其逃亡差稅又行每歲陪納數年之間編氓已是靠損其小戶困苦不較可知臣以時屬方殷其代輸差稅宜令蠲免涵養存恤小康若一旦别有征求易為責辦其軍站戶富者至有田畝連阡陌家資纍巨萬丁對列什伍貧者日求生活有儲無甔石田無置錐者今也不辨難易一體應役又至元十一年簽充到軍役者多是近下户計當時起遣已是生受臣愚謂俱合分揀定奪庶不致困乏逃竄有悮臨時調遣不均之弊莫此為重十曰復常平以廣蓄積常平倉設自至元八年隨路收貯斛粟約八十餘萬今倉廪具存起運久空甚非朝廷救荒恤民本意夫常平之法歲豐增價以糴之則農重穀而敦本歲荒則減價以糶之故民倚安而無菜色如往年定時估以平物價竟不克行殊不若常平之有粟也蓋低昂權在有司兼併利無專擅故也若復實常平倘遇凶歉出糶三二千石榖價自平楮弊亦復加重且勉賑濟破用軍國正儲實為古今良法十一曰廣屯田以息逺餉臣聞邊儲逺餉自古未有良法如飛挽負載賣爵贖罪引種和糴未免弊困多不能行俱未若留兵屯田為古今之長策也臣試以唐振武事言之憲宗元和七年李綘言天德振武今豐州等處左右良田約四千八百頃收粟四十萬斛歲省度支錢二十餘萬緡兹非明驗歟今振武豐州界河兩傍除營帳百姓耕占外其餘荒閒尚多若大治屯田自非水旱田功稍集國儲必有所濟唐陸贄所謂緣邊土沃而久荒所收必厚又近歲山後流移戶多將見拋地土時暫借令營屯亦是一法富弼曾言此事及撿括冒占仍招募願户者聽外邊屯已置營屯去處亦宜差强果為國盡心有為能臣重與撿勘其間一切可行未舉已行不盡者極人為而盡地力仍將迤南一切置屯見間户數併徙邊防以救一時此急於治外之意也十二曰息逺略以撫已有臣嘗聞老子以恬淡為宗孔宣父戒及其在得二聖人垂教以天理當然為言非徒設也欽惟皇帝陛下聖神文武臨御天下三十餘年昭丕天之功接千歲之統三五已來未有若斯之盛其於太祖聖武皇帝垂創之業可謂大集厥成然有其有者安務廣德者强審今之勢譬猶蓄牧大家川量谷計數已殷富正在牧圉擇人芻豢得所而已如此則牛羊茁壯日蕃而無耗不然罔恤見有又務多得將見復求者未獲則已有瘠而耗之可不惜哉伏願陛下息逺略撫已有以恬淡為心以在得為戒頤養聖壽配天無極此宗廟神靈四海臣民之願也臣又嘗觀天地之氣四時行萬物生皆自然而然又其升降止三萬里之中其範圍不出三十萬里之內餘則混淪旁礴雖聖人有置而不論者伏惟陛下憲天體道財成輔相功已不能殫紀尚何言而何慮哉十三曰感和氣以消水旱夫兵者凶器戰者危事不得已而用之且以强勝為戒我國家以神武戡定海宇日月所出沒霜露所霑墜莫不臣而主之然地廣物衆不無孽芽其間故三十年之久十有餘舉如征大理雲南渡鄂渚平內難討賊璮取江南破襄漢駕洋海下占城定高麗問罪交州掃清遼甸皆除暴固存彼動此應不得已而用之之舉也然士卒愁苦死傷暴露邊郡困乏中外憂勞之氣不得不傷陰陽之和而致水旱之報是以聖人重之畏之故老子曰大軍之後必有凶年師之所處荆棘生焉故比年以來水旱無時霜災屢作山崩地震變出非常姦臣柄用盜賊竊發百姓嗸嗸日趍於困臣常讀中元以來國書詔條未嘗不以生靈為念弃捐細故講信修睦以用兵為重此堯舜好生之德禹湯克寬不自滿假之仁也願陛下躬體𤣥默頤養聖壽與天無極以初元之心為心以恬淡之慮為慮為民祈天請命災害不生禍亂不作使黎庶知其無好兵之心天地鬼神諒其不得已之意庶幾天回哀眷易乖戾而為和平變荒歉而為豐稔斂時五福敷錫庶民咸躋仁壽之域天下幸甚十四曰崇教化以厚風俗自昔風俗美好由禮義所生今也禮義既衰故日趍於薄一法出則衆姦作一令下則百詐起何則民所欲而生者歲不加益我過為之求者日有所增所謂救生而不贍奚暇治禮義哉有司釋此不念每以厚風俗為務如孝行復役節婦有旌議婚姻立學師表淑慝忠臣義士歲有常秩之類非不家至户曉然終無分寸之效者徒文具虛名而已夫天下之事有本有末知所先後則教立而化行臣愚以為風化之行莫國家若先以四教為本曰仁以養之義以取之禮以安之信以行之何為仁父愛子育懷生樂業溫飫以養其心何為義輕徭薄賦取斂合宜寬裕以暢其氣何為禮上下有分毋妄侵辱誅責以當其功罪何為信發號施令一出不易忱誠以明其約束是也而前政者謂桑葛也曾不務此專以威虐肆心督責為令取辦一時流毒四海不知陵遲偏詖有不可救藥至於今為厲者如逋負差徭有已蠲未蠲者貧難軍人有已間未間者民出祗應不䝉撥降反復償其不應民辦和買雖䝉官還曾何敷其元價杖刑重責不上大夫崇卑之品曾不少間悉被戮辱夫如是將何以責民心之近厚風俗之淳粹者哉惟其四者本立而天下悚然有忠厚廉恥之心而後敦之以禮讓謹之以庠序觀之以鄉飲教之以冠婚喪祭民將目擊而心諭安行而有得二三大臣匡直輔翼於上時從而振德之孰有子遺其親臣後其君者哉所謂父子有親君臣有義不曰風恬俗美將安歸乎臣惲草茅一介遭遇明時違逺闕廷八年於兹雖越在草野乃心未嘗一日不在王室今復䝉被寵召拔起於泥塗之中犬馬之力思欲報效而愧其孱弱不材然愚衷內激情有不能已者干犯天威罪在萬死伏惟少寬鈇鉞示有可取使四方大賢大德之士聞之曰如臣者且䝉採擇將􅑲􅑲而來皆為陛下用矣臣不勝俯伏待罪憂恐之至臣惲昧死再拜謹言貢舉議貢舉人材肇自唐虞而法備於周漢興乃用孝廉秀才等科策以經術時務以州郡大小限其歲貢之數以賞罰責長吏極其人材之精猶古貢士法也歷魏至於後周中間因時更革固為不一要之不出漢制之舊逮隋始設進士科目試以程文時勢好尚有不得不然者至唐有明經進士等科既明一經復試程文對策中者雖鮮號稱得人至有龍虎將相之目其明經立法膚淺易於取中當時亦不甚重又别設制科以待天下非常之士故前宋易明經為經義其賦義法度嚴備考較公當至亡金極矣後世有不可廢者然論程文者謂學出剽竊不根經史又士子投牒自售行誼蔑聞廉恥道喪甚非三代貢士之法伏遇聖天子臨御之初方繼體守文以設科取士為切若止用先皇帝已定格法與時適宜可舉而行如邁隆前代創為新制可不詳思揣其本末酌古今而論之惟古貢士率從學而出後世不詢經行徒採虛譽因循薦舉狃為私恩不顧公道此最不可者也莫若取唐楊綰宋朱熹等議參而用之可行於今綰之法曰令州郡察其孝友信義而通經學者州府試通所習經業貢於禮部問經義十條對時務策三道皆通為上第其經義通八策通二為中第其論語孝經孟子兼為一經熹之議曰分諸經史如易詩書周禮二戴禮經春秋三傳各為一科將大學中庸論孟分為四科並附已上大經逐年通試及廷試對策兼用經史斷以已意以明時務得夫愚謂為今之計宜先選教官定以明經史為所習科目以州郡大小限其生徒揀俊秀無玷汚者充員數以生徒員數限歲貢人數期以歲月使盡修習之道然後州郡官察行考學極其精當貢於禮部經試經義作一場史試議論作一場題目止於三史內出廷試策兼用經史斷以已意以明時務如是則士無不通之經不習之史進退用舍一出於學既復古道且革纍世虛文妄舉之弊必取實學適用之效豈不偉哉外據詩賦立科既久習之者衆亦不宜驟停經史實學既盛彼自絀矣翰林學士王惲謹議記序殷太師廟重建外門記廟有外門舊矣金泰和四年節度使孟公鑄易而新之近代以來廢撤不復者蓋三紀焉維皇朝至元元年郡侯渤海王復命汲縣令葛祐作新太師之祠奉明詔而緝廢典也越明年春二月神宇甫完移治令下逮夏五月郡人韓澍來令兹邑奠謁祠下顧瞻臺門未克完具殆無以稱新宫而揭䖍敬明年秋七月乃經始焉順歲成而樂民用也九月初吉告成厥功輪奐爽塏神遊敞然風馬雲車肅焉來臨左林右泉奕奕動色既而主縣簿高顯洎其屬願以事文諸廟石遂再拜請書於惲惲曰太師之墓在衛境聖蹟也按祭秩常祀也自殷迄今二千有餘歲矣神之所以凛然如生血食不絶者豈非忠義之氣粹而為喬嶽融而為列星窮天地亘萬古作大賢為民極故也孔子稱殷有三仁焉蓋至誠惻怛之心其揆一也太師之進諫不去箕子之法授聖也太師之殺身成仁微子之志存宗也前代以二賢配饗廟庭亦見夫顯異尊崇之禮宜矣然一門之役不可不謂全功重嘉令之為縣民安政簡而復致敬恭於明神繼成前功可謂能也已故詳書本末以俟來哲至元丁卯秋九月重九日謹記孔履記孔子沒千有八百餘歲小子惲獲拜履綦於先進趙公學舍吁可敬也履制極古長尺有二寸其圈以絲藉則以枲為之紋作古方花角結駢羅紕􅀈如畫不可端倪厥首几几似圓而方狀若物鈎勢欲上達循口有衣如罾可相掩覆傍綴繩鈎長約數寸殆欲拘縛以斂口哆環脣之周中貫繶紃疊踵之后辮結方舒犢鼻穿徹色蒼艾無光枲之纎尫者逮弊絲之堅凝者不變也於是拂拭睇視起敬起愛恍如升君子之堂仰高風攀逸駕而聆足音之跫然也若夫履者禮也君子所履小人所視况吾夫子踐履之物哉吾儕小人可不敬而視之且夫子相魯七日誅卯也於兩觀之下如由賜之徒尚愕然而驚况魯人乎然視其所履其詳可得而考也夾谷之㑹齊以萊兵劫公孔子履階而上不盡一等是履也凝然山立兵却魯張其無嚴諸侯之勇可得而見也然後退而閒居從容中道與三千之徒翩翻於洙泗之間接武於杏壇之上其素履之往坦坦幽人之貞可得而觀也俾後之君臣父子兄弟夫婦順而履之者昌捨而違之者亡宜乎吾夫子萬世之下凝旒被衮履帝位而不疚其道光明者焉嗚呼當崇奉者聖人之功也當踐履者聖人之跡也茍知其功而不踐其跡與嗜古物為耳目之玩者等矣是誠不可不知其所當履也中統三年夏五月同宣撫徐世隆都司劉郁幽陵張著觀汲郡王惲拜手稽首而為之記新井記有銘水之滋人至矣豫城居三十年口衆而無井亦一苦也蓋飲食酒茗之用日不暇數十斛率以僕奴逺汲取足誠可憫也中統四年夏六月朔召井工鑿井於舍南隙地告成於是月上旬之戊午凡用錢布四千五百役傭三十六甃甓三千二百其深四尋有二尺既汲果食冽而多泉味之莫餘井若也且夫汲之為郡一咽㑹也吾聞生聚繁夥之地水率鹹苦井而得美泉者百不一二數何則腐濊滲漉之餘故也豫生也多疾鹹苦之味尤所禁忌今新泉若是而甘且冽天其或者湔浣我心肺滌濯我五贓沛然助往來生生之資而供無窮之用也是宜銘銘曰四年季夏日戊午鑿井得泉甘勝乳古云飲之疾可愈朝來汲引已堪覩金沙離離流百股一泓寒碧蒼煙吐黑知灣澴瀠水府劇郡之水率斥鹵此泉扶衰殆天與我嬰重潔繘修組尚飲來者無窮數遊王官谷記山之與水相胥而後勝山非水則石悴而雲枯水非山則勢夷而氣泊二者雖具得其人而後名中條山王官谷其萃美之尤者也山闖首河曲連亘北騖為雷首為栖巖為萬固運肘而東為五老又東而得王官谷谷漢故壘名有唐司空表聖之别業至今遺構休休亭在焉至元甲戌夏六月豫以撿括牧田㑹虞已而奔命旬暇取道於虞王官諸峰指顧東邁後八日因恙小休暑雨向霽遐想風煙晴逸雲上遂幡然來游始自固氏西南行約四五里抵山門歷磴平坦無顛頓推挽之勞不百許步已入山堂隩中矣其窈而曲深而容垂蘿灌木磐石美蔭草香而土肥環磎疊嶂碧壺瑶甕濃淡覆露內曠而外掩無擁遏薄愠之氣蓋谷由中高狀作層陛勢相覆壓耐辱而翳其下方者是也東西兩山曰壺門夕陽青壁矗然正色如削中峰曰天柱秀拔特起如鼇鼻噓空高齴雲表不與衆峰聯絡真奇觀也峰半有石突然曰落鶴臺又西有石拱立曰雙人左右斷崖水作瀑流下瀉如仙人解佩天紳未收西則泉􅀈出縮以乾溢為度東則飛灑噴薄陰壑恆雨砰崖激石下注幽澗是謂貽溪者是也山藉以潤人仰以清物滋以榮也王子於是斂袵薦茗謁司空祠下退觀休休亭諸詩既高公之名節且詫谷之深秀也青鞋竹杖扶掖上征抵天柱峰足望東嵓瀑布䃲礴三詔亭上因留宿焉時月出山豁萬籟沉寂凉露洗空失暑所在青嶂瑶光非復塵世其東溪水聲如逺鼓奫奫隱動林壑顧謂兒子孺曰此山靈張樂喜其來而作豫氣也深夜久聞毛髮森竪山人李珏出司空一鳴集相與披讀於露幌風簷之際顧瞻林影如見須眉乃酌水再酹乞靈於公詠休休之歌思考槃之樂安得黃金買堪乘之鶴追仙遊於寥廓也邪不然掃江山之筆吸撑霆之氣貯濯詩脾以增益其未至庶幾列名於王駕李生之次亦所願也日既昃徘徊久之出山林霏煙翠漠然四合回望谷口無復所見庚伏中旬后三日共溪雲隱記西山經行記至元乙亥秋七月被藩府檄偕來伻盧君採文石於晉丙申如襄陵董治厥事館許氏東堂八月庚子次西梁質明致祭黃崖山下遂命工即役借榻普照僧舍凡再宿有以義成石為言者壬寅馬北首旁山行入臨汾界過侯氏四水等峪踰山尾得王莊峪峪口敞豁夷衍北連白陵呰腳既夕宿龍子祠南晉掌里癸卯下井峪渡麻栅澗自獅子鼻登山越石門是為姑峪西山諸峪凡一百八處下井王莊實為之要蓋南達吉鄉北走紫川道也前臨渃岸觀陰定關關形峽束若石門然僅通人過想夫秋潦澮汾羣壑來注掀騰勃怒萬馬東駛遽厄兹口激而為飛流銀濤雪浪百丈湍瀉亦壯觀也躡澗西騖歷馬蹄纏山雨奄至且作且止指望仙臺眺玉女樓望生馬壇頂諸峰煙霏翠濕空濛無際磎磴縈紆盤十有八折抵神居洞下洞腹寬肆窿穹巉嚴仰視欲墜後有竅逶邃山之噫氣穴也遂解衣盤礴憩洞閣上尋復開霽山紅澗碧景氣爛漫凉風吹靣自逺而至煩襟翛然如夢仙府雖遇四子於汾水之陽不足以喻其樂也因留題壁間且辨其誕少焉游太一洞觀陰罅玉柱蓋石鍾乳也稍西騙馬鞍嶺上弱羊坂坂長約七八里極峻折艱於登陟馬力不能勝抵暮宿西陶謝氏林屋甲辰由鄭谷入義成分循澗槽西行徑嶮狹草木䝉茂步履錯忤過水磑折而東北上􅀈嶺視石之所在石陛砌覆壓隱山之半腹𤣥質白章又有三其色若雲然者尤秀潤奇特降橫岡石溜間得枯枿一株矯如龍騰奇崛可愛於是按行澗道視輦運所經西東入深峽亂澗水峽形曲折中藏堂隍其根足沙水奇曲似口似圈似窪呀焉而頥張突焉而角出者不可勝記兩崖峻削嶄嶄壁立高入雲表大石阜如齟齬左右勢犖確殆不能騎造愈深而峽愈奇又東行十餘里碧崖橫截水潨瀉石甕中鏘然如環珮鳴兩山間峻絶不可越矣遂自南腳嶺攀援北上峰回路轉行可六七里至岡東陶山冢乙巳復自羊坂東降取姑射北道過龍堂澗望仙門謁王母洞道人致酒山閣以軟腳仍飲余浮大白者三世傳北山中復有玉蓮古洞下與此穴暗相通連旁有水泉曰漉錢名者事涉誕怪不復紀遂由側嶺白石溜下參峪抵西假里午飯郭氏田舍日昃還府吁天壤間山水佳處惟幽人勝士得徜徉其間與皓氣造物俱游而共樂不圖官守急遽中而獲兹遊雖不能窮幽極勝弄雲煙而狎魚鳥亦非常之舉也歸筆所覩以志且見夫因事機攄煩滯而不為徒然也平陽府臨汾縣新廨記平陽當河汾間為巨鎮屬邑五十餘城臨汾劇而最要經界才百里占籍者幾萬五千户凡丘賦之重徭役之煩十常居其二而風聲氣習勤儉果譎宛然雜唐晉餘俗惟其物浩壤狹且不相能故人嚚於訟必直曲乃已聽約束俟審辨者動填里閈縣舊署在府右廂康寧坊之南城易代來為工人氏豪據有司假老屋隙舍寓理曹務一歲間輒三五易處簿書儀具坌集委積棼不可曋奔趣執事者當夏熾冬冽赭汗僵立尤實艱苦前政狃故常盻瓜代日復一日漫不加省庶幾赫令尹之威具視瞻之媺清承宣風化之源其惟艱哉逮今縣監某洎尹某稔其如是適時和訟理嚮化有漸乃以其故詢諸衆僉曰念兹在兹竊有年矣第率先無自訖于今唈唈也既度其人之樂所遂經辦焉應直得景行里次氏之故第凡成室一十有五楹略不加易其來如歸㕔事適中吏舍兩列彤閎前啓衡達里逵於是逺湫溢處高明委蛇安舒各有攸叙中外竦然大易觀仰既而史亢淵曰其興滯易弊之勞趍事樂成之懇公倡私應共濟厥美匪劖書珉石代而縣者烏能究根據而見經始贄禮幣來謁文豫以歷官內外固知天下之治在於宰相師帥得人而已佐天子理百官發號施令以遂物宜者宰相也推君治宅民生供事取决㑹歸有極撫字百里間者師帥也是則宰相與師帥勢雖霄壤以本末體要而言實相須成化耳故前代選重其人眘柬於清流冊授於軒陛疏名殿屏蓋繇是也今國家條章具舉百度惟貞顓任責成垂寄殊切作縣者茍非恪勤官守推忠及物何以稱經緯相需之望今一縣之署置固匪政之大者類能若是尚何患仕之不優俗之弗易責罔塞而績用不章於時哉豫特喜縣僚屬達於從政有志於民得春秋憫雨之義故以所繫重者告焉幸來者毋忽至元丙子三月日記蘭亭石刻記蘇門盧君茂之得玉色碑石中斷塈酒壚間偶見視之乃禊飲序也即懇求得之豫自稚年留心翰墨閲是本無慮十數此帖極清徑有神而不龎雜與定武石本略同其背有敕書字塗以黃金光彩尚煥下復刻祁公字二豈裕陵賜宰相衍家物也嘗謂二王墨妙雖片言隻字如寸珠尺璧見者皆當寶惜不可使混泥沙今一旦為吾所遇免夫淋汙嚙蝕委弃劘滅之厄果神物護持時有授受然耶異時歸來當臨溪之亭位置壁間扳長吏齊新例榜其亭曰右軍且讓鄒賢曰此乃吾王氏真行之祖也庶幾有摳衣而請益者其於奎璧兩間不無煌煌者焉但未知在幾年後耳又諺云室無滯貨不為潤屋矧吾儕以多文為富乎然物之堅者莫金石若也兹刻也豈敢保其必壽抑不敢矜其長為已有特記焉以付子孺庶王氏來者能弓而箕之是所謂薪有盡而火無窮之傳也十年歲在癸未夏五月十七日謹記中州名賢文表卷二十四
