body:
  text: 中州名賢文表卷六明劉昌編許文正公附録贈榮祿大夫司徒諡文正制上天眷命皇帝聖旨惟昔聖祖圖任相臣思與真儒共成治效故資善大夫中書左丞集賢大學士兼國子祭酒教領太史院事許衡以天民之先覺膺巖石之具瞻聖學方湮惟洙泗之源是泝嘉謨入告非堯舜之道不陳斥姦志靖於熙朝辭祿不忘於耕野迎推日䇿明厯象以授人時樂育英才居成均而教胄子乃眷鈞樞之列益昭模範之功允為裕考之賓師冝副慈皇之渥命爰申恤典用賁玄扄道德博洽斯謂文中立不倚斯謂正既嘉名之載易仍公秩之榮頒尚期有知服茲無斁可贈榮祿大夫司徒諡文正主者施行大德元年十月日左丞許衡贈官制姚燧天非繼聖學之墜緒則不生命世之大才國欲與王道以比隆肆用為蒸民之先覺何物故之巳久尚人思之未忘故資善大夫中書左丞集賢大學士兼國子祭酒教領太史院事許衡玉裕而金相凖平而繩直出處則惟義所在言動亦以禮自持休休焉有容屬屬乎其敬人能𢎞道惟朝聞夕死之是期我欲至仁匪晝誦夜思而不得行巳似秋霜烈日化人如時雨和風來席下之摳衣滿户外者列屨達簡在帝心者率多丞弼窮固守師説者不失善良鶴鳴九皋而聲聞於髙鳯翔千仞必德輝乃下爰立相以堯君舜民之志所告上皆伊訓説命之言丹扆斥姦少不避雷霆之軋擊青臺治厯本於策日月而送迎繇理窮而智益明隨任使而職斯舉今既亡矣誰其嗣之於戲在爾身有垂沒世之名於朕心有失同時之恨雖成廟納書以命諡固巳振木鐸之髙風而功臣胙土則未加用申錫蜜章於下地光靈如在寵數其承可贈正學垂憲佐運功臣太傅開府儀同三司追封魏國公仍諡文正中書左丞許公制王惲朕究觀世數灼見天心粵惟有不世出之君然後得大有為之士運符千載道濟一時中書左丞許衡爰自師儒遂拜左相用之不惟不重學之不惟不深貞一乃心執持苦節謀謨善斷精識造微既逢堯舜之明用安社稷為悅君聖臣直理明道尊庶幾夷夏之安風以詩書之教衣冠萬國雍容叔孫之儀仁義一家剴切魏徵之諫在中統至元之治有永淳貞觀之風此其效焉功可忘耶而復養英材於國學齊七政於璿璣白首南歸尚深北顧憂來夢奠歔欷柱石之衰人去鑑亡瀟灑風雲之契感時懷德想像其人忍惜恤章俾疏身後可贈某官某諡尚期窀穸不昧欽承大元敕賜故中書左丞集賢大學士國子祭酒贈正學垂憲佐運功臣太傅開府儀同三司追封魏國文正公許先生神道碑翰林直學士中大夫知制誥同修國史國子祭酒臣歐陽玄奉敕撰翰林侍講學士通奉大夫知制誥同修國史知經筵事臣張起巖奉敕書奎章閣學士院承制學士中大夫兼經筵官臣尚師簡奉敕篆額洪惟聖元度越千古世祖皇帝以天縱之資得帝王不傳之學上接伏羲神農黃帝堯舜禹湯文武以來數聖人之道統而為不世出之君河內許先生以天挺之材得聖賢不傳之學上接周公孔子顔曽思孟以來數君子之道統而為不世出之臣君臣遇合之契堂陛都俞之言所以建皇極立民命繼絶學開太平者萬世猶一日也猗歟盛哉先生既歿之三十三年為皇慶二年仁宗皇帝詔暨宋九儒從祀宣聖廟庭明斯道之所自傳矣又二十三年為元統三年今上皇帝敕詞臣玄文其神道之碑以賜其子師敬使刻之于是臣玄再拜稽首以復明詔曰論世祖之為君而稱述許先生之為臣則見我元朝廷之間有唐虞明良之氣象論許先生之為臣而推本世祖之為君則見我元國家之初當貞元會合之氣運故善言先生必以道統為先而後及功業則上可以稱塞聖天子命臣作碑之初志下可以厭服天下後世學者景慕之盛心也臣謹按先生家乘及嘗私淑於父師者序而銘之先生以金泰和九年己巳九月丙寅生於新鄭邑中幼有異質八嵗入學從師問讀書欲何為師曰應舉取第耳曰如是而已乎師大奇之謂其識趣非常他日必有大過人者自顧章句儒非其師遂辭去年十餘有道士過門見之驚曰骨清神完目光射人茍非命世大賢即當神超八表人間富貴不足道也稍長嗜學如飢渴而精強絶人世亂家貧無從得書聞有善本冒險數百里就而鈔之讀之有疑即能有所折衷嵗壬辰天兵渡河為遊騎所得其萬夫長酗酒殺人為嬉先生從容曲譬卒革其暴久乃信其言如蓍龜人賴全活者無算萬夫長南征乃東去隱徂徠山遷泰安之東館鎮尋遷大名扁其齋曰魯世因號曰魯齋先生國家既有河朔遣官分道以試選士中者得占籍為儒魏人力勸應試既中選留魏三年自挽鹿車載書還河內魏人致僕馬不聽入洛求弟衎得之自洛適魏聞河內政虐還止蘇門十餘年間雖顛沛流離行不愧影其與人交中剛外和一介取與必揆於義人與之居雖有忮求馴致俱化所至學者翕然歸之察其誠至始留館下既留誘掖忘倦身教屬屬言教循循于是師道日立友道日親在魏友竇默蘇門友姚樞相與論辨探幽析微詣者懾伏既得伊洛性理之書及程子易傳朱子論孟集注中庸大學章句或問小學等書言與心會召向所從遊教以進德之基慨然思復三代庠序之法甲寅世祖受地秦中聞先生名遣使者徵赴京兆教授先生避之魏使者物色偕行亷希憲宣撫陜右傳教令授以京兆提學卜居雁塔之東與同志講井田之制買園為義桑會得請還世祖即阼建元中統召先生於家既至謁歸既歸復召至上京入見上問所學以學孔子對留上所無幾以疾還燕明年自上京召數有敷對時相王文統用事而先生及姚樞竇默日被顧問默在上前屢斥其學術不正樞尤以才見嫉蓋竇言本出於先生文統亦頗疑之乃奏姚為太子太師竇為太子太傅先生為太子太保外示尊禮內欲擯使疏逺姚竇拜命將入謝先生獨毅然辭謂二公曰禮師傅見太子位東西向師傅坐太子乃坐今能遽復此禮乎否則師道自我廢也二公懷制闕下辭文統聞斯言遂寢其命改授先生為國子祭酒竇為翰林侍讀學士姚為大司農先生亟辭以疾久乃豫告還河內既而上京使狎至應命至燕病弗能往至元元年自燕復還先是有詔即家為校以業來學及躬耕里中未嘗以詔示人至是召入省議事旋踵求去丞相安圖來謁欲勉留之退謂人曰時流皆欲輩行許先生吾見相去千百尋有詔趣赴省遂北行見上檀州諭之曰安圖少不更事卿無負所學悉以傅之有嘉謀嘉猷語使入告對曰聖人道極髙逺學者所得有淺深然當罄所知如聖詔其所不知不敢強也安圖明敏有操守告以古人格言往往領悟苐恐有間之者則難行耳自是預國大議時至都堂扈行上京咨訪日廣宿衛之士見先生入對舉手加額相慶曰是欲澤被生民者上書陳五事曰立國規模曰中書大要曰為君難曰農桑學校曰慎微纍數千百言讀奏未徹上久聽微有倦色先生即斂卷求退上肅然正襟危坐先生乃再讀讀訖上嘉納之其餘論諫多削其稿世罕得聞有頃辭疾聽五日一詣省賜西域名藥善酒俄許其還繼召與太保劉秉忠左丞張文謙議朝儀官制多所詳定阿哈瑪特請建尚書省總六部與中書角立上特用先生為中書左丞先生求面辭不得見者再越數日奏所議事畢自陳曰臣有三冝辭一非勳舊二蔑才德三所學迂恐於聖謨神算未能盡合上曰用卿出朕意毋事多讓先生辭不已上命從官掖之起有旨曰出既出及閾還奏曰陛下令臣出省耶上改容曰出殿門耳明日又辭遣近臣哈喇哈遜先諭止之強出視事至上京奏論阿哈瑪特罔上不道事不報因移疾謝機務丞相難之御史中丞博囉為之請上惻然召子師可諭使舉代對曰用人冝出上意臣下舉代恐開市恩覬覦之漸尋有旨以國人世胄子弟就學遂篤意教事奏門生王梓劉季偉韓思永耶律有尚吕專善姚燧髙凝白棟蘇郁姚燉孫安劉安中十二人為伴讀被旨咸驛致之以先生為集賢大學士兼國子祭酒先生之為教精粗有序張弛有冝而必本諸聖賢啓迪後學之方踰年諸生涵飬薰陶周旋中禮講貫適用上喜其業成時自程之越三嵗以改葬親喪謁歸屬召赴行在遂請朝辭以行上命諸老議其去留姚樞謂先生出處有關世運冝成其志更命張文謙問所以告歸之意其對如初始允十四年召議改厯法仍拜集賢大學士兼國子祭酒教領太史院事十七年授時厯成以疾屢告上禮貌隆至路朝賜杖內殿賜坐疾少劇裕皇在東宫聞之為言於上以驛送還師可以河東按察副使改懷孟路總管以便養皆東宫請也且使宫臣諭曰先生善醫藥自輔無以道不行為憂十八年三月戊戌薨於私第之正寢易簀不變年七十三是日大雷電風拔木城中無貴賤少長哭於門商唁於塗農弔於野天下識與不識聞訃慨歎四月乙酉葬李封村先塋之南既葬四方學者來會為位哭墓次而去先生真知力行實見允蹈齋居終日肅如神明嘗遇迅霆起前泰宇凝定不喪執守其為學也以明體達用為主其修已也以存心養性為要其事君也以責難陳善為務其教人也以灑掃應對進退為始精義入神為終雖時枘鑿不少變其規矩也故君召輒往進輒思退方世祖急於親賢而先生篤於信巳以是終無枉尺直尋之意及夫仕不受祿人以為髙則喟然歎曰甚矣余之不幸而有是名也仕豈有不食君祿者哉食求無忝而巳伐宋之舉一時名公卿人售攻取之略先生言惟當修德以致賓服若以力取必戕兩國之生靈以決萬一之勝負及宋既平未嘗以失計為慊世祖亦未嘗以是少之臣嘗觀三代而下漢唐君臣未聞以道統繫之者當世儒宗或智足與知仁未足與居也宋濓洛數公克續斯道然未聞有得君者世祖龍潛諸儒請上其號曰儒教大宗師嗚呼漢唐宋創業之主烏得而有是號哉此天以道統屬之世祖也先生出際斯運一時君臣心以堯舜為心學以孔孟為學中外如出一喙號公魯齋先生嗚呼魯者曽子傳道之器歷代佐命之臣雖欲為此號豈可得也非天以道統屬之先生乎先生之謀國譬之工師受命作室既得大木不肯斫而小之是以寧不受宫師之命而必使學焉後臣之道無愧於伊尹寧不預平宋之功而必使以德行仁之言無負於孟子故中統至元之治上有不世出之君能表章其臣繼述往聖之志下有不世出之臣能贊襄其君憲章往聖之心於是我元之宏規有非三代已下有國家者之所可及矣及夫元貞大德髙第弟子彬彬輩出致位卿相為代名臣皇慶延祐之設科子師敬參預大政以通經學古之制一洗隋唐以來聲律之陋致海內之士非程朱之書不讀又豈非其家學之效見諸已試者歟先生平時頗病文籍之繁嘗曰聖人復出必大芟而治之斯則周衰以來文勝之弊猶將有以正救於其間是豈淺之為志者乎先生諱衡字仲平其先河內人父通避地河南隱德弗耀今贈銀青榮祿大夫大司徒追封魏國公諡惠和妣李氏追封魏國夫人子男四師可師遜師孚追封魏國夫人敬氏子師敬封魏國太夫人賀氏子先生閨門有禮中饋皆賢事公甚敬師可由河東按察副使歷衛輝襄陽路總管終通議大夫廣平路總管贈禮部尚書諡文簡志趣端正惜未究用有文集貽後師遜師孚未仕卒師敬由監察御史踐敡中外歷治書侍御史吏部尚書中書參知政事國子祭酒太子詹事中書左右丞兩為翰林學士承旨知經筵事今由西臺中丞拜御史中丞階光祿大夫明經務誠學尚節概肖父風女三長適于章儒者餘早世孫男六長從憲以蔭纍遷湖廣行省理問以歸德知府致仕次東孫夭次從宸積官山南憲僉監察御史終河東憲副乃先生之嫡宗孫也次從宜太史院經歷中書省照磨今翰林國史院經歷次從宣太保府長史中書右三部照磨官次從宗章佩監異珍庫提點孫女五長適廣東宣慰使都元帥寧居仁封覃懷郡夫人次適太禧院管句覃質次適翰林應奉蕭璘次適寧陵簿張構次適阜城尉張恕曽孫六長崇祖次紹祖祕書著作從宸之嫡子也次書童文童禮童武童曽孫女四皆幼先生有魯齋集及中庸語意門人記載語録行於世昔王文忠公磐論先生曰吾年八十閲人多矣平生力學不知聖道之所在非天與幸幾失此人大德元年贈大司徒諡文正制詞有曰聖學方湮惟洙泗之源是泝嘉謨入告非堯舜之道不陳至大三年加贈太傅追封魏國公制詞有曰天非繼聖學之墜緒則不生命世之大才國欲與王道以比隆肆用為蒸民之先覺姚文公燧作祠堂記則謂五百年必有王者興其間必有名世者出惟公足以當之蓋太祖皇帝建國丙寅而先生生於己巳上距宋慶元庚申朱子之卒才十年當興王之會續傳道之業必有數存焉世祖嘗稱其論事多與太祖之言合至取祖訓示之玄生晚學陋何以知先生然嘗誦諸儒之説而想望其餘光焉先生之於道統非徒託諸言語文字之間而已蓋自慎獨之功充而至於天德王道之蘊故告世祖治天下之要惟曰王道及問其功則曰三十年有成是以啓沃之際務以堯舜其君堯舜其民為己任由其真積力久至誠交孚言雖剴切終以無忤至于其身之進退則凜然萬夫之勇何可以利祿誘而威武屈也晚年義精仁熟躬備四時之和道出萬物之表無事而靜則太空晴雲卷舒自如應物而動則雷雨滿盈草木甲拆事至而不凝事過而無迹四方之人聞之而知敬望之而知畏親之而知愛逺之而知慕求其所以然則惟見其胸中磅礴浩大人欲淨盡天理流行動靜語默無往而非斯道之著形也又嘗竊論之先生天資之髙固得不傳之妙於聖賢之遺經然純篤似司馬君實剛果似張子厚光霽似周茂叔英邁似邵堯夫窮理致知擇善固執似程叔子朱元晦至於體用一源顯微無間超然自得於不動而敬不言而信之域者又有濓洛數君子所未發者焉宜夫抗萬鈞之勢而道不危擅四海之名而行無毁近代元豐之異論淳熙之紛爭先生處之寧有是哉臣玄拜手稽首銘曰世降邃古太朴日雕天吏不作治教寂寥帝恫我民眷求有德世祖齊聖作其建極臣有許公身任斯道為仁肫肫制行慥慥昔公在野世難薦臻精義致用屈蠖之伸心樂則顔志任則伊朝思夕惟天將啓之朋來逺方以辨以問會融一貫冰釋理順世祖居潛時號儒宗多士既歸功德日崇召公起家斯世將泰灼知俊心天地正大既握乾符尊履五位利見大人乃在九二覃懷之居軺車十來屢進亟退求福不回論議上所德容休休獻可替否言直以遒上曰仲平汝左朕丞其悉爾學資朕股肱惟誠惟一以結主知惟明惟哲其止也時初問伐國對不以兵上逺公猷不在宋平官盛既稟公恥素餐敬事後食匪為茍難近臣貴胄世荷國寵我淑以道國收其用小學功隳大學陵節我教多術循循無越維聖有模載範其驅以步以趨疇敢侮豫自古在昔氣化推移仁人之興為世盛衰凡今有生孰司榮悴惟道為大與天罔墜世祖繼天惟天生賢道統有在民彛賴焉有德有言有子有孫皇命作誄貽厥永存至元元年嵗次乙亥冬十一月己卯朔二十六日甲辰第四子光祿大夫御史中丞師敬立石昌初至懷慶府儒學還見一碑道側大書深刻曰大元贈正學垂憲佐運功臣追封魏國公諡文正許先生之里遂下輿以趨才百步則公祠也肅拜而後登祠三楹中肖公像道德之光儀猶充然可挹公之逺孫倫時習業于官端凝朴實先賢之後此固其可重歟因其相禮於謁祠也示之詩禮庭殖殖見諸孫雅度依然似玉溫二百餘年遺澤在光風長滿里中門天順六年八月既望劉昌在河北道書清化鎮去河內四十里居民千餘家前臨沁水後倚太行山麓引泉灌田疇樹藝豐美甚足也昌至之日有父老數十輩來迎且云里中有文廟昌遂趨謁則禮殿僅存殿中設宣聖像四配十哲皆具門有三碑一已斷裂一剝陊惟一可誦乃許文正公子師可為懷孟路總管時所建昌因集里中子弟得警敏俊偉者百人置兩師使讀書其中且戒其父老完繕其門廡既踰年昌再至則煥然備矣又作講堂於殿後以處其教者學者時昌所提學奚止百餘區其庸俗吏雖督責猶視為迂緩弗加葺而清化之父老才一戒飭則完繕恐後文正公德化之逺不益有徵於是哉三歎景仰用記于籍成化紀元之四月昌在修武昌修河南郡邑志令郡邑小學師求山鐫野刻悉録之在河內得里社中廟學碑凡六七蓋當時許文正公居河內鄉人化之其建廟學以事教養者遂致多如此古謂賢者有益於人之國家豈虛語哉昌拜手題於河北道廳壁許文正公神道碑銘歐陽文公作碑髙丈四五廣六尺厚及廣之半四面皆刻文幾五千言以世祖之明文正公之賢而得歐陽文公大手筆以發之此皆曠世所甚難者蓋君聖或不得乎臣臣之賢或不遇遇矣其功業在朝廷德澤在民庶而作者或暗劣不能發其大以究其微使其俊偉之烈無以光史册垂後世此則可慨也而是碑既備矣不謂之三絶哉昌在周南驛書遺書六卷大德十年安成尹蘇顯忠刻梓當時已謂殘編斷簡多所失遺况昌所得者乃録本尤多缺誤故重加訂定為五卷復以制詞神道碑為附録一卷其缺誤之無考者並用略去蓋十之四云昌識中州名賢文表卷六
