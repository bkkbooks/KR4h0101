body:
  text: 中州名賢文表卷二十二明劉昌編許文忠公碑志大元故翰林學士資善大夫知制誥同修國史賜推忠守正亮節功臣資政大夫河南江北等處行中書省左丞上護軍追封魏郡公諡文肅暢公神道碑銘泰定丙寅翰林學士資善大夫知制誥同修國史暢公薨十年矣制贈資政大夫河南江北等處行中書省左丞上護軍追封魏郡公諡文肅又十年加賜推忠守正亮節功臣官勳如故伯子江東道廉訪副使篤將侈君之賜灼公之善範後之承也諗其友許有壬敘而銘之碑敘曰公諱師文字純甫上世居汴公生洛陽大父淵贈中順大夫上騎都尉魏郡伯配田氏贈魏郡太君父訥參汴侯幕一府服其賢注地理指掌圖有詩名公幼警悟貧無書手抄口誦甫十五博覽經史弱冠謁魯齋許先生先生賓遇之髙弟若姚公端甫髙公道凝皆相推友善中原底定慨然有志於世上時政十六策受知丞相安圖補右三部令史丞相巴延南征選為省掾從攻揚州常州下蘇秀臨安歸裝獨載書籍無一長物編平宋實迹上之初官承事郎行樞密院都事重慶叛竭謀畫諾諸城相率內附安西王承制改四川北道宣慰司經厯尋除承直郎潼川路治中拔寒畯王朝綱王伯寧韓伯昌為府史後皆至達官修府治發地得白金五十鋌同僚分公十鋌公獨不受以修廟學傳舍餘作酒器給公用承制改同知保寧路事治尚平簡反側以安擢僉四川道按察司事世皇知其賢詔所至毋敢沮撓給三傳赴上至則擲姦雪冤興學除弊風采一變有旨若曰暢純甫不貪佳士也其令與臺臣伊蘇特穆爾為侣遂拜監察御史糾劾權貴憲綱肅然上所纂農書遷陜西漢中道巡行勸農副使置義倉教栽植闢荒田農事以興俄僉陜西道按察司事時按察改廉訪司精汰舊官獨副使盧公處道暨公仍舊興元監軍怙勢虐肆得其贓奏決之移僉山南道枝江歲防水役衆往返四百里供給尤苦公以江水安流悉罷其役亦都護駙馬之徒大為民害繩其尤者流之改僉山東道入為國子司業教育有規諸生服焉除陜西行省理問始至決滯訟三百餘事若右丞圖們岱爾之訟家財宣使鞏士安之箠折民齒開成同知張德昭之利女財而奪之歸皆強悍有恃官不能制者併置於法引疾歸遷太常少卿轉翰林侍讀學士知制誥同修國史成宗賓天武宗撫軍朔方仁宗淵潛覃懷而中宫屬意安西宰相知其不可乃集館閣議以察向背公與焉即揚言曰此宗社重事詎宜茍且衆皆默然又曰余病矣請歸調治遂拂衣而起仁宗入京始出視事草至大改元詔修成宗實録賜中統楮弊為定一百加少中大夫請郡除太平路總管兼勸農事歲旱當禱公曰聞先旱必裒於民天可欺乎乃捐俸致禱不日沾足當塗民坐殺牛祈雨囚械者六十餘人公惻然曰雨暘愆期守令責也民殺牛致雨爾縱不愧於心尚忍聽其訟乎即破械出之舟有泝流觸沿流之舟致溺其人纍讞不決公亦縱之吏持不可上其議憲司卒是公議秩米收貯盈屋公曰吾家人能盡此乎呼寒士小民恣其取去分憲至郡必謁公曰公治內無事此來行故事爾至屬內曰暢先生治內何敢久留後守為之立祠於學召為翰林侍讀學士階中奉大夫奉敕撰王勃成道記序等文賜白金兩鋌不受尋除燕南河北道肅政廉訪使視事五月歸中書遣編修官冨珠哩翀奉翰林學士之命以請起至汴以疾歸延祐四年丁巳秋主河南鄉試歸次襄縣西顧長安發丘壟之歎因感疾十月朔薨於縣之傳舍某年某月某日葬於襄縣峴山之原配伊喇氏上世遼貴族佩金虎符萬户某之女先公二十年卒兩封魏郡夫人三子長篤也廕淮安路判官轉將作院經厯拜西臺御史移南臺升都事除江浙行省員外郎改僉山東道廉訪司事入為監察御史階太中大夫為今官娶李氏子六人勉國子上舍生年二十七卒勤劼勵績􅀈皆幼女五人次曰騫不仕娶成氏子勛女一人次曰駿娶蒙古氏子四人朂勍助勝篤駿魏郡夫人生騫曹氏出也至元之初際興王之運得賢為盛而文學之士措諸有政拔出流俗藉其在世若魏公者混一來可數也公制行孤潔足以俯視一世立志高逺足以上追古人天下之人莫不驚歎以為異人而不知者造訕騰議公亦不恤也若夫從南征而垂槖歸得地藏而用諸官屢辭上請盡揮祿入雖公小節而其胸次為何如哉高公彥敬為山南副使移文言不可居公上者三謂公官五品先十餘年不可犯積薪之誚渡江孰不富貴至今家僮僅數口寒士無異勢利無一動其心高節清風殆不可及且兄事三十年義雖朋友愛如同生一旦岸然其上實不自安犯此三不義何以糾人之非即日辭去觀此則當時俗化之美士大夫風節之高公之所以致此者可知已朝為侍吏暮徼幸躐數級傲然為長吏為同列者聞二公之風亦可少愧哉公作守得古循吏體執憲有古遺直風至於立朝抗論不恤利害則其較著者也其為學宜專館閣備顧問而中外十轉始為國子司業又出為陜西理問入翰林才一轉官尋又出守再除翰林則老矣豈一時人才之多邪抑當時名爵之重雖如公者亦若是而已邪一技一能與不能操觚而專局至通貴未止者則又有命也邪然而列聖知遇多士推服太史有録太常有諡加贈有號而又承家有子則天於公亦厚矣讀書一過目即不忘假友人宋長編不浹日反之友訝其易公曰豫舊熟之有忘者申之爾友記僻事數十驗之應答如響為文力追古作盧公處道以為似太史公而姚公端甫亦稱純甫實善文著述多而不存藁副使所萃才十一爾其見於世者不專於文也銘曰魏公之出際時浡興挾策見世淵儲遂騰宋木斯拔蜀蔓有艿簡牘既資贊益惟𢎞陶之不摦撫之不搄以隄厥潰以擏厥弸壁求簡編土視金繒皇皇使車爰七其乘善則爾揚愆乃爾繩學政聿修郡績載凝掌帝之制適天之夢大議不屈長江可淜名日山重家不縷增歸來自樂飲水曲肱有介如石有潔如冰峻如絶壁孤如秋鷹弛張玩世中别淄澠夷考其行不渝九徴聞公之風貪懦自懲宰木已拱恩光日升漢江汪洋峴首峻嶒元凱多事慮及谷陵惟德惟神有憺威稜景而前修昌而後承登世于千物莫我敢輘武昌路武當萬夀崇寧宫碑銘武當均州山先名太和道流謂其峻極秀絶非玄武神不足當故更名武當勝國端平甲午兵搖襄漢均民走鄂深神德不能忘鳴於官行武當祠於鄂為沖霄壇制使孟珙禱於神有齊安之捷易壇為觀蓋復崇寧額也我皇元至元庚寅升武當萬夀崇寧宫地據雄峻鶴山亘其後大江朝其前雲關扃深石磴梯危大殿髙堂傑閣危亭長廊縈帶通樓環匝百神胥宇羽流栖息壇壝鼓鐘學館庖廥轇轕錯布仰觀樓閣玲瓏在五雲絶頂俯瞰萬間鱗集煙靄蔽虧若洞庭觀波濤目為之眩而山川形勝闤闠盛麗金碧丹雘高下相輝玊京十二樓不得而見之此亦人境之洞天也泰定甲子又改作玊皇閣凡十二丈深廣相若由甲午迄至正甲申一百一十一年壇而觀觀而宫若葺故若建新幾人幾日幾工幾木而甲申之二月戊午掃於一炬洞真明道沖妙真人住持提點兼領諸宫觀事羅君大震職宫事餘四十年勞瘁已至時當弛擔而彼所謂劫運乃丁其會常情體解氣沮方偕其徒曹大坤等以已資率衆力任其復而威順王實鎮是邦主贊尤恪重起兩廡甲子樓三十一間以其下內半為雲房歲丁亥三清殿成深廣十尋高九丈加舊制三之一又建玄天上帝殿聖像侍從供器靡不僝功而又作亭礱石以紀綸綍運機為藏以待禬禳餘凡締構日以就緒矣昔閣之成嘗屬豫記亡友玄教大宗師間間吳公亦屢為言時待罪政府多事因循遂至今日乃己丑八月書來告其掇拾煨燼有成仍命豫志夫所謂劫運者吾儒所謂數也天地且有數人力之盛神靈之託其能出天地之外者乎其成其毁有不必究者已玄武之祠昉宋真宗我朝至元己巳龜蛇見於髙梁河以為玄武之祥為築昭應宫於是武當之山若增而髙矣是宫之名雖主玄帝而巍然南面朝五帝者實主玊皇玄帝五帝之一也若夫北方七宿為水之神寓形龜蛇者世飫聞矣主之大者盍鬯厥旨玊皇禮家所謂昊天上帝也以形體言之謂之天以主宰謂之帝以功用謂之鬼神以妙用謂之神主宰者不離乎功用而能妙用者也日月之運行風雷之鼓舞山川之流峙人物之生息皆功效之著者闔且闢於斯往且來於斯視之而不見聽之而不聞則有妙用存焉先王之有天下也以為萬物本乎天故祀於郊圜丘以象其形蒼璧以象其色樂九變以著其數猶曰維天其右之其之為言不敢必之辭也不特此也羣祀亦然或求諸隂或求諸陽不可方數徴形狀索也自神仙好樓居之説行遂有作崇臺傑觀以候之者嵩呼之聞巨迹之見真若可以形聲相接而像設濫觴於此矣其始也施之羣祀其卒也於上帝亦冠裳而宫室之矣聖人以神道設教上智昭昭無幽不通下愚蚩蚩既顓而蒙孰為民彞孰為帝衷可使由之而不能使之知也今號於衆曰帝以主宰言其不啞然笑者幾希孰與樹中天之華構揭上帝之髙居使瞻而仰之者舉手加額曰上帝臨汝無二爾心由是而舍惡從善之心油然而生矣是宫之建顯命靈躅祝釐芘民者固自有在而使民觀感日遷於善聖教之助不又多矣乎銘曰岷江東涘鄂城西壁疊巘嶟嶟崇宫仡仡天關失守灰飛瞬息剝胤碩果復根定力噓蜃倏樓琢璇俄室三華屹崒九光赫奕雕梁龍矯文瓦鱗集棟吻雄鼇闌腰雌霓疏櫺綺結飛簷翠濕碧霞騰虛流雲洞闢屛翳擁幢豐隆列戟桂漿釃素蕙肴蒸碧靈霜清厲廣樂翕繹瑶草肥露玊華酣日紫芝已甲蟠桃行實祥鸞朝朝瑞麟夕夕玄龜左顧靈蛇右翼山川開朗神人愈懌物具阜康世允寧謐丕冒神休永奠人極元故右丞相克哷公神道碑銘并序天厭宋金之不能君其民也篤生大有為之君以君之我太祖聖武皇帝順天應人龍飛朔方豪傑雲從四傑而下僝功輩出若丞相鎮海蓋較著者也五世孫僉河北河南道肅政廉訪司事哈斯狀其故請曰丞相奮庸天造名具祕史世莫得聞子孫席世少文封諡稽諸古麗牲有石而無銘封諡在官銘不在子孫乎敢再拜請愚昔長史館與修功臣傳家報疏列至有炳炳在人子孫不能具一言一事者竊嘗譙其後而悲其先也僉憲殖華學穎出羣從思𢎞世德嘉其能後故不讓而筆之丞相名鎮海即稱海系出克哷氏或曰本田姓至朔方始氏克哷曰實克哷族時同名者三因主屯田故加田别之有勇略善騎射從征屢有功歲丙寅長百夫從宗王百官於班珠爾烏納噶河同盟恭上太祖青吉斯皇帝尊號倚注日密晝不釋鞍夜不解帶為扎爾固齊征太陽國賜御馬一破庫楚國汪國魯國賜珠旗金虎符銀印為色勒必總屬官金符十人銀符五十人征塔塔爾欽察唐古哲衮回回契丹女直皆有功承命丕烏里楊歡地為屯田且城之因公名名其地曰鎮海又曰稱海俾公守焉局所俘萬口居作後以其半不能寒者移𢎞州孫塔噶勒察襲監𢎞州及其局風宜春䅘屑供天庖若諸樹藝為設提舉以司之亦以公子孫世其職時諸蕃略定遂南牧至撫州與金將呼察和斯戰流矢中右脅紿其衆謂不傷裹瘡復戰竟拔其城賜白金俾為後證既拔燕都命公登大悲閣環射四矢所至市舍悉以賜之尋受顧命奉太宗登極收天下符節獨公聽留復以貴戚金符官𨽻麾下拜中書丞相偕塔齊爾蘇布特取汴京河南河中裕均蔡得九龍旗乘輿椅蓋悉以賜公中原既定錫恩州三百户為實封世食其賦為置官守始立中書省尚左公為左丞相繼尚右改右相歲乙未八月二十一日薨於家上惜悼不已賜金幣治喪命百官致祭葬𢎞州北阜立祠其上憲宗嘗拊髀嘆曰使吾得鎮海江淮何憂惜其亡矣世祖立極又以公舊部及降虜千人為圭齊命公之孫章嘉為千户曽孫伊埒布哈為百户世所謂十七投下此其一也在干戈中每以進賢為急河西得伊勒吉齊匠官得崔後其子皆為名臣隂陽得田仕至大司徒得儒十三人後皆知名夫人默爾吉特章太祖所賜嬪妃也初克蔡俘金公主某亦以賜公子男一十二人曰約蘇穆爾為扎爾固齊佩金符札魯花赤之曾孫托和齊婁貴齊千户玄孫保保襲中衛千户曰博郭斯從世皇有功雲南為濟南益都宣慰使曰庫哩濟蘇僉憲髙祖也孫若干人曰帕克斯巴僉河東道廉訪司事阿勒坦布哈淮東廉訪副使曽孫托哷靖州路達嚕噶齊僉憲大父也子孫繁衍碑不具載世有恆言飲水黑河最為勳舊公實與焉國史曰托卜齊雅至祕也非有功不紀公名在焉錫户樹官傳之子孫祖宗來可屈指公則二焉即是觀之豐功盛烈雖家乘紀述容有逸略而其皭然大者不可掩也銘曰雲雷經綸屯將作解元氣鼓動大塊斯噫豐隆屏翳相為後先亭之毒之以基我元於赫代工開天伊始同盟黑河有如白水轍環扈征何堅不摧戰功曰多我實有之珠旗揚揚金符煌煌從官如雲君賜以彰天荒既畇有城翼翼樹藝告成百工以集郢律回春奏食靡艱俾爾子姓世尸厥宫族鋒雖利吾忘吾脅恬然不傷嬰鋒蹀血拔燕論功旌以殊禮四矢所至悉公之邸帝曰汝賢其長中書汴蔡底平金社遂墟視功頒賞賜户三百世掌食采有官永額不懲首離優遊考終九重震悼賻腆祭豐𢎞惟桐鄉庸昭崇報有穹其封有侐其廟祕史紀名永終不墜顧是刻文益示揚厲大元故贈光祿大夫江浙等處行中書省平章政事柱國追封趙國公阿勒坦哈雅公神道碑并序江南行臺御史大夫阿斯蘭哈雅致政家居遣其子都水少監摩歡奉家乘請曰老夫賴先世餘澤竊祿位有年而吾父平章公墓尚未表非慢也顧盛滿難居功名鮮終恆懼不克負荷遺羞丘壠君恩如天幸賜骸骨養癃田里年且八􅐆吾知免夫子知我其銘之有壬讓不獲本其狀序曰平章公諱阿達哈雅輝和爾氏世為高昌望族祖裕嚕阿斯蘭托達托達華言巨室也贈中奉大夫河南江北等處行中書省參知政事護軍范陽郡公祖妣伊特戬追封范陽郡夫人考諱哈喇阿斯蘭托達當太祖皇帝肇建區宇國主邑都護發兵攻金斬其長史聞摩勒齊哩有異遣將命偕察喇四人馳告行在且具款誠上曰果如爾言其告爾主以方物來對曰皇帝幸生活髙昌髙昌身且不敢有何有方物復命輦寶貨金織段以獻由是髙昌內附因留宿衛從太祖南征卒於栁城贈資善大夫湖廣等處行中書省右丞上護軍范陽郡公妣雅克塔納封范陽郡夫人公宿衛積勞除塔善屯田打捕提舉不就卒於京師昭回里第年七十一葬城西小南莊之原贈光祿大夫江浙等處行中書省平章政事柱國趙國公配巴爾呼圖克封栁城郡太夫人卒於濟南年八十四大夫時長憲山東護柩歸袝子男二長大夫也次賽音哈雅同僉宣徽院事早卒嗚呼世臣大家上有啓而下有承得以世濟其美者公一門其庶幾乎公性恂恂而志趣超詣由近侍出官非其志也嘗曰我先人有大造於高昌氏子孫必有興我不必為也夫以右丞之賢明畏天之義一介往來舉危亡之國而措之安遇知太祖夫茍引年居高位享厚祿必矣乃鬱而不發蓄而不泄至公又植而不食必再世而後顯是蓋遲速之有時非人力之所能及而啓之於前者固已逢涌而不可遏公卒時大夫已拜南臺御史流澤之來浩乎其沛然矣其浮雲富貴優遊以老宜哉大夫以卓越之才起家監縣為良吏入臺為材御史出廉諸道為剛明使者入中書分南臺為天子重臣歷九朝官二十七轉天下識與不識皆知其名而又躬服儉素衣無錦繡居無華飾榮寵方至退然若虛文皇嗣位聖眷益隆玊帶上尊錫賚相望至為玊刻署押以示殊遇當是時茍假寵於上為先世要美諡作豐碑亦何求不得顧乃自抑若不能加於其先有於其身者必遲回以待於致事又遲回以至於今日不請於上不謁於太常擇所宜為者自為之視世之朝暴貴而夕礱賜碑者有間矣二子長少監也次伊埒哈雅少監二子寶格寶善俱宿衛內廷公生世為賢子為賢父殁而享其寵嘉出於尋常身大官無聞者萬萬也其可銘也夫銘曰於維趙國作德於逸而小心以繹不柔以忮不競以亟以承其先烈以裕其胤息其先伊誰實為右丞孑孑其征屬屬其盈髙昌之望曰命靡常主命不辱而天威肅將輦其金珍篚厥玄黃歸我聖皇以敉寧一方大夫繩武不逺伊邇右丞有孫趙國有子坦坦如砥矯矯如矢維天子使靡不極所止宜爾錫爾山峙川委繄來世之祉城西之原有樹有封刻銘豐碑百世可宗故承務郎江西等處儒學副提舉葉先生墓碑承務郎江西等處儒學副提舉致仕葉先生諱瑞字宗瑞逺祖祖洽宋熙寧間廷對魁天下曽孫廷秀由邵武徙建昌新城春秋擢第官至朝請大夫知桐州言事忤旨仰藥卒子逺宣教郎奉柩歸次采石而溺孫茂祖甫四歲母饒夫人抱以依姑趙趙居而教育之因為金溪人中鄉貢進士舉娶趙生四子先生其叔子也幼尚氣節致力經學以及百家皆得旨要其為舉子業不蹈時習或戒以希有司旨先生曰吾為是區區而悖吾師説乎益篤志為己之學進士公卒先生甫冠資産悉分弟妹而躬耕以食趙夫人卒兄弟四出先生獨力營治久幡然曰昔親在不敢離親亡矣充吾學為揚顯者不力可乎歷甌越會稽琅琊涉汶泗過洛入秦道晉以逹幽朔無所遇最後至遼東世臣洪氏以好儒聞闡義學方難其師有以先生文行言於平章君祥右丞重喜者及見大恱館而師焉諸子彬彬以文學濟其世美遼東之人翕然知向學者先生力也朝廷以右丞薦授遼陽路儒學教授再調大寧路升將仕郎江州路湖口縣主簿攝尉事盜人逸者皆獲之憲司檄按德化縣疑獄即得其情核虛糧決滯訟縣以治聞轉撫州樂安務提領俄請老授前官至順二年十一月二十五日以疾終於家夀八十有五某年某月某日葬某處娶趙氏生子順女適孔景仰繼黃氏生子升寧都州夏河寨巡檢女適湖口縣典史杜復享繼王氏生子大有廕宜春揚橋務提領女適高安白沙寨巡檢孫鐵柱孫男三人縝綱繹女三人先生年五十始出卒能致官而行其學迹遍海內乃得返鄉里至於休致而終於正寢雖用不盡其施而教之振於東善之淑於人者多矣遺文四十卷庸學提要六卷周易釋疑十卷於呼博矣哉中原貢舉廢將九十年江南亦四十年有壬少時先公教之曰金源分裂且事貢舉國家之大未有不行但遲速有時爾力學以俟當有際也時混一才二十年故老尚多幸及從學粗有得也尋以校職從事山北憲貢舉詔下乃棄而應薦先生實主文遼陽科制廢久內地有所不悉遼陽在東僻有司一切昧於奉行先生纖悉教之蓋江南內附時年已三十餘矣習於場屋條制者也監試僉憲田時佐曰微先生幾不能奉詔有壬既獲薦文入禮部經問之奧策問之切見者莫不駴異先生在湖口方鳴金鼓行江有壬歸省臨江遇之中流歡甚至順庚午有壬為兩淮轉運使先生惠然肻來年八十四矣飲食起居猶昔也手寫大學中庸二書注字如蠅頭以與小兒留月餘歸明年遂沒又八年升來武昌請銘將刻之阡兹銘也其誰宜為銘曰於呼先生志一學醇友善行道恥為鄉人昔隘分裂占畢茍安四海既一我轍乃環有韞未襮賈用不售爾不我知我不爾覯晚慕幼安片帆遼東有命自天臯比畀公俊造賓興墜緒孰繹紹逺選公張此東僻樂育嘉惠侏離伊吾糾邑司征曷究我書八十五年口不藥劑禔身所遺根茂實遂旅無所容道路屛營歸來正首於呼先生有元功臣曹南忠宣王祠堂碑至正元年二月乙酉中書臣僚言敕建曹南王阿喇哈祠禮官議視淮安忠武王而祠於集慶縣官給其費且請賜田千畝以奉祭祀制曰可既月王之子托歡由中書平章政事拜御史大夫行臺江南臺治集慶又得躬相厥役以迄於成貽書有壬曰子嘗承詔銘先王知先王莫如子祠落矣願有紀也讓不可乃本其碑擷其家世履歷勳庸之槩曰蒙古扎拉喇氏有贈定威佐運功臣光祿大夫司徒諡忠定諱布色者王祖也贈宣忠靖逺佐運功臣金紫光祿大夫中書右丞相諡桓毅諱額里根者王考也勳皆上柱國爵皆曹南王身皆死於戰有大功祖妣塔本妣穆爾皆封王夫人此其家世王沈毅善戰襲桓毅職中統四年錫銀章虎節仍上萬户至元十二年擢昭毅大將軍以上萬户權行中書省進中奉大夫行中書省參知政事明年以參知政事行江東道宣慰使明年入覲升資善大夫行中書省左丞十六年進資德大夫行中書省右丞仍宣慰江東十八年入覲拜中書左丞相行中書省事階光祿大夫征日本次明州而薨壽四十九葬曹州濟隂縣郭村纍贈推誠宣力定逺佐運功臣太師開府儀同三司上柱國追封曹南王諡忠宣此其履歷嵗己未渡江破宋師於隆興北山中統初討阿勒達爾琿塔罕於河西明年扈征額哷布格於幕北明年從宗王平李璮於濟南四役皆有竒功賜黃金金箙金鞍文錦恩數稠疊至元四年觀兵襄陽明年圍之越六年克之始走宋師安陽灘中綴宋師百丈山卒與策勳焉十一年略地江北奪郢州南門堡獻蕩舟之策渡沙蕪取鄂州泝江陵至鎮江十二年與淮安忠武王右丞相巴延分道取宋王發建康道與宋師戰屢敗之破東壩寨拔溧陽建平廣德西安長興關獨松關前後斬首一萬五千級殺其將杜總管吳奉使許吳二總制及騎將二人俘谷總制張知府禆將祝亮等四十二人十三年三軍會於杭宋亡徇浙東降趙提刑等五百餘人追播福安僵尸四十里殺步帥李世達俘秀王與擇監軍趙由􅀈防禦使林德降安撫使王吉分軍興化禽宋相陳文龍降宋官二百餘人淮兵三千人江南遂平此其勳庸配脫端闊闊倫忽都臺並封王夫人子男二長也速迭兒銀青榮祿大夫山東河北蒙古軍大都督集賢大學士次大夫也女五俱適望族有壬惟古者功臣受封之國先建宗廟於路寢之東所以廣孝而勸忠也諸侯之制二昭二穆與太祖之廟而五太祖百世不遷昭穆則視親盡而遞遷之自漢以來諸侯鮮及十世身享崇爵而子孫不能保也廟制由是而不講矣其有德及生民功施社稷者在朝廷則有圖形以寓其思賢念功之意在其臣吏則有建祠以盡其事亡如存之心亦因時制宜之義也諸葛武侯之沒所在求為立廟又請立之成都後主皆不聽民至私祭陌上以武侯之功尚何靳於一廟豈欲黜私祭以崇正禮邪夫所在立廟若泛立之成都亦復不聽何哉至習隆向充之請始聽立廟沔陽則武侯之得廟亦戛戛乎其難哉皇上於忠宣既立之祠又錫之田思賢念功之盛德豈區區蜀主之所知哉大夫祗順德意克篤前徽勸孝勸忠於是乎在皆可歌以薦者也乃為之詩俾歌以徹豆籩其辭曰乾元統天乘六龍宏材碩德如雲從忠宣天挺間世雄父災子播昏作農帝曰來汝汝世忠奮戈無往不奏功方城雒雒際皇風分兵掎角乘其墉沙蕪飛渡星月蒙順流震擊無遺鋒義旗禮干趣獨松趙孤銜璧吳山空萬邦玊帛四海同台司兩轄昭報功虎符龍節行江東倭奴何物勞蒙衝魂升海隅心九重揚顯有子能始終哀榮典册備且隆衮裳旒冕曹南封石頭城髙江流潨新廟奕奕摩蒼穹主田千畞畝且鍾維糜維芑紛穋穜舂揄釋蒸簋有饛醇醲載祼牲特豐樂備舞兮明禮容神保假兮福祿降象賢世美垂無窮附録有元贈中奉大夫湖廣等處行中書省參知政事護軍追封魯郡公許公神道碑銘有序安陽公居政府之五年一日得請於朝既釋機務將歸省其先塋於洹水之陽以顯考魯公行狀命其友歐陽玄文諸神道之石玄惟方今公卿大臣辭翰擅美無以右安陽公兩都有大營繕諸臣僚家先世碑板咸以奏請屬筆安陽公為榮於法當援吾宗兖文忠公例自表厥考崇公之阡又自書之為宜安陽公堅辭以為不可乃勉敘其行實而銘之魯公諱熙載字獻臣姓許氏生七歲孤太夫人挈之依外家公幼有異質處羣髫中終日持重寡言稍長攻讀書習為儒二十能舉子業有俊譽年及受室娶里中名家外舅仕湖廣行省公欲就學東南因往焉遂為當道所知以行省檄辟德慶路提控案牘由是以本職歷永衡兩路湘潭一州凡三考成資調長沙稅使遷臨江撫州兩路總管府照磨進將仕郎湖廣行中書省理問所知事改從仕郎會福院照磨兼管句承發架閣庫位不滿德而所至稱職吏服其能民懷其惠不可悉數其一二存諸簡書略見始末者若在德慶時鄰獠軼境州將趙往督捕府無它官以次攝事公料丁壯輸糗糧髙城深池備禦有法會城中民飢比馳狀請粟而先以賑貸民用無它虞將士俘鹵有訴非辜宣慰部使者雜譏之渠帥利所獲從旁執爭公駁之云冦徒脅從猶當理出王民躪入賊衆又從而臧獲之可乎上官用其議薄有左驗皆免為民先是公以新進下僚代總郡寄一切興發事皆已出當道意頗諅之冦平吏民咸稱其應變方略有餘又見其面折元戎脫民於殍乃更賞嘆共剡薦之在永永尚巫鬼里社舁土木偶相昏因服食共具以侈相夸民坐凋敝公罪樊侯毁淫祠數百區以窒其妄又撤其材以給黌舍公廨倉庫之府公私便之在衡安仁盜袁舜一怨苦播州餉負險挺亂既誅朝廷宥其餘黨甚衆民有越軍寨為竊攘者有司得之獨以強論不赦公曰彼從盜為亂猶貰殊死此因亂為盜乃服上刑不平請併彼舍之議上卒從其言在湘潭時有范重二者嘗過友家乘虛撢其供佛鑞器以歸友蹤迹甚急范慚怖而返之物遊徼發擲之拘范及友於官公推讞得實既而有赦吏欲墨范臂景迹其身公謂詞未送官物先入主法不涅亦不當錮范卒為良民在長沙征算不苛羡增秋毫歸官在撫州豪民有龔胡者偽造楮幣十餘年轉鬻閩浙聲已狼藉計蹙自首官疑有隱索之闕地得宿用板印繦數皆倍所首獄輸朝廷遣使分道處決龔厚資祈免姻族又助其營救已議減死公持不可曰首寡隱多去末存本與未首同衆莫能蔽乃置諸法末奉祠在京祠祿優暇而年近休致諸子又皆顯榮力請謝事未報得痞疾薨於官生以中統二年辛酉十一月丁亥薨以泰定四年丁卯二月癸酉夀六十有七葬以是年十一月壬午祔安陽武官原新塋許氏世居許昌曽髙巳上金亂失譜祖考隱德曠僚諱信考贅彰德湯隂因從家焉初贈亞中大夫彰德路總管輕車都尉追封髙陽郡侯再贈嘉議大夫僉書樞密院事上輕車都尉追封魯郡侯諱毅妣以孫婦趙氏讓封初追封湯隂縣君再封髙陽郡君纍封髙陽郡夫人進封魯郡夫人姓宋氏公初贈嘉議大夫禮部尚書上輕車都尉追封髙陽郡侯進贈中奉大夫湖廣等處行中書省參知政事護軍追封魯郡公配髙氏萬寧縣尹榮之女初封恭人再封湯隂縣君纍封髙陽郡君進封髙陽郡太夫人追封魯郡夫人恭謹令淑孝敬事姑惠慈睦姻性多愍惻尤樂施豫聞故舊家有喪致廢飲食拯閭里貧病如救溺焚魯公待客好豐諸子隆師蓄書嘗鬻簪珥以繼其資雖居中饋經營彌縫能使夫子處約之久不失令名有古賢媛之風焉至順二年辛未五月庚子卒於揚州夀六十有七由僉樞而下皆以安陽公貴推恩伯子有恆大寧路儒學正調大理路軍民總管府知事篤於養志力於幹蠱魯公年四十不親細故內獲夫人儉勤之助外藉伯子開敏之資日能安居樂道專致教子以有今日先魯公祥之二日卒年四十有五時論惜之娶李繼狄集賢直學士文忠之女仲子有壬是為安陽公登延佑二年進士第初授同知遼州事歷山北廉訪司經歷吏部主事南臺內臺監察御史詹事院中議中書左司員外郎右司左司兩郎中兩淮都轉運鹽使兩為參議中書省事治書侍御史升中奉大夫兼奎章閣學士院侍書學士同知經筵事拜中書參知政事轉通奉大夫以本官知經筵事在位有相業臨事決議不愧古人以封讓祖姑者其初娶景州儒學教授永平趙兼善女金源世科進士家也繼室趙氏銀青榮祿大夫中書平章政事魯國公世延女也並封魯郡夫人叔子有儀經筵檢討武昌水陸事産副提舉娶劉平江知州傑之女季子有孚國學上舍生登至順元年進士第授承事郎湖廣等處儒學副提舉改湖廣行省檢校官娶張繼賈安慶總管汝立女也女二長巽貞適江西行省都事趙彞次安貞未嫁而卒孫男四寶山燕山白耉黑耉孫女五小茶三茶增茶順茶相茶公器識深長學問篤實內行慎獨外交盡忠性不能酒長夏盛暑衣冠儼然書不釋手為貧謀養不擇祿仕間關外補四十餘年僦屋以居糴市以食親故嘗靳之曰君位劣祿薄親年又髙何狷介至是公笑曰為臣當廉何有大小之别記獨不云小臣廉乎宋夫人年二十八居嫠守節自誓迄公成人教育甚至公逮事終身子職無闕司征長沙作綵衣堂以志其樂宋夫人病利力求去職侍疾寢食為廢初喪號慟絶而復蘇旅殯原上苫凷廬墓者三年每晝端坐木下狀如泥塑樵夫牧豎迫而視之始驚為公年踰五十時祭必哭哭必致哀喪禮倣古不用緇黃人始議其儉及送終之厚祀事之豐莫不願習行之既祥非疾病蔬麵不御臨江之除訝吏再四必後其妻孥守丘壠乃去今長沙人即公廬墓之地作書院以表其孝請於中書得永額所植松柏愛護之成林晚歲研精理學易簀之年正月朔日命諸子講周子太極圖説至原始反終慨然而歎因論人世修短有若將終焉之意舅氏宋君寶蚤年擇師訓公遇若已子公迎養以禮有子為娶令族俸入盡以資之始生彰德之東程岡因以東岡為號後更號真拙著經濟録四卷女教六卷尤長於詩有東岡小藳傳於世仁廟初策進士漢人賜緋者十有一人唯安陽公年財二十有九父母具慶時人歆之每以為義方之勸公在會福安陽公官已卿士而公身教嚴厲安陽公出入必咨凛然前修家法公疾禱神謁醫靡不極至公薨貧不能治斂又思得美檟哀慕不知所為朝廷聞而厚賻之始克歸葬公葬墓土未燥安陽公數遷遂至宰輔故贈親之典備極哀榮惟公生平種德行義自厚於躬而逡巡退託未嘗有幾微責報於天求上於人之意逮夫積善之報在理必然則人固莫之與京天亦莫之或違也狀公行者為今南臺侍御史濟南張公起巖志公壙者為今御史中丞浚儀馬公祖常至玄為神道碑三人皆安陽公同年進士嗚呼斯亦他貴臣家所難而魯公有焉銘曰允矣魯公生而敦厖為儒則通治吏不尨儒通不窮若歲徒杠吏尨則蒙乃昏然釭發聲粵禺初武之跫嬰身事衝不震不摐憂民有忡遇事無悚或縱爾於罿或逸爾於鏦或觿爾倥侗或鞣爾幻哤世塗憧憧公志悾悾蒍於渢渢與俗異腔且行且􅼛孰搏孰控盤桓令終德厚信矼荆士景從鹿隱維龎江夏向風黃孝無雙釃河為灉導岷為江溯源之鴻沿流漎漎髙陽豐彤庭堅尨降仲才棟隆仲力鼎扛公也亢厥宗仲也爽我邦洹水浺瀜太行崆㟅偭山為雄厭水勿浲若堂其封堅珉如玒石人載礱其樹如幢仲詞舂容銘諉友憃公當如崇仲盍表於瀧翰林侍講學士通奉大夫知制誥同修國史兼國子祭酒歐陽玄撰翰林學士承旨榮祿大夫知制誥兼修國史趙孟俯書篆能靜處士茅紹之集勒至元四年歲在戊寅八月吉日建圭塘小藳序昔人論文章貴有館閣之氣所謂館閣非必掞藻於青瑣石渠之上揮翰於髙文大册之間在於爾雅深厚金渾玊潤儼若聲色之不動而薰然以和油然以長視夫滯澀怪僻枯寒褊迫至於刻畫而細放逸而豪以為能事者徑庭殊矣故識者往往以是槩觀其人之所到有足徴焉本朝自至元大德以訖於今諸公輩出文體一變掃除儷偶迂腐之語不復置舌端作者非簡古不措筆學者非簡古不取法讀者非簡古不屬目此其風聲氣習豈特起前代之衰而國紀世教維持悠久以化成天下者實有係乎此也集賢大學士兼太子左諭德安陽許公自進士髙等接武而上歷侍從膺藩宣典內制佐政府出入中外四十有餘年其牢籠萬象潄滌芳潤總攬山川之勝與夫推之經濟當世者何莫非學其所取數多其用物𢎞故其所發筆力有莫窺其倪而邐迤曲折且不它蹈則夫冠冕佩玊之氣象信得而徴之矣公大全集凡若干卷簡而出之為詩文樂府若干公題曰圭塘小藳圭塘安陽别業也公之所休逸也花竹泉石超然林壑故以命編云契生翰林學士承旨榮祿大夫知制誥兼修國史張翥書中書參知政事許公文過集序歐陽玄本朝儒者參預大政而以詩鳴者吾得三人焉其一金進士其仕當南北混一之交其風猶有金源之風其一齊魯世家子所與居遊又多京國華腴其詩自有富貴之氣及南渡江漢詩乃清厲其一家本梁趙流寓荆楚筮仕並營其詩蓋負豪爽之資每北渡居庸詩益竒俊蓋安陽公也三參預皆有治才詩其餘事而以鳴者人多其有餘力也至元三年之夏安陽公扈從上京賦詩百二十餘首名曰文過集向余所謂竒俊者殆山川之助歟公才刃縱橫無少凝滯氣機出入雜以譏評用之於政於文皆然獨是集題曰文過余未然之明良賡歌昉於臯陶聲律依永教於后夔世稱相業莫先臯夔曽是以過乎公屬余識之題而歸其集圭塘小藳序圭塘小藳者即至正集而不具録者也圭塘者先生別墅也先生幼頴悟先公自教之趨庭應對詩文立成嘗侍遊見古碑命往讀輒背誦以復同行驚歎謂偶然故試之始信甫冠入京名譽日起未幾擢高科登顯仕著述不廢精敏絶人門生彚為至正集歐內翰謂雄渾閎雋不可以淺見窺有孚仕南臺見江湘間得片文隻字十襲傳玩至有假託以衒者遐方好事不憚請求然卷帙浩瀚諸生應酬不給有孚得先生所輯名圭塘小藳即至正集而不具録者繕寫以應之其居禁近省臺論天下事凡見章疏嘉言讜論具至正集方貴顯時何求不獲而獨留意於文翰今年七十四杜門却掃聖上念老臣優全祿任子官俾得安間至於親朋懇求亦有不免孔子曰不知老之將至云爾其識趣為何如昔子由序東坡和陶詩曰轍少而無師子瞻既冠學成先君命轍師焉夷考其後宦遊四方中被誣斥睽離之時多從兄之日少如有孚者不敢竊比前賢然亦承命而師三十年不去左右開發成就固已不少而憒憒庸庸學不加進年將耳順跧伏祠官步武且不敢仰視而况文章道德之懿哉他日將何以見先公於地下日月逝矣雖悔可追託名集端因以志愧至正庚子中秋弟中憲大夫同僉太常禮儀院事有孚序昌初至安陽與政府參議同試士一生偉然其姿而拙於文參議將黜之昌顧以士之立於世獨文乎哉矧其習於楷法是亦有可取者乃從臾就貢列明日生抱兩畫像詣昌泣而拜曰此吾祖文忠公與太常公像也使昨者見黜則辱吾兩公多矣昌為懸像於堂再拜授生而慰遣之夫事固有偶然者抑孰知其遂及兩公哉士以行為本氣節為輔文固所以飾夫二者孔子不云質勝文則野文勝質則史先民有言與其史也寧野劉昌在銅雀臺書昌欲謁安陽公墓以事不果從吏云墓有公神道碑髙丈二尺餘四面各可四尺皆有字趙文敏公書也昌使之拓墨本以來乃安陽公之父魯郡公墓碑歐陽文公為文茅紹之集文敏公書刻之安陽公終乃無為文刻之碑者蓋是時故老凋謝而子弟亦散遺而遂至此今其諸孫孟敬起進士擢守建康名稱燁然其必能料理其事者安陽公之德澤真逺哉昌在滏陽驛識中州名賢文表卷二十二
