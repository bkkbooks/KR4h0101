body:
  text: 中州名賢文表卷十三明劉昌編姚文公神道碑平章政事史公神道碑史氏自癸酉我太祖蹙金南播之歲尚書都元帥父子相繼轉鬬河北十年元帥死武仙亂故開府儀同三司平章軍國重事中書左丞相贈太尉諡忠武公收其兄兵轉鬬河北又十年拔相衛薄金北門金主奮鋭自將踰河衛實受其鋒太尉再戰再敗其兩帥之衆十有八萬金主度不能國走死蔡太宗大其勛以為萬户俾將真定河間東平濟南大名五路之兵憲宗以戰迹著衛封以衛之汲胙城新鄉獲嘉蘇門五縣繇是故榮祿大夫平章政事公以太尉元子得節度衛憲宗征蜀詔太尉以公從㑹其陟遐太尉還一王召公偕北絶漠留謙州依其儲氏姑居五年而歸先是李璮反誅太尉請裁强諸侯權自今兵民之家父死而子始繼兄終而弟可及其子弟同時竝官者無以職掌小大皆罷之請由臣家以始併辭衛封制曰可太尉一門一日解虎符金銀符者十七人而太尉故所將兵自先朝已解授兄子江漢大都督權戍鄧及是亦解隸他將公無以為者數年㑹故中書左丞劉武敏公拯請伐襄陽張平宋本大集天下兵於漢之南而太尉亦謝政公請立勞軍中朝議猶避鄧之舊軍俾與張蔡公子𢎞範易將始授懷逺大將軍亳州萬户虎符太尉飭之曰戰無後人與築夾寨始猶回逺包山絡野綿亘百里三進薄城應中援外息耗一絶其將張貴突圍出公斬之盡有其舟仗攻樊城先登拔之襄陽隨下賜白金衣裘鞍馬弓矢從大軍南征越郢下復夏貴鎖戰艦絶漢為陳我舟不可越公戲下馬千户嘗隸都督萬衆從上已未渡江請為導拖舟出沙武口入湖達江故丞相阿珠公將二十五萬户為前五萬户擇一人帥公其一帥先諸軍濟江後繼未集與宋將今中書右丞程鵬飛遇殺傷相當公被三創鵬飛七創肩輿走鄂鄂隨下丞相請以輕進撓法罪公詔録其勞賜白金五百兩大軍既東從故丞相阿爾哈雅時以平章分兵圍潭州攻鐵壩百日炮激柵木傷肩流矢貫掌先登拔之以軍民安撫留戍招摩逋殘既集既安入覲加定逺大將軍以太尉玉帶賜物也人無敢服請上之制曰太尉所服汝服何嫌即賜之自是公班諸將獨一品服從攻靜江衆皆轒輼自蔽鑿城將穿公分地獨居炮􅀈所集轒輼不可嚮伺有怠隙樹鈎援攀堞蟻附而登拔之平章北還以公元勳貴胄威名非他將可輩留治靜江初城既兵得剽殺之餘官舍民屋盡於焚毁公賦戲下其視吾為師隙為居第市為列肆必完無茍學校祠廟大其故制猶不能實畫地募民又賦鄉縣之豪析族城居而所居第宏最靜江曰示吾久此不為去計亦制越一竒也民始勞之斷手則屋取傭鬻直已相什百旋為通都民男女為人所奴從主北者或思鄉亡歸拘之有司可籍究者三千人省議欲一切徙來公曰至鄂必分為勢家有託以徙必道亡不達且生他變既止不徙以男女齒相偶皆籍民之乃無敢覬取者行徇定昭賀梧潯藤容象貴鬱林柳融賓雍橫廉欽髙化廣西之州十八肇慶德慶封廣東之州三皆除三年田租發倉稻以丐貧民遣鄭何朱國寶劉克剛趙圭趙修已五萬户戍賀昭梧融雍馬天麟宋景劉君進哈里完顔世英李榮張武鄒瑛閻國順托歡十千户戍潯賓橫容象柳廉欽髙化又以十千户不兼職民則任分而令不專皆便宜假以軍民總管事聞制皆為真當靜江受兵溪洞諸夷既降雲南公曰雍容視左右兩江猶身之有手足今歸雲南度吾不能制必輕為寇入則吾禦歸則吾備是吾不遑一日息兵其界也遣使諭曰汝捨朝發夕至之雍容乃逺託數千里經數夷地不至之雲南何以應緩急或他日爾越界為市諸戍必以入寇加誅爾矣且朝京師路迂皆非計之得者溪洞聞之翻雲南來者五十州後雲南爭之其省平章為書讓公曰吾與先大尉久共政汝不可有吾成功各驛以聞公使先至詔聽公節度升昭勇大將軍廣西宣撫使尋罷宣撫改鎮國上將軍廣南西道宣慰使宋既亡也其將相張世傑陳宜中挾益王是衛王昺浮海趨福州立益王傳檄海嶺之州曰余復廣之東西豪傑啖其爵賞爭起為應裂裳為旗荷矜為兵者動萬為羣公戒諸將盜至以時降斬不得使牢根窟能以衆來者官之盜去不敢求迹平民而深為延誅時方乏鹽發庾下令斬首來者以鹽為購諜言夏貴已復瀕江之州江路既絶不可復北諸將求還靜江計事實欲合勢公曉之曰君輩亦搖敵懼耶就貴能復江不能踰嶺審不可北猶與諸君取塗雲南歸矣今無輒棄戍也省議棄肇慶德慶封併兵戍梧公曰委地徹備適示敵怯增兵戍之劇賊蘇仲集潭之潰軍萬人自王鎮龍山俟嵗事作官軍毒暑不可入外肆為劫而植稼其內歲事畢聞將加誅則僞出降仍嵗為是大為橫象賔貴四州之梗公令四州為堡其界守以土豪日嚴警斥官軍行前縱火廬栅隨以民夫具擔芟禾仲窮來歸猶官以賓之嶺方令走王新立古縣斬李應辰李福潯州由靜江北全永皆城守潭州路絶而永尤急羅飛圍之七月其府判官潘澤民間請濟師公又分步騎赴之大殄其衆永境遂謐後益王死衛王繼立趨廣州壁海中崖山曽淵子以參政開督府雷州公再諭降不可進兵逼之淵子奔碙州獲其兩都統驛送京師遣萬户劉仲海戍雷世傑將萬衆至仲海出竒擊走後羞墮其詐計悉衆來圍城中絶食士皆煮草為糧公抽兵漕穀欽廉高化諸州再破走之用兵海南詔公親戍雷式遏西突㑹衛王蹈海死南海平廣東之户十耗八九而廣西獨完不殘及户賦酒酢算公以嶺南地險而民寡俗悍而産貧征之適急其為盜省是其說蠲之故今廣西並湖南不困後𢎞範入覲請復將亳州兵制可還公鄧之舊軍拜參知政事行廣南西道宣慰使入覲拜資德大夫中書右丞行省湖廣用兵日本詔督造戰艦六百仍送揚州用兵安南詔給糧仗廣西師還草二年約蘇穆爾以中書左丞來而湖廣囂然多事民喪其遂生之心矣以公嘗督海艦費計巨萬大為鉤考毫推縷剔求可中公者無所得乃責償軍民三萬定明年移省江西仍中書右丞又明年拜中書左丞俄復右丞還之湖廣其人已平章恃有援藉怒詈同列辨詐鷙刻師心而行聲勢張甚以公結聖知固謙抑不報强禦者獨不忍以言色侵之凡與處四年拜榮祿大夫平章政事㑹大料民州縣賦紙為籍渠以户率如干為十五萬定可官有之令州縣别方為籍集吏計局程督日嚴將有首償者而赦令下渠猶曰第可原裒求罪耳錢不可貰公以鴻恩之餘宜無深誅不從公則曰最今籍用當十萬定而悉徵之吏將重賦之民民益殫矣渠曰吾徵其餘責償五萬定其逆憑怒當大紛一言從容十救一二民丐其利者此類元惡伏辜可以得為而公亦薨實至元草有八年秋七月十有五日年止五十八性友愛喜施有積必分之諸父諸姑昆弟羣從空橐不愛焉甥姓男女孤者鞠之時其婚嫁力不足猶稱貸為之閨壺不敢干外事與人交襟懷曠夷雖踈且賤不峻陛級不留門廡遊意絲竹尚友東山者老而不衰焉公諱格字晉明聚書萬卷鼎彝圗畫一室號曰裕齊其先大興永清人曾祖成圭晦德其鄉生行部尚書諱秉直實生太尉諱天澤妣夫人穆延氏夫人劉氏儲氏兩張氏子七人耀榮餘未名女二人在室男女孫皆一人公未有子子都督子即耀也篤其愛曰是他日可虞者以從戰廣西勞授靜江同知遷廣東宣慰副使換浙西宣慰副使前薨一年朝議不欲宰相兼將許其子弟世公纍請將耀未報㑹以其喪來明年命下授耀虎符鄧州舊軍萬户即舉公柩與四夫人喪以其年十一月草七日葬真定之真定縣太保莊太尉兆次甫封以榮入覲曰是臣所後父先臣格之子生十四年矣宜代臣將制可授榮仍故虎符昭勇大將軍萬户别授耀虎符拜榮祿大夫平章政事行省福建歸過鄂人故公者感是二子一世平章一世長萬夫符節相煥麾蓋相逐至為隕泣嗚呼可曰良子已客有李裕者嘗以理問官事公江西數千里畢公之葬又奔走京師營立二子其盡義故吏者如何燧亦故公者隧首之碑其可辭銘曰乾文言曰聖作物覩以類從親雲龍風虎乃今觀之匪古專然天於皇輿將畀其全亦匪一聖能同軌轍聖武我祖劗金河北而宋畫守猶江之南留大遺艱待帝之戡孰有有君無其臣者太尉父子佐一函夏父平河北子江之南佩訓其庭無後事慚故橫江流揚楫先濟鼓其孤軍嘗敵全鋭及從移兵潭桂兩州登陴兩先兩後戍留均之為勩而桂尤瘁基屋火餘以完府市走檄所下草有四州胡難而安旋化而仇䲔鯢騰海狐猘陸起威柔四年平始再底捐我庾儲復而田繇方户廣東十才一凋湖廣再相元惡再友吾潔是求孰涅而黝一日霣首公壓宜信天不遺一疾不振難偶者時難立之事難令之名難終之位時天之為餘非人邪易世之難匪哲曰何矧其惟孝不忝世德太尉既老平章軍國公世平章太尉之光耀復世公祖孫相望榮未成童亦矕龍虎歸偃斧丘奚憾之茹載烈茲碑石獸衛之與滹河流相永無期便宜副總帥汪公神道碑便宜副都總帥忠讓公諱忠臣字漢輔便宜都總帥隴西義武公之冡嗣便宜都總帥忠烈公德臣中書左丞忠惠公良臣四川行樞密副使清臣之兄故副都總帥惟益之考中書左丞忠肅公惟正今平章政事惟賢中書右丞惟孝參知政事惟勤宣慰使便宜都總帥惟和同知宣慰權總帥惟純屯田萬户上萬户惟簡惟允上千户惟弼知階西和州惟敬惟恭之伯考今懷逺大將軍便宜都總帥安昌為質永昌王必昌之祖宣慰使元昌副萬户朝昌便宜都總帥夀昌之伯祖也卒以至元丙寅四月五日受諡於元貞二年丙申推至義武卒年癸卯實五十四年祖孫一門三世五公又許連姻王室自餘將相使牧為質猶十八人此吾元有國而來所無者嗚呼不曰世臣之家謂之何哉公王姓由大父彥忠世汪骨族故汪姓金主以甲午正月死蔡義武時即險移鞏治石門山猶行天興正朔明年乙未始下太宗義為其主後來仍金官官以便宜都總帥俾從皇子庫屯征蜀公留質帝所忠烈質皇子所制後令公從征蜀以管軍總領從破文階州大安軍從攻成都入其郛義武陷伏中急公疾戰殺傷數十人竟衛翼而出壬寅以破土番疉州功賜銀符明年義武卒有子七人皇子擇宜世帥者意在忠烈謂公曰汝宜世吾欲帥汝弟而得無後其心乎公曰王未有言臣欲推授為之與兄有異邪王髙其行以公鞏昌元帥知府事丙午以前茅忠南功換金符故事祖宗賔天取授符節悉收還之故公金符亦歸之官憲宗二年壬子償賜之俾權都總帥事明年癸丑世祖以大弟總天下兵既移忠烈一軍戍利州㑹將軍南詔瑪雅臨洮公來趨覲俾督漕嘉陵繼利州餽公造舟棧塗水陸兼行足缺兵籍而恤乏民力始益昌不以饑告戊午憲宗自將討蜀忠烈集諸將問計樓上曰吾州凋傷之餘玉帛無所於得一旦乘輿至左右近貴之臣需求何以為資公則曰吾曹拔身健兒惟有能奬率士衆效死前驅何至為是媚人定死前驅公惟恤吾妻子其責忠烈泫然灌酒地曰兄與諸將薰心誓是德臣何言所孤兄諸將託者有如此酒大駕至利巡所治樓壁橋隍歎曰使非吾戍此敵先之則四川領喉之地可能必歲月平哉遂移師西南攻劒關關之西隘曰苦竹隆慶府治其上西北東三面嶄絶深可千尺猿猱不能緣以上下者也其南一塗一人側足可登不可竝行敵盡鋭禦者惟此而帝敕諸軍攻未至某地無張汝幟自伐鼓督之公前登帝望幟張倡為歌呼六軍和之聲動天地隘之兵民飛崖如蝶前是獲敵張都統仗為蜀導反紿帝曰吾能誘此栅令降遣入行則反為敵用且泄吾軍何地强弱何倉豐餒教使勿下帝為書繫筒箭三射入柵令必生致獲之磔以徇賚銀為兩四百五十潼川府治長寧山攻復先登賚銀如苦竹數加以金幣為匹二十七復移軍東即嘉陵為舟行計輿炮竿巨絙以從公奏無所事此此前塗所不乏者不若舟米數千石蓋此去多稻而求粟無有宜虞以廪病者時蓬州壁運山閬州壁大獲順慶壁清居廣安壁大梁平破竹皆下東南抵合壁釣魚山渠江水㑹其下石邑入雲其帥王堅據不即下炮矢不可及也梯衝不可接也帝欲乘拉槁勢不棄去而必拔之故久蹕此時暑我師疫矣忠烈卒於軍公泣集將佐議曰吾季卒軍馬革裹尸與國責塞子惟正雖未弱冠宜世衆曰公言是公言是願奉以代為帥其秋世祖中統之元制以公為副都總帥從所志二貞肅同戍清居去順慶平土二十里西北東三面環江北江殊回逺不可為池南依山而壁平可馬上無大艱﨑其南即合敵出入吾界無時於兵法為交地公又孑身受之開屯田練軍實遙候斥詗强鄰入必摧壞其軍不令棄去後詔貞肅還鞏昌公獨保戍三年璽書褒大之又換金符三年秋抄䕫府獲其團練使鮮恭知府張甲及路分二人斬刈千馘獲遺甲仗寶幣不可資計入覲賚以虎符銀章銀幣如長寧之數而加金為兩五十副以鞍勒弓矢衰其從者且以久勞於邊代以忠惠還之鞏昌俾副都總帥由行省受命還得疾秦亭歸至古漳故第而卒年止四十八其年六月從葬古漳先域為性安恬出言質直如其心事隴西郡夫人母包以孝聞友諸季終其身竭力彈才羽翼之人無可間總帥府屬郡二十四事至殷也身自為與從父副弟副猶子三世時得專殺未嘗妄笞殺一吏一人然至臨敵決戰上馬挺槍離陳先次巧捷若神當者紛披莫有我禦其弓矢竒中可方古人憲廟出畋遇虎命射之一發斷其吭帝喜至解所御金鞍為賜夫人故金蘭定西㑹德順五州帥張雲之女惟益才世副都總帥二年而卒一女適鎮撫帥府張文煥老將之從公者每曰公為人信厚安昌必昌復信厚可曰善世其家者由安昌求銘公碑燧思於公與貞肅所戍之地無不至焉淸居之不可恃為固者前所以言楊氏張氏蒲氏皆行帥府大獲運山大梁平故地與便宜其時目曰四帥府淸居南迫合獨受敵鋒為三帥扞蔽他日專劉帥戍移貞肅南九十里夾嘉陵東西築武勝軍毋德章兩城距合為犄角然晝則出邏設伏嘗待進戰夜則畫地分守衽革枕戈篝火照城達曙以防竊入一話一言無敢忘戒况敢抽兵邀利他求為哉惟是軍當其衝衛故三帥反得歲以拔敵柵壘掠敵府庫劉其人民逞志於忠涪䕫黔萬施雲安之間上功朝廷用事之臣第知三帥立勞之多而是府獨寥寥也終未有能明其然者又貞肅去清居敵夜大至火民居縛劉帥去鑒夫人之失如此則兩公戍而克完者功不大哉凡此或者貞肅碑所逸故發之此銘曰椒聊逺條求今之世方漢金張才有汪氏隴西開國義武肇之義武之為不怍倫彞忠讓忠烈忠惠貞肅遞芟川凉力協謀一繼繼其來將相之多不符垂躬必斧手柯歸覲私廟庭笏駢羅公以其序大宗義武於弟以子宜不降俯乃推俊功潛不自張等翊吾家聞命即行安流洋洋如水就防所由不年其盡瘁致子而夭閼歸以何戾彼蒼者穹監下而公惟我皇上心靡不同疇德未報未隆何功三紀後公一朝哀崇公有令孫人曰公似雖華其年已踐公位古者大宗合族恃之祭求其膰尊祖之思胥是冡㫄可萬家邑表阡有碑車過者式興元行省瓜爾佳公神道碑元貞二年二月資善大夫河南江北等處行中書省右丞臣戬香言往歲臣待罪於外伏奉明詔㫄求勳舊臣僚封拜奏對各上其事以備纂修世祖皇帝實録資用刪取者臣喜伏思陛下先孝四海發揚前休皆使下臣依光日月誠曠代之希遇謹已次寫臣祖昌格臣考䝉古岱出處始終為一帙上史館而臣之先汗馬微勞其槩已此何敢上比磐石宗臣勳舊自名惟與劉氏布琳哈瑪爾再世父子來比之初義同一體今焉二臣已各受諡忠順忠惠增賁墟墓臣不援陳恐使聖澤獨漏臣家敢昧死請制曰可萬户招討使昌格贈龍虎衛上將軍封定襄郡公諡貞敏妻奧敦氏從封定襄郡夫人興元行省䝉古岱贈榮祿大夫封沔國公諡忠靖妻耶律氏從封沔國夫人制下山南之民聞者咨嗟泣下曰公卒明年興元屬縣及州若洋成固南鄭吏民伏進德茍德炎張自顯李顯輩若干人疏公平生立秦憲庭願一上聞許廟事之而竟未下豈天以是忠靖為賜額耶嗚呼有待哉公瓜爾佳姓女直人其地古肅愼氏之國訛為女真避遼興廟宗真諱改為直太祖之加兵金也歲壬申五月劉忠順公與定襄公將兵千二百人來降詔以其衆即守威寧十二月金主遣使啖以大官冀其或二可復失地定襄縛使以聞詔嘉之擢為萬户招討使人有擾爾民殺之傍郡縣未至者諭使急下事有便宜不待上聞一以詔行之凡鎮威寧四年以歲丙子卒沔國公嗣萬户金符生十四年矣戊子太宗詔從太師國王戰河東山東庚寅睿宗拔鳳翔明年從破宋大散關夾嘉陵漢水如鳳沔褒大安興元洋金東抵均諸城皆拔壬辰大破金兵鈞之三峰山不能國矣詔徙六州民留田威寧時天下荒饑獨山北為樂土四方之人其來如歸乙未詔從塔海堪布征蜀田事宜遣官屬何人攝治者以其名聞乃表今湖廣僉省髙安之祖額圖琿代領明年凡四川府州數十殘其七八明年公上言興元形勢西控巴蜀東扼荆襄山南諸城無要此者自始取道滅金漢中無歲無兵其地與民吾棄不有敵不敢復城郭隳而弗完田野薉而輟耕民窘艱食時吾兵來扶戴白以負嬰黃偷暫生活竄栖太白窮谷之間吾去則壯者出為盜賊肆相奪攘甚者仇而殺之而生齒益耗誠能留兵戍守招徠未降民見父子不分貨財之得有也其至恐後為擇良腴便水之田授以耕耒假與種牛俟秋穀收什稅四三儲之於庾守之以吏征蜀之師朝至而夕廪諸校以資糧關中荷擔千里十石不能致一者勞費大省實制蜀一竒也制可詔都元帥量留漢軍其新至之民及田事可無時藉數具效以聞仍錫虎符是月制諭令安撫興元軍民制又以為安撫使一月之間二制併下定宗詔行省興元公至行之如所奏策城塹內治堡壘外增鼓柝烽煙傳警日夜千里不絶市肆村舍民廬數萬區悉起於蕩焚之餘墾田數千頃灌以龍江之水收皆畞鍾敖庾盈衍矣官舍居第皆髙榱巨棟重楶牡瓦宏壯竒麗可百承平舊宇之上亦志不茍然也其土豪傑如洋之趙再興成固張廣南鄭伏興褒城薛仕成西縣楊濟廉水韓仲炳小黃栁智德潘水薛閏皆割裂自霸昔為吾寇者也至是皆入所據於郡縣宋邊驍毅之將馬仲自閬張文貴自巴李繼之自廣王安斌自開達亦挺身歸公腹心仗之指臂使之或說曰反虜無親宜有以虞未可日置左右公曰彼哉人也未必狙詐或如爾言誠狙詐也吾仁結而義激禮接而信示何有於不可化宋害其來反時放兵動吾四境屢戰殲之辛亥四川制置使余玠輕我師寡身率兵入寇敗我利路元帥王進於金牛壁其軍中梁山兜零夜燭城為之赤潛遣禆將燒絶棧道遏我援繼自率大軍圍而攻之鈎炮梯衝環城數匝謂為孤危期日必拔新集之民還叛與敵公誓死拒守督戰益急殺傷過當城中將吏晝或荷甲傳食夜則畫地分守㑹都元帥圖薩來援無從得塗值三人自軍所逃還許貰其死令導由他山刋道出陳倉玠聞兵大至焚圍遁去公襲戰悉止還所俘亡故事祖宗賔天所授臣下制書符節悉收還之太宗嘗賜虎符已歸之官及是憲宗授以軍民萬户再賜虎符詔敘平金戰勞蓋睿宗所聞太宗者今賊玠至汝共事臣皆避逃獨汝戰疾力斬敵十五勞苦至矣自是凡千夫長百夫長十夫長下及僚吏敢有違其節度者罪死丁巳詔與故劉忠惠公哈瑪爾立成都七日而樓堞隍塹皆具戊午同故元帥紐掄南征踰馬湖江戰皆捷蓋先是乙卯世祖以大弟總天下兵公奏漢中之田闢已十七而稅入恆病於逋懸其故惟在軍民之官豪有恃者率頑驁負而不輸顧臣力莫如何也下教若曰自今軍民之官田不稅者無廪糧是年下教若曰往者興元軍民俱受買住與汝節度今買住征蜀比其還也汝專節度之中統三年改授虎符制仍軍民萬户四年請以今左丞戬香嗣致仕家居十一年以至元壬申九月七日終於興元其第正寢春秋七十肇於南鄭味溪之白雲嶺為兆以其年十一月九日窆之壬舍男十人女十人男孫十一人女孫八人嘗聞太祖賜威寧之詔裂熟羊革而書之揆以漢氏功臣之誓曰使河如帶太山如礪國以永存爰及苗裔而已無有事不上聞聽以其言為詔行者及定襄卒而公嗣克光前人轉鬬太山之左右濁河之南北﨑嶇數千里間者十九年非睿宗奏是功太宗太宗不知非憲宗舉而揚之於克完漢中之詔則是奏天下不聞且他人樹勳於開國之際其桓銘私傳皆出一時史氏之手其間有善於紀述者後者猶掇其蹟刪為一代之典况祖宗垂法萬世之顯謨乎則公父子身荷二祖三宗及今皇帝生榮死哀六朝之殊遇何如也又漢氏功臣子孫冒守先烈者惟一人侯獨長沙王支庶一門數侯然或先後受封非必昆弟竝時今公諸子或拜亞相於中或列藩方於外或總戎旅於邊冠紳之蟬嫣符鉞之焜煌則縣官覆護之俾流慶遺𦙍者又何如也銘曰維公早特童子植植既失定襄荷其殳斨與老戎行右頡左頏於河之外於關之內突而前茅無少挫退金社墟矣庸蜀是劉掉鞅之遙九圍半周再鎮雄藩益暫梁久金穀穰穰斧資在手施陽翕隂舒慘自口為艱為勤列聖不忘報之富貴倍蓰其當大府如城雲屋邃邃朱塵綺疏歌鍾清吹矊目脕顔頤使趨風良庖致餼胎豹跖熊酒酏介歡䔲荈雪滯紈衣四序為聲綷䌨昧者安之耽不知還公時白日未薄西山解兵其子時稅於野毳廬氊車勝地即舍維嶓之麓與沔之水往往禽魚識其杖几乃知喬松可召與逰徜徉十年歸安兹丘評者異之於古未有紛華寂寞枘鑿不受公而兼之始愼終全由哲其身匪隲自天人之蓋棺旋踵朽息公有哀褒於沔開國生平之名赫其益昭矧子維翹丞弼兩朝無久維石莫信者史一刋不磨用告無止真定新軍萬户張公神道碑公既卒於戍所衡州之明年而夫人亦卒其中子世其真定等路新軍萬户塔爾禪者將歸葬其鄉先塋由是軍受湖廣省節度請告數數終以故事職兵之臣無聽喪葬之文不得命乃曰父子之有在君臣先其敘則然未有責其能忠而禁其為孝者吾今何恤俟終二喪畢葬小從而奪虎節大置於理一惟命竟窆而還凡聞者莫不稱咨其能拔流俗善於子職無少老一喙焉又曰公之遺烈今雖在人口耳不鑱之石久或遺忘來者或不聞託以計事至鄂持興國校官陳松年之狀來請銘燧思昔二荆憲由糾郡常德公時戍是暇則相過年已六十五修幹魁顔白鬚蝟張虎目虎吻大掌巨踵望之森然氣欲搏人談其平生蹈危奮先大小之戰數十嗚呼俾聞風飇鼓鼙闐闐矢石餘軀老而不懲者從可知哉則於公為知死今懷逺以佳公子侍傍又為知生在古人皆當傷與弔者乃三復是狀嘗善松年之能史惟末憾曰濟江將臣功者皆相而獨後公方人固然於及天之厚公者則若未也蓋列聖之制職兵民者死其子孫皆世之變自世祖奪職民者符節易其故所死其子孫廕而不世惟職兵之臣萬夫千夫百夫長者父死子繼兄終弟及世其符節雖漢祖侯功臣之誓曰黃河如帶泰山如礪國以永存爰及苗裔何以尚諸其有相而兼將萬夫者詔俾自擇為之欲將棄相欲相棄將故其時有寧棄相而專將者豈不以相能振耀一時未若既將可傳子孫繹繹無䆒乎幸公未相相而亦蹈是轍矧他人之家世才一人而懷逺元兄忠顯校尉管軍總把珠音從公戰鄂之通城獲於敵死之及子和實特升千户仲兄史閭亦懷逺大將軍戍瑞州等處萬户獨一門三人金符虎節千里連州相煥以華則天獨厚公者豈不多且遐哉松年憾者恐復為公九原所幸也公諱興祖姓張氏中山無極人曾大父大父不仕父林趙州觀察使改節度判官丞相贈太尉史忠武公為萬夫日𨽻其戲下太宗賜金符千户老以公世從大將察韓征淮南能以少兵擊破其軍虎頭關大將壯之賚銀為兩百聞公於廷賜人馬介胄裝具宋開山南東道制閫於襄陽反寇洛西殘盧氏永寧殺縛其守長憲宗詔以漢地兵專受命世祖潛藩始置經略司於汴屯田河南諸州以忠武為使忠武兄之子江漢大都督權為屯田總管萬户宿重兵於鄧去襄不二百里兵信宿至城下鄧甓其城塞西南二門不闢吾袍甲車道屬縣新野西港盡鈔於敵府摘公將兵三百騎與步半追之及之栲栳潭令騎負一步敵奮殳斧謀折馬足推步下騎為陳以待分騎為左右翼合擊敵錯愕無所於應盡殲之完得所鈔戰次馬嬰橫尸而顛復騰而上不知左股之折已戰流血滿鞾裹創輿歸府迎賚銀為兩百錦二端曰未足旌勞資市藥也後敵攻新野又大破之白河口中統建元從史經略樞援東川假以總管戍東安虎嘯一年還鄧戍光化州漕安陽灘禽唐都統㑹中書左丞劉武敏公拯開用兵端大集天下兵圍襄陽從城鹿門江西諸壁戍焦山敗宋援將張順江中殺溺過所當攻樊城督造梯衝又戰江中火其戰艦斷襄陽援樊拔移攻襄陽城東南當至元十年凡圍六年襄陽下功升總管再官懷逺大將軍副萬户明年詔故太傅巴延以左丞相贈開府儀同三司太保並國武宣公阿珠以平章左丞相阿爾哈雅以右丞將大軍南伐浮漢而下郢治漢東築新郢漢西鎖戰艦兩城下夾以炮弩橫鐵絙江中大軍擊拔郢北黃灣壁公實先登矢貫左股丞相手傅藥拖舟入藤湖逹漢越郢去從攻沙洋新城拔而殲之皆負創先登矢又中額三捷功聞錫虎符從戰漢陽之沙武口陽羅堡生獲其將鄭信矢汰左臂漢鄂既下太傅將大師東右丞留後抽十六翼兵俾公帥戍漢陽公曰吾戰是求而顧責守誰不能守則無所施吾所為矣右丞則曰漢鄂乘輿所至視為衝地非材武足以先衆者不可使撫安之不得已往戍聞荆閫遣安撫高世傑將兵規復鄂從右丞逆擊走之荆江口世傑窮降詔移軍江陵從攻沙市因南風縱火樓柵皆然前登戰城上又戰城中蹀血濡跌殲其軍江陵精鋭於是焉盡安撫高達以江陵降制置朱䙫孫不出詔以世傑戰而後降非其始志斬江陵市䙫孫死京師猶沒入妻子為官奴婢而籍其財右丞功拜平章政事移軍潭州公為鄂分省計事潭留使督攻西北凡三月破石心臺敵植木柵自蔽或曰火之可入公曰火易沃滅柵必復植且吾師暴處城下三月士咸仗兵立寐不如炮之使敵不能隊立得廣途期盡十日肉薄而登可以逞志平章是所䇿十日公果前登樹旗陴墻諸軍呼聲動天地平章抃賀謂諸將曰非用張某言而屬猶坐城下安撫李芾殺妻子火廨舍倉庫而死潰軍集城西陳江岸公涉淺方仰擊飛石出城傷頰墜水面血及足出戰益疾竟走其軍功聞進官安逺大將軍略地衡永全桂陽諸州撫其來歸而誅其弗率又從平章移軍靜江四十日拔之宋餘孽益王爵人號年海中曰余復海嶺諸州相煽以叛潭之羣盜在在螽起平章謂公衡永全桂陽諸州與潭屬縣汝昔略定盜今復蔓汝其芟之殲文才諭七寨斬祁陽令羅飛主常寧簿黃必達磔周隆張虎新化降其黨蕭隆劉監軍凡馘受僞命二千九百七人縛從賊百五十人安集劫脅二萬三千九百家常德路總管謀應僞先事亦縛斬功聞進昭勇大將軍招討使監歸州位總管上又移監常德仍招討位總管上西南夷為梗初詔征羅氏鬼國㑹其既降未至而還後征亦奚卜薛降之以其王阿哩入覲賜衣服弓矢鞍勒公平生射虎數十一日遇虎一發而踣語其友曰生虎之髭剔齒疾可已風拔之虎怒爪鞾裂賴其氣息垂盡不能傷足由是人名公者則加殺虎於姓上至是以國言賜名巴圖尋詔萬户各解使職故公罷招討惟以萬户將真定新軍省檄戍衡茶陵耒陽常寧兼督平永寶慶武岡盜馘其跳梁者二百四十五而伍其汙民責使屯田故來者不失業公尚氣重諾剛不可以威强屈平章始終相從西南者見其不可衆直之醉或腰刀行酒平章避入後閣曰公醉矣戒左右善扶出遇契已者視意所欲與之不少愛焉其時諸將或集皆下之無有位其上者卒以元貞元年乙未冬十有二月七日年七十五夫人卒以明年夏四月十有七日年七十七葬以大德之元丁酉於其鄉宋村九男長忠顯次戍瑞州萬户次鵬翼僉嶺北湖南道提刑按察司事次真定萬户皆夫人李出餘皆幼一女適常某五男孫長武略將軍世千户者金符餘幼六女孫亦幼銘曰詩歌虎臣闞如虓虎不聞拔鬚視等麀麈以之膽膂秉旄遐荒宜一西南百年未疆荆州之域連城數十襄陽武昌嶽及江陵長沙桂林取皆以兵餘郡傳檄反虜起伏介胄九年晝夜弗釋登危摧完戰必前列荆域底寧移兵夷洞來其降王槃瓠遺種矢石瘢躬元戎奏功大帝一聞一官以庸逮其入覲嘉名天訓乃省在笥華其衣裳又敕尚方叢矢象房魚服韔弓雕鞍金勒歸馬蹮蹮亦爛其飾雖古方伯得專征伐錫命之多將不是越憲憲其勞授報既多蓋棺龍光遺𦙍尚荷二長萬夫一千夫長今代一門三將誰兩矧是萬夫一戍燉煌一殘闍波鯨海是航雖基公陛亦遐以勩無羞前人亦曰克世兩間之堅莫石惟年可磨不磷載銘以傳潁州萬户邸公神道碑公邸姓保定行唐人諱澤字潤之曽祖亨祖義生考府君諱琮金符總押真定大名河間西京保定洺磁濵棣七州之兵戍睢州以卒公年十一世將是軍七年去城亳鹿邑避河流齧移戍潁州城久掃葉翦荆以茇隍塹樓堞官舍民廬皆所經始宋黥將夏貴夜悉鋭攻東南壁公將射士當之大呼疾戰矢下雨注又虞士氣久用將奪戒司更促其漏丙夜伐五鼓敵以為旦出竒騎擊不利客兵騰藉奔潰積骸如京創此大治始不輕犯戍是十四年世祖即位如故事盡收臣下先朝制書符節故公金符亦入之官明年制賜還之至元入覲賜錦衣弓矢鞍勒用兵襄陽將是七州兵半以行太保並國武宣公時以都元帥鈔鴉山拔平塞寨功最幕府賚白金為兩五十金衣一從城長圍襄陽六年當十年癸酉乃下明年從太傅巴延公時以中書右丞相督大軍南伐至郢初宋遣殿帥范文虎將兵援襄陽度不得進為城郢備鎖戰艦江中列炮於岸遏我舟師下令蕩舟黃灣逹藤湖入漢越郢去從拔新城沙洋下復師由沙武口入江從戰青山磯多所俘馘鄂隨下行省論功行賞賚白銀為兩三百明年留故左丞相阿爾哈雅時右丞分省守鄂大師其東從右丞分兵下荆南功進武德將軍管軍總管又從攻潭州流矢貫肘汰股裹創復戰城拔進顯武將軍明年從攻靜江炮􅀈傷首岑岑垂絶已日乃蘇既拔從省還湖南其年宋亡陳宜中挾益衛兩王浮海據閩爵人號年規為興復幸利之徒在在起應而羅飛張虎周隆尤其梟桀屠殺長吏劫民為兵動萬為羣阻山為寨以抗官軍衡永路絶公從酇平生致三渠褫皮以獻進懷逺大將軍萬户虎符俾將其軍監郴州位總管上至則平郡賊蕭良弼刳兵之餘城中户才四百布檄招徠安集之內則基屋火餘外各復産其鄉期年將倍萬家孔廟尚茅屋擢進士左元龍為校官佐其工材俾任興葺稍如平時州界韶􅌕遏韶寇不窺宜章而興寧之民效惡􅌕盜聞宣慰司將調兵萬人加誅未啓行公衝焉摯金帛即說曰今盜始起而從徒未繁官軍遽入民懼俘殺必出逋逃無所適歸勢與盜合是驅使為逆也請歸身任致討許之乃歸召父老豪傑曉曰吾止官軍不使得暴吾境汝佃民有從亂者不以相坐聽執送余自贖得五百人惟誅首事二十人餘悉縱還南畞連三大役始得占城之師人以深蹈死地忿怨無施所經城市肆行剽奪瀕道居民十室九空六耰種絶至郴亦然公捕得為暴數十人械送軍中詰其部將威令不伸皆市杖之其徒一夕潛遁踰境再以日本之師責造海艦十五艘度費楮幣為貫七十五萬取材有制戢吏侵牟用未能半事已告集後以交趾之師賦餽米千石入桂公曰自是入桂陸行千里負擔之民人勝五斗而止已二千人為擔夫負裝糧者半是行未中道委負而逃可前知也乃集丁之家謀曰吾將出家資責諸縣即桂如數糴入上不失軍興而下可紓民力何如衆歡呼稱願他日比貸錢加子來歸公悉還其贏又請罷淘坑銀鐫户賦酒醋歲荒發廪而後聞皆良政也又遷廬州䝉古漢軍萬户郴民耄倪號呼遮留如去親戚未至改潁州萬户戍無為軍至是七路之兵全集戲下而軍容並盛盜起江東省以公威信著譽檄公以其軍討之饒信先譬以禍福皆不煩兵而從宣徽怙惡乃夷萬人於南陵旌德涇縣又鋤萬人於績溪績溪尤劻勷壁何秧塘山山周十里峻二百丈省臣以六萬衆攻之數月不能下者因留戍徽兼拜都萬户之一軍徽民方安之尋還無為省議餘杭勝國故都非得如公老將一軍遏而間之綏而安之不可故移戍杭以草有八年其歲辛卯夏六月二十有一日卒年六十三平生忠直沈毅讀書專經左氏春秋故能謀成而事立臨財不吝施豫有積則均之昆弟姻戚其再至潁故人部曲捐金委帛致殷家及疾或在告計日辭祿後卒十三年子武德將軍潁州萬户戍杭元謙紹介其友劉致持事狀為書燧曰先公之匶藁藏潁濵今將舉歸先塋數宜有碑不得君銘恐勳勞不足以信來世敢泣血請故銘敘此嘗聞國初以二萬户鎮撫中夏右則劉巴林軍秦左則鈕祜祿重山軍燕顧成則益太尉忠武史公天澤為真定河間濟南東平大名五路萬户於中後强諸侯頗以力夷惡相下屬皆求各將其軍而千夫之長亦覬得焉由是萬户布列天下其權雖分然父死子繼兄終弟及相傳虎節一命三品世世不絶則未始變不若治民治賦之臣者死子孫以門功官自下而高如升階然所可儕比則國家責以捍侮四方勸忠而收其死力者豈不至且逺哉觀公造家譬則為山嗣睢總押其覆簣也於時是官未必視長千夫何以言之從下荆南勞亦夥矣授以總管得以千夫之長同祿轉而西南勍敵是膺堅城是臨莫不賈勇奮其前殳顧以是身干鹵三軍入百死而一幸生遂長萬夫比德開國大藩諸侯殆成功九仞者其為丈夫亦壯烈矣然非憑夫大帝赫怒有是南國用武之地技安施哉此太史公贊蕭曹輩為依日月末光隂符所謂天人合發者也三夫人元配郤氏嚴於持家前卒草有一年繼配兩王氏姊娣也前卒十年姊顧為繼後卒九年三男元謙以佳公子既世虎節好學而文雖居時平營柵部署器械車馬凛如在敵又識世務省訟難惑多資平之次元泰元恆四女適郤長官子璧閻令子齡鄭元帥子端仁萬户賈榮祖三男孫長禥幼未名二女孫銘曰嗟若邸公初由羇童嗣秉父節睢及鹿邑凡戍十年强敵尚逖城潁而南地交壤鄰黥將未嘗時已能軍寡謀輕襲大北其羣㑹帝考貢曰是南紀於何菁茅曠入包匭乃畀丞相百萬蒸徒江漢滔滔鼓枻以浮分徇坤隅置公前驅登陴長沙桂林入郛大惛小悖剪無稽逋從戰萬里清楚以吳歸撫其軀矢石遺餘嘗曰臣子居則有異移孝為忠其道豈二當在父側子職焉恭寸膚之傷盡心瘝恫及身而將三軍奬率鼓鼓以前顛首奚恤維公懋功其賚何如虎節皇皇雄長萬夫上昭祖考下傳旄綮子孫其承世守無止匪直克忠孝疇大斯以語燾後幾何其慈宜爾有子踵武之踐四十已聞愼保垂憲爰發潁匶歸從先丘烈勳於碑貽久是謀中州名賢文表卷十三
