body:
  text: 中州名賢文表卷四明劉昌編許文正公書牘與竇先生書老病侵尋歸心急迫思所以上請未得其門也邇來相從實望見教不意復有引薦之言意一作圗聞之踧踖且驚且懼邸舍中懇陳所以不可之故至於再三始䝉惠許違别三數日復慮他說間之不終前惠是用喋喋重陳向來懇禱不可之意嘗謂天下古今一治一亂治無常治亂無常亂亂之中有治焉治之中有亂焉亂極而入於治治極而入於亂亂之終治之始也治之終亂之始也治亂相循天人交勝天之勝質掩文也人之勝文勝質也天勝不已則復而至於平平則文著而行矣一作平則斯文可以行矣故凡善惡得失之應無妄然者世謂之治治非一日之為也一作治一日之為乎其來有素也一作漸矣人勝不已則積而至於偏偏則文沒不用矣一作偏則斯文不足以紀矣故凡善惡得失之迹若謬焉者而世謂之亂亂非一日之為也一作亂豈一日之為乎其來有素也析而言之有天焉有人焉究而言之莫非命也命之所在時也時之所向勢也勢不可違時不可犯順而處之則進退出處窮達得喪莫非義也古之所謂聰明睿智者惟能識此也所謂神武而不殺者惟能體此也或者橫加已意欲先天而開之拂時而舉之是揠苖也是代大匠斫也揠苖則害稼代匠則傷手是豈成已成物之道哉即其違順之多寡乃其吉凶悔吝之多寡也生平拙學認此為的信而守之罔敢自異今先生直欲以助長之力擠之傷手一作不救之地是果相知者所為耶一無此一句有是區區者所望耶像然畫餅居之自若又豈區區者所敢耶二十三字無益清朝徒重後悔豈交遊之泛不足為之慮耶抑真以樗散為可用之材也一作助相愛之深未應乃爾一作何必乃爾若夫春日池塘秋風禾黍夏未雨蠶老麥收冬將寒囷盈箱積門喧童稚架滿琴書山色水光詩懷酒興拙謀或可以辦此也是以心思意嚮日日在此安此樂此言亦此書亦此百周千折必期得此而後已先生不此之助而彼之助是不可其所可而可其所不可也其可哉將愛之實害之萬惟恕察言不能櫽括悚息待罪答耶律惟重書書奉寄耶律生久别不得㑹見豈勝懷想王之竒來審聞尊丈以下皆安良慰西山詩說與文公詩傳異同此非區區所能辨然夙昔愛生勤學似不欲虛其所問雖自知淺陋猶喜一言之春秋壞於三傳此說固矣然盡去三傳而不讀吾恐擬議之失又甚於三傳書義壞於漢儒之序此說固矣然盡欲去之而不讀吾恐臆度之差又甚於漢儒之序程朱以來講明究析其可疑可信亦略有說蓋自焚滅之後歷千餘嵗其間變故又復不少遺脫舛誤焉能盡如洙泗之舊雖語孟二書亦有可疑學者但當求其㫖意溫柔敦厚經夫婦成孝敬以身體之日積月纍庶或有益至於此等疑議姑闕之可也舊見西山文字平實簡易不意此論急迫慢罵殊無溫柔敦厚含蓄氣象抑其少日之為耶抑或他人為之而傳者之誤耶觀其考核辨難出人意表未易折衷容胥㑹時更論鄙見如此未識果是否也因風附意惟愛是望不悉與楊元甫論梁寬甫病證書梁寬甫證候右脅肺部也嗽而唾血舉動喘促者肺疹也發熱脉數不能食者火來刑金肺與脾俱虛也肺與脾俱虛而火乘之其病為逆如此者例不可補㵼蓋補金則慮金與持而喘咳益增㵼火則慮火不退位而痃癖反盛正宜補中益氣湯先扶元氣少以治病藥加之聞已用此藥而不獲效意必病勢苦逆而藥力未到也當與寬甫熟論逺期秋凉庶就平復蓋肺病惡春夏火氣至秋冬則退也止宜於益氣湯中隨四時隂陽升降浮沉溫凉寒熱及見有證增損服之升降浮沉則順之溫凉寒熱則反之順其理和其氣為治之大方也或覺氣壅間服加減枳术丸或有飲間服局方枳术湯數月後庶逆氣少回逆氣回則治法可施但恐今日已至色青色赤及脉弦脉洪則無及矣近世論醫有主河間劉氏者有主易州張氏者張氏用藥依凖四時隂陽升降而增損之正內經四氣調神之義醫而不知此妄行也劉氏用藥務在推陳致新不使少有怫鬱正造化新新不停之義醫而不知此無術也然而主張氏者或未盡張氏之妙則瞑眩之劑終莫敢投至失幾後時而不救者多矣主劉氏者或未悉劉氏之藴則劫效目前隂損正氣遺禍於後日者多矣能用二家之長而無二家之弊則治庶幾乎寬甫病候初感必深所傷物當時消導不盡停滯淹延變生他證以至於今恐亦宜倣劉氏推陳致新之意少加消導藥於益氣湯中庶有漸緩之期也鄙見如此未敢以為必然惟吾才卿元甫子益共商論之與子師可小學四書吾敬信如神明自汝孩提便令講習望於此有得他書雖不治無憾也今殆十五年矣尚未成誦問其指意亦不曉知此吾所以深憂也髙凝來聞汝肯自勉勵勝於前日我心甚喜未識其果然乎韓遵道今在此言論意趣多出小學四書其注語或問與先儒格言誦之甚熟至纍數萬言猶未竭此亦篤實自强故能爾爾我生平長處在信此數書其短處在虛聲牽制以有今日今日之勢可憂而不可恃也汝當繼我長處改我短處汝果能篤實果能自强不患學不至不能篤實自强我雖貴顯適足禍汝萬宜致思比見且専讀孟子孟子如泰山巖巖可以起人偷惰無恥之病凝也相與輔導之至元三年十二月二十九日與子師可與子聲子義比年諸幼多病不勝憂苦近方收拾一二小者為讀書計政恐擾動不安聞令親傳道雅意甚非所望衡之愚陋先生之所知也得受共成一㕓與老妻稚子竭力耕鉏暇日㑹二三學者讀古人書則至願足矣且西去丘壠不逺尤為快便日夜思此至熟也夫尊榮貴顯固人之所甚欲然鶴之乘軒隼之乘墉豈惟取謗怒於天下彼挾矢者交㑹圜至殆其生之不能保將愛之實害之先生不慮及此邪區區之意冀䝉照察是以不避抵冒之罪極意盡言衡䝉賢王誤采虛名曲垂召㫖以學官之職降付鄙人逃去則不敢聽命則不能夙夜憂惶莫知所處聞二君子還王府矣有解釋之路願賜教約夫尊榮顯貴人之所愛然鶴之乘軒隼之乘墉反足以賈禍而召怨曽不若安守貧苦之為愈也亂後雖守小庠實出僭妄比年竭力經營田廬庶覆前日之非何意虛聲展轉至於如此二君子最知衡者萬願為意衡頓首再拜子聲子義二執事與仲晦仲一衡頓首再拜仲晦仲一兩君子執事將春敬惟雅况清裕衡山野鄙人虛名過實不勝愧負仲一過京兆以稠人中不克欵附所懷繼荷仲晦公特書慰勉使衡寬而居安而待其時巳為士君子家託二三子相從正句讀今復十數矣其束修之供綽有餘裕恩㫖益之以俸給是魚肉而又熊掌也以義制之不容有受且仲可遵道之生理未治其事體自是不同再四辭於宣撫亷公左右未見從允靜言思之將茍避矯激之嫌必難免士林之誚託所以解之非二君子其誰可而弗獲即有不安明公必能見察於言意之外也區區不已重附從宜李公幸矜亮恩㫖令衡充京兆提學衡之寡陋先生素知使依先所降恩命教人家子弟巳愧不稱况提學之職必習於舉業場屋有聲可得為之而衡蹇淺昏昧一無所曉何以當此茍强顔為之不惟取笑四方為士友所責亦恐用非其人為當路諸公之纍是以傾輸悃愊冒瀆陳說仲晦仲一二君子所願奉致此意何由使衡得守先命少緩士林之議便風伏賜誨藥邇者從宜李公來傳道二君子雅意佩感但病中不及作書為謝與把仲輝把仲輝具悉日來所履良用憮然衡也與子為師與令親為友不能善誘善導使入孝慈顧相怨交惡反出衰俗之下益自知平日區區初無小補德之凉薄其誤人乃如此可勝負愧勸道之言非有固吝但疇昔事幾方來嘗面陳可否猶黑白然且不見信今業已為之豈咫尺之書所可回邪雖然故舊之情不忍遂已擬托韓遵道過蘇門欵叙所懷雖知强聒罔濟以愚懇無他庶或有一中耳汝今日所處固為甚難然天下公議必責備於臣子必責備於賢者父之過即子之過也正當反躬自克百倍其勇令親之失亦汝之失也此若不悟勢將滔滔有無窮之悔矣重思重思與王濟川詳議濟川詳議友兄執事之用春來㑹見無恙也别去不知遽為永訣追念往者相從之舊豈勝哀痛少者致養老者待養人之常理吾兄春秋髙生業未遂巳為憂苦不知何以堪此也凶變之來莫測以為天耶人耶要必勉自寬解逺為後人慮庭玉回草叙區區之竒任重尤當自力餘不及盡言之與韓總判邦傑總判邦傑舊友相别之久相去之逺公務匆冗中乃不能忘相從之舊殊慰懷想而無競又論為學為政皆有進長尤可喜也衡臥病僅一月未能出門無補公私徒增愧恐區區之念想諸公可憐也比㑹見望以時加愛加勉不能悉與提學先生提學先生執事顯之來審文况安適為慰嚮來㑹晤俱以匆匆不遂挽留之願别後寓此又復一年無補公私徒增憂懼念昔相期鄰居接壤督兒輩種田讀書徜徉山水間以盡餘生此志竟得遂否病中草草奉候未間千萬保練是祝區區不能既與李仲實總管總管友兄執事太夫人捐館既不克奔慰又無便風以奉區區可勝惆惘關中之别逮今幾十年不獲寧處風疾纏綿重重憂患鬚髮白已盡矣何時一見細道久别之懷因風敬附謝懇未間天氣尚熱萬祈以禮自愛不宣與孫謙甫謙甫友兄執事逺承惠問且知别後尊况佳安喜慰之至秀才德性可愛及此妙齡肯為學不輟其成就當有過人者今日所期雖未即遂或者天命未欲小成乎事既偶然惟宜緩待不知以為如何㑹見時當更論秋凉保練是祝區區不宣與趙輔之宣撫公契舊執事托梁寬甫奉書想今已逹秋凉逺惟文候康裕少事輒復干凂某人某之甥聞為國儕所苦執事肯為區處得就安便甚望竹頭木屑或可量材用之又出望外也國務方殷不暇言此瑣細豈勝愧悚然親戚之求有不獲已焉者萬乞照亮未間惟為國為民自愛重宣撫公舊契執事一别忽復許久豈惟交遊之舊日積馳情向來定亂破姦為天下賴此又欽服之意不容已也某來辱惠音承起居佳勝太夫人亦康健感慰可量衡自去嵗得腳氣近日始緩餘皆無可言者因風奉報此比良晤萬冀為斯民自愛區區不宣與友人向來報書想已聞達人行重附鄙意衡自前年得患腳甚思吾友相與鄰居方將終營復此出今燕居燕城日就衰朽何别離之易而㑹集之難如此也區區拙迹某人能道其實不足煩吾友慮比㑹晤惟祈以善自重不宣與君瑞先生君瑞先生侍側某來辱誨簡審聞尊况動止康裕甚慰逺懷衡即此旅寓日益無聊某人歸能道其實外人或傳曽受職任正由不知己者相玩戲也掛齒且不可况筆之書乎千萬乞照亮未間惟冀以道自愛重區區不宣與扈正之正之鄉兄執事向在關中得幸相近以墳壠之故不遂相守吾兄逺臨潼關哭泣為别可見故愛之情如此其别後日復一日馳驅道路間憶昔者相從之樂可勝悵惘秋凉逺惟尊候洎仙集各安裕即此區區無足道者未間惟調護即前髙大不宣與扈正之向在關中得親近才卿文逺輩有講習之樂自有切磋之益東還入紛擾冗中所接聞殊不如意加以衰病繼作旅寓逺道憶昔相從優游自得豈勝悵惘秋凉敬惟尊况洎玉集各安順人行草草附問㑹晤未涯切冀以時自愛區區不宣與許仲常自約鄧州回即寄書來今不聞一信何耶生事當著實自力不須更求勾當慮日後愈無涯際悔不可及也當深思之比見惟勉勵不悉與孫伯玉伯玉友舊執事春初逺惟福履清佳老得吾友相與鄰居實夙昔所願方率兒輩結茅樹桑為讀書計不意有此行也今雖寓此請歸之念無日去心新居草創計多勞要當安心勉力庶可必成也因風示報為幸人行敬附鄙意向來㑹見以相愛之故故不敢不盡所言然其辨折可否頗傷急迫將謂獲罪於吾兄也違别未幾遽辱誨音知吾兄襟度寬綽或見區區之意本無他也感慰感慰敬生還草附意懇正逺惟千萬保練不宣與張仲謙左丞左相心契執事十九日承手書且聞起居康勝喜慰不可量衡之拙學無足言者而執事虛心每每問及尚果未知果不足用也雖然盛意不可虛辱竊謂父子君臣實天所命能順而不失則人道備矣其利與鈍成與否雖古人不能必吾其豈可不聽天命而茍為哉區區只此為是是所以為拙學也材木盤費極厚感意因風奉答兼謝比晤對千萬慎愛不宣與文子真向託劉孝叔附書不意就此沉滯靳生行復令附信已不及矣今觀之正宜慎言克己安心靜守紛紜之議不須辨也比夏或得還家當細話此未間惟好自愛重不悉與吕伯充書奉伯充秀才不意凶變令尊丈奄棄榮養可勝驚怛舊聞伯充途路中偶與相從及相别心為不忍今罹此難咎何以堪處葬禮遵用遺言依倣古制信道力行至於如此楊元甫之亞也敬歎敬歎路逺不及一往慰問悵惘曷可言未間惟以禮自盡區區不宣與孫伯玉伯玉友兄執事犬子來知有幼孫之憂而生理又復不遂可勝動念人生所遇或厚或薄理有當然故聖人教戒正要於此益堅益壯不可怯懦安也積學力行始亨之端惟千萬自愛不宣與張仲謙左丞左相心契執事犬子於六月二日病殁衡罪逆深重不見佑於神明使禍延所愛肝腸痛慘猶鈍刀割裂仰天長號不知所以為言但犬子初還家飲食猶日進二升時欲持行四月初聞妻子不來病遂日增醫者診之鬱證也由心氣不足親友亦咎衡當時不即挈引還家故致如此病且革果惟不得舒暢使然胸膺之氣不得上下以致於死事已往矣萬悔何及人生修短固有定數不可改易然淺懷俗見終未能無恨於此也望以是意達之焦氏良親幼孫在襁褓使日得承吾兒後萬謝萬感雪齊侍講郎中三執事皆不及另書望道此意壬辰後憂苦無若今日殆不可生存矣因風幸示教自大名遷居蘇門其大喜有三親善人也近鄉土也得佳山水也是以藝麻樹桑圖為老計三數年雖所幹未果而志慮愈堅於向時矣衡頓首再拜啓蘇門之來此迫於明㫖俾教授子弟衡以嘗為小庠故不敢昧而不敢辭已聞四方之傳形於謗言聲聞過情之恥宜被一身惟有玷乎諸公之明悚懼無既兹復頒以提學之命恩則厚矣憂如之何纍辭納於宣撫亷公未承見允憂懼薰心感疾如舊不能起者旬日矣其不安之勢可以意曉且提學主司之職京兆學官日望考校賦詩義論積年於是將使無素業者易而尸之於公議自不容安故敢上冒威命陳辭於左右冀復言於仲晦仲一望諸君子因大用而附片言隻字以論撫司得伸卑懇不勝拜賜衡頓首再拜啓邇來草率奉書想不為浮沉然區區所求至甚切故有喋喋京兆舊有提學每旦望考校賦詩論是為所職而衡於學業初不能攻習嚮者雖守小庠僅能與童子正句讀釋音訓而已令代領其職是羸夫負為烏獲之任也雖骨折筋絶其可勉强纍復求於宣撫廉公冀為回奉未見允許憂懼薰心至於臥病其不安之勢可想見也恃愛舊願致此意於仲晦仲一二君子若獲專奉元受恩命教授子弟則駑蹇之資可以勉勵庶幾小安也衡頓首再拜啓復十六日承誨簡知邇日宿疾尚未全愈可勝憂想桑根煎固治肺疾然須從升降浮沉多加時藥少加治藥以待秋凉雖旦暮未有顯效而他日奏長也氣漸有生發則神祕湯輩可一兩服便驗斯理也嘗與遵邑論之甚不可以迂濶淺近不之信也未知先生以為如何與某郎中郎中心契執事别後南歸得守丘壠巳遂所願老來情思苦厭喧雜課督兒童種田讀書雖知拙謀心自喜幸農夫野叟日夕相遇與之話言固不盡曉要其中無甚險阻是可尚矣逺辱存記兩枉書教且承雅意肯屬鄉閭迂濶之為亦有同者喜不能寐佇俟好音鄙人有幸須得㑹合切望切望與趙宣撫相公宣撫相公執事比日車從過覃懷不獲一見可勝悵惘時暑敬惟起居安裕友兄楊元甫隱士也篤信好學操履不茍實我輩所仰重執事時肯眷顧美事也劉成之舊從姚司農今將還家謹托附意比良晤惟千萬為國為民自愛區區不宣代李和叔與兄子書叔書付兄子天敏吾先本名族自兵亂以來衰頽不振諸子且孱弱未見可以繼復先人之舊者獨汝沉靜敏慧度越諸子我是以﨑嶇宛轉求託於王公文秉也既從學有稱於同輩至慰所望比年以親事隔逺不得躬加勸督殊使人動心吾意汝之進學不類於前日耶則本質深沉遽變於嵗月之頃吾意汝之進學果類於前日耶則行人絡繹了不聞勤苦之言因念家業陵替使汝婚娶之禮不如宿昔之舊可歎也可愧也三數年來吾以目疾失明凡曰交遊曰故舊莫不傷悼矜憫有不逺百里而慰問者昔子夏聖門之髙弟其失明猶曰天乎今况我淺薄之資處憂患之餘能無動於中乎先人之業欲墜未墜望所以興復吾門者惟汝耳汝而肯學則吾李氏之後廕其餘輝矣汝而不學則吾李氏之後為工歟為商歟為牛童歟為馬匹歟蓋有不忍論者此吾所以重傷隔别之逺而愈益失明之恨也吾先代皆以官業名世原其所自蓋積於勤學學之於人大矣父子之親與君臣之義夫婦長幼朋友亦莫不各有當然之則此人倫也茍無學問以明之則違逺人道與禽獸殆無少異以禽獸無異之材汲汲焉求處人之表吾見其謬悠荒唐足陷於自欺而後已也吾衰且老重以疾廢平時所期於汝者自是愈切不知汝之處心亦果如吾之處心乎欲話所懷竟未有便庭除至近也欲挾引乃能出入千里之逺計㑹聚於何時闕中州名賢文表卷四
